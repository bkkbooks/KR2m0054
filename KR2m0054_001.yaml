body:
  text: 故唐律疏議卷第一名例凡七條疏議曰夫三才肇位萬象斯分稟氣含靈人為稱首莫不憑黎元而樹司宰因政教而施刑法其有情恣庸愚識沈愆戻大則亂其區宇小則睽其品式不立制度則未之前聞故曰以刑止刑以殺止殺刑罰不可弛於國笞捶不得廢於家時遇澆淳用有衆寡於是結繩啓路盈坎疏源輕刑明威大禮崇敬易曰天垂象聖人則之觀雷電而制威刑覩秋霜而有肅殺懲其未犯而防其未然平其徽纆而存乎博愛蓋聖王不獲已而用之古者大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽笮薄刑用鞭撲其所由來亦已尚矣昔白龍白雲則伏犧軒轅之代西火西水則炎帝共工之年鷞鳩筮賓於少皡金政策名於顓頊咸有天秩典司刑憲大道之化擊壤無違逮乎唐虞化行事簡議刑以定其罪畫象以愧其心所有條貫良多簡略年代浸遠不可得而詳焉堯舜時理官則謂之為士而皋陶為之其法略存而往往概見則風俗通所云皋陶謨虞造律是也律者訓銓訓法也易曰理財正辭禁人為非曰義故銓量輕重依義制律尚書大傳曰丕天之大律注云奉天之大法法亦律也故謂之為律昔者聖人制作謂之為經傳師所說則謂之為傳此則丘明子夏於春秋禮經作傳是也近代以來兼經注而明之則謂之為義疏疏之為字本以疏闊疏遠立名又廣雅云疏者識也案疏訓識則書疏記識之道存焉史記云前主所是著為律後主所是疏為令漢書云削牘為疏故云疏也昔者三王始用肉刑赭衣難嗣皇風更遠朴散淳離傷肌犯骨尚書大傳曰夏刑三千條周禮司刑掌五刑其屬二千五百穆王度時制法五刑之屬三千周衰刑重戰國異制魏文侯師於里悝集諸國刑典造法經六篇一盜法二賊法三囚法四捕法五雜法六具法商鞅傳授改法為律漢相蕭何更加悝所造戶興廏三篇謂九章之律魏因漢律為一十八篇改漢具律為刑名第一晉命賈充等增損漢魏律為二十篇於魏刑名律中分為法例律宋齊梁及後魏因而不改爰至北齊併刑名法例為名例後周復為刑名隋因北齊更為名例唐因於隋相承不改名者五刑之罪名例者五刑之體例名訓為命例訓為比命諸篇之刑名比諸篇之法例但名因罪立事由犯生命名即刑應比例即事表故以名例為首篇第者訓居訓次則次第之義可得言矣一者太極之氣函三為一黃鍾之一數所生焉名例冠十二篇之首故云名例第一大唐皇帝以上聖凝圖英聲嗣武潤春雲於品物緩秋官於黎庶今之典憲前聖規模章程靡失鴻纖備舉而刑憲之司執行殊異大理當其死坐刑部處以流刑一州斷以徒年一縣將為杖罰不有解釋觸塗睽誤皇帝彝憲在懷納隍興軫德禮為政教之本刑罰為政教之用猶昏曉陽秋相須而成者也是以降綸言於台鉉揮折簡於髦彥爰造律疏大明典式遠則皇王妙旨近則蕭賈遺文沿波討源自枝窮葉甄表寬大裁成簡久譬權衡之知輕重若規矩之得方圓邁彼三章同符畫一者矣笞刑五笞一十笞二十笞三十笞四十笞五十疏議曰笞者擊也又訓為恥言人有小愆法須懲誡故加捶撻以恥之漢時笞則用竹今時則用楚故書云撲作教刑即其義也漢文帝十三年太倉令淳于意女緹縈上書願沒入為官婢以贖父刑帝悲其意遂改肉刑當黥者髠鉗為城奴令舂當劓者笞三百此即笞杖之目未有區分笞擊之刑刑之薄者也隨時沿革輕重不同俱期無刑義唯必措孝經援神契云聖人制五刑以法五行禮云刑者侀也成也一成而不可變故君子盡心焉孝經鉤命決云刑者侀也質罪示終然殺人者死傷人者刑百王之所同其所由來尚矣從笞十至五十其數有五故曰笞刑五徒杖之數亦準此贖銅一斤贖銅二斤贖銅三斤贖銅四斤贖銅五斤杖刑五杖六十杖七十杖八十杖九十杖一百疏議曰說文云杖者持也而可以擊人者歟家語云舜之事父小杖則受大杖則走國語云薄刑用鞭撲書云鞭作官刑猶今之杖刑者也又蚩尤作五虐之刑亦用鞭撲源其濫觴所從來遠矣漢景帝以笞者已死而笞未畢改三百曰二百二百曰一百奕代沿流曾微增損爰洎隨室以杖易鞭今律云纍決笞杖者不得過二百蓋循漢制也贖銅六斤贖銅七斤贖銅八斤贖銅九斤贖銅十斤徒刑五一年一年半二年二年半三年疏議曰徒者奴也蓋奴辱之周禮云其奴男子人于罪隸又任之以事置以圜土而收教之上罪三年而捨中罪二年而捨下罪一年而捨此竝徒刑也蓋始於周贖銅二十斤贖銅三十斤贖銅四十斤贖銅五十斤贖銅六十斤流刑三二千里二千五百里三千里疏議曰書云流宥五刑謂不忍刑殺宥之于遠也又曰五流有宅五宅三居大罪投之四裔或流之于海外次九州之外次中國之外蓋始於唐虞今之三流即其義也贖銅八十斤贖銅九十斤贖銅一百斤死刑二絞斬疏議曰古先哲王則天垂法輔政助化禁暴防姦本欲生之義期止殺絞斬之坐刑之極也死者魂氣歸於天形魄歸於地與萬化冥然故鄭注禮云死者澌也消盡為澌春秋元命包云黃帝斬蚩尤於涿鹿之野禮云公族有死罪罄之于甸人故知斬自軒轅絞興周代二者法陰數也陰主殺罰因而則之即古大辟之刑是也問曰笞以上死以下皆有贖法未知贖刑起自何代答曰書云金作贖刑注云誤而入罪出金以贖之甫侯訓夏贖刑云墨辟疑赦其罰百鍰劓辟疑赦其罰唯倍剕辟疑赦其罰倍差宮辟疑赦其罰六百鍰大辟疑赦其罰千鍰注云六兩曰鍰鍰黃鐵也晉律應八議以上皆留官收贖勿髠鉗笞也今古贖刑輕重異制品目區別備有章程不假勝條無煩縷說贖銅一百二十斤十惡疏議曰五刑之中十惡尤切虧損名教毀裂冠冕特標篇首以為明誡其數甚惡者事類有十故稱十惡然漢制九章雖竝湮沒其不道不敬之目見存原夫厥初蓋起諸漢案梁陳已往略有其條周齊雖具十條之名而無十惡之目開皇創制始備此科酌於舊章數存於十大業有造復更刊除十條之內唯存其八自武德以來仍遵開皇無所損益一曰謀反疏議曰案公羊傳云君親無將將而必誅謂將有逆心而害於君父者則必誅之左傳云天反時為災人反德為亂然王者居宸極之至尊奉上天之寶命同二儀之覆載作兆庶之父母為子為臣惟忠惟孝乃敢包藏凶慝將起逆心規反天常悖逆人理故曰謀反注謂謀危社稷疏議曰社為五土之神稷為田正也所以神地道主司嗇君為神主食乃人天主泰即神安神寧即時稔臣下將圖逆節而有無君之心君位若危神將安恃不敢指斥尊號故託云社稷周禮云左祖右社人君所尊也二曰謀大逆疏議曰此條之人干紀犯順違道悖德逆莫大焉故曰大逆注謂謀毀宗廟山陵及官闕疏議曰有人獲罪於天不知紀極潛思釋憾將圖不逞遂起惡心謀毀宗廟山陵及宮闕宗者尊也廟者貌也刻木為主敬象尊容置之宮室以時祭享故日宗廟山陵者古先帝王因山而葬黃帝葬橋山即其事也或云帝王之葬如山如陵故曰山陵宮者天有紫微宮人君則之所居之處故曰宮其闕者爾雅釋宮云觀謂之闕郭璞云宮門雙闕也周禮秋官正月之吉日懸刑象之法於象魏使人觀之故謂之觀三曰謀叛疏議曰有人謀背本朝將投蕃國或欲翻城從僞或欲以地外奔即如莒牟夷以牟婁來奔公山弗擾以費叛之類四曰惡逆疏議曰父母之恩昊天罔極嗣續妣祖承奉不輕梟鏡其心愛敬同盡五服至親自相屠戮窮惡盡逆絶棄人理故曰惡逆注謂毆及謀殺祖父母父母殺伯叔父母姑兄姊外祖父母夫夫之祖父母父母疏議曰毆謂毆擊謀謂謀計自伯叔以下即據殺訖若謀而未殺自當不睦之條惡逆者常赦不免決不待時不睦者會赦合原惟止除名而已以此為別故立制不同其夫之祖父母者夫之曾高祖亦同案喪服制為夫曾高服緦麻若夫承重其妻於曾高祖亦如夫之父母服期故知稱夫之祖父母曾高亦同也問曰外祖父母及夫據禮有等敷不同具為分析答曰外祖父母但生母身有服無服竝同外祖父母所以如此者律云不以尊壓及出降故也若不生母身者有服同外祖父母無服同凡人依禮嫡子為父後及不為父後者竝不為出母之黨服即為繼母之黨服此兩黨俱是外祖父母若親母死於室為親母之黨服不為繼母之黨服此繼母之黨無服即同凡人又妾子為父後及不為父後者嫡母存為其黨服嫡母亡不為其黨服禮云所從亡則已此既從嫡母而服故嫡母亡其黨則已夫者依禮有三月廟見有未廟見或就婚等三種之夫竝同夫法其有克吉日及定婚夫等唯不得違約改嫁自餘相犯竝同凡人五曰不道疏議曰安忍殘賊背違正道故曰不道注謂殺一家非死罪三人支解人疏議曰謂一家之中三人被殺俱無死罪者若三人之內有一人合死及於數家各殺二人唯合死刑不入十惡或殺一家三人本條罪不至死亦不入十惡支解人者謂殺人而支解亦據本罪合死者注造畜蠱毒厭魅疏議曰謂造合成蠱雖非造合乃傳畜堪以害人者皆是即未成者不入十惡厭魅者其事多端不可具述皆謂邪俗陰行不軌欲令前人疾苦及死者六曰大不敬疏議曰禮者敬之本敬者禮之輿故禮運云禮者君之柄所以別嫌明微考制度別仁義責其所犯既大皆無肅敬之心故曰大不敬注謂盜大祀神御之物乘輿服御物疏議曰大祀者依祠令昊天上帝五方上帝皇地祇神州宗廟等為大祀職制律又云凡言祀者祭享同若大祭大享竝同大祀神御之物者謂神祇所御之物本條注云謂供神御者帷帳几杖亦同造成未供而盜亦是酒醴饌具及籩豆簠簋之屬在神前而盜者亦入大不敬不在神所盜者非也乘輿服御物者謂主上服御之物人主以天下為家乘輿巡幸不敢指斥尊號故託乘輿以言之本條注云服通衾茵之屬真副等皆須監當之官部分擬進乃為御物注盜及僞造御寶疏議曰說文云璽者印也古者尊卑共之左傳云襄公自楚還及方城季武子取卞使公冶問璽書追而豫之是其義也秦漢以來天子曰璽諸侯曰印開元歲中改璽曰寶本條云僞造皇帝八寶此言御寶者為攝三后寶竝入十惡故也注合和御藥誤不如本方及封題誤疏議曰合和御藥雖憑正方中間錯謬誤違本法卦題誤者謂依方合訖封題有誤若以丸為散應冷言熱之類注若造御膳誤犯食禁疏議曰周禮食醫掌王之八珍所司特有敬愼營造御膳須憑食經誤不依經即是不敬注御幸舟船誤不牢固疏議曰帝王所之莫不慶幸舟船既擬供御故曰御幸舟船工匠造船備盡心力誤不牢固即入此條但御幸舟船以上三事皆為因誤得罪設未進御亦同十惡如其故為即從謀反科罪其監當官司準法減科不入不敬注指斥乘輿情理切害疏議曰此謂情有觖望發言謗毀指斥乘輿情理切害者若使無心怨天唯欲誣搆人罪自依反坐之法不入十惡之條舊律云言理切害今改為情理切害者蓋欲原其本情廣恩愼罰故也注及對捍制使而無人臣之禮疏議曰奉制出使宣布四方有人對捍不敬制命而無人臣之禮者制使者謂奉敕定名及令所司差遣者是也七曰不孝疏議曰善事父母曰孝既有違犯是名不孝注謂告言詛詈祖父母父母疏議曰本條直云告祖父母父母此注兼云告言者文雖不同其義一也詛猶呪也詈猶罵也依本條詛欲令死及疾苦者皆以謀殺論自當惡逆唯詛求愛媚始入此條問曰依賊盜律子孫於祖父母父母求愛媚而厭呪者流二千里然厭魅呪詛罪無輕重今詛為不孝未知厭人何條答曰厭呪雖復同文理乃詛輕厭重但厭魅凡人則人不道若呪詛者不入十惡名例云其應入罪者則舉輕以明重然呪詛是輕尚入不孝明知厭魅是重理入此條注及祖父母父母在別籍異財疏議曰祖父母父母在子孫就養無方出告反面無自專之道而有異財別籍情無至孝之心名義以之俱淪情節於茲竝棄稽之典禮罪惡難容二事既不相須違者竝當十惡注若供養有闕疏議曰禮云孝子之養親也樂其心不違其志以其飮食而忠養之其有堪供而闕者祖父母父母告乃坐注居父母喪身自嫁娶若作樂釋服從吉疏議曰居父母喪身自嫁娶皆謂首從得罪者若其獨坐主婚男女即非不孝所以稱身自嫁娶以明主婚不同十惡故也其男夫居喪娶妾合免所居之一官女子居喪為妾得減妻罪三等竝不入不孝若作樂者自作遣人等樂謂擊鐘鼓奏絲竹匏磬塤箎歌舞散樂之類釋服從吉謂喪制未終而在二十七月之內釋去衰裳而著吉服者注聞祖父母父母喪匿不舉哀及詐稱祖父母父母死疏議曰依禮聞親喪以哭答使者盡哀而問故父母之喪創巨尤切聞即崩殞劈踊號天今乃匿不舉哀或揀擇時日者竝是其詐稱祖父母父母死謂祖父母父母見在而詐稱死者若先死而詐稱始死者非八曰不睦疏議曰禮云講信修睦孝經云民用和睦睦者親也此條之內皆是親族相犯為九族不相叶睦故曰不睦注謂謀殺及賣緦麻以上親疏議曰但有謀殺及賣緦麻以上親無問尊卑長幼總入此條若謀殺期親尊長等殺訖即入惡逆今直言謀殺不言故鬪若故鬪殺訖亦入不睦舉謀殺未傷是輕明故鬪已殺是重輕重相明理同十惡賣緦麻以上親者無問強和俱入不睦賣未售者非注毆告夫及大功以上尊長小功尊屬疏議曰依禮夫者婦之天又云妻者齊也恐不同尊長故別言夫號大功尊長者依禮男子無大功尊唯婦人於夫之祖父母及夫之伯叔父母是大功尊大功長者謂從父兄姊是也以上者伯叔父母姑兄姊之類小功尊屬者謂從祖父母姑從祖伯叔父母姑外祖父母舅姨之類九曰不義疏議曰禮之所尊尊其義也此條元非血屬本止以義相從背義乖仁故曰不義注謂殺本屬府主刺史縣令見受業師疏議曰府主者依令職事官五品以上帶勳官三品以上得親事帳內於所事之主名為府主國官邑官於其所屬之主亦與府主同其都督刺史皆據制書出日六品以下皆據畫訖始是見受業師謂伏膺儒業而非私學者若殺訖入不義謀而未殺自從雜犯注吏卒殺本部五品以上官長疏議曰吏謂流外官以下卒謂庶士衛士之類此等色人類例不少有殺本部五品以上官長竝入不義官長者依令諸司尚書同長官之例注及聞夫喪匿不舉哀若作樂釋服從吉及改嫁疏議曰夫者妻之天也移父之服而服為夫斬衰恩義既崇聞喪即須號慟而有匿哀不舉居喪作樂釋服從吉改嫁忘憂皆是背禮違義故俱為十惡其改嫁為妾者非十曰內亂疏議曰左傳云女有家男有室無相瀆易此則亂若有禽獸其行朋淫於家紊亂禮經故曰內亂注謂姦小功以上親疏議曰姦小功以上親者謂據禮男子為婦人著小功服而姦者若婦人為男夫雖有小功之服男子為報服緦麻者非謂外孫女於外祖父及外甥於舅之類注父祖妾及與和者疏議曰父祖妾者有子無子竝同媵亦是及與和者謂婦人共男子和姦者竝入內亂若被強姦後遂和可者亦是謂謀危社稷謂謀毀宗廟山陵及宮闕謂謀背國從僞謂毆及謀殺祖父母父母殺伯叔父母姑兄姊外祖父母夫夫之祖父母父母謂殺一家非死罪三人支解人造畜蠱毒厭魅謂盜大祀神御之物乘輿服御物盜及僞造御寶合和御藥誤不如本方及封題誤若造御膳誤犯食禁御幸舟船誤不牢固指斥乘輿情理切害及對捍制使而無人臣之禮謂告言詛詈祖父母父母及祖父母父母在別籍異財若供養有闕居父母喪身自嫁娶若作樂釋服從吉聞祖父母父母喪匿不舉哀詐稱祖父母父母死謂謀殺及賣緦麻以上親毆告夫及大功以上尊長小功尊屬謂殺本屬府主刺史縣令見受業師吏卒殺本部五品以上官長及聞夫喪匿不舉哀若作樂釋服從吉及改嫁謂姦小功以上親父祖妾及與和者八議疏議曰周禮云八辟麗邦法今之八議周之八辟也禮云刑不上大夫犯法則在八議輕重不在刑書也其應議之人或分液天潢或宿侍旒扆或多才多藝或立事立功簡在帝心勳書王府若犯死罪議定奏裁皆須取決宸衷曹司不敢與奪此謂重親賢敦故舊尊賓貴尚功能也以此八議之人犯死罪皆先奏請議其所犯故曰八議一曰議親疏議曰義取內睦九族外叶萬邦布雨露之恩篤親親之理故曰議親袒免者據禮有五高祖兄弟曾祖從父兄弟祖再從兄弟父三從兄弟身之四從兄弟是也注及太皇太后皇太后緦麻以上親疏議曰太皇太后者皇帝祖母也皇太后者皇帝母也加太者太之言大也易稱太極蓋取尊大之義稱皇者因子以明母也其二后蔭及緦麻以上親緦麻之親有四曾祖兄弟祖從父兄弟父再從兄弟身之三從兄弟是也注皇后小功以上親疏議曰皇后蔭小功以上親者降姑之義小功之親有三祖之兄弟父之從父兄弟身之再從兄弟是也此數之外據禮內外諸親有服同者竝準此二曰議故疏議曰謂宿得侍見特蒙接遇歷久者三曰議賢疏議曰謂賢人君子言行可為法則者四曰議能疏議曰謂能整軍旅蒞政事鹽梅帝道師範人倫者五曰議功疏議曰謂能斬將搴旗摧鋒萬里或率衆歸化寧濟一時匡救艱難銘功太常者六曰議貴疏議曰依令有執掌者為職事官無執掌者為散官爵謂國公以上七曰議勤疏議曰謂大將吏恪居官次夙夜在公若遠使絶域經涉險難者八曰議賓疏議曰書云虞賓在位羣后德讓詩曰有客有客亦白其馬禮云天子存二代之後猶尊賢也昔武王克商封夏后氏之後於杞封殷氏之後於宋若今周後介公隋後酅公竝為國賓者謂皇帝袒免以上親及太皇太后皇太后緦麻以上親皇后小功以上親謂故舊謂有大德行謂有大才藝謂有大功勳謂職事官三品以上散官二品以上及爵一品者謂有大勤勞謂承先代之後為國賓者故唐律疏議卷第二名例凡一十一條諸八議者犯死罪皆條所坐及應議之狀先奏請議議定奏裁疏議曰此名議章八議人犯死罪者皆條録所犯應死之坐及録親故賢能功勤賓貴等應議之狀先奏請議依令都堂集議議定奏裁注議者原情議罪稱定刑之律而不正決之疏議曰議者原情議罪者謂原其本情議其犯罪稱定刑之律而不正決之者謂奏狀之內唯云準犯依律合死不敢正言絞斬故云不正決之流罪以下減一等其犯十惡者不用此律疏議曰流罪以下犯狀既輕所司減訖自依常斷其犯十惡者死罪不得上請流罪以下不得減罪故云不用此律議者原情議罪稱定刑之律而不正決之諸皇太子妃大功以上親疏議曰此名請章皇后蔭小功以上親入議皇太子妃蔭大功以上親入請者尊卑降殺也應議者期以上親及孫疏議曰八議之人蔭及期以上親及孫入請期親者謂伯叔父母姑兄弟姊妹妻子及兄弟子之類又例云稱期親者曾高同及孫者謂嫡孫衆孫皆是曾玄亦同其子孫之婦服雖輕而義重亦同期親之例曾玄之婦者非若官爵五品以上犯死罪者上請疏議曰官爵五品以上者謂文武職事四品以下散官三品以下勳官及爵二品以下五品以上此等之人犯死罪者竝為上請注請謂條其所犯及應請之狀正其刑名別奏請疏議曰條其所犯者謂條録請人所犯應死之坐應請之狀者謂皇太子妃大功以上親應議者期以上親及孫若官爵五品以上應請之狀正其刑名者謂録請人所犯準律合絞合斬別奏者不緣門下別録奏請聽敕流罪以下減一等其犯十惡反逆緣坐殺人監守內姦盜略人受財枉法者不用此律疏議曰流罪以下減一等者減訖各依本法若犯十惡反逆緣坐及殺人者謂故殺鬪殺謀殺等殺訖不問首從其於監守內姦盜略人受財枉法者此等請人死罪不合上請流罪已下不合減罪故云不用此律其盜不得財及姦略人未得竝從減法請謂條其所犯及應請之狀正其刑名別奏請諸七品以上之官及官爵得請者之祖父母父母兄弟姊妹妻子孫犯流罪已下各從減一等之例疏議曰此名減章七品以上謂六品七品文武職事散官衛官勳官等身官爵得請者謂五品以上官爵蔭及祖父母父母兄弟姊妹妻子孫犯流罪以下各得減一等若上章請人得減此章亦得減請人不得減此章亦不得減故云各從減一等之例諸應議請減及九品以上之官若官品得減者之祖父母父母妻子孫犯流罪以下聽贖疏議曰此名贖章應議請減者謂議請減三章內人亦有無官而入議請減者故不云官也及九品已上官者謂身有八品九品之官若官品得減者謂七品已上之官蔭及祖父母父母妻子孫犯流罪以下竝聽贖若應以官當者自從官當法疏議曰議請減以下人身有官者自從官當除免不合留官取蔭收贖其加役流疏議曰加役流者舊是死刑武德年中改為斷趾國家惟刑是恤恩弘博愛以刑者不可復屬死者務欲生之情軫向隅恩覃祝網以貞觀六年奉制改為加役流反逆緣坐流疏議曰謂緣坐反逆得流罪者其婦人有官者比徒四年依官當之法亦除名無官者依留住法加杖配役子孫犯過失流疏議曰謂耳目所不及思慮所不到之類而殺祖父母父母者不孝流疏議曰不孝流者謂聞父母喪匿不舉哀流告祖父母父母者絞從者流呪詛祖父母父母者流厭魅求愛媚者流問曰居喪嫁娶合徒三年或恐喝或強各合加至流罪得入不孝流以否答曰恐喝及強元非不孝加至流坐非是正刑律貴原情據理不合及會赦猶流者疏議曰案賊盜律云造畜蠱毒雖會赦竝同居家口及教令人亦流三千里斷獄律云殺小功尊屬從父兄姊及謀反大逆者身雖會赦猶流二千里此等竝是會赦猶流其造畜蠱毒婦人有官無官竝依下文配流如法有官者仍除名至配所免居作各不得減贖除名配流如法疏議曰男夫犯此五流假有一品已下及取蔭者竝不得減贖除名配流如法三流俱役一年稱加役流者役三年家無兼丁者依下條加杖免役故云如法注除名者免居作即本罪不應流配而特配者雖無官品亦免居作疏議曰犯五流之人有官爵者除名流配免居作即本罪不應流配而特流配者雖無官品亦免居作謂有人本犯徒以下及有蔭之人本法不合流配而責情特流配者雖是無官之人亦免居作其於期以上尊長及外祖父母夫夫之祖父母犯過失殺傷應徒若故毆人至廢疾應流男夫犯盜及婦人犯姦者亦不得減贖疏議曰過失殺祖父母父母已入五流若傷即合徒罪故云期以上其於期親尊長及外祖父母夫夫之祖父母犯過失殺及傷應合徒者故毆人至廢疾應流謂恃蔭合贖故毆人至廢疾準犯應流者男夫犯盜徒以上謂計盜罪至徒以上強盜不得財亦同及婦人犯姦者竝亦不得減贖言亦者亦如五流不得減贖之義注有官爵者各從除免當贖法疏議曰謂故毆小功尊屬至廢疾及男夫於監守內犯十惡及盜婦人姦入內亂者竝合除名若男夫犯盜斷徒以上及婦人犯姦者竝合免官其於期親以上尊長犯過失殺傷應徒及故毆凡人至廢疾應流竝合官當犯除名者爵亦除本犯免官免所居官及官當者留爵收贖縱有官爵合減亦不得減故云各從除免當贖法問曰五流不得減贖若會降合減贖以否答曰五流除名配流會降至徒以下有蔭應贖之色更無配役之文即有聽贖者有不聽贖者止如加役流反逆緣坐流不孝流此三流會降竝聽收贖其子孫犯過失流雖會降亦不得贖何者文云於期以上尊長犯過失殺傷應徒不得減贖此雖會降猶是過失應徒故不合贖其有官者自準除免當贖之例本法既不合例減降後亦不得減科其會赦猶流者會降灼然不免除名者免居作即本罪不應流配而特配者雖無官品亦免居作謂徒以上有官爵者各從除免當贖法諸婦人有官品及邑號犯罪者各依其品從議請減贖當免之律不得蔭親屬疏議曰婦人有官品者依令妃及夫人郡縣鄉君等是也邑號者國郡縣鄉等名號是也婦人六品以下無邑號直有官品即媵是也依禮凡婦人從其夫之爵位注云生禮死事以夫為尊卑故犯罪應議請減贖者各依其夫品從議請減贖之法若犯除免官當者亦準男夫之例故云各從議請減贖當免之律婦人品命既因夫子而授故不得蔭親屬若不因夫子別加邑號者同封爵之例疏議曰別加邑號者犯罪一與男子封爵同除名者爵亦除免官以下竝從議請減贖之例留官收贖諸五品以上妾犯非十惡者流罪以下聽以贖論疏議曰五品以上之官是為通貴妾之犯罪不可配決若犯非十惡流罪以下聽用贖論其贖條內不合贖者亦不在贖限若妾自有子孫及取餘親蔭者假犯十惡聽依贖例諸一人兼有議請減各應得減者唯得以一高者減之不得纍減疏議曰假有一人身是皇后小功親合議減又父有三品之官合請減又身有七品官合例減此雖三處俱合減罪唯得以一議親高者減之不得纍減若從坐減自首減故失減公坐相承減又以議請減之類得纍減疏議曰從坐減者謂共犯罪造意者為首隨從者減一等自首減者謂犯法知人欲告而自首者聽減二等故失減者謂判官故出人罪放而還獲減一等通判之官不知情以失論失出減判官之罪五等又斷獄律云斷罪應決配之而聽收贖應收贖而決配之各減故失一等謂故減故一等失減失一等是名故失減公坐相承減者謂同職犯公坐假由判官斷罪失出法減五等放而還獲又減一等通判之官減七等長官減八等主典減九等若有議請減之類各又更減一等是名得纍減諸以理去官疏議曰謂不因犯罪而解者若致仕得替省員廢州縣之類應入議請減贖及蔭親屬者竝與見任同注解雖非理告身應留者亦同疏議曰解雖非理者謂責情及下考解官者或雖經當免降所不至者亦是告身應留者竝同見任官法贈官及視品官與正官同疏議曰贈官者死而加贈也令云養素丘園徴聘不赴子孫得以徴官為蔭竝同正官視品官依官品令薩寶府薩寶祆正等皆視流內品若以視品官當罪減贖皆與正官同注視六品以下不在蔭親之例疏議曰視品稍異正官故不許蔭其親屬其薩寶既視五品聽蔭親屬用蔭者存亡同疏議曰應取議請減蔭親屬者親雖死亡皆同存日故曰存亡同若藉尊長蔭而犯所蔭尊長疏議曰尊長謂祖父母父母伯叔父母姑兄姊是也及藉所親蔭而犯所親祖父母父母者竝不得為蔭疏議曰所親謂旁親非祖父母父母及子孫但旁蔭己身者尊長卑幼皆是假如藉伯叔母蔭而犯伯叔母之祖父母父母藉姪蔭而犯姪之父母之類竝不得以蔭論文稱犯夫及義絶者得以子蔭婦犯夫既得用子蔭明夫犯婦亦取子蔭可知其子孫例別生文不入所親之限即取子孫蔭者違犯父祖教令及供養有闕亦得以蔭贖論若取父蔭而犯祖者不得為蔭若犯父者得以祖蔭即毆告大功尊長小功尊屬者亦不得以蔭論疏議曰大功尊長小功尊屬不睦條中已具釋訖若其毆告亦不得蔭贖其婦人犯夫及義絶者得以子蔭疏議曰婦人犯夫及與夫家義絶并夫在被出竝得以子蔭者為母子無絶道故也其假版官犯流罪以下聽以贖論疏議曰假版授官不著令式事關恩澤不要耆年聽以贖論不以假版官當罪其準律不合贖者處徒以上版亦除削視六品以下不在蔭親之例雖出亦同諸無官犯罪有官事發流罪以下以贖論疏議曰無官犯罪有官事發流罪以下皆依贖法謂從流外及庶人而任流內者其除名及當免在身見無流內告身者亦同無官例其於贖章內合除免官當者亦聽收贖故云不以官當除免若犯十惡五流各依本犯除名及配流不用此條贖法故云不用此律問曰無官犯罪有官事發流罪以下以贖論雖稱以贖如有七品以上官合減以否答曰既稱流罪以下以贖論據贖條內不得減者此條亦不合減自餘雜犯應減者竝從減例據下文無蔭犯罪有蔭事發竝從官蔭之法故知得依減之例卑官犯罪遷官事發在官犯罪去官事發或事發去官犯公罪流以下各勿論餘罪論如律疏議曰卑官犯罪遷官事發者謂任九品時犯罪得八品以上事發之類在官犯罪去官事發者謂在任時犯罪去任後事發或事發去官者謂事發勾問未斷便即去職此等三事犯公罪流以下各勿論遷官者但改官者即是非獨進品始名遷官餘罪論如律者竝謂私罪及公坐死罪皆據律科雖復遷官去任竝不免罪問曰依令內外官敕令攝他司事者皆為檢校若比司即為攝判未審此等犯公坐去官免罪以否答曰律云在官犯罪去官事發或事發去官犯公罪流以下各勿論但檢校攝判之處即是監臨若有愆違罪無減降其有敕符差遣及比司攝判攝時既同正職停攝理是去官公坐流罪亦從免法若事關宿衛情狀重者録奏聽敕其寺丞縣尉之類本非別司而權判者不同去官之例諸司依令當直之官既非攝判之色不在去官之限其有官犯罪無官事發有蔭犯罪無蔭事發無蔭犯罪有蔭事發竝從官蔭之法疏議曰有官犯罪無官事發謂若有九品官犯流罪合除名其事未發又犯徒一年亦合除名斷一年徒以九品官當并除名訖其流罪後發以官當流比徒四年前已當徒一年猶有三年徒在聽從官蔭之律徴銅六十斤放免其官高應得議請減亦準此有蔭犯罪無蔭事發謂父祖有七品官時子孫犯罪父祖除名之後事發亦得依七品子聽贖其父祖或五品以上當時準蔭得議請減父祖除免之後事發亦依議請減法無蔭犯罪有蔭事發謂父祖無官時子孫犯罪父祖得七品官事發聽贖若得五品官子孫聽減得職事三品官聽請蔭更高聽議此等四事各得從寬故云竝從官蔭之法謂從流外及庶人而任流內者不以官當除免犯十惡及五流者不用此律諸犯私罪以官當徒者疏議曰私罪謂不緣公事私自犯者雖緣公事意涉阿曲亦同私罪對制詐不以實者對制雖緣公事方便不吐實情心挾隱欺故同私罪受請枉法之類者謂受入囑請屈法申情縱不得財亦為枉法此例既多故云之類也五品以上一官當徒二年九品以上一官當徒一年疏議曰九品以上官卑故一官當徒一年五品以上官貴故一官當徒二年若犯公罪者各加一年當疏議曰私曲相須公事與奪情無私曲雖違法式是為公坐各加一年當者五品以上一官當徒三年九品以上一官當徒二年問曰敕制施行而違者有公坐以否答曰譬如制敕施行不曉敕意而違者為失旨雖違敕意情不涉私亦皆為公坐以官當流者三流同比徒四年疏議曰品官犯流不合真配既須當贖所以比徒四年假有八品九品官犯私罪流皆以四官當之無四官者準徒年當贖故云三流同比徒四年其有二官疏議曰謂職事散官衛官計階等者既相因而得故同為一官其勳官從勳加授故別為一官是為二官若用官當徒者職事每階各為一官勳官即正從各為一官先以高者當疏議曰先以高者當謂職事等三官內取最高者當之若去官未敍者謂以理去任及雖不以理去任告身不追者亦同竝準上例先以高者當問曰律云若去官未敍亦準此或有去官未敍之人而有事發或罪應官當以上或不至官當別敕令解其官當敍法若為處分答曰若本罪官當以上別條云以理去官與見任同即依以官當徒之法用官不盡一年聽敍降先品一等若用官盡者三載聽敍降先品二等若犯罪未至官當不追告身敍法依考解例期年聽敍不降其品從見任解者敍法在獄官令先已去任本罪不至解官奉敕解者依刑部式敍限同考解例本犯應合官當者追毀告身次以勳官當疏議曰假有六品職事官兼帶勳官柱國以上犯私罪流例減一等合徒三年以六品職事當徒一年次以柱國當徒二年之類問曰假有人任三品四品職事又帶六品以下勳官犯罪應官當者用三品職事當訖次以何官當答曰律云先以高者當即是職事散官衛官中取最高品當訖次以勳官當即須用六品勳官當罪不得復用四品職事官當之行守者各以本品當仍各解見任疏議曰假有從五品下行正六品犯徒二年半私罪例減一等猶徒二年以本階從五品官當徒二年仍解六品見任其有六品散官守五品職事亦犯私罪徒二年半者亦用本品官當徒一年餘徒收贖解五品職事之類問曰先有正六品上散官上守職事五品或有從五品官下行正六品上犯徒當罪若為追毀告身答曰律云行守者各以本品當仍各解見任其正六品上散官守五品者五品所守別無告身既用六品官當即與守官俱奪若五品行六品者以五品當罪直解六品職事其應當罪告身同階者悉合追毀若有餘罪及更犯者聽以歷任之官當疏議曰若有餘罪者謂二官當罪之外仍有餘徒或當罪雖盡而更犯法未經科斷者聽以歷任降所不至告身以次當之其流內官而任流外職犯罪以流內官當及贖徒年者各解流外任疏議曰假有勳官任流外職者犯徒以上罪以勳官當之或犯徒用官不盡而贖一年徒以上者各解流外任犯罪以流內官當及贖徒年者私罪謂私自犯及對制詐不以實受請枉法之類公罪謂緣公事致罪而無私曲者謂職事官散官衛官同為一官勳官為一官若去官未敍亦準此歷任謂降所不至者諸犯十惡故殺人反逆緣坐疏議曰十惡謂謀反以下內亂以上者故殺人謂不因鬪競而故殺者謀殺人已殺訖亦同餘條稱以謀殺故殺論及云從謀殺故殺等殺訖者皆準此其部曲奴婢者非案賊盜律殺一家非死罪三人注云奴婢部曲非其故殺妾及舊部曲奴婢經放為良本條雖罪不至死亦同故殺之例反逆緣坐者謂緣謀反及大逆人得流罪以上者注本應緣坐老疾免者亦同疏議曰謂緣坐之中有男夫年八十及篤疾婦人年六十及廢疾雖免緣坐之罪身有官品者亦各除名問曰帶官應合緣坐其身先亡子孫後犯反逆亦合除名以否答曰緣坐之法惟據生存出養入道尚不緣坐無宜先死到遣除名理務弘通告身不合追毀告身雖不合追毀亦不得以為蔭獄成者雖會赦猶除名疏議曰犯十惡等罪獄成之後雖會大赦猶合除名獄若未成即從赦免注云贓狀露驗者贓謂所犯之贓見獲本物狀謂殺人之類得狀為驗雖在州縣竝名獄成及尚書省斷訖未奏者謂刑部覆斷訖雖未經奏者亦為獄成此是赦後除名常赦不免之例即監臨主守於所監守內犯姦盜略人若受財而枉法者亦除名獄成會赦者免所居官疏議曰監守內姦謂犯良人盜及枉法謂贓一匹者略人者不和為略年十歲以下雖和亦同略法律文但稱略人即不限將為良賎獄成者亦同上法除名會赦者免所居官此是赦後仍免所居之一官亦為常赦所不免問曰監守內略人罪當除名之色奴婢例非良人之限若監守內略部曲亦合除名以否答曰據殺一家非死罪三人乃入不道奴婢部曲不同良人之例強盜若傷財主部曲即同良人各於當條見義亦無一定之理今略良人及奴婢竝合除名舉略奴婢是輕計贓入除名之法略部曲是重明知亦合除名又鬪訟律云毆傷部曲減几人一等奴婢又減一等又令云轉易部曲事人聽量酬衣食之直既許酬衣食之直必得一匹以上準贓即同奴婢論罪又減良人今準諸條理例除名故為合理又問依律共盜者併贓論其有共受枉法之贓合併贓科罪否答曰枉法條中無併贓之語唯云官人受財復以所受之財分求餘官元受者併贓論餘各依己分法其有共謀受者不同元受之例不合併贓得罪各依己分為首從科之注會降者同免官法疏議曰降既節級減罪不合悉原故降除名之科聽從免官之法假令降罪悉盡亦依免官之例即降後重斷仍未奏畫更逢赦降猶合免所居之官其雜犯死罪即在禁身死若免死別配及背死逃亡者竝除名疏議曰其雜犯死罪謂非上文十惡故殺人反逆緣坐監守內姦盜略人受財枉法中死罪者即在禁身死者謂犯罪合死在禁身亡若免死別配者謂本犯死罪蒙恩別配流徒之類及背死逃亡者謂身犯死罪背禁逃亡者此等四色所犯獄成竝從除名之律故注云皆謂本犯合死而獄成者背死逃亡者即斷死除名依法奏畫不待身至其下文犯流徒獄成逃走亦準此會降者聽從當贖法疏議曰雜犯死罪以下未奏畫逢降有官者聽官當有蔭者依贖法本法不得蔭贖者亦不在贖限其會赦者依令解見任職事問曰文云十惡故殺人反逆緣坐會赦猶除名雜犯死罪等會降從當贖法若有別蒙敕放及會慮減罪得同赦降以否答曰若使普覃惠澤非涉殊私雨露平分自依恆典如有特奉鴻恩總蒙原放非常之斷人主專之爵命竝合如初不同赦降之限其有會慮減罪計與會降不殊當免之科須同降法慮若全免還從特放之例又問加役流以下五流犯者除名配流如法未知會赦及降若為處分答曰會赦猶流常赦所不免雖會赦降仍依前除名配流其不孝流反逆緣坐流雖會赦亦除名子孫犯過失流會赦免罪會降有官者聽依當贖法其加役流犯非一色入十惡者雖會赦降仍合除名稱以枉法論監守內以盜論者會赦免所居官會降同免官之法自餘雜犯會赦從原會降依當贖法凡斷罪之法應例減者先減後斷其五流先不合減者雖會降後亦不合減科本應緣坐老疾免者亦同獄成謂贓狀露驗及尚書省斷訖未奏者姦謂犯良人盜及枉法謂贓一匹者會降者同免官法皆謂本犯合死而獄成者故唐律疏議卷第三名例凡十二條諸犯姦盜略人及受財而不枉法疏議曰姦盜略人竝謂監臨外犯罪及受財而不枉法者謂雖即因事受財於法無曲竝謂斷徒以上者若犯流徒獄成逃走疏議曰犯流徒者謂非疑罪及過失此外犯流徒者獄成逃走謂減訖仍有徒刑若依令責保參對及合徒不禁亦同律既不注限曰推勘逃實即坐問曰免所居官之法依律比徒一年此條犯徒流逃走即獲免官之坐未知免所居官人逃亡亦入犯徒免官以否答曰免所居官之色亦有罪不至徒本罪若其合徒逃者即當免官之坐若犯杖罪逃走便異本犯徒流以其元是杖刑不入免官之法祖父母父母犯死罪被囚禁而作樂及婚娶者免官疏議曰曾高以下祖父母父母犯死罪見被囚禁其子孫若作樂者自作遣人作者竝同上條遣人與自作不殊此條理亦無別及婚娶者止據男夫娶妻不言嫁娶者明婦人不入此色自犯姦盜以下竝合免官注謂二官竝免爵及降所不至者聽留疏議曰二官為職事官散官衛官為一官勳官為一官此二官竝免三載之後降先品二等敍爵及降所不至者聽留爵者王及公侯伯子男降所不至者謂二等以外歷任之官是也若會降有餘罪者聽從官當減贖法謂竝斷徒以上謂二官竝免爵及降所不至者聽留諸府號官稱犯父祖名而冒榮居之疏議曰府號者謂省臺府寺之類官稱者謂尚書將軍卿監之類假有人父祖名常不得任太常之官父祖名卿亦不合任卿職若有受此任者是謂冒榮居之選司唯責三代官名若犯高祖名者非祖父母父母老疾無侍委親之官疏議曰老謂八十以上疾謂篤疾竝依令合侍若不侍委親之官者其有才業灼然要藉驅使者令帶官侍不拘此律問曰親老疾合侍今求選得官將親之任同委親之官以否又得官之後親始老疾不請解侍復合何罪答曰委親之官依法有罪既將之任理異委親及先已任官親後老疾不請解侍竝科違令之罪在父母喪生子及娶妾疏議曰在父母喪生子者皆謂二十七月內而懷胎者若父母未亡以前而懷胎雖於服內而生子者不坐縱除服以後始生但計胎月是服內而懷者依律得罪其娶妾亦準二十七月內為限兄弟別籍異財冒哀求仕疏議曰居喪未滿二十七月兄弟別籍異財其別籍異財不相須冒哀求仕謂父母喪禫制未除及在心喪內者竝合免所居之一官竝不合計閏若姦監臨內雜戶官戶部曲妻及婢者免所居官疏議曰雜戶者謂前代以來配隸諸司職掌課役不同百姓依令老免進丁受田依百姓例各於本司上下官戶者亦謂前代以來配隸相生或有今朝配沒州縣無貫唯屬本司部曲妻者通娶良人女為之及婢者官私婢亦同但在監臨之內姦者強和竝是從府號官稱以下犯者竝合免所居官注謂免所居之一官若兼帶勳官者免其職事疏議曰稱免所居官者職事散官衛官同階者總為一官若有數官先追高者若帶勳官免其職事如無職事即免勳官高者注即因冒榮遷任者竝追所冒告身疏議曰假有父祖名常冒任太常之職秩滿之後遷任高官事發論刑先免所居高品前得冒榮告身仍須追奪謂免所居之一官若兼帶勳官者免其職事即因冒榮遷任者竝追所冒告身諸除名者官爵悉除課役從本色疏議曰若犯除名者謂出身以來官爵悉除課役從本色者無蔭同庶人有蔭從蔭例故云各從本色又依令除名未敍人免役輸庸竝不在雜徭及征防之限六載之後聽敍依出身法疏議曰稱六載聽敍者年之與載異代別名假有元年犯罪至六年之後七年正月始有敍法其間雖有閏月但據載言之不以稱年要以三百六十曰為限一依出身法犯除名人年滿之後敍法依選舉令三品以上奏聞聽敕正四品於從七品下敍從四品於正八品上敍正五品於正八品下敍從五品於從八品上敍六品七品竝於從九品上敍八品九品竝於從九品下敍若有出身品高於此法者聽從高出身謂藉蔭及秀才明經之類準此令文出身高於常敍自依出身法出身卑於常敍自依常敍故云出身品高者聽從高又軍防令勳官犯除名限滿應敍者二品於驍騎尉敍三品於飛騎尉敍四品於雲騎尉敍五品以下於武騎尉敍若本犯不至免官而特除名者敍法同免官例疏議曰本犯不至免官者情在可責而特除名矜其所犯先輕故許同免官之例收敍問曰本犯雖非免官當徒用官竝盡依律當徒用官盡者敍限同免官未知當徒用官不盡今被特責除名殺法亦同免官以否答曰凡稱除名官當不論本犯輕重從例除免不計徒年罪不至免官而特除名者止論正犯免官之法當徒官盡不在其中注婦人因夫子得邑號犯除名者年滿之後夫子見在有官爵者聽依式敍疏議曰婦人因夫子而得邑號曰夫人郡君縣君鄉君等其身犯罪而得除名年滿敍曰計夫子見在有官爵仍合授夫人郡縣鄉君者竝依前授不降其品若夫子被降官者竝依降授法如夫子進官者聽依高敍其婦人敍法今備明文為因夫子官爵故不依降減之例問曰婦人不因夫子別加邑號犯除名者合敍以否答曰律云不因夫子別加邑號者同封爵之例爵無常敍之法除名不合更敍免官者三載之後降先品二等敍疏議曰稱載者理與六載義同亦止取三載之後入四年聽敍降先品二等正四品以下一階為一等從三品以上及勳官正從各為一等假有正四品上免官三載之後得從四品上敍上柱國免官三載之後從上護軍敍是為三載之後降先品二等敍免所居官及官當者期年之後降先品一等敍疏議曰免所居官及官當罪又輕故至期年聽敍稱期者匝四時曰期從敕出解官曰至來年滿三百六十日也稱年者以三百六十日稱載者取其三載六載之後不計日月若本犯不至免所居官及官當而特免官者敍法同免所居官疏議曰本犯不至免所居官者謂非府號官稱犯父祖名以下等罪本犯不至官當者謂九品以上犯私罪不至一年徒公罪不至二年徒五品以上犯私罪不至二年徒公罪不至三年徒特敕免官者敍法一同免所居官期年降先品一等敍故云敍法同免所居官其免官者若有二官各聽依所降品敍疏議曰二官謂職事等帶勳官前已釋訖若犯免官職事勳官竝免假從正六品上職事免官降至從六品上敍又帶上柱國亦免從上護軍敍此是各聽依所降品敍故注云若勳官降一等者從上柱國削授柱國降二等者削授上護軍之類即降品卑於武騎尉者聽從武騎尉敍即免官免所居官及官當斷訖更犯餘有歷任官者各依當免法疏議曰假有人犯免官及免所居官或以官當徒各用一官二官當免訖更犯徒流或犯免官免所居官官當餘有歷任之官告身在者各依上法當免未斷更犯通以降所不至者當之注兼有二官者先以高者當疏議曰此既重犯之人明非見任職事若有勳官職事二官先以高者當假有前任六品職事及五品勳官先以勳官當若當罪不盡亦以次高者當不限勳官職事仍纍降之所降雖多各不得過四等疏議曰假有前犯免官已降二等又犯免官或當徒官盡亦降二等故云仍纍降之即雖斷訖更犯經三度以上敍日止依此律再降四等法其免所居官及當徒用官不盡斷訖更犯後敍各降一等及至四度重犯總降四等後犯雖多止以四等為限或頻犯免官訖少又再犯免所居官者亦各計所犯降四等敍之故云所降雖多各不得過四等注各謂二官各降不在通計之限疏議曰職事散官衛官為一官所降不得過四等勳官為一官所降亦不得過四等此二官犯者各降四等為法不在通計之限若官盡未敍更犯流以下罪者聽以贖論疏議曰謂用官當免竝盡未到敍日更犯流罪以下者聽以贖論以其年限未充必有敍法故免決配聽依贖論本犯不合贖者亦不得贖問曰此條內有毆告大功尊長小功尊屬者合以贖論否答曰上條毆告大功尊長小功尊屬不得以贖論今此自身官盡聽以贖論即非用蔭之色聽同贖法注敍限各從後犯計年疏議曰犯免官及免所居官未敍更犯免官及免所居官官當者各依後犯計年聽敍官盡更犯聽依贖法若犯當免官更三載之後聽敍免所居官者更期年之後聽敍其犯徒流不合贖而真配者流即依令六載徒則役滿敍之雖役滿仍在免官限內者依免官敍例不在課役之限雖有歷任之官不得預朝參之例疏議曰不在課役者謂有敍限故免其課役雖有歷任之官者假有一品職事犯當免官仍有歷任二品以下官未敍之間不得預朝參之例其免所居官及以官當徒限內未敍者亦準此婦人因夫子得邑號犯除名者年滿之後夫子見在有官爵者聽依式敍若勳官降一等從上柱國削授柱國降二等者削授上護軍之類即降品卑於武騎尉者聽從武騎尉敍兼有二官者先以高者當各謂二官各降不在通計之限殺限各從後犯計年諸以官當徒者罪輕不盡其官留官收贖官少不盡其罪餘罪收贖疏議曰假有五品以上官犯私坐徒二年例減一等即是罪輕不盡其官留官收贖官少不盡其罪者假有八品官犯私坐一年半徒以官當徒一年餘罪半年收贖之類其犯除免者罪雖輕從例除免疏議曰假有五品以上職事及帶勳官於監臨內盜絹一匹本坐合杖八十仍須準例除名或受財六匹一尺而不枉法本坐徒一年半亦準例免官或姦監臨內婢合杖九十亦準例免所居官罪若重仍依當贖法疏議曰凡是除名免官本罪雖輕從例除免罪重者各準所犯準當流徒及贖法假有職事正七品上復有歷任從七品下犯除名流不合例減者以流比徒四年以正七品上一官當徒一年又以從七品下一官當徒一年更無歷任及勳官即徴銅四十斤贖二年徒坐仍準例除名若罪當免官者亦準此當贖法仍依例免官此名罪若重仍依當贖法其除爵者雖有餘罪不贖疏議曰爵者既得傳授子孫所以義同帶礪今並除削在責已深為其國除故有殘罪不贖諸除名者比徒三年免官者比徒二年免所居官者比徒一年流外官不用此律疏議曰除名免官免所居官罪有差降故量輕重節級比徒流外之職品秩卑微誣告反坐與白丁無異故云不用此律注謂以輕罪誣人及出入之類故制此比疏議曰假有人告五品以上官監臨主守內盜絹一匹若事實盜者合杖八十仍合除名若虛誣告人不可止得杖罪故反坐比徒三年免官者謂告五品於監臨外盜絹五匹科徒一年仍合免官若虛反坐不可止科徒一年故比徒二年免所居官者謂告監臨內姦婢合杖九十姦者合免所居官若虛反坐不可止得杖罪故比徒一年及出入之類者謂不盜監臨內物官人枉判作盜所監臨或實盜監臨官人判作不盜即是官司出入除名比徒三年若出入免官者比徒二年出入免所居官比徒一年之法其藏匿罪人若過致資給或為保證及故縱等有除免者皆從比徒之例故云之類注若所枉重者自從重疏議曰謂誣告及出入之罪重於比徒之法者自從反坐等重法科之不復仍準比徒之法若誣告道士女官應還俗者比徒一年其應苦使者十日比笞十官司出入者罪亦如之疏議曰依格道士等輒著俗服者還俗假有人告道士等輒著俗服若實並須還俗既虛反坐比徒一年其應苦使者十日比笞十依格道士等有歷門教化者百日苦使若實不教化枉被誣告反坐者誣告苦使十日比笞十百日杖一百官司出入者謂應斷還俗及苦使官司判放或不應還俗及苦使官司枉入各依此反坐徒杖之法故云亦如之失者各從本法謂以輕罪誣人及出入之類故制此比若所枉重者自從重諸犯流應配者三流俱役一年疏議曰犯流若非官當收贖老疾之色即是應配之人三流遠近雖別俱役一年為例加役流者本法既重與常流理別故流三千里居役三年注役滿及會赦免役者即於配處從戶口例疏議曰役滿一年及三年或未滿會赦即於配所從戶口例課役同百姓應選者須滿六年故令云流人至配所六載以後聽仕反逆緣坐流及因反逆免死配流不在此例即本犯不應流而特配流者三載以後亦聽仕妻妾從之疏議曰妻妾見已成者並合從夫依令犯流斷定不得棄放妻妾問曰妻有七出及義絶之狀合放以否答曰犯七出者夫若不放於夫無罪若犯流聽放即假僞者多依令不放於理為允犯義絶者官遣離之違法不離合得徒罪義絶者離之七出者不放父祖子孫欲隨者聽之疏議曰曾高以下及玄孫以上欲隨流人去者聽之移鄉人家口亦準此疏議曰移鄉人妻妾隨之父祖子孫欲隨者聽不得棄放妻妾皆準流人故云亦故準此若流移入身喪家口雖經附籍三年內願還者放還疏議曰籍謂三年一造申送尚書省流人若到配所三年必經造籍故云雖經附籍三年內聽還既稱願還即不願還者聽住即造畜蠱毒家口不在聽還之例疏議曰依本條造畜蠱毒并同居家口雖會赦猶流況此已至配所故云不在聽還之例注下條準此疏議曰謂下條云流人逃者身死所隨家口仍準上法聽還上有下條準此之語下有準上法之文家口合還及不合還一準上條之義本條稱加役流者流三千里役三年役滿及會赦免者即於配處從戶口例下條準此諸流配人在道會赦計行程過限者不得以赦原疏議曰行程依令馬日七十里驢及步人五十里車三十里其水程江河餘水沿泝程各不同但車馬及步人同行遲速不等者並從遲者為限注謂從上道日總計行程有違者疏議曰假有配流二千里準步程合四十日若未滿四十日會赦不問已行遠近並從赦原從上道日總計行程有違者即不在赦限有故者不用此律疏議曰故謂病患死亡及請糧之類準令臨時應給假者及前有阻難不可得行聽除假故不入程限故云不用此律若程內至配所者亦從赦原疏議曰假有人流二千里合四十日程四十日限前已至配所而遇恩赦者亦免逃亡者雖在程內亦不在免限即逃者身死所隨家口仍準上法聽還疏議曰行程之內逃亡雖遇恩赦不合放免即逃者身死所隨家口雖已附籍三年內願還者準上法聽還謂從上道日總計行程有違者諸犯死罪非十惡而祖父母父母老疾應侍家無期親成丁者上請疏議曰謂非謀反以下內亂以上死罪而祖父母父母通曾高祖以來年八十以上及篤疾據令應侍戶內無期親年二十一以上五十九以下者皆申刑部具狀上請聽敕處分若敕許充侍家有期親進丁及親終更奏如元奉進止者不奏家無期親成丁者律意屬在老疾人期親其曾高於曾玄非期親縱有亦合上請若有曾玄數人其中有一人犯死罪則不上請犯流罪者權留養親疏議曰犯流罪者雖是五流及十惡亦得權留養親會赦猶流者不在權留之例其權留者省司判聽不須上請不在赦例疏議曰權留養親動經多載雖遇恩赦不在赦限依令流人季別一遣同季流人若未上道而會赦者得從赦原課調依舊疏議曰侍丁依令免役唯輸調及租為其充侍未流故云課調依舊問曰死罪囚家無期親上請敕許充侍若逢恩赦合免死以否答曰權留養親不在赦例既無各字止為流人但死罪上請敕許留侍經赦之後理無殺法況律無不免之制即是會赦合原又斷死之徒例無輸課雖得留侍課不合徴免課霑恩理用為允又問死罪是重流罪是輕流罪養親逢赦不免死罪留侍却得會恩則死刑何得從寬流坐乃翻為急輕重不類義有惑焉答曰死罪上請唯聽敕裁流罪侍親準律合住合住者須依常例敕裁者已沐殊恩豈將恩許之人比同曹判之色以此甄異非為重輕若家有進丁及親終期年者則從流計程會赦者依常例疏議曰本為家無成丁故許留侍若家有期親進丁及親終已經期年者並從流配之法計程會赦者一準流人常例即至配所應侍合居作者亦聽親終期年然後居作疏議曰流人至配所親老疾應侍者並依侍法合居作者亦聽親終期年然後居作問曰犯死罪聽侍流人權留養親中間各犯死罪以下若為科斷答曰依下文犯罪已發及已配而更為罪者各重其事若死囚重犯死罪亦同犯流加杖法若本坐是絞重犯斬刑即須改斷從斬準前更犯絞者亦依加杖例若依前應侍仍更重請若犯流徒者各準流徒之法杖罪以下依數決之流人聽侍者犯死罪上請若犯流依留住法加杖侍親終於配所纍役犯徒應役亦準此應蔭贖者各依本法謂非會赦猶流者仍準同季流人未上道限內會赦者從赦原諸犯徒應役而家無兼丁者疏議曰應役者謂非應收贖之人法合役身而家無兼丁者謂戶內全無兼丁妻同兼丁婦女雖復非丁據禮與夫齊體故年二十一以上同兼丁之限其婦人犯徒戶內無男夫年二十一以上亦同無兼丁例言以上者謂五十九以下其殘疾既免丁役亦非兼丁之限問曰家內雖有二丁俱犯徒坐或一人先從征防或任官或逃走及被禁並同兼丁以否答曰家無兼丁免徒加杖者矜其糧餉乏絶又恐家內困窮一家二丁俱在徒役理同無丁之法便須決放一人征防之徒遠從戍役及犯徒罪以上獄成在禁同無兼丁之例據理亦是弘通居官之人雖非丁色身既見居榮祿不可同無兼丁若兼丁逃走在未發之前既不預知得同無兼丁之限如家人犯徒事發後兼丁然始逃亡若其許同無丁便是長其姦詐即同有丁之限依法役身又問二人俱徒許決放一人若三人俱犯徒坐家內更無兼丁若為決放答曰律稱家無兼丁本謂全無丁者三人決放一人即是家有丁在足堪糧餉不可更放一人若一家四人徒役決放二人其徒有年月及尊卑不等者先從見應役日少者決放役日若停即決放尊長其夫妻並徒更無兼丁者決放其婦徒一年加杖一百二十不居作一等加二十疏議曰徒一年加杖一百二十一等加二十即是半年徒加杖二十不居作既已加杖故免居作流至配所應役者謂流人應合居役家無兼丁應加杖者亦準此若徒年限內無兼丁者總計應役日及應加杖數準折決放疏議曰徒限未滿兼丁死亡或入老疾或犯罪征防見無兼丁者若犯徒一年三百六十日合杖一百二十即三十日當杖十若犯一年半徒五百四十日合杖一百四十即是三十八日當杖十若犯二年徒七百二十日合杖一百六十即是四十五日當杖十若犯二年半徒九百日合杖一百八十即五十日當杖十若犯三年徒一千八十日合杖二百即五十四日當杖十若犯三年半徒一千二百六十日亦合杖二百即六十三日當杖十若犯四年徒一千四百四十日亦合杖二百即七十二日當杖十其役日未盡不滿杖十者律云加者數滿乃坐既不滿十據理放之盜及傷人者不用此律疏議曰盜及傷人徒以上並合配徒不入加杖之例諸條稱以盜論及以故殺傷論以鬪殺傷論者各同真盜及真殺傷人之法親老疾合侍者謂有祖父母父母年八十以上及篤疾合侍家無兼丁者雖犯盜及傷人仍依前加杖之法妻年二十一以上同兼丁之限婦女家無男夫兼丁者亦同流至配所應役者亦如之親老疾合侍者仍從加杖之法諸工樂雜戶及太常音聲人疏議曰工樂者工屬少府樂屬太常並不貫州縣雜戶者散屬諸司上下前已釋訖太常音聲人謂在太常作樂者元與工樂不殊俱是配隸之色不屬州縣唯屬太常義寧以來得於州縣附貫依舊太常上下別名太常音聲人犯流者二千里決杖一百一等加三十留住俱役三年疏議曰此等不同百姓職掌唯在太常少府等諸司故犯流者不同常人例配合流二千里者決杖一百二千五百里者決杖一百三十三千里者決杖一百六十俱留住役三年犯加役流者役四年名例云纍徒流應役者不得過四年故三年徒上止加一年以充四年之例若是賎人自依官戶及奴法若習業已成能專其事及習天文并給使散使各加杖二百疏議曰工樂及太常音聲人皆取在本司習業依法各有程試所習之業已成又能專執其事及習天文業者謂在太史局天文觀生及天文生以其執掌天文依令諸州有閹人並送官配內侍省及束官內坊名為給使諸王以下為散使多本是良人以其宮闈驅使并習業已成天文生等犯流罪並不遠配各加杖二百犯徒者準無兼丁例加杖還依本色疏議曰工樂及太常音聲人習業已成能專其事及習天文并給使散使犯徒者皆不配役準無兼丁例加杖若習業未成依式配役如元是官戶及奴者各依本法還依本色者工樂還掌本業雜戶太常音聲人還上本司習天文生還歸本局給使散使各送本所故云還依本色其有官蔭仍依本法當贖若以流內官當徒及解流外任亦同前還本色敍限各依常法其婦人犯流者亦留住疏議曰婦人之法例不獨流故犯流不配留住決杖居作造畜蠱毒所在不容擯之荒服絶其根本故雖婦人亦須投竄縱令嫁向中華事發還從配遣並依流配之法三流俱役一年縱使遇恩不合原免婦人教令造畜者只得教令之坐不同身自造畜自依常犯科罪流二千里決杖六十一等加二十俱役三年疏議曰婦人流二千里決杖六十流二千五百里決杖八十流三千里決杖一百三流俱役三年若加役流亦決杖一百即是役四年既決杖之文在上明須先決後役若夫子犯流配者聽隨之至配所免居作疏議曰婦人元不合配以夫子流故所以聽隨矜其本法無流所以得免居作從流無杖不在決例其有夫子在路身死婦人不合從流既得却還不復更令居作問曰婦人先犯流刑在身乃有官蔭夫子犯流既聽隨去未知官蔭合用以否答曰律唯言至配所免居作役既許免更無罪名若犯十惡五流者各依除名之律若別犯流以下罪聽從官當減贖法又問注云造畜蠱毒婦女應流者配流如法未知此注唯屬婦人唯復總及工樂以否答曰案賊盜律造畜蠱毒者雖會赦不免同居不知情亦流但是諸條犯流加杖配徒之色若有蠱毒並須配遣故於工樂等留住下立例注云造畜蠱毒應流者配流如法斯乃工樂以下總攝不獨為婦人生文犯加役流者役四年造畜蠱毒應流者配流如法故唐律疏議卷第四名例凡八條諸犯罪已發及已配而更為罪者各重其事疏議曰已發者謂已被告言其依令應三審者初告亦是發訖及已配者謂犯徒已配而更為笞罪以上者各重其後犯之事而纍科之即重犯流者依留住法決杖於配所役三年疏議曰犯流未斷或已斷配訖未至配所而更犯流者依工樂留住法流二千里決杖一百流二千五百里決杖一百三十流三千里決杖一百六十仍各於配所役三年通前犯流應役一年總役四年若前犯常流後犯加役流者亦止總役四年若已至配所而更犯者亦準此疏議曰已至配流之處而更犯流者亦準上解留住法決杖配役其前犯處近後犯處遠即於前配所科決不復更配遠流即纍流徒應役者不得過四年若更犯流徒罪者準加杖例疏議曰有犯徒役未滿更犯流役流役未滿更犯徒役或徒流役內復犯徒流應役身者並不得過四年假有元犯加役流後又犯加役流前後纍徒雖多役以四年為限若役未訖更犯流徒罪者準加杖例犯罪雖多纍決杖笞者亦不得過二百問曰有人重犯流罪依留住法決杖於配所役三年未知此三年之役家無兼丁合準無兼丁例決杖以否答曰流人雖無兼丁而無加杖之例三年之役本替流罪雖無兼丁不合加杖唯有元犯之流至配所應役者家無兼丁得準徒加杖其杖罪以下亦各依數決之纍決笞杖者不得過二百其應加杖者亦如之疏議曰纍流徒應役四年限內復犯杖笞者亦依所犯杖笞數決或初犯杖一百中間又犯杖九十後又犯笞五十前後雖有二百四十決之不得過二百其犯徒應加杖者亦如之假如工樂雜戶官私奴婢等並合加杖縱令重犯流徒纍決杖笞亦不得過二百諸年七十以上十五以下及廢疾犯流罪以下收贖疏議曰依周禮年七十以上及未齓者並不為奴今律年七十以上七十九以下十五以下十一以上及廢疾為矜老小及疾故流罪以下收贖問曰上條贖章稱犯流罪以下聽贖此條及官當條即言收贖未知聽之與收有何差異答曰上條犯十惡等有不聽贖處復有得贖之處故云聽贖其當徒官少不盡其罪餘罪收贖及矜老小廢疾雖犯十惡皆許收贖此是隨文設語更無別例注犯加役流反逆緣坐流會赦猶流者不用此律至配所免居作疏議曰加役流者本是死刑元無贖例故不許贖反逆緣坐流者逆人至親義同休戚處以緣坐重纍其心此雖老疾亦不許贖會赦猶流者為害深重雖會大恩猶從流配此等三流特重常法故總不許收贖至配所免居作者矜其老小不堪役身故免居作其婦人流法與男子不同雖是老小犯加役流亦合收贖徴銅一百斤反逆緣坐流依賊盜律婦人年六十及廢疾並免不入此流即雖謀反詞理不能動衆威力不足率人者亦皆斬父子母女妻妾並流三千里其女及妻妾年十五以下六十以上亦免流配徴銅一百斤婦人犯會赦猶流唯造畜蠱毒并同居家口仍配八十以上十歲以下及篤疾犯反逆殺人應死者上請疏議曰周禮三赦之法一曰幼弱二曰老耄三曰戇愚今十歲合於幼弱八十是為老耄篤疾戇愚之類並合三赦之法有不可赦者年雖老小情狀難原故反逆及殺人準律應合死者曹司不斷依上請之式奏聽敕裁盜及傷人者亦收贖疏議曰盜者雖是老小及篤疾並為意在貪財傷人者老小疾人未離忿恨此等二事既侵損於人故不許全免令其收贖若有官爵者須從官當除免之法不得留官徴贖謂毆從父兄姊傷合除名盜五匹以上合免官毆凡人折支合官當之類問曰既云盜及傷人亦收贖若或強盜合死或傷五服內親亦合死刑未知並得贖否答曰盜及傷人亦收贖但盜既不言強竊傷人不顯親疏直云收贖不論輕重為其老小特被哀矜設令強盜傷親合死據文並許收贖又問既稱傷人收贖即似不傷者無罪若有毆殺他人部曲奴婢及毆己父母不傷若為科斷答曰奴婢賎隸唯於被盜之家稱人自外諸條殺傷不同良人之限若老小篤疾律許哀矜雜犯死刑並不科罪傷人及盜俱入贖刑例云殺一家三人為不道注云殺部曲奴婢者非即驗奴婢不同良人之限唯因盜傷殺亦與良人同其應出罪者舉重以明輕雜犯死刑尚不論罪殺傷部曲奴婢明亦不論其毆父母雖小及疾可矜敢毆者乃為惡逆或愚癡而犯或情惡故為於律雖得勿論準禮仍為不孝老小重疾上請聽裁又問八十以上十歲以下盜及傷人亦收贖注云有官爵者各從除免當贖法未知本罪至死仍得以官當贖以否答曰條有收贖之文注設除免之法止為矜其老疾非謂故輕其罪但雜犯死罪例不當贖雖有官爵並合除名既死無比徒之文官有當徒之例明其除免當法止據流罪以下若欲以官折死便是律外生文自須依法除名死依贖例餘皆勿論疏議曰除反逆殺人應死盜及傷人之外悉皆不坐故云餘皆勿論九十以上七歲以下雖有死罪不加刑疏議曰禮云九十曰耄七歲日悼悼與耄雖有死罪不加刑愛幼養老之義也緣坐應配沒者謂父祖反逆罪狀已成子孫七歲以下仍合配沒故云不用此律即有人教令坐其教令者若有贓應備受贓者備之疏議曰悼耄之人皆少智力若有教令之者唯坐教令之人或所盜財物旁人受而將用既合備償受用者備之若老小自用還徴老小故云有贓應備受贓者備之問曰悼耄者被人教令唯坐教令之者未知所教令罪亦有色目以否答曰但是教令作罪皆以所犯之罪坐所教令或教七歲小兒毆打父母或教九十耄者斫殺子孫所教令者各同自毆打及殺凡人之罪不得以犯親之罪加於凡人犯加役流反逆緣坐流會赦猶流者不用此律至配所免居作有官爵者各從官當除免法緣坐應配沒者不用此律諸犯罪時雖未老疾而事發時老疾者依老疾論疏議曰假有六十九以下犯罪年七十事發或無疾時犯罪廢疾後事發並依上解收贖之法七十九以下犯反逆殺人應死八十事發或廢疾時犯罪篤疾時事發得入上請之條八十九犯死罪九十事發並入勿論之色故云依老疾論問曰律云犯罪時雖未老疾而事發時老疾者依老疾論事發以後未斷決然始老疾者若為科斷答曰律以老疾不堪受刑故節級優異七十衰老不能徒役聽以贖論雖發在六十九時至年七十始斷衰老是一不可仍遣役身此是役徒內老疾依老疾論假有七十九犯加役流事發至八十始斷止得依老免罪不可仍配徒流又依獄官令犯罪逢格改者若格輕聽從輕依律及令務從輕法至於老疾者豈得配流八十之人事發與斷相連者例從輕典斷依發時之法唯有疾人與老者理別多有事發之後始作疾狀臨時科斷須究本情若未發時已患至斷時成疾者得同疾法若事發時無疾斷日加疾推有故作須依犯時實患者聽依疾例若在徒年限內老疾亦如之疏議曰假有六十九以下配徒役或二年三年役限未滿年入七十又有配役時無疾役限內成廢疾並聽準上法收贖故云在徒限內老疾亦如之又計徒一年三百六十日應贖者徴銅二十斤即是一斤銅折役一十八日計餘役不滿十八日徴銅不滿一斤數既不滿並宜免放犯罪時幼小事發時長大依幼小論疏議曰假有七歲犯死罪八歲事發死罪不論十歲殺人十一事發仍得上請十五時偷盜十六事發仍以贖論此名幼小時犯罪長大事發依幼小論諸彼此俱罪之贓疏議曰受財枉法不枉法及受所監臨財物并坐贓依法與財者亦各得罪此名彼此俱罪之贓謂計贓為罪者及犯禁之物則沒官疏議曰謂甲弩矛矟旌旗幡幟及禁書寶印之類私家不應有者是名犯禁之物彼此俱罪之贓以下並沒官注若盜人所盜之物倍贓亦沒官疏議曰假有乙盜甲物丙轉盜之彼此各有倍贓依法並應還主甲既取乙倍備不合更得丙贓乙即元是盜人不可以贓資盜故倍贓亦沒官若有糾告之人應賞者依令與賞問曰私鑄錢事發所獲作具及錢銅或違法殺馬牛等肉如此之類律令無文未知合沒官以否答曰其肉及錢私家合有準如律令不合沒官作具及錢不得仍用毀訖付主罪依法科其鑄錢見有別格從格斷餘條有別格見行破律者並準此取與不和疏議曰取與不和謂恐喝詐欺強市有剩利強率斂之類雖和與者無罪謂去官而受舊官屬士庶饋與或和率斂或監臨官司和市有剩利或雇人而告他罪得實但是不應取財而與者無罪皆是若乞索之贓並還主疏議曰強乞索和乞索得罪雖殊贓合還主稱並者從取與不和以下並徴還主即簿斂之物赦書到後罪雖決訖未入官司者並從赦原疏議曰簿斂之物謂謀反大逆人家資合沒官者赦書到後罪人雖已決訖其物未入官司者並從赦原若簿斂之物已入所在官司守掌者並不合放免若罪未處決物雖送官未經分配者猶為未入疏議曰若反逆之罪仍未處決罪人雖已斷訖其身尚存者物雖送官但未經分配者並從赦原即緣坐家口雖已配沒罪人得免者亦免疏議曰謂反逆人家口合緣坐沒官罪人於後蒙恩得免緣坐者雖已配沒亦從放免其奴婢同於資財不從緣坐免法問曰但是緣坐遇恩罪人得免其有罪人不合免者緣坐亦有免法以否答曰謀反大逆罪極誅夷汚其室宅除惡務本罪人既不會赦緣坐亦不合原去取之宜皆隨罪人為法其謀叛已上道及殺一家非死罪三人支解人緣坐雖及家口其惡不同反逆又律文特顯反逆緣坐為與十惡同科不得請減及贖自同五流除名配流如法自餘緣坐流並得減贖不除名雖云合流得減贖者明即與反逆緣坐不同赦書若十惡不原非反逆緣坐人仍從恩免以其身非十惡又非反逆之家故也謂計贓為罪者若盜人所盜之物倍贓亦沒官雖和與者無罪諸以贓入罪正贓見在者還官主疏議曰在律正贓唯有六色強盜竊盜枉法不枉法受所監臨及坐贓自外諸條皆約此六贓為罪但以此贓而入罪者正贓見在未費用者官物還官私物還主轉易得他物者謂本贓是驢回易得馬之類及生産蕃息者謂婢産子馬生駒之類問曰假有盜得他人財物即將興易及出舉別有息利得同蕃息以否其贓本是人畜展轉經歷數家或有知情及不知者如此蕃息若為處分答曰律注云生産蕃息本據應産之類而有蕃息若是興生出舉而得利潤皆用後人之功本無財主之力既非孳生之物不同蕃息之限所得利物合入後人其有展轉而得知情者蕃息物並還前主不知情者亦入後人又問有人知是贓婢故買自幸因而生子合入何人答曰知是贓婢本來不合交關違法故買意在姦僞贓婢所産不合從良止是生産蕃息依律隨母還主已費用者死及配流勿徴疏議曰因贓斷死及以贓配流得罪既重多破家業贓已費用矜其流死其贓不徴若未經奏畫會赦免流死者徴贓如法畫訖會恩即同免例注云別犯流及身死者謂雖不因贓配流別為他罪流配及雖非身被刑戮而別有死亡者本犯之贓費用已盡亦從免例餘皆徴之疏議曰除非身死及已配流其贓見在并已費用並在徴限故曰餘皆徴之盜者倍備謂盜者以其貪財既重故令倍備謂盜一尺徴二尺之類若計庸賃為贓者亦勿徴疏議曰庸謂私役使所監臨及借車馬之屬計庸一日為絹三尺以受所監臨財物論賃謂碾磑邸店舟船之類須計賃價為坐既計庸賃為贓其贓元非正物故雖非會赦其贓並亦不徴餘條庸賃皆準此會赦及降者盜詐枉法猶徴正贓疏議曰謂會赦及降唯盜詐枉法三色正贓猶徴各還官主盜者免倍贓故云猶徴正贓謂赦前事發者若赦後事發捉獲見贓準鬪訟律徴之問曰枉法會赦正贓猶徴未知此贓還官還主須定明例答曰彼此俱罪之贓例並合沒雖復首得原罪正贓猶徴如法其贓追沒於法何疑餘贓非見在及收贖之物限內未送者並從赦降原疏議曰餘贓非見在赦前已費用盡若非轉易得他物及生産蕃息者皆非見在之贓及收贖之物者謂犯罪徴銅依令節級各依期限限內未送並從赦降原過限不送不在免限稱限內不送唯據贖銅餘贓舊無限約逢赦並皆放免其犯罪應贖徴銅送有期限違限不納會赦不原故云限內未送者唯為贖銅生文不為餘贓立制問曰收贖之人身在外處雖對面斷罪又牒本貫徴銅未知以牒到本屬為期即據斷日作限答曰依令任官應免課役皆據蠲符到日為限其徴銅之人雖對面斷訖或有一身被禁所屬在遠雖被釋放無銅可輸符下本屬徴收須據符到徴日為限若取對面為定何煩更牒本屬轉易得他物及生産蕃息皆為見在別犯流及身死者亦同盜者倍備諸平贓者皆據犯處當時物價及上絹估疏議曰贓謂罪人所取之贓皆平其價直準犯處當時上絹之價依令每月旬別三等估其贓平所犯旬估定罪取所犯旬上絹之價假有人蒲州盜鹽嶲州事發鹽已費用依令懸平即取蒲州中估之鹽準蒲州上絹之價於嶲州斷決之類縱有賣買貴賎與估不同亦依估價為定問曰贓若見在犯處可以將贓對平如其先已費損懸平若為準定又有獲贓之所與犯處不同或遠或近並合送平以否答曰懸平之贓依令準中估其獲贓去犯處遠者止合懸平若運向犯處準估其物即須腳價生産之類恐加瘦損非但姦僞斯起人糧所出無從同遣懸平理便適中又問在蕃有犯斷在中華或邊州犯贓當處無估平贓定罪從何取中答曰外蕃既是殊俗不可牒彼平估唯於近蕃州縣準估量用合宜無估之所而有犯者於州府詳定作價平功庸者計一人一日為絹三尺牛馬駝騾驢車亦同疏議曰計功作庸應得罪者計一人一日為絹三尺牛馬駝騾驢車計庸皆準此三尺故云亦同其船及碾磑邸店之類亦依犯時賃直疏議曰自船以下或大小不同或間要有異故依當時賃直不可準常賃為估邸店者居物之處為邸沽賣之所為店稱之類者鋪肆園宅品目至多略舉宏綱不可備載故言之類庸賃雖多各不得過其本價疏議曰假有借驢一頭乘經百日計庸得絹七匹二丈驢估止直五匹此則庸多仍依五匹為罪自餘庸賃雖多各準此法諸略和誘人若和同相賣疏議曰不和為略前已解訖和誘者謂彼此和同共相誘引或使為良或使為賎限外蔽匿俱入此條輕重之制自從本法若和同相賣者謂兩相和同共知違法及略和誘部曲奴婢若嫁賣之即知情娶買疏議曰上文皆據良人此論部曲客女奴婢等略和誘義並與上同或得而自留或轉將嫁賣或乞人亦同其知情娶買者謂從略和誘以下不問良賎共知本情或娶或買限外不首亦為蔽匿及藏逃亡部曲奴婢疏議曰藏匿無日限謂知是部曲奴婢逃走故將藏匿者署置官過限及不應置而置疏議曰在令置官各有員數員外剩置是名過限案職制律官有員數而署置過限及不應置而置注云謂非奏授者在此雖有奏授亦同蔽匿於格令無員而置是名不應置而置詐假官假與人官及受假者疏議曰詐假官者身實無官假為職任流內流外得罪雖別詐假之義並同或自造告身或雇倩人作或得他人告身而自行用但於身不合為官詐將告身行用皆是其假與人官者謂所司假授人官或僞奏擬或假作曹司判補及受假者謂知假而受之若詐死私有禁物疏議曰詐死者或本心避罪或規免賦役或因犯逃亡而遂詐死之類私有禁物者注云謂非私所應有者謂甲弩矛矟之類及禁書謂天文圖書兵書七曜曆等是名禁書稱之類者謂玄象器物等既不是書故云之類赦書到後百日見在不首故蔽匿者復罪如初媒保不坐疏議曰赦書原罪皆據制書出日昧爽以前並從赦免惟此蔽匿條中乃云赦書到後百日此據赦書所至之處別取百日為限見在不首故蔽匿者謂人物及所假官等見在故蔽匿隱藏而不首出並復罪如初初者謂如犯罪之初贓物應徴及倍悉從初犯本法若人有轉易在他所但其人見在不首皆為故蔽匿其媒保不坐者謂嫁娶有媒賣買有保既經赦原無問百日內外雖不自首並皆不坐其限內事發雖不自首非蔽匿疏議曰從略和誘以下私有禁物以上謂赦書到後事發之所百日內發者雖不自首亦非蔽匿以其限尚未充故得無罪注雖限內但經問不臣者亦為蔽匿疏議曰上云限內事發雖不自首非蔽匿謂限內事發經問即臣為無隱心乃非蔽匿其經問不臣雖在限內仍同蔽匿之法即有程期者計赦後日為坐疏議曰程者依令公案小事五日程中事十日程大事二十日程及公使各有行程如此之類是為有程期者律有大集校閲違期不到之條亦有計帳等在令各有期限此等赦前有違經恩不待百日但赦出後日仍違程期者即計赦後違日為坐赦後並須準事給程以為期限其因犯逃亡經赦免罪限外不首者止坐其亡不論本罪疏議曰謂赦前犯罪因即逃亡會赦之後罪皆原免赦後百日仍不自首止有逃亡之坐更不論其本罪又如征防逃亡會赦免罪計百日限外征防仍自未還須計征防之日以為逃亡定罪限內流例若還即同在家亡法即軍人上番因犯逃亡經赦當下亦同常亡之律注謂赦書到後百日限外計之疏議曰上論蔽匿既以百日之外為限此逃亡之坐亦以百日限外計之謂非私所應有者及禁書之類雖限內但經問不臣者亦為蔽匿謂赦書到後百日限外計之諸會赦應改正徴收經責簿帳而不改正徴收者各論如本犯律疏議曰前除以百日為限此據赦後經責簿帳即須改正徴收仍有隱欺不改從正者皆如本犯得罪其應改正徴收具如子注注謂以嫡為庶以庶為嫡違法養子疏議曰依令王公侯伯子男皆子孫承嫡者傳襲無嫡子立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曾玄以下準此若不依令文即是以嫡為庶以庶為嫡又準令自無子者聽養同宗於昭穆合者若違令養子是名違法即工樂雜戶當色相養者律令雖無正文無子者理準良人之例注私入道詐復除避本業疏議曰私入道謂道士女官僧尼同不因官度者是名私入道詐復除者謂課役俱免即如太原元從給復終身沒落外蕃投化給復十年放賎為良給復三年之類其有不當復限詐同此色是為詐復除避本業謂工樂雜戶太常音聲人各有本業若回避改入他色之類是名避本業注增減年紀侵隱園田脫漏戶口之類須改正疏議曰增減年紀謂增年入老減年入中小者其有增減雖不免課役亦是侵隱園田謂人侵他園田及有私隱盜貿賣者脫漏戶口者全戶不附為脫隱口不附為漏稱之類者謂增加疾狀脫漏工樂雜戶之類會赦以後經責簿帳即須改正若不改正亦論如本犯之律注監臨主守之官私自借貸及借貸人財物畜産之類須徴收疏議曰監臨謂於臨統部內主守謂躬親保典之所者以官財物畜産私自借貸及將官物畜産私借貸人者其車船之屬同財物鷹犬之屬同畜産故言並須徴收問曰上條會赦以百日為限下文會赦乃以責簿為期若有上條赦後百日內責簿帳隱而不通者下條未經責簿帳經問不臣合得罪否答曰上條以罪重故百日內經問不臣罪同蔽匿限內雖責簿帳事終未發縱不吐實未得論罪後條犯輕赦後經責簿帳不通即得本罪經年不經責簿帳據理亦未有辜雖復經問不臣未合得罪又問蔽匿之事限內未首及應改正簿帳未通乃有非是物主傍人言告未知告者得罪以否答曰赦前之罪各有程期限內事發律許免罪終須改正徴收告者理不合坐謂以嫡為庶以庶為嫡違法養子私入道詐復除避本業增減年紀侵隱園田脫漏戶口之類須改正監臨主守之官私自借貸及借貸人財物畜産之類須徴收故唐律疏議卷第五名例凡八條諸犯罪未發而自首者原其罪疏議曰過而不改斯成過矣今能改過來首其罪皆合得原若有文牒言告官司判令三審牒雖未入曹局即是其事已彰雖欲自新不得成首注正贓猶徴如法疏議曰稱正贓者謂盜者自首不徴倍贓稱如法者同未首前法徴還官主枉法之類彼此俱罪猶徴沒官取與不和及乞索之類猶徴還主其輕罪雖發因首重罪者免其重罪疏議曰假有盜牛事發因首鑄錢鑄錢之罪得原盜牛之犯仍坐之類即因問所劾之事而別言餘罪者亦如之疏議曰劾者推鞫之別名假有已被推鞫因問乃更別言餘事亦得免其餘罪同因首重罪之義故云亦如之即遣人代首若於法得相容隱者為首及相告言者各聽如罪人身自首法疏議曰造人代首者假有甲犯罪遣乙代首不限親疏但遣代首即是若於法得相容隱者謂依下條同居及大功以上親等若部曲奴婢為主首及相告言者此還據得容隱者縱經官司告言皆同罪人身首之法其小功緦麻相隱既減凡人三等若其為首亦得減三等注緣坐之罪及謀叛以上本服期雖捕告俱同自首例疏議曰緣坐之罪者謂謀反大逆及謀叛已上道者並合緣坐及謀叛以上本服期者謂非緣坐若叛未上道大逆未行之類雖尊壓出降無服各依本服期雖捕告以送官司俱同罪人自首之法其聞首告被追不赴者不得原罪疏議曰謂犯罪之人聞有代首為首及得相容隱者告言於法雖復合原追身不赴不得免罪謂止坐不赴者身首告之人及餘應緣坐者仍依首法即自首不實及不盡者以不實不盡之罪罪之至死者聽減一等疏議曰自首不實謂強盜得贓首云竊盜贓雖首盡仍以強盜不得財科罪之類及不盡者謂枉法取財十五匹雖首十四匹餘一匹是為不盡之罪稱罪之者不在除免倍贓監主加罪加役流之例假有人強盜二十匹自首十匹餘有十匹不首本法尚合死罪為其自有悔心罪狀因首而發故至死聽減一等問曰謀殺凡人乃云是舅或謀殺親舅復云凡人姓名是同舅與凡人狀別如此之類若為科斷答曰謀殺凡人是輕謀殺舅罪乃重重罪既得首免輕罪不可仍加所首姓名既同唯止舅與凡人有異謀殺之罪首盡舅與凡人狀虛坐是不應得為從輕合笞四十其謀殺親舅乃云凡人者但謀殺凡人唯極徒坐謀殺親舅罪乃至流謀殺雖已首陳須科不盡之罪三流之坐準徒四年謀殺凡人合徒三年不言是舅首陳不盡處徒一年又問一家漏十八口並有課役乃首九口未知合得何罪答曰律定罪名當條見義如戶內止隱九口告稱隱十八口推勘九口是實誣告者不得反坐以本條隱九口者罪止徒三年罪至所止所誣雖多不反坐今首外仍隱九口當條以不盡之罪罪之仍合處徒三年又問乙私有甲弩乃首云止有矟一張輕重不同若為科處答曰甲弩不首全罪見在首矟一張是別言餘罪首矟之罪得免甲弩之罪合科既自首不實至死聽減一等又問假有監臨之官受財不枉法贓滿三十匹罪合加役流其人首云受所監臨其贓並盡合科何罪答曰律云以不實不盡之罪罪之至死聽減一等但不枉法與受所監臨得罪雖別贓已首盡無財可科唯有因事不因事有殊止從不應為重科杖八十若枉法取物首言受所監臨贓亦首盡無財可坐所枉之罪未首宜從所枉科之若枉出入徒流自從故出入徒流為罪如枉出入百杖以下所枉輕者從請求施行為坐本以因贓入罪贓既首訖不可仍用至死減一等之法注自首贓數不盡者止計不盡之數科之疏議曰假有竊盜十匹止首五匹五匹不首仍徒一年是名止計不盡之數科之科之之義是復上文亦與罪之之義不殊不盡贓多至死者減一等其知人欲告及亡叛而自首者減罪二等坐之疏議曰犯罪之徒知人欲告及案問欲舉而自首陳及逃亡之人并叛已上道此類事發歸首者各得減罪二等坐之即亡叛者雖不自首能還歸本所者亦同疏議曰雖不自首謂不經官司首陳能還歸本所者謂歸初逃叛之所亦同自首之法減罪二等坐之若本所移改還歸移改之所亦同其於人損傷疏議曰損謂損人身體傷謂見血為傷雖部曲奴婢傷損亦同良人例注因犯殺傷而自首者得免所因之罪仍從故殺傷法本應過失者聽從本疏議曰假有因盜故殺傷人或過失殺傷財主而自首者盜罪得免故殺傷罪仍科若過失殺傷仍從過失本法故云本應過失聽從本於物不可備償疏議曰稱物者謂寶印符節制書官文書甲弩旌旗幡幟禁兵器及禁書之類私家既不合有是不可償之色本物見在首者謂不可備償之類本物見在聽同首法即事發逃亡疏議曰假有盜罪合徒事發逃走已經數日而復陳首犯盜已發雖首不原逃走之罪聽減二等若越度關及姦疏議曰度關有三等罪越度私度冒度其私度越度自首不原冒度之罪自首合免若姦良人者自首不原并私習天文者並不在自首之例疏議曰天文玄遠不得私習從於人損傷以下私習天文以上俱不在自首之例正贓猶徴如法緣坐之罪及謀叛以上本服期雖捕告俱同自首例謂止坐不赴者身自首贓數不盡者止計不盡之數科之因犯殺傷而自首者得免所因之罪仍從故殺傷法本應過失者聽從本本物見在首者贖同免法雖不得首所犯之罪得減逃亡之坐私度亦同姦謂犯良人諸犯罪共亡輕罪能捕重罪首疏議曰犯罪事發已囚未囚及同犯別犯而共亡者或流罪能捕死囚或徒囚能捕流罪首如此之類是為輕罪能捕重罪首注重者應死殺而首者亦同疏議曰律稱應死未須斷訖準犯合死逃走輕者殺而來首亦同捕首法其流罪以下逃亡輕者能捕重罪首者捕法自準捕亡律若死罪之囚不必捕格方便殺得者亦是及輕重等獲半以上首者皆除其罪疏議曰假有五人俱犯百杖相共逃走有一人心悔更獲二人而首即是獲半以上從共亡以下本罪及亡罪並得從原故云皆除其罪注常赦所不原者依常法疏議曰常赦所不原者謂雖會大赦猶處死及流若除名免所居官及移鄉之類此等既赦所不原故雖捕首亦不合免問曰假有犯百杖者十人同共逃走六人歸首又捕得逃者二人得同獲半以上除罪以否答曰律開相捕之法本為少能捕多輕能捕重輕重等者猶須獲半今六人共獲二人便是以多捕少依如律義不合首原亡罪首減二等本犯仍依法斷若輕能捕重所獲雖少合原如輕重罪同不可首多獲少亦須首獲數等然可得原又問甲乙二人輕重罪等俱共逃走甲捕乙首甲免罪否答曰律稱獲半以上首者皆除其罪甲乙共亡者甲能獲乙逃罪已盡更無亡人獲半尚得免辜況其逃亡全盡甲合從原假有十人合死俱共逃亡五人捕得五人亦是首獲相半既開首捕之路此類各合全免又問緦麻以上犯罪共亡得同捕首法以否答曰緦麻以上親屬有罪不合告言藏亡尚許減罪豈得輒相捕送此捕為凡人發例不與親戚生文若捕親屬首者得減逃亡之坐本犯之罪不原仍依傷殺及告親屬法其犯謀叛以上得依捕首之律即因罪人以致罪而罪人自死者聽減本罪二等疏議曰因罪人以致罪謂藏匿罪人或過致資給及保證不實之類今罪人非被刑戮而自死者又聽減罪二等若罪人自首及遇恩原減者亦準罪人原減法疏議曰謂因罪人以得罪罪人於後自首及遇恩原減者或得全原或減一等二等之類一依罪人全原減降之法其應加杖及贖者各依杖贖例疏議曰其應加杖假有官戶奴婢犯流而為過致資給捉獲官戶奴婢等流罪加杖二百過致資給者並依杖二百罪減之不從流減其罪人本合收贖過致資給者亦依贖法不以官當加杖配役問曰官戶等犯流加杖二百過致者應減幾等而科答曰犯徒應加杖者一等加二十加至二百當徒三年乃至流刑杖亦二百即加杖之流應減在律殊無節文比附刑名止依徒減一等加杖一百八十重者應死殺而首者亦同常赦所不原者依常法諸盜詐取入財物而於財主首露者與經官司自首同疏議曰盜謂強盜竊盜詐謂詐欺取人財物而能悔過於財主首露與經官司首同若知人將告而於財主首者亦得減罪二等問曰假有甲盜乙絹五匹經乙自首乙乃取甲十匹之物為正倍等贓合當何罪答曰依律首者唯徴正贓甲既經乙自首因乃剩取其物既非監主而乃因事受財合科坐贓之罪其於餘贓應坐之屬悔過還主者聽減本罪三等坐之疏議曰餘贓謂盜詐之外應得罪者並是雖不於官司陳首能悔過還主者聽減本罪三等假有枉法受財十匹合流悔過還主得減三等處徒二年之類既云坐之自依下例即財主應坐者減罪亦準此疏議曰財主應坐謂受財枉法不枉法受所監臨及坐贓與財人各亦得罪若取人悔過還主得減三等財主亦減本坐三等科之問曰貿易官物復以本物却還或本物已費別將新物相替如此悔過得免罪否答曰若以本物却還得免計贓為罪仍依盜不得財科之若其非官本物更以新物替之雖復私自陪備貿易之罪仍在諸同職犯公坐者長官為一等通判官為一等判官為一等主典為一等各以所由為首疏議曰同職者謂連署之官公坐謂無私曲假如大理寺斷事有違即大卿是長官少卿及正是通判官丞是判官府史是主典是為四等各以所由為首者若主典檢請有失即主典為首丞為第二從少卿二正為第三從大卿為第四從即主簿録事亦為第四從若由丞判斷有失以丞為首少卿二正為第二從大卿為第三從典為第四從主簿録事當同第四從注若通判官以上異判有失者止坐異判以上之官疏議曰假如一正異丞所判有失又有一正復同判即二正同為首罪若一正先依丞判一正始作異同異同者自為首科同丞者便即無罪假如丞斷合理一正異斷有乖後正直云依判即同前正之罪若云依丞判者後正無辜二卿異同亦各準此其通判官以上異同失理應連坐者唯長官及檢勾官得罪以下並不坐通判官以下有失或中間一是一非但長官判從正法餘者悉皆免罪內外諸司皆準此問曰假有判官處斷乖失通判官異同得理長官不依通判官斷還同判官各有何罪答曰案若申覆唯通判官一人合理即上下俱得免科如其當處斷訖施行即乖失者依法得罪唯通判長官合理餘悉不論其闕無所承之官亦依此四等官為法即無四等官者止準見官為罪疏議曰四等之內但有闕官雖一人處斷乖失亦作四等為坐假如大理卿或丞正一人見在判有乖失判者自當首罪勾官仍同四等下從即無四等官者為關戍之類無通判官關丞即至關令并主典唯有三等假有典檢請有失丞為第二從令為第三從録事同為第三從下州縣市令唯與典二人此等止準見官二等之罪若同職有私連坐之官不知情者以失論疏議曰同職謂連判之官及典有私故違正理餘官連判不知挾私情者以失論假有人犯徒一年判官曲理斷免餘官不覺自依失出之法有私者為首不覺者為從仍為四等科之失出減五等失入減三等之類自餘與奪之事失者減三等及云以失論之類各從本條問曰有主典增減文案詐欺取贓五匹判官不覺依增減狀判訖未知判官於詐欺贓失減唯復於增減官文書失減答曰但依律得罪皆從所判為坐取贓事在案外增減文案見行止從增減科之不可從贓而科又問判官主典有私故出流罪通判及長官不知情若為科首從之罪答曰假令主典為首還合流坐判官為從合徒三年不知情者從公坐失法公坐既有四等通判官第三從論減典二等又失出減五等從流減七等合杖九十長官又減一等合杖八十其有放而還獲及本應例減仍各依本法即餘官及上官案省不覺者各遞減一等下官不覺者又遞減一等亦各以所由為首疏議曰餘官者謂比州比縣及省內比司并諸府寺監不相管隸者上官者在京諸司向省臺及諸州向尚書省諸縣向州之類如州上文書向尚書省有錯失省司不覺者省司所由之首減州所由首一等同職遞為四等法首從減之其餘官不覺亦準此若省司下符向州錯失州司不覺州司所由首減省司所由首二等同職遞為四等首從法減之檢勾之官同下從之罪疏議曰檢者謂發辰檢稽失諸司録事之類勾者署名勾訖録事參軍之類皆同下從若有四等官同四等從有三等官同三等從有二等官同二等從其無檢勾之官者雖判官發辰勾稽若有乖失自於判處得罪不入勾檢之坐應奏之事有失勘讀及省審之官不駮正者減下從一等疏議曰尚書省應奏之事須緣門下者以狀牒門下省準式依令先門下録事勘給事中讀黃門侍郎省侍中審有乖失者依法駮正却牒省司若實有乖失不駮正者録事以上減省下從一等既無遞減之文即侍中以下同減一等律以既減下從得罪最輕若更遞減餘多無坐駮正之法唯在録事以上故所掌主典律無罪名若辭狀隱伏無以驗知者勿論疏議曰辭狀隱伏者謂脫錯文字增減事情辭狀隱微案覆難覺者自餘官以下案省不覺並得免罪故云勿論若通判官以上異判有失者止坐異判以上之官減謂首減首從減從諸公事失錯自覺舉者原其罪疏議曰公事失錯謂緣公事致罪而無私曲者事未發露而自覺舉者所錯之罪得免覺舉之義與自首有殊首者知人將告減二等覺舉既無此文但未發自言皆免其罪應連坐者一人自覺舉餘人亦原之疏議曰應連坐者長官以下主典以上及檢勾官在案同判署者一人覺舉餘並得原其檢勾之官舉稽及事涉私者曹司依法得罪唯是公坐情無私曲檢勾之官雖舉彼此並無罪責其斷罪失錯已行決者不用此律疏議曰斷罪失錯已行決者謂死及笞杖已行決訖流罪至配所役了徒罪役訖此等並為已行官司雖自覺舉不在免例各依失入法科之故云不用此律假有人枉被斷徒二年已役一年官司然始自覺舉者一年未役者自從舉免已役一年者從失入減三等科杖八十之類其官文書稽程應連坐者一人自覺舉餘人亦原之主典不免若主典自舉並減二等疏議曰文書謂公案小事五日程中事十日程大事二十日程徒罪以上辨定後三十日程此外不了是名稽程官人自覺舉者並得全原唯主典不免若主典自舉並減二等者以官司不舉故長官以下並減二等如官人主典連署舉者官人並得免罪主典仍減二等科之其制敕案成以後頒下各給抄寫程二百紙以下限二日程過此以外每二百紙以下加一日程所加多者不得過五日注云其赦書計紙雖多不得過三日此等抄寫程既云案成以後據令成制敕案不別給程即是當日成了違令限日皆是有稽稽而自舉者同官文書法仍為公坐亦作四等科斷各以所由為首若涉私曲故稽亦同私坐之法問曰公坐相連節級得罪一人覺舉餘亦原之稽案既是公罪勾官亦合連坐勾檢之官舉訖餘官何故得罪答曰公坐失錯事可追改一人舉覺餘亦原之至於行事稽留不同失錯之例勾官糾出故不免科諸共犯罪者以造意為首隨從者減一等若家人共犯止坐尊長疏議曰共犯罪者謂二人以上共犯以先造意者為首餘並為從家人共犯者謂祖父伯叔子孫弟姪共犯唯同居尊長獨坐卑幼無罪注於法不坐者歸罪於其次尊長尊長謂男夫疏議曰於法不坐者謂八十以上十歲以下及篤疾歸罪於其次者假有尊長與卑幼共犯尊長老疾依律不坐者即以共犯次長者當罪是名歸罪於其次尊長尊長謂男夫者假有婦人尊長共男夫卑幼同犯雖婦人造意仍以男夫獨坐侵損於人者以凡人首從論疏議曰侵謂盜竊財物損謂鬪毆殺傷之類假令父子合家同犯並依凡人首從之法為其侵損於人是以不獨坐尊長即共監臨主守為犯雖造意仍以監主為首凡人以常從論疏議曰監臨主守具如後解假有外人發意共左藏官司主典盜庫絹五匹雖是外人造意仍以監主為首處徒二年外人依常盜從合杖一百於法不坐者歸罪於其次尊長尊長謂男夫諸共犯罪而本罪別者雖相因為首從其罪各依本律首從論疏議曰謂五服內親共他人毆告所親及侵盜財物雖是共犯而本罪各別假有甲勾他外人乙共毆兄甲為首合徒二年半乙為凡鬪從不下手又減一等合笞二十又有卑幼勾人盜己家財物十匹卑幼為首合笞三十他人為從合徒一年又減常盜一等猶杖一百此是相因為首從其罪各依本律首從論此例既多不可具載但是相因為首從本罪別者皆準此若本條言皆者罪無首從不言皆者依首從法疏議曰案賊盜律謀殺期親尊長外祖父母皆斬如此之類本條言皆者罪無首從不言皆者依首從法科之又賊盜律云謀殺人者徒三年假有二人共謀殺人未行事發造意者為首徒三年從者徒二年半如此之類不言皆者依首從法即強盜及姦略人為奴婢犯闌入若逃亡及私度越度關棧垣籬者亦無首從疏議曰強盜之人各肆威力姦者身並自犯不為首從略人為奴婢者理與強盜義同闌入者謂闌入官殿及應禁之所各自身犯亦無首從逃亡者假使十人皆征身各闕事私度者謂無過所從關門私過越度者謂不由門為越關謂檢判之處棧謂塹柵之所垣謂官殿及府廨垣牆籬謂不築牆垣唯以䉒籬為固之類從強盜以下皆以正犯科之故云亦無首從諸共犯罪而有逃亡見獲者稱亡者為首更無證徒則決其從罪疏議曰假有甲乙二人共詐欺取物合徒一年甲實為首當被捉獲乙本為從遂即逃亡甲被鞫問稱乙為首更無證徒即須斷甲為從科杖一百是名決其從罪後獲亡者稱前人為首鞫問是實還依首論通計前罪以充後數疏議曰後捉獲乙稱甲為首鞫問甲稱是實還依首坐科徒一年甲是庶人前已決杖一百即須以杖笞贖直準減徒年一年徒贖銅二十斤一百杖贖銅一十斤以十斤杖銅減半年徒罪餘徒半年依法配役甲若單丁前已決杖一百今既處徒一年合杖一百二十即更決二十通計前杖以充後數問曰有甲乙二人犯盜準罪合流甲元造意乙是隨從然乙事發逃亡甲遂稱乙是首官司斷甲為從處徒三年已役訖然始獲乙甲承是首又甲是白丁若為處分答曰流罪準徒四年又云從徒入流比徒一年為剩纍徒流應役者不得過四年其人雖復詐冒官司不合更科流罪止合徒一年若犯加役流自合三年配役三年雖已役訖仍須更配遠流即是通計前罪配所為折居作若前輸贖物後應還者還之疏議曰假令甲有九品官犯徒一年詐為從罪前斷處杖一百徴銅十斤今依首論斷作一年徒坐以九品一官當徒坐盡前徴銅十斤者還之是名前輸贖物後應還者還之其增減人罪令有輕重者亦從此律疏議曰此設判官之罪增人罪者有人犯徒一年止有九品一官官司增罪科徒二年官當一年餘徒收贖後更審問止合徒一年前增一年贖物即合追還減人罪者若有一人身居兩職並是九品以上犯徒二年官司減為一年半用一官當徒一年餘有半年官當不盡贖銅十斤檢知前失還用兩官當徒二年前輸半年贖物亦合還主又有白丁犯徒三年官司斷徒一年役訖事發更須科徒二年前一年役訖後更配二年之類若枉入人徒年者即計庸折除課役及贖直疏議曰稱枉入人徒年未必皆是無罪但不應徒役而徒役即是枉入徒年若是全年枉入子注具有明文如不滿五十日役即計枉役二十日以下各計日折丁庸若枉三十五日并折調不滿五十日者更不合折及贖直者假有七品以上子被枉徒一年即以役身之庸折其贖直計庸折銅不盡更徴餘贖或折銅已盡仍有餘庸更亦不計若有課役依上法折除其判官得罪自從故失或有中男十六以上應贖犯杖一百官司處徒一年亦以役日計庸折充贖直盡與不盡皆同上解注每枉一年折二年雖不滿年役過五十日者折一年疏議曰枉徒一年通折二年課役若枉三年通折六年課役雖不滿年役過五十日亦除一年者依令丁役五十日當年課役俱免故五十日役者得折一年其稱折一年二年者皆以三百六十日為斷注即當年無課役者折來年其有軍役者折役日疏議曰被枉徒之年或遇恩復或遭水旱而無課役者聽折來年其有軍役者折上番之日若枉一年亦通折二年番役問曰律稱折來年者脫或來年旱潦及遇恩復無課役者得折以後來年以否答曰律稱當年無課役折來年律矜枉入徒役聽折來年課輸來歲既無課役將來亦是來年年與課役相須本欲為其準折若普蒙恩復及遭霜旱依令課役並免豈合即計為年亦如已役已輸聽折來年課役後年無者更折有課役之年此理既同不可別生異議其本應徒已決杖笞者即以杖笞贖直準減徒年疏議曰假有本坐合徒一年官司決杖一百決訖事發還合科徒前已決杖一百不可追改準徒一年贖銅二十斤即是十八日徒當銅一斤準笞十前決一百總合減徒一百八十日即當銅十斤折徒半年若一年徒罪已笞五十即以五斤之銅減徒役九十日減外殘徒各依式配役每枉一年折二年雖不滿年役過五十日者折一年即當年無課役者折來年其有軍役者折役日故唐律疏議卷第六名例凡十三條諸二罪以上俱發以重者論疏議曰假有甲任九品一官犯盜絹五匹合徒一年又私有矟一張合徒一年半又過失折人二支合贖流三千里是為二罪以上俱發從私有禁兵器斷徒一年半用官當訖更徴銅十斤既犯盜徒罪仍合免官是為以重者論注謂非應纍者唯具條其狀不纍輕以加重疏議曰以上三事竝非應纍斷者雖從兵器處罪仍具條三種犯狀不得將盜一年徒罪纍於私有禁兵器一年半徒上故云不纍輕以加重所以具其狀者一彰罪多二防會赦雜犯死罪經赦得原蠱毒流刑逢恩不免故也注若重罪應贖輕罪應居作官當者以居作官當為重疏議曰謂甲過失折人二支應流依法聽贖私有禁兵器合徒官當即以官當為重若白丁犯者即從禁兵器徒一年半即居作為重罪若更多犯自依從重法問曰有七品子犯折傷人合徒一年應贖又犯盜合徒一年家有親老應加杖二罪俱發何者為重答曰律以贖法為輕加杖為重故盜者不得以蔭贖家有親老聽加杖放之即是加杖為重罪若贖一年半徒自從重斷徴贖不合從輕加杖等者從一疏議曰假有白丁犯盜五匹合徒一年又鬪毆折傷人亦合徒一年此名等者須從一斷若一罪先發已經論決餘罪後發其輕若等勿論重者更論之通計前罪以充後數疏議曰假有甲折乙一齒合徒一年又折丙一指亦合徒一年折齒之罪先發已經配徒一年或無兼丁及家有親老已經決杖一百二十有折指之罪後發即從等者勿論重者更論之通計前罪以充後數者甲若毆丙折二指以上合徒一年半更須加役半年甲若單丁又加杖二十是為重者更論之通計前罪之法即以贓致罪頻犯者竝纍科疏議曰假有受所監臨一日之中三處受絹一十八匹或三人共出一十八匹同時迭者各倍為九匹而斷此名以贓致罪頻犯者竝纍科若罪法不等者即以重贓併滿輕贓各倍論疏議曰罪法不等者為犯強盜枉法不枉法竊盜受所監臨等竝是輕重不等即以重贓併滿輕贓假令縣令受財枉法六匹合徒三年不枉法十四匹亦合徒三年又監臨外竊盜二十九匹亦徒三年強盜二匹亦合徒三年受所監臨四十九匹亦合徒三年准此以上五處贓罪各合徒三年纍於受所監臨總一百匹仍倍為五十匹合流二千里之類注纍謂止纍見發之贓倍謂二尺為一尺疏議曰假有官人枉法受甲乙丙丁四人財物各有八匹之贓甲乙二人先發贓有一十六匹纍而倍之止依八匹而斷依律科流除名已訖其丙丁二人贓物於後重發即纍見發之贓別更科八匹之罪後發者與前既等理從勿論不得纍併前贓作一十六匹斷作死罪之類問曰有人枉法受一十五匹七匹先發已斷流訖八匹後發若為科斷答曰枉法之贓若一人邊而取前發者雖已斷訖後發者還須纍論併取前贓更科全罪不同頻犯止纍見發之贓通計十五匹斷從絞坐無祿之人自依減法又問脫有十人共行資財同在一所盜者一時將去得同頻犯以否答曰律注云監臨主司因事受財而同事共與若一事頻受及於監守內頻盜纍而不倍除此三事皆合倍論十人之財一時俱取雖復似非頻犯終是物主各別元非一人之物理與十處盜同坐同頻犯贓合倍折若物付一人專掌失即專掌者陪理同一人之財不得將為頻盜注不等謂以強盜枉法等贓併從竊盜受所監臨之類疏議曰強盜枉法計贓是重竊盜受所監臨准贓乃輕故名不等假如強盜併從竊盜者謂如有人諸處頻犯竊盜已得八十二匹纍贓倍論得四十一匹罪合流三千里復於諸處頻犯強盜得財一十八匹纍贓倍得九匹亦合流三千里今將強盜九匹併於竊盜四十一匹上滿五十匹處加役流其枉法併從受所監臨者假如官人頻受所監臨財物倍得二十一匹二丈合徒一年半復頻受枉法贓倍得二匹二丈亦合徒一年半今將枉法贓二匹二丈併於受所監臨財物二十一匹二丈總為二十四匹科徒二年其有強盜併入受所監臨枉法併從竊盜如比之類俱以重贓併從輕贓者皆同併滿之法注即監臨主司因事受財而同事共與若一事頻受及於監守頻盜者纍而不倍疏議曰假有十人同為鑄錢官司於彼受物是為因事受財十人共以錢物行求是為同事共與或斷一人之事頻受其財是為一事頻受若當庫人於所當庫內若縣令於其所部頻盜者此等三事各纍而不倍若同事別與或別事同與各依前倍論不同此例其一事分為二罪罪法若等則纍論疏議曰一事分為二罪者假將私馬直絹五匹博取官馬直絹十匹依律貿易官物計其等準盜論計所利以盜論須分官馬十匹出兩種罪名五匹等者準盜論合徒一年五匹利者以盜論亦合徒一年纍為十匹處徒一年半是也此為庶人有兼丁作法若是官人品子應贖及單丁之人用法各別假有品官貿易官物五匹是利即合免官其八品九品止有一官者免官訖仍徴銅十斤若六品以下監臨官司便同自盜若將以盜五匹纍於準盜五匹上從準盜作法合徒一年半纍併既不加重止從一重論直取以盜五匹加凡盜二等處徒二年仍除名其品子應贖者直取五匹利徒一年真役為重罪法不等者則以重法併滿輕法罪法不等者謂若請官器杖以亡失併從毀傷以考校不實併從失不實之類疏議曰假有官司非法擅賦斂於一家得絹五十匹四十五匹入官坐贓論合徒二年半五匹入私以枉法論亦合徒二年半即以入私五匹纍於入官者為五十匹坐贓致罪處徒三年注罪法等者謂若貿易官物計其等準盜論計所利以盜論之類疏議曰貿易官物已從上解或有判事枉法後受絹十匹五匹先許是真枉法五匹先未許得枉法後然始總送更有如此等事竝合纍論故云之類注罪法不等者謂若請官器杖以亡失併從毀傷疏議曰謂軍防之所請官器杖假有一千事亡失二百事合杖八十毀傷四百事亦合杖八十故雜律云請官器杖以十分論亡失二分毀傷四分各杖八十亡失三分毀傷六分各杖一百今以亡失二百事纍於毀傷四百事同毀傷六分之罪合杖一百注以考校不實併從失不實之類疏議曰職制律貢舉非其人一人徒一年二人加一等罪止徒三年若考校不實減一等失者各減三等假有考校九人二人故不實合科杖一百七人失不實亦合科杖一百須以故不實二人併從失不實七人之上為九人失不實合徒一年又戶婚律脫口以免課役一口徒一年二口加一等罪止徒三年其漏無課役口四口為一口假令脫有課役二口合徒一年漏無課役十口亦合徒一年須以有課役二口併於無課役十口之上為無課役十二口處徒一年半之類纍併不加重者止從重疏議曰假有以私物五匹貿易官物直九匹五匹準盜合徒一年計所利四匹合杖九十罪法等者則纍論以四匹纍於五匹上總為九匹不加一年徒坐止從準盜處徒一年併者如前器杖亡失一分毀傷二分俱合杖六十以亡失一分併毀傷二分之上止是三分未滿四分不合加罪止從亡失一分之類其應除免倍沒備償罪止者各盡本法疏議曰假有八品官枉法受財五匹徒二年半不枉法受財十二匹亦徒二年半竊盜二十四匹亦徒二年半監臨受財三十九匹亦徒二年半又詐欺取財二十四匹亦徒二年半又坐贓四十九匹亦徒二年半倍得七十六匹二丈又請矟十張亡失一張合杖六十其贓總纍為坐贓五十匹合徒三年餘贓罪止不加據枉法合除名不枉法合免官盜者倍備枉法不枉法受所監臨及坐贓等竝沒官亡失官矟備償坐贓罪止徒三年之類如有二罪以上俱發者即先以重罪官當仍依例除免不得將為二罪唯從重論謂非應纍者唯具條其狀不纍輕以加重若重罪應贖輕罪應居作官當者以居作官當為重纍謂止纍見發之贓倍謂二尺為一尺不等謂以強盜枉法等贓併從竊盜受所監臨之類即監臨主司因事受財而同事共與若一事頻受及於監守頻盜者纍而不倍罪法等者謂若貿易官物計其等準論計其所利以盜論之類諸同居若大功以上親及外祖父母外孫若孫之婦夫之兄弟及兄弟妻有罪相為隱疏議曰同居謂同財共居不限籍之同異雖無服者竝是若大功以上親各依本服外祖父母外孫若孫之婦夫之兄弟及兄弟妻服雖輕論情重故有罪者竝相為隱反報俱隱此等外祖不及曾高外孫不及曾玄也部曲奴婢為主隱皆勿論疏議曰部曲奴婢主不為隱聽為主隱非謀叛以上竝不坐即漏露其事及擲語消息亦不坐疏議曰假有鑄錢及盜之類事須掩攝迫收遂漏露其事及擲語消息謂報罪人所掩攝之事令得隱避逃亡為通相隱故亦不坐其小功以下相隱減凡人三等疏議曰小功緦麻假有死罪隱藏據凡人唯減一等小功緦麻又減凡人三等總減四等猶徒二年若犯謀叛以上者不用此律疏議曰謂謀反謀大逆謀叛此等三事竝不得相隱故不用相隱之律各從本條科斷問曰小功以下相隱減凡人三等若有漏露其事及擲語消息亦得減罪以否答曰漏露其事及擲語消息上文大功以上共相容隱義同其於小功以下理亦不別律恐煩文故舉相隱為例亦減凡人三等諸官戶部曲官私奴婢有犯本條無正文者各準良人疏議曰官戶隸屬司農州縣元無戶貫部曲謂私家所有其妻通娶良人客女奴婢為之部曲之女亦是犯罪皆與官戶部曲同官私奴婢有犯本際有正文者謂犯主及毆良人之類各從正條其本條無正文謂闌入越度及本色相犯并詛詈租父母父母兄姊之類各準良人之法若犯流徒者加杖免居作疏議曰犯徒者準無兼丁例加杖徒一年加杖一百二十一等加二十徒三年加杖二百準犯三流亦止杖二百決訖付官主不居作應徴正贓及贖無財者準銅二斤各加杖十決訖付官主疏議曰犯罪應徴正贓及贖無財可備者皆據其本犯及正贓準銅每二斤各加杖十決諾付官主銅數雖多不得過二百今直言正贓不言倍贓者正贓無財猶許加杖放免倍贓無財理然不坐其有財堪備者自依常律若老小及廢疾不合加杖無財者放免疏議曰謂以上應徴贖之人若年七十以上十五以下及廢疾依律不合加杖勘檢復無財者竝放免不徴其部曲奴婢應徴贓贖者皆徴部曲及奴婢不合徴主即同主奴婢自相殺主求免者聽減死一等疏議曰奴婢賎人律比畜産相殺雖合償死主求免者聽減若部曲故殺同主賎人亦至死罪主求免死亦得同減法但奴殺奴是重主求免者尚聽部曲殺奴既輕主求免者亦得免既稱同主即是私家若是官奴自犯不依此律注親屬自相殺者依常律疏議曰律云各準良人悉準良人為法既犯親屬不依求免減例稱部曲者部曲妻及客女亦同親屬自相殺者依常律諸化外人同類自相犯者各依本俗法異類相犯者以法律論疏議曰化外人謂蕃夷之國別立君長者各有風俗制法不同其有同類自相犯者須問本國之制依其俗法斷之異類相犯者若高麗之與百濟相犯之類皆以國家法律論定刑名諸本條別有制與例不同者依本條疏議曰例云共犯罪以造意為首隨從者減一等鬪訟律同謀共毆傷人各以下手重者為重罪元謀減一等從者又減一等又例云九品以上犯流以下聽贖又斷獄律品官任流外及雜任於本司及監臨犯杖罪以下依決罰例如此之類竝是與例不同各依本條科斷即當條雖有罪名所為重者自從重疏議曰依詐僞律詐自復除徒二年若丁多以免課役即從戶婚律脫口法一口徒一年二口加一等罪止徒三年又詐僞律詐增減功過年限因而得官者徒一年若因詐得賜贓重即從詐欺官私以取財物准盜論罪止流三千里之類其本應重而犯時不知者依凡論本應輕者聽從本疏議曰假有叔姪別處生長素未相識姪打叔傷官司推問始知聽依凡人鬪法又如別處行盜盜得大祀神御之物如此之類竝是犯時不知得依凡論悉同常盜斷其本應輕者或有父不識子主不識奴毆打之後然始知悉須依打子及奴本法不可以凡鬪而論是名本應輕者聽從本諸斷罪而無正條其應出罪者則舉重以明輕疏議曰斷罪無正條者一部律內犯無罪名其應出罪者依賊盜律夜無故入人家主人登時殺者勿論假有折傷灼然不坐又條盜緦麻以上財物節級減凡盜之罪若犯詐欺及坐贓之類在律雖無減文盜罪尚得減科餘犯明從減法此竝舉重明輕之類其應入罪者則舉輕以明重疏議曰案賊盜律謀殺期親尊長皆斬無已殺已傷之文如有殺傷者舉始謀是輕尚得死罪殺及謀而已傷是重明從皆斬之坐又例云毆告大功尊長小功尊屬不得以蔭論若有毆告期親尊長舉大功是輕期親是重亦不得用蔭是舉輕明重之類諸稱乘輿車駕及御者太皇太后皇太后皇后竝同疏議曰乘輿者案賊盜律盜乘輿服御物者流二千五百里若盜太皇太后皇太后皇后服御物者得罪竝同車駕者依衛禁律車駕行衝隊者徒一年若衝三后隊亦徒一年又條闌入至御在所斬至三后所亦斬是名竝同稱制敕者太皇太后皇太后皇后皇太子令減一等疏議曰依公式令三后及皇太子行令職制律制書有所施行而違者徒二年若違三后及皇太子令各減一等之類若於東官犯失及宮衛有違應坐者亦同減例疏議曰於東官犯者謂指斥東官及對捍皇太子令使車馬之屬不調習駕驛之具不完牢并闌入東宮宮殿門宮臣宿衛冒名相代兵杖遠身輒離職掌別處宿之類謂之為犯失者謂合和皇太子藥誤不如本方及封題誤并守衛不覺闌入東宮宮殿門如此之類謂之為失犯之與失得罪竝減上臺一等科斷注本應十惡者雖得減罪仍從本法疏議曰謂於東宮犯失準上臺法罪當十惡者今雖減科仍從十惡本法本應十惡者雖得減罪仍從本法諸稱期親及稱祖父母者曾高同疏議曰稱期親者戶婚律居期喪而嫁娶者杖一百即居曾高喪竝與期同及稱祖父母者戶婚律云祖父母父母在別籍異財徒三年即曾高在別籍異財罪亦同故云稱期親及稱祖父母者曾高同稱孫者曾玄同疏議曰鬪訟律子孫違犯教令徒二年即曾玄違犯教令亦徒二年是為稱孫者曾玄同嫡孫承祖與父母同疏議曰依禮及令無嫡子立嫡孫即是嫡孫承租若聞此祖喪匿不舉哀流二千里故云與父母同注緣坐者各從祖孫本法疏議曰依賊盜律反逆者父子年十六以上皆絞祖孫沒官若嫡孫承祖沒而不死故云各從祖孫本法其嫡繼慈母若養者與親同疏議曰嫡謂嫡母左傳注云元妃始嫡夫人庶子於之稱嫡繼母者謂嫡母或亡或出父再娶者為繼母慈母者依禮妾之無子者妾子之無母者父命為母子是名慈母非父命者依禮服小功不同親母若養者謂無兒養同宗之子者慈母以上但論母若養者即并通父故加若字以別之竝與親同稱子者男女同疏議曰稱子者鬪訟律子孫違犯教令徒二年此是男女同緣坐者謂殺一家三人之類緣坐及妻子者女竝得免故云女不同其犯反逆造畜蠱毒本條緣坐及女者從本法稱袒免以上親者各依本服論不以尊壓及出降義服同正服疏議曰皇帝蔭及袒免以上親戶婚律嘗為袒免親之妻而嫁娶者杖一百假令皇家絶服旁期及婦人出嫁若男子外繼皆降本服一等若有犯及取蔭各依本服不得以尊壓及出降即依輕服之法義服者妻妾為夫妾為夫之長子及婦為舅姑之類相犯者竝與正服同緣坐者各從祖孫本法緣坐者女不同諸稱反坐及罪之坐之與同罪者止坐其罪疏議曰稱反坐者鬪訟律云誣告人者各反坐及罪之者依例云自首不實不盡以不實不盡之罪罪之坐之者依例餘贓應坐悔過還主減罪三等坐之與同罪者詐僞律譯人詐僞致罪有出入者與同罪止坐其罪者謂從反坐以下竝止坐其罪不同真犯故死者止絞而已稱準枉法論準盜論之類罪止流三千里但準其罪疏議曰稱準枉法論者職制律云先不許財事過之後而受財者事若枉準枉法論又條監臨內強市有剩利準枉法論又稱準盜論之類者詐僞律云詐欺官私以取財物準盜論雜律云棄毀符節印及門鑰者準盜論如此等罪名是準枉法準盜論之類竝罪止流三千里但準其罪者皆止準其罪亦不同真犯竝不在除免倍贓監主加罪加役流之例疏議曰謂從反坐以下竝不在除名免官免所居官亦無倍贓又不在監主加罪及加役流之例其本法雖不合減亦同雜犯之法減科稱以枉法論及以盜論之類皆與真犯同疏議曰以枉法論者戶婚律云里正及官司妄脫漏增減以出入課役贓重入己者以枉法論又條非法擅賦斂入私者以枉法論稱以盜論之類者賊盜律云貿易官物計所利以盜論廏庫律云監臨主守以官物私自貸若貸人及貸之者無文記以盜論所犯竝與真枉法真盜同其除免倍贓悉依正犯其以故殺傷以鬪殺傷及以姦論等亦與真犯同故云之類死者止絞而已諸稱監臨者統攝案驗為監臨疏議曰統攝者謂內外諸司長官統撮所部者案驗謂諸司判官判斷其事者是也注謂州縣鎮戍折衝府等判官以上各於所部之內總為監臨疏議曰此謂州縣鎮戍折衝府等判官以上雖有曹務職掌不同但於部內總為監臨之例鎮戍折衝府唯統攝身不管家口注自餘唯據臨統本司及有所案驗者即臨統其身而不管家口者姦及取財亦同監臨之例疏議曰自餘為除州縣鎮戍折衝府以外百司總是若省臺寺監及諸衛等各於臨統本司之內名挂本司者竝為監臨若是來參事者是為案驗尚書省雖管州府文案若無關涉不得常為監臨內外諸司皆準此即臨統其身而不管家口者姦及取財亦同監臨之例假若諸衛管府史身官司姦府史家口及於府史家內取財或折衝府官人唯管衛士若姦衛士家口及於衛士家內取財皆同監臨之法內外不管家口之司姦及取財皆準此問曰假有主帥於所部衛士家盜物得同於監臨內取財以否答曰主帥於所部衛士統攝一身既非取受之財盜乃律文不攝止同常盜不是監臨稱主守者躬親保典為主守雖職非統典臨時監主亦是疏議曰主守謂行案典吏專主掌其事及守當倉庫獄囚雜物之類其職非統典者謂非管攝之司臨時被遣監主者亦是謂州縣鎮折衝府等判官以上各於所部之內總為監臨自餘唯據臨統本司及有所案驗者即臨統其身而不管家口者姦及取財亦同監臨之例諸稱日者以百刻計功庸者從朝至暮疏議曰職制律官人無故不上一日笞二十須通晝夜百刻為坐計功庸者職制律監臨之官私役使所監臨者各計庸以受所監臨財物論從朝至暮即是一日不須準百刻計之注役庸多者雖不滿日皆併時率之疏議曰計庸多者假若役二人從朝至午為一日功或役六人經一辰亦為一日功縱使一時役多人或役一人經多日皆須併時率之稱年者以三百六十日疏議曰在律稱年多據徒役此既計日不以十二月稱年稱人年者以籍為定疏議曰稱人年處即須依籍為定假使貌高年小或貌小年高悉依籍書不合準貌籍既三年一造非造籍之歲通舊籍計之問曰依戶令疑有姦欺隨狀貌定若犯罪者年貌懸異得依令貌定科罪以否答曰令為課役生文律以定刑立制惟刑是恤貌即姦生課役稍輕故得臨時貌定刑名事重止可依據籍書律令義殊不可破律從令或有狀貌成人而作死罪籍年七歲不得即科或籍年十六以上而犯死刑驗其形貌不過七歲如此事類貌狀共籍年懸隔者犯流罪以上及除免官當者申尚書省量定須奏者臨時奏聞稱衆者三人以上稱謀者二人以上疏議曰稱衆者斷獄律云七品以上犯罪不栲皆據衆證定刑必須三人以上始成衆但稱衆者皆準此文稱謀者賊盜律云謀殺人者徒三年皆須二人以上餘條稱謀者各準此例注謀狀彰明雖一人同二人之法疏議曰假有人持刀杖入他家勘有仇嫌來欲相殺雖止一人亦同謀法故云雖一人同二人之法役庸多者雖不滿日皆併時率之謀狀彰明雖一人同二人之法諸稱加者就重次稱減者就輕次疏議曰假有人犯杖一百合加一等處徒一年或應徒一年合加一等處徒一年半之類是名就重次又有犯徒一年應減一等處杖一百或犯杖一百應減一等決杖九十是名就輕次惟二死三流各同為一減疏議曰假有犯罪合斬從者減一等即至流三千里或有犯流三千里合例減一等即處徒三年故云二死三流各同為一減其加役流應減者亦同三流之法加者數滿乃坐又不得加至於死本條加入死者依本條疏議曰加者數滿乃坐者假令凡盜少一寸不滿十匹依賊盜律竊盜五匹徒一年五匹加一等為少一寸止徒一年又不得加至於死者依捕亡律宿衛人在直而亡者一日杖一百二日加一等雖無罪止之文唯合加至流三千里不得加至於死本條加入死者依本條依鬪訟律毆人折二支流三千里又條云部曲毆傷良人者加凡人一等加者加入於死此是本條加入死者依本條注加入絞者不加至斬疏議曰部曲毆良人折二支已合絞坐若故毆折又合加一等今既加入於絞不合更加至斬其罪止有半年徒若應加杖者杖一百應減者以杖九十為次疏議曰假有縣典故增囚狀加徒半年縣尉知而判入即以典為首合徒半年典若單丁決杖一百縣尉應減一等處杖九十徴銅九斤之類加入絞者不加至斬諸稱道士女官者僧尼同疏議曰依雜律云道士女官姦者加凡人二等但餘條唯稱道士女官者即僧尼竝同諸道士女官時犯姦還俗後事發亦依犯時加罪仍同白丁配徒不得以告牒當之若於其師與伯叔父母同疏議曰師謂於觀寺之內親承經教合為師主者若有所犯同伯叔父母之罪依鬪訟律詈伯叔父母者徒一年若詈師主亦徒一年餘條犯師主悉同伯叔父母其於弟子與兄弟之子同疏議曰謂上文所解師主於其弟子有犯同俗人兄弟之子法依鬪訟律毆殺兄弟之子徒三年賊盜律云有所規求而故殺期以下卑幼者絞兄弟之子是期親卑幼若師主因嗔競毆殺弟子徒三年如有規求故殺者合當絞坐觀寺部曲奴婢於三綱與主之期親同疏議曰觀有上座觀主監齊寺有上座寺主都雅那是為三綱其營觀寺部曲奴婢於三綱有犯與俗人期親部曲奴婢同依鬪訟律主毆殺部曲徒一年又條奴婢有犯其主不請官司而殺者杖一百注云期親殺者與主同下條部曲準此又條部曲奴婢毆主之期親者絞詈者徒二年若三綱毆殺觀寺部曲合徒一年奴婢有罪不請官司而殺者杖一百其部曲奴婢毆三綱者絞詈者徒二年餘道士與主之緦麻同疏議曰鬪訟律部曲奴婢毆主之緦麻親徒一年傷重者各加凡人一等又條毆緦麻部曲奴婢折傷以上各減殺傷凡人部曲奴婢二等又條毆傷殺他人部曲減凡人一等奴婢又減一等即是觀寺部曲毆當觀寺餘道士女官僧尼等各合徒一年傷重各加凡人一等若毆道士等折一齒即徒二年奴婢毆又加一等徒二年半是名於餘道士與主之緦麻同注犯姦盜者同凡人疏議曰道士女官僧尼犯姦盜於法最重故雖犯當觀寺部曲奴婢姦盜即同凡人謂三綱以下犯姦盜得罪無別其奴婢姦盜一準凡人得罪弟子若盜師主物及師主盜弟子物等亦同凡盜之法其有同財弟子私取用者即同同居卑幼私輒用財者十匹笞十十匹加一等罪止杖一百若不滿十匹者不坐犯姦盜者同凡人故唐律疏議卷第七衛禁凡一十八條疏議曰衛禁律者秦漢及魏末未有此篇晉太宰賈充等酌秦漢之律隨事增損創制此律名為衛宮律自宋洎于後周此名竝無所改至於北齊將關禁附之更名禁衛律隋開皇改為衛禁律衛者言警衛之法禁者以關禁為名但敬上防非於事尤重故次名例之下居諸篇之首諸闌入太廟門及山陵兆域門者徒二年疏議曰太者大也廟者貌也言皇祖神主在於中故名太廟山陵者三秦記云秦謂天子墳云山漢云陵亦通言山陵言高大如山如陵兆域門者孝經云卜其宅兆既得吉兆周兆以為塋域皆置宿衛防守應入出者悉有名籍不應入而入為闌入各得二年徒坐其入太廟室即條無罪名依下文廟減宮一等之例減御在所一等流三千里若無故登山陵亦同太廟室之坐越垣者徒三年太社各減一等守衛不覺減二等疏議曰不從門為越垣者牆也越太廟山陵垣者各徒三年越太社垣及闌入門皆減太廟一等守衛謂軍人於太廟山陵太社防守宿衛者若不覺越垣及闌入各減罪人罪二等守衛謂防守衛士晝夜分時專當者非持時者不坐主帥又減一等疏議曰主帥謂領兵宿衛太廟山陵太社三所者但當檢校即坐不限官之高下又減守衛人罪一等唯坐親監當者故縱者各與同罪疏議曰故縱者謂知其不合入而聽入或知越垣而不禁竝與犯法者同罪餘條守衛宮殿及諸防禁之處皆有監門及守衛故縱不覺得罪各準此闌謂不應入而入者守衛謂持時專當者主帥謂親監當者餘條守衛及監門各準此諸闌入宮門徒二年疏議曰宮門皆有籍禁不應入而入者得徒二年嘉德等門為宮門順天等門為宮城門闌入得罪竝同餘條應坐者亦準此宮門得罪謂越垣及防禁違式冒代之類殿門徒二年半持仗者各加二等疏議曰太極等門為殿門闌入者徒二年半持仗各加二等謂將兵器杵棒等闌入宮門得徒三年間入殿門得流二千里兵器謂弓箭刀稍之類杵棒或鐵或木為之皆是故云之屬餘條謂下文持仗及至御在所者并持仗強盜者竝準此入上閣內者絞疏議曰上閣之內謂太極殿東為左上閣殿西為右上閣其門無籍應入者準敕引入闌入者絞若有仗衛者上閣之中不立仗衛內坐喚仗始有仗入其有不應入而入者同闌入殿門徒二年半持仗者流二千里其宮內諸門不立籍禁謂肅章虔化等門而得通內而輒闌入者竝得絞罪若有仗衛亦同殿門法若持仗及至御在所者斬疏議曰謂持仗入上閣及通內諸門并不持仗而至御在所者各斬迷誤謂非故闌入者上請聽敕即應入上閣內但仗不入而持寸刃入者亦以闌入論疏議曰應入上閣內者謂奉敕喚杖隨仗引入者得帶刀子之屬若仗不在內而持寸刃入者即以闌入論若非兵器杵棒之屬止得絞刑持仗者斬仗雖入不應帶橫刀而帶入者減二等疏議曰仗雖入上閣內不應帶橫刀而輒帶入者減罪二等合徒三年即闌入御膳所者流三千里入禁苑者徒一年疏議曰御膳所謂供御造食之處其門亦禁不應入而入者流三千里闌入禁苑者徒一年禁苑謂御苑其門有籍禁御膳以下闌入雖即持杖及越垣罪亦不加闌入宮城門亦同餘條應坐者亦準此杖謂兵器杵棒之屬餘條稱杖準此若有杖衛同闌入殿門法其宮內諸門不立籍禁而得通內者亦準此迷誤者上請諸闌入者以踰閾為限至閾未踰者宮門杖八十殿門以內遞加一等疏議曰閾者謂門限闌入之人行至門限未踰過若至宮門得杖八十宮內人不應入殿門至殿門閾未踰者杖九十殿內宿衛人至上閣閾未踰者杖一百其越殿垣者絞宮垣流三千里皇城減宮垣一等京城又減一等疏議曰越過殿垣者無問出入俱至絞刑宮垣流三千里皇城謂味雀等門之垣合徒三年京城謂明德等門之垣又減一等合徒二年半諸於宮殿門無籍及冒承人名而入者以闌入論疏議曰應入宮殿在京諸司皆有籍其無籍應入者皆引入其無籍不得人引而詐言有籍及冒承人名而入者宮門徒二年殿門徒二年半持杖者各加二等守衛不知冒名情宮門杖八十殿門以內遞加一等疏議曰守衛謂持時專當親主籍者應入者唱名始過不知冒名情者不識其人無心私許宮門杖八十殿門以內遞加一等但云不知冒情不云不知無籍詐入者但冒承人名有所憑據人難識盡是故罪輕無籍而入者準闌入不覺故縱法諸宿衛者以非應宿衛人冒名自代及代之者入宮內流三千里殿內絞疏議曰宿衛者謂大將軍以下衛士以上以次當上宿衛宮殿上番之日皆據籍書若以非應宿衛人謂非諸衛大將軍軍人以外冒名自代及代之者入宮內竝流三千里殿內竝絞若以應宿衛人自代及代之者各以闌入論疏議曰應宿衛人謂諸衛所管應入宮殿上番者注云謂已下直者未當上番人之色自代及代之者彼此各以闌入罪論闌入之罪一準上法主司不覺減二等知而聽行與同罪疏議曰主司謂折衝府及諸衛判兵之官不覺人冒名自代及代之者減所犯人罪二等若知相代之情而聽行者各與同罪若冒代之事從府而來即以府官所由為首餘官節級為從坐衛官不覺遞減府官一等如相冒之罪由衛即以衛官所由為首餘官節級為罪府司不坐及親監當之官者諸衛當上人兵各有本部主帥雖從別團配隸亦是監當之限餘條主司準此者謂一部律內但言主司竝不覺減二等知而聽行與同罪謂已下直者主司謂應判遣及親監當之官餘條主司準此諸因事得入宮殿而輒宿及容止者各減闌入二等疏議曰因事得入官殿者謂朝參辭見迎輸造作之類不合宿者而輒宿及容止所宿之人各減闌入罪二等在宮內徒一年殿內徒一年半即將領人入宮殿內有所迎輸造作門司未受文牒而聽入及人數有剩者各以闌入論至死者加役流疏議曰將領人入宮殿有所迎出有所輸送造作謂宮內營造門司皆須得牒然後聽入若未受文牒而輒聽入及所入人數有剩者門司各以闌入論若入上閣內及御在所應至死者門司各加役流將領主司知者各減闌入罪一等入者知又減五等不知者不坐疏議曰將頌主司謂領人迎輸造作知門司未受文牒及人數有剩而領入者各減闌入罪一等宮內徒一年半殿內徒二年入上閣內及至御在所流三千里入者知又減五等稱又者謂減將領者罪五等不知情入者不坐問曰將領主司知者減闌入罪一等不言不知若有不知而領入者合得何罪答曰上條冒名相代各以闌入罪論主司不覺減二等注云餘條主司準此明將領主司不知得減知情二等上既有例故不生文諸應入宮殿未著門籍而入雖有長籍但當下直而輒入者各減闌入五等疏議曰應入宮殿在京諸司入宮殿者皆著門籍若未著門籍而輒入或雖有長籍謂宿衛長上人雖一日上兩日下皆有長籍當下之日未合入宮殿但當下直而輒入各減闌入罪五等即宿次未到而輒宿及籍在東門而從西門入者又減二等疏議曰即宿次未到者謂應供奉之官及內官當直各有宿次其宿次未到而輒宿及籍在東門而從西門入者依令非應從正門入者各從便門著籍假如西門有籍而從東門入或側門有籍而從正門入各又減罪二等謂減闌入罪七等諸在宮殿內作罷而不出者宮內徒一年殿內徒二年御在所者絞疏議曰在宮殿內作罷者丁夫雜匠之徒作了其有應出不出者宮內徒一年殿內徒二年御在所者絞若有闢杖應出者竝即須出有不出者得罪與御在所同問曰在宮殿內及御在所作罷不出律有正文若在上閣內不出律既無文若為處斷答曰上閣之內例與闢杖所同應出不出此條無文者為上文注云閲杖應出不出與御在所同上閣內有宮人同御在所合絞御不在又無宮人減二等不覺及迷誤者上請疏議曰營作之所院宇或別不覺衆出或迷誤失道錯向別門非故不出皆得上請將領主司知者與同罪不知者各減一等疏議曰將領主司謂領人入者若知有人不出不即言者與不出人同罪其不知有人不出者各減一等謂御所宮殿內各得減一等闢杖主司謂領人搜索闢杖者其闢杖內有人不出各準將領主司之罪故云各準此若於闢杖內誤遺兵杖者杖一百疏議曰闢杖之內人皆出盡所有兵器亦不合留或有誤遺兵杖者合杖一百兵杖之法應須堪用或遺弓無箭或遺箭無弓俱不得罪故云弓箭相須乃坐問曰誤遺弩弓無箭或遺箭無弩或有楯而無矛各得何罪答曰弓箭相須乃坐弩箭無弓與常箭不別有弩弓無箭亦非兵杖之限楯則獨得無用亦與有弓無箭義同闢杖應出而不出者亦同闢杖主司搜人不盡者各準此弓箭相須乃坐諸登高臨宮中者徒一年殿中加二等疏議曰宮殿之所皆不得登高臨視若視宮中徒一年視殿中徒二年若於宮殿中行御道者徒一年疏議曰宮殿中當正門為御道人臣竝不得行其在宮殿中及宮城中而行御道者各徒一年若有橫道殿前即有橫階殿內亦有橫道殿門宮門內外立杖之處杖外雖無橫道越過者無罪宮門外者笞五十誤者各減二等疏議曰嘉德等門為宮門順天等門為宮城門準例宮城門有犯與宮門同令云宮門外者即順天門外行御道者得笞五十誤者各減二等謂從殿中至宮門外誤行御道者各得減二等其登高臨宮殿中有誤者亦減罪二等有橫道及門杖外越過者非諸宿衛人被奏劾者本司先收其杖違者徒一年疏議曰宿衛人謂衛士已上諸衛大將軍以下有犯法被奏劾者本司謂當衛主司及主帥等先收其杖違而不收者得徒一年本司及主帥各以所管應收杖而不收者一人得罪謂在宮殿中當上直者宮外宿不在此限謂在宮殿中直者諸應出宮殿而門籍已除輒留不出及被告劾已有公文禁止籍雖未除不得輒入宮殿犯者各以闌入論疏議曰應出宮殿謂改任行使假患番下事故等依令門籍當日即除門籍已除其人輒留不出雖無假患等事及被告劾已有文牒令禁止籍雖未除皆不得輒入宮殿如有犯者各以闌入論諸犯闌入宮殿非御在所者各減一等無宮人處又減一等疏議曰諸條稱闌入宮殿得罪者其宮殿之所御若不在各得減闌入罪一等雖是宮殿見無宮人又得減罪一等假若在外諸宮有宿衛人防守而闌入合徒一年之類若入上閣內有宮人雖非御在所亦合絞無宮人處亦減二等即雖非闌入輒私共宮人言語若親為通傳書信及衣物者絞疏議曰文云雖非闌入即是得應入宮之人不得私與宮人言語其親為通傳書信衣物者謂親於宮人處領得書信衣物將出及將外人書信衣物付與宮人訖者竝得絞坐入上閣內有宮人者不減諸宿衛人已配杖衛而官司輒回改者杖一百若不依職掌次第擅配割及別驅使者罪亦如之疏議曰依式衛士以上應當番宿衛者皆當衛見在長官割配於職掌之所各依杖衛次第坐立此即職掌已定若官司無故輒回改者合杖一百應須回改者不坐若不依職掌次第而擅配隸乖於式文及將別處驅使者亦各杖一百其有私使計庸重者從重論諸奉敕以合符夜開官殿門符雖合不勘而開者徒三年若勘符不合而為開者流二千里其不承敕而擅開閉者絞疏議曰奉敕以合符夜開宮殿門依監門式受敕入具録須開之門并入出人帳宣敕送中書中書宣送門下其宮內諸門城門郎與見直諸衛及監門大將軍將軍中郎將郎將折衝果毅內各一人俱詣閣覆奏御注聽即請合符門鑰監門官司先嚴門杖所開之門內外竝立隊燃拒火對勘符合然後開之符雖合不勘而開者徒三年若勘符不合即合執奏不奏而為開者流二千里其不承敕而擅開閉者俱合絞罪若錯符錯下鍵及不由鑰而開者杖一百即應閉忘誤不下鍵應開毀管鍵而開者徒一年疏議曰若錯符謂非所開閉之符及錯下鍵謂不依常法及不由鑰而開謂不用鑰而得開者此三事各合杖一百即應閉忘誤不下鍵及應開毀管鍵而開者各徒一年謂牝者為管牡者為鍵其皇城門減宮門一等京城門又減一等疏議曰皇城門謂朱雀等門從合符夜開以下得罪各減宮門一等其京城門謂明德等門亦從合符夜開以下得罪各減皇城門一等即宮殿門閉訖而進鑰違遲者殿門杖一百經宿加一等每輕一宿又加一等宮門以外遞減一等其開門出鑰遲又各遞減進鑰一等疏議曰依監門式駕在大內宮城門及皇城門鑰匙每去夜八刻出閉門二更二點進入京城門鑰每去夜十三刻出閉門二更二點進入違此不進是名進鑰違遲殿門杖一百經宿加一等合徒一年每經一宿又加一等既無罪止之文加至流三千里宮門以外遞減一等者即宮門及宮城門進鑰違遲亦合杖九十經宿杖一百每經一宿又加一等罪止徒三年皇城門杖八十罪止徒二年半京城門杖七十罪止徒二年其開門出鑰遲者依監門式官城門及皇城門四更二點出鑰開門京城門四更一點出鑰開門違式出鑰遲者各遮減進鑰一等即是殿門杖九十宮門及宮城門杖八十皇城門杖七十京城門杖六十駕在大明興慶宮及東都進請鑰匙依式各有時刻違者竝依此科罪諸於宮殿門雖有籍皆不得夜出入若夜入者以闌入論無籍入者加二等即持杖入殿門者絞夜出者杖八十疏議曰於宮殿門有籍之人唯合晝日入出若因夜開閉而輒入者以闌入論無籍夜入者加二等即持杖入殿門者絞有籍無籍等夜出宮殿門俱杖八十若得出入者剩將人出入各以其罪罪之被將者知情各減一等不知情不坐疏議曰謂奉敕聽入出之人剩將人入出者各以其罪罪之有籍者以闌入論無籍者加二等將出者杖八十被將者知情謂被將之人知剩將之情各減前所將罪一等不知情者不坐諸向宮殿內射宮垣徒二年殿垣加一等箭入者各加一等即箭入上閣內者絞御在所者斬疏議曰射向宮垣得徒二年殿垣徒二年半箭入者宮內徒二年半殿內徒三年即箭入上閣內者絞御在所者斬謂御在所宮殿若非御在所各減一等無宮人處又減一等皆謂箭及宮殿垣者若箭力應及宮殿而射不到者從不應為重不應及者不坐問曰何以知是御在所宮殿答曰向宮垣射得徒二年殿垣徒二年半準其得罪與闌入正同上條闌入宮殿非御在所各減一等無宮人又減一等即驗車駕不在又無宮人闌入上閣者合徒三年此條箭入上閣絞御在所斬得罪既同闌入明為御在宮中御若不在皆同上條減法箭入宮中徒一年半殿中徒二年入上閣內徒三年放彈及投瓦石者各減一等疏議曰放彈及投瓦石比箭罪輕放向宮垣徒一年半向殿垣徒二年入宮內徒二年殿內徒二年半入上閣內及御在所流三千里是為各減一等亦謂人力所及者據彈及投瓦石及宮殿方始得罪如應及不到亦從不應為重上減一等殺傷人者以故殺傷論疏議曰射及放彈若投瓦石有殺傷人者以故殺傷論殺人者斬傷人者加鬪殺傷一等即宿衛人於御在所誤拔刀子者絞左右竝立人不即執捉者流三千里疏議曰宿衛人常執兵杖得帶刀子若在御所者非敕遣用不得輒拔刀子其有誤拔者絞左右竝立人見其誤拔皆須執捉不即執捉者流三千里若有別敕處分令用及杖內賜食者不坐但舉宿衛人為例者明餘人在御所亦不得誤拔刀子其有誤拔及傍人不即執捉一準宿衛人罪謂箭力所及者亦謂人力所及者諸車駕行衝隊者徒一年衝三衛杖者徒二年疏議曰車駕行幸皆作隊杖若有人衝入隊間者徒一年衝入杖間徒二年其杖衛主司依上例故縱與同罪不覺減二等誤者各減二等疏議曰若有人誤入隊間得杖九十誤入杖間得徒一年若畜産唐突守衛不備入宮門者杖一百衝杖衛者杖八十疏議曰畜産唐突謂走逸入宮門守衛不備者杖一百入宮城門罪亦同若入殿門律更無文亦同宮門之坐衝杖衛者杖八十杖衛者在宮殿及駕行所得罪竝同謂入杖隊間者諸宿衛人應上番不到及因假而違者一日笞四十三日加一等過杖一百五日加一等罪止徒二年疏議曰宿衛人應上番而不到及因得假而違者一日笞四十三日加一等滿十九日合杖一百若過杖一百五日加一等罪止徒二年計三十四日即當罪止問曰假有宿衛人番期五日未滿因一日假遂違不上為當止得四日違罪唯復纍至罪止而科答曰番期有限限內有故須請假日滿即須赴番違假不上準日科斷其人四日之外即當下直下日不勞請假豈合計日纍科四日之外明知不坐又問應上不到因假而違者竝罪止得徒二年若準三十四日罪止便是月番之外令解下番之日不坐恐理未盡答曰依式三衛去京二千里外六十日上嶺南為季上三十四日罪止為包遠道生文故唐律疏議卷第八衛禁凡一十五條諸宿衛者兵杖不得遠身違者杖六十若輒離職掌加一等別處宿者又加一等主帥以上各加二等疏議曰兵杖者謂橫刀常帶其甲矟弓箭之類有時應執著者竝不得遠身不應執帶者常自近身輒遠身者各杖六十其職掌之處依次坐立輒離職掌加一等合杖七十即於別處宿者又加一等合杖八十主帥以上各加二等稱主帥以上謂隊副以上至大將軍以下兵杖遠身杖八十輒離職掌杖九十別處宿者杖一百是各加二等諸行宮外營門次營門與宮門同內營牙帳門與殿門同御幕門與上閣同至御所依上條疏議曰行宮謂車駕行幸及所至安置之處外營門次營門與宮門同闌入者得徒二年內營牙帳門與殿門同闌入者得徒二年半御幕門與上閣同闌入者絞至御在所依上條合斬自餘諸犯或以闌入論及應加減者竝同正宮殿之法諸宮內外行夜若有犯法行夜主司不覺減守衛者罪二等疏議曰宮內外行夜竝置鋪持更即是守衛者又有探更行更之人此行夜者若當探行之處有犯法者行夜主司不覺減守衛者罪二等謂上條闌入及越垣守衛不覺減二等注云守衛謂持時專當者行夜主司不覺犯法皆減此持時專當人罪二等諸本條無犯廟社及禁苑罪名者廟減宮一等社減廟一等禁苑與社同疏議曰闌入廟社及禁苑本條各有罪名其不立罪名之處謂闌入至閾未踰因入輒宿之類各隨輕重廟減宮一等社減廟一等禁苑與社同即向廟社禁苑射及放彈投瓦石殺傷人者各以鬪殺傷論至死者加役流疏議曰廟社及禁苑非人射及放彈投瓦石之所若有輒向射及放彈投瓦石殺傷人者各依鬪殺傷人罪法若箭傷徒二年瞎一目徒三年之類至死者唯處加役流即箭至隊杖若闢杖內者絞疏議曰駕行皆有隊杖或闢杖而行忽有人射箭至隊杖所及至闢杖內者各得絞罪諸於宮城門外若皇城門守衛以非應守衛人冒名自代及代之者各徒一年疏議曰謂宮城門外隊杖及傍城助鋪所及朱雀等門所有守衛之處以非應守衛人冒名自代及代之者各得徒一年以應守衛人代者各杖一百京城門各減一等疏議曰謂以當色下直非當上之人自代及代之者各杖一百京城門各減一等者謂明德等諸門以非應守衛人自代從一年徒上減一等以應守衛人自代從一百杖上減一等其在諸處守當者各又減二等餘犯應坐者各減宿衛罪三等疏議曰其在諸處謂非皇城京城等門自餘內外捉道守鋪及別守當之處相冒代者各減京城二等以非應守衛人自代及代之者各杖八十以應守衛人自代及代之者各杖七十餘犯應坐者謂冒代之外餘犯或兵杖遠身輒離職掌及擅配割或別驅使之類本條應坐者各減宿衛人罪三等若逃走違番不在減例問曰宿衛人以非應宿衛人冒名自代及代之者入宮內流三千里殿內絞若未入宮殿內事發合得何罪答曰以非應宿衛人自代重於闌入之罪若未至職掌之處事發在宮殿內止依闌入宮殿而科如未入宮門事發律無正條宜依不應為重杖八十其在宮外諸處冒代未至職掌處從不應為輕笞四十諸越州鎮戍城及武庫垣徒一年縣城杖九十疏議曰諸州及鎮戍之所各自有城若越城及武庫垣者各合徒一年越縣城杖九十縱無城垣籬柵亦是注云皆謂有門禁者其州鎮戍在城內安置若不越城直越州鎮垣者止同下文越官府廨垣之罪越官府廨垣及坊市垣籬者杖七十侵壞者亦如之疏議曰官府者百司之稱所居之處皆有廨垣坊市者謂京城及諸州縣等坊市其廨院或垣或籬輒越過者各杖七十侵謂侵地壞謂壞城及廨宇垣籬亦各同越罪故云亦如之注從溝瀆內出入者與越罪同越而未過減一等餘條未過準此疏議曰溝瀆者通水之渠從此渠而入出亦得越罪越而未過或在城及垣籬上或在溝瀆中間未得過者從越州城以下各得減一等餘條未過準此者謂越皇城京城宮殿垣及關津應禁之處未過者各得減罪一等即州鎮關戍城及武庫等門應閉忘誤不下鍵若應開毀管鍵而開者各杖八十疏議曰州鎮關戍城武庫各有禁門應閉皆須下鍵其忘誤不下鍵若應開毀管鍵而開者各得杖八十錯下鍵及不由鑰而開者杖六十餘門各減二等疏議曰錯下鍵謂管鍵不相當者及不由鑰而開者謂不用鑰而開各杖六十餘門謂縣及坊市之類官有門禁者若應閉忘誤不下鍵應開毀管鍵而開各杖六十錯下鍵及不由鑰而開各笞四十故云餘門各減二等若擅開閉者各加越罪二等即城主無故開閉者與越罪同未得開閉者各減已開閉一等疏議曰擅謂非時而開閉者州及鎮戍武庫門而有非時擅開閉者加越罪二等處徒二年縣城以下擅開閉者竝加越罪二等城主無故開閉者謂州縣鎮戍等長官主執鑰者不依法式開閉與越罪同其坊正市令非時開閉坊市門者亦同城主之法州鎮戍城門各徒一年自縣城以下悉與越罪同既云城主無故開閉即是有故許開若有警急驛使及制敕事速非時至州縣者城主驗實亦得依法為開又依監門式京城每夕分街立鋪持更行夜鼓聲絶則禁人行曉鼓聲動即聽行若公使齎文牒者聽其有婚嫁亦聽注云須得縣牒喪病須相告赴求訪醫藥齎本坊文牒者亦聽其應聽行者竝得為開坊市門若有警急及收掩雖州縣亦聽非時而開未得開閉者謂未通人行者為未開尚得人行者為未閉各減已開閉一等餘條謂宮殿門以下有門禁之類未得開閉者皆準此減一等皆謂有門禁者從溝瀆內出入者與越罪同越而未過減一等餘條未過準此餘條未得開閉準此諸私度關者徒一年越度者加一等疏議曰水陸等關兩處各有門禁行人來往皆有公文謂驛使驗符券傳送據遞牒軍防丁夫有總曆自餘各請過所而度若無公文私從關門過合徒一年越度者謂關不由門津不由濟而度者徒一年半已至越所而未度者減五等疏議曰水陸關棧兩岸皆有防禁越度之人已至官司防禁之所未得度者減越度五等合杖七十餘條未度準此者謂城及垣籬緣邊關塞有禁約之處已至越所而未度者皆減已越罪五等若越度未過者準上條減一等之例即被枉徒罪以上抑屈不申及使入覆訖不與理者聽於近關州縣具狀申訴所在官司即準狀申尚書省仍遞送至京若無徒以上罪而妄陳者即以其罪罪之官司抑而不送者減所訴之罪二等疏議曰關外有人被官司枉斷徒罪以上其除免之罪本坐雖不合徒亦同徒罪之法抑屈不申及使人覆訖不與理者文稱及者使人未覆亦聽於近關州縣具狀申訴所在官司謂近關州縣即準狀申尚書省仍遞送至京若勘無徒以上罪而妄訴者妄訴徒流還得徒流妄訴死罪還得死罪妄訴除免皆準比徒之法謂元無本罪而妄訴者若實有犯斷有出入而訴不平者不當此坐其應禁及散送竝依所訴之罪準令遞之若官司抑而不送者減所訴之罪二等謂枉得死罪官司不送合徒三年之類不由門為越謂已到官司應禁約之所餘條未度準此諸不應度關而給過所若冒名請過所而度者各徒一年疏議曰不應度關者謂有征役番期及罪譴之類皆不合輒給過所而官司輒給及身不合度關而取過所度者若冒他人名請過所而度者各徒一年即以過所與人及受而度者亦準此疏議曰以所請得過所而轉與人及受他人過所而承度者亦徒一年但律文皆云度者得徒一年明知未度者不合徒坐若關司未判過所以前準越關未度各減五等之例若已判過所未出關門同未過各減一等其與過所人既因度成罪前人未度亦同減科不應給過所而給者不在減例若家人相冒杖八十主司及關司知情各與同罪不知情者不坐即將馬越度冒度及私度者各減人二等餘畜又減二等疏議曰家人不限良賎但一家之人相冒而度者杖八十既無各字被冒名者無罪若冒度私度越度事由家長處分家長雖不行亦獨坐家長此是家人共犯止坐尊長之例主司謂給過所曹司及關司知冒度之情各同度人之罪不知冒情主司及關司俱不坐將馬越度冒度私度各滅人二等者越度杖一百冒度私度杖九十餘畜又減二等者除馬之外應請過所者竝為餘畜越度杖八十私度冒度杖七十其家畜相冒者謂毛色齒歲不同相冒竝不得罪也取而度者亦同家畜相冒者不坐諸關津度人無故留難者一日主司笞四十一日加一等罪止杖一百疏議曰關謂判過所之處津直度人不判過所者依令各依先後而度無故留難不度者一日主司笞四十主司謂關津之司一日加一等七日罪止杖一百此謂非公使之人若軍務急速而留難不度致稽廢者自從所稽廢重論諸私度有他罪重者主司知情以重者論不知情者依常律疏議曰私度者謂無過所從關門私度止徒一年或有避死罪逃亡別犯徒以上罪是名有他罪重關司知情者以故縱罪論各得所度人重罪不知情者依常律謂不知罪人別犯之情者依常律不覺故縱之法諸領人兵度關而別人妄隨度者將領主司以關司論關司不覺減將領者罪一等知情者各依故縱法有過所者關司自依常律將領主司知情減關司故縱罪一等不知情者不坐疏議曰準令兵馬出關者依本司連寫敕符勘度入關者據部領兵將文帳檢入而別有人妄隨度者罪在領兵官司故云將領主司以關司論知情與同罪不覺減二等若知別有重罪亦依重罪科之關司不覺者謂關司承將領者文簿不覺別人隨度者減將領者罪一等謂減度者罪三等知情者各依故縱法稱各者將領主司及關司俱得度人之罪有過所者關司判度自依常律不減將領主司之罪若將領主司知情減關司故縱罪一等不知情者不坐諸齎禁物私度關者坐贓論贓輕者從私造私有法疏議曰禁物者謂禁兵器及諸禁物竝私家不應有者私將度關各計贓數從坐贓科罪十匹徒一年十匹加一等罪止徒三年準贓輕者從私造私有法擅興律私有甲一領弩三張流二千里矟一張徒一年半私造者各加一等假令私將矟度關平贓直絹三十匹即從坐贓科徒二年不計矟為罪將甲一領度關從私有法流二千里即不計贓而斷若私家之物禁約不合度關而私度者減三等疏議曰依關市令錦綾羅紬綿絹絲布犛牛尾真珠金銀鐵竝不得度西邊北邊諸關及至緣邊諸州興易從錦綾以下竝是私家應有若將度西邊北邊諸關計贓減坐贓罪三等其私家不應有雖未度關亦沒官私家應有之物禁約不合度關已下過所關司捉獲者其物沒官若已度關及越度被人糾獲三分其物二分賞捉人一分入官諸越度緣邊關塞者徒二年共化外人私相交易若取與者一尺徒二年半三匹加一等十五匹加役流疏議曰緣邊關塞以隔華夷其有越度此關塞者得徒二年以馬越度準上條減人二等合徒一年餘畜又減二等杖九十但以緣邊關塞越罪故重若從關門私度人畜各與餘關罪同若共化外蕃人私相交易謂市買博易或取蕃人之物及將物與蕃人計贓一尺徒二年半三匹加一等十五匹加役流私與禁兵器者絞共為婚姻者流二千里未入未成者各減三等即因使私有交易者準盜論疏議曰越度緣邊關塞將禁兵器私與化外人者絞共為婚姻者流二千里其化外人越度入境與化內交易得罪竝與化內人越度交易同仍奏聽敕出入國境非公使者不合故但云越度不言私度若私度交易得罪皆同未入者謂禁兵器未入減死三等得徒二年半未成者謂婚姻未成減流三等得徒二年因使者謂因公使入蕃蕃人因使入國私有交易者謂市買博易各計贓準盜論罪止流三千里若私與禁兵器及為婚姻律無別文得罪竝同越度私與禁兵器共為婚姻之罪又準別格諸蕃人所娶得漢婦女為妻妾竝不得將還蕃內又準主客式蕃客入朝於在路不得與客交雜亦不得令客與人言語州縣官人若無事亦不得與客相見即是國內官人百姓不得與客交關私作婚姻同上法如是蕃人入朝聽住之者得娶妻妾若將還蕃內以違敕科之諸越度緣邊關塞者諸緣邊城戍有外姦內入內姦外出而候望者不覺徒一年半主司徒一年疏議曰國境緣邊皆有城戍式遏寇盜預備不虞其有外姦內入謂蕃人為姦或行間諜之類注云謂非衆成師旅者依周禮五百人為旅二千五百人為師此謂小小姦寇抄掠者若成師旅自依擅興律連接寇賊被遣斥候不覺賊來徒三年有內姦外出者謂國內人為姦出向化外或荒海之畔幽險之中候望之人不覺有姦入出合徒一年半雖非候望者但是城戍主司不覺得徒一年謂內外姦人出入之路關於候望者目所堪見為關謂在候望之內也其有姦人入出力所不敵者傳告比近城戍若不速告及告而稽留不即共捕致失姦寇者罪亦如之疏議曰其有姦人入出所經城戍皆即捕之若力所不敵者即須傳告比近城戍令共捕逐若不速告及告而稽留不即共捕致失姦寇者竝徒一年謂非衆成師旅者謂內外姦人出入之路關於候望者諸烽候不警令寇賊犯邊及應舉烽燧而不舉應放多烽而放少烽者各徒三年疏議曰烽候謂從緣邊置烽連於京邑烽燧相應以備非常放烽多少具在別式候望不舉是名不警若令蕃寇犯塞外賊入邊及應舉烽燧而不舉應放多烽而放少烽者各徒三年若放烽已訖而前烽不舉不即往告者罪亦如之以故陷敗戶口軍人城戍者絞疏議曰依職方式放烽訖而前烽不舉者即差腳力往告之不即告者亦徒三年故云亦如之以故陷敗謂從烽候不警及應舉烽燧而不舉或應放多烽而放少烽或放烽訖而前烽不舉不即往告等以故陷敗戶口或是軍人及城戍者各得絞罪即不應舉烽燧而舉若應放少烽而放多烽及繞烽二里內輒放煙火者各徒一年疏議曰依式望見煙塵即舉烽燧若無事故是不應舉若應放少烽而放多烽及繞烽二里內皆不得有煙火謂晝放煙夜放火者自不應舉烽燧而舉以下三事各徒一年放烽多少具在式文其事隱祕不可具引如有犯者臨時舉式科斷故唐律疏議卷第九職制凡二十三條疏議曰職制律者起自於晉名為違制律爰至高齊此名不改惰開皇改為職制律言職司法制備在此篇宮衛事了設官為次故在衛襟之下諸官有員數而署置過限及不應置而置一人杖一百三人加一等十人徒二年疏議曰官有員數謂內外百司雜任以上在令各有員數而署置過限及不應置而置謂格令無員妄相署置注云謂非奏授者即是視六品以下及流外雜任等所司判補一人杖一百三人加一等十人徒二年若是應奏授詐而不實者從詐假法如不合置官而故剩奏授者從上書詐不實論後人知而聽者減前人署置一等規求者為從坐被徴須者勿論即軍務要速量事權置者不用此律疏議曰前人署置過限及不應置而置後人知其剩員而聽任者減初置人罪一等謂一人杖九十四人以上杖一百七人以上徒一年十人徒一年半規求者為從坐謂人自規求而任者為初置官從坐合杖九十被徴須者謂被徴召而補者勿論即軍務要速量事權置者謂行軍之所須置權官不當署置之罪故云不用此律謂非奏授者諸貢舉非其人及應貢舉而不貢舉者一人徒一年二人加一等罪止徒三年疏議曰依令諸州歲別貢人若別敕令舉及國子諸館年常送省者為舉人皆取方正清循名行相副若德行無聞妄相推薦或才堪利用蔽而不舉者一人徒一年二人加一等罪止徒三年注云非其人謂德行乖僻不如舉狀者若使名實乖違即是不如舉狀縱使試得及第亦退而獲罪如其德行無虧唯試策不及第減乖僻者罪二等率五分得三分及第者不坐謂試五得三試十得六之類所貢官人皆得免罪若貢五得二科三人之罪貢十得三科七人之罪但有一人德行乖僻不如舉狀即以乖僻科之縱有得第者多竝不合共相準折若考校課試而不以實及選官乖於舉狀以故不稱職者減一等疏議曰考校謂內外文武官寮年終應考校功過者其課試謂貢舉之人藝業伎能依令課試有數若其官司考試不以實及選官乖於所舉本狀以故不稱職者謂不習典憲任以法官明練經史授之武職之類各減貢舉非其人罪一等負殿應附不附者依令私坐每一斤為一負公罪二斤為一負各十負為一殿校考之日負殿皆悉附狀若故違不附及不應附而附者謂蒙別敕放免或經恩降公私負殿竝不在附限若犯免官以上及贓賄入己恩前獄成仍附景迹除此等罪竝不合附而故附致使考校有升降者得罪亦同謂與考校課試不實罪同亦減貢舉非其人罪一等失者各減三等承言不覺又減一等知而聽行與同罪疏議曰失者各減三等謂意在堪貢心不涉私不審德行有虧得減故罪三等自試不及第以下應附不附以上失者又各減三等諸條失者準此謂一部律內公事錯失本條無失減之文者竝準此減三等承言不覺亦從貢舉以下承校試人言不覺差失從失減三等上更減一等故云又減一等知而聽行亦從貢舉以下知非其人或試不及第考校課試知其不實或選官乖狀各興同罪謂各與初試者同罪非其人謂德行乖僻不如舉狀者若試不及第減二等率五分得三分及第者不坐負殿應附而不附及不應附而附致考有升降者罪亦同餘條失者準此諸刺史縣令折衝果毅私自出界者杖一百疏議曰州縣有境界折衝府有地團不因公事私自出境界者杖一百注云經宿乃坐既不云經日即非百刻之限但是經宿即合此坐經宿乃坐諸在官應直不直應宿不宿各笞二十通晝夜者笞三十疏議曰依令內外官應分番宿直若應直不直應宿不宿晝夜不相須各笞二十通晝夜不直者笞三十若點不到者一點笞十疏議曰內外官司應點檢者或數度頻點點即不到者一點笞十注云一日之點限取二點為坐謂一日之內點檢雖多止據二點得罪限笞二十若全不來上計日以無故不上科之問曰二日以上日別常向曹司曹司點檢每點不到若科無故不上即是日別常來若以纍點科之罪又重於不上假有十日之內日別皆來每點不到欲科何罪答曰八品以下頻點不到便是已發更犯合重其事纍點科之如非流內之人自須當日決放初雖纍點罪重點多不至徒刑計日不上初輕日多即至徒坐所以日別上者據點全不來者計日以此處斷實允刑名一日之點限取二點為坐諸官人無故不上及當番不到疏議曰官人者謂內外官人無故不上當番不到謂分番之人應上不到注云雖無官品謂但在官分番者得罪亦同官人之法下條準此者謂之官限滿不赴及官人從駕稽違及從而先還雖無官品亦同官人之法若因假而違者一日笞二十三日加一等過杖一百十日加一等罪止徒一年半邊要之官加一等疏議曰官人以下雜任以上因給假而故違竝一日笞二十三日加一等二十五日合杖一百三十五日徒一年四十五日徒一年半邊要之官謂在緣邊要重之所無故不上以下各加罪一等雖無官品但分番上下亦同下條準此諸之官限滿不赴者一日笞十十日加一等罪止徒一年即代到不還減二等疏議曰依令之官各有裝束程限限滿不赴一日笞十十日加一等罪止徒一年其替人已到淹留不還準不赴任之程減罪二等其有田苗者依令聽待收田訖發遣無田苗者依限須還諸官人從駕稽違及從而先還者笞四十三日加一等過杖一百十日加一等罪止徒二年侍臣加一等疏議曰官人謂百官應從駕者流外以下應從人亦同官人之罪其書吏書僮之類差逐官人者不在此限其有稽違不到及從而先還者雖不滿日笞四十三日加一等過杖一百十日加一等罪止徒二年侍臣謂中書門下省五品以上依令應侍從者加罪一等諸大祀不預申期及不頒所司者杖六十以故廢事者徒二年疏議曰依令大祀謂天地宗廟神州等為大祀或車駕自行或三公行事齊官皆散齊之日平明集省受誓誠二十日以前所司預申祠部祠部頒告諸司其不預申期及不頒下所司者杖六十即雖申及頒下事不周悉所坐亦同以故廢祠祀事者所由官司徒二年應連坐者各依公坐法節級得罪牲牢玉帛之屬不如法杖七十闕數者杖一百全闕者徒一年疏議曰牲謂牛羊豕牢者牲之體玉謂蒼璧祀天璜琮祭地五方上帝各依方色帛謂幣帛稱之屬者謂黍稷以下不依禮令之法一事有違合杖七十一事闕少合杖一百一坐全闕合徒一年其本是中小祀雖從大祀受祭若有少闕各依中小祀遞減之法闕坐更多罪不過此餘祀闕坐皆準此即入散齊不宿正寢者一宿笞五十致齊不宿本司者一宿杖九十一宿各加一等中小祀遞減二等疏議曰依令大祀散齊四日致齊三日中祀散齊三日致齊二日小祀散齊二日致齊一日散齊之日齊官晝理事如故夜宿於家正寢不宿正寢者一宿笞五十一宿加一等其無正寢者於當家之內餘齊房內宿者亦無罪皆不得習穢惡之事故禮云三日齊一日用之猶恐不敬致齊者兩宿宿本司一宿宿祀所無本司及本司在皇城外者皆於郊社太廟宿齊若不宿者一宿杖九十一宿加一等通上散齊故云各加一等中小祀者謂社稷日月星辰嶽鎮海帝社等為中祀司中司命風師雨師諸星山林川澤之屬為小祀從大祀以下犯者中祀減大祀二等小祀減中祀二等故云各遞減二等注凡言祀者祭享同餘條中小祀準此疏議曰依祀令在天稱祀在地為祭宗廟名享今直舉祀為例故曰凡言祀者祭享同餘條中小祀準此但在中祀有犯皆減大祀二等小祀有犯皆減中祀二等謂下條大祀在散齊弔喪問疾賊盜律盜太祀神御物之類本條無中小祀罪名者準此遞減全闕謂一坐凡言祀者祭享同餘條中小祀準此諸大祀在散齊而用喪問疾判署刑殺文書及決罰者笞五十奏聞者杖六十致齊者各加一等疏議曰大祀散齊四日竝不得弔喪亦不得問疾刑謂定罪殺謂殺戮罪人此等文書不得判署及不得決罰杖笞違者笞五十若以此刑殺決罰事奏聞者杖六十若在致齊內犯者各加一等中小祀犯者各遞減二等諸祭祀及有事於園陵若朝會侍衛行事失錯及違失儀式者笞四十疏議曰稱祭祀者享亦同及有事於園陵謂謁陵等事若朝會謂百官朝參集會及侍衛祭祀之事行事失錯及違失儀式者笞四十注云謂言辭誼囂坐立怠慢謂聲高誼鬧坐立不正不依儀式與衆乖者乃坐應集而主司不告及告而不至者各笞五十疏議曰應集謂祭祀以下及餘事合集之人而主司不頒告令集罪在主司告而不至獨坐不至者故云各笞五十謂言辭誼囂坐立怠慢乖衆者乃坐諸廟享知有緦麻以上喪遣充執事者笞五十陪從者笞三十主司不知勿論有喪不自言者罪亦如之其祭天地社稷則不禁疏議曰廟享為吉事左傳曰吉禘於莊公其有緦麻以上慘不得預其事若知有緦麻以上喪遣充執事者主司笞五十雖不執事遣陪從者主司笞三十若主司不知前人有喪者勿論即有喪不自言而冒充執事及陪從者亦如之其祭天地社稷不禁者禮云唯祭天地社稷為越紼而行事不避有慘故云則不禁諸合和御藥誤不如本方及封題誤者醫絞疏議曰合和御藥須先處方依方合和不得差誤若有錯誤不如本方謂分兩多少不如本方法之類合成仍題封其上注藥遲駛冷熱之類并寫本方俱進若有誤不如本方及封題有誤等但一事有誤醫即合絞醫謂當合和藥者名例大不敬條內已具解訖料理簡擇不精者徒一年未進御者各減一等監當官司各減醫一等疏議曰料理謂應熬削洗漬之類簡擇謂去惡留善皆須精細之類有不精者徒一年其藥未進御者各減一等謂應絞者從絞上減應徒者從徒上減是名各減一等監當官司依令合和御藥在內諸省省別長官一人并當上大將軍將軍衛別一人與尚藥奉御等監視藥成醫以上先嘗除醫以外皆是監當官司竝於已進未進上各減醫罪一等注云餘條未進御者謂下條造御膳御幸舟船乘輿服御物但應供奉之物未進御者各隨輕重減一等監當官司又各減一等故云竝準此餘條未進御及監當官司竝準此諸造御膳誤犯食禁者主食絞若穢惡之物在食飮中徒二年簡擇不精及進御不時減二等不品嘗者杖一百疏議曰造御膳者皆依食經經有禁忌不得輒造若乾脯不得入黍米中莧菜不得和鱉肉之類有所犯者主食合絞若穢惡之物謂物是不潔之類在食飮中徒二年若簡擇不精者謂簡米擇菜之類有不精好及進御不時者依禮飯齊視春宜溫羹齊視夏宜熱之類或期夕曰中進奉失度及冷熱不時者減罪二等謂從徒二年減二等不品嘗者杖一百謂酸鹹苦辛之味不品及應嘗不嘗俱得杖一百之罪諸御幸舟船誤不牢固者工匠絞疏議曰御幸舟船者皇帝所幸舟船謂造作莊嚴不甚牢固可以敗壞者工匠合絞注云各以所由為首明造作之人皆以當時所由人為首若不整飾及闕少者徒二年疏議曰其舟船若不整頓修飾及在船蒿棹之屬所須者有所闕少得徒二年此亦以所由為首監當官司各減一等工匠各以所由為首諸乘輿服御物持護修整不如法者杖八十若進御乖失者杖一百其車馬之屬不調習駕馭之具不完牢徒二年未進御減三等疏議曰乘輿所服用之物皆有所司執持修整自有常法不如法者杖八十若進御乖失者依禮授立不跪授坐不立之類各依禮法如有乖失違法者合杖一百其車馬之屬不調習駕馭之具不完牢者車謂駱車馬謂御馬其之屬謂羊車及輦等升車則馬動馬動則鑾鳴之類是為調習若不如此或御馬驚駭車輿及鞍轡之屬有損壞各徒二年雖不如法未將進御者減三等應供奉之物闕乏者徒一年其雜供有闕笞五十疏議曰應供奉之物謂衣服飮食之類但是應供奉者皆須預備有闕乏者即徒一年雜供有闕者謂非尋常應供奉之物可供而闕者笞五十諸主司私借乘輿服御物若借人及借之者徒三年非服而御之物徒一年在司服用者各減一等疏議曰乘輿服御物主司持護修整常須如法若有私借或將借人及借之者各徒三年非服而御之物謂除服御物之外應供御所用者得徒一年雖非自借及借人在司服用者各減罪一等服御物徒三年上減非服而御徒一年上減是為各減一等注非服而御謂帷帳几杖之屬疏議曰帷帳几杖之屬者謂筆硯書史器玩等是應供御所須非服用之物色類既多故云之屬非服而御謂帷帳几杖之屬諸監當官司及主食之人誤將雜藥至御膳所者絞疏議曰御廚造膳從造至進皆有監當官司依令主食升階進食但是雜藥誤將至御膳所者絞雜藥謂合和為藥堪服餌者若有毒性雖不合和亦為雜藥所謂監當之人應到之處諸外膳犯食禁者供膳杖七十若穢惡之物在食飮中及簡擇不淨者笞五十誤者各減二等疏議曰百官常食以上皆官廚所營名為外膳故注云謂供百官犯食禁者食禁已上解訖若有犯者所由供膳杖七十穢惡之物謂不淨物之類在食飮中及簡擇有不淨其所由者得笞五十若有誤失者各減二等誤犯食禁者笞五十誤簡不淨笞三十謂供百官諸漏泄大事應密者絞疏議曰依鬪訟律知謀反及大逆者密告隨近官司其知諜反大逆謀叛皆合密告或掩襲寇賊此等是大事應密不合人知輒漏泄者絞注云大事謂潛謀討襲者討謂命將誓師潛謀征討襲謂不聲鍾鼓掩其不備者既有潛謀討襲之事及收捕反逆之徒故云謀叛之類非大事應密者徒一年半漏泄於蕃國使者加一等仍以初傳者為首傳至者為從即轉傳大事者杖八十非大事勿論疏議曰非大事應密謂依令仰觀見風雲氣色有異密封奏聞之類有漏泄者是非大事應密合徒一年半國家之事不欲蕃國聞知若漏泄於蕃國使者加一等合徒二年其大事縱漏泄於蕃國使亦不加至斬漏泄之事以初傳者為首首謂初漏泄者傳至者為從謂傳至罪人及蕃使者其間展轉相傳大事者杖八十非大事者勿論非大事雖應密而轉傳之人竝不坐大事謂潛謀討襲及收捕謀叛之類諸玄象器物天文圖書讖書兵書七曜曆太一雷公式私家不得有違者徒二年其緯候及論語讖不在禁限疏議曰玄象者玄天也謂象天為器具以經星之文及日月所行之道轉之以觀時變易曰玄象著明莫大於日月故天垂象聖人則之尚書云在璇璣玉衡以齊七政天文者史記天官書云天文日月五星二十八宿等故易曰仰則觀於天文圖書者河出圖洛出書是也讖書者先代聖賢所記未來徴祥之書兵書謂太公六韜黃石公三略之類七曜曆謂日月五星之曆太一雷公式者竝是式名以占吉凶者私家皆不得有違者徒二年若將傳用言涉不順者自從造祅言之法私習天文者謂非自有書轉相習學者亦得二年徒坐緯候及讖者五經緯尚書中候論語讖竝不在禁限私習天文者亦同諸稽緩制書者一日笞五十一日加一等十日徒一年疏議曰制書在令無有程限成案皆云即日行下稱即日者謂百刻內也寫程通計符移關牒滿二百紙以下給二日程過此以外每二百紙以下加一日程所加多者總不得過五日其赦書計紙雖多不得過三日軍務急速皆當日竝了成案及計紙程外仍停者是焉稽緩一日笞五十注云謄制敕符移之類謂奉正制敕更謄已出符移關解刺牒皆是故言之類一日加一等計六日杖一百十日徒一年即是罪止其官文書稽程者一日笞十三日加一等罪止杖八十疏議曰官文書謂在曹常行非制敕奏抄者依令小事五日程中事十日程大事二十日程徒以上獄案辨定須斷者三十日程其通判及勾經三人以下者給一日程經四人以上給二日程大事各加一日程若有機速不在此例機速謂軍機急速不必要準案程應了不了亦準稽程法除此之外皆準事稽程者一日笞十三日加一等罪止杖八十謄制敕符移之類皆是諸被制書有所施行而違者徒二年失錯者杖一百疏議曰被制書謂奉制有所施行而違者徒二年若非故違而失錯旨意者杖一百問曰條云被制書施行而違者徒二年未知敕及奏抄得罪同否答曰上條稽緩制書注云謄制敕符移之類皆是即明制敕之義輕重不殊其奏抄御親畫聞制則承旨宣用御畫不輕承旨理與制書義同失錯謂失其旨諸受制忘誤及寫制書誤者事若未失笞五十已失杖七十轉受者減一等疏議曰謂承制之人忘誤其事及寫制書脫剩文字竝文字錯失事若未失者謂未失制書之意合笞五十已失謂已失事意而施行合杖七十轉受者減一等若宣制忘誤及寫制失錯轉受者雖自錯讓為非親承制敕故減一等未失其事合笞四十事若已失合杖六十故云轉受者減一等故唐律疏議卷第十職制凡一十九條諸制書有誤不即奏聞輒改定者杖八十官文書誤不請官司而改定者笞四十知誤不奏請而行者亦如之輒飾文者各加二等疏議曰制書有誤謂旨意參差或脫剩文字於理有失者皆合覆奏然後改正施行不即奏聞輒自改定者杖八十官文書謂常行文書有誤於事改動者皆須請當司長官然後改正若有不請自改定者笞四十知制書誤不奏知官文書誤不請依錯施行亦如之制書誤得杖八十官文書誤得笞四十依公式令下制敕宣行文字脫誤於事理無改動者勘檢本案分明可知即改從正不須覆奏其官文書脫誤者咨長官改正輒飾文字者各加二等謂非動事修飾其文制書合杖一百官文書合杖六十若動事自從詐增滅法諸上書若奏事誤犯宗廟諱者杖八十口誤及餘文書誤犯者笞五十疏議曰上書若奏事皆須避宗廟諱有誤犯者杖八十若奏事口誤及餘文書誤犯者各笞五十即為名字觸犯者徒三年若嫌名及二名偏犯者不坐疏議曰普天率土莫匪王臣制字立名輒犯宗廟諱者合徒三年若嫌名者則禮云禹與雨謂聲嫌而字殊丘與區意嫌而理別及二名偏犯者謂復名而單犯竝不坐謂孔子母名徴在孔子云季孫之憂不在顓臾即不言徴又云杞不足徴即不言在此色既多故云之類嫌名謂若禹與雨兵與區二名謂言徴不言在言在不言徴之類諸上書若奏事而誤杖六十口誤減二等疏議曰上書謂書奏特達奏事謂面陳有誤者杖六十若口誤減二等合笞四十若口奏雖誤事意無失者不坐上尚書省而誤笞四十餘文書誤笞三十疏議曰上尚書省而誤者謂內外百司應申尚書省而有文字脫剩及錯失者合笞四十餘文書誤者謂非上尚書省凡是官文書誤者合笞三十即誤有害者各加三等疏議曰上書奏事誤有害者合杖九十上尚書省誤有害者合杖七十餘文書誤有害者合杖六十是名各加三等注云有害謂當言勿原而言原之當言千匹而言十匹之類稱之類者自須以類求之類例既多事非一端假有犯罪當言原之而言勿原當言勿原而言原之承誤已行決及原放訖者此即當條雖有罪名所為重者自從失出入論不可直從有害加三等若誤可行非上書奏事者勿論疏議曰上尚書省以下雖誤案驗可行者皆不坐可行者謂案驗其狀省察是非不容更有別議當言甲申之日而言甲由之日如此之類是案省可知雖誤皆不合罪口誤不失事者勿論誤謂脫剩文字及錯失者有害謂當言勿原而言原之當言千匹而言十匹之類可行謂案省可知不容有異議當言甲申而言甲由之類諸事應奏而不奏不應奏而奏者杖八十應言上而不言上不應言上而言上及不由所管而越言上應行下而不行下及不應行下而行下者各杖六十疏議曰應奏而不奏者謂依律令及式事應合奏而不奏或格令式無合奏之文及事理不須聞奏者是不應奏而奏竝合杖八十應言上者謂合申上而不言上注云雖奏上不待報而行亦同謂事合奏及已申上應合待報者皆須待報而行若不待報而輒行者亦同不奏不申之罪若據文且奏且行或申奏知不須待報者不當此坐不應言上者依律令及格式不遣言上而輒言上及不由所管而越言上者假謂州管縣都督管州州縣事須上省皆須先申所管州府不申而越言上者并事應行下而不行下不應行下而行下者謂應出符移關牒刺而不出行下不應出符移關牒刺而出行下者各杖六十雖奏上不待報而行亦同諸公文有本案事直而代官司署者杖八十代判者徒一年亡失案而代者各加一等疏議曰公文謂在官文書有本案事直唯須依行或奏狀及符移關解刺牒等其有非應判署之人代官司署案及署應行文書者杖八十若代判者徒一年其亡失案而代者各加一等代署者杖九十代判者徒一年半此皆謂事直而代者若有增減出入罪重者即從重科依令授五品以上畫可六品以下畫聞代畫者即同增減制書其有制可字侍中所注止當代判之罪諸受制出使不返制命輒干他事者徒一年半以故有所廢闕者徒三年餘使妄干他事者杖九十以故有所廢闕者徒一年越司侵職者杖七十疏議曰受制敕出使事訖皆須返命奏聞若不返命更不預他事者徒一年半以故有所廢闕者徒三年餘使謂非制使妄干他事者杖九十以故有所廢闕者徒一年越司侵職者謂設官分職各有司存越其本局侵入職掌杖七十其受三后及皇太子令出使不返命得罪依減制敕一等諸聞父母若夫之喪匿不舉哀者流二千里喪制未終釋服從吉若忘哀作樂徒三年雜戲徒一年即遇樂而聽及參預吉席者各杖一百疏議曰父母之恩昊天莫報荼毒之極豈若聞喪婦人以夫為天哀類父母聞喪即須哭泣豈得擇日待時若匿而不即舉哀者流二千里其嫡孫承祖者與父母同喪制未終謂父母及夫喪二十七月內釋服從吉若忘哀作樂注云自作遣人等徒三年其父卒母嫁及為祖後者祖在為祖母若出妻之子竝居心喪之內未合從吉若忘哀作樂自作遣人等亦徒三年雜戲徒一年樂謂金石絲竹笙歌鼓舞之類雜戲謂樗蒲雙陸彈碁象博之屬即遇樂而聽謂因逢奏樂而遂聽者參預吉席謂遇逢禮宴之席參預其中者各杖一百聞期親尊長喪匿不舉哀者徒一年喪制未終釋服從吉杖一百大功以下尊長各遞減二等卑幼各減一等疏議曰期親尊長謂祖父母曾高父母亦同伯叔父母姑兄姊夫之父母妾為女君此等聞喪即須舉發若匿不舉哀者徒一年喪制未終謂未踰期月釋服從吉者杖一百大功尊長匿不舉哀杖九十未踰九月釋服從吉杖八十小功尊長匿不舉哀杖七十未踰五月釋服從吉杖六十緦麻尊長匿不舉哀笞五十未踰三月釋服從吉笞四十其於卑幼匿不舉哀及釋服從吉各減當色尊長一等出降者謂姑姊妹本服期出嫁九月若於九月內釋服從吉者罪同期親尊長科之其服數止準大功之月餘親出降準此若有殤降為七月之類亦準所降之月為服數之限罪依本服科之其妻既非尊長又殊卑幼在禮及詩比為兄弟即是妻同於幼問曰聞喪不即舉哀於後擇日舉訖事發合得何罪答曰依禮斬衰之哭往而不返齊衰之哭若往而返大功之哭三曲而偯小功緦麻哀容可也準斯禮制輕重有殊聞喪雖同情有降殺期親以上不即舉哀後雖舉訖不可無罪期以上從不應得寫重大功從不應得為輕小功以下哀容可也不合科罪若未舉事發者各從不舉之坐又問居期喪作樂及遣人作律條無文合得何罪答曰禮云大功將至辟琴瑟鄭注云亦所以助哀又云小功至不絶樂喪服云古者有死於宮中者即三月為之不舉樂況乎身服期功心忘寧戚或遣人作樂或自奏管絃既玷大猷須加懲誡律雖無文不合無罪從不應為之坐期喪從重杖人八十大功以下從輕笞四十緦麻卑幼不可重於釋服之罪自作遣人等諸府號官稱犯父祖名而冒榮居之祖父母父母老疾無侍委親之官即妄增年狀以求入侍及冒哀求仕者徒一年疏議曰府有正號官有名稱府號者假若父名衛不得於諸衛任官或祖名安不得年長安縣職之類官稱者或父名軍不得作將軍或祖名卿不得居卿任之類皆須自言不得輒受其有貪榮昧進冒居此官祖父母父母老疾委親之官謂年八十以上或篤疾依法合侍見無人侍乃委置其親而之任所妄增年狀以求人侍者或未年八十及本非篤疾乃妄增年八十及篤疾之狀及冒哀求仕者謂父母之喪二十五月大祥後未滿二十七月而預選求仕從府號官稱以下各合處徒一年注云謂父母喪禫制未除但父母之喪法合二十七月二十五月內是正喪若釋服求仕即當不孝合徒三年其二十五月外二十七月內是禫制未除此中求仕名為冒哀合徒一年若釋去禫服而求仕自從釋服從吉之法及在心喪內者謂妾子及出妻之子合降其服皆二十五月內為心喪若祖父母父母及夫犯死罪被囚禁而作樂者徒一年半疏議曰祖父母父母及夫犯死罪被囚禁而子孫及妻妾作樂者以其不孝不義虧斁特探故各徒一年半謂父母喪禫制未除及在心喪內者諸指斥乘輿情理切害者斬非切害者徒二年疏議曰指斥謂言議乘輿原情及理俱有切害者斬注云言議政事乖失而涉乘輿者上請謂論國家法式言議是非而因涉乘輿者與指斥乘輿情理稍異故律不定刑名臨時上請非切害者徒二年謂語雖指斥乘輿而情理非切害者處徒二年對捍制使而無人臣之禮者絞疏議曰謂奉制敕使人有所宣告對使拒捍不依人臣之禮既不承制命又出拒捍之言者合絞注云因私事鬪競者非謂不涉制敕別因他事私自鬪競或雖因公事論競不干預制敕者竝從毆詈本法言議政事乖失而涉乘輿者上請因私事鬪競者非諸驛使稽程者一日杖八十二日加一等罪止徒二年疏議曰依令給驛者給銅龍傳符無傳符處為紙券量事緩急注驛數於符契上據此驛數以為行程稽此程者一日杖八十二日加一等罪止徒二年若軍務要速加三等有所廢闕者違一日加役流以故陷陷戶口軍人城戌者絞疏議曰軍務要速謂是征討掩襲報告外境消息及告賊之類稽一日徒一年十一日流二千里是為加三等有所廢闕者謂稽遲廢闕經略掩襲告報之類違一日加役流稱日者須滿百刻為由驛使稽遲遂陷敗戶口軍人衛士募人防人一人以上及諸城戍者絞若臨軍對寇告報稽期者自從乏軍興之法諸驛使無故以書寄人行之及受寄者徒一年若致稽程以行者為首驛使為從即為軍事警急而稽留者以驛使為首行者為從其非專使之書而便寄者勿論疏議曰有軍務要速或追徴報告如此之類遣專使乘驛齎送文書無故謂非身患及父母喪者以所齎文書別寄他人送之及受寄文書者各徒一年若致稽程謂行不充驛數計程重於徒一年者即以受書行者為首驛使為從此謂常行驛使而立罪名即為軍事警急報告征討掩襲救援及境外消息之類而稽留罪在驛使故以驛使為首行者為從注云有所廢闕者從前條謂違一日加役流以故陷敗戶口軍人城戍者絞其非專使之書謂非故遣專使所齎之書因而附之其使人及受寄人竝勿論有所廢闕者從前條諸文書應遣驛而不遣驛及不應遣驛而遣驛者杖一百若依式應須遣使詣闕而不遣者罪亦如之疏議曰依公式令在京諸司有事須乘驛及諸州有急速大事皆合遣驛而所司乃不遣驛非應遣驛而所司乃遣驛若違者各杖一百又依儀制令皇帝踐祚及加元服皇太后加號皇后皇太子立及赦元日刺史若京官五品以上在外者竝奉表疏賀州遣使餘附表此即應遣使詣闕而不遣者亦合杖一百故云罪亦如之諸驛使受書不依題署誤詣他所者隨所稽留以行書稽程論減二等若由題署者誤坐其題署者疏議曰文書行下各有所詣應封題署者具注所詣州府使人乃不依題署誤詣他所因此稽程者隨所稽留準上條行書稽留之程減二等謂違一日杖六十二日加一等罪止徒一年若有軍務要速者加三等有所廢闕者從加役流上減二等徒二年半以故有所陷敗亦從絞上減二等徒三年若由題署者誤謂元題署者錯誤即罪其題署之人驛使不坐諸增乘驛馬者一匹徒一年一匹加一等主司知情與同罪不知情者勿論疏議曰依公式令給驛職事三品以上若王四匹四品及國公以上三匹五品及爵三品以上二匹散官前官各遞減職事官一匹餘官爵及無品人各一匹皆數外別給驛子此外須將典吏者臨時量給此是令文本數數外剩取是曰增乘一匹徒一年一匹加一等應乘驛驢而乘驛馬者又準駕部式六品以下前官散官衛官省司差使急速者給馬使回及餘使竝給驢即是應乘驢之人而乘馬各減增乘馬罪一等主司知情與同罪者謂驛馬主司知增乘驛馬及知應乘驢而乘馬等情者皆與乘者同罪不知情者勿論餘條驛司準此者謂枉道及越過齎私物之類應乘驛驢而乘馬者減一等餘條驛司準此諸乘驛馬輒枉道者一里杖一百五里加一等罪止徒二年越至他所者各加一等經驛不換馬者杖八十疏議曰乘驛馬者皆依驛路而向前驛若不依驛路別行是為枉道越至他所者注云謂越過所詣之處假如從京使向洛州無故輒過洛州以東即計里加枉道一等經驛不換馬至所經之驛若不換馬者杖八十因而致死依廏牧令乘官畜産非理致死者備償無馬者不坐謂在驛無馬越過者無罪因而致死者不償問曰假有使人乘驛馬枉道五里經過反覆往來便經十里如此犯者從何科斷答問律云枉道本慮馬勞又恐行遲於事稽廢既有往來之理亦計十里科論謂越過所詣之處無馬者不坐諸乘驛馬齎私物一斤杖六十十斤加一等罪止徒一年驛驢減二等疏議曰乘驛馬者唯得齎隨身所須衣杖衣謂衣被之屬杖謂弓刀之類除此之外輒齎行者一斤杖六十十斤加一等罪止徒一年驛驢減二等謂一斤笞四十罪止杖九十餘條驛驢準此者謂稽程枉道之類諸條驛驢得罪皆準馬減二等謂非隨身衣杖者餘條驛驢準此諸在外長官及使人於使處有犯者所部屬官等不得即推皆須申上聽裁若犯當死罪留身待報違者各減所犯罪四等疏議曰在外長官謂都督刺史折衝果毅鎮將縣令關監等長官及諸使人於使處有犯者所部次官以下及使人所詣之司官屬竝不得輒即推鞫若無長官次官執魚印者亦同長官皆須先申上司聽裁若犯當死罪謂據糾告之狀合死者散留其身待上報下違者各減所犯罪四等留身者印及管鑰付知事次官其銅魚仍留擬勘敕符雖復留身未合追納諸用符節事訖應輸納而稽留者一日笞五十二日加一等十日徒一年疏議曰依令用符節竝由門下省其符以銅為之左符進內右符在外應執符人有事行勘皆奏出左符以合右符所在承用事訖使人將左符還其使若向他處五日內無使次者所在差專使送門下省輸納其節大使出即執之使還亦即迭納應輸納而稽留者一日笞五十二日加一等十日徒一年雖更違日罪亦不加其傳符通用紙作乘驛使人所至之處事雖未訖且納所司事了欲還然後更請至門下送輸既無限日行至即納違日者既非銅魚之符不可依此科斷自依紙券加官文書稽罪一等其禁苑門符及交巡魚符若木契等於餘修得減罪二等輸納稽遲者準例亦減二等若木契應發兵者同上符節之罪諸公事應行而稽留及事有期會而違者一日笞三十三日加一等過杖一百十日加一等罪止徒一年半疏議曰凡公事應行者謂有所部送不限有品無品而輒稽留及事有期會謂若朝集使及計帳使之類依令各有期會而違不到者一日笞三十三日加一等過杖一百十日加一等罪止徒一年半但事有期限者以違限日為坐無限者以付文書及部領物後計行程為罪即公事有限主司符下乖期者罪亦如之若誤不依題署及題署誤以致稽程者各減二等疏議曰公事有限與上文事有期會義同上文謂在下有違此文謂主司符下乖期者罪亦如之竝同違期會之罪若使人不依題署錯詣他所及由曹司題署有誤而致稽程者各減二等謂違一日笞三十減二等笞十罪止徒一年半減二等各合杖一百故唐律疏議卷第十一職制凡一十七條諸奉使有所部送而雇人寄人者杖一百闕事者徒一年受寄雇者減一等疏議曰奉使有所部送謂差為綱典部送官物及囚徒畜産之屬而使者不行乃雇人寄人而領送者使人合杖一百闕事者謂於前事有所廢闕合徒一年其受寄及受雇者不闕事杖九十闕事杖一百故云減一等即綱典自相放代者笞五十取財者坐贓論闕事者依寄雇闕事法仍以綱為首典為從疏議曰或綱獨部送而放典不行或典自領行而留綱不去此為自相放代笞五十受財者坐贓論其闕事及不闕事并受財輸財者皆以綱為首典為從假有兩綱兩典一綱一典與財代行一綱一典與財得住與財者坐贓論減五等縱典發意亦以綱為首典為從取財者坐贓論其贓既是彼此俱罪仍合沒官其受雇者已減使罪一等不合計贓科罪其贓不徴若監臨官司將所部典行放取物者竝同監臨受財之法不同綱典之罪即雖監臨元止一典放住代行者亦同綱典之例諸在官長吏實無政迹輒立碑者徒一年若遣人妄稱己善申請於上者杖一百有贓重者坐贓論受遣者各減一等疏議曰在官長吏謂內外百司長官以下臨統所部者未能導德齊禮移風易俗賞無政迹妄述己功崇飾虛辭諷諭所部輒立碑頌者徒一年所部為其立碑頌者為從坐若遣人妄稱己善申請於上者杖一百若虛狀上表者從上書詐不實徒二年有贓重者坐贓論謂計贓重於本罪者從贓而斷受遣者各減一等各謂立碑者徒一年上減申請於上者杖一百上減若官人不遣立碑百姓自立及妄申請者從不應為重科杖八十其碑除毀注雖有政迹而自遣者亦同疏議曰官人雖有政迹而自遣所部立碑或遣申請者官人亦依前科罪若所部自立及自申上不知不遣者不坐雖有政迹而自遣者亦同諸有所請求者笞五十主司許者與同罪已施行各杖一百疏議曰凡是公事各依正理輒有請求規為曲法者笞五十即為人請求雖非己事與自請同亦笞五十主司許者謂然其所請亦笞五十故云與同罪若主司不許及請求之人皆不坐已施行謂曲法之事已行主司及請求之者各杖一百本罪仍坐所枉罪重者主司以出入人罪論他人及親屬為請求者減主司罪三等自請求者加本罪一等疏議曰所枉重者謂所司得囑請枉曲斷事重於一百杖者主司得出入人罪論假如先是一年徒罪囑請免徒主司得出入徒罪還得一年徒坐他人及親屬為請求者減主司罪三等唯合杖八十此則減罪輕於已施行杖一百如此之類皆依杖一百科之若他人親屬等囑請徒二年半罪主司曲為斷免者他人等減三等仍合徒一年如此之類減罪重於杖一百者皆從減科若身自請求而得王法者各加所請求罪一等科之即監臨勢要為人囑請者杖一百所枉重者罪與主司同至死者減一等疏議曰監臨者謂統攝案驗之官勢要者謂除監臨以外但是官人不限階品高下唯據主司畏懼不敢乖違者雖官卑亦同為人囑請曲法者無問行與不行許與不許但囑即合杖一百主司許者笞五十所枉重於杖一百與主司出入坐同主司據法合死者監臨勢要合減死一等謂從主司求曲法之事即為人請者與自請同主司不許及請求者皆不坐勢要者雖官卑亦同諸受人財而為請求者坐贓論加二等監臨勢要準枉法論與財者坐贓論減三等疏議曰受人財而為請求者謂非監臨之官坐贓論加二等即一尺以上笞四十一匹加一等罪止流二千五百里監臨勢要準枉法論即一尺以上杖一百一匹加一等罪止流三千里無祿者減一等與財者坐贓論減三等罪止徒一年半若受他人之財許為囑請未囑事發者止從坐贓之罪若無心囑請詭妄受財自依詐欺科斷取者雖是詐欺與人終是求請其贓亦合追沒其受所監臨之財為他司囑請律無別文止從坐贓加二等罪止流二千五百里即重於受所監若未囑事發止同受所監臨財物法若官人以所受之財分求餘官元受者併贓論餘各依己分法疏議曰謂有官之人初受有事家財物後減所受之物轉求餘官初受者併贓論餘官各依己分法假有判官受得枉法贓十匹更有兩官連判各分二匹與之判官得十匹之罪餘官各得二匹之坐二人仍竝為二匹之從其有共謀受財分贓人己者亦各依己分為首從之法其中雖有造意及以預謀不受財者事若枉法止依曲法首從論不合據贓為罪如曲法罪輕從知所部有犯法不舉劾減罪人罪三等科之諸有事以財行求得枉者坐贓論不枉法者減二等即同事共與者首則併贓論從者各依己分法疏議曰有事之人用財行求而得枉法者坐贓論不枉法者謂雖以財行求官人不為曲判者減坐贓二等即同事共與者謂數人同犯一事斂財共與元謀斂者併臟為首仍倍論其從而出財者各依己分為從諸監臨主司受財而枉法者一尺杖一百一匹加一等十五匹絞疏議曰監臨主司謂統攝案驗及行案主典之類受有事人財而為曲法處斷者一尺杖一百一匹加一等十五匹絞不枉法者一尺杖九十二匹加一等三十匹加役流疏議曰雖受有事人財判斷不為曲法一尺杖九十二匹加一等三十匹加役流無祿者各減一等枉法者二十匹絞不枉法者四十匹加役流疏議曰應食祿者具在祿令若令文不載者竝是無祿之官受財者各減有祿一等枉法者二十匹絞不枉法者四十匹加役流諸有事先不許財事過之後而受財者事若枉準枉法論事不枉者以受所監臨財物論疏議曰官司推劾之時有事者先不許物事了之後而受財者事若曲法準前條枉法科罪既稱準枉法不在除免加役流之例若當時處斷不違正理事過之後而與之財者即以受所監臨財物論諸監臨之官受所監臨財物者一尺笞四十一匹加一等八匹徒一年八匹加一等五十匹流二千里與者減五等罪止杖一百疏議曰監臨之官不因公事而受監臨內財物者計贓一尺以上笞四十一匹加一等八匹徒一年八匹加一等五十匹流二千里與財之人減監臨罪五等罪止杖一百乞取者加一等強乞取者準枉法論疏議曰乞取者加一等謂非財主自與而官人從乞者加受所監臨罪一等以威若力強乞取者準枉法論有祿無祿各依本法其因得餉送而更強乞取者既是一事分為二罪以重法併滿輕法若是頻犯及二人以上之物仍合纍併倍論諸官人因使於使所受送遺及乞取者與監臨同經過處取者減一等即強乞取者各與監臨罪同疏議曰官人因使於所使之處受送遺財物或自乞取者計贓準罪與監臨官同經過處取者謂非所詣之處因使經歷之所而取財者減一等糾彈之官不減者謂職合糾彈之官人所畏懼雖經過之處受送遺乞取及強乞取者各與監臨罪同糾彈之官不減諸貸所監臨財物者坐贓論百日不還以受所監臨財物論強者各加二等疏議曰監臨之官於所部貸財物者坐贓論注云授訖未上者若五品以上據制出日六品以下據畫訖竝同已上之法餘條取受及相犯謂受所監臨及毆詈之類故言準此若百日不還為其淹日不償以受所監臨財物論若以威力而強貸者各加二等謂百日內坐贓論加二等滿百日外從受所監臨財物上加二等注云餘條強者準此謂如下條私役使及借駝騾驢馬之類強者各加二等但一部律內本條無強取罪名竝加二等故於此立例所貸之物元非擬將入己雖經恩免罪物尚徴還縱不經恩償訖事發亦不合罪為貸時本許酬償不同悔過還主故也若取受之贓悔過還主仍減三等恩前費用準法不徴貸者赦後仍徴償訖故聽免罪若賣買有剩利者計利以乞取監臨財物論強市者笞五十有剩利者計利準枉法論疏議曰官人於所部賣物及買物計時估有剩利者計利以乞取監臨財物論強市者笞五十謂以威若力強買物雖當價猶笞五十有剩利者計利準枉法論問曰官人遣人或市司而為市易所遣之人及市司為官人賣買有剩利官人不知情及知情各有何罪答曰依律犯時不知依凡論官人不知剩利之情據律不合得罪所為市者雖不人己既有剩利或強賣買不得無罪從不應為準官人應坐之罪百杖以下所市之人從不應為輕笞四十徒罪以上從不應為重杖八十仍不得重於官人應得之罪若市易已訖官人知情準家人所犯知情之法即斷契有數違負不還過五十日者以受所監臨財物論即借衣服器玩之屬經三十日不還者坐贓論罪止徒一年疏議曰官人於所部市易斷契有數仍有缺物違負不還五十日以下依雜律科負債違契不償之罪滿五十一日以受所監臨財物論即借衣服器玩之屬者但衣服器物品類至多不可其舉故云之屬借經三十日不還者坐贓論罪止徒一年所借之物各還主授訖未上亦同餘條取受及相犯準此餘條強者準此諸監臨之官私役使所監臨及借奴婢牛馬駝騾驢車船碾磑邸店之類各計庸賃以受所監臨財物論疏議曰盛臨之官私役使所部之人及從所部借奴婢牛馬駝騾驢車船碾磑邸店之類稱奴婢者部曲客女亦同各計庸賃之價人畜車計庸船以下準賃以受所監臨財物論強者加二等其借使人功計庸一日絹三尺人有強弱力役不同若年十六以上六十九以下犯罪徒役其身庸依丁例其十五以下七十以上及廢疾既不任徒役庸力合減正丁宜準當鄉庸作之價若準價不充絹三尺即依減價計贓科罪其價不減者還依丁例即役使非供己者計庸坐贓論罪止杖一百其應供己驅使而收庸直者罪亦如之疏議曰非供己謂流外官者謂諸司令史以下有流外告身者雜任謂在官供事無流外品為其合在公家驅使故得罪輕於凡人不合供官人之身計庸坐贓致罪一尺笞二十一匹加一等罪止杖一百其應供己驅使者謂執衣白直之類止合供身驅使據法不合收庸而收庸直亦坐贓論罪止杖一百故云亦如之注云供己求輸庸謂有公案者不坐別格聽收庸直宜者不拘此例若有吉凶借使所監臨者不得過二十人人不得過五日其於親屬雖過限及受饋乞貸皆勿論疏議曰吉謂冠婚或祭享家廟凶謂喪葬或舉哀及殯殮之類聽許借使監臨部內所使總數不得過二十人每人不得過五日其於親屬雖過限謂親屬別於數限外驅使及受饋餉財物飮食或有乞貸皆勿論親屬謂本服緦麻以上親及大功以上親共為婚姻之家竝通受饋餉借貸役使依法無罪餘條親屬準此者謂一部律內稱親屬處悉據本服內外緦麻以上及大功以上共為婚姻之家故云準此營公廨借使者計庸賃坐贓論減二等即因市易剩利及懸缺者亦如之疏議曰借使所監臨奴婢牛馬車船碾磑邸店之類為營公廨使者各計庸賃坐贓論減二等即為公廨市易剩利及懸缺其價不還者亦計所剩及懸缺坐贓論減二等故云亦如之非供己謂流外官及雜任應供官事者供己求輸庸直者不坐親屬謂緦麻以上及大功以上婚姻之家餘條親屬準此諸監臨之官受猪羊供饋坐贓論強者依強取監臨財物法疏議曰監臨之官於所部內受猪羊供饋者即是殺訖始送故注云謂非生者舉猪羊為例自餘禽獸之類皆是各計其所直坐贓論強取者依強取監臨財物法計贓準枉法論其有酒食瓜果之類而受者亦同供饋之例見在物徴還主若以畜産及米麵之屬饋餉者自從受所監臨財物法其贓沒官謂非生者諸率斂所監臨財物饋遺人者雖不入己以受所監臨財物論疏議曰率斂者謂率人斂物或以身率人以取財物饋遺人者雖不人己併倍以受所監臨財物論若自入者同乞取法既是率斂之物與者不合有罪其物還主諸監臨之官家人於所部有受乞借貸役使賣買有剩利之屬各減官人罪二等官人知情與同罪不知情者各減家人罪五等疏議曰臨統案驗為監臨注云謂州縣鎮戊折衝府等判官以上總為監臨自餘唯據臨統本司及有所案驗者此等之官家人於其部內有受財乞物借貸役使賣買有剩利之屬者各減官人身犯二等若官人知情者竝與家人同罪其不知情者各減家人罪五等謂準身自犯得減七等其在官非監臨及家人有犯者各減監臨及監臨家人一等疏議曰在官非監臨者謂非州縣鎮戊折衝府判官以上其諸州參軍事及小録事於所部不得常為監臨此為在官非監臨若有事在手便為有所案驗即是監臨主司無所案驗者有所受乞借貸役使賣買及假賃有剩利之屬知情不知情各減監臨之官罪一等家人有犯亦減監臨家人罪一等問曰州縣鎮戊折衝府判官以上於所部總為監臨自餘唯據臨統本司及有所案驗者里正坊正既無官品於所部內有犯得作監臨之官以否答曰有所請求及枉法不枉法律文皆稱監臨主司明為臨統案驗之人不限有品無品但職掌其事即名監臨主司其里正坊正職在驅催既無官品竝不同監臨之例止從在官非監臨各減監臨之官罪一等諸去官而受舊官屬士庶饋與若乞取借貸之屬各減在官時三等疏議曰舊官屬謂前任所僚佐士庶謂舊所管部人受其饋送財物若乞取借貸之屬謂賣買假賃有剩利役使之類各減在官時三等竝謂家口未離本任所者其家口去訖受饋餉者律無罪名若其乞索者從因官挾勢乞索之法謂家口未離本任所者諸因官挾勢及豪強之人乞索者坐贓論減一等將送者為從坐疏議曰或有因官人之威挾恃形勢及鄉閭首望豪右之人乞索財物者纍倍所乞之財坐贓論減一等將送者為坐謂領豪右人等乞索者雖不將領而斂財送者竝為從坐若強乞索者加二等注云親故相與者勿論親謂本服緦麻以上及大功以上婚姻之家故謂素是通家或欽風若舊車馬不吝縞紵相貽之類者皆勿論親故相與者勿論諸稱律令式不便於事者皆須申尚書省議定奏聞若不申議輒奏改行者徒二年即詣闕上表者不坐疏議曰稱律令及式條內有事不便於時者皆須辨明不便之狀其申尚書省集京官七品以上於都座議定以應改張之議奏問若不申尚書省議輒即奏請改行者徒二年謂直述所見但奏改者即詣闕上表論律令及式不便於時者不坐若先違令式而後奏改者亦徒二年所違重者自從重斷故唐律疏議卷第十二戶婚凡一十四條疏議曰戶婚律者漢相蕭何承秦六篇律後加廏興戶三篇為九章之律迄至後周皆名戶律北齊以婚事附之名為婚戶律隋開皇以戶在婚前改為戶婚律既論職司事訖即戶口婚姻故次職制之下諸脫戶者家長徒三年無課役者減二等女戶又減三等疏議曰率土黔庶皆有籍書若一戶之內盡脫漏不附籍者所由家長合徒三年身及戶內竝無課役者減二等徒二年若戶內竝無男夫直以女人為戶而脫者又減三等合杖一百注云謂一戶俱不附貫此文不計人數唯據脫戶縱一身亦為一戶不附即依脫戶合徒三年縱有百口但一口附戶自外不附止從漏口之法若不由家長謂家長不知脫戶之情罪其所由家長不坐即見在役任者謂身見在官驅使而戶籍無名雖脫戶從漏口法既見在役任即無課調若一身脫戶合杖六十及計口多者各從漏口法漏有課口罪止徒三年漏無課口罪止徒一年半脫口及增減年狀以免課役者一口徒一年二口加一等罪止徒三年疏議曰謂脫口及增年入老減年入中小及增狀入疾其從殘疾入廢疾從廢疾入篤疾廢疾雖免課役若入篤疾即得侍人故云之類罪止徒三年其增減非免課役及漏無課役口者四口為一口罪止徒一年半即不滿四口杖六十疏議曰口雖有所增減非免課役者謂增減其年不動課役其漏無課役口者謂身雖是丁見無課役及疾老中小若婦女四口為一口罪止徒一年半漏四口徒一年十二口徒一年半不滿四口杖六十竝謂無課役者若其戶內漏口或有課役無課役罪名不等者從併滿之法以課口纍不課口科之若課口自一口至罪止或纍併不加重者止從一重科之奴婢部曲亦同不課之口律稱以免課役課役理不相須一事得免即從脫漏之法謂一戶俱不附貫若不由家長罪其所由即見在役任者雖脫戶及計口多者各從漏口法謂疾老中小之類部曲奴婢亦同諸里正不覺脫漏增減者一口笞四十三口加一等過杖一百十口加一等罪止徒三年若知情者各同家長法疏議曰里正之任掌案比戶口收手實造籍書不覺脫漏戶口者脫謂脫戶漏謂漏口及增減年狀一口笞四十三口加一等過杖一百十口加一等罪止徒三年里正不覺脫戶者聽從漏口法不限戶內口之多少皆計口科之州縣脫戶亦準此計口科罪不依脫戶為法若知脫漏增減之情者總計里內脫漏增減之口同家長罪法州縣計口罪亦準此其脫漏戶口之中若有知情不知情者亦依併滿之法為罪不覺脫戶者聽從漏口法州縣脫戶亦準此諸州縣不覺脫漏增減者縣內十口笞三十三十口加一等過杖一百五十口加一等州隨所管縣多少通計為罪各罪止徒三年知情者各同里正法疏議曰州縣不覺脫漏增減者與上條里正不覺脫漏增減義同十口笞三十三十口加一等即是二百二十口杖一百過杖一百五十口加一等州隨所管縣多少通計為罪若管二縣以上即須通計謂管二縣者二十口笞三十管三縣者三十口笞三十之類計加亦準此謂一縣三十口加一等即州管二縣者六十口加一等管三縣者九十口加一等若管十縣三百口加一等若脫漏增減併在一縣者謂管三縣一縣內脫漏三十口州始笞三十若管四縣一縣內脫漏四十口州亦笞三十故云得以諸縣通之若止管一縣者減縣罪一等謂縣脫三十口州得笞二十之類餘條通計準比謂一部律內州管縣監管牧折衝府管校尉應通計者得罪亦準此各罪止徒三年知情者各同里正法其州縣知情得罪同里正法里正又同家長之法共前條家長脫漏罪同注不覺脫漏增減無文簿者官長為首有文簿者主典為首佐職以下節級連坐疏議曰不覺脫漏增減無簿帳及不附籍書宣導既是長官事由檢察遺失故以長官為首皆同不覺脫漏增減之坐次通判官為第二從判官為第三從典為第四從見有文簿致使脫漏增減者勘檢既由案主即用典為首判官為第二從通判官為第三從長官為第四從其間有知情之官竝同家長之罪即從私犯首從科之不知情者自依公坐之法通計謂管二縣者二十口笞三十管三縣者三十口笞三十之類計加亦準此若脫漏增減併在一縣者得以諸縣通之若止管一縣者減縣罪一等餘條通計準此不覺脫漏增減無文簿者官長為首有文簿者主典為首佐職以下節級連坐諸里正及官司妄脫漏增減以出入課役一口徒一年二口加一等贓重入己者以枉法論至死者加役流入官者坐贓論疏議曰里正及州縣官司各於所部之內妄為脫漏戶口或增減年狀以出入課役一口徒一年二口加一等十五口流三千里若有因脫漏增減取其課調入己計贓得罪重於脫漏增減口罪者即準贓以枉法論計贓至死者加役流其贓入官者坐贓論其品官受贓雖輕以枉法論一匹以上即除名不必要須贓重衆人之物亦纍倍而論之諸私入道及度之者杖一百已除貫者徒一年本貫主司及觀寺三綱知情者與同罪若犯法合出觀寺經斷不還俗者從私度法即監臨之官私輒度人者一人杖一百二人加一等疏議曰私入道謂為道士女官憎尼等非是官度而私入道及度之者各杖一百注云若由家長家長當罪既罪家長即私入道者不坐已除貫者徒一年及度之者亦徒一年本貫主司謂私入道人所屬州縣官司及所住觀寺三綱知情者各與入道人及家長同罪若犯法還俗合出觀寺官人斷訖牒觀寺知仍不還俗者從私度法斷後陳訴須著俗衣仍披法服者從私度法科杖一百即監臨之官不依官法私輒度人者一人杖一百二人加一等罪止流三千里若州縣官司所度人免課役多者當條雖有罪名所為重者自從重論竝依上條妄增減出入課役科之其官司私度人被度者知私度情而受度者為從坐若不知私度情者而受度人無罪若由家長家長當罪諸祖父母父母在而子孫別籍異財者徒三年疏議曰稱祖父母父母在則曾高在亦同若子孫別生戶籍財産不同者子孫各徒三年注云別籍異財不相須或籍別財同或戶同財異者各徒三年故云不相須下條準此謂父母喪中別籍異財亦同此義若祖父母父母令別籍及以子孫妄繼人後者徒二年子孫不坐疏議曰若祖父母父母處分令子孫別籍及以子孫妄繼人後者得徒二年子孫不坐但云別籍不云令其異財令異財者明其無罪別籍異財不相須下條準此諸居父母喪生子及兄弟別籍異財者徒一年疏議曰居父母喪生子已於名例免所居官章中解訖皆謂在二十七月內而妊娠生子者及兄弟別籍異財各徒一年別籍異財不相須其服內生子事若未數自首亦原諸養子所養父母無子而捨去者徒二年若自生子及本生無子欲還者聽之疏議曰依戶令無子者聽養同宗於昭穆相當者既蒙收養而輒捨去徒二年若所養父母自生子及本生父母無子欲還本生者竝聽即兩家竝皆無子去住亦任其情若養處自生子及雖無子不願留養欲遣還本生者任其所養父母即養異姓男者徒一年與者笞五十其遺棄小兒年三歲以下雖異姓聽收養即從其姓疏議曰異姓之男本非族類違法收養故徒一年違法與者得笞五十養女者不坐其小兒年三歲以下本生父母遺棄若不聽收養即性命將絶故雖異姓仍聽收養即從其姓如是父母遺失於後來識認合還本生失兒之家量酬乳哺之宜諸立嫡進法者徒一年即嫡妻年五十以上無子者得立嫡以長不以長者亦如之疏議曰立嫡者本擬承襲嫡妻之長子為嫡子不依此立是名違法合徒一年即嫡妻年五十以上無子者謂婦人年五十以上不復乳育故許立庶子為嫡皆先立長不立長者亦徒一年故云亦如之依令無嫡子及有罪疾立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曾玄以下準此無後者為戶絶諸養雜戶男為子孫者徒一年半養女杖一百官戶各加一等與者亦如之疏議曰雜戶者前代犯罪沒官散配諸司驅使亦附州縣戶貫賦役不同白丁若有百姓養雜戶男為子孫者徒一年半養女者杖一百養官戶者各加一等官戶亦是配隸沒官唯屬諸司州縣無貫與者各與養者同罪故云亦如之雖會赦皆合改正若當色自相養者同百姓養子之法雜戶養官戶或官戶養雜戶依戶令雜戶官戶皆當色為婚據此即是別色準法不得相養律既不制罪名宜依不應為之法養男從重養女從輕若私家部曲奴婢養雜戶官戶男女者依名例律部曲奴婢有犯本條無正文者各準良人皆同百姓科罪若養部曲及奴為子孫者杖一百各還正之疏議曰良人養部曲及奴為子孫者杖一百各還正之謂養雜戶以下雖會赦皆正之各從本色注云無主謂所養部曲及奴無本主者及主自養謂主養當家部曲及奴為子孫亦各杖一百竝聽從良為其經作子孫不可充賤故也若養客女及婢為女者從不應為輕法笞四十仍準養子法聽從良其有還壓為賤者竝同放奴及部曲為良還壓為賤之法無主及主自養者聽從良諸放部曲為良已給放書而壓為賤者徒二年若壓為部曲及放奴婢為良而壓為賤者各減一等即壓為部曲及放為部曲而壓為賤者又各減一等各還正之疏議曰依戶令放奴婢為良及部曲客女者竝聽之皆由家長給手書長子以下連署仍經本屬申牒除附若放部曲客女為良壓為賤者徒二年若壓為部曲者謂放部曲客女為良還壓為部曲客女及放奴婢為良還壓為賤各減一等合徒一年半即壓為部曲者謂放奴婢為良壓為部曲客女及放為部曲者謂放奴婢為部曲客女而壓為賤者又各減一等合徒一年仍竝改正從其本色故云各還正之此文不言客女者名例律稱部曲者客女同故解同部曲之例問曰放客女及婢為良却留為妾者合得何罪答曰妾者娶良人為之據戶令自贖免賤本主不留為部曲者任其所樂況放客女及婢本主留為妾者依律無罪準自贖免賤者例得留為妾又問部曲娶良人女為妻夫死服滿之後即合任情去住其有欲去不放或因壓留為妾及更抑配與部曲及奴各合得何罪答曰服滿不放律無正文當不應為重仍即任去若元取當色為婦未是良人留充本色準法無罪若是良人女壓留為妾即是有所威逼從不應得為重科或抑配與餘部曲同放奴婢為良却壓為部曲合徒一年如配與奴同與奴娶良人女合徒一年半上籍為婢者流三千里此等轉嫁為妻及妾兩和情願者竝不合得罪唯本是良者不得願嫁賤人諸相冒合戶者徒二年無課役者減二等主司知情與同罪疏議曰依賦役令文武職事官三品以上若郡王期親及同居大功親五品以上及國公同居期親竝免課役既為同居有所蠲免相冒合戶故得徒二年無課役者或籍資蔭贖罪事既輕於課役故減二等得徒一年注云謂以疏為親律令所蔭各有等差若以疏相合即失戶數規其資蔭即失課役如斯合戶得此徒刑若蠲免更多或假蔭重者各依本法自從重論主司知情與同罪主司謂里正以上知冒戶情有課役無課役各與同罪即於法應別立戶而不聽別應合戶而不聽合者主司杖一百疏議曰應別謂父母終亡服紀已闋兄弟欲別者應合戶謂流離失鄉父子異貫依令合戶而主司不聽者各合杖一百應別應合之類非止此條略舉為例餘竝準此謂以疏為親及有所規者諸同居卑幼私輒用財者十匹笞十十匹加一等罪止杖一百即同居應分不均平者計所侵坐贓論減三等疏議曰凡是同居之內必有尊長尊長既在子孫無所自專若卑幼不由尊長私輒用當家財物者十匹笞十十匹加一等罪止杖一百即同居應分謂準令分別而財物不均平者準戶令應分田宅及財物者兄弟均分妻家所得之財不在分限兄弟亡者子承父分違此令文者是為不均平謂兄弟二人均分百匹之絹一取六十匹計所侵十匹合杖八十之類是名坐贓論減三等諸賣口分田者一畝笞十二十畝加一等罪止杖一百地還本主財沒不追即應合賣者不用此律疏議曰口分田謂計口受之非永業及居住園宅輒賣者禮云田里不鬻謂受之於公不得私自鬻賣違者一畝笞十二十畝加一等罪止杖一百賣一頃八十一畝即為罪止地還本主財沒不追即應合賣者謂永業田家貧賣供葬及口分田賣充宅及碾磑邸店之類狹鄉樂遷就寬者準令竝許賣之其賜田欲賣者亦不在禁限其五品以上若勳官永業地亦竝聽賣故云不用此律故唐律疏議卷第十三戶婚凡一十八條諸占田過限者一畝笞十十畝加一等過杖六十二十畝加一等罪止徒一年若於寬間之處者不坐疏議曰王者制法農田百畝其官人永業準品及老小寡妻受田各有等級非寬間之鄉不得限外更占若占田過限者一畝笞十十畝加一等過杖六十二十畝加一等一頃五十一畝罪止徒一年又依令受田悉足者為寬鄉不足者為狹鄉若占於寬間之處不坐謂計口受足以外謂有剩田務從墾闢庶盡地利故所占雖多律不與罪仍須申牒立案不申請而占者從應言上不言上之罪諸盜耕種公私田者一畝以下笞三十五畝加一等過杖一百十畝加一等罪止徒一年半荒田減一等強者各加一等苗子歸官主疏議曰田地不可移徙所以不同真盜故云盜耕種公私田者一畝以下笞三十五畝加一等三十五畝有餘杖一百過杖一百十畝加一等五十五畝有餘罪止徒一年半荒田減一等謂在帳籍之內荒廢未耕種者減熟田罪一等若強耕者各加一等熟田罪止徒二年荒田罪止徒一年半苗子各歸官主稱苗子者其子及草竝徴還官主下條苗子準此謂妄認及盜貿賣侵奪私田盜耕墓地如此之類所有苗子各還官主其盜耕人田有荒有熟或竊或強一家之中罪名不等者竝依例以重法併滿輕法為坐若盜耕兩家以上之田只從一家而斷併滿不加重者唯從一重科若親屬相侵得罪各依服紀準親屬盜財物法應減者節級減科若已上籍即從下條盜貿賣之坐下條苗子準此諸妄認公私田若盜貿賣者一畝以下笞五十五畝加一等過杖一百十畝加一等罪止徒二年疏議曰妄認公私之田稱為己地若私竊貿易或盜賣與人者一畝以下笞五十五畝加一等二十五畝有餘杖一百過杖一百十畝加一等五十五畝有餘罪止徒二年賊盜律云闌圈之屬須絶離常處器物之屬須移徙其地雖有盜名立法須為定例地既不離常處理與財物有殊故不計贓為罪亦無除免倍贓之例妄認者謂經理已得若未得者準妄認奴婢財物之類未得法科之盜貿易者須易訖盜賣者須賣了依令田無文牒輒賣買者財沒不追苗子及買地之財竝人地主諸在官侵奪私田者一畝以下杖六十三畝加一等過杖一百五畝加一等罪止徒二年半園圃加一等疏議曰律稱在官即是居官挾勢侵奪百姓私田者一畝以下杖六十三畝加一等十二畝有餘杖一百過杖一百五畝加一等三十二畝有餘罪止徒二年半園圃謂蒔果實種菜蔬之所而有籬院者以其沃塉不類故加一等若侵奪地及園圃罪名不等亦準併滿之法或將職分官田貿易私家之地科斷之法一準上條貿易為罪若得私家陪貼財物自依監主詐欺其官人兩相侵者同百姓例即在官時侵奪貿易等去官事發科罪竝準初犯之時諸盜耕人墓田杖一百傷墳者徒一年即盜葬他人田者笞五十墓田加一等仍令移葬若不識盜葬者告里正移埋不告而移笞三十即無處移埋者聽於地主口分內埋之疏議曰墓田廣袤令有制限盜耕不問多少即杖一百傷墳者謂窀穸之所聚土為墳傷者合徒一年即將尸柩盜葬他人地中者笞五十若盜葬他人墓田中者加一等合杖六十如盜葬傷他人墳者亦同盜耕傷墳之罪仍各令移葬若不識盜葬之人告所部里正移埋不告而移慮失尸柩合笞三十即無處移埋者謂無間荒之地可埋聽於地主口分內埋之諸部內有旱潦霜雹蟲蝗為害之處主司應言而不言及妄言者杖七十覆檢不以實者與同罪若致枉有所徴免贓重者坐贓論疏議曰旱謂亢陽潦謂霖霪霜謂非時降霣雹謂損物為災蟲蝗謂螟螽賊之類依令十分損四以上免租損六免租調損七以上課役俱免若桑麻損盡者各免調其應損免者皆主司合言主司謂里正以上里正須言於縣縣申州州申省多者奏聞其應言而不言及妄言者所由主司杖七十其有充使覆檢不以實者與同罪亦合杖七十若不以實言上妄有增減致枉有所徴免者謂應損而徴不應損而免計所枉徴免贓罪重於杖七十者坐贓論罪止徒三年既是以贓致罪皆合纍倍而斷問曰有應得損免不與損免以枉徴之物或將入己或用入官各合何罪答曰應得損免而妄徴亦準上條妄脫漏增減之罪入官者坐贓論入私者以枉法論至死者加役流諸部內田疇荒蕪者以十分論一分笞三十一分加一等罪止徒一年戶主犯者亦計所荒蕪五分論一分笞三十一分加一等疏議曰部內謂州縣及里正所管田稱疇者言田之疇類或云言疇地畔也不耕謂之荒不鋤謂之蕪若部內總計準口受田十分之中一分荒蕪者笞三十假若管田百頃十頃荒蕪笞三十一分加一等謂十頃加一等九十頃荒蕪者罪止徒一年州縣各以長官為首佐職為從縣以令為首丞尉為從州即刺史為首長史司馬司戶為從里正一身得罪無四等罪名者止依首從為坐其檢勾品官為佐職其主典律無罪名戶主犯者亦計所荒蕪五分論計戶內所受之田假有受田五十畝十畝荒蕪戶主笞三十故云一分笞三十一分加一等即二十畝笞四十三十畝笞五十四十畝杖六十五十畝杖七十其受田多者各準此法為罪州縣各以長官為首佐職為從諸里正依令授人田課農桑若應受而不授應還而不收應課而不課如此事類違法者失一事笞四十疏議曰依田令戶內永業田每畝課植桑五十根以上榆棗各十根以上土地不宜者任依鄉法又條應收授之田每年起十月一日里正預校勘造簿縣令總集應退應受之人對共給授又條授田先課役後不課役先無後少先貧後富其里正皆須依令造簿通送及課農桑若應合受田而不授應合還公田而不收應合課田農而不課應課植桑棗而不植如此事類違法者每一事有失合笞四十注一事謂失一事於一人若於一人失數事及一事失之於數人皆纍為坐疏議曰一事謂失一事於一人者假若於一戶之上不課種桑棗為一事合笞四十若於一人失數事謂於一人之身應受不授又不課桑棗及田疇荒蕪及一事實之於數人謂應還不收之類在於數人之上皆纍而為坐三事加一等縣失十事笞三十二十事加一等州隨所管縣多少通計為罪疏議曰假有里正應課而不課是一事應受而不授是二事應還而不收是三事授田先不課役後課役是四事先少後無是五事先富後貧是六事田疇荒蕪是七事皆纍為坐其應纍者每三事加一等即失二十二事徒一年縣失者亦準里正所失十事笞三十二十事加一等一百七十事合徒一年州隨所管縣多少通計為罪謂管二縣者失二十事笞三十失三百四十事徒一年其管縣多者通計各準此注州縣各以長官為首佐職為從疏議曰州縣以刺史縣令為首其長官闕者即次官為首佐職及判戶曹之司為從各罪止徒一年故者各加二等疏議曰各罪止徒一年謂州縣長官及里正各罪止徒一年故犯者各加二等即是一事杖六十縣十事笞五十州管二縣者二十事笞五十計加亦準此通計為罪各罪止徒二年其州止管一縣者各減縣罪一等若有故失罪法不等者亦可依併滿之法假如授田等失七事合杖六十又有故犯三事亦合杖六十即以故犯三事併為失十事科杖七十其州縣應纍併者各準此一事謂失一事於一人若於一人失數事及一事失之於數人皆纍為坐州縣各以長官為首佐職為從諸應受復除而不給不應受而給者徒二年其小徭役者笞五十疏議曰依令人居狹鄉樂遷就寬鄉去本居千里外復三年五百里外復二年三百里外復一年之類應給復除而所司不給不應受而所司妄給者徒二年其小徭役謂充夫及雜使準令應免不免應役不役者合笞五十其妄給復除及應給不給準贓重於徒二年者依上條妄脫漏增減以出入課役一口徒一年二口加一等贓重入己者以枉法論至死者加役流入官者坐贓論其不應受復除人而求請主司妄得復除者依名例若共監主為犯雖造意仍以監主為首即是所司為首得復者為從若他人為請求妄得復者自從囑請法諸差科賦役違法及不均平杖六十疏議曰依令凡差科先富強後貧弱先多丁後少丁差科賦役違法及不均平謂貧富強弱先後間要等差科不均平者各杖六十若非法而擅賦斂及以法賦斂而擅加益贓重入官者計所擅坐贓論入私者以枉法論至死者加役流疏議曰依賦役令每丁租二石調絁絹二丈綿三兩布輸二丈五尺麻三斤丁役二十日此是每年以法賦斂皆行公文依數輸納若臨時別差科者自依臨時處分如有不依此法而擅有所徴斂或雖依格令式而擅加益入官者總計贓至六匹即是重於杖六十皆從坐贓科之假有擅加益入官絹滿一百匹比斂衆人之物法合倍論倍為五十匹坐贓論罪止徒三年入私者以枉法論稱入私不必入己但不入官者即為入私官人有祿枉法一尺杖一百一匹加一等十五匹絞無祿者減一等二十匹絞今云至死者加役流已竝不合絞其間賦斂雖有入官復有入私者即是罪名不等宜依併滿之法假有擅賦斂得一百匹九十匹入官十匹入私從入官九十匹倍為四十五匹合徒二年半倍入私十匹為五匹亦徒二年半不得纍徒五年須以入私十匹併滿入官九十匹為一百匹倍為五十匹處徒三年諸部內輸課稅之物違期不充者以十分論一分笞四十一分加一等疏議曰輸課稅之物謂租調及庸地租雜稅之類物有頭數輸有期限而違不充者以十分論一分笞四十假有當里之內徴百石物十斛不充笞四十每十斛加一等全違期不入者徒二年州縣各以部內分數不充科罪準此注州縣皆以長官為首佐職以下節級連坐疏議曰刺史縣令宣導之首課稅違限責在長官佐職以下節級連坐既以長官為首通判官為第二從判官寫第三從主典及檢勾之官為第四從以勸導之首屬在長官故不同判事差等其里正處百戶之內事在一人既無節級連坐唯得部內不充之罪戶主不充者笞四十疏議曰百姓營戶應輸課稅依期不充即笞四十不據分數為坐州縣皆以長官為首佐職以下節級連坐諸許嫁女已報婚書及有私約而輒悔者杖六十疏議曰許嫁女已報婚書者謂男家致書禮請女氏答書許訖及有私約注云約謂先知夫身老幼疾殘養庶之類老幼謂違本約相校倍年者疾殘謂狀當三疾支體不完養謂非己所生庶謂非嫡子及庶孽之類以其色目非一故云之類皆謂宿相諳委兩情具愜私有契約或報婚書如此之流不得輒悔悔者杖六十婚仍如約若男家自悔者無罪娉財不追問曰有私約者準文唯言老幼疾殘養庶之類未知貧富貴賤亦入之類得為妄冒以否答曰老幼疾殘養庶之類此緣事不可改故須先約然許為婚且富貴不恆貧賤無定不入之類亦非妄冒雖無許婚之書但受娉財亦是疏議曰婚禮先以娉財為信故禮云娉則為妻雖無許婚之書但受娉財亦是注云娉財無多少之限即受一尺以上竝不得悔酒食非者為供設親賓便是衆人同費所送雖多少不同娉財之限若以財物為酒食者謂送錢財以當酒食不限多少亦同娉財若更許他人者杖一百已成者徒一年半後娶者知情減一等女追歸前夫前夫不娶還娉財後夫婚如法疏議曰若更許他人者謂依私約報書或受娉財而別許他人者杖一百若已成者徒一年半後娶者知已許嫁之情而娶者減女家罪一等未成者依下條減已成者五等合杖六十已成徒一年女歸前夫若前夫不娶女氏還娉財後夫婚如法約謂先知夫身老幼疾殘養庶之類男家自悔者不坐不追娉財娉財無多少之限酒食非以財物為酒食者亦同娉財諸為婚而女家妄冒者徒一年男家妄冒加一等未成者依本約已成者離之疏議曰為婚之法必有行媒男女嫡庶長幼當時理有契約女家違約妄冒者徒一年男家妄冒者加一等未成者依本約謂依初許婚契約已成者離之違約之中理有多種或以尊卑或以大小之類皆是諸有妻更娶妻者徒一年女家減一等若欺妄而娶者徒一年半女家不坐各離之疏議曰依禮日見於甲月見於庚象夫婦之義一與之齊中饋斯重故有妻而更娶者合徒一年女家減一等為其知情合杖一百若欺妄而娶謂有妻言無以其矯詐之故合徒一年半女家既不知情依法不坐仍各離之稱各者謂女氏知有妻無妻皆合離異故云各離之問曰有婦而更娶婦後娶者雖合離異未離之間其夫內外親戚相犯得同妻法以否答日一夫一婦不刊之制有妻更娶本不成妻詳求理法止同凡人之坐諸以妻為妾以婢為妻者徒二年以妾及客女為妻以婢為妾者徒一年半各還正之疏議曰妻者齊也秦晉為匹妾通賣買等數相懸婢乃賤流本非儔類若以妻為妾以婢為妻違別議約便虧夫婦之正道黷人倫之彝則顛倒冠履紊亂禮經犯此之人即合二年徒罪以妾及客女為妻客女謂部曲之女或有於他處轉得或放婢為之以婢為妾者皆徒一年半各還正之竝從本色問曰或以妻為媵或以媵為妻或以妾作媵或以媵作妾各得何罪答曰據鬪訟律媵犯妻減妾一等妾犯媵加凡人一等諸條媵無文者與妾同即是夫犯皆同犯妾所問既非妻妾與媵相犯便無加減之條夫犯媵例依犯妾即以妻為媵罪同以妻為妾若以媵為妻亦同以妾為妻其以媵為妾律令無文宜依不應為重合杖八十以妾為媵今既有制律無罪名止科違令之罪即因其改換以告身與回換之人者自從假與人官法若以妾詐為媵而冒承媵姓名始得告身者依詐僞律詐增加功狀以求得官者合徒一年若婢有子及經放為良者聽為妾疏議曰婢為主所幸因而有子即雖無子經放為良者聽為妾問曰婢經放為良聽為妾若用為妻復有何罪答曰妻者傅家事承祭祀既具六禮取則二儀婢雖經放為良豈堪承嫡之重律既止聽為妾即是不許見妻不可處以婢為妻之科須從以妾為妻之坐諸居父母及夫喪而嫁娶者徒三年妾減三等各離之知而共為婚姻者各減五等不知者不坐疏議曰父母乏喪終身憂戚三年從吉自為違禮夫為婦天尚無再醮若居父母及夫之喪謂在二十七月內若男身娶妻而妻女出嫁者各徒三年妾減三等若男夫居喪娶妾妻女作妾嫁入妾既許以卜姓為之其情理賤也禮數既別得罪故輕各離之謂服內嫁娶妻妾竝離知而共為婚姻者謂妻父稱婚壻父稱姻二家相知是服制之內故為婚姻者各減罪五等得杖一百娶妾者合杖七十不知情不坐若居期喪而嫁娶者杖一百卑幼減二等妾不坐疏議曰若居期規之喪嫁娶謂男夫娶婦女嫁作妻各杖一百卑幼減二等雖是期服亡者是卑幼故減二等合杖八十妾不坐謂期服內男夫娶妾女婦作妾嫁人並不坐諸祖父母父母被囚禁而嫁娶者死罪徒一年半流罪減一等徒罪杖一百疏議曰祖父母父母既被囚禁固身囹圄子孫嫁娶名教不容若祖父母父母犯當死罪嫁娶者徒一年半流罪徒一年徒罪杖一百若娶妾及嫁為妾者即準上文減三等若期親尊長主婚以主婚為首男女為從若餘親主婚事由主婚主婚為首男女為從事由男女男女為首主婚為從其男女被逼或男年十八以下在室之女並主婚獨坐注云祖父母父母命者勿論謂奉祖父母父母命為親故律不加其罪依令不得宴會祖父母父母命者勿論諸居父母喪與應嫁娶人主婚者杖一百疏議曰居父母喪與應合嫁娶之人主婚者杖一百若與不應嫁娶人主婚得罪重於杖一百自從重科若居夫喪而與應嫁娶人主婚者律雖無文從不應為重合杖八十其父母喪內為應嫁娶人媒合從不應為重杖八十夫喪從輕合笞四十故唐律疏議卷第十四戶婚凡十四條諸同姓為婚者各徒二年緦麻以上以姦論疏議曰同宗共姓皆不得為婚違者各徒二年然古者受姓命氏因彰德功邑居官爵事非一緒其有祖宗遷易年代寖遠流源析本罕能推詳至如魯衛文王之昭凡蔣周公之胤初雖同族後各分封竝傳國姓以為宗本若與姫姓為婚者不在禁例其有聲同字別音響不殊男女辨姓豈宜仇匹若陽與楊之類又如近代以來特蒙賜姓譜牒仍在昭穆可知今姓之與本枝竝不合共為婚媾其有復姓之類一字或同受氏既殊元非禁限若同姓緦麻以上為婚者各依雜律姦條科罪問曰同姓為婚各徒二年未知同姓為妾合得何罪答曰買妾不知其姓則卜之取決著龜本防同姓同姓之人即嘗同祖為妻為妾亂法不殊戶令云娶妾謂立婚契即驗妻妾俱名為婚依準禮令得罪無別若外姻有服屬而尊卑共為婚姻及娶同母異父姊妹若妻前夫之女者亦各以姦論疏議曰外姻有服屬者謂外祖父母舅姨妻之父母此等若作婚姻者是名尊卑共為婚姻及娶同母異父姊妹若妻前夫之女者注云謂妻所生者謂前夫之女後夫娶之是妻所生者如其非妻所生自從本法餘條稱前夫之女者準此據雜律姦妻前夫之女亦據妻所生者故云亦準此各以姦論其外姻雖有服非尊卑者為婚不禁其父母之姑舅兩姨姊妹及姨若堂姨母之姑堂姑己之堂姨及再從姨堂外甥女女壻姊妹竝不得為婚姻違者各杖一百竝離之疏議曰父母姑舅兩姨姊妹於身無服乃是父母緦麻據身是尊故不合娶及姨又是父母小功尊若堂姨雖於父母無服亦是尊屬母之姑堂姑竝是母之小功以上尊己之堂姨及再從姨堂外甥女亦謂堂姊妹所生者女壻姊妹於身雖竝無服據理不可為婚竝為尊卑混亂人倫失序違此為婚者各杖一百自同姓為婚以下雖會赦各離之謂妻所生者餘條稱前夫之女者准此諸嘗為袒免親之妻而嫁娶者各杖一百緦麻及舅甥妻徒一年小功以上以姦論妾各減二等竝離之疏議曰高祖親兄弟曽祖堂兄弟祖再從兄弟父三從兄弟身四從兄弟三從姪再從姪孫竝緦麻絶服之外即是袒免既同五代之祖服制尚異他人故嘗為袒免親之妻不合復相嫁娶輒嫁娶者男女各杖一百緦麻及舅甥妻謂同姓緦麻之妻及為舅妻若外甥妻而更相嫁娶者其夫尊卑有服嫁娶各徒一年小功以上以姦論小功之親多是本族其外姻小功者唯有外祖父母若有嫁娶一同姦法若經作袒免親妾者各杖八十緦麻親及舅甥妾各杖九十小功以上各減姦罪二等故云妾各減二等竝離之姦妾本條減妻一等比候以姦論妾減二等即是娶妾者纍減三等稱以姦論者竝依姦法小功之妻若寡在夫家而嫁娶者各依姦小功以上妻法其被放出或改適他人即於前夫服義竝絶姦者依律止是凡姦若其嫁娶亦同凡姦之坐又稱妾者據元是袒免以上親之妾而娶者得減二等若是前人之妻今娶為妾止依娶妻之罪不得以妾減之如為前人之妾今娶為妻亦依娶妾之罪諸夫喪服除而欲守志非女之祖父母父母而強嫁之者徒一年期親嫁者減二等各離之女追歸前家娶者不坐疏議曰婦人夫喪服除誓心守志唯祖父母父母得奪而嫁之非女之祖父母父母謂大功以下而輒強嫁之者合徒一年期親嫁者謂伯叔父母姑兄弟姊妹及姪而強嫁之者減二等杖九十各離之女追歸前家娶者不坐諸娶逃亡婦女為妻妾知情者與同罪至死者減一等離之即無夫會恩免罪者不離疏議曰婦女犯罪逃亡有人娶為妻妾若知其逃亡而娶流罪以下竝與同科唯婦人本犯死罪而娶者流三千里仍離之即逃亡婦女無夫又會恩赦得免罪者不合從離其不知情而娶準律無罪若無夫即聽不離諸監臨之官娶所監臨女為妾者杖一百若為親屬娶者亦如之其在官非監臨者減一等女家不坐疏議曰監臨之官謂職當臨統案驗者娶所部人女為妾者杖一百為親屬娶者亦合杖一百親屬謂本服緦麻以上親及大功以上婚姻之家既是監臨之官為娶親屬不坐若親屬與監臨官同情強娶或恐喝娶者即以本律首從科之皆以監臨為首娶者為從其在官非監臨者謂在所部任官而職非統攝案驗而娶所部之女及與親屬娶之各減監臨官一等女家竝不合坐其職非統攝臨時監主而娶者亦同仍各離之即枉法娶人妻妾及女者以姦論加二等行求者各減二等各離之疏議曰有事之人或妻若妾而求監臨官司曲法判事娶其妻妾及女者以姦論加二等其娶者有親屬應加罪各依本法仍加監臨姦罪二等為親屬娶者亦同皆同自娶之坐行求者各減二等其以妻妾及女行求嫁與監臨官司得罪減監臨二等親屬知行求枉法而娶人妻妾及女者自依本法為從坐仍各離之者謂夫自嫁妻妾及女與枉法官人兩俱離之妻妾及女理不自由故竝不坐為親屬娶者亦同諸和娶人妻及嫁之者各徒二年妾減二等各離之即夫自嫁者亦同疏議曰和娶人妻及嫁之者各徒二年若和嫁娶妾減二等徒一年各離之謂妻妾俱離即夫自嫁者亦同謂同嫁妻妾之罪二夫各離故云兩離之仍兩離之諸卑幼在外尊長後為定婚而卑幼自娶妻已成者婚如法未成者從尊長違者杖一百疏議曰卑幼謂子孫弟姪等在外謂公私行詣之處因自娶妻其尊長後為定婚若卑幼所娶妻已成者婚如法未成者從尊長所定違者杖一百尊長謂祖父母父母及伯叔父母姑兄姊諸妻無七出及義絶之狀而出之者徒一年半雖犯七出有三不去而出之者杖一百追還合若犯惡疾及姦者不用此律疏議曰伉儷之道義期同穴一與之齊終身不改故妻無七出及義絶之狀不合出之七出者依令一無子二淫泆三不事舅姑四口舌五盜竊六妬忌七惡疾義絶謂毆妻之祖父母父母及殺妻外祖父母伯叔父母兄弟姑姊妹若夫妻祖父母父母外祖父母伯叔父母兄弟姑姊妹自相殺及妻毆詈夫之祖父母父母殺傷失外祖父母伯叔父母兄弟姑姊妹及與夫之緦麻以上親若妻母姦及欲害夫者雖會赦皆為義絶妻雖未入門亦從此令若無此七出及義絶之狀輒出之者徒一年半雖犯七出有三不去三不去者謂一經持舅姑之喪二娶時賤後貴三有所受無所歸而出之者杖一百竝追還合若犯惡疾及姦者不用此律謂惡疾及姦雖有三不去亦在出限故云不用此律問日妻無子者聽出未知幾年無子即合出之答曰律云妻年五十以上無子聽立庶以長即是四十九以下無子未合出之諸犯義絶者離之違者徒一年若夫妻不相安諧而和離者不坐疏議曰夫妻義合義絶則離違而不離合得一年徒罪離者既無各字得罪止在一人皆坐不肯離者若兩不願離即以造意為首隨從者為從皆謂官司判為義絶者方得此坐若未經官司處斷不合此科若夫妻不相安諧謂彼此情不相得兩願離者不坐即妻妾擅去者徒二年因而改嫁者加二等疏議曰婦人從夫無自專之道雖見兄弟送迎尚不踰閾若有心乖唱和意在分離背夫擅行有懷他志妻妾合徒二年因擅去而即改嫁者徒三年故云加二等室家之敬亦為難久帷薄之內能無忿爭相嗔暫去不同此罪問曰妻妾擅去徒二年因而改嫁者加二等其有父母期親等主婚若為科斷答曰下條嫁娶違律祖父母父母主婚者獨坐主婚若期親尊長主婚者主婚為首男女為從父母知女擅去理須訓以義方不送夫家違法改嫁獨坐父母合徒三年其妻妾之身唯得擅去之罪期親主婚自依首從之法諸與奴娶良人女為妻者徒一年半女家減一等離之其奴自娶者亦如之主知情者杖一百因而上籍為婢者流三千里疏議曰人各有耦色類須同良賤既殊何宜配合與奴娶良人女為妻者徒一年半女家減一等合徒一年仍離之謂主得徒坐奴不合科其奴自娶者亦得徒一年半主不知情者無罪主若知情杖一百因而上籍為婢者流三千里若有為奴娶客女為妻者律雖無文即須比例科斷名例律稱部曲者客女同鬪訟律部曲毆良人加凡人一等奴婢又加一等其良人毆部曲減凡人一等奴婢又減一等即部曲奴婢相毆傷殺者各依部曲與良人相毆傷殺法注云餘條良人部曲奴婢私相犯本條無正文者竝準此奴娶良人徒一年半即娶客女減一等合徒一年主知情者杖九十因而上籍為婢者徒三年其所生男女依戶令不知情者從良知情者從賤即妄以奴婢為良人而與良人為夫妻者徒二年各還正之疏議曰以奴若婢妄作良人嫁娶為良人夫婦者所妄之罪合徒二年奴婢自妄嫁娶亦徒二年各還正之稱正之者雖會赦仍改正之若娉財多準罪重於徒二年者依詐欺計贓科斷奴婢自妄者亦同諸雜戶不得與良人為婚違者杖一百官戶娶良人女者亦如之良人娶官戶女者加二等疏議曰雜戶配隸諸司不與良人同類止可當色相娶不合與良人為婚違律為婚杖一百官戶娶良人女者亦如之謂官戶亦隸諸司不屬州縣亦當色婚嫁不得輒娶良人違者亦杖一百良人娶官戶女者加二等合徒一年半官戶私嫁女與良人律無正文竝須依首從例即奴婢私嫁女與良人為妻妾者準盜論知情娶者與同罪各還正之疏議曰奴婢既同資財即合由主處分輒將其女私嫁與人須計婢贓準盜論罪五匹徒一年五匹加一等知情娶者興奴婢罪同不知情者不坐自雜戶與良人為婚以下得罪仍各離而改正其工樂雜戶官戶依令當色為婚若異色相娶者律無罪名竝當違令既乖本色亦合正之太常音聲人依令婚同百姓其有雜作婚姻者竝準良人其部曲奴婢有犯本條無正文者依律各準良人如與雜戶官戶為婚竝同良人共官戶等為婚之法謂各正之諸違律為婚雖有媒娉而恐喝娶者加本罪一等強娶者又加一等被強者止依未成法疏議曰依律不許為婚其有故為之者是名違律為婚假如雜戶與良人為婚雖有媒婚而恐喝娶者加本罪一等本坐合杖一百加一等處徒一年強娶者又加一等謂以威若力而強娶之合徒一年半被強者止依未成法下條未成者各減已成五等女家止笞五十之類即應為婚雖已納娉期要未至而強娶及期要至而女家故違者各杖一百疏議曰即應為婚謂依律合為婚者雖已納娉財元契吉日未至而男家強娶及期要已至吉日而女家故違不許者各杖一百得罪依律不合從離諸違律為婚常條稱離之正之者雖會赦猶離之正之定而未成亦是娉財不追女家妄冒者追還疏議曰違律為婚謂依律不合作婚而故違者當條稱離之謂上條男家妄冒或女家妄冒離之又正之者謂上條奴婢私嫁女與良人仍正之雖會大赦稱離之者猶離之稱正之者猶正之定而未成亦是假今雜戶與良人為婚已定監臨之官娶所監臨女未成會赦之後亦合離正故云定而未成亦是男家送財已訖雖合離正其財不追若女家妄冒應離正者追財物還男家凡稱離之正之者赦後皆合離正名例律云會赦應改正經責簿帳而不改正各論如本犯律應離之輩即是赦後須離仍不離者律無罪條猶當不應得為從重合杖八十若判離不離自從姦法諸嫁娶違律祖父母父母主婚者獨坐主婚疏議曰嫁娶違律謂於此篇內不許為婚祖父母父母主婚者為奉尊者教命故獨坐主婚嫁娶者無罪假令祖父母父母主婚為子孫娶舅甥妻合徒一年唯祖父母父母得罪子孫不坐注本條稱以姦論者各從本法至死者減一等疏議曰本條稱以姦論者謂上條緦麻以上以姦論假令父與其子娶子之從母依雜律姦從母者流二千里強者絞即父亦得流二千里同雜犯共子若自犯有官者仍除名此名各從本法至死減一等者若強娶從母為妻或婚寡伯叔母非被出及改嫁者本條合死今減一等合流三千里若期親尊長主婚者主婚為首男女為從餘親主婚者事由主婚主婚為首男女為從事由男女男女為首主婚為從疏議曰期親尊長次於父母故主婚為首男女為從餘親主婚者餘親謂期親卑幼及大功以下主婚即各以所由為首事由主婚主婚為首男女為從事由男女男女為首主婚為從雖以首從科之稱以姦論者男女各從姦法應除名者亦除名其男女被逼若男年十八以下及在室之女亦主婚獨坐疏議曰男女被逼謂主婚以威若力男女理不自由雖是長男及寡女亦不合得罪若男年十八以下及在室之女亦主婚獨坐男女勿論未成者各減已成五等媒人各減首罪二等疏議曰未成者謂違律為婚當條合得罪定而未成者減已成五等假有同姓為婚合徒二年未成即杖八十此是名減五等其媒人猶徒一年未成者杖六十是名各減首罪二等各準當條輕重依律減之略舉同姓為例餘皆倣此凡違律為婚稱強者皆加本罪二等稱以姦論有強者止加一等媒人各減姦罪一等本條稱以姦論者各從本法至死者減一等故唐律疏議卷第十五廏庫凡二十八條疏議曰廏庫律者漢制九章創加廄律魏以廏事散入諸篇晉以牧事合之名為廏牧律自宋及梁分復名廄律後魏太和年名牧産律至正始年復名廄牧律歷北齊後周更無改作隋開皇以庫事附之更名廏庫律廏者鳩聚也馬牛之所聚庫者舍也兵甲財帛之所藏故齊魯謂庫為舍戶事既終廏庫為次故在戶婚之下諸牧畜産準所除外死失及課不充者一牧長及牧子笞三十三加一等過杖一百十加一等罪止徒三年羊減三等疏議曰廄牧令諸牧雜畜死耗者每年率一百頭論駝除七頭騾除六頭馬牛驢羖羊除十白羊除十五從外蕃新來者馬牛驢羖羊皆聽除二十第二年除十五駝除十四第二年除十騾除十二第二年除九白羊除二十五第二年除二十第三年皆與舊同準率百頭以下除數此是年別所除之數不合吏有死失為課不充應課者準令牝馬一百匹牝牛驢各一百頭每年課駒犢各六十騾駒減半馬從外蕃新來者課駒四十第二年五十第三年同舊課牝駝一百頭三年內課駒七十白羊一百口每年課羔七十口羖羊一百口課羔八十口準此缺數者除外死失及課不充者一牧長及牧子笞三十三加一等即是缺二十二合杖一百過杖一百十加一等計缺七十二罪止徒三年羊減三等缺三以下未有罪名缺四笞十三口加一等罪止徒一年半注云可餘條羊準此餘條謂可養飼不如法之類但除係論畜罪名無羊者竝減馬三等故云可準此新任不滿一年而有死失者總計一年之內月別應除多少準折為罪若課不充遊牝之時常其檢校者準數為罪不當者不坐疏議曰新任不滿一年謂任牧尉牧長牧子未滿期年而有死失總計一年之內月別應除多少準折為罪謂若騾新從外蕃來當年聽除十二即是月別得除一頭新任三月除三頭五月除五頭餘畜一年準當色應除數準新任月別折除分數亦準此若除外死失皆準上文得罪若課不充遊牝之時當其檢校者準數為罪準令牧馬駝牛驢羊牝牡常同羣其牝馬驢每年三月遊牝應牧飼者至冬牧飼不當遊牝之時課雖不充依律不坐注云可遊牝之後而致損落者坐後人謂雖不當遊牝之時檢校於後損落仍得其罪繫飼死者各加一等失者又加二等牧尉及監各隨所管牧多少通計為罪仍以長官為首佐職為從疏議曰繫飼死者加一等罪謂應牧繫養之者收飼理不合死故加罪一等雜畜一死笞四十罪止流二千里失者又加二等以其繫飼不合失落故加二等稱又者明纍加即失一杖六十罪止流三千里繫飼羊亦各減三等牧尉及監各隨所管牧尉長通計為罪依令牧馬牛皆百二十為羣駝騾驢各以七十頭為羣羊六百二十口為羣羣別置牧長一人率十五長置尉一人其監即不限尉多少通計之義已從戶婚解訖仍以長官為首佐職為從者為羣牧事重委在長官死失及課不充以監為首副監及丞簿為從條言可佐職為從明主典無罪注云餘官有管牧者亦準此其牧有管監管者亦有隸州縣官管者故云餘官有管牧者亦準此餘條羊準此遊牝之後而致損落者坐後人餘官有管牧者亦準此諸驗畜産不以實者一笞四十三加一等罪止杖一百若以故價有增減贓重者計所增減坐贓論入己者以盜論疏議曰依廏牧令府內官馬及傳送馬驢每年皆刺史折衝果毅等檢揀其有老病不堪乘用者府內官馬更對州官揀定京兆府管內送尚書省揀隨便貨賣檢揀者竝須以實不以實者一笞四十三加一等罪止杖一百若以檢揀不實之故令價有增減者計增減之贓重坐贓論謂驗一不實增三匹一尺及減三匹一尺各笞五十每一匹加一等十匹徒一年十匹加一等若因此增減不平之贓將入己者計贓以盜論仍徴倍贓監主加二等一匹以上除名其中有增減不平之贓有入己不入己者若一處犯便是一事分為二罪罪法不等即以重法併滿輕法須將以盜之贓纍於坐贓之上科之其應除免倍贓各盡本法若驗羊不實減三等其增減贓坐贓及以盜論者竝各依本條不在羊減三等之例諸受官羸病畜産養療不如法笞三十以故致死者一笞四十三加一等罪止杖一百疏議曰依廏牧令官畜在道有羸病不堪前進者留付隨近州縣養飼療救粟草及藥官給而所在官司受之須養療依法有不如法者笞三十以故致死者謂養療不如法而致死者一笞四十三加一等罪止杖一百諸應乘官馬牛駝騾驢私馱物不得過十斤違者一斤笞十十斤加一等罪止杖八十疏議曰應乘官馬牛駝騾驢者謂因公得來傳遞或是軍行但因公事而得乘官畜者私馱物不得過十斤十斤之外更著者一斤笞十十斤加一等罪止杖八十其乘車者不得過三十斤違者五斤笞十二十斤加一等罪止徒一年即從軍征討者各加二等疏議曰乘官車或載官私之物載限之外私物不得過三十斤違者五斤笞十二十斤加一等罪止徒一年從軍征討者各加二等馬牛以下車以上各加常犯二等馬牛駝騾驢七十一斤罪止杖一百車二百五斤罪止徒二年若數人共馱載者各從其限為坐監當主司知而聽者併計所知同私馱載法疏議曰若數人共馱載者謂乘官畜及車應得私載物限外謂畜過十斤車過三十斤假有十人同乘官畜馱私物各十斤其中五人數外各過一斤依律各笞十三人各過十一斤各笞二十二人各過八兩律云引過一斤笞十今數不滿一斤依律各無罪又有十人同車載私物各三十斤其中五人敦外各過五斤依律各笞十三人各過二十五斤各笞二十二人各過二斤八兩依律數不滿各無罪其監當主司知情者併計前畜總過三十九斤同私馱法科合笞四十車總過一百五斤同私載法合杖六十之類若從軍征討亦依前各加二等其有他人寄物各計一斤以上為罪皆同私馱載法主當車馬及寄物之人得罪各等亦無首從監當官司知情準上解若隨身衣仗應將行者各在私物斤數之外不在計限諸供大祀犧牲養飼不如法致有瘦損者一杖六十一加一等罪止杖一百以故致死者加一等疏議曰供大祀犧牲用犢人帝配之即加羊豕其養牲大祀在滌九旬中祀三旬小祀一旬養飼令肥不得捶撲違者是不如法致有瘦損者一杖六十一加一等五不如法罪止杖一百以故致死者加罪一等一死杖七十五死徒一年其羊豕雖供人帝為配大祀故得罪與牛皆同職制律中小祀遞減二等餘條中小祀準此即中祀養牲不如法各減大祀二等小祀不如法又減中祀二等諸乘駕官畜産而脊破領穿瘡三寸笞二十五寸以上笞五十疏議曰乘駕官畜産謂牛馬駝騾驢乘騎者脊破駕用者領穿瘡三寸笞二十五寸以上笞五十稱以上者瘡雖更大罪亦不加若是別傷非乘駕所損自從傷官畜産之罪不當此坐注云謂圍繞為寸者便是瘡圍三寸徑一寸圍五寸一分徑一寸七分雖或方圓準此為法但廉隅不定皆以圍繞為寸若放飼瘦者計十分為坐一分笞二十一分加一等乃即不滿十者一笞三十一加一等各罪止杖一百疏議曰若將官畜放飼謂牧監之官及牧子以上令瘦者計十分為坐假令一羣百匹馬十匹瘦為一分合笞二十一分加一等九分竝瘦或百匹皆瘦合杖一百即不滿十者一笞三十一加一等謂止放八匹一瘦笞三十八匹竝瘦更加七等合杖一百故云各罪止杖一百監及牧尉皆以所管通計為罪餘雜畜準數得罪皆準此羊準例減三等謂圍繞為寸者諸官馬乘用不調習者一匹笞二十以五匹加一等罪止杖一百疏議曰依太僕式在牧馬二歲即令調習每一尉配調習馬人十人分為五番上下每年三月一日上四月三十日下又令云殿中省尚乘每配習馭調馬東官配翼馭調馬其檢行牧馬之官聽乘官馬即令調習故官馬乘用不調習者一匹笞二十五匹加一等即是四十一匹罪止杖一百上臺東官供御馬不調習得罪重於此條即從職制律車馬不調習本條科罪諸故殺官私馬牛者徒一年半贓重及殺餘畜産若傷者計減價準盜論各償所減價價不減者笞三十疏議曰官私馬牛為用處重牛為耕稼之本馬即致遠供軍故殺者徒一年半贓重謂計贓得罪重於一年半徒假有殺馬直十五匹絹準盜合徒二年此名贓重及殺餘畜産除馬牛之外竝為餘畜若傷謂雖不死而有損傷自馬牛及餘畜各計所減價準盜論減價謂畜産直絹十匹殺訖唯直絹兩匹即減八匹價或傷止直九匹是減一匹價殺減八匹償八匹傷減一匹償一匹之類其罪各準盜八匹及一匹而斷價不減者謂元直絹十匹雖有殺傷評價不減仍直十匹止得笞三十罪無所陪償注云見血踠跌即為傷見血不限傷處多少但見血即坐踠跌謂雖不見血骨節差跌亦即為傷若傷重謂所傷處重五日內致死者亦從殺罪及償減價其誤殺傷者不坐但償其減價主自殺馬牛者徒一年疏議曰誤殺傷者謂目所不見心所不意或非繫放畜産之所而誤傷殺或欲殺猛獸而殺傷畜産者不坐但償其減價減價同上解主自殺馬牛徒一年誤殺者不坐見血踠跌即為傷若傷重五日內致死者從殺罪諸官私畜産毀食官私之物登時殺傷者各減故殺傷三等償所減價畜主備所毀疏議曰畜産不限官私或毀食官私之物者毀謂有所唐突或抵踏之類因其毀食物主登時即殺傷者各減前條引故殺傷罪三等若殺馬牛杖九十其傷馬牛及殺傷餘畜産各計所減價計贓準盜論減三等如所殺馬牛準所減價當絹十五匹者徒二年上減三等合杖一百如此計贓得罪重即從重論仍各償所減價畜主備所毀假有一牛直上絹五匹毀食人物平直上絹兩匹其物主登時傷殺此牛出賣直絹三匹計減二匹牛主償所損食絹二匹物主酬所減牛價絹亦二匹之類注云可臨時專制亦為主假如甲有馬牛借乙乘用有所毀食即乙合當罪仍令備償餘條準此謂下條犬殺傷他人畜産及畜産抵齧人而應標幟羈絆之類雖非正主皆罪在專制之人其畜産欲抵齧人而殺傷者不坐不償疏議曰其畜産有抵齧人者若其欲來抵齧人當即殺傷不坐不償故注云亦謂登時殺傷者其事絶之後然始殺傷者皆依故殺傷之法仍償減價畜主亦依法得罪臨時專制亦為主餘條準此亦謂登時殺傷者即絶時皆為故殺傷諸殺緦麻以上親馬牛者與主自殺同殺餘畜者坐賊論罪止杖一百各償其減價疏議曰緦麻以上謂內外有服者相殺馬牛得罪與主自殺同合徒一年殺餘畜者準減價坐贓論罪止杖一百準此律文緦麻以上傷畜産者不合得罪若因傷重五日內致死依上條亦同殺法竝償所減價問曰誤殺及故傷緦麻以上親畜産律無罪名未知合償減價以否答曰律云言殺緦麻以上親馬牛者與主自殺同主傷馬牛及以誤殺律條無罪諸親與主同明各不坐不坐即無備償準例可知況律條無文即非償限牛馬猶故不償餘畜不償可知諸犬自殺傷他人畜産者犬主償其減價餘畜自相殺傷者償減價之半即故放令殺傷他人畜産者各以故殺傷論疏議曰犬性噬齧或自殺傷他人畜産犬主償其減價以犬能噬齧主須制之為主不制故令償減價餘畜除犬之外皆是自相殺傷者謂牛相抵殺馬相踏死之類假有甲家牛抵殺乙家馬馬本直絹十匹為抵殺估皮肉直絹兩匹即是減八匹絹甲償乙絹四匹是名償減價之半即故放令殺傷他人畜産者或犬性好噬齧猪羊其牛馬能相抵踏而故放者責其故放各與故殺傷罪同謂同上條故殺官私馬牛者徒一年半計贓應重若傷及殺餘畜産者計減價準盜論各償所減價價不減者笞三十兩主放畜産而鬪有殺傷者從不應為重杖八十各償所減價諸畜産及噬犬有抵踏齧人而標幟羈絆不如法若狂犬不殺者笞四十以故殺傷人者以過失論若故放令殺傷人者減鬪殺傷一等疏議曰依雜令畜産抵人者以截兩角踏人者絆足齧人者截兩耳此為標幟羈絆之怯若不如法并狂犬本主不殺之者各笞四十以不施標幟職羈絆及狂犬不殺之故致殺傷人者以過失論過失者各依其罪從贖法律無異文總依凡法不限尊貴其贖一也若本應輕者聽從本其故放令殺傷人者謂知犬及雜畜性能抵踏及噬齧而故放者減鬪殺傷一等其犯貴賤尊卑長幼親屬等各依本犯應加減為罪其畜産殺傷人仍作他物傷人保辜二十日辜內死者減鬪殺一等辜外及他故死者自依以他物傷人法假令故放雜畜産抵踏及齧殺子孫於徒一年半上減一等合徒一年餘親卑幼各依本服於鬪殺傷上減一等即被雇療畜産及無故觸之而被殺傷者畜主不坐疏議曰有人被雇療畜産及無故觸人畜産而被殺傷者畜主不坐被雇本是規財無故謂故自犯觸如此被殺傷者畜主不坐若被倩療畜産被殺傷依贖法被倩者同過失法諸監臨主守以官奴婢及畜産私自借若借人及借之者笞五十計庸重者以受所監臨財物論驛驢加一等疏議曰監臨主守之官以所監主官奴婢及畜産私自借謂身自借用若轉借他人及借之者或一人一畜但借即笞五十或借數少而日多或借數多而日少計庸重於借罪者以受所監臨財物論纍贓為坐驛驢加一等謂借即得杖六十計庸重以受所監臨財物論加一等其車船碾磑邸店之類有私自借若借人及借之者亦計庸賃各與借奴婢畜産同律雖無文所犯相類職制律監臨之官借所監臨及牛馬駝騾驢車船邸店碾磑各計庸賃以受所監臨財物論計借車船碾磑之類理與借畜産不殊故附此條準例為坐即借驛馬及借之者杖一百五日徒一年計庸重者從上法即驛長私借人馬驢者各減一等罪止杖一百疏議曰即私借驛馬及官司借之者各杖一百五日徒一年計庸重者從上法謂計驛馬之庸當上絹八匹合加一等徒一年半即驛長私借人馬驢者減一等準令驛馬驢一給以後死即驛長陪填是故驛長借人驢馬得罪稍輕各減一等謂上文借驛馬驢加受所監臨財物一等令驛長借人驢馬各減一等與受所監臨財物罪同罪止杖一百諸放官私畜産損食官私物者笞三十贓重者坐贓論失者減二等各償所損若官畜損食官物者坐而不償疏議曰謂放官私畜産損食官私之物損食雖少即笞三十若準贓得二匹一尺合笞四十是名計贓重者坐贓論失者減二等謂非故放因亡逸而損食者減罪二等各償所損既云損食官私之物或損或食各令畜主備償若官畜損食官物坐而不償公廨畜産損食當司公廨既不同私物亦坐而不償若損食餘司公廨竝得罪仍備一準上文諸有人從庫藏出防衛主司應搜檢而不搜檢笞二十以故致盜不覺者減盜者罪二等若夜持時不覺盜以減三等疏議曰從庫藏出依式五品以上皆不合搜檢其應搜檢而不搜檢者防衛主司笞二十以不搜檢故以而致盜物將出計所盜之贓主司減盜者罪二等若夜持時謂庫藏之所持更之人不覺人盜物者減盜者罪三等持時謂當時專持更者假有不覺盜五匹絹減三等得杖八十之類主守不覺盜者五匹笞二十十匹加一等過杖一百二十匹加一等罪止徒二年若守掌不如法以故致盜者各加一等故縱者各與同罪疏議曰言主守不限有品無品謂親主當庫藏者不覺有人盜物準絹五匹笞二十不滿五匹未合得罪十匹加一等八十五匹杖一百過杖一百二十匹加一等一百四十五匹罪止徒二年若守掌不如法謂防守持更鎖閉封印乖違不如法而致盜者各加一等謂防衛不如法有人從庫藏出又不搜檢致盜不覺上加一等謂止減盜者一等夜持時不如法不覺盜亦加一等止減盜者二等主守之司不如法不覺盜亦加一等五匹笞三十罪止徒二年半此是各加一等故縱者各與同罪謂防衛主司并夜持時之人及主守之司故縱盜者竝各與盜者同罪稱同罪者不在除免倍贓監主加罪之例即故縱贓滿五十匹加役流一百匹絞若被強盜者各勿論疏議曰國家庫藏以本委主司若主司知情容盜得罪重於盜者名例律與同罪者不在加役流之例故於庫藏條中特生此例故縱贓四十九匹以下與盜者罪同不合除免滿五十匹加役流除名配流如法一百匹絞此謂故縱一人之罪若故縱頻盜及衆人盜者各依纍倍之法若被強盜者各勿論謂被威力盜之非能拒得者勿論諸假請官物事訖過十日不還者笞三十十日加一等罪止杖一百私服用者加一等疏議曰假請官物謂有吉凶應給威儀鹵簿或借帳幕氈褥之類事訖十日內皆合還官若過十日不還者笞三十十日加一等停留總過八十日罪止杖一百因而私服用者謂吉凶事過以後別私服用者每加一等過八十日徒一年若亡失所假者自言所司備償如法不自言者以亡失論疏議曰假請官物有亡失者若於請物所司自言失者免罪備償如法不自言失被人舉者以亡失論依雜律亡失官物者準盜論減三等又條亡失官私器物各備償故得亡失之罪又備償之諸監臨主守以官物私自貸若貸人及貸之者無文記以盜論有文記準盜論立判案減二等疏議曰監臨主守謂所在之處官物有官司執當者以此官物私自貸若將貸人及貸之者此三事無文記以盜論有文記準盜論文記謂取抄署之類謂雖無文案或有名簿或取抄及署領之類皆同無文記以盜論者與真盜同若監臨主守自貸亦加凡盜二等有文記者準盜論竝五匹徒一年五匹加一等立判案減二等謂五匹杖九十之類即充公廨及用公廨物若出付市易而私用者各減一等坐之疏議曰即充公廨謂以官物回充公廨及私用公廨之物無文記有文記立判案若官物從庫藏積聚之中出付人將市易其市易人私用者各準前官物應坐之罪皆減一等坐之稱私用者雖貸亦同餘條公廨準此謂一部律內但稱公廨私用及貸皆準此減盜罪坐之即主守私貸無文記者依盜法即與真盜同加常盜二等徴倍贓有官者除名故云依盜法所貸之人不能備償者徴判署之官疏議曰監臨主守以官物貸人所貸之人不能備償謂無物可徴者徴判署之官判案者為判官署案者為主典及監事之類注云下條私借亦準此謂下條監臨主守之官以官物借人若所借人不能備償亦徴判署之官故云準此文記請取抄署之類雖貸亦同餘條公廨準此即主守私貸無文記者依盜法下條私借亦準此諸監臨主守之官以官物私自借若借人及借之者笞五十過十日坐贓論減二等疏議曰監臨主守之官以所監臨主守之物謂衣服氈褥帷帳器玩之類但是官物私自借若將借入及借之者各笞五十過十日計所借之物準坐贓論減二等罪止徒二年諸倉庫及積聚財物安置不如法若暴涼不以時致有損敗者計所損敗坐贓論州縣以長官為首監署等亦準此疏議曰倉謂貯粟麥之屬庫謂貯器杖綿絹之類積聚謂貯柴草雜物之所皆須高燥之處安置其應暴涼之物又須暴涼以時若安置不如法暴涼不以時而致損敗者計所損敗多少坐贓論州縣以長官為首以下節級為從監署等有所損壞亦長官為首以次為從故云亦準此諸財物應入官私而不入不應入官私而入者坐贓論疏議曰凡是公私論競割斷財物應入官乃入私應入私乃入官應入甲而入乙應入私而入公廨各計所不應入而入坐贓論諸放散官物者坐贓論物在還官已散用者勿徴疏議曰言放散官物謂出用官物有所市作竝謂官物還充官用者假有營造屋宅及供祠祀宴會料度剩多各計所剩坐贓論若物在未用各準所剩還官若祠祀禮畢宴會食盡及營造事訖皆勿徴謂出用官物有所市作及供祠祀宴會剩多之類謂營造剩多為物在祀畢食訖為散用諸應輸課稅及入官之物而回避詐匿不輸或巧僞濕惡者計所闕準盜論主司知情與同罪不知情減四等疏議曰應輸課稅謂租調地稅之類及應入官之物而回避詐匿假作逗留遂致廢闕及巧僞濕惡欺妄官司皆總計所闕入官物數準盜科罪依法陪填主司知其回避詐匿巧僞濕惡之情而許行者各與同罪不知情者減罪四等縣官應連坐者亦節級科之州官不覺各遞減縣官罪一等州縣綱典不覺各同本司下從科罪若州縣發遣依法而綱典在路或至輸納之所事有欺妄者州縣無罪諸監臨主守之官皆不得於所部僦運租稅課物違者計所利坐贓論其在官非監臨減一等主司知情各減一等疏議曰凡是課稅之物監臨主守皆不得於所部內僦勾客運其有違者計所利坐贓論除人畜糧外竝為利物在官非監臨減一等謂從坐贓減一等主司知情者各減一等謂知監臨僦運坐贓上減一等若非監臨僦運坐贓上減二等所利之錢一非彼此俱罪二非乞索之贓既用功程而得不合沒官還主諸有所輸及出給而受給之官無故留難不受不給者一日笞五十三日加一等罪止徒一年門司留難者亦準此若請輸後至主司不依次第先給先受者笞四十疏議曰有應輸官之物及官物應出給與人而受物出給之官無故留難不受不給者一日笞五十三日加一等罪止徒一年而受給門司留難者亦準受給官司之法故云亦準此若請輸後至官司不依次第先受姶及請輪前至後給受者笞四十諸官物有印封不請所由官司而主典擅開者杖六十疏議曰但是官物有封閉印記欲開者皆請所由官司其主典不請官司而擅開者杖六十諸應輸課物而輒齎財貨詣所輸處市糴充者杖一百將領主司知情與同罪疏議曰應輸送課物者皆須從出課物之所運送輸納之處若輒齎財貨詣所輸處市糴充者杖一百將領主司若知齎物於送納之所市糴情與輸人同罪縱一人糴輸亦得此罪諸出納官物給受有違者計所缺剩坐贓論疏議曰監主官物或受或給而有違法者謂稱量之物出納須平若重受輕出即有餘剩及當出陳而出新應受上物而受下物此即為缺須計缺剩之價準坐贓科罪其有輕受重出及應出新而出陳應受上物而受中物得罪與上文竝同故云之類其物未應出給而出給者罪亦如之官物還充官用而違者笞四十其主司知有缺剩不言者坐贓論減二等疏議曰其物未應出給者依令應給祿者春秋二時分給未至給時而給者亦依前坐贓科罪若給官物還充官用有違者笞四十其主司知有缺剩而不舉言者計所缺剩坐贓論減二等違謂重受輕出及當出陳而出新應受上物而受下物之類諸官物當應入私已出庫藏而未付給若私物當供官用已送在官及應供官人之物雖不供官用而守掌在官者皆為官物之例疏議曰謂官物應將給賜及借貸官人及百姓已出庫藏仍貯在官而未付給之間若私物借充官用及應徴課稅之類已送在官貯掌或公廨物及官人月俸應供官人之物雖不供官用而守掌在官并檢驗贓賄或兩競財物如此之類但守掌在官者皆為官物之例故唐律疏議卷第十六擅興凡二十條疏議曰擅興律者漢相蕭何創為興律魏以擅事附之名為擅興律晉復去擅為興又至高齊改為興擅律隋開皇改為擅興律雖題目增損隨時沿革原其旨趣意義不殊大事在於軍戎設法須為重防廏庫足訖須備不虞故此論兵次於廏庫之下諸擅發兵十人以上徒一年百人徒一年半百人加一等千人絞疏議曰依令差兵十人以上竝須銅魚敕書勘同始合差發若急須兵處準程不得奏聞者聽便差發即須言上若無警急又不先言上輒擅發十人以上九十九人以下徒一年滿百人徒一年半百人加一等七百人以上流三千里千人絞故注云謂無警急又不先言上而輒發兵者雖即言上而不待報謂準程應得言上者竝須待報若不待報猶為擅發但文書施行即坐不必要在得兵其擅發九人以下律令無文當不應為從重給與者隨所給人數減擅發一等疏議曰雖有發兵文書執兵者不合即與亦須先言上待報然後給與違者隨所給人數減擅發罪一等故注云亦謂不先言上不待報者告令發遣即坐不必要待兵行其寇賊卒來欲有攻襲即城屯反叛若賊有內應急須兵者得便調發雖非所屬比部官司亦得調發給與竝即言上疏議曰其有寇賊卒來入境欲有攻擊掩襲及國內城鎮及屯聚兵馬之處或反叛或外賊自相翻動內應國家如此等事急須兵者得便調發謂得隨便未言上待報即許調發雖非所屬謂所在人兵不相管隸急須兵處雖比部官司亦得調發掌兵軍司亦得隨便給與各即言上竝謂急須兵處不容先言上者若不即調發及不即給與者準所須人數竝與擅發罪同其不即言上者亦準所發人數減罪一等若有逃亡盜賊權差人夫足以迫捕者不用此律疏議曰應機赴敵急須兵馬若不即調發及雖調發不即給與者準所須人數竝與擅發罪同謂須十人以上不即調發及不即給與各徒一年百人各徒一年半每百人各加一等千人以上各得絞罪其不即言上者謂軍務警急聽先調發給與竝即言上以其不即言上亦準所發人數減罪一等若有逃亡盜賊謂非兵寇直是逃亡或為盜賊所在官府得權差人夫足以迫捕不同擅發兵之例故云不用此律謂無警急又不先言上而輒發兵者雖即言上而不待報猶為擅發文書施行即坐亦謂不先言上不待報者告令發遣即坐各謂急須兵不容得先言上者諸應調發雜物供給軍事者皆先言上待報違者徒一年給與者減一等疏議曰謂隨軍所須戰具所用供給軍事雖非人兵皆先言上待報始得調發注云謂給軍用當從私出皆是若應用官物自有常式此為出私家故須先言上待報違者徒一年若知不先言上雖言上不待報即給與者減一等合杖一百若事有警急得便調發給與竝即言上若不調發及不給與者亦徒一年不即言上者各減一等疏議曰事有警急寇賊卒來欲有攻襲等事得便調發給與竝即言上為事有警急彼此準程不得言上待報若不即調發及不給與者竝徒一年不即言上各減一等俱合杖一百謂給軍用當從私出皆是諸應給發兵符而不給應下發兵符而不下若下符違式疏議曰依公式令下魚符畿內三左一右畿外五左一右左者在內右者付外行用之日從第一為首後更有事須用以次發之周而復始又條應給魚符及傳符皆長官執長官無次官執此據元付在外之日是為應給發兵符其符通授官差使雜追徴等以發兵事重故以發兵為文應下發兵符而不下者謂差兵不下左符若下符違式謂不依次第不得承用者及不以符合從事或符不合不速以聞各徒二年其違限不即還符者徒一年餘符各減二等疏議曰不以符合從事者謂執兵之司得左符皆用右符勘合始從發兵之事若不合符即從事或勘左符與右符不合不速奏者各徒二年違限不即還符謂執符之司勘符訖依公式令封符付使人若使人更往別處未即還者附餘使傳送若州內有使次諸府總附五日內無使次差專使送之若違此令限不即還符者得徒一年餘符各減二等餘符者謂禁苑及交巡魚符之類若符至不合即從其事或勘符不合不速奏聞徒一年不即還符杖九十是名餘符各減二等注云凡言餘符者契亦同即契應發兵者同發兵符法依令車駕巡幸皇太子監國有兵馬受處分者為木契若王公以下在京留守及諸州有兵馬受處分并行軍所及領兵五百人以上馬五百匹以上征討亦給木契既用木契發兵即同發兵符法監門式皇城內諸街鋪各給木契京城諸街鋪各給木魚金部司農準式亦竝給木契但是在式諸契竝同餘符謂違令式不得承用者凡言餘符者契亦同即契應發兵者同發兵符法諸揀點衛士取捨不平者一人杖七十三人加一等罪止徒三年疏議曰揀點衛士注云征人亦同征人謂非衛士臨時募行者若取捨不平者一人杖七十三人加一等罪止徒三年揀點之法財均者取強力均者取富財力又均先取多丁故注云不平謂捨富取貧捨強取弱捨多丁而取少丁之類者謂老少能否臨時比校不平者皆是若軍名先定而差遣不平減二等即應差主帥而差衛士者加一等其有缺剩者各加一等疏議曰軍名先定謂衛士之徒臨時差遣不平者減罪二等一人笞五十三人加一等罪止徒二年即應差隊副以上而差衛士者加一等謂一人杖六十三人加一等罪止徒二年半此直為主帥衛士不同故加一等罪止徒二年半其揀點衛士及征人有缺剩亦各加本罪一等主帥缺剩亦同其不平之與缺剩既罪名不等即準併滿之法科之征人亦同不平謂捨富取貧捨強取弱捨多丁而取少丁之類諸征人冒名相代者徒二年同居親屬代者減二等疏議曰介胄之士有進無退征名既定不可假名賞罰須有所歸何宜輒相冒代如有違者首徒二年從減一等同居親屬代者減二等稱同居親屬者謂同居共財者若征處得勳彼此俱不合敍若部內有冒名相代者里正笞五十一人加一等縣內一人典笞三十二人加一等州隨所管縣多少通計為罪各罪止徒二年主司知情與冒名者同罪疏議曰部內有冒名者謂里正所部之內有征人冒名相代里正不覺一人里正笞五十一人加一等九人徒二年若縣內一人典笞三十二人加一等十五人杖一百二十一人徒二年注云佐職以上節級為坐即尉為第二從丞為第三從令及主簿録事為第四從州隨所管縣多少通計為罪謂管二縣者二人冒名州典笞三十四人加一等管三縣者三人冒名州典笞三十六人加一等之類判司以上節級皆如縣罪計加通計亦準此各罪止徒二年謂里正及縣典州典各罪止徒二年故注云佐職以上節級為坐知情者謂里正及州縣遣兵之官若主典知冒代情竝與冒名者同罪其在軍冒名者隊正同里正疏議曰其在軍冒名者謂衛士以上得罪一同征人隊正副得罪準里正亦一人笞五十一人加一等罪止徒二年凡言隊正隊副同稱凡言者凡稱隊正之處隊副即同旅帥校尉減隊正一等果毅折衝隨所管校尉多少通計為罪疏議曰依軍防令每一旅帥管二隊正每一校尉管二旅帥既非親監當者同減隊正一等謂一人冒名笞四十一人加一等罪止徒一年半果毅折衝隨所管校尉多少通計為罪每府管五校尉之處亦有管四校尉三校尉者謂管三校尉者三人冒名管四校尉者四人冒名管五校尉者五人冒名各得笞四十不滿此數不坐通計之法竝準上文州管縣之義注云其主典以上竝同州縣之法謂罪亦從下始府典同州典兵曹為第二從長史果毅為第三從折衝為第四從録事同下從依律無四等官者止準見府官為坐佐職以上節級為坐凡言隊正隊副同其主典以上竝同州縣之法諸大集校閲而違期不到者杖一百三日加一等主帥犯者加二等即差發從行而違期者各減一等疏議曰春秋之義春搜夏苗秋獮冬狩皆因農隙以講大事即今校閲是也又車駕親行是名大集校閲而有違期不到者謂於集時不到即杖一百每更三日加一等主帥犯者加二等謂隊副以上將軍以下集時不到者即差發從行而違限者各減一等謂正身當時不到杖九十每三日加一等主帥以上同上解其折衝府校閲在式有文不到者各準違式之罪若所司不告者罪在所司諸乏軍興者斬故失等疏議曰興軍征討國之大事調發征行有所稽廢者名乏軍興犯者合斬故失罪等為其事大雖失不減注云謂臨軍征討有所調發兵馬及應須供軍器械或所須戰具各依期會克日俱充有所闕者即是稽廢故云有所調發而稽廢者若充使命告報軍期而違限廢事者亦是乏軍興故失罪等不憂軍事者杖一百疏議曰謂隨身七事及火幕行具細小之物臨軍征討有所闕乏一事不充即杖一百注云謂臨軍征討亦據臨戰不及別求若未從軍尚容求覓即從違式法謂臨軍征討有所調發而稽廢者謂臨軍征討闕乏細小之物諸征人稽留者一日杖一百二日加一等二十日絞即臨軍征討而稽期者流三千里三日斬疏議曰謂名已從軍兵馬竝發不即進路而致稽留者一日杖一百二日加一等二十日絞謂從軍人上道日計滿二十日即臨軍征討者謂鉦鼓相聞指期交戰而稽期者流三千里經三日者斬若用捨從權不拘此律疏議曰推轂寄重義資英略閫外之事見可即為軍中號令理貴機速用捨從權務在成濟故注云或應期赴難違期即斬捨罪求功雖怠不戮者謂或違於軍令別求異功或雖即愆期擬收後效或戮或捨隨事處斷如此之類不拘此律或應期赴難違期即斬或捨罪求功雖怠不戮如此之類各隨臨時處斷故不拘常律諸密有征討而告賊消息者斬妻子流二千里其非征討而作間諜若化外人來為間諜或傳書信與化內人并受及知情容止者竝絞疏議曰或伺賊間隙密期征討乃有姦人告賊消息者斬妻子流二千里其非征討而作間諜者間謂往來諜謂覘候傳通國家消息以報賊徒化外人來為間諜者謂聲教之外四夷之人私入國內往來覘候者或傳書信與化內人并受化外書信知情容止停藏者竝絞諸主將守城為賊所攻不固守而棄去及守備不設為賊所掩覆者斬若連接寇賊被遣斥候不覺賊來者徒三年以故致有覆敗者亦斬疏議曰主將者謂主領人兵親為主將者或鎮將戍主或留守邊城州縣城主之類守城為賊所攻擊不能固守棄城而去及守備不設謂預備有闕巡警不嚴被賊所掩襲覆敗者斬若連接寇賊謂軍壘連接旗旄相望被遣斥候謂指斥候望不覺賊來入境者徒三年以故致有覆敗者以其不覺賊來為賊掩襲致城及人兵有覆敗者亦斬諸主將以下臨陳先退若寇賊對陳捨仗投軍及棄賊來降而輒殺者斬疏議曰主將以下謂戰士以上臨陳交兵而有先退若寇賊對陳而捨仗投軍謂背彼凶徒捨仗歸命及雖非對陳棄賊來降而輒殺之者斬謂先退以下皆從此坐即違犯軍令軍還以後在律有條者依律斬斷無條者勿論疏議曰若違犯軍中號令者軍還以後其所違之罪在律有條者仍依律斷直違將軍教令在律無條軍還之後不合論罪故云無條者勿論諸在軍所及在鎮戍私放征防人還者各以征鎮人逃亡罪論即私放輒離軍鎮者各減二等疏議曰在軍所者謂在行軍之所在鎮戍者謂在鎮戍之處私放征防人還者謂征防之人未合還家輒私放者各以征鎮人逃亡罪論依捕亡律從軍征討而亡者一日徒一年一日加一等十五日絞臨對寇賊而亡者斬主司故縱與同罪若放征人令還各得此罪又條防人向防及在防未滿而亡者鎮人亦同一日杖八十三日加一等放防人還者各得此罪是名各以征鎮人逃亡罪論即私放輒離軍鎮者謂放軍人去軍防人離鎮既非即放還家征防二色各減本罪二等若放人多者一人準一日放日多者一日準一人臨軍征討而放者斬被放者各減一等疏議曰依捕亡律從軍征討而亡一日徒一年一日加一等十五日絞若放十五人一日亦合絞其放鎮戍人而還一人一日杖八十三日加一等三十一日流三千里若放三十一人一日亦流三千里即私放輒離軍鎮者各減二等謂放征人去軍一日杖九十一日加一等十五日徒三年若放防人離鎮一日杖六十三日加一等罪止徒二年半是為放人多者一人準一日放日多者一日準一人注云謂放三人各五日放五人各三日俱纍成十五日各合絞稱之類者或放七人各二日又放一人經一日亦為十五日合絞人之與日竝得相纍或人或日纍成十五日皆至死刑故云之類竝經宿乃坐不經宿者無罪雖經宿不滿日者一人從不應為之坐征人從重鎮戍從輕注云經宿乃坐者以人日相率恐放十人經半日即為五人之罪故云經宿乃坐還與百刻義同臨軍征討而放者斬謂臨陳對寇輒放征人不待終日即合處斬被放者流三千里被放征人防人各減主司罪一等故云各減一等謂放三人各五日放五人各三日纍成十五日之類竝經宿乃坐諸臨軍征討而巧詐以避征役疏議曰臨對寇賊即欲迫討乃巧詐方便推避征役注云巧詐百端或有誣告人罪以求推對或故犯輕法意在留連或故自傷殘或詐為疾患姦詐不一故云百端不可備陳故云之類若有校試以能為不能以故有所稽乏者以乏軍興論未廢事者減一等主司不加窮核而承詐者減罪二等知情者與同罪至死者加役流疏議曰有所校試謂臨軍之時一藝以上應供軍用軍中校試故以能為不能以巧詐不能之故於軍有所稽違及致闕乏廢事者以乏軍興論故失俱合斬若於事未廢減死一等主司不加窮核主司謂應檢勘校試之人不加窮研核實而承詐依信者減罪人罪二等知情者謂知巧詐之情竝與犯者同罪至死者加役流未闕事者流三千里巧詐百端謂若誣告人故犯輕罪之類諸鎮戍有犯本條無罪名者各減征人二等疏議曰鎮戍有所犯法本條無罪名者謂鎮戍防人冒名相代及主司知情不知情若鎮戍拒賊而有巧詐避役若有校試以能為不能竝在鎮戍中無有罪名者各減征人二等諸戎仗非公文出給而輒出給者主司徒二年雖有符牒合給未判而出給者杖一百儀仗各減三等疏議曰出給戎仗兵器非得公文而輒出給者主司徒二年主司謂當判署者雖有符牒合給未判而出給謂有符牒到司仍未行判即準符牒出給者杖一百其於留守所及諸州府差發或應用魚符敕書而不用者亦徒二年儀仗各減三等儀仗謂吉凶鹵簿諸門戟矟之類無文牒出給者杖一百未判出給者杖七十故云各減三等諸鎮戍應遣番代而違限不遣者一日杖一百三日加一等罪止徒二年即代到而不放者減一等疏議曰依軍防令防人番代皆十月一日交代如官司違限不遣若準程稽違不早遣者一日杖一百三日加一等罪止徒二年即代到不放謂防人十月一日替到不放者減一等謂一日杖九十三日加一等罪止徒一年半若鎮戍官司役使防人不以理致令逃走者一人杖六十五人加一等罪止徒一年半疏議曰依軍防令防人在防守固之外唯得修理軍器城隍公廨屋宇各量防人多少於當處側近給空間地逐水陸所宜斟酌營種并雜蔬菜以充糧貯及充防人等食此非正役不責全功自須苦樂均平量力驅使鎮戍官司使不以理致令逃走者一人杖六十五人加一等罪止徒一年半若使不以理而防人雖不逃走仍從違令科斷諸有所興造應言上而不言上應待報而不待報各計庸坐贓論減一等疏議曰修城郭築堤防興起人功有所營造依營繕令計人功多少申尚書省聽報始合役功或不言上及不待報各計所役人庸坐贓論減一等其庸倍論罪止徒二年半即料請財物及人功多少違實者笞五十若事已損費各併計所違贓庸重者坐贓論減一等疏議曰即料請財物及人功多少違實者謂官有營造應須市買料請所須財物及料用人功多少故不以實者笞五十若事已損費或已損財物或已費人功各併計所費功庸準贓重者坐贓論減一等重者謂重於笞五十即五匹一尺以上坐贓論減一等合杖六十者為贓重本料不實止坐元料之人若由請人不實即請者合坐失者各減三等依名例律以贓致罪頻犯者各倍論此既因贓獲罪功庸出衆人之上并通官物即合纍而倍論若直費官財物不損庸直止據所費財科不在倍限雖費人功倍併不重於官物止從官物科斷即是纍併不加重者止從重論本料不實料者坐請者不實請者坐諸非法興造及雜徭役十庸以上坐贓論疏議曰非法興造謂法令無文雖則有文非時興造亦是若作池亭賓館之屬及雜徭役謂非時科喚丁夫驅使十庸以上坐贓論既準衆人為庸亦須纍而倍折故注云謂為公事役使而非法令所聽者因而率斂財物者亦併計坐贓論仍亦倍折以其非法贓斂不自入己得罪故輕謂為公事役使而非法令所聽者諸工作有不如法者笞四十不任用及應更作者併計所不任贓庸坐贓論減一等其供奉作者加二等工匠各以所由為罪監當官司各減三等疏議曰工作謂在官司造作輒違樣式有不如法者笞四十不任用謂造作不任時用及應更作者併計所不任贓庸纍倍坐贓論減一等十匹杖一百十匹加一等罪止徒二年半其供奉作加二等者供奉之義已於職制解訖若不如法杖六十不任用及應更作坐贓論加一等罪止流二千里其併倍訖不重費官物者竝直計官物科之其贓不倍工匠各以所由為罪監當官司各減三等者謂親監當造作若有不如法減工匠三等笞十不任用及應更作減坐贓四等罪止徒一年供奉作罪止徒二年之類諸私有禁兵器者徒一年半疏議曰私有禁兵器謂甲弩矛矟具裝等依令私家不合有若有矛矟者各徒一年半注云謂非弓箭刀楯短矛者此上五事私家聽有其旌旗幡幟及儀仗竝私家不得輒有違者從不應為重杖八十弩一張加二等甲一領及弩三張流二千里甲三領及弩五張絞私造者各加一等疏議曰弩一張加二等謂加私有禁兵器罪二等合徒二年半甲一領及弩三張流二千里有甲有弩各得此罪甲三領及弩五張絞亦甲弩準數各得絞罪私造者各加一等謂私造甲弩及禁兵器各加私有罪二等問曰私有甲三領及弩五張準依律文各合處絞有人私有甲二領并弩四張欲處何罪答曰畜甲畜弩各立罪名既非一事不合併滿依名例律其應入罪者舉輕以明重有甲罪重有弩坐輕既有弩四張已合流罪加一滿五即至死刑況加甲二領明合處絞私有弩四張加甲一領者亦合死刑注甲謂皮鐵等具裝與甲同即得闌遺過三十日不送官者同私有法疏議曰鐵甲皮甲得罪皆同私有其裝與甲無別有一具裝流二千里有三領者亦合絞即得闌遺過三十日不送官謂得闌遺禁兵器以下三十一日不送官者同私有法既稱過三十日即三十日內不合此罪又依軍防令闌得甲仗皆即輸官不送輸者從違令笞五十滿五日者依雜律各以亡失罪論其亡失之罪從本條解釋其甲非皮鐵者依庫部式亦有聽畜之處其限外剩畜及不應畜而有者亦準禁兵器論但甲有禁文非私家合有為非皮鐵量罪梢輕坐同禁兵器理為適中造未成者減二等即私有甲弩非全成者杖一百餘非全成者勿論疏議曰造未成者謂從上禁兵器以下未成者各減私造罪二等謂甲三領弩五張以上縱更多有各止處徒三年即私有甲弩非全成者謂不堪著用又非私造杖一百餘非全成者勿論謂甲弩之外所有禁兵器非全成者皆不坐既是禁兵器雖不合罪亦須送官謂非弓箭刀楯短矛者甲謂皮鐵等具裝與甲同即得闌遺過三十日不送官者同私有法諸役功力有所採取而不任用者計所缺庸坐贓論減一等疏議曰謂官役功力若採藥或取材之類而不任用者若全不任用須計全庸若少不任用準其缺庸併倍坐贓論減一等若有所造作及有所毀壞備慮不謹而誤殺人者徒一年半工匠主司各以所由為罪疏議曰謂有所繕造營作及有所毀壞崩撤之類不先備慮謹愼而誤殺人者徒一年半工匠主司各以所由為罪或由工匠指撝或是主司處分各以所由為罪明無連坐之法律既但稱殺人即明傷者無罪諸應差丁夫而差遣不平及缺剩者一人笞四十五人加一等罪止徒一年即丁夫在役日滿不放者一日笞四十一日加一等罪止杖一百疏議曰差遣之法謂先富強後貧弱先多丁後少丁凡丁分番上役者家有兼丁要月家貧單身間月之類違此不平及令人數缺剩者一人笞四十五人加一等罪止徒一年即丁夫在役謂在役之人日滿不放者一日笞四十一日加一等罪止杖一百注云各坐其所由謂止坐不放者所由之人明無連坐之法各坐其所由諸被差充丁夫雜匠而稽留不赴者一日笞三十三日加一等罪止杖一百將領主司加一等防人稽留者各加三等即由將領者將領者獨坐疏議曰丁夫雜匠被官差遣不依程限而稽留不赴者一日笞三十三日加一等罪止杖一百將領主司加一等主司謂親領監當者一日笞四十三日加一等罪止徒一年其防人稽留者各加三等一日杖六十三日加一等罪止徒二年其將領主司亦加一等若由將領主司稽留丁夫雜匠防人不合得罪唯罪將領之人故云將領者獨坐注云餘條將領稽留者準此餘條謂征人等但是差行有主司將領本條無將領罪名事由將領者皆將領者獨坐餘條將領稽留者準此諸丁夫雜匠在役而監當官司私使及主司於職掌之所私使兵防者各計庸準盜論即私使兵防出城鎮者加一等疏議曰丁夫雜匠見在官役役限之內而監當官司私役使及主司謂應判署及親監當兵防之人於職掌之所私使各計庸準盜論謂從丁夫以下各計私使之庸準盜論即雜使計庸不滿尺者從盜不得財笞五十兵防竝據城隍內使者若私使出城鎮加罪一等謂計庸加準盜論罪一等即強使者依職制律強者加二等餘條強者準此若強使兵防出城者即亦於本罪加一等上纍加雖稱丁夫雜匠及兵防非在役限內而使者丁夫雜匠依上條日滿不放笞四十一日加一等罪止杖一百兵防從代到不放一日杖九十三日加一等罪止徒一年半計庸重者若見是監臨官依役使所監臨之罪其非本部官者依不應得為從輕笞四十庸多得罪重者依職制律去官而受舊官屬士庶饋與若乞取借貸之屬各減在官時三等非監臨官私使亦於準盜論上減三等故唐律疏議卷第十七賊盜凡一十三條疏議曰賊盜律者魏文侯時里悝首制法經有盜法賊法以為法之篇目自秦漢逮至後魏皆名賊律盜律北齊合為賊盜律後周為劫盜律復有賊叛律隋開皇合為賊盜律至今不改前禁擅發兵馬此須防止賊盜故次擅興之下諸謀反及大逆者皆斬父子年十六以上皆絞十五以下及母女妻妾祖孫兄弟姊妹若部曲資財田宅竝沒官男夫年八十及篤疾婦人年六十及廢疾者竝免伯叔父兄弟之子皆流三千里不限籍之同異疏議曰人君者與天地合德與日月齊明上祗寶命下臨率土而有狡竪凶徒謀危社稷始興狂計其事未行將而必誅即同真反名例稱謀者二人以上若事已彰明雖一人同二人之法大逆者謂謀毀宗廟山陵及官闕反則止據始謀大逆者謂其行訖故謀反及大逆者皆斬父子年十六以上皆絞言皆者罪無首從十五以下及母女妻妾注云子妻妾亦同祖孫兄弟姊妹若部曲資財田宅竝沒官部曲不同資財故特言之部曲妻及客女竝與部曲同奴婢同資財故不別言男夫年八十及篤疾婦人年六十及廢疾竝免緣坐注云餘條婦人應緣坐者準此謂謀叛已上道及殺一家非死罪三人并告賊消息此等之罪緣坐各及婦人其年六十及廢疾亦免故云婦人應緣坐者準此伯叔父兄弟之子皆流三千里不限籍之同異雖與反逆人別籍得罪皆同若出繼同堂以外即不合緣坐即雖謀反詞理不能動衆威力不足率人者亦皆斬父子母女妻妾竝流三千里資財不在沒限其謀大逆者絞疏議曰即雖謀反者謂雖構亂常之詞不足動衆人之意雖騁凶威若力不能驅率得人雖有反謀無能為害者亦皆斬父子母女妻妾竝流三千里資財不在沒限注云謂結謀真實而不能為害者若自述休徴言身有善應或假託靈異妄稱兵馬或虛論反狀妄說反由如此傳惑衆人而無真狀可驗者自從祆法謂一身合絞妻子不合緣坐謀大逆者絞上文大逆即據逆事已行此為謀而未行唯得絞罪律不稱皆自依首從之法問曰反逆人應緣坐其妻妾據本法雖會赦猶離之正之其繼養子孫依本法雖會赦合正之準離之正之即不在緣坐之限反逆事彰之後始訴離之正之如此之類竝合放免以否答曰刑法愼於開塞一律不可兩科執憲履繩務從折中違法之輩已汨朝章雖經大恩法須離正離正之色即是凡人離正不可為親須從本宗緣坐子妻妾亦同余條婦人應緣坐者準此謂結謀真實而不能為害者若自述休徴假託靈異妄稱兵馬虛說反由傳惑衆人而無真狀可驗者自從祆法諸緣坐非同居者資財田宅不在沒限雖同居非緣坐及稼坐人子孫應免流者各準分法留還疏議曰緣坐非同居者謂謀反大逆人親伯叔兄弟已分異訖田宅資財不在沒限雖見同居準律非緣坐謂非期以上親及子孫其祖母及伯叔母姑兄弟妻各謂無夫者律文不載竝非緣坐其緣坐人子孫謂伯叔子及兄弟孫據律亦不緣坐各準分法留還謂未經分異犯罪之後竝準戶令分法其孫婦雖非緣坐夫沒即合歸宗準法不入分限注云老疾得免者男夫年八十及篤疾婦人年六十及廢疾各準戶內應分人多少人別得準一子分法留還問曰老疾得免者各準一子分法假有一人年八十有三男十孫或一孫反逆或一男見在或三男俱死唯有十孫老者若為留分答曰男但一人見在依令作三男分法添老者一人即為四分若三男死盡依令諸子均分老人共十孫為十一分留一分與老者是為各準一子分法若女許嫁已定歸其夫出養入道及娉妻未成者不追坐道士及婦人若部曲奴婢犯反逆者止坐其身疏議曰女許嫁已定謂有許婚之書及私約或已納娉財雖未成皆歸其夫出養謂男女為人所養入道謂為道士女官若僧尼娉妻未成者雖克吉日男女未相見竝不追坐出養者從所養家緣坐不涉本生道士及婦人稱道士僧尼亦同婦人不限在室及出嫁入道若部曲奴婢者奴婢不限官私犯反逆者止坐其身自道士以下若犯謀反大逆竝無緣坐故云止坐其身問曰雜戶及太常音聲人犯反逆有緣坐否答曰雜戶及太常音聲人各附縣貫受田進丁老免與百姓同其有反逆及應緣坐亦與百姓無別若工樂官戶不附州縣貫者與部曲例同止坐其身更無緣坐老疾得免者各準一子分法出養者從所養坐諸口陳欲反之言心無真實之計而無狀可尋者流二千里疏議曰有人實無謀危之計口出欲反之言勘無實狀可尋妄為狂悖之語者流二千里若有口陳欲逆叛之言勘無真實之狀律令既無條制各從不應為重諸謀叛者絞已上道者皆斬疏議曰謀叛者謂欲背國投僞始謀未行事發者首處絞從者流已上道者不限首從皆斬注云謂協同謀計乃坐協者和也謂本情和同共作謀計此等各依謀叛之法被驅率者非謂元本不共同情臨時而被驅率者不坐餘條被驅率者準此餘條謂謀反謀犬逆或亡命山澤不從追喚既肆凶悖堪擅殺人并劫囚之類被驅率之人不合得罪妻子流二千里若率部衆百人以上父母妻子流三千里所率雖不滿百人以故為害者以百人以上論疏議曰叛者身得斬罪妻子仍流二千里若唯有妻及子年十五以下合贖婦人不可獨流須依留住之法加杖居作若子年十六以上依式流配其母至配所免居作在室之女不在配限名例律緣坐者女不同故也若率部衆百人以上罪狀尤重故父母及妻子流三千里所率雖不滿百人以故為害者以百人以上論注云害謂有所攻擊虜掠者或攻擊城隍或虜掠百姓依百人以上論各身處斬父母妻子流三千里其攻擊城隍因即拒守自依反法即亡命山澤不從追喚者以謀叛論其抗拒將吏者以已上道論疏議曰謂背誕之人亡命山澤不從追喚者以謀叛論首得絞刑從者流三千里抗拒將吏者謂有將吏追討仍相抗拒者以已上道論竝身處斬妻子配流抗拒有害者父母妻子流三千里竝準上文率部衆百人以上不須有害若不滿百人要須有害得罪乃與百人以上同謂協同謀計乃坐被驅率者非餘條被驅率者準此害謂有所攻擊虜掠者諸謀殺制使若本屬府主刺史縣令及吏卒謀殺本部五品以上官長者流二千里已傷者絞已殺者皆斬疏議曰制使本屬府主國官邑官已從名例解訖刺史都督縣令竝據本部者吏卒謀殺都水使者或折衝府衛士謀殺本府折衝果毅如此之類竝流二千里工樂謂不屬縣貫唯隸本司并公廨戶奴婢謀殺本司五品以上官長罪與吏卒同若司農官戶奴婢謀殺司農卿者理與工樂謀殺太常卿少府監無別餘條謂工樂官戶奴婢毆詈本部五品以上官長當條無罪名者竝與吏卒同已傷者絞仍依首從法已殺者皆斬工樂及公廨戶奴婢與吏卒同餘條準此諸謀殺期親尊長外祖父母夫夫之祖父母父母者皆斬疏議曰期親尊長外祖父母夫夫之祖父母父母竝於名例解訖若妻妾同謀亦無首從注云犯姦而姦人殺其夫謂妻妾與人姦通而姦人殺其夫謀而已殺故殺鬪殺者所姦妻妾雖不知情與殺者同罪謂所姦妻妾亦合絞謀殺緦麻以上尊長者流二千里已傷者絞已殺者皆斬疏議曰謀殺緦麻以上尊長則大功以下皆是外姻有服尊長亦同俱流二千里已傷者首處絞從者流謀而殺訖者皆斬罪無首從即尊長謀殺卑幼者各依故殺罪減二等已傷者減一等已殺者依故殺法疏議曰謂上文尊長謀殺卑幼當條無罪名者各依故殺罪減二等已傷者減一等假如有所規求謀殺期親卑幼合徒三年已傷者流三千里已殺者依故殺法合絞之類言故殺法者謂罪依故殺法其首各依本謀論造意者雖不行仍為首從者不行減行者一等假有伯叔數人謀殺猶子訖即首合流二千里從而加功合徒三年從者不加功徒二年半從者不行減行者一等徒二年之類略舉殺期親卑幼餘者不復備文其應減者各依本罪上減犯姦而姦人殺其夫所姦妻妾雖不知情與同罪諸部曲奴婢謀殺主者皆斬謀殺主之期親及外祖父母者絞已傷者皆斬疏議曰稱部曲奴婢者客女及部曲妻竝同此謂謀而未行但同籍良口以上合有財分者竝皆為主謀殺者皆斬罪無首從謀殺主之期親為別戶籍者及外祖父母者絞依首從科已傷者皆斬謂無首從其媵及妾在令不合分財竝非奴婢之主諸妻妾謀殺故夫之祖父母父母者流二千里已傷者絞已殺者皆斬部曲奴婢謀殺舊主者罪亦同疏議曰妻妾謀殺故夫之祖父母父母者流二千里已傷者絞竝據首從科之已殺者皆斬罪無首從謂一家之內妻妾寡者數人夫亡之後竝已改嫁後共謀殺故夫之祖父母父母俱得斬刑若兼他人同謀他人依首從之法不入皆斬之限部曲奴婢謀殺舊主稱罪亦同者謂謀而未殺流二千里已傷者絞已殺者皆斬注云故夫謂夫亡改嫁舊主謂主放為良者妻妾若被出及和離即同凡人不入故夫之限其舊主謂經放為良及自贖免賤者若轉賣及自理訴得脫即同凡人餘條故夫舊主準此謂毆詈告言之類當條無文者竝準此故夫謂夫亡改嫁舊主謂主放為良者餘條故夫舊主準此諸謀殺人者徒三年已傷者絞已殺者斬從而加功者絞不加功者流三千里造意者雖不行仍為首疏議曰謀殺人者謂二人以上若事已彰露欲殺不虛雖獨一人亦同二人謀法徒三年已傷者絞已殺者斬從而加功者絞謂同謀共殺殺時加功雖不下手殺人當時共相擁迫由其遮遏逃竄無所既相因藉始得殺之如此經營皆是加功之類不限多少竝合絞刑同謀從而不加功力者流三千里造意者謂元謀屠殺其計已成身雖不行仍為首罪合斬餘加功者絞注云雇人殺者亦同謂造意為首受雇加功者為從即從者不行減行者一等疏議曰謂謀殺人從者不行減行者一等合徒三年注云餘條不行準此餘條謂劫囚傷人及謀殺緦麻以上尊長已傷之類從者不行亦減一等其有發心謀殺即皆斬者同謀不行不在減例謂謀殺期親尊長同謀不行亦得斬罪雇人殺者亦同餘條不行準此諸劫囚者流三千里傷人及劫死囚者絞殺人者皆斬疏議曰犯罪之人身被囚禁凶徒惡黨共來相劫奪者流三千里若因劫輕囚傷人及劫死囚而不傷人各得絞罪仍依首從科斷因劫囚而有殺人者皆合處斬罪無首從注云但劫即坐不須得囚謂以威若力強劫囚者即合此坐不須要在得囚若竊囚而亡者與囚同罪竊而未得減二等以故殺傷人者從劫囚法疏議曰謂私竊取囚因即逃逸與囚同罪者謂竊死囚還得死罪竊流徒囚還得流徒罪之類假使得相容隱亦不許竊囚故注云他人親屬等竊而未得減二等謂竊計已行未離禁處者減所竊囚罪二等謂未得死囚者徒三年未得流囚者徒二年半之類若因竊囚之故而殺傷人者即從劫囚之法科罪問曰父祖子孫見被囚禁而欲劫取乃誤殺傷祖孫或竊囚過失殺傷他人各合何罪答曰據律劫囚者流三千里傷人及劫死囚者絞殺人者皆斬據此律意本為殺傷傍人若有誤殺傷被劫之囚止得劫囚之坐若其誤殺父祖論罪重於劫囚既是因誤而殺須依過失之法其因竊囚過失殺傷他人者下條云因盜而過失殺傷他人者以鬪殺傷論至死者加役流既竊囚之事類因盜之罪其有過失彼此不殊殺傷人者亦依鬪殺傷人論應至死者從加役流坐其有誤殺傷本法輕於竊囚未得者即從重科又問竊囚而亡被人追捕棄囚逃走後始拒格因而殺傷罪同劫囚以否答曰下條竊盜發覺棄財逃走因相拒捍如此之類事有因緣者非強盜今者竊囚而亡棄囚逃走理與竊盜發覺棄財逃走義同止得拒捕而科不同劫囚之坐但劫即坐不須得囚他人親屬等諸有所規避而執持人為質者皆斬部司及鄰伍知見避質不格者徒二年疏議曰有人或欲規財或欲避罪執持人為質規財者求贖避罪者防格不限規避輕重持質者皆合斬坐部司謂持質人處村正以上并四鄰伍保或知見皆須捕格若避質不格者各徒二年注云質期以上親及外祖父母聽身避不格者謂賊執此等親為質唯聽一身不格不得率衆總避其質者無期以上親及非外祖父母而避不格者各徒二年質期以上親及外祖父母者聽身避不格諸殺一家非死罪三人及支解人者皆斬妻子流二千里疏議曰殺人之法事有多端但據前人身死不論所殺之狀但殺一家非死罪良口三人即為不道若三人內一人先犯死罪而殺之者即非不道只依殺一人罪法注云同籍及期親為一家同籍不限親疏期親雖別籍亦是即殺一家三人雖有先後發時應合同斷或所殺之事應合同斷事發乃有先後者皆為一時殺法總入不道殺一家三人內兼殺部曲奴婢者非及支解人者注云謂殺人而支解者或殺時即支解或先支解而後殺之皆同支解竝入不道若殺訖絶時後更支解者非或故焚燒而殺或殺時即焚燒者文雖不載罪與支解義同皆合處斬罪無首從妻子流二千里問曰假有部曲若奴殺別人部曲奴婢一家三人或支解依例有犯各準良人合入十惡以否答曰部曲奴婢雖與良人有殊至於同類殺三人及支解者不可別為差等坐同良人還入十惡同籍及期親為一家即殺雖先後事應同斷或應合同斷而發有先後者皆是奴婢部曲非謂殺人而支解者諸祖父母父母及夫為人所殺私和者流二千里期親徒二年半大功以下遞減一等受財重者各準盜論雖不私和知殺期以上親經三十日不告者各減二等疏議曰祖父母父母及夫為人所殺在法不可同天其有忘大痛之心捨枕戈之義或有窺求財利便即私和者流二千里若殺期親私和者徒二年半大功以下遞減一等謂大功徒二年小功徒一年半緦麻徒一年受財重者各準盜論謂受讎家之財重於私和之罪假如緦麻私和合徒一年受財十匹準盜徒一年半之類雖不私和知殺期以上親經三十日不告所在官司者各減前私和之罪二等雖則私和罪重受財罪輕其贓本合計限為數少從重終合沒官發後輸財私和依法合重其事如傍親為出財私和者自合行求之法依雜律坐贓論減五等其贓亦合沒官其有五服內親自相殺者疏殺親合告親殺疏不合告親疏等者卑幼殺尊長得告尊長殺卑幼不得告其應相隱者疏殺親義服殺正服卑幼殺尊長亦得論告其不告者亦無罪若殺祖父母父母應償死者雖會赦仍移鄉避讎以其與子孫為讎故令移配若子孫知而不告從私和及不告之法科之問曰監臨親屬為部下人所殺因茲受財私和合得何罪答曰依律監臨之官知所部有犯法不舉劾者減罪人罪三等況監臨內相殺被殺者又是本親一違律條二乖親義受財一匹以上竝是枉法之贓贓輕及不受財各得私和之罪其間有罪重者各從重科又問主被人殺部曲奴婢私和受財不告官府合得何罪答曰奴婢部曲身繫於主主被人殺侵害極深其有受財私和知殺不告金科雖無節制亦須比附論刑豈為在律無條遂使獨為僥幸然奴婢部曲法為主隱其有私和不告得罪竝同子孫故唐律疏議卷第十八賊盜凡九條諸以物置人耳鼻及孔竅中有所妨者杖八十其故屏去人服用飮食之物以故殺傷人者各以鬪殺傷論疏議曰耳鼻孔竅皆為要所輒以他物置中有所妨者杖八十本條毆罪重者依毆法毆未有罪者亦不科其屏去人服用飮食之物謂寒月屏去人衣服或登高乘馬私去梯轡或飢渴之人屏去飮食之類以屏去之故及置物於人孔竅之中而殺傷人者各以鬪殺傷論若殺凡人或傷尊長應死或於卑幼及賤人雖殺不合償死及傷尊卑貴賤各有等差須依鬪訟律從本犯科斷故云各以鬪殺傷論若恐迫人使畏懼致死傷者各隨其狀以故鬪戲殺傷論疏議曰若恐迫人者謂恐動逼迫使人畏懼而有死傷者若履危險臨水岸故相恐迫使人墜陷而致死傷者依故殺傷法若因鬪恐迫而致死傷者依鬪殺傷法或因戲恐迫使人畏懼致死傷者以戲殺傷論若有如此之類各隨其狀依故鬪戲殺傷法科罪諸造畜蠱毒及教令者絞造畜者同居家口雖不知情若里正知而不糾者皆流三千里疏議曰蠱有多種罕能究悉事關左道不可備知或集合諸蠱置於一器之內久而相食諸蠱皆盡若蛇在即為蛇蠱之類造謂自造畜謂傳畜可以毒害於人故注云謂造合成蠱堪以害人者若自造若傳畜猫鬼之類及教令人竝合絞罪若同謀而造律不言皆即有首從其所造及畜者同居家口不限籍之同異雖不知情若里正坊正村正知而不糾者皆流三千里問曰律文唯言里正坊正村正等罪不言州縣知情之法若州縣官司知而不糾復合何罪答曰里正之等親管百姓既同里閈多相諳委州縣去人梢遠管戶又多是故律文遂無節制若知而不糾依鬪訟律監臨之官知所部有犯法不舉劾者減罪人罪三等糾彈之官唯減二等造畜者雖會赦并同居家口及教令人亦流三千里即以蠱毒毒同居者被毒之人父母妻妾子孫不知造蠱情者不坐疏議曰造畜蠱毒之人雖會大赦并同居家口及教令人亦流三千里注云八十以上十歲以下及篤疾無家口同流者放免據此老幼及篤疾身自犯罪猶尚免流今以同居共活有同流家口亦配無同居家口共去其老小及篤疾不能自存故從放免即造畜蠱毒之人以蠱毒毒同居者其被毒之人父母妻妾子孫不知造蠱毒情者竝免流罪問曰被毒之人父母不知情者放免假有親兄弟大房造蠱以毒小房既同父母未知父母合免以否答曰蠱毒家口會赦猶流恐其涉於知情所以例不聽住若以蠱毒毒同居被毒之人父母妻妾子孫不知情者不坐雖復兄弟相毒終是被毒之人父母既無不免之制不知情者合原又問老小篤疾無家口同流者放免其家總無良口惟有部曲若有奴婢一人得為有同流家口老小篤疾仍配以否答曰部曲既許轉事奴婢比之資財諸條多不同良人即非同流家口之例又問依律犯罪未發自首合原造畜蠱毒之家良賤一人先首事既首訖得免罪以否答曰犯罪首免本許自新蠱毒已成自新難雪比之會赦仍竝從流謂造合成蠱堪以害人者坊正村正亦同八十以上十歲以下及篤疾無家口同流者放免諸以毒藥藥人及賣者絞即賣買而未用者流二千里疏議曰凡以毒藥藥人謂以鴆毒冶葛烏頭附子之類堪以殺人者將用藥人及賣者知情竝合科絞注云謂堪以殺人者雖毒藥可以療病買者將以毒人賣者不知毒人之情賣者不坐即賣買而未用者謂買毒藥擬將殺人賣者知其本意而未用者流二千里問曰毒藥藥人合絞其有尊卑長幼貴賤得罪竝依律以否答曰律條簡要止為凡人生文其有尊卑貴賤例從輕重相舉若犯尊長及貴者各依謀殺已殺法如其施於卑賤亦準謀殺已殺論如其藥而不死者竝同謀殺已傷之法脯肉有毒曾經病人有餘者速焚之違者杖九十若故與人食并出賣令人病者徒一年以故致死者絞即人自食致死者從過失殺人法疏議曰脯肉有毒謂曾經人食為脯肉所病者有餘速即焚之恐人更食須絶根本違者杖九十其知前人食已得病故將更與人食或將出賣以故令人病者合徒一年因而致死者絞即人自食致死者謂有餘不速焚之雖不與人其人自食因即致死者從過失殺人法徴銅入死家注云盜而食者不坐謂人竊盜而食之以致死傷者脯肉主不坐仍科不速焚之罪其有害心故與尊長食欲令死者亦準謀殺條論施於卑賤致死依故殺法請堪以殺人者雖毒藥可以療病買者將毒人賣者不知情不坐盜而食者不坐諸有所憎惡而造厭魅及造符書呪詛欲以殺人者各以謀殺論減二等疏議曰有所憎嫌前人而造厭魅厭事多方罕能詳悉或圖畫形像或刻作人身刺心釘眼繫手縛足如此厭勝事非一緒魅者或假託鬼神或妄行左道之類或呪或詛欲以殺人者各以謀殺論減二等若於期親尊長及外祖父母夫夫之祖父母父母各不減依上條皆合斬罪以故致死者各依本殺法欲以疾苦人者又減二等疏議曰以故致死者謂以厭魅符書呪詛之故但因一事致死者不依減二等各從本殺法欲以疾苦人者謂厭魅符書呪詛不欲令死唯欲前人疾病苦痛者又減二等稱又減者謂大功以下親及凡人非外祖父母謀殺得減二等者謂從謀殺上總減四等注云子孫於祖父母父母部曲奴婢於主者各不減即是期親尊長外祖父母夫夫之祖父母父母唯減二等其祖父母父母以下雖復欲令疾苦亦同謀殺之法皆斬不同減例問曰呪詛大功以上尊長小功尊屬欲令疾苦未知合入十惡以否答曰疾苦之法同於毆傷謀毆大功以上尊長小功尊屬不入十惡如其已疾苦理同毆法便當不睦之條即於祖父母父母及主直求愛媚而厭呪者流二千里若涉乘輿者皆斬疏議曰子孫於祖父母父母及部曲奴婢於主造厭呪符書直求愛媚者流二千里若涉乘輿者罪無首從皆合處斬直求愛媚便得極刑重於盜服御之物準例亦入十惡於期親尊長及外祖父母夫夫之祖父母父母各不減子孫於祖父母父母部曲奴婢於主者各不減諸殺人應死會赦免者移鄉千里外其工樂雜戶及官戶奴并太常音聲人雖移鄉各從本色疏議曰殺人應死會赦免罪而死家有期以上親者移鄉千里外為戶其有特敕免死者亦依會赦例移鄉工樂及官戶奴竝謂不屬縣貫其雜戶太常音聲人有縣貫仍各於本司上下不從州縣賦役者此等殺人會赦雖合移鄉各從本色謂移鄉避讎竝從本色驅使注云部曲及奴出賣謂私奴出賣部曲將轉事人各於千里之外若羣黨共殺止移下手者及頭首之人若死家無期以上親或先相去千里外即習天文業已成若婦人有犯及殺他人部曲奴婢竝不在移限違者徒二年疏議曰羣黨共殺謂謀殺造意合斬從而加功者絞同謀共鬪各以下手重者為重罪亦合處絞律故云止移下手及頭首之人謂雖不下手發意元謀或以威力使人殺者竝合移鄉雖有從而加功準律合死既不下手共殺者即不移鄉若死家無期以上親或先相去千里外即習天文謂天文觀生天文生以上業已成者若婦人有犯謂無常居隨夫所在及殺他人部曲奴婢此等竝不在移鄉避讎之限注云部曲奴婢自相殺者亦同謂亦不在移鄉之例此以上應移而不移不應移而移違者各徒二年部曲及奴出賣及轉配事千里外人部曲奴婢自相殺者亦同諸殘害死尸及棄尸水中者各減鬪殺罪一等疏議曰殘害死尸謂支解形骸割絶骨體及焚燒之類及棄尸水中者各減鬪殺罪一等謂合死者死上減一等應流者流上減一等之類注云緦麻以上尊長不減謂殘害及棄尸水中各依鬪殺合斬不在減例棄而不失及髠髮若傷者各又減一等即子孫於祖父母父母部曲奴婢於主者各不減疏議曰棄尸水中還得不失髠髮謂髠去其髮傷謂故傷其尸傷無大小但非支解之類各又減一等謂凡人各減鬪殺罪二等緦麻以上尊長唯減一等大功以上尊長及小功尊屬仍入不睦即子孫於祖父母父母部曲奴婢於主者各不減竝同鬪殺之罪子孫合入惡逆決不待時注云皆謂意在於惡者謂從殘害以下竝謂意在於惡如無惡心謂若願自焚尸或遺言水葬及遠道尸柩將骨還鄉之類竝不坐謂焚燒支解之類緦麻以上尊長不減皆謂意在於惡者諸穿地得死人不更埋及於冢墓燻狐狸而燒棺椁者徒二年燒尸者徒三年緦麻以上尊長各遞加一等卑幼各依凡人遞減一等疏議曰因穿地而得死人其尸不限新舊不即埋掩令其曝露或於他人家墓而燻狐狸之類因燒棺槨者各徒二年謂唯燒棺槨火不到尸其燒棺槨者緦麻以上尊長從徒二年上遞加一等至期親尊長流二千五百里其卑幼各依凡人遞減一等緦麻於二年上減一等徒一年半小功徒一年大功杖一百期親杖九十若穿地得死人可識知是緦麻以上尊長而不更埋亦從徒二年上遞加一等卑幼亦從徒二年上遞減一等各準燒棺槨之法其燒尸者徒三年緦麻以上尊長各遞加一等謂從徒三年上遞加一等燒大功尊長尸流三千里雖期親尊長罪亦不加其卑幼各遮減一等謂緦麻卑幼減凡人一等徒二年半遞減至期親卑幼猶徒一年問曰下條發冢者加役流注云招魂而葬亦是此文燒尸者徒三年未知招魂而葬亦同以否答曰準律招魂而葬發冢者與有尸同罪律有燒棺槨之文復著燒尸之罪招魂而葬棺內無尸止得從燒棺槨之法不同燒尸之罪若子孫於祖父母父母部曲奴婢於主冢墓燻狐狸者徒二年燒棺槨者流三千里燒尸者絞疏議曰稱子孫於祖父母父母者曾高亦同部曲奴婢者隨身客女亦同子孫於祖父母父母部曲奴婢於主冢墓燻狐狸者徒二年若燒棺槨者流三千里燒尸者絞諸造祆書及祆言者絞疏議曰造祆書及祆言者謂構成怪力之書詐為鬼神之語休謂妄說他人及己身有休徴咎謂妄言國家有咎惡觀天畫地詭說災祥妄陳言凶竝涉於不順者絞傳用以惑衆者亦如之其不滿衆者流三千里言理無害者杖一百即私有祆書雖不行用徒二年言理無害者杖六十疏議曰傳用以惑衆者謂非自造傳用祆言祆書以惑三人以上亦得絞罪注云傳謂傳言用謂用書其不滿衆者謂被傳惑者不滿三人若是同居不入衆人之限此外一人以上雖不滿衆合流三千里其言理無害者謂祆書祆言雖說變異無損於時謂若豫言水旱之類合杖一百即私有祆書謂前人舊作衷私相傳非己所製雖不行用仍徒二年其祆書言理無害於時者杖六十造謂自造休咎及鬼神之言妄說吉凶涉於不順者傳謂傳言用謂用書諸夜無故入人家者笞四十主人登時殺者勿論若知非侵犯而殺傷者減鬪殺傷二等疏議曰夜無故入人家依刻漏法晝漏盡為夜夜漏盡為晝謂夜無事故輒入人家笞四十家者謂常家宅院之內登於入時被主人格殺之者勿論若知非侵犯謂知其迷誤或因醉亂及老小疾患竝及婦人不能侵犯而殺傷者減鬪殺傷二等若殺他人奴婢合徒三年得減二等徒二年之類問曰外人來姦主人舊已知委夜入而殺亦得勿論以否答曰律開聽殺之文本防侵犯之輩設令舊知姦穢終是法所不容但夜入人家理或難辨縱令知犯亦為罪人若其殺即加罪便恐長其侵暴登時許殺理用無疑況文稱知非侵犯而殺傷者減鬪殺傷二等即明知是侵犯而殺自然依律勿論其已就拘執而殺傷者各以鬪殺傷論至死者加役流疏議曰已就拘執謂夜入人家已被擒獲拘留執縛無能相拒本罪雖重不合殺傷主人若有殺傷各依鬪法科罪至死者加役流故唐律疏議卷第十九賊盜凡十七條諸盜大祀神御之物者流二千五百里其擬供神御疏議曰盜大祀神御之物公取竊取皆為盜大祀謂天地宗廟神州等其供神御所用之物而盜之者流二千五百里注云謂供神御者帷帳几杖亦同謂見供神御者雖帷帳几杖亦得流罪故云亦同其擬供神御謂上文神御之物及帷帳几杖營造未成擬欲供進者故注云謂營造未成者及供而廢闋若饗薦之具已饌呈者徒二年未饌呈者徒一年半已闋者杖一百若盜釜甑刀𠤎之屬竝從常盜之法疏議曰供而廢闋謂神御之物供祭已訖退還所司者故云廢闋若饗薦之具已饌呈者謂牲牢棗栗脯修之屬已入神所呈閲祀官訖而盜者各徒二年故注云饗薦謂玉幣牲牢之屬未饌呈者徒一年半謂以上玉幣牲牢饌具之屬未饌呈祀官而盜者徒一年半已闋者謂神前飮食薦饗已了退而盜者得杖一百若盜釜甑刀𠤎之屬謂竝不用供神故從常盜之法一尺杖六十一匹加一等五匹徒一年五匹加一等罪止加役流言之屬謂盤盂雜器之類謂供神御者帷帳几杖亦同謂營造未成者饗薦謂玉幣牲牢之屬饌呈謂已入祀所經祀官省視者已闋謂接神禮畢諸盜御寶者絞乘輿服御物者流二千五百里其擬供服御及供而廢闋若食將御者徒二年擬供食御及非服而御者徒一年半疏議曰稱御者太皇太后皇太后皇后亦同皇太子減一等皇帝八寶皆以玉為之有神寶受命寶皇帝行寶皇帝之寶皇帝信寶天子行寶天子之寶天子信寶此等八寶皇帝所用之物竝為御寶其三后寶以金為之竝不行用盜者俱得絞刑其盜皇太子寶準例合減一等流三千里若盜皇太子妃寶亦流三千里后寶既與御寶不殊妃寶明與太子無別乘輿服御物謂供奉乘輿服用之物三后服御之物亦同盜者流二千五百里若盜皇太子及妃所服用物準冽減一等合徒三年計贓重者即準贓同常盜之法加一等注云謂供奉乘輿之物服通衾茵之屬稱之屬者氈褥之類真副等真謂見供服用之衣副謂副二之服皆須監當之官部分擬進者乃為御物其擬供服御謂營造未成及供而廢闋謂已供用事畢是名廢闋若食將御者謂御食已呈監當之官擬進而盜及食者從擬供服御以下各徒二年故注云將御謂已呈監當之官擬供食御謂未呈監當之官及非服而御之物者若食及盜各徒一年半贓重者各計贓以常盜論加一等謂供奉乘輿之物服通衾茵之屬真副等皆須監當之官部分擬進乃為御物將御謂已呈監當之官諸盜官文書印者徒二年餘印杖一百疏議曰印者信也謂印文書施行通達上下所在信受故曰官文書印盜此印者徒二年餘印杖一百餘印謂給諸州封函及畜産之印在令式印應官給但非官文書之印盜者皆杖一百注云謂貪利之而非行用者皆謂藉以為財不擬行用若將行用即從僞造僞寫封用規避之罪科之謂貪利之而非行用者餘印謂印物及畜産者諸盜制書者徒二年官文書杖一百重害文書加一等紙券又加一等疏議曰盜制書徒二年敕及奏抄亦同敕旨無御畫奏抄即有御畫不可以御畫奏抄輕於敕旨各與盜制書罪同官文書謂在司尋常施行文書有印無印等重害文書加一等合徒一年注云亦謂貪利之亦如上條盜印藉為財用無所施行重害謂徒罪以上獄案及婚姻良賤勳賞黜陟授官除免之類稱之類者謂倉糧財物行軍文簿帳及戶籍手貴之屬盜者各徒一年若欲動事盜者自從增減之律即盜應除文案者依凡盜法疏議曰即盜應除文案者依令文案不須當留者每三年一揀除既是年久應除即非見行文案故依凡盜之法計贓科罪亦謂貪利之無所施用者重害謂徒罪以上獄案及婚姻良賤勳賞黜陟授官除免之類諸盜宮殿門符發兵符傳符者流二千里使節及皇城京城門符徒三年餘符徒一年門鑰各減三等盜州鎮及倉廚廏庫關門等鑰杖一百縣戍等諸門鑰杖六十疏議曰開閉殿門皆用銅魚合符用符鑰法式已於擅興律解訖發兵符以銅為之左者進內右者付州府監及提兵鎮守之所竝留守應執符官人其符雖通餘用為發兵事重故以發兵為目傳符謂給將乘驛者依公式令下諸方傳符兩京及北都留守為麟符東方青龍西方白虎南方朱雀北方玄武兩京留守二十左十九右一餘皆四左三右一左者進內右者付外州府監應執符人其兩京及北都留守符竝進內須遣使向四方皆給所詣處左符書於骨帖上內著符裹用泥封以門下省印印之所至之處以右符勘合然後承用盜者合流二千里節者皇華出使黜陟幽明輶軒奉制宣威殊俗皆執旌節取信天下及皇城門謂朱雀等門京城門謂明德等門盜此門符及使節者各徒三年餘符徒一年餘符謂禁苑及交巡等符案擅興律凡言餘符者契亦同即契應發兵者同發兵符法然則盜發兵契各同魚符之罪門鑰各減三等謂各減所開閉之門魚符三等假有盜宮殿門符合流二千里門鑰減三等得徒二年餘鑰應減門符竝準此若是禁苑門鑰不可輕於州鎮關門等鑰盜州鎮及官倉廚廏庫及關門等鑰各杖一百縣戍等諸門鑰稱諸門鑰者謂內外百司及坊市門官有門禁盜其鑰者各杖六十諸盜禁兵器者徒二年甲弩者流二千里若盜罪輕同私有法盜餘兵器及旌旗幡幟者杖九十若盜守衛官殿兵器者各加一等即在軍及宿衛相盜還充官用者各減二等疏議曰盜禁兵器者徒二年謂非弓箭刀楯短矛私家不合有者皆為禁兵器甲弩者流二千里盜罪輕者同私有法即盜弩一張流二千里盜甲一領亦流二千里案擅興律私有甲一領及弩三張流二千里甲三領及弩五張絞即盜甲三頌或盜弩五張竝得絞罪是名盜罪輕同私有法其盜餘兵器謂雖是官兵器私家合有者及旌旗幡幟者杖九十竝據盜官物計贓重加凡盜一等若盜守衛宮殿兵器者又各加一等謂見用守衛宮殿加凡盜二等即在軍謂在行軍之所若宿衛相盜還充官用者各減二等若入私者各同上文盜法諸盜毀天尊像佛像者徒三年即道士女官盜毀天尊像憎尼盜毀佛像者加役流真人菩薩各減一等盜而供養者杖一百疏議曰凡人或盜或毀天尊若佛像各徒三年道士女官盜毀天尊像僧尼盜毀佛像者各加役流為其盜毀所事先聖形像故加役流不同俗人之法真人菩薩各減一等凡人盜毀徒二年半道士女官盜毀真人僧尼盜毀菩薩各徒三年盜而供養者杖一百謂非貪利將用供養者但盜之與毀各得徒流之坐故注云盜毀不相須其非真人菩薩之像盜毀餘像者若化生神王之類當不應為從重有贓入己者即依凡盜法若毀損功庸多者計庸坐贓論各令修立其道士等盜毀佛像及菩薩僧尼盜毀天尊若真人各依凡人之法盜毀不相須諸發冢者加役流已開棺槨者絞發而未徹者徒三年疏議曰禮云葬者藏也欲人不得見古之葬者厚衣之以薪後代聖人易之以棺槨有發冢者加役流注云發徹即坐招魂而葬亦是謂開至棺槨即為發徹先無尸柩招魂而葬但使發徹者竝合加役流已開棺槨者絞謂有棺有槨者必須棺槨兩開不待取物觸尸俱得絞罪其不用棺槨葬者若發而見尸亦同已開棺槨之坐發而未徹者謂雖發冢而未至棺槨者徒三年其冢先穿及未殯而盜尸柩者徒二年半盜衣服者減一等器物甎版者以凡盜論疏議曰其冢先穿謂先自穿陷舊有隙穴者未殯謂尸猶在外未殯埋而盜尸柩者徒二年半謂盜者元無惡心或欲詐代人尸或欲別處改葬之類盜衣服者減一等得徒二年計贓重者以凡盜論加一等此文既稱未殯明上文發冢殯訖而發者亦是若盜器物甎版者謂冢先穿取其明器等物或甎若版以凡盜論問曰發冢者加役流律既不言尊卑貴賤未知發子孫冢得罪同凡人否答曰五刑之屬條有三千犯狀既多故通比附然尊卑貴賤等數不同刑名輕重粲然有別尊長發卑幼之墳不可重於殺罪若發尊長之冢據法止同凡人律云發冢者加役流在於凡人便減殺罪一等若發卑幼之冢須減本殺一等而科之已開棺槨者絞即同已殺之坐發而未徹者徒三年計凡人之罪減死二等卑幼之色亦於本殺上減二等而科若盜尸柩者依減三等之例其於尊長竝同凡人發徹即坐招魂而葬亦是諸盜園陵內草木者徒二年半若盜他人墓塋內樹者杖一百疏議曰園陵者三秦記云帝王陵有園因謂之園陵三輔黃圖云謂陵四闌門通四園然園陵草木而合芟刈而有盜者徒二年半若盜他人墓塋內樹者杖一百若贓重者準下條以凡盜論加一等若其非盜唯止斫伐者準雜律毀伐樹木稼穡各準盜論園陵內徒二年半他人墓塋內樹杖一百諸盜官私馬牛而殺者徒二年半疏議曰馬牛軍國所用故與餘畜不同若盜而殺者徒二年半若準贓重於徒二年半者以凡盜論加一等其有盜殺犛牛之類鄉俗不用耕駕者計贓以凡盜論諸盜不計贓而立罪名及言減罪而輕於凡盜者計贓重以凡盜論加一等疏議曰從盜大祀神御之物以下不計贓科唯立罪名亦有減處竝謂得罪應重故別立罪名若減罪輕於凡盜者各須計贓以凡盜論加一等假有盜他人馬牛而殺評馬牛贓直絹二十匹若計凡盜合徒二年半以盜殺馬牛故加凡盜一等處徒三年及言減罪輕於凡盜者上條盜尸柩者徒二年半盜衣服者減一等假有盜尸柩上衣服直絹二十匹依凡盜徒二年半文稱減一等只徒二年故依凡盜加一等亦徒三年是名以凡盜論加一等若盜皇太子服用及盜中小祀等物雖得減罪亦是盜不計贓諸強盜疏議曰強盜取人財注云謂以威若力假有以威脅人不加凶力或有直用凶力不作威脅而劫掠取財者先強後盜謂先加追脅然後取財先盜後強謂先竊其財事覺之後始加威力如此之例俱為強盜若飮人藥酒或食中加藥令其迷謬而取其財者亦從強盜之法即得闌遺之物財主來認因即毆擊不肯還物及竊盜取人財財主知覺遂棄財逃走財主逐之因相拒捍如此之類是事有因緣竝非強盜自從鬪毆及拒捍追捕之法問曰據捕亡律被盜雖傍人皆得捕繫未審盜者將財逃走傍人追柿因即格傷或絶時不絶時得罪同強盜否答曰依律盜者雖是傍人皆得捕繫以送官司盜者既將財逃走傍人依律合捕其人乃拒傷捕者即是先盜後強絶時以後捕者既無財主尋逐便是不知盜由因相拒格唯有拒捕之罪不成強盜不得財徒二年一尺徒三年二匹加一等十匹及傷人者絞殺人者斬其持仗者雖不得財流三千里五匹絞傷人者斬疏議曰盜雖不得財徒二年若得一尺即徒三年每二匹加一等贓滿十匹雖不滿十匹及不得財但傷人者竝絞殺人者竝斬謂因盜而殺傷人者注云殺傷奴婢亦同諸條奴婢多悉不同良人於此殺傷奴婢亦同良人之坐雖非財主但因盜殺傷皆是無問良賤皆如財主之法盜人若持仗雖不得財猶流三千里贓滿五匹合絞持仗者雖不得財傷人者斬罪無首從謂以威若力而取其財先強後盜先盜後強等若與人藥酒及食使狂亂取財亦是即得闌遺之物毆擊財主而不還及竊盜發覺棄財逃走財主追捕因相拒捍如此之類事有因緣者非強盜殺傷奴婢亦同雖非財主但因盜殺傷皆是諸竊盜不得財笞五十一尺杖六十一匹加一等五匹徒一年五匹加一等五十匹加役流疏議曰竊盜人財謂潛形隱面而取盜而未得者笞五十得財一尺杖六十一匹加一等即是一匹一尺杖七十以次而加至贓滿五匹不吏論尺即徒一年每五匹加一等四十匹流三千里五十匹加役流其有於一家頻盜及一時而盜數家者竝纍而倍論倍謂二尺為一尺若有一處贓多纍倍不加重者止從一重而斷其倍贓依例總徴諸監臨主守自盜及盜所監臨財物者加凡盜二等三十匹絞疏議曰假如左藏庫物則太府卿丞為監臨左藏令丞為監事見守庫者為主守而自盜庫物者為監臨主守自盜又如州縣官人盜部疏人財物是為盜所監臨注云若親王財物依令言皇兄弟皇子為親王監守自盜王家財物亦同官物之罪加凡盜二等一尺杖八十一匹加一等一匹一尺杖九十五匹徒二年五匹加一等是名加凡盜二等三十匹絞注云本條已有加者亦纍加之謂監臨主守自盜所監主不計贓之物計贓重者以凡盜論加一等即是本條已有加於此又加二等假有武庫令自盜禁兵器計贓直絹二十匹凡人盜者二十匹合徒二年半以盜不計贓而立罪名計贓重者加凡盜一等徒三年監主又加二等流二千五百里如此之類是本條已有加者亦纍加之若親王財物而監守自盜亦同本條已有加者亦纍加之諸故燒人舍屋及積聚之物而盜者計所燒減價併贓以強盜論疏議曰賊人姦詐千端萬緒濫竊穿窬觸途詭譎或有燒人舍屋及積聚之物因即盜取其財計所燒之物減價併於所盜之物計贓以強盜論十匹絞問曰有人持仗燒人舍宅因即盜取其財或燒傷物主合得何罪答曰依雜律故燒人舍屋徒三年不限強之與竊然則持仗燒人舍宅止徒三年因即盜取財物便是元非盜意雖復持仗而行事同先強後盜計贓以強盜科罪火若傷人者同強盜傷人法諸恐喝取人財物者準盜論加一等雖不足畏忌財主懼而自與亦同疏議曰恐喝者謂知人有犯欲相告訴恐喝以取財物者注云口恐喝亦是雖口恐喝亦與文牒同計贓準盜論加一等謂一尺杖七十一匹加一等五匹徒一年半五匹加一等三十五匹流三千里雖不足畏忌但財主懼而自與財者亦同恐喝之罪注云展轉傳言假若甲遣乙丙傳言於丁恐喝取物五匹甲合徒一年半乙丙竝各徒一年是名展轉傳言受財者皆為從坐若為人所侵損恐喝以求備償假有甲為乙踐損田苗遂恐喝於乙得倍苗之外更取財者為有損苗之由不當恐喝之坐苗外餘物即當非監臨主司因事受財坐贓論科斷此是事有因緣之類者非恐喝問曰恐喝取財五匹首不行又不受分傳言者二人一人受財一人不受財各合何罪答曰律稱準盜須依盜法案下條共盜者併贓論造意及從行而不受分即受分而不行各依本首從法若造意不行又不受分即以行人專進止者為首造意為從至死減一等從者不行又不受分笞四十其首不行又不受分即以傳言取物者為首五匹合徒一年半造意者為從合徒一年又一人不受分亦合為從笞五十又問監臨恐喝所部取財合得何罪答曰凡人恐喝取財準盜論加一等監臨之官不同凡人之法名例當條雖有罪名所為重者自從重理從強乞之律合準枉法而科若知有罪不虛恐喝取財物者合從真枉法而斷若財未入者杖六十即緦麻以上自相恐喝者犯尊長以凡人論犯卑幼各依本法疏議曰恐喝取財無限多少財未入者杖六十即緦麻以上自相恐喝者犯尊長以凡人準盜論加一等強盜亦準此者謂別居期親以下卑幼於尊長家行強盜者雖同於凡人家強盜得罪若有殺傷應入十惡者仍入十惡犯卑幼各依本法謂恐喝緦麻小功卑幼取財者減凡人一等五匹徒一年大功卑幼減二等五匹杖一百期親卑幼減三等五匹杖九十之類口恐喝亦是展轉傳言而受財者皆為從坐若為人所侵損恐喝以求備償事有因緣之類者非強盜亦準此諸本以他故毆擊人因而奪其財物者計贓以強盜論至死者加役流疏議曰謂本無規財之心乃為別事毆打因見財物遂即奪之事類先強後盜故計贓以強盜論一尺徒三年二匹加一等以先無盜心之故贓滿十匹應死者加役流若奪財物不得者止從故鬪毆法文稱計贓以強盜論奪物贓不滿尺同強盜不得財徒二年既元無盜心雖持仗亦不加其罪因而竊取者以竊盜論加一等若有殺傷者各從故鬪法疏議曰先因他故毆擊而輒竊取其財以竊盜論加一等一尺杖七十一匹加一等若有殺傷者謂本因毆擊殺傷元非盜財損害各從故鬪法謂因鬪致死者絞故殺者斬稱各者從強奪及竊取各以故鬪論問曰監臨官司本以他故毆擊部內之人因而奪其財物或竊取三十匹者合得何罪答曰律稱本因他故毆擊人元即無心盜物毀訖始奪事與強盜相類準贓雖依強盜罪止加役流故知其贓雖多法不至死因而竊取以竊盜論加一等者為監臨主司毆擊部內因而竊物以竊盜論加凡盜三等上文強盜既不至死下文竊盜不可引入絞刑三十匹者罪止加役流又問名例云稱以盜論者與真犯同此條因而竊取以竊盜論加一等既云加一等即重於竊盜之法監臨竊三十匹者絞今答不死理有未通答曰本條別有制與例不同者依本條文稱奪其財物者以強盜論至死者加役流又云加者不得加至於死是明本以他故毆人因而奪物縱至百匹罪止加役流況於竊取人財豈得加入於死監臨雖有加罪加法不至死刑況下條略奴婢及和誘各依強竊等法罪止流三千里注云雖監臨主守亦同即此條雖無監臨之文亦不加入於死故唐律疏議卷第二十賊盜凡十五條諸盜緦麻小功親財物者減凡人一等大功減二等期親減三等殺傷者各依本殺傷論疏議曰緦麻以上相盜皆據別居卑幼於尊長家強盜已於恐喝條釋逵訖其尊長於卑幼家竊盜若強盜及卑幼於尊長家行竊盜者緦麻小功減凡人一等大功減二等期親減三等殺傷者各依本殺傷論謂因盜誤殺傷人若殺傷尊卑長幼各依本殺傷法注云此謂因盜而誤殺者謂本心只欲規財因盜而誤殺人者亦同因盜過失殺人依鬪殺之罪不言傷者為傷罪稍輕聽從誤傷之法但殺人坐重雖誤同鬪殺論若實故殺自依故殺傷法若有所規求故殺期以下卑幼者絞即此條因盜是為有所規求故殺期以下卑幼者絞誤殺者自依本鬪殺傷論餘條諸條姦及略和誘但是爭競有所規求而故殺期以下卑幼本條不至死者竝絞故云餘條準此此謂因盜而誤殺者若有所規求而故殺期以下卑幼者絞餘條準此諸同居卑幼將人盜己家財物者以私輒用財物論加二等他人減常盜罪一等若有殺傷者各依本法疏議曰同居卑幼謂共居子孫弟姪之類將外人共盜己家財物者以私輒用財物論加二等案戶婚律同居卑幼私輒用財者十匹笞十十匹加一等罪止杖一百他人減凡盜一等謂卑幼將人盜物雖多罪止徒一年半他人減常盜罪一等其於首從自依常例若有殺傷者依本殺傷法謂依故殺傷尊長卑幼法縱不知情他人亦依強盜殺傷法注云他人殺傷縱卑幼不知情仍從本殺傷法坐之謂卑幼不知他人殺傷之情仍從故殺傷法稱坐之者不在除免加役流之例若他人誤殺傷尊長卑幼不知情亦依誤法其被殺傷人非尊長者卑幼不知殺傷情唯得盜罪無殺傷之坐其有知情并自殺傷者各依本殺傷之法問曰卑幼將人盜己家財物以私用財物論加二等他人減常盜一等若卑幼共他人強盜者律無加罪之文未知更加罪以否答曰強之與竊罪狀不同案職制律貸所監臨財物強者加二等餘條強者準此諸親相盜罪有等差將人盜己家財物者加私用財物二等更無強盜之文止明殺傷之坐若殺傷罪重從殺傷法科如殺傷坐輕即準強者加二等此是一部通例故條不別生文他人殺傷縱卑幼不知情仍從本殺傷法坐之諸因盜而過失殺傷人者以鬪殺傷論至死者加役流疏議曰因行竊盜而過失殺傷人者以其本有盜意不從過失收贖故以鬪殺傷論其殺傷之罪至死者加役流注云得財不得財等謂得財與不得財竝從鬪殺傷科財主尋逐遇他死者非謂財主尋逐盜物之賊或墜馬或落坑致死之類是遇他故而死盜者唯得盜罪而無殺傷之坐其共盜臨時有殺傷者以強盜論同行人不知殺傷情者止依竊盜法疏議曰謂共行竊盜不謀強盜臨時乃有殺傷人者以強盜論同行人而不知殺傷情者止依竊盜法謂同行元謀竊盜不知殺傷之情止依竊盜為首從殺傷者依強盜法得財不得財等財主尋逐遇他死者非諸以私財物奴婢畜産之類貿易官物者計其等準盜論計所利以盜論疏議曰以私家財物奴婢畜産之類或有碾磑邸店莊宅車船等色故云之類類注云餘條不別言奴婢者與畜産財物同謂反逆條中稱資財竝沒官不言奴婢畜産即是總同財物又廏庫律畜産不以實者一笞四十三加一等罪止杖一百若以故價有增減贓重者計所增減坐贓論即無驗奴婢之文若驗奴婢不實者亦同驗畜産之法故云餘條不別言奴婢者與畜産財物同貿易官物者謂以私物貿易官物計其等準盜論假將私奴貿易官奴其奴各直絹五匹其價雖等仍準盜論合徒一年注云官物賤亦如之謂私奴直絹十匹博官奴直絹五匹亦徒一年計所利以盜論謂以私物直絹一匹貿易官物直絹兩匹即一匹是等合準盜論監主之與凡人竝杖六十一匹是利以盜論凡人亦杖六十有倍贓若是監臨主守加罪二等合杖八十應纍併者皆將以盜纍於準盜加罪之類除免倍贓各盡本法注云其貿易奴婢計贓重於和誘同和誘法假有監臨之官以私奴婢直絹三十匹貿易官奴婢直絹六十匹即是計利三十匹監臨自盜合絞凡人貿易奴婢計利五十匹即合加役流以本條可和略奴婢罪止流三千里雖監臨主守亦同即於此條貿易不可更重故云引同和誘法竝流三千里餘條不別言奴婢者與畜産財物同官物賤亦如之其貿易奴婢計贓重於和誘者同和誘法諸山野之物已加功力刈伐積聚而輒取者各以盜論疏議曰山野之物謂草木藥石之類有人已加功力或刈伐或積聚而輒取者各以盜論謂各準積聚之處時價計贓依盜法科罪諸略人略賣人為奴婢者絞為部曲者流三千里為妻妾子孫者徒三年疏議曰略人者謂設方略而取之略賣人者或為經略而賣之注云引不和為略十歲以下雖和亦同略法為奴婢者不共和同即是被略十歲以下未有所知易為誑誘雖共安和亦同略法略人略賣人為奴婢者竝絞略人為部曲者或有狀驗可憑勘詰知實不以為奴者流三千里為妻妾子孫者徒三年為弟姪之類亦同注云可因而殺傷人者同強盜法謂因略人拒鬪或殺若傷同強盜法既同強盜之法因略殺傷傍人亦同因略傷人雖略人不得亦合絞罪其略人以為奴婢不得又不傷人以強盜不得財徒二年擬為部曲徒一年半擬為妻妾子孫者徒一年在律雖無正文解者須盡犯狀消息輕重以類斷之為奴婢者即與強盜十匹相似故略人不得唯徒二年為部曲者本條減死一等故略未得徒一年半為妻妾子孫者減二等故亦減強盜不得財二等合徒一年和誘者各減一等若和同相賣為奴婢者皆流二千里賣未售者減一等即略和誘和同相賣他人部曲者各減良人一等疏議曰和誘謂和同相誘減略一等為奴婢者流三千里為部曲者徒三年為妻妾子孫者徒二年半若和同相賣謂元謀兩和相賣為奴婢者賣人及被賣人罪無首從皆流二千里其數人共賣他人自依首從之法賣未售者減一等謂和同相賣未售事發各徒三年注云下條準此謂下條得逃亡奴婢而賣未售及賣期親卑幼及子孫之婦等為奴婢未仁者亦減一等故云可準此即略和誘和同相賣他人部曲者謂略他人部曲為奴婢者流三千里略部曲還為部曲者合徒三年略為妻妾子孫徒二年半和誘者各減一等和誘部曲為奴婢徒三年還為部曲徒二年半為妻妾子孫徒二年若共他人部曲和同相賣為奴婢減流一等徒三年為部曲者徒二年半故云各減良人一等其略和誘緦麻以上親部曲客女者律雖無文令有轉事量酬衣食之直不可同於凡人亦須依盜法而減緦麻小功部曲減凡人部曲一等大功減二等期親減三等問曰部曲客女被人所誘將為妻妾子孫而和同遂去誘者已有罪名去者合得何罪答曰名例律共犯罪以造意為首隨從者減一等背主受誘即當此條準其罪坐減誘者罪一等自餘受誘律無正文者竝合從坐科罪若逃亡之罪重者依例當條雖有罪名所為重者自從重不和為略十歲以下雖和亦同略法因而殺傷者同強盜法下條準此諸略奴婢者以強盜論和誘者以竊盜論各罪止流三千里即奴婢別齎財物者自從強竊法不得纍而科之疏議曰略奴婢者亦謂不和經略而取計贓以強盜論和誘者謂兩共和同以竊盜論各依強竊為罪其贓竝合倍備各罪止流三千里注云雖監臨主守亦同謂雖是監臨主守應加亦同罪止流三千里即奴婢別齎財物者謂除奴婢身所著衣服外剩有財物自從強竊法因略者一尺徒三年二匹加一等和誘者一尺杖六十一匹加一等各從一重科之竝不得將奴婢之身纍併財物同斷故云自從強竊法不得纍而科之其奴婢身別齎財略誘者不知有物止得略誘本罪贓不合科如其知者財雖奴婢將行各同強竊法其略誘良人或部曲客女衣服外有財者亦同強竊盜法不取人己者良人部曲合有資財不在坐限若得逃亡奴婢不送官而賣者以和誘論藏隱者減一等坐之即私從奴婢買子孫及乞取者準盜論乞賣者與同罪疏議曰凡捉得逃亡奴婢依令五日內合送官司其有不送而私賣者以和誘論計贓依盜法即私藏隱者減盜罪一等坐之即私從奴婢買子孫及乞取者或買或乞各平所乞買奴婢之價計臟準盜論竝不在除免倍贓監臨加罪加役流之例乞賣者與同罪謂奴婢將子孫乞人及賣與人竝與買乞者同罪故注云雖以為良亦同謂乞買者雖將為良人亦與充賤罪同雖監臨主亦同雖以為良亦同諸略賣期親以下卑幼為奴婢者竝同鬪毆殺法即和賣者各減一等其賣餘親者各從凡人和略法疏議曰期親以下卑幼者謂弟妹子孫及兄弟之子孫外孫子孫之婦及從父弟妹竝謂本條殺不至死者假如鬪殺弟妹徒三年殺子孫徒一年半若略賣弟妹為奴婢同鬪殺法徒三年賣子孫為奴婢徒一年半之類故云各同鬪毆殺法如本條殺合至死者自入餘親例無服之卑幼者謂己妾無子及子孫之妾亦同賣期親以下卑幼從本殺科之故云亦同假如殺妾徒三年若略賣亦徒三年之類即和賣者各減一等謂減上文略賣之罪一等和賣弟妹徒二年半和賣子孫徒一年之類其賣除親各從凡人和略法者但是五服之內本條殺罪名至死者竝名餘親故云從凡人和略法問曰賣妻為婢得同期親卑幼以否答曰妻服雖是期親不可同之卑幼故諸條之內每別稱夫為百代之始敦兩族之好本犯非應義絶或準期幼之親若其賣妻為婢原情即合離異夫自嫁者依律兩離賣之充賤何直更合此條可賣期親卑幼妻固不在其中只可同彼餘親從凡人和略之法其於毆殺還同凡人之罪故知賣妻為婢不入期幼之科又問名例律云家人共犯止坐尊長未知此文和同相賣亦同家人共犯以否答曰依例本條別有制與例不同依本條此文賣期親卑幼及兄弟子孫外孫之婦賣子孫及己妾子孫之妾各有正條被賣之人不合加罪為其卑幼合受處分故也其賣餘親各從凡人和略法既同凡人為法不合止坐家長無服之卑幼亦同諸知略和誘和同相賣及略和誘部曲奴婢而買之者各減賣者罪一等疏議曰謂知略和誘和同相賣等情而故買之者各減賣者罪一等謂各依其色準前條減賣人罪一等假有人知略賣良人為奴婢而買之者從絞上減一等合流三千里之類知祖父母父母賣子孫及賣子孫之妾若己妾而買者各加賣者罪一等疏議曰若略和誘他人而賣得罪已重故買者減賣者罪一等若知祖父母賣子孫以下得罪稍輕故買者加賣者罪一等假有父祖賣子孫為奴婢依鬪殺法合徒一年半知而買者加罪一等徒二年之類注云展轉知情而買假有甲知他人祖父賣子孫而買復與乙乙又賣與丙展轉皆知賣子孫之情而買者各與初買者同謂甲乙丙俱合徒二年若初買之時不知略和誘和同相賣之情買得之後訪知即須首告不首告者亦以知情論各同初買之罪問曰知略和誘充賤而取為妻妾合得何罪答曰知略和誘和同相賣而買之者各減賣者罪一等其略為部曲客女減為賤罪一等為妻妾子孫又減一等即是從賤為妻妾減罪二等通初買減三等假有知略良鳶婢合絞買為婢者減一等買為客女減二等娶為妻妾減三等舉斯一節即買餘色減罪可知展轉知情而買各與初買者同雖買時不知買後知而不言者亦以知情論諸知略和誘及強盜竊盜而受分者各計所受贓準竊盜論減一等知盜贓而故買者坐贓論減一等知而為藏者又減一等疏議曰知略和誘人及略和誘奴婢或強盜竊盜若知情而受分者為其初不同謀故計所受之贓準竊盜論減一等假有知人強盜受絹五匹者減竊盜一等合杖一百之類其知盜贓而故買坐贓論減一等謂知強竊盜贓故買十匹合杖一百知而故藏又減一等合杖九十其餘犯贓故買及藏者律無罪名從不應為流以上從重徒以下從輕諸共盜者併贓論造意及從行而不受分即受分而不行各依本首從法疏議曰共行盜者併贓論假有十人同盜得十匹人別分得一匹亦各得十匹之罪若造意之人或行而不受分或受分而不行從者亦有行而不受分或受分而不行雖行受有殊各依本首從為法止用一人為首餘為從坐假有甲造意不行受分乙為從行而不受分仍以甲為首乙為從之類若造意者不行又不受分即以行人專進止者為首造意者為從至死者減一等從者不行又不受分笞四十強盜杖八十疏議曰假有甲造意行盜而不行所盜得財又不受分乙丙丁等同行乙為處分方略即行人專進止者乙合為首甲不行為從其強盜應至死者減死一等流三千里雖有從名流罪以下仍不得減其共謀竊盜從者不行又不受分笞四十若謀強盜從者不行又不受分杖八十若本不同謀相遇共盜以臨時專進止者為首餘為從坐疏議曰行盜本不同謀相遇共盜者即以臨盜之時專進止者為首餘皆為從注云共強盜者罪無首從謂強盜雖本不同謀但是同行竝無首從主遣部曲奴婢盜者雖不取物仍為首若行盜之後知情受財強盜竊盜竝為竊盜從疏議曰主遣當家部曲奴婢行盜雖不取所盜之物主仍為行盜首部曲奴婢為從若部曲奴婢私自行盜主後知情受財準所受多少不限強之與竊竝為竊盜從假有部曲等先強盜竊盜得財主後知情受絹五匹合杖一百之類問曰有人行盜其主先不同謀乃遣部曲奴婢隨他人為盜為遣行人元謀作首欲令部曲奴婢主作首答曰盜者首出元謀若元謀不行即以臨時專進止為首今奴婢之主既不元謀又非行色但以處分奴婢隨盜求財奴婢之此行由主處分今所問者乃是他人元謀主雖驅使家人不可同於盜者元謀既自有首其主即為從論計入奴婢之贓準為從坐假有奴婢逐他人總盜五十匹絹奴婢分得十匹奴婢為五十匹從徒三年主為十匹從合徒一年之類共強盜者罪無首從諸共謀強盜臨侍不行而行者竊盜共謀者受分造意者為竊盜首餘竝為竊盜從若不受分造意者為竊盜從餘竝笞五十疏議曰假有甲乙丙丁同謀強盜甲為首臨時不行而行者竊盜甲雖不行共謀受分甲既造意為竊盜首餘行者竝為竊盜從甲若不受分復不行為竊盜從從者不行又不受分笞五十前條竊盜從不行又不受分笞四十此條笞五十者為元謀強盜故也若共謀竊盜臨時不行而行者強盜其不行者造意受分知情不知情竝為竊盜首造意者不受分及從者受分俱為竊盜從疏議曰同謀行竊盜臨時有不行之人而行人自為強盜其不行者是元謀造意受強盜贓分不限知情不知情竝為竊盜首其造意者不受分及從者受分俱為竊盜從諸盜經斷後仍更行盜前後三犯徒者流二千里三犯流者絞其於親屬相盜者不用此律疏議曰行盜之人實為巨蠹屢犯明憲罔有悛心前後三人刑科便是怙終其事峻之以法用懲其罪故有強盜竊盜輕斷更為三犯徒者流二千里三犯流者絞亦謂斷後又為者其未斷經降慮者不入三犯之限注云三盜皆據赦後為坐謂據赦後三犯者不論赦前犯狀為數親屬相盜者不用此律謂自依親屬本條不用此三犯之律案職制律親屬謂緦麻以上及大功以上婚姻之家假有於堂兄弟婦家及堂兄弟男女婚姻之家犯盜徒流以上竝不入可三犯之例問曰有三犯死罪會降皆至流徒或一兩度止犯流徒或一兩度從死會降總計三犯亦同三犯流徒以否答曰律有赦後之文不言降前之犯死罪會降止免極刑流徒之科本法仍在然其所犯本坐重於正犯徒流準律而論總當三犯之例三盜止數赦後為坐諸盜公取竊取皆為盜疏議曰公取謂行盜之人公然而取竊取謂方便私竊其財皆名為盜注云器物之屬須移徙者謂器物錢帛之類須移從離於本處珠玉寶貨之類據入手隱藏縱未將行亦是其木石重器非人所勝應須馱載者雖移本處未馱載間猶未成盜但物有巨細難以備論略舉綱目各準臨時取斷闌圈繫閉之屬須絶離常處謂馬牛馳騾之類須出闌圈及絶離繫閉之處放逸飛走之屬謂應犬之類須專制在己不得自由乃成為盜若畜産伴類隨之假有盜馬一匹別有馬隨不合併計為罪即因逐伴而來遂將人己及盜其母而子隨之者皆併計為罪器物之屬須移徙闌圈繫閉之屬須絶離常處放逸飛走之屬須專制乃成盜若畜伴類隨之不併計即將人己及盜其母而子隨者皆併計之諸部內有一人為盜及容止盜者里正笞五十三人加一等縣內一人笞三十四人加一等疏議曰部內謂州縣鄉里所管之內百姓有一人為盜及容止盜者謂外盜入境所部容止所管里正笞五十注云坊正村正亦同謂得罪亦同里正三人加一等四人行盜合杖六十縣內一人笞三十謂縣內一人行盜縣令笞三十四人加一等有五人行盜即笞四十之類注云部界內有盜發謂里正等以上部界之內有盜發及殺人者一處以一人論謂一處盜發同部內一人行盜一處殺人同一人行強盜故云一處以一人論殺人者仍從強盜之法下文強盜者加一等殺人者亦加一等與強盜同即是部內有一人強盜者里正等杖六十雖非部內人但當境內強盜發亦準此容止殺人賊者亦依強盜之法州隨所管縣多少通計為罪各罪止徒二年強盜者各加一等疏議曰州隨所管縣多少通計為罪各罪止徒二年謂州縣里正坊正村正等竝罪止徒二年強盜者各加一等罪止徒二年半上注云殺人同強盜之法故知殺人及發處若容止各準強盜加之其通計之法已於戶律解訖注云以長官為首佐職為從但宣風導俗肅清所部長官之事故以長官為首即刺史縣令關者以次官當之既云佐職為從即罪不及主典即盜及盜發殺人後三十日捕獲主司各勿論限外能捕獲追減三等若軍役所有犯隊正以上折衝以下各準部內征人冒名之法同州縣為罪疏議曰謂部內有人行盜及當境盜發及部內人殺他人及境內人被他殺事發後三十日自捕獲并他人捕獲主司各勿論竝得免罪若三十日限外能捕獲者追減三等稱追減者雖結正訖仍得減之若已經奏決者依捕亡律不在追減之例其軍役有犯謂行軍及領軍人徭役之所有犯盜及殺人事發若容止盜者隊正隊副以上折衝以下得罪竝準部內征人冒名之法同州縣為罪謂隊正隊副團內一人為盜及容止盜者若有盜發之所竊盜者各笞五十若是強盜及殺人若被殺之處每事各加一等校尉旅帥減隊正隊副一等折衝果毅準所管校尉多少通計為罪假如部內一人為盜及容止盜者里正笞五十三人加一等隊正同里正亦一人笞五十三人加一等計二十五人罪止徒二年旅帥校尉一人笞四十二十五人罪止徒一年半折衝果毅如管三校尉三人笞四十七十五人徒一年半管四校尉者四人笞四十一百人罪止徒一年半同州縣為罪長官為首佐職為從坊正村正亦同部界內有盜發及殺人者一處以一人論殺人者仍同強盜之法皆以長官為首佐職為從他人自捕等故唐律疏議卷第二十一鬪訟凡十五條疏議曰鬪訟律者首論鬪毆之科次言告訟之事從秦漢至晉未有此篇至後魏太和年分繫訊律為鬪律至北齊以訟事附之名為鬪訟律後周為鬪競律隋開惶依齊鬪訟至今不改賊盜之後須防鬪訟故次於賊盜之下諸鬪毆人者笞四十傷及以他物毆人者杖六十疏議曰相爭為鬪相擊為毆若以手足毆人者笞四十注云謂以手足擊人者舉手足為例用頭擊之類亦是傷謂手足毆傷及以他物毆而不傷者各杖六十注云見血為傷謂因毆而見血者非手足者即兵不用刃亦是謂手足之外雖是兵器但不用刃者皆同他物之例問曰毆人者謂以手足擊人其有撮挽頭髮或擒其衣領亦同毆擊以否答曰條云鬪毆謂以手足擊人明是雖未損傷下手即使獲罪至如挽髮撮髮擒領扼喉既是傷殺於人狀則不輕於毆例同毆法理用無惑傷及拔髮方寸以上杖八十若血從耳目出及內損吐血者各加二等疏議曰謂他物毆人傷及拔髮方寸以上各杖八十方寸者謂量拔髮無毛之所縱橫輕各滿一寸者若方斜不等圍繞四寸為方寸若毆人頭面其血或從耳或從目而出及毆人身體內損而吐血者各加手足及他物毆傷罪二等其拔髮不滿方寸者止從毆法其有拔鬢亦準髮為坐若毆鼻頭血出止同傷科毆人痢血同吐血例謂以手足擊人者見血為傷非手足者其餘皆為他物即兵不用刃亦是諸鬪毆人折齒毆缺耳鼻眇一目及折手足指若破骨及湯火傷人者徒一年折二齒二指以上及髠髮者徒一年半疏議曰因鬪毆人而折其齒或毆破及缺穴人耳鼻即毀缺人口眼亦同眇一目謂毆眇其目虧損其明而猶見物者及折手足指若因打破骨而非折者及以湯若火燒湯傷人者各徒一年若湯火不傷從他物毆法若折二齒二指以上稱以上者雖折更多亦不加罪及髠截人髮者各徒一年半其髠髮不盡仍堪為髻者止當拔髮方寸以上杖八十若因鬪髠髮遂將人己者依賊盜律本以他故毆擊人因而奪其財物計贓以強盜論以銅鐵汁傷人比湯火傷人如其以蛇蜂蝎螫人同他物毆人法若毆人十指竝折不堪執物即二支廢從篤疾科流三千里眇謂虧損其明而猶見物諸鬪以兵刃斫射人不著者杖一百疏議曰因鬪遂以兵刃斫射人不著者杖一百注云兵刃謂弓箭刀矟矛䂎之屬稱之屬者雖用殳戟等皆是即毆罪重者謂本條毆罪得徒一年以上者研射人不著即從毆法假如因鬪斫射小功兄姊而不著者即依本條毆罪科徒一年即不從斫射之罪如此之類即從毆法若刃傷及折人肋眇其兩目墮人胎徒二年疏議曰若刃傷謂以金刃傷人注云可刃謂金鐵無大小之限堪以殺人者及折人肋謂鬪毆人折肋眇其兩目亦謂虧損其明而猶見物墮人胎謂在孕未生因打而落者各徒二年注云墮胎者謂在辜內子死乃坐謂在母辜限之內而子死者子雖傷而在母辜限外死者或雖在辜內胎落而子未成形者各從本毆傷法無墮胎之罪其有毆親屬貴賤等胎落者各從徒二年上為加減之法皆須以母定罪不據子作尊卑若依胎制刑或致欺紿故保辜止保其母不因子立辜為無害子之心也若毆母罪重同折傷科之假有毆姊胎落依下文毆兄姊徒二年半折傷者流三千里又條折傷謂折齒以上墮胎合徒二年重於折齒之坐即毆姊落胎合流三千里之類兵刃謂弓箭刀矟矛䂎之屬即毆罪重者從毆法刃謂金鐵無大小之限堪以殺人者墮胎者謂辜內子死乃坐若辜外死者從本毆傷論諸鬪毆折跌支體及瞎其一目者以徒三年辜內平復者各減二等疏議曰因鬪毆折跌人支體支體謂手足或折其手足或跌其骨體及瞎一目謂一目喪明全不見物者各徒三年注云折支者謂折四支之骨跌體者謂骨節差跌失於常處辜內平復者謂折跌人支體及瞎一目於下文立辜限內骨節平復及目得見物竝於本罪上減二等各徒二年注云餘條折跌平復準此謂於諸條尊卑貴賤等鬪毆及故毆折跌辜內平復竝減二年雖非支體於餘骨節平復亦同若支先攣是廢疾被折故此毆攣支止依毆折一支流二千里有蔭合同減贖何者例云故毆人至廢疾流不合減贖今先廢疾不因毆令廢疾所以減贖即損二事以上及因舊患令至篤疾若斷舌及毆敗人陰陽者流三千里疏議曰即損二事以上者謂毆人一目瞎及折一支之類及因舊患今至篤疾假有舊瞎一目為殘疾更瞎一目成篤疾或先折一腳為廢疾更折一腳為篤疾若斷舌謂全不得語毀敗陰陽謂孕嗣廢絶者各流三千里斷舌語猶可解毀敗陰陽不絶孕嗣者竝從傷科問曰人目先盲重毆晴壞口或先痾更斷其舌如此之類各合何罪答曰人貌肖天地稟形父母莫不愛其所受樂天委命雖復宿遭病疾然亦痛此重傷至於被人毀損在法豈宜異制如人奮痾或先喪明更壞其晴或斷其舌止得守文還科斷舌瞎目之罪折支者折骨跌體者骨差跌失其常處餘條折跌平復準此諸鬪毆殺人者絞以刃及故殺人者斬雖因鬪而用兵刃殺者與故殺同疏議曰鬪毆者元無殺心因相鬪毆而殺人者絞以刃及故殺者謂鬪而用刃即有害心及非因鬪爭無事而殺是名故殺各合斬罪雖因鬪而用兵刃殺者本雖是鬪乃用兵刃殺人者與故殺同亦得斬罪竝同故殺之法注云為人以兵刃逼己因用兵刃拒而傷殺逼己之人雖用兵刃亦依鬪殺之法餘條用兵刃準此謂餘親戚良賤以兵刃逼人人以兵刃拒殺者竝準此鬪法又律云以兵刃殺者與故殺同既無傷文即是傷依同法注云因用兵刃拒而傷殺者為以兵刃傷人因而致死故連言之問曰故殺人合斬用刃鬪殺亦合斬刑得罪既是不殊準文更無異理何須云用兵刃殺者與故殺同答曰名例犯十惡及故殺人者雖會赦猶除名兵刃殺人者其情重文同故殺之法會赦猶遣除名不因鬪故毆傷人者加鬪毆傷罪一等雖因鬪但絶時而殺傷者從故殺傷法疏議曰不因鬪競故毆傷人者加鬪毆傷一等若拳毆不傷笞四十上加一等合笞五十之類雖因鬪但絶時而殺傷者謂忿競之後各已分散聲不相接去而又來殺傷者是名絶時從故殺傷法為人以兵刃逼己因用兵力拒而傷殺者依鬪法餘條用兵刃準此諸保辜者手足毆傷人限十日以他物毆傷人者二十日以刃及湯火傷人者三十日折跌支體及破骨者五十日疏議曰凡是毆人皆立辜限手足毆人傷與不傷限十日若以他物毆傷者限二十日以刃刃謂金鐵無大小之限及湯火傷人謂灼爛皮膚限三十日若折骨跌體及破骨無問手足他物皆限五十日注云毆傷不相須謂毆及傷各保辜十日然傷人皆須因毆今言不相須者為下有僵仆或恐迫而傷此則不因毆而有傷損故律云毆傷不相須餘條毆傷及殺傷各準此謂諸條毆人或傷人故鬪謀殺強盜應有罪者保辜竝準此限內死者各依殺人論其在限外及雖在限內以他故死者各依本毆傷法疏議曰限內死者各依殺人論謂辜限內死者不限尊卑良賤及罪輕重各從本條殺罪科斷其在限外假有拳毆人保辜十日計纍千刻之外是名限外及雖在限內謂辜限未滿滿以他故死者他故謂別增餘患而死假毆人頭傷風從頭瘡而入因風致死之類仍依殺人論若不因頭瘡得風別因他病而死是為他故各依本毆傷法故注云他故謂別增餘患而死其有墮胎瞎目毀敗陰陽折齒等皆約手足他物以刃湯火為辜限毆傷不相須餘條毆傷及殺傷各準此他故謂別增餘患而死者諸同謀共毆傷人者各以下手重者為重罪元謀減一等從者又減一等若元謀下手重者餘各減二等至死者隨所因為重罪疏議曰同謀共毆傷人者謂二人以上同心計謀共毆傷人者假有甲乙丙丁謀毆傷人甲為元謀乙下手最重毆人一支折以下手重為重罪乙合徒三年申是元謀減一等合徒二年半丙丁等為從又減一等合徒二年若不因鬪乙為故毆之首合流二千里甲是元謀減一等合徒三年丙丁徒二年半若是元謀下手重者假甲為元謀下手最重即甲合徒三年乙丙丁各減二等竝徒二年若故毆即甲合流二千里餘各減二等各徒二年半之類至死謂被毆人致死隨所因為重罪謂甲毆頭乙毆手丙毆足若由頭瘡致死者即甲為重罪由手傷致死者即乙為重罪由足傷致死者即丙為重罪重罪者償死餘各減二等徒三年甲是元謀止減一等流三千里其不同謀者各依所毆傷殺論其事不可分者以後下手為重罪疏議曰其不同謀者假有甲乙丙丁不同謀因鬪共毆傷一人甲毆頭傷乙打腳折丙打指折丁毆不傷若因頭瘡致死甲得殺人之罪償死乙為折支合徒三年丙為折指合徒一年丁毆不傷合笞四十是為各依所毆傷殺論其事不可分者謂此四人共毆一人其瘡不可分別被毆致死以後下手者為重罪謂丁下手最後即以丁為重罪餘各徒三年元謀減一等流三千里若亂毆傷不知先後輕重者以謀首及初鬪者為重罪餘各減二等疏議曰假有人羣黨共鬪亂毆傷人被傷殺者不知下手人名又不知先後輕重若同謀毆之即以謀首為重罪其不同謀亂毆傷者以初鬪者為重罪自餘非謀首及非初鬪各減二等徒三年若不至死唯折二支若謀鬪者謀首流三千里餘各徒二年半其不同謀初鬪者流三千里餘亦減二等問曰甲乙丙三人同謀毆人各拳毆一下合作首從以否答曰律云同謀共毆人者各以下手重者為重罪此據辜內致死故有節級減文下又云不同謀者各依所毆傷殺論即明毆者得毆罪傷者得傷罪殺者得殺罪拳毆人者笞四十不同謀者各從毆科同謀毆人豈得減罪是知各笞四十不為首從若更有丁亦與甲乙丙同謀丁不下手又非元謀即減二等笞二十之類又問甲乙二人同謀毆人甲是元謀又先下手毆一支折乙為從後下手毆一目瞎各合何罪答曰據上條折跌人支體及瞎其一目者徒三年即損二事以上及因奮患令至篤疾者流三千里此即同謀共毆人傷損二事甲雖謀首合徒三年由乙損二事合流三千里若不同謀各損一事俱得本罪竝徒三年諸以威力制縛人者各以鬪毆論因而毆傷者各加鬪毆傷二等疏議曰以威若力而能制縛於人者各以鬪毆論依上條手足之外皆為他物縛人皆用徽纆明同他物之限縛人不傷合杖六十若傷杖八十因而毆傷者謂因縛即毆者傷與不傷各加鬪毆傷二等謂因縛用他物毆不傷者杖八十傷者杖一百之類是名各加鬪毆傷二等即威力使人毆擊而致死傷者雖不下手猶以威力為重罪下手者減一等疏議曰威力使人者謂或以官威或恃勢力之類而使人毆擊他人致死傷者威力之人雖不下手猶以威力為重罪下手者減一等假有甲恃威力而使乙毆殺丙甲雖不下手猶得死罪乙減一等流三千里若折一指甲雖不下手合徒一年乙減一等杖一百之類甲是監臨官百姓無罪喚問事以杖依法決罰致死官人得殺人罪問事不坐若遣用他物手足打殺官人得威力殺人罪問事下手者減一等科諸鬪兩相毆傷者各隨輕重兩論如律後下手理直者減二等疏議曰鬪兩相毆傷者假有甲乙二人因鬪兩相毆傷甲毆乙不傷合笞四十乙毆甲傷合杖六十之類或甲是良人乙是賤隸用毆乙傷減凡人二等合笞四十乙毆甲不傷加凡人二等合杖六十之類其間尊卑貴賤應有加減各準此例後下手理直者減二等假甲毆乙不傷合笞四十乙不犯甲無辜被打遂拒毆之乙是理直減本毆罪二等合笞二十乙若因毆而殺甲本罪縱不至死即不合減故注云至死者不減問曰尊卑相毆後下手理直得減未知伯叔先下手毆姪兄姊先下手毆弟妹其弟姪等後下手理直得減以否答曰凡人相毆條式分明五服尊卑輕重頗異只如毆緦麻兄姊杖一百小功大功遞加一等若毆緦麻以下卑幼折傷減凡人一等小功大功遞減一等據服雖是尊卑相毆兩俱有罪理直則減法亦無疑若其毆親姪弟妹至死然始獲罪傷重律則無辜罪既不合兩論理直豈許減舉伯叔兄姊但毆傷卑幼無罪者竝不人此條至死不減諸於官內忿爭者笞五十聲徹御所及相毆者徒一年以刃相向者徒二年疏議曰官殿之內致敬之所忽敢忿爭情乖恭肅故宮內忿爭者笞五十嘉德等門以內為宮內衛禁律官城門有犯與宮門同即順天等門內亦是若忿競之聲徹於御所及有相毆擊者各徒一年以刃相向者徒二年既不論兵刃即是刃無大小之限殿內遞加一等傷重者各加鬪傷二等疏議曰殿內忿爭遞加一等者謂太極等門為殿內忿爭杖六十聲徹御所及相毆者徒一年半以刃相向徒二年半若上閣內忿爭杖七十聲徹御所及相毆者徒二年以刃相向者徒三年傷重者各加鬪傷二等假有凡鬪以他物毆傷人內損吐血合杖一百宮內加二等徒一年半即重於官內相毆徒一年凡鬪毆人折齒合徒一年若於殿內是傷重加二等合徒二年是重於殿內相毆徒一年半此為可各加鬪傷二等注云計加重於本罪即須加謂殿內凡鬪相毆不傷合徒一年半假有甲於殿內毆緦麻尊長本罪合徒一年由在殿內故加罪二等合徒二年是名計加重於本罪不加本罪者假如毆緦麻兄姊合杖一百以在殿內故加二等合徒一年半即與殿內凡鬪罪同此是計加不重於本罪止依本徒一年半為坐餘條稱加者準此謂一部律內稱加得重於本罪者即須加加不重者從本法許加重於本罪即須加餘條稱加者準此諸毆制使本屬府主刺史縣令及吏卒毆本部五品以上官長徒三年傷者流二千里折傷者絞疏議曰有因忿而毆制使本屬府主刺史縣令及吏卒毆本部五品以上官長其吏卒等竝於名例解訖毆者合徒三年傷者流二千里折傷者絞注云折傷謂折齒以上依上條鬪毆人折齒毀缺耳鼻眇一目及折手足指若破骨及湯火傷人者各徒一年此云折傷者折齒以上得徒一年以上皆是若毆六品以下官長各減三等減罪輕者加凡鬪一等死者斬詈者各減毆罪三等疏議曰六品以下官長謂下鎮將及戍主若諸陵署在外諸監署六品以下雖隸寺監常監署有印別起正案行事皆為當處官長所管吏卒而毆者各減毆五品以上官長罪三等合徒一年半若傷者流上減三等合徒二年折傷者死上減三等徒二年半減罪輕者加凡鬪一等假有凡人故毆六品官長折肋合徒二年半從死減三等亦徒二年半據上條計加重於本罪即須加既云加凡鬪一等從徒二年半上加一等處徒三年下條流外官毆九品以上各又加二等合流二千五百里如此等各減罪輕者加凡鬪一等因毆致死者斬詈者減毆罪三等謂詈制使以下本部官長以上從徒三年上減三等合徒一年半若詈六品以下官長又減三等合杖九十此名詈者各減毆罪三等注須親自聞之乃成詈謂皆須被詈者親自問之乃為詈即毆佐職者徒一年傷重者加凡鬪傷一等死者斬疏議曰毆佐職者謂除長官之外當司九品以上之官皆為佐職所部吏卒毆者徒一年傷重者假如他物故毆傷佐職凡鬪合杖九十九品以上加二等合徒一年為佐職又加一等徒一年半之類是名傷重者加凡鬪一等至死者斬折傷謂折齒以上須親自聞之乃成詈諸佐職及所統屬官毆傷官長者各減吏卒毆傷官長二等減罪輕者加凡鬪一等死者斬疏議曰佐職謂當司九品以上及所統屬官者若省寺監管局署州管縣鎮管戍衛管諸府之類是所統屬毆傷官長者官長謂尚書省諸司尚書寺監少卿少監國子司業以上少尹諸衛將軍以上千牛府中郎將以上諸率府副率以上諸府果毅以上王府司馬并諸州別駕雖是次官竝同官長或唯有長官一人佐職毆者各減吏卒毆傷官長罪二等即吏卒毆官長折傷者絞若佐職及所統屬官毆五品以上官長折傷減吏卒二等合徒三年若毆六品以下官長折傷者減三等徒一年半減罪輕者加凡鬪一等假如佐職毆六品以下官長折二齒從死上減五等合徒一年半凡鬪折二齒亦徒一年半上條計加重於本罪即須加更加一等處徒二年餘罪計加得重竝準此若佐職及所統屬官毆傷五品以上官長者各減吏卒二等假有吏卒毆五品以上官長折肋合死今為佐職毆減吏卒二等合徒三年折肋本罪合徒二年別條可六品毆傷五品加二等合徒三年既云減罪輕者加凡鬪一等合流二千里死者斬諸毆本屬府主刺史縣令之祖父母父母及妻子者徒一年傷重者加凡鬪傷一等疏議曰毆本屬府主刺史縣令之祖父母父母及妻子者徒一年傷重者加凡鬪傷一等謂折一指或折一齒凡毆亦徒一年比凡鬪為輕加凡鬪傷一等合徒一年半之類府主等祖父母父母若是議貴凡毆得徒二年為是本屬府主之祖父母父母加一等得徒二年半傷重以上竝準例加一等諸皇家袒免親而毆之者徒一年傷者徒二年傷重者加凡鬪二等緦麻以上各遞加一等死者斬疏議曰禮云五世袒免之親四世緦麻之屬皇家戚屬理弘尊敬袒免之親其有毆者合徒一年傷者徒二年故鬪及用他物不傷者其罪一也其於諸條相毆唯立罪名不言鬪毆又不言以鬪論者故毆鬪毆及手足他物得罪悉同竝無差降傷重者加凡鬪二等假有毆折二齒凡鬪合徒一年半加二等合徒二年半之類緦麻以上各遞加一等假有毆緦麻折二齒徒三年小功流二千里大功流二千五百里期親流三千里毆不傷從徒一年上遞加毆傷者從徒二年上遞加不加入死故云各遞加一等死者斬問曰皇家袒免親或為佐職官或為本屬府主刺史縣令之祖父母父母妻子或是己之所親若有犯者合遞加以否答曰皇家親屬為尊主之敬故異餘人長官佐職為敬所部尊敬之處理各不同律無遞加之文法止各從重斷若己之親各準尊卑服敷為罪不在皇親及本屬加例又問皇家袒免之親若有官品而毆之者合纍加以否答曰律注毆袒免之親據皇家親屬立罪此由緣敬為重官高亦合纍加諸流外官以下毆議貴者徒二年傷者徒三年折傷者流二千里疏議曰流外官謂勳品以下爰及庶人毆議貴者徒二年議貴謂文武職事官三品以上散官二品以上及爵一品者傷者徒三年折傷者流二千里謂折齒以上若毆折一支準凡人合徒三年依下文加凡鬪二等流二千五百里若毆折二支流三千里本條雖云加凡鬪傷二等律無加入死之文止依凡人之法毆傷五品以上減二等若減罪輕及毆傷九品以上各加凡鬪傷二等疏議曰流外官以下毆傷五品以上減二等謂減議貴二等毆者徒一年傷者徒二年折傷者徒二年半若減罪輕假有毆五品以上折一支從流二千五百里減二等徒二年半即是減罪輕於凡鬪徒三年加二等處流二千五百里之類及毆傷九品以上各加凡鬪傷二等謂毆九品以上六品以下之官不傷杖六十傷即杖八十他物不傷杖八十傷即杖一百之類若毆至死者各依凡人法問曰律稱流外官以下毆議貴徒二年若奴婢部曲毆議貴者為共凡人罪同為依本法加罪以否答曰依下條部曲毆傷良人加凡人一等奴婢又加一等此是良人與奴婢部曲凡鬪之罪其部曲奴婢毆凡人尚各加罪況於皇族及官品貴者理依加法唯據本條加至死者始合處死假如有部曲毆良人折二支加凡鬪一等注云加者加入於死既於凡鬪流三千里上加一等合至絞刑別條雖加不入於死設有部曲故毆良人九品以上一支折凡鬪折一支徒三年九品以上加凡鬪二等流二千五百里故毆又加一等流三千里部曲毆又加一等即不合入死亦止流三千里此名餘條不加入死之類故唐律疏議卷第二十二鬪訟凡十六條諸流內九品以上毆議貴者徒一年傷重及毆傷五品以上若五品以上毆傷議貴各加凡鬪傷二等疏議曰流內九品以上六品以下毆議貴者徒一年傷重謂他物毆凡人內損吐血合杖一百毆議貴合加二等徒一年半此名傷重其六品以下毆傷五品以上若五品以上毆傷議貴或毆不傷亦各加凡鬪毆二等諸監臨官司於所統屬官及所部之人有高官而毆之及官品同自相毆者竝同凡鬪法疏議曰監臨官司於所統屬佐官以下及所管部屬之人有高官而監臨官司毆之者同凡鬪法不計階品為其所管故也及官品同謂六品以下九品以上或五品以上非議貴者議貴謂三品以上一品以下竝為官品同竝謂不相管隸自相毆者竝同凡鬪之罪假有勳官騎都尉而毆上柱國其上柱國既非議貴罪與凡鬪同其統屬下司毆上司者長官以外皆據品科其有府及鎮戍隸州者亦為統屬之限問曰州參軍事毆州內縣令帶五品以上勳官得為統屬同凡鬪以否答曰縣令是州內統屬之官假令品高州官毆之準上文各同凡鬪之法諸拒州縣以上使者杖六十毆者加二等傷重者加鬪傷一等即被禁掌而拒捍及毆者各加一等疏議曰拒州縣以上使稱以上者省臺寺監及在京諸司等竝是遣使追攝拒捍不從者杖六十毆者加二等杖八十傷重者謂他物毆內損吐血凡鬪合杖一百加鬪傷一等徒一年注云謂有所徴攝權時拒捍不從者即被禁掌拒捍及毆者各加一等謂有司禁録或復散留而輒拒捍合杖七十毆所司者合杖九十傷重者謂重一百杖以上加凡鬪二等若使人官品高者各依本品加是名各加一等謂有所徴攝權時拒捍不從者諸部曲毆傷良人者加凡人一等奴婢又加一等若奴婢毆良人折跌支體及瞎其一目者絞死者各斬疏議曰名例律稱部曲者妻亦同此即部曲妻不限良人及客女毆傷良人者注云引官戶與部曲同加凡人一等謂加凡鬪毆傷一等注云加者加入於死謂部曲毆良人損二事以上及因舊患令至篤疾斷舌及毀敗陰陽凡毆流三千里者部曲加一等合死此名加入於死奴婢又加一等謂加凡鬪二等若奴婢毆良人折跌支體及瞎其一目者絞跌體瞎目各罪止徒三年即明毆良人準凡人相毆罪合流者各人死罪因毆致死各斬其良人毆傷殺他人部曲者減凡人一等奴婢又減一等若故殺部曲者絞奴婢流三千里疏議曰良人毆傷或殺他人部曲者減凡人一等謂毆殺者流三千里折一支者徒二年半之類奴婢又減一等毆殺者徒三年折一支徒二年之類若不因鬪故殺部曲者合絞若謀而殺訖亦同其故殺奴婢者流三千里即部曲奴婢相毆傷殺者各依部曲與良人相毆傷殺法相侵財物者不用此律疏議曰部曲鬪毆殺奴婢流三千里折一支徒二年半折一齒杖一百奴婢毆部曲損傷二事以上及因舊患今至篤疾及斷舌毀敗陰陽者絞折一支者流二千里折一齒者徒一年半若部曲故殺奴婢亦絞是名各依部曲與良人相毆傷殺法餘條良人部曲奴婢私相犯謂謀殺人穿地得尸不更埋之類私相犯本條無正文者竝準此條加減之法相侵財物者各依凡人相侵盜之法故云不用此律官戶與部曲同加者加入於死餘條良人部曲奴婢私相犯本條無正文者竝準此諸奴婢有罪其主不請官司而殺者杖一百無罪而殺者徒一年疏議曰奴婢賤隸雖各有主至於殺戮宜有稟承奴婢有罪不請官司而輒殺者杖一百無罪殺者謂全無罪失而故殺者徒一年注云期親及外祖父母殺者與主同謂有罪殺者杖一百無罪殺者徒一年故云與主同下條部曲者下條無期親及外祖父母傷殺部曲罪名若有傷殺亦同於主故云準此期親及外租父母殺者與主同下條部曲準此諸主毆部曲至死者徒一年故殺者加一等其有愆犯決罰致死及過失殺者各勿論疏議曰主毆部曲至死者徒一年不限罪之輕重故殺者加一等謂非因毆打本心故殺者加一等合徒一年半其有愆犯而因決罰致死及過失殺之者竝無罪問曰妾有子或無子毆殺夫家部曲奴婢合當何罪或有客女及婢主幸而生子息自餘部曲奴婢而毆得同主期親以否答曰妾毆夫家部曲奴婢在律雖無罪名輕重相明須從減例下條云妾毆夫之妾子減凡人二等妾子毆傷父妾加凡人三等則部曲與主之妾相毆比之妾子與父妾相毆法即妾毆夫家部曲亦減凡人二等部曲毆主之妾加凡人三等若妾毆夫家奴婢減部曲一等奴婢毆主之妾加部曲一等至死者各依凡人法其有子者若子為家主母法不降於兒竝依主例若子不為家主於奴婢止同主之期親餘條妾子為家主及不為家主各準此客女及婢雖有子息仍同賤隸不合別加其罪諸部曲奴婢過失殺主者絞傷及詈者流疏議曰部曲奴婢是為家僕事主須存謹敬又亦防其二心故雖過失殺主者絞若過失傷主及詈者流不言里數者為止合加杖二百故也即毆主之期親及外祖父母者絞已傷者皆斬詈者徒二年過失殺者減毆罪二等傷者又減一等疏議曰部曲奴婢毆主之期親謂異財者及毆主之外祖父母者絞傷者皆斬罪無首從詈者徒二年過失殺者減毆罪二等合徒三年加杖二百過失傷者又減一等合徒二年半加杖一百八十毆主之緦麻親徒一年傷重者各加凡人一等小功大功遞加一等死者皆斬疏議曰部曲奴婢毆主之緦麻親者無問正服義服竝徒一年傷重者謂毆罪重於徒一年各加凡鬪一等假有部曲用他物毆主緦麻親內損吐血依凡人合杖一百犯良人加一等緦麻加凡人一等合徒一年半若奴婢以他物故毆主之緦麻親傷準凡人合杖九十奴婢犯良人加二等此條傷重又加一等合徒一年半故云傷重各加凡人一等小功大功遞加一等謂奴婢用他物毆傷小功親徒二年大功徒二年半是名遞加一等注云加者加入於死假如部曲毆主大功親折支準凡人徒三年部曲加一等合流二千里其大功親加三等合絞即是加者加入於死其緦麻小功部曲有犯各從本罪準此加例加應入死者處絞死者皆斬謂奴婢部曲毆主緦麻以上親至死者皆斬罪無首從加者加人於死諸毆緦麻小功親部曲奴婢折傷以上各減殺傷凡人部曲奴婢二等大功又減一等過失殺者各勿論疏議曰毆緦麻小功親部曲謂毆身之緦麻小功親部曲減凡人部曲二等謂總減三等假如毆折肋者凡人合徒二年減三等合杖一百若毆奴婢折齒凡人合徒一年奴婢減二等緦麻小功親奴婢又減二等總減四等合杖七十故云折傷以上各減凡人部曲奴婢二等大功又減一等謂毆大功部曲折齒總減四等合杖七十若毆大功奴婢合杖六十自外毆折傷以上各準此例為減法其有過失殺緦麻以上部曲奴婢者各無罪諸毆傷妻者減凡人二等死者以凡人論毆妾折傷以上減妻二等疏議曰妻之言齊與夫齊體義同於幼故得減凡人二等死者以凡人論合絞以刃及故殺者斬毆妾非折傷無罪折傷以上減妻罪二等即是減凡人四等若殺妾者止減凡人二等若妻毆傷殺妾與夫毆傷殺妻同過失殺者各勿論疏議曰若妻毆傷殺妾謂毆者減凡人二等死者以凡人論注云皆須妻妾告乃坐即外人告者無罪至死者聽餘人告餘人不限親疏皆得論告殺妻仍為不睦妻即是緦麻以上親準例自當可不睦為稱以凡人論故重明此例可過失殺者各勿論為無惡心故得無罪皆須妻妾告乃坐即至死者聽餘人告殺妻仍為不睦諸妻毆夫徒一年疏議曰妻毆夫徒一年若毆傷重者加凡鬪傷三等假如凡人以他物毆傷人內損吐血合杖一百加凡鬪三等處徒二年此是計加之法須夫告乃坐謂要須夫告然可論罪因毆致死者斬媵及妾犯者各一等過失殺傷者各減二等疏議曰依令五品以上有媵庶人以上有妾故媵及妾犯夫者各加妻犯夫一等謂毆夫者徒一年半毆傷重者加凡鬪傷四等加者加入於死若毆夫折一支或瞎一目凡鬪徒三年加四等合絞是名加入於死過失殺者各減二等謂妻妾媵過失殺者竝徒三年假如妻折夫一支加凡人三等流三千里過失減二等合徒二年半若媵及妾折夫一支合絞過失減二等合徒三年自餘折傷各隨輕重準此加減之例即媵及妾詈夫者杖八十若妾犯妻者與夫同媵犯妻者減妾一等妾犯媵者加凡人一等殺者各斬疏議曰媵及妾詈夫者杖八十若妾犯妻者與犯夫同謂毆者徒一年半死者斬媵犯妻者減妾一等毆者徒一年傷重者從重上減妾一等可妾犯媵者加凡人一等謂毆者笞五十折一齒者徒一年半之類死者各斬謂媵及妾犯夫及妻若妾犯媵毆殺者各斬注云餘條媵無文者謂上條毆妾折傷以上減妻二等之類妻妾相犯及犯夫當條無文者各與妾同加者加入於死餘條媵無文者與妾同諸毆緦麻兄姊杖一百小功大功各遞加一等尊屬者又各加一等傷重者各遞加凡鬪傷一等死者斬即毆從父兄姊準凡鬪應流三千里者絞疏議曰毆緦麻兄姊謂本宗及外姻有緦麻服者竝同毆此兄姊杖一百小功徒一年大功徒一年半尊屬者又各加一等謂毆緦麻尊屬徒一年小功尊屬徒一年半大功尊屬依禮唯夫之袒父母及夫之伯叔父母此竝各有本條自從毆夫之祖父母絞夫之伯叔父母減夫犯一等徒二年半即此大功無尊屬加法傷重者各遞加凡鬪傷一等謂他物毆緦麻兄姊內損吐血準凡人杖一百上加一等合徒一年小功徒一年半大功徒二年尊屬又加一等以即緦麻徒一年半小功徒二年之類因毆致死者各斬假有毆小功尊屬折二支加凡人三等不云加入於死罪止遠流可即毆從父兄姊準凡鬪應流三千里者謂損二事以上或因舊患令至篤疾斷舌及毀敗陰陽此是凡鬪應流三千里於從父兄姊犯此流者合絞若尊長毆卑幼折傷者緦麻減凡人一等小功大功遮減一等死者絞即毆殺從父弟妹及從父兄弟之子孫者流三千里若以刃及故殺者絞疏議曰若尊長毆卑幼折傷者謂折齒以上既云折傷印明非折傷不坐因毆折傷緦麻卑幼減凡人一等小功減二等大功減三等假有毆緦麻卑幼折一指凡鬪合徒一年減一等杖一百小功減二等杖九十大功減三等杖八十其毆傷重者遞減各準此因毆致死者尊長各絞即毆殺從父弟妹謂堂弟妹及從父兄弟之子孫謂堂姪及姪孫者流三千里若以刃殺及不因鬪而故殺者俱合絞刑諸毆兄姊者徒二年半傷者徒三年折傷者流三千里刃傷及折支若瞎其一目者絞死者皆斬詈者杖一百伯叔父母姑外祖父母各加一等即過失殺傷者各減本殺傷罪二等疏議曰兄姊至親更相急難彎弧垂泣義切匪他輒有毆者徒二年半毆傷者徒三年折傷者或折齒或折手足指但折一事即合處流若用刃傷及折支或跌其支體若瞎其一目謂全失其明者各得絞罪因毆致死者首從皆斬詈者合杖一百其伯叔父母姑外祖父母各加一等謂加犯兄姊一等毆者徒三年傷者流二千里文無加入死折傷亦止流坐詈者徒一年過失殺若傷各減本殺傷二等謂過失殺者各減死罪二等合徒三年過失折齒者從流減二等之類其過失之罪兄姊以下竝同減二等若毆殺弟妹及兄弟之子孫外孫者徒三年以刃及故殺者流二千里過失殺者各勿論疏議曰毆殺弟妹及兄弟之子孫者兄弟子期服孫即小功注云曾玄孫者各依本服論兄弟曾孫為緦麻玄孫當袒免服紀既疏恩情轉殺故云各依本服論謂毆殺曾孫合絞玄孫既當袒免自依凡人法此條毆兄弟曾玄孫既依本服即明上條毆殺從父兄弟曾玄孫降服已盡亦同凡人其毆殺弟妹及兄弟之子孫外孫者各徒三年以刃及故殺者流二千里過失殺者各勿論曾玄孫者各依本服論諸詈祖父母父母者絞毆者斬過失殺者流三千里傷者徒三年若子孫違犯教令而祖父母父母毆殺者徒一年半以刃殺者徒二年故殺者各加一等即嫡繼慈養殺者又加一等過失殺者各勿論疏議曰子孫於祖父母父母情有不順而輒詈者合絞毆者斬律無引皆字案文可知子孫雖共毆擊原情俱是自毆雖無皆字各合斬刑下條妻妾毆夫之祖父母父母傷者皆斬舉輕明重皎然不惑過失殺者流三千里傷者徒三年見血為傷傷無大小之限若子孫違犯教令謂有所教令不限事之大小可從而故違者而祖父母父母即毆殺之者徒一年半以刃殺者徒二年故殺者各加一等謂非違犯教令而故殺者手足他物殺徒二年用刃殺徒二年半即嫡繼慈養殺者為情疏易違故又加一等律文既云又加即以刃故殺者徒二年半上加一等徒三年違犯教今以刃殺者二年上加一等徒二年半毆殺者一年半上加一等徒二年可過失殺者各勿論即有違犯教令依法決罰邂遘致死者亦無罪諸妻詈告夫之祖父母父母者徒三年毆者絞傷者皆斬過失殺者徒三年傷者徒二年半疏議曰妻妾有詈夫之祖父母父母者徒三年注云舅姑告乃坐毆者絞傷者皆斬罪無首從過失殺者徒三年傷者徒二年半即毆子孫之婦令廢疾者杖一百篤疾者加一等死者徒三年故殺者流二千里妾各減二等過失殺者各勿論疏議曰祖父母父母毆子孫之婦令廢疾者依戶令腰脊折一支廢為廢疾合杖一百篤疾者兩目盲二支廢加一等合徒一年死者徒三年故殺者謂不因毆詈無罪而輒殺者流二千里若毆妾令廢疾杖八十篤疾杖九十至死者徒二年故殺者徒二年半過失殺者各勿論須舅姑告乃坐諸諸妻妾毆詈故夫之袒父母父母者各減毆詈舅姑二等折傷者加役流死者斬過失殺傷者依凡論疏議曰故夫謂夫亡改嫁者其被出及和離者非各減毆詈舅姑罪二等謂毆者徒三年詈者徒二年折齒以上者加役流死者斬文無皆字即有首從過失殺傷者依凡論謂殺者依凡人法贖銅一百二十斤傷者各依凡人傷法徴贖其銅人被傷殺之家其舊舅姑毆子孫舊妻妾折傷以上各減凡人三等死者絞過失殺者勿論疏議曰其舊舅姑毆子孫舊妻妾折傷以上各減凡人三等謂折指者合杖八十折一支者徒一年半之類死者絞既不言故殺者斬即是故殺者亦絞過失殺者勿論問曰子孫之婦夫亡守志其姑少寡改少醮他人或被棄放此姑婦相犯者合得何罪答曰子孫身亡妻妾改嫁舅姑見在此為可舊舅姑今者姑雖被棄或已改醮他人子孫之妻孀居守志雖於夫家義絶母子終無絶道子既如母其婦理亦如姑姑雖適人婦仍在室理依親姑之法不得同於舊姑若夫之嫡繼慈養不入此條諸毆兄之妻及毆夫之弟妹各加凡人一等若妾犯者又加一等疏議曰嫂叔不許通問所以遠別嫌疑毆兄之妻及毆夫之弟妹者禮敬頓乖故各加凡人一等若妾犯者又加一等謂妾毆夫之弟妹加妻一等總加凡人二等夫之弟妹毆兄妾以凡人論即妾毆夫之妾子減凡人二等毆妻之子以凡人論若妻之子毆傷父妾加凡人一等妾子毆傷父妾又加二等疏議曰即妾毆夫之妾子減凡人二等為匹敵之故得罪稍輕毆妻之子以凡人論為女君尊重故同凡鬪若妻之子毆傷父妾加凡人一等妾子毆傷父妾又加二等稱又加者總加三等若毆折一齒徒二年半之類注云至死者各依凡人法當條雖有加減至死者竝與凡人同至死者各依凡人法故唐律疏議卷第二十三鬪訟凡一十三條諸毆傷妻前夫之子者減凡人一等同居者又減一等死者絞疏議曰毆傷妻前夫之子者謂改醮之婦攜子適人後夫毆傷者減凡人一等同居者謂與繼父同居立廟服期又減一等謂減凡人二等若毆之今至篤疾及斷舌毀敗陰陽如此之類得徒二年半不同居徒三年因毆致死者同居不同居俱得絞罪毆傷繼父者與緦麻尊同同居者加一等疏議曰繼父者謂母後嫁之夫注云謂曾經同居今異者依禮繼父同居服期謂妻少子幼子無大功之親與之適人所適者亦無大功之親而所適者以其資財為之築家廟於家門之外歲時使之祀焉是謂同居繼子之妻雖不從服若有犯夫之繼父者從下條減夫犯一等其不同居者謂先嘗同居今異者繼父若自有子及有大功之親雖復同住亦為異居若未嘗同居則不為異居即同凡人之例其先同居今異者毆之同緦麻尊合徒一年傷重者各加凡鬪二等死者斬同居者雖著期服終非本親犯者不同正服止加緦麻尊一等謂毆者合徒一年半傷重者加凡人三等注云餘條繼父準此謂諸條準服尊卑相犯得罪竝準此例雖於繼父下注即稱妻前夫之子竝與繼父義同律稱與緦麻尊同其有謀殺及賣理當不睦於前夫之子不言與緦麻卑幼同毆之準凡人減罪不入緦麻卑幼之例即毆傷見受業師加凡人二等死者各斬疏議曰禮云凡教學之道嚴師為難師嚴道尊方知敬學如有親承儒教伏膺函丈而毆師者加凡人二等死者各斬稱各者竝毆繼父至死俱得斬刑注云謂伏膺儒業而非私學者儒業謂經業非私學者謂弘文國子州懸等學私學者即禮云家有孰遂有序之類如有相犯竝同凡人問曰毆見受業師加凡人二等其博士若有高品纍加以否答曰毆見受業師加凡人二等先有官品亦從品上纍加若鬪毆無品博士加凡人二等合杖六十九品以上合杖八十若毆五品博士亦於本品上纍加之謂曾經同居今異者餘條繼父準此謂伏膺儒業而非私學者諸妻毆詈夫之期親以下緦麻以上尊長各減夫犯一等妾犯者不減死者各斬疏議曰依喪服夫之所為兄弟服妻降一等今妻毆夫緦麻以上尊長減夫一等以從夫為服罪亦降夫注云減罪輕者加凡鬪傷一等謂故毆緦麻兄姊折一支合流二千五百里妻若減夫一等徒三年故毆凡人折一支既合流二千里即是減罪輕加凡人一等流二千五百里是減罪輕者加凡鬪傷一等妾犯者不減妾犯尊長即與夫同死者各斬謂毆尊長致死妻妾竝合斬刑雖云減夫一等若本制服重即從重論假如毆夫之伯叔父母折肋當大功尊加凡人四等合流二千五百里若準夫減一等即徒三年名例律云當條雖有罪名所為重者自從重須準服加四等流二千五百里之類毆傷卑屬與夫毆同死者絞即毆殺夫之兄弟子流三千里故殺者絞妾犯者各從凡鬪法若尊長毆傷卑幼之婦減凡人一等妾又減一等死者絞疏議曰毆傷卑屬謂是夫家卑屬與夫毆同謂毆夫之從父兄弟子孫有服者折傷以上緦麻減凡人一等諸如此類竝與夫同死者絞即毆殺夫之兄弟子流三千里故殺者絞妾犯者各同凡鬪法謂竝依凡人鬪法科罪若尊長毆傷卑幼之婦謂夫之期親以下緦麻以上尊長毆傷卑幼之婦減凡人一等妾減凡人二等死者絞減罪輕者加凡鬪傷一等諸祖父母父母為人所毆擊子孫即毆擊之非折傷者勿論折傷者減凡鬪折傷三等至死者依常律疏議曰祖父母父母為人所毆擊子孫理合救之堂即毆擊雖有損傷非折傷者無罪折傷者減凡鬪折傷三等謂折一齒合杖八十之類至死者謂毆前人致死合絞以刃殺者合斬故云依常律注云謂子孫元非隨從者若元隨從即依凡鬪首從論律文但稱祖父母父母為人所毆擊不論親疏尊卑其有祖父母父母之尊長毆擊祖父母父母依律毆之無罪者止可解救不得毆之輒即毆者自依鬪毆常法若夫之祖父母父母共妻之祖父母父母相毆子孫之婦亦不合即毆夫之祖父母父母如當毆者即依常律問曰主為人所毆擊部曲奴婢即毆擊之得同子孫之例以否答曰部曲奴婢非親不同子孫之例唯得解救不得毆擊謂子孫元非隨從者諸鬪毆而誤殺傷傍人者以鬪殺傷論至死者減一等疏議曰鬪毆而誤殺傷傍人者假如甲共乙鬪甲用刃杖欲擊乙誤中於丙或死或傷者以鬪殺傷論不從過失者以其元有害心故各依鬪法至死者減一等流三千里若以故僵仆而致死傷者以戲殺傷論即誤殺傷助己者各減二等疏議曰仰謂之僵伏謂之仆謂共人鬪毆失手足跌而致僵仆誤殺傷傍人者以戲殺傷論別條戲殺傷人者減鬪殺傷人二等謂殺者徒三年折一支者徒二年之類即誤殺傷助己者各減二等假如甲與乙共毆丙其甲誤毆乙至死減二等傷減二等或僵仆壓乙殺傷減戲殺傷二等殺乙從戲殺減二等總減四等合徒二年若壓折一支亦減四等徒一年是名各減二等問曰甲共子乙同謀毆丙而乙誤中其父因而致死得從誤殺傷助己減二等以否答曰律云鬪毆而誤殺傷傍人以鬪殺傷論殺傷傍人坐當過失行者本為緣鬪故從鬪殺傷論若父來助己而誤殺者聽減二等便即輕於過失依例當條雖有罪名所為重者自從重論合從過失之坐處流三千里又問以鬪僵仆誤殺助己父母或雖非僵仆鬪誤殺期親尊長各合何罪答曰以鬪僵仆誤殺父母或期親尊長若減罪輕於過失者竝從過失之法又問假有數人同謀殺甲夜中忽遽乃誤殺乙合得何罪答曰此既本是謀殺與鬪毆不同鬪毆彼此相持謀殺潛行屠害毆甲誤中於丙尚以鬪殺傷論以其元無殺心至死聽減一等況復本謀害甲元作殺心雖誤殺乙原情非鬪者若其殺甲是謀殺人今既誤殺乙合科故殺罪諸部曲奴婢詈舊主者徒二年毆者流二千里傷者絞殺者皆斬過失殺傷者依凡論疏議曰部曲奴婢詈舊主者徒二年毆者流二千里傷者絞有首從殺者皆斬罪無首從過失殺傷者竝準凡人收贖銅入傷殺之家即毆舊部曲奴婢折傷以上部曲減凡人二等奴婢又減二等過失殺者各勿論疏議曰主毆舊部曲奴婢折傷以上部曲減凡人二等謂折齒合杖九十奴婢又減二等合杖七十之類過失殺者勿論問曰部曲奴婢毆詈舊主期以下親或舊主親屬毆傷所親舊部曲奴婢得減凡人以否答曰五服尊卑各有血屬故毆尊長節級加之至如奴婢部曲唯繫於主為經主放顧有宿恩其有毆詈所以加罪非主之外雖是親姻所有相犯竝依凡人之法又問有人謀殺舊部曲奴婢或於舊部曲奴婢家強盜有殺傷者合減罪以否答曰毆舊部曲奴婢得減凡人爰至於死亦依減例明謀殺及諸雜犯合依減法唯盜財物特異常犯止依凡人之法不合減科諸戲殺傷人者減鬪殺傷二等雖和以刃若乘高履危入水中以故相殺傷者唯減一等即無官應贖而犯者依過失法收贖疏議曰戲殺傷人者謂以力共戲因而殺傷人減鬪罪二等若有貴賤尊卑長幼各依本鬪殺傷罪上減二等雖則以力共戲終須至死和同不相瞋恨而致死者雖和以刃禮云死而不吊者三謂畏壓溺況乎嬉戲或以金刃或乘高處險或臨危履薄或入水中既在險危之所自須共相警戒因此共戲遂致殺傷雖即和同原情不合致有殺傷者唯減本殺傷罪一等即無官應贖謂有蔭及老小廢疾之類而犯應贖罪者依過失法收贖假有過失殺人贖銅一百二十斤戲殺得減二等贖銅六十斤即是輕重不類故依過失贖罪不從減法注云餘條非故犯謂一部律內諸條非故犯罪無官應得收贖者竝準此假有甲為人合藥誤不如本方殺人合徒二年半若白丁則從真役若是官品之人合贖者不可徴銅五十斤亦徴一百二十斤則是可餘條之類其不和同及於期親尊長外祖父母夫夫之祖父母雖和竝不得為戲各從鬪殺傷法疏議曰謂戲者元不和同及於期親尊長外祖父母夫夫之祖父母此等尊長非應共戲縱雖和同竝不得為戲各從鬪殺傷之法假有共期親尊長戲折一支者仍處絞之類謂以力共戲至死和同者餘條非故犯無官應贖者竝準此諸過失殺傷人者各依其狀以贖論疏議曰過失之事注文論之備矣殺傷人者各準殺傷本狀依收贖之法注云謂耳目所不及假有投甎瓦及彈射耳不聞人聲目不見人出而致殺傷其思慮所不到者謂本是幽僻之所其處不應有人投瓦及石誤有殺傷或共舉重物而力所不制或共升高險而足蹉跌或因擊禽獸而誤殺傷人者如此之類皆為過失稱之屬者謂若共捕盜賊誤殺傷旁人之類皆是其本應居作官當者自從本法謂耳目所不及思慮所不到共舉重物所不制若乘高履危足跌及因擊禽獸以致殺傷之屬皆是諸知謀反及大逆者密告隨近官司不告者絞知謀大逆謀叛不告者流二千里知指斥乘輿及妖言不告者各減本罪五等官司承告不即掩捕經半日者各與不告罪同若事須輕略而違時限者不坐疏議曰謀反者謂知人潛謀欲危社稷大逆者謂知人於宗廟及山陵官闕已有毀損竝須密告隨近官司知而不即告者絞若知謀大逆謂知始謀欲毀宗廟山陵等謀叛者謂知謀欲背國從僞亦須密告官司不告者流二千里若知指斥乘輿謂情理切害及妖言者謂妄說休咎之言不告者各減本罪五等本應死者從死上減五等妖言惑不滿衆者流上減五等是名各減五等官司承告謀反以下不即掩捕若經半日者謂經五十刻不即掩捕各與不告罪同若事須經略謂人衆既多須得人兵器仗如此經略以故違時限而失罪人者不坐其知謀反以下雖不密告隨近官司能自捕送者亦與密告同因其自捕驚失罪人或已就拘執而失者竝同失囚之法諸誣告謀反及大逆者斬從者絞若事容不審原情非誣者上請若告謀大逆謀叛不審者亦如之疏議曰誣告謀反及大逆者謂知非反逆故欲誣之首合斬從合絞若事容不審者謂或奉別敕閲兵或欲修葺宗廟見閲兵疑是欲反見修宗廟疑為大逆之類本情初非誣告者具狀上請聽敕若告謀大逆謀叛不審亦合上請故云亦如之諸誣告人者各反坐即糾彈之官挾私彈事不實者亦如之疏議曰凡人有嫌遂相誣告者準誣罪輕重反坐告人即糾彈之官謂據令應合糾彈者若有憎惡前人或朋黨親戚挾私飾詐妄作糾彈者竝同誣告之律反坐其罪準前人入罪之法至死而前人雖斷訖未決者反坐之人聽減一等若誣反逆雖復未決引虛不合減罪本應加杖者謂誣告部曲奴婢流罪若費部曲奴婢止加杖二百既虛誣告者不流亦準杖法反坐軍丁應加杖者亦依決杖反坐及贖者謂誣告老小廢疾若實即前人合贖虛即反坐者亦依贖論即誣官人及有蔭者假有白丁誣七品官流罪若實官人即合例減官當如虛反坐還得流罪誣告有蔭之人事合減贖反坐之者不得準前人減食法竝真配徒流是名依常律若告二罪以上重事實及數事等但一事實除其罪重事虛反其所剩即罪至所止者所誣雖多不反坐疏議曰若告二罪以上重事實假有甲告乙毆人折一齒合徒一年又告人盜絹五匹亦合徒一年或故殺他人馬一匹合徒一年半推殺馬是實毆盜是虛是名告二罪以上重事實又有丙告丁三事各徒一年此名數事等但一事實除其罪重事虛反其所剩者假如甲告乙盜絹五匹合徒一年又告故殺官私馬牛合徒一年半若其盜是實殺馬牛是虛即是剩告半年之罪反坐半年故云反其所剩即罪至所止者所誣雖多不反坐假有告人非監臨主司因事受財百匹勘當五十匹實坐贓五十匹罪止徒三年剩告五十匹為罪至所止不反坐之類其告二人以上雖實者多猶以虛者反坐若上表告人已經聞奏事有不實反坐罪輕者從上書詐不實論疏議曰告二人以上罪雖實者多猶以虛者反坐以其人事各別故得罪不同注云謂告二人以上但一人不實罪雖輕猶反其坐假有人告甲乙丙丁四人之罪三人徒罪以上竝實一人笞罪事虛不得以實多放免仍從笞罪反坐若上表告人已經聞奏事有不實反坐罪輕於上書不實準從上書詐不實處徒二年不應反坐者無罪假如甲上表告乙兩箇徒一年一實一虛準律既免反坐於甲無上書不實之罪反坐致罪準前人入罪法至死而前人未決者聽減一等其本應加杖及贖者止依杖贖法即誣官人及有蔭者依常律謂告二人以上但一人不實罪雖輕猶反其坐諸告小事虛而獄官因其告檢得重事及事等者若類其事則除其罪難其事則依本誣論疏議曰告小事虛而獄官因其告檢得重事者假有告人盜驢檢得盜馬其價又貴是為得重事及事等者假如告盜甲家馬檢得盜乙家騾其價相似是為事等若類其事謂騾馬驢等色目相類所告雖虛除其妄罪離其事者謂告人盜馬檢得鑄錢之屬是離其事則依本誣論仍得誣告盜馬之罪此條為依告狀檢贓生文不同獄官狀外求罪之例問曰告人私有弩獄官因告乃檢得甲是類事以否答曰稱類者謂其形狀難辨原情非誣所以得除其罪然弩之與甲雖同禁兵論其形樣色類全別事非疑似元狀是誣如此之流不得為類諸誣告人流罪以下前人未加拷掠而告人引虛者減一等若前人已拷者不減即拷證人亦是疏議曰誣告死罪自有別制唯誣告人流罪以下前人未加拷掠而告人自引虛者得減反坐之罪一等若前人已拷者無問杖數多少然後引虛即不合減即拷證人亦是謂雖不拷被告之人拷傍證之者雖自引虛亦同已拷不減其誣告期親尊長以下及奴婢部曲誣告主之外祖父母以上雖即引虛各不合減問曰律云前人未加拷掠而告人引虛減一等未知前人已經斷訖然後引虛合減以否答曰律文但言已加拷掠不言事經斷訖拷訖已傷律有成制斷訖未損理合減科若事經奏訖不合追減及已役已配亦是已損已傷前人計與拷掠義同不在減科之例誣告期親尊長外祖父母夫夫之祖父母及奴婢部曲誣告主之期親外祖父母者雖引虛各不減諸告祖父母父母者絞疏議曰父為子天有隱無犯如有違失理須諌諍起敬起孝無令陷罪若有忘情棄禮而故告者絞注云謂非緣坐之罪緣坐謂謀反大逆及謀叛以上皆為不臣故子孫告亦無罪緣坐同首法故雖父祖聽捕告若故告除罪者父祖得同首例子孫處以絞刑下條準此者謂告期親尊長情在於惡欲令人罪而故告之故云準此若因推劾事不獲免隨辨注引不當告坐即嫡繼慈母殺其父及所養者殺其本生竝聽告疏議曰嫡繼慈母者名例竝已釋訖此等三母殺其父及所養父母殺其所生父母竝聽告若嫡繼母殺其所生庶母亦不得告故律文但云殺其父者聽告問曰所生之母被出其父更娶繼妻其繼母乃殺所出之母出母之子合告以否答曰所養父母本是他人殺其所生故律聽告今言出母即是所生名例稱犯夫及義絶者得以子蔭即子之於母孝愛情深顧復之恩終無絶道繼母殺其親母準例亦合聽告又問嫡繼慈母有所規求故殺子孫合得何罪又子孫得自理訴以否此母或被出或父卒後行若為科斷答曰子孫之於祖父母父母皆有祖父子孫之名其有相犯之文多不據服而斷賊盜律有所規求而故殺期以下卑幼者絞論服相犯例準傍期在於子孫不入期服然嫡繼慈養依例雖同親母被出改嫁禮制便與親母不同其改嫁者唯止服期依令不合解官據禮又無心喪雖曰子孫唯準期親卑幼若犯此母亦同期親尊長被出者禮既無服竝同凡人其應理訴亦依此法謂非緣坐之罪及謀叛以上而故告者下條準此故唐律疏議卷第二十四鬪訟凡一十六條諸告期親尊長外祖父母夫夫之祖父母雖得實徒二年其告事重者減所告罪一等即誣告重者加所誣罪三等告大功尊長各減一等小功緦麻減二等誣告重者各加所誣罪一等疏議曰告期親尊長外祖父母夫夫之祖父母依名例律竝相容隱被告之者與自首同告者各徒二年告事重於徒二年者減所告罪一等假有告期親尊長盜上絹二十五匹合徒三年尊長同首法免罪卑幼減所告罪一等合徒二年半之類注云所犯雖不合論謂期親以下或年八十以上十歲以下若篤疾犯罪雖不合論而卑幼告之依法猶坐即誣告期親尊長得罪重於二年徒者加所誣罪三等假有誣告期親尊長一年半徒罪加所誣罪三等合徒三年此亦是計加得重於本罪即須加告大功尊長各減一等謂告得實徒一年半重於徒一年半者即減期親罪一等假有告大功尊長三年徒減期親一等處徒二年告小功緦麻尊長雖得實同減期親二等合徒一年告事重者亦減期親尊長二等假有告三年徒雖實徒一年半之類誣告重者謂誣告大功小功緦麻重者各加所誣罪一等假有誣告大功尊長一年半徒加所誣罪一等合徒二年誣告小功緦麻尊長徒一年罪亦加所誣罪一等徒一年半之類即非相容隱被告者論如律若告謀反逆叛者各不坐其相侵犯自理訴者聽疏議曰小功緦麻非相容隱被告之者不得同於首原各依律科斷故云被告者論如律若告謀反逆叛者謂期親尊長以下犯謀反逆叛三事以其不臣故雖論告不科其罪其相侵犯謂期親以下緦麻以上或侵奪財物或毆打其身之類得自理訴非緣侵犯不得別告餘事注云下條準此謂下條告緦麻以上卑幼雖有罪名相侵犯亦得自理問曰告期親尊長竊盜三十匹依檢二十五匹實五匹虛合得何罪答曰律云一事分為二罪罪法若等則纍論罪法不等即以重法併滿輕法按尋此狀正當纍併之條將重併輕總為三十匹減所告罪一等便合處徒三年所犯雖不合論告之者猶坐下條準此諸告緦麻小功卑幼雖得實杖八十大功以上遞減一等誣告重者期親減所誣罪二等大功減一等小功以下以凡人論疏議曰稱緦麻小功即外姻有服者亦是其相隱既得減罪有過不合告言故雖得實合杖八十告大功卑幼減小功一等期親卑幼又減一等誣告重者謂誣告期親重於杖六十者減所誣罪二等猶如誣告弟姪九十杖罪合減所誣二等合杖七十若告大功減一等合杖八十若告小功以下以凡人論仍得杖九十問曰女君於妾依禮無服其有誣告得減罪以否答曰律云毆傷妻者減凡人二等死者以凡人論若妻毆傷殺妾與夫毆傷殺妻同又條誣告期親卑幼減所誣罪二等其妻雖非卑幼義與期親卑幼同夫若誣告妻須減所誣罪二等妻誣告妾亦與夫誣告妻同即誣告子孫外孫子孫之婦妾及己之妾者各勿論疏議曰誣告子孫外孫子孫之婦妾者曾玄婦妾亦同及己之妾者各勿論其有告得實者亦不坐被告得相容隱者俱同自首之法諸子孫違犯教令及供養有闕者徒二年疏議曰祖父母父母有所教令於事合宜即須奉以周旋子孫不得違犯及供養有闕者禮云七十二膳八十常珍之類家道堪供而故有闕者各徒二年故注云謂可從而違堪供而闕者若教令違法行即有愆家實貧窶無由取給如此之類不合有罪皆須祖父母父母告乃坐謂可從而違堪供而闕者須祖父母父母告乃坐諸部曲奴婢告主非謀反逆叛者皆絞告主之期親及外祖父母者流大功以下親徒一年誣告重者緦麻加凡人一等小功大功遞加一等即奴婢訴良妄稱主壓者徒三年部曲減一等疏議曰日月所照莫匪王臣奴婢部曲雖屬於主其主若犯謀反逆叛即是不臣之人故許論告非此三事而告之者皆絞罪無首從注云被告者同首法謂其主雜犯死罪以下部曲奴婢告之俱同為首之法奴婢獲罪主得免科奴婢為主隱雖告準名例律相容隱告言自合同首今律文重言同首法者以相隱條無相隱字故告主之期親及外祖父母者流不言里數者為同加杖二百大功以下親徒一年稱大功以下小功緦麻亦同此等竝謂告得實誣告重者謂所誣之罪重於徒一年緦麻加凡人一等若誣告主緦麻親徒一年加一等合徒一年半小功徒二年大功徒二年半之類大功以下諸親犯有輕重應計等級加者但重於徒一年皆準此加法即奴婢訴良妄稱主壓者謂奴婢本無良狀而妄訴良云主壓充賤者合徒三年不同誣告主者開其自理之路部曲減一等其主誣告部曲奴婢者即同誣告子孫之例其主不在坐限被告者同首法諸誣告本屬府主刺史縣令者加所誣罪二等疏議曰誣告本屬府主等加所誣罪二等者謂誣告一年徒罪合徒二年之類若告除名免官免所居官等事虛亦準比徒法加罪其有緦麻以上親任本屬府主刺史縣令者自依告親法若告尊長各從重論諸投匿名書告人罪者流二千里疏議曰有人隱匿己名或假人姓字潛投犯狀以告人罪無問輕重投告者即得流坐故注云謂絶匿姓名及假人姓名以避己作者棄置懸之俱是謂或棄之於街衢或置之於衙府或懸之於旌表之類皆為投匿之坐假人姓名經官司判入言告人罪從違令科非是投匿所以科違令投匿告祖父母科絞告期親卑幼減凡人二等大功減一等小功以下以凡人論匿名書告他人部曲奴依凡人法是大功相犯不合減一等二等他皆倣此告緦麻以上親部曲奴即依減法得書者皆即焚之若將送官司者徒一年官司受而為理者加二等被告者不坐輒上聞者徒三年疏議曰匿名之書不合檢校得者即須焚之以絶欺詭之路得書不焚以送官府者合徒一年官司既不合理受而為理者加二等處徒二年被告者假令事實亦不合坐若是書不原事以後別有人論告還合得罪輒上聞者合徒三年若得告反逆之書事或不測理須聞奏不合燒除問曰投匿名書告人謀反大逆或虛或實捉獲所投之人未知若為科罪答曰隱匿姓字投書告罪投書者既合流坐送官者法處徒刑用塞誣告之源以杜姦欺之路但反逆之徒釁深夷族知而不告即合死刑得書不可焚之故許送官聞奏狀既是實便須上請聽裁告若是虛理依誣告之法謂絶匿姓名及假人姓名以避己作者棄置懸之俱是諸被囚禁不得告舉他事其為獄官酷己者聽之疏議曰人有犯罪身在囚禁唯為獄官酷己者得告自餘他罪竝不得告發即流囚在道徒囚在役身嬰枷鎖或有援人亦同被囚禁之色不得告舉他事又準獄官令囚告密者禁身領送即明知謀叛以上聽告餘準律不得告舉即年八十以上十歲以下及篤疾者聽告謀反逆叛子孫不孝及同居之內為人侵犯者餘竝不得告官司受而為理者各減所理罪三等疏議曰老小及篤疾之輩犯法既得勿論唯知謀反大逆謀叛子孫不孝及闕供養及同居之內為人侵犯如此等事竝聽告舉自餘他事不得告言如有告發不合為受官司受而為理者從被囚禁以下減所推罪三等假有告人徒一年官司受而為理合杖八十之類問曰有人被囚禁更首別事其事與餘人連坐官司合受以否答曰律云被囚禁不得告舉他事此既首論身事非關別告他人縱連傍人官司亦合為受被首之者仍依法推科諸犯罪欲自陳首者皆經所在官司申牒軍府之官不得輒受其謀叛以上及盜者聽受即送隨近官司若受經一日不送及越覽餘事者各減本罪三等其謀叛以上有須掩捕者仍依前條承告之法疏議曰犯罪未發皆許自新其有犯罪欲自陳首者皆經所在官司申牒但非軍府此外曹局竝是所在官司軍府之官謂諸衛以下折衝府以上竝是領兵曹司不許輒受首事其謀叛以上事是重害及盜賊之輩竝即須追掩故聽於軍府陳首軍府受得即送隨近官司其受首謀反逆叛者若有支黨必須追掩不得過半日及首盜者受經一日不送隨近州縣及越覽餘事者減本罪三等假有告人脫戶合徒三年軍府受而為推者合徒一年半之類其謀反逆叛為有支黨事須掩捕仍依前條承告之法謂若滿半日不掩還同知而不告之罪謂謀反大逆不告合死謀大逆謀叛不告者流諸以赦前事相告言者以其罪罪之官司受而為理者以故人入罪論至死者各加役流疏議曰以赦前事相告言者謂事應會赦始是赦前之事不合告言若常赦所不免仍得依舊言告假有會赦監主自盜得免有人輒告以其所告之罪罪之謂告徒一年贓罪者監主自盜即合除名告者還依比徒之法科罪官司違法受而為理者以故人入罪論謂若告赦前死罪前人雖復未決告者免死處加役流官司受而為理至死者亦得此罪故稱各加役流若官司以赦前合免之事彈舉者亦同受而為理之坐若事須追究者不用此律疏議曰事須追究者備在注文不用此律者謂不用入罪之律注云追究謂婚姻良賤赦限外蔽匿謂違律為婚養奴為子之類雖會赦須離之正之赦限外蔽匿謂會赦應首及改正徴收過限不首若經責簿帳不首不改正徴收及應徴見贓謂盜詐之贓雖赦前未發赦後捉獲正贓者是謂見贓之類合為追徴問曰準誣告條至死而前人未決聽減一等流罪以下前人未加拷掠而告人引虛得減一等又準官司入人罪若未決放聽減一等有誣告赦前死罪官司受而為推得依此條減罪以否答曰依律以赦前事相告言者以其罪罪之官司為理者以故入人罪論此是赦前之罪竝不許言告論實尚無減例誣告豈得減之不至死者俱無減法至死者處加役流追究謂婚姻良賤赦限外蔽匿應改正徴收及追見贓之類諸告人罪皆須明注年月指陳實事不得稱疑違者笞五十官司受而為理者減所告罪一等即被殺被盜及水火損敗者亦不得稱疑雖虛皆不反坐其軍府之官不得輒受告事辭牒若告謀叛以上及盜者依上條疏議曰告人罪皆注前人犯罪年月指陳所犯實狀不得稱疑違者笞五十但違一事即笞五十謂牒未入司即得此罪官司若受疑辭為推竝準所告之狀減罪一等即以受辭者為首若告死罪流三千里告流處徒三年之類即被殺被盜為害特甚或被人決水縱火漂焚財物盜即不限強竊漂焚不問多少告者皆須明注日月不合稱疑推問雖虛皆不反坐若稱疑者官司亦不合受理即雖受理官司亦得免科其軍府之官亦謂諸衛及折衝府等不得輒受告事辭牒告謀叛以上及盜者依上條為受即送官司之法諸為人作辭牒加增其狀不如所告者笞五十若加增罪重減誣告一等疏議曰為人雇倩作辭牒加增告狀者笞五十若加增其狀得罪重於笞五十者減誣告罪一等假有前人合徒一年為人作辭牒增狀至徒一年半便是剩誣半年減誣告一等合杖九十之類若因雇倩受財得贓重者同非監臨主司因事受財坐贓之罪如贓重從贓科贓輕者從減誣告一等法即受雇誣告人罪者與自誣告同贓重者坐贓論加二等雇者從教令法若告得實坐贓論雇者不坐疏議曰上文為人作辭牒雖復得物不雇誣告因有加增得減誕告一等此文即受雇誣告人罪者謂彼此同謀本共誣搆情規陷害故與自誣告罪同贓重者坐贓論加二等假有得絹十匹受雇誣告人一年半徒坐贓論十匹合徒一年加二等即徒二年之類雇者從教令法依下條教令為從減受雇者一等仍得一年徒若告得實坐贓論謂受絹十匹告得實事合徒一年之類雇者不坐以其得實故得無罪諸教令人告事虛應反坐得實應賞皆以告者為首教令為從疏議曰教令人告事虛應反坐謂誣告人者各反坐得實應賞謂告齎禁物度關及博戲盜賊之類令有賞文或告反逆臨時有加賞者皆以告者為首教令者為從問曰律云得實應賞皆以告者為首教令為從未知告得賞物若為作首從分財答曰應賞在令有文分賞元無等級既為首從之法須準律條論之又不可徒杖別作節文約從杖一百之例假如教人告杖一百罪虛即告者為首合杖一百教令為從合杖九十即從者十分減一應賞義亦準此假有輕重不同竝準十分為例即教令人告緦麻以上親及部曲奴婢告主者各減告者罪一等被教者論如律若教人告子孫者各減所告罪一等疏議曰其有教令人自告緦麻以上親或教人部曲奴婢告主者告實及誣各減告者罪一等其告緦麻以上親即尊者坐重卑者坐輕部曲奴婢告主皆絞故云各減告者罪一等被教者論如律謂被教告緦麻以上親及告主各得本罪若教人告子孫者告子孫本既無罪各減所告罪一等雖是死罪亦減死處流注云雖誣亦同謂雖教誣告亦減罪一等既上條祖父母父母誣告子孫外孫子孫之婦妾及己之妾各勿論此條但云教人告子孫各減所告罪一等既外孫以下亦準教令告子孫法減所告罪一等教人部曲奴婢告主期親以下雖無別理亦合有罪教告主期親及外祖父母者科不應為重教告主大功以下緦麻以上科不應為輕雖無正文比例為允雖誣亦同諸邀車駕及撾登聞鼓若上表以身事自理訴而不實者杖八十疏議曰車駕行幸在路邀駕申訴及於魏闕之下撾鼓以求上聞及上表披陳身事此三等如有不實者各合杖八十注云即故增減情狀有所隱避詐妄者從上書詐不實論謂上文以理訴不實得杖八十若其不實之中有故增減情狀有所隱避詐妄者即從上書詐不實論處徒二年自毀傷者杖一百雖得實而自毀傷者笞五十即親屬相為訴者與自訴同疏議曰邀車駕以下訴人所訴非實輒自毀傷者皆杖一百若所訴雖是實而自毀傷者笞五十即親屬相為訴者親屬謂緦麻以上及大功以上婚姻之家為訴者與自訴同自邀車駕以下虛實得罪各與自訴罪同即故增減情狀有所隱避詐妄者從上書詐不實論諸越訴及受者各笞四十若應合為受推抑而不受者笞五十三條加一等十條杖九十疏議曰凡諸辭訴皆從下始從下至上令有明文謂應經縣而越向州府省之類其越訴及官司受者各笞四十若有司不受即訴者亦無罪若應合為受謂非越訴依令聽理者即為受推抑而不受者笞五十三條加一等謂不受四條杖六十十條罪止杖九十若越過州訴受詞官人判付縣勘當者不坐請狀上訴不給狀科違令笞五十即邀車駕及撾登聞鼓若上表訴而主司不即受者加罪一等其邀車駕訴而入部伍內杖六十疏議曰有人邀車駕及撾登聞鼓若上表申訴者主司即須為受不即受者加罪一等謂不受一條杖六十四條杖七十十條杖一百其邀車駕訴人輒入部伍內者杖六十注云部伍謂入導駕儀仗中者依鹵簿令駕行導駕者萬年縣令引次京兆尹總有六引注云駕從餘州縣出者所在刺史縣令導駕竝準此儀仗依本品若訴人入此儀仗中者杖六十問曰有人於殿庭訴事或實或虛合科何罪答曰依令尚書省訴不得理者聽上表受表恆有中書舍人給事中御史三司監受若不於此三司上表而因公事得入殿庭而訴是名越訴不以實者依上條杖八十得實者不坐部伍謂入導駕儀仗中者諸強盜及殺人賊發被害之家及同伍即告其主司若家人同伍單弱比伍為告常告而不告一日杖六十主司不即言上一日杖八十三日杖一百官司不即檢校捕逐及有所推避者一日徒一年竊盜各減二等疏議曰強盜及以殺人賊發被害之家及同伍共相保伍者須告報主司者謂坊正村正里正以上若家人同伍單弱不能告者比伍為告每伍家之外即有比伍亦須速告主司當告而不告謂家有男夫年十六以上不為告者一日杖六十主司不即言於所在官司二日杖八十三日杖一百須計去官司遠近準行程外為罪官司不即檢校謂隨近受告官司不即險校捕逐及與隨近州縣鎮戍府監等相推或假以餘事辭託者一日徒一年若是竊盜從同伍以下各減二等謀殺人已傷及殺部曲奴婢比竊盜不告科之諸監臨主司知所部有犯法不舉劾者減罪人罪三等糾彈之官減二等疏議曰監臨謂統攝之官主司謂掌領之事及里正村正坊正以上知所部之人有違犯法令格式之事不舉劾者減罪人罪三等假有人犯徒一年不舉劾者得杖八十之類糾彈之官唯減二等謂職當糾彈者其金吾當檢校之處知有犯法不舉劾者亦同減罪人罪二等即同伍保內在家有犯知而不糾者死罪徒一年流罪杖一百徒罪杖七十其家唯有婦女及男年十五以下者皆勿論疏議曰即同伍保內謂依令伍家相保之內在家有犯知死罪不糾得徒一年知流罪不糾杖一百知徒罪不糾杖七十犯百杖以下保人不糾無罪其伍保之家唯有婦女及男年十五以下不堪告事雖知不糾亦皆勿論雖是伍保之內所犯不在家中知而不糾不合科罪故唐律疏議卷第二十五詐僞凡二十七條疏議曰詐僞律者魏分賊律為之歷代相因迄今不改既名詐僞應以詐事在先以御寶事重遂以僞造八寶為首鬪訟之後須防詐僞故次鬪訟之下諸僞造皇帝八寶者斬太皇太后皇太后皇后皇太子寶者絞皇太子妃寶流三千里疏議曰皇帝有傳國神寶有受命寶皇帝三賓天子三寶是名八寶依公式令神寶寶而不用受命寶封禪則用之皇帝行寶報王公以下書則用之皇帝之寶慰勞王公以下書則用之皇帝信寶徴召王公以下書則用之天子行寶報番國書則用之天子之寶慰勞番國書則用之天子信寶徴召番國兵馬則用之皆以白玉為之寶者印也印又信也以其供御故不與印同名八寶之中有人僞造一者即斬其太皇太后皇太后皇后皇太子寶僞造者絞皇太子妃寶僞造者流三千里太皇太后以下寶皆以金為之竝不行用注云僞造不録所用謂寶既金玉為之僞造者不必皆須金玉為之亦不問用與不用造者即坐僞造不録所用但造即坐諸僞寫官文書印者流二千里餘印徒一年疏議曰上文稱僞造皇帝八寶寶以玉為之故稱造此云僞寫官文書印印以銅為之故稱寫注云寫謂倣效而作謂倣效為之不限用泥用蠟等故云不録所用但作成者即流二千里餘印徒一年餘印謂諸州等封函印及畜産之印亦不録所用上文但造寶即坐不須堪行用此文雖寫印不堪行用謂不成印文及大小懸別如此之類不合流坐從下條造未成者減三等即僞寫前代官文書印有所規求封用者徒二年疏議曰依式周隋官亦聽成蔭或爭封邑之類事緣前代乃僞寫前代之印心有規求封用者徒二年稱封用者或印文書及封文簿事兼兩用故連云封用注云因之得成官者從詐假法謂僞寫封用為舊公驗因之成官者從詐假法其僞寫未成及成而未封用依下文未施行減三等例亦減已封用三等寫謂倣效而作亦不録所用因之得成官者從詐假法諸僞寫宮殿門符發兵符傳符者絞疏議曰宮殿門符謂非時開宮殿門皆須勘魚符合然始得開僞寫此符及僞寫發兵符注云發兵謂銅魚合符依公式令下左符進內右符付州府等應有差科徴發皆竝敕符與銅魚同封行下勘符合然後承用故稱銅魚合符應發兵雖通餘用亦同謂其符通雜徴發人事及有所用度若除授替代州府長官及差行追禁竝用此符故稱雖通餘用亦同謂同發兵符罪餘條稱發兵者謂擅興律應給發兵符而不給賊盜律盜發兵符故云餘條皆準此傳符者謂給驛用之僞寫及造此等符者竝合絞使節及皇城京城門符者流二千里餘符徒二年疏議曰使節者周禮有掌節之司注云道路用旌節然大使擁節而行是名使節其皇城門謂朱雀等諸門京城門謂明德等諸門僞作此等符及節者流二千里餘符徒二年注云餘符謂禁苑門及交巡魚符之類禁苑諸門有符開閉守衛交兵之處皆有交符巡更警夜之所竝執巡魚符勘過據擅興律凡餘符者契亦同即契應發兵者同發兵符法此條云之類者即是諸契非發兵僞造者竝同餘符之罪各合徒二年發兵謂銅魚合符應發兵者雖通餘用亦同餘條稱發兵者皆準此餘符謂禁苑門及交巡魚符之類諸以僞寶印符節及得亡寶印符節假人若出賣及所假若買者封用各以僞造寫論疏議曰以僞造寶印符節及得亡寶印符節假與他人若出賣與他人及所假所買之人雖非身自造寫若將封用各依僞造僞寫法科之即以僞印印文書施行若假與人及受假者施行亦與僞寫同未施行及僞寫印符節未成者各減三等疏議曰上文謂僞造寫及得亡寶印符節假人及賣買等罪此文欲論以僞印文書施行謂以僞印印文書自將行用若以僞印文書假與他人及有受得僞文書行用竝謂已入官司者其罪各依僞造寫法未施行謂僞文書未將行用及僞寫印符節未成者各減已施行及已成罪三等問曰有人得亡寶印符節假賣與人其所假買者未將行用未知假賣之人亦合得依未施行法減罪以否答曰準依律文本防行用故云若假人若出賣及所假若買者封用各以僞造寫論封用之文承賣買之下若已封用俱得全罪如未行用竝合依未施行減三等下條盜寶印符節及假賣與人其假買未封用竝合依此減法其假買僞印文書未施行假賣人亦同減例又問二人共造僞印印文牒從者乃將施行未知二人合有首從以否答曰依名例律共犯罪以造意為首隨從者減一等僞印既非劫盜止合造意為首從者雖復行用止依從法減科諸盜寶印符節封用即所主者盜封用及以假人若出賣所假及買者封用各以僞造寫論疏議曰盜寶印符節封用注云謂意在詐僞不關由所主謂盜用官印等不由所當之人或執印等主司私盜封用及所主者將印假與他人若將出賣與人并所假買之人若將封用各以僞造寫論竝依自造之法問曰有人身為案主受人請求乃為盜印印僞文牒既非掌印合作首從以否答曰一人須印行用一人盜印與之即是共犯須論首從盜者雖為案主非掌印之人便是共犯合為首從主司不覺人盜封用者各減封用罪五等印又減二等即事直及避稽而盜用印者各杖一百事雖不直本法應用印而封用者加一等主司不覺笞五十故縱者各與同罪疏議曰掌寶及符節主司不覺有人盜用者減盜用人罪五等印又減二等謂不覺用寶及符應死者死上減五等徒一年半不寬用符節應流流上減五等徒一年不覺用餘符徒二年上減五等杖八十不覺用印流上減七等合杖九十即文書正直及避文案稽遲而盜用印者各杖一百事雖不直本法應用印謂事雖柱曲本法應封用印者終須申答而盜封用印者加一等合徒一年若不直罪重即從重斷主司不覺笞五十謂從事直及避稽以下不覺各笞五十故縱者各與同罪謂意在詐僞不關由所主諸詐為制書及增減者絞未施行者減一等疏議曰詐為制書意在詐僞而妄為制敕及因制敕成文而增減其字者絞注云口詐傳及口增減亦是謂詐傳敕語及奉敕宣傳口中詐有增減動事者竝與增減制書同未施行減一等謂詐為制敕及詐增減已訖而未施行減一等注云施行謂中書覆奏此謂詐為敕語及雖奉制敕處分就中增減中書承受已覆奏訖若其不須覆奏者即據已入所司或有詐為中書宣出制敕文書已人所在曹司應承受施行及起請行判曹司者竝為已施行雖不關由所司謂所宣制敕及增減不入曹司徑即詐向規求之所其前人已承受者亦為施行假有甲詐直制敕向乙索物乙已承受不要得物承受之者此類即是施行餘條施行準此餘條謂以僞印文書施行及下條詐為官文書施行如此諸條已施行及未施行皆準此其收捕謀叛以上不容先聞而矯制有功者奏裁無功者流二千里疏議曰其收捕謀叛以上謂所在收捕謀反逆叛不容先聞謂不容先得奏聞恐其滋蔓或致逃逸而矯行制敕務速收掩有功者奏裁無功者流二千里以其矯行制書無功可録免其死罪宥以流刑口詐傳及口增減亦是施行謂中書覆奏及已入所司者雖不關由所司而詐傳增減前人已承受者亦為施行餘條施行準此諸對制及奏事上書詐不以實者徒二年非密而妄言有密者加一等疏議曰對制謂親被顧問奏事謂面陳事由若附他人而奏亦同自奏之法上書謂特達御所此等若有詐不以實者徒二年非密而妄言有密謂非諜反逆叛應密之事而妄言有密加一等謂加對制不實一等徒二年注文已如上解詐謂知而隱欺謂知事不實故為隱欺及有所求避或妄求功賞或回避罪戻之類若被官司責罰情在咆哮或有因鬪忿爭欲相恐迫口雖告密問即不承既無文牒入司坐當不應為重其有已陳文牒問始承虛或口稱有密下辨仍執於後承妄者竝同未奏減一等徒二年若別制下問案推報上不以實者徒一年其事關由所司承以奏聞而不實者罪亦如之未奏者各減一等疏議曰若別制下問謂不緣曹司特奉制敕遣使就問注云無罪名謂之問謂問百姓疾苦豐儉水旱之類案者謂風聞官人有罪未有告言之狀而奉制案問推者謂事發遣推已有告言之者而乃報上不以實者各徒一年其事關曹司承以奏聞而有不實亦得徒一年未奏者各減一等謂承前人上書詐不以實若非密及下問案推報上不實事關所司承以聞奏申報不實未奏者各減一等竝謂被問被推之人報答不實者各獲此罪對制謂親見被問奏事謂面陳若附奏亦是上書謂書奏特達詐謂知而隱欺及有所求避之類無罪名謂之問未有告言謂之案已有告言謂之推諸詐為官文書及增減者杖一百準所規避徒罪以上各加本罪二等未施行各減一等疏議曰詐為官文書謂詐為文案及符移解牒鈔券之類或增減以動事者杖一百準所規避之事當徒罪以上事發者各加本罪二等未發即依二罪之法從重科之規避者假有於法不應為官詐求得官者徒二年又詐為官文書及增減而規官不解加本罪二等合徒三年避者或有本犯徒三年詐為增減以避此罪者合加二等流二千五百里即詐為官文書及增減訖事未施行各減一等杖罪以下杖上減徒罪以上各從徒流死上減即主司自有所避違式造立及增減文案杖罪以下杖一百徒罪以上各加所避罪一等若增減以避稽者杖八十疏議曰謂主司欲避身罪違式造立文案或於舊案增減者杖罪以下謂笞十以上即前罪之外得杖一百或避徒罪以上事發者即就所避徒上各加所避罪一等注云造立即坐謂不必避得前罪但造立及增減即坐若增減以避文案稽違竝於本罪之外加杖八十未發者從二罪法問曰主司自有所避違式造立文案徒罪以上加所避罪一等加罪有公有私若用官當合併滿以否答曰主司若避公罪有所增減造立即坐本罪依公坐加罪為私罪若應以官當者須以私併公通所加私罪為公坐當法其於負殿者各依公私兩論造立即坐諸詐假官假與人官及受假者流二千里疏議曰詐假官謂虛僞詐假以得官若虛假授與人官及受詐假官者竝流二千里注云謂僞奏擬但流內九品以上官皆注訖奏擬及詐為省司判補視品流內等官或得他人正授告身或同姓字或改易己名妄冒官司以居職任稱之類者亦有己之告身應合追毀私自盜得而假詐之者若詐申聞及增減重者從重法其於法不應為官而詐求得官者徒二年疏議曰其於法不應為官謂有罪譴未合仕之類假如除名者六載後聽敍免官者三載後聽敍免所居官者同年聽敍若有此等年限未滿而詐求得官者徒二年稱之類者謂犯罪應用高官而詐用卑官及流人未滿六載之類若詐增減功過年限而預選舉因之以得官者徒一年流外官各減一等求而未得者又各減二等疏議曰若詐增減功過年限謂詐增功勞考第或減其負殿及下考年限而預選及舉因之以得官者徒一年又依選舉令官人身及同居大功以上親自執工商家專其業者不得仕其舊經職任因此解黜後能修改必有事業者三年以後聽仕其三年外仍不修改者追毀告身即依庶人例其有官及無官之人依令不得仕而詐求得官及未滿三年隱狀選得官者竝同增減功過年限預選得官合徒一年其三年外仍不修改若方便不輸告身依舊為官者亦同不應為官之坐若追納之後却盜及私贖得以為官者依上條詐假官論流外官減一等謂從詐假官以下竝依流內官當色輕重上減一等故云各減一等求而未得又各減二等若詐假官未得流上減二等合徒二年半流外官又減一等徒二年於法不應為官求而未得減二等徒一年流外官又減一等杖一百詐增減功過年限而預選舉求而未得減二等杖九十流外官又減一等杖八十注云下條準此謂下條非正嫡詐承襲未得亦各減二等謂僞奏擬及非為省司判補或得他人告身施用之類謂有罪譴未合仕之類下條準此諸非正嫡不應襲爵而詐承襲者徒二年非子孫而詐承襲者從詐假官法若無官蔭詐承他蔭而得官者徒三年非流內及求贖杖罪以下各杖一百徒罪以上各加一等疏議曰依封爵令王公侯伯子男皆子孫承嫡者傳襲以次承襲具在令文其有不合襲爵而詐承襲者合徒二年非子孫謂子孫之外詐云是嫡而妄承襲者從詐假官法合流二千里若無官蔭詐妄承取他人官蔭而得官者徒三年非流內謂假蔭得學生及七品邑若勳品以下及求贖杖罪以下本罪之外各合杖一百徒罪以上加一等謂於百杖上加一等合徒一年此是犯罪已發而更為者重其事從詐承襲以下求而未得各減二等問曰取蔭求贖杖罪杖一百徒罪加一等其官司知而故縱未知從下條承詐知而聽行與同罪惟復依斷獄律斷罪應決配之而聽收贖減本罪故失一等而科答曰既稱知而故縱即是知而聽行理從同罪而科諸詐為官及稱官所遣而捕人者流二千里為人所犯害而詐稱官捕及詐追攝人者徒一年疏議曰詐為官謂身自詐作官人及詐稱官司遣捕人者竝流二千里若為人侵犯其身或犯家人親屬或侵奪身及家人親屬財物等乃詐稱官司遣捕或稱官司遣追攝者竝徒一年雖詐有追攝及捕而未執縛者各減三等稱各者捕人未縛流上減三等合徒二年為人所犯害詐稱官捕及詐追攝人未縛徒一年上減三等合杖八十問曰捕亡律被人毆擊折傷以上若盜及強姦雖傍人皆得捕繫其傍人雖合捕攝乃詐稱官遣而捕繫之合科何罪答曰此條注云犯其身及家人親屬財物等謂非折傷以上盜及強姦之色而詐稱官捕合徒一年若前人本法合捕雖傍人詐稱官捕止從下文其應捕攝杖八十其應捕攝無官及官卑詐稱高官者杖八十即詐稱官及冒官人姓字權有所求為者罪亦如之疏議曰謂毆人折傷以上或強姦及盜此等應須捕攝其捕攝之人或無官詐稱有官或官卑詐稱高官者杖八十即詐稱是官及冒承官人姓名權有所求為者或經過之處權有所求或出入公門心規禮待非有捕攝者情是詐欺之類亦合杖八十故云亦如之問曰前人不合捕攝乃詐稱官捕因而殺傷前人或拒毆傷殺捕者各合何罪答曰詐捕攝人已成凶狡更加毆打傷殺情狀彌所難原前人既不相干即當故殺傷法若前人拒毆殺傷捕者名例云本應輕者聽從本既不合捕橫被執持雖有殺傷止同鬪殺犯其身及家人親屬財物等未執縛者各減二等諸詐欺官私以取財物者準盜論疏議曰詐謂詭誑欺謂誣罔詐欺官私以取財物者一準盜法科罪唯不在除免倍贓加役流之例罪止流三千里注云詐欺百端皆是謂詐欺之狀不止一途若監主詐取謂監臨主守詐取所監臨主守之物自從盜法加凡盜二等有官者除名未得者減二等謂已設詐端誣罔規財物猶未得者皆準贓減罪二等其非監主詐欺未得者自從盜不得財之法下條準此謂下條詐為官私文書及增減欺妄求物未得者監主之人亦減二等故云下條準此知情而取者坐贓論知而買者減一等知而為藏者減二等疏議曰知情而取者謂知前人詐欺得物而乞取者坐贓論一尺笞二十匹加一等十匹徒一年詐欺之人雖是監主凡人知情取者止得坐贓之罪知而買者減一等謂於坐贓上亦減一等知而為藏謂知詐欺而得故為隱贓亦於坐贓上減二等詐欺百端皆是若監主詐取者自從盜法未得者減二等下條準此諸詐為官私文書及增減欺妄以求財賞及避沒入備償者準盜論贓輕者從詐為官文書法疏議曰詐為官私文書及增減謂詐為官私券抄及增減簿帳故注云文書謂券抄及簿帳之類稱之類者謂符牒抄案等欺妄以求錢財或求賞物及緣坐資財及犯禁之物合沒官而避沒入或損失官私器物而避備償如此之類增減詐為方便規避者計所欺得之贓準竊盜科斷贓輕者從詐為官文書法謂計贓得罪輕於杖一百者從詐為官文書法有印者自從重論注云若私文書止從所欺妄為坐謂詐為私文契及受領券付抄帖以求避罪或改年月日限之類止從所欺妄求物之罪不同官文書之坐文書謂券抄及簿帳之類若私文書止從所欺妄為坐諸妄認良人為奴婢部曲妻妾子孫者以略人論減一等妄認部曲者又減一等妄認奴婢及財物者準盜論減一等疏議曰妄認良人為奴婢部曲者謂本知是良人妄認為妻妾子孫者謂知非己妻妾子孫而故妄認者以略人論減一等賊盜律略人為奴婢者絞減一等合流三千里略人為部曲流三千里減一等合徒三年略人為妻妾子孫合徒三年減一等合徒二年半是為以略人論減一等妄認部曲又減一等者賊盜律略他人部曲減良人一等即是略部曲為奴合流三千里妄認部曲為奴減一等合徒三年略部曲為部曲合徒三年妄認部曲為部曲減一等合徒二年半略部曲客女為妻妾子孫合徒二年半妄認部曲客女為妻妾子孫減一等合徒二年是為部曲又減一等其妄認他人奴婢及財物者準盜論減一等若監主妄認未得亦準上條各減二等其非監主妄認未得財多者從錯認未得論問曰妄認良人為隨身妄認隨身為部曲合得何罪答曰依別格隨身與他人相犯竝同部曲法即是妄認良人為部曲之法其妄認隨身為部曲者隨身之與部曲色目略同亦同妄認部曲之罪諸詐除去死免官戶奴婢及私相博易者徒二年即博易贓重者從貿易官物法疏議曰官戶奴婢各有簿帳除者謂詐言給賜去者謂去其名簿死者謂詐言身死免者謂加年入六十及廢疾各得免本色之類及私相博易謂將私奴婢博易官奴婢者各徒二年博易贓重者從貿易官物法問曰有人將私部曲傳換官奴得以轉事衣食之直準折官奴價否答曰奴婢有價部曲輔事無估故盜誘部曲竝不計贓令以部曲替奴乃是壓為賤色取官奴入己者自從盜論以部曲替奴理依壓部曲為奴之法須為二罪各從重科其匿脫者徒一年主司不覺匿脫者依里正不覺脫漏法疏議曰匿者謂産子隱匿不言脫者謂典吏知情故不附帳不言不附者各徒一年故注云産子不言為匿典吏不附為脫主司不覺匿脫者依里正不覺脫漏法戶婚律里正不覺脫漏增減者一笞四十三口加一等過杖一百十口加一等罪止徒三年知情者各同家長法既同里正之罪主司止坐所由若父母匿子其數更多亦準戶婚律家長故隱口之法一口徒一年二口加一等未堪入役者四口為一口罪此是當條雖有罪名所為重者自從重其典吏及主司匿脫多者依律既準里正脫漏合從纍科主司知情者各同父母故匿之罪知與不知罪名不等者依脫漏之法併滿科之産子不言匿典吏不附為脫諸詐為瑞應者徒二年若災祥之類而史官不以實對者加二等疏議曰瑞應者陸賈云瑞者寶也信也天以寶為信應人之德故曰瑞其瑞應條流具在禮部之式有大瑞有上中下瑞令云詐為瑞應即明不限大小但詐為者即徒二年若詐言麟鳳龜龍無可案驗者從上書詐不以實亦徒二年若災祥之類災謂祲沴祥謂休徴史官不以實對者謂應凶言吉應吉言凶加二等徒三年稱之類者此外有善惡之事敕問而史官不以實對者亦加二等諸詐教誘人使犯法及和令人犯法即捕若告或令人捕告欲求購賞及有憎嫌欲令入罪皆與犯法者同坐疏議曰鄙俚之人不間法式姦詐之輩故相教誘或教盜人財物或教越度關津之類犯禁者不知有罪教令者故相墜陷故注云犯者不知而犯之及和令人犯法謂和教人奴婢逃走或將禁物度關外示和同內為私計故注云謂共知所犯有罪即捕若告謂即自捕告或令他人捕告欲求購賞及有憎惡前人教誘令其人入罪者皆與身自犯法者同罪犯者不知而犯之謂共知所犯有罪諸詐乘驛馬加役流驛關等知情與同罪不知情減二等有符券者不坐疏議曰郵釋本備軍速其馬所擬尤重但是詐乘無問馬數及已行遠近即合加役流給馬之驛及所由之關知其詐乘之情者亦加役流不知情減二等謂驛與關司全不勘檢又不知情合減二等猶徒二年半故注云關謂應檢問之處有符券者不坐注云謂盜得真符券及僞作不可覺知者謂僞作符券及盜得真紙券等檢驗不可覺知者驛及關司竝不坐其未應乘驛馬而輒乘者徒一年疏議曰其未應乘驛馬謂差為驛使而未得符券輒即乘者徒一年注云輒乘謂有當乘之理未得符券者謂銜命有實未得符券而乘者驛關等知情聽之準上文亦合同罪不知情者徒一年上減二等關謂應驗問之處謂盜得真符券及僞作不可覺知者輒乘謂有當乘之理未得符券者諸詐自復除若詐死及詐去工藥雜戶名者徒二年疏議曰詐自復除復除之條備在格令謂詐云落番新還或詐云放賤之類以得復除若詐作死狀及詐去工藥及雜戶等名字者徒二年其太常音聲人州縣有貫詐去音聲人名者亦同工藥之罪即所詐得復役使者徒一年其見供作使而詐自脫及脫之者杖六十計所詐庸重者各坐贓論疏議曰謂詐為雜任之類而得復免役使者徒一年其見供作使謂權充雜役而詐自脫及知情脫之者各杖六十計其詐庸重者各坐贓論諸詐疾病有所避者杖一百若故自傷殘者徒一年半疏議曰詐疾病以避使役求假之類杖一百若故自傷殘徒一年半但傷殘者有避無避得罪皆同即無所避而故自傷不成殘疾以上者從不應為重故注云有避無避等雖不足為疾殘而臨時避事者皆是其受雇倩為人傷殘者與同罪以故致死者減鬪殺罪一等疏議曰謂有受雇或被倩為人傷殘者與自傷殘人同罪各合徒一年半以此傷殘之故因而致死者被雇倩之人不限尊卑貴賤皆減鬪殺一等若為祖父母父母遣之傷殘因致死者同過失之法有避無避等雖不足為疾殘而臨時避事者皆是諸醫違方詐療病而取財物者以盜論疏議曰醫師違背本方詐療疾病率情增損以取財物者計贓以盜論監臨之與凡人各依本法諸父母死應解官詐言餘喪不解者徒二年半若詐稱祖父母父母及夫死以求假及有所避者徒三年伯叔父母姑兄姊徒一年餘親減一等若先死詐稱始死及患者各減三等疏議曰父母之喪解官居服而有心貪榮任詐言餘喪不解者徒二年半為其已經發哀故輕於聞喪不舉之罪若祖父母父母及夫見存或稱死求假及有所避而詐妄稱死者各徒三年伯叔父母姑兄姊徒一年餘親減一等謂緦麻以上從徒一年上減一等杖一百若先死詐稱始死及妄云疾病以求假及有所避者各減三等謂詐稱祖父母父母及夫始死及患徒三年上減三等合徒一年半伯叔父母姑兄姊徒一年上減三等杖八十餘親杖一百上減三等合杖七十問曰有人嫌惡前人妄告父母身死其妄告之人合科何罪答曰父母云亡在身罔極忽有妄告欲令舉哀若論告者之情為過不淺律令雖無正法宜從不應為重科諸有詐病及死傷受使檢驗不實者各依所欺減一等若實病死及傷不以實驗者以故入人罪論疏議曰有詐病及死若傷受使檢驗不以實各依所欺減一等即上條詐疾病者杖一百檢驗不實同詐妄減一等杖九十傷殘徒一年半減一等徒一年若詐死徒二年上減一等處徒一年半之類若實病及傷謂非詐病及詐傷使者檢云無病及傷便是故入人徒杖之罪若實死檢云不死即是妄入二年徒坐使人枉入杖者得杖罪枉入徒者得徒坐各依前人入罪法未決者減一等諸詐陷人至死及傷者以鬪殺傷論疏議曰謂津濟之所或有深濘若橋船朽漏不堪波人而詐云津河平淺船橋牢固令人過渡因致死傷者以鬪殺傷論謂令人溺死者絞折一支徒三年之類故注云謂知津河深濘橋船朽敗誑人令渡之類稱之類者謂知有坑穽機槍之屬誑人而致死傷者亦以鬪殺傷論其有尊卑貴賤各依鬪殺傷本法問曰詐陷人渡朽敗橋梁溺之甚困不傷不死律條無文合得何罪又人雖免難溺陷畜産又若為科答曰律云詐陷人至死及傷但論重法略其輕坐不可備言別有舉重明輕及不應為罪若誑陷令溺雖不傷死猶同毆人不傷論陷殺傷畜産者準作坑穽例償其減價謂知津河濘橋船朽敗誑人令渡之類諸保任不如所任減所任罪二等即保贓重於竊盜從竊盜減若虛假人名為保者笞五十疏議曰保任之人皆相委悉所保既乖本狀即是不如所任減所任之罪二等其有保贓重於竊盜從竊盜減謂保強盜枉法及恐喝等贓本條得罪重於竊盜竝從竊盜上減二等不從重贓減者以其元不同情保贓不保罪故也若虛假人名為保者謂假用人名或妄以他人姓字以充保者竝笞五十有五人同保一事此即先共謀計須以造意為首餘為從坐當頭自保者罪無首從諸證不言情及譯人詐僞致罪有出入者證人減二等譯人與同罪疏議曰證不言情謂應議請減七十以上十五以下及廢疾竝據衆證定罪證人不吐情實遂令罪有增減及傳譯番人之語令其罪有出入者證人減二等謂減所出入罪二等譯人與同罪若夷人承徒一年譯人云承徒二年即譯人得所加一年徒坐或夷人承流譯者云徒二年即譯者得所減二年徒之類故注云謂夷人有罪譯傳其對者律稱致罪有出入即明據證及譯以定刑名若刑名未定而知證譯不實者止當不應為法證譯徒罪以上從重杖罪以下從輕謂夷人有罪譯傳其對者諸詐冒官司以有所求為而主司承詐知而聽行與同罪至死者減一等不知者不坐疏議曰詐冒官司謂詐僞及罔冒官司欲有所求為官司知詐冒之情而聽行者竝與詐冒人同罪至死減一等不知情者不坐注云謂此篇於條內無主司罪名者即此條為當篇主司生文不為餘篇立例此篇無主司罪名者上條詐稱祖父母父母及夫死及詐疾病若詐假官或承襲此等知情與同罪不知者不坐謂此篇於條內無主司罪名者故唐律疏議卷第二十六雜律凡三十四條疏議曰李悝首制法經而有雜法之目遞相祖習多歷年所然至後周更名雜犯律隋又去犯還焉雜律諸篇罪名各有條例此篇拾遺補闕錯綜成文班雜不同故次詐僞之下諸坐贓致罪者一尺笞二十一匹加一等十匹徒一年十匹加一等罪止徒三年與者減五等疏議曰贓罪正名其數有六謂受財枉法不枉法受所監臨強盜竊盜并坐贓然坐贓者謂非監臨主司因事受財而罪由此贓故名坐贓致罪犯者一尺笞二十一匹加一等十匹徒一年十匹加一等罪止徒三年假如被人侵損備償之外因而受財之類兩和取與於法並違故與者減取人五等即是彼此俱罪其贓沒官謂非監臨主司而因事受財者諸國忌廢務日作樂者杖一百私忌減二等疏議曰國忌謂在令廢務日若輒有作樂者杖一百私家忌日作樂者減二等合杖八十諸私鑄錢者流三千里作具已備未鑄者徒二年作具未備者杖一百疏議曰私鑄錢者合流三千里其作具已備謂鑄錢作具並已周備而未鑄者徒二年若作具未備謂有所缺少未堪鑄錢者杖一百若私鑄金銀等錢不通時用者不坐若磨錯成錢令薄小取銅以求利者徒一年疏議曰時用之錢厚薄大小並依官樣輒有磨錯成錢令至薄小而取其銅以求利潤者徒一年諸於城內街巷及人衆中無故走車馬者笞五十以故殺傷人者減鬪殺傷一等疏議曰有人於城內街衢巷弄之所若人衆之中衆謂三人以上無要速事故走車馬者笞五十以走車馬唐突殺傷人者減鬪殺傷一等注云殺傷畜産者償所減價餘條稱減鬪殺傷一等者有殺傷畜産並準此謂下條向城及官私宅若道徑射放彈及投瓦石施機槍作坑穽殺傷人者減鬪殺傷一等若以故殺傷畜産並償減價之類若有公私要速而走者不坐以故殺傷人者以過失論其因驚駭不可禁止而殺傷人者減過失二等疏議曰公私要速者公謂公事要速及乘郵驛井奉敕使之輩私謂吉凶疾病之類須求醫藥井急追人而走車馬者不坐雖有公私要急而走車馬因有殺傷人者並依過失收贖之法其因驚駭力不能制而殺傷人者減過失二等聽贖其銅各入被傷殺家若殺傷祖父母父母並同名例律過失殺傷祖父母父母之法因驚駭不可禁止得減二等者亦同減例殺傷畜産者償所減價餘條稱減鬪殺傷一等者有殺傷畜産並準此諸向城及官私宅若道徑射者杖六十放彈及投瓦石者笞四十因而殺傷人者各減鬪殺傷一等疏議曰向城謂城中有人及官私宅亦謂宅中有人住若道徑射者杖六十放彈及投瓦石者笞四十即因射若彈及投瓦石而殺傷人者各減鬪殺傷罪一等若故令入城及宅中殺傷人者各以鬪殺傷論至死者加役流疏議曰即射彈投瓦石之人故令箭等入城宅之中殺傷人者各以鬪殺傷論尊卑長幼貴賤並同鬪殺傷之法準罪至死者加役流其有射及放彈投瓦石不向所親尊長井貴人之宅而非意殺傷者即依名例律本應重而犯時不知者得依凡論本應輕者聽從本諸施機槍作坑穽者杖一百以故殺傷人者減鬪殺傷一等若有標識者又減一等疏議曰有人施機槍及穿坑穽不在山澤擬捕禽獸者合杖一百以施槍等故而殺傷人者減鬪殺傷罪一等若於機槍坑穽之處而立標識欲使人知而人誤犯致死傷者又減一等謂總減鬪殺傷罪二等若不殺傷人從杖一百減一等合杖九十其深山迥澤及有猛獸犯暴之處而施作者聽仍立標識不立者笞四十以故殺傷人者減鬪殺傷罪三等疏議曰深山迥澤謂非人常行之所或雖非山澤而有猛獸犯暴之處施作機槍坑穽者不合得罪仍立標識不立者笞四十若不立標識而致殺傷人者減鬪殺傷罪三等若立標識仍有殺傷此由行人自犯施機槍坑穽者不坐諸醫為人合藥及題疏針刺誤不如本方殺人者徒二年半疏議曰醫師為人合和湯藥其藥有君臣分兩題疏藥名或注冷熱遲駛井針刺等錯誤不如本方者謂不如今古藥方及本草以故殺人者醫合徒二年半若殺傷親屬尊長得罪輕於過失者各依過失殺傷論其有殺不至徒二年半者亦從殺罪減三等假如誤不如本方殺舊奴婢徒二年減三等杖一百之類傷者各同過失法其故不如本方殺傷人者以故殺傷論雖不傷人杖六十即賣藥不如本方殺傷人者亦如之疏議曰其故不如本方謂故增減本方不依舊法殺傷人者以故殺傷論尊長卑幼貴賤並依故殺傷之律雖不傷人謂故不如本方於人無損猶杖六十於尊長及官人亦同毆而不傷之法即賣藥不如本方謂非指的為人療患尋常賣藥故不如本方雖未損人杖六十已有殺傷者亦依故殺傷法故云亦如之諸丁匠在役及防人在防若官戶奴婢疾病主司不為請給醫藥救療者笞四十以故致死者徒一年疏議曰丁匠在作役之所防人在鎮守之處若官戶奴婢在本司上者而有疾病所管主司不為請雖請而主醫藥官司不給闕於救療者笞四十以故致死者謂不請給醫藥救療以故致死者各徒一年諸受寄財物而輒費用者坐贓論減一等詐言死失者以詐欺取財物論減一等疏議曰受人寄付財物而輒私費用者坐贓論減一等一尺笞十一匹加一等十匹杖一百罪止徒二年半詐言死失者謂六畜財物之類私費用而詐言死及失者以詐欺取財物論減一等謂一尺笞五十一匹加一等五匹杖一百五匹加一等問曰受人寄付財物實死失合償以否又監臨受寄詐言死失合得何罪答曰下條云亡失官私器物各備償被強盜者不償即失非強盜仍合備之以理死者不合備償非理死者準廄牧令合償減價若監臨主司受寄詐言死失者以詐欺取財物減一等科之諸負債違契不償一匹以上違二十日笞二十二十日加一等罪止杖六十三十匹加二等百匹又加三等各令備償疏議曰負債者謂非出舉之物依令合理者或缺負公私財物乃違約乖期不償者一匹以上違二十日笞二十二十日加一等罪止杖六十三十匹加二等謂負三十匹物違二十日笞四十百日不償合杖八十百匹又加三等謂負百匹之物違契滿二十日杖七十百日不償合徒一年各令備償若更延日及脛恩不償者皆依判斷及恩後之日科罪如初諸負債不告官司而強牽財物過本契者坐贓論疏議曰謂公私債負違契不償應牽掣者皆告官司聽斷若不告官司而強牽掣財物若奴婢畜産過本契者坐贓論若監臨官共所部交關強牽過本契者計過剩之物準於所部強市有剩利之法諸妄以良人為奴婢用質債者各減自相賣罪三等知情而取者又減一等仍計庸以當債直疏議曰虛妄用良人為奴婢將質債者各減自相賣罪三等謂以凡人質債從流上減三等若以親戚年幼妄質債者各依本條減賣罪三等知情而取謂知是良人而取為奴婢受質債者又減一等謂又減質良人罪一等仍計庸以當債直謂計一日三尺之庸纍折酬其債直不知情者不坐亦不計庸以折債直諸錯認良人為奴婢者徒二年為部曲者減一等錯認部曲為奴者杖一百疏議曰良人之與奴婢種類自殊若錯認者徒二年為部曲者減一等徒一年半若錯認部曲為奴者杖一百若部曲妻雖取良人女為亦依部曲之坐錯認奴婢及財物者計贓一匹笞十五匹加一等罪止杖一百未得者各減二等疏議曰錯認他人奴婢及財物者計贓一匹笞十五匹加一等罪止杖一百未得者各減二等謂從錯認良人以下未得者並減二等其錯認良人以下為子孫律既無文量情依不應為輕若錯認他人妻妾及女為己妻妾者情理俱重依不應為重科若已認得妻妾將去者多涉姦情即同姦法諸博戲賭財物者各杖一百贓重者各依己分準盜論疏議曰共為博戲而賭財物不滿五匹以下各杖一百注云舉博為例餘戲皆是謂舉博為名總為雜戲之例弓射既習武藝雖賭物亦無罪名餘戲計贓得罪重於杖一百者各依己分準盜論謂賭得五匹之物合徒一年注云輸者亦依已分為從坐謂輸五匹之物為徒一年從坐合杖一百贓多者各準盜法加罪若贏衆人之物亦須纍而倍論輸衆人物者依己分倍為從坐若倍不重一人之贓即各從一人重斷其停止主人及出九若和合者各如之賭飲食者不坐疏議曰停止主人謂停止博戲賭物者主人及出九之人亦舉九為例不限取利多少若和合人令戲者不得財杖一百若得利入己並計贓準盜論衆人上得者亦準上例倍論故云各如之賭飲食者不坐謂即雖賭錢盡用為飲食者亦不合罪舉博為例餘戲皆是輸者亦依己分為從坐諸營造舍宅車服器物及墳塋石獸之屬於令有違者杖一百雖會赦皆令改去之疏議曰營造舍宅者依營繕令王公已下凡有舍屋不得施重拱藻井車者儀制令一品青油纁通幰虛偃服者衣服令一品衮冕二品鷩冕器物者一品以下食器不得用純金純玉墳塋者一品方九十步墳高一丈八尺石獸者三品以上六五品以上四此等之類具在令文若有違者各杖一百雖會赦皆令除去唯墳不改稱之屬者碑碣等是若有犯者並同此坐其物可賣者聽賣若經赦後百日不改去及不賣者論如律疏議曰舍宅以下違犯制度堪賣者須賣不堪賣者改去之若赦後百日不改及不賣者還杖一百故云論如律墳則不改諸侵巷街阡陌者杖七十若種植墾食者笞五十各令復故雖種植無所妨廢者不坐疏議曰侵巷街阡陌謂公行之所若許私侵便有所廢故杖七十若種植墾食謂於巷街阡陌種物及墾食者笞五十各令依舊若巷陌寬間雖有種植無所妨廢者不坐其穿垣出穢汚者杖六十出水者勿論主司不禁與同罪疏議曰其有穿穴垣牆以出穢汚之物於街巷杖六十宜出水者無罪主司不禁與同罪謂侵巷街以下主司並合禁約不禁者與犯罪人同坐諸占固山野陂湖之利者杖六十疏議曰山澤陂湖物産所植所有利潤與衆共之其有占固者杖六十已施功取者不迫諸犯夜者笞二十有故者不坐疏議曰宮衛令五更三籌順天門擊鼓聽人行晝漏盡順天門擊鼓四百槌訖閉門後更擊六百槌坊門皆閉禁人行違者笞二十故注云閉門鼓後開門鼓前有行者皆為犯夜故謂公事急速但公家之事須行及私家吉凶疾病之類皆須得本縣或本坊文牒然始合行若不得公驗雖復無罪街鋪之人不合許過既云閉門鼓後開門鼓前禁行明禁出坊外者若坊內行者不拘此律其直宿坊街若應聽行而不聽及不應聽行而聽者笞三十即所直時有賊盜經過而不覺者笞五十疏議曰謂諸坊應閉之門諸街守衛之所有當直宿應合聽行而不聽及不應聽行而聽者笞三十若分更當直之時有賊盜經過所直之處而宿直者不覺笞五十若覺而聽行自當主司故縱之罪閉門鼓後開門鼓前行者皆為犯夜故謂公事急速及吉凶疾病之類諸從征及從行公使於所在身死依令應送還本鄉違而不送者杖一百若傷病而醫食有闕者杖六十因而致死者徒一年疏議曰從征謂從軍征討及從行謂從車駕行及從東宮行井公事充使於所在身死依令應送還本鄉者軍防令征行衛士以上身死行軍具録隨身資財及尸付本府人將還無本府人者付隨近州縣遞送喪葬令使人所在身喪皆給殯調度遞送至家從行准兵部式從行身死折衝賻物三十段果毅二十段別將十段井造靈輿遞送還府隊副以上各給絹兩匹衛士給絹一匹充殯衣仍並給棺令遞送還家自餘無別文者即同公使之例應送不送者各杖一百若傷病謂征行人等或病或傷須醫藥救療飲食供給而醫食有闕者杖六十因而致死謂以醫食不如法致死者徒一年即卒官家無手力不能勝致者仰部送還鄉違而不送者亦杖一百疏議曰官人在任以理身死家道既貧先無手力不能自相運致以還故鄉者卒官之所部送還鄉稱部送者差人部領遞送還鄉依令去官家口纍弱尚得送還況乃身亡明須准給手力部送違而不送者亦杖一百諸應給傳送而限外剩取者笞四十計庸重者坐贓論罪止徒二年疏議曰應給傳送依廄牧令官爵一品給馬八匹嗣王郡王及二品以上給馬六匹三品以下各有等差若過令限數外剩取者笞四十計庸重者坐贓論馬庸一日為絹三尺坐贓一尺笞二十一匹加一等三匹一尺笞五十即是得罪重於笞四十須從坐贓論計庸罪止徒二年若不應給而取者加罪二等強取者各加一等主司給與者各與同罪疏議曰上文並據應給而剩取之若不應給而取者謂本無傳送之理而取之加二等謂贓輕者杖六十贓重者加坐贓之罪二等罪止徒三年強取者各加一等謂應得傳送而剩強取者笞五十贓重者於坐贓上加一等不應給傳送而強取者杖七十贓重者坐贓上加三等是各加一等主司給與者各與同罪稱各者強取而主司給與亦與強者罪同諸不應入驛而入者笞四十輒受供給者杖一百計贓重者準盜論雖應入驛不合受供給而受者罪亦如之疏議曰不應入驛而入者笞四十雜令私行人職事五品以上散官二品以上爵國公以上欲投驛止宿者聽之邊遠及無村店之處九品以上勳官五品以上及爵遇屯驛止宿亦聽並不得輒受供給謂私行人不應入驛而入者笞四十輒受供給準贓雖少皆杖一百計贓得罪重於杖一百者準盜論雖應入驛準令不合受供給而受亦與不應入驛人同罪強者各加二等諸姦者徒一年半有夫者徒二年部曲雜戶官戶姦良人者各加一等即姦官私婢者杖九十疏議曰和姦者男女各徒一年半有夫者徒二年妻妾罪等部曲雜戶官戶而姦良人者並加良人相姦罪一等即良人姦官私婢者杖九十注云奴姦婢亦同杖九十姦他人部曲妻雜戶官戶婦女者杖一百強者各加一等折傷者各加鬪折傷罪一等疏議曰姦他人部曲妻明姦己家部曲妻及客女各不坐若姦雜戶官戶婦女者杖一百強者各加一等自姦良人以下強者各加一等折傷者謂折齒或折指以上各加鬪折傷一等謂良人從凡鬪上加官戶雜戶他人部曲妻官私奴婢各從本鬪罪上加與強姦為二罪從重而科奴姦婢亦同諸姦緦麻以上親及緦麻以上親之妻若妻前夫之女及同母異父姊妹者徒三年強者流二千里折傷者絞妾減一等疏議曰姦緦麻以上親謂內外有服親者及緦麻以上親之妻亦謂有服者妻若妻前夫之女謂妻前家所生者各徒三年強者流二千里因強姦而折傷者絞得罪已重故妾減一等謂減妻罪一等其於媵罪與妾同注云餘條姦妾準此謂餘條五服內及主之緦麻以上親直有姦名而無妾罪者並準此條減妻一等其奴及部曲姦主之妾及主期親之妾亦從減一等之例餘條姦妾準此諸姦從祖祖母姑從祖伯叔母姑從父姊妹從母及兄弟妻兄弟子妻者流二千里強者絞疏議曰從祖祖母姑謂祖之兄弟妻若祖之姊妹從祖伯叔母姑謂父之堂兄弟妻及父之堂姊妹從父姊妹謂己之堂妹妹從母謂母之姊妹及兄弟之妻兄弟子妻與之姦者並流二千里強者絞諸姦父祖妾伯叔母姑姊妹子孫之婦兄弟之女者絞即姦父祖所幸婢減二等疏議曰姦父祖妾即曾高妾亦同注云謂曾經有父祖子者其無子者即準上文妾減一等姦伯叔母姑姊妹子孫婦曾玄孫婦亦同兄弟之女者絞即姦父祖所幸婢減二等合徒三年不限有子無子得罪並同問曰父祖之妾曾脛有子父祖亡歿改嫁他人而子孫姦之得同凡姦以否答曰婦人尊卑緣夫立制子孫於父祖之妾在禮全無服紀父祖亡歿改適他人子孫姦者理同凡姦之法律有曾為祖免親妻妾而嫁娶者別立罪名至於和姦律無加罪謂曾經有父祖子者諸奴姦良人者徒二年半強者流折傷者絞疏議曰奴姦良人婦女徒二年半強者流折傷者絞雖有夫亦同折傷謂因姦折傷者其部曲及奴姦主及主之期親若期親之妻者絞婦女減一等強者斬即姦主之緦麻以上親及緦麻以上親之妻者流強者絞疏議曰其部曲及奴和姦主及姦主之期親若期親之妻部曲及奴合絞婦女減一等強者斬謂奴等合斬婦女不坐即姦主之緦麻以上親及緦麻以上親之妻者流婦女合流二千里強者奴等絞若姦妾者自主以下準上例並減妻一等即妾子見為家主其母亦與子不殊雖出亦同諸和姦本條無婦女罪名者與男子同強者婦女不坐其媒合姦通減姦者罪一等疏議曰和姦謂彼此和同者本條無婦女罪名與男子同謂上條奴姦良人者徒二年半此即和姦不立婦女罪名良人婦女亦徒二年半之類並與男子同強者婦女不坐謂上條姦主期親強者斬既無婦女罪名其婦女不坐但是強姦者婦女皆悉無罪其媒合姦通之人減姦罪一等假如和姦者徒一年半媒合者徒一年之類注云罪名不同者從重減假有俗人媒合姦女官男子徒一年半女官徒二年半媒合姦通者猶徒二年之類是為從重減罪名不同者從重減諸監臨主守於所監守內姦者加姦罪一等即居父母及夫喪若道士女官姦者各又加一等婦女以凡姦論疏議曰監臨主守之人於所監守內姦良人加凡姦一等故注云謂犯良人若姦無夫婦女徒二年姦有夫婦女徒二年半即居父母喪男女同夫喪者妻妾同若道士女官僧尼同姦者各又加監臨姦一等即加凡姦罪二等故云各又加一等假有監臨主守若道士及僧并男子在父母喪姦者婦女以凡姦論即女居父母喪婦人居夫喪及女官尼姦者並加姦罪二等男子亦以凡姦論其有尊卑及貴賤者各從本法加罪謂犯良人諸校斛斗稱度不平杖七十監校者不覺減一等知情與同罪疏議曰校斛斗稱度依關市令每年八月詣太府寺平校不在京者詣所在州縣平校並印署然後聽用其校法雜令量以北方秬黍中者容一千二百為籥十籥為合十合為升十升為斗三斗為大斗一斗十斗為斛稱權衡以秬黍中者百黍之重為銖二十四銖為兩三兩為大兩一兩十六兩為斤度以秬黍中者一黍之廣為分十分為寸十寸為尺一尺二寸為大尺一尺十尺為丈有校勘不平者杖七十監校官司不覺減校者罪一等合杖六十知情與同罪諸造器用之物及絹布之屬有行濫短狹而賣者各杖六十疏議曰凡造器用之物謂供公私用及絹布綾綺之屬行濫謂器用之物不牢不真短狹謂絹匹不充四十尺布端不滿五十尺幅闊不充一尺八寸之屬而賣各杖六十故禮云物勒工名以考其誠功有不當必行其罪其行濫之物沒官短狹之物還主得利贓重者計利準盜論販賣者亦如之市及州縣官司知情各與同罪不覺者減二等疏議曰得利贓重者謂賣行濫短狹等物計本之外剩得利者計贓重於杖六十者準盜論謂準盜罪一尺杖六十一匹加一等計得利一匹一尺以上即從重科計贓纍而倍併販賣者亦如之謂不自造作轉醇買而賣求利得罪並同自造之者市及州縣官司知行濫情各與造賣者同罪檢察不覺者減二等官司知情及不覺物主既別各須纍而倍論其州縣官不管市不坐不牢謂之行不真謂之濫即造橫刀及箭鏃用柔鐵者亦為濫諸市司評物價不平者計所貴賤坐贓論入己者以盜論其為罪人評贓不實致罪有出人者以出入人罪論疏議曰謂公私市易若官司遣評物價或貴或賤令價不平計所加減之價坐贓論入己者謂因評物價令有貴賤而得財物入己者以盜論並依真盜除免倍贓之法其為罪人評贓不實亦謂增減其價致罪有出入者假有評盜贓應直上絹五匹乃加作十匹應直十匹減作五匹是出入半年徒罪市司還得半年徒坐故云以出入人罪論若應直五匹評作九匹或直九匹評作五匹於罪既無加減止從貴賤不實坐贓之法諸私作斛斗稱度不平而在市執用者笞五十因有增減者計所增減準盜論疏議曰依令斛斗稱度等所司每年量校印署充用其有私家自作致有不平而在市執用者笞五十因有增減贓重者計所增減準盜論即用斛斗稱度出入官物而不平令有增減者坐贓論入己者以盜論其在市用斛斗稱度雖平而不經官司印者笞四十疏議曰即用斛斗稱度出入官物增減不平計所增減坐贓論入己者以盜論因其增減得物入己以盜論除免倍贓依上例其在市用斛斗稱度雖平謂校勘訖而不經官司印者笞四十諸賣買不和而較固取者及更出開閉共限一價疏議曰賣物及買物人兩不和同而較固取者謂強執其市不許外人買故注云較謂專略其利固謂障固其市及更出開閉謂販鬻之徒共為姦計自賣物者以賤為貴買人物者以貴為賤更出開閉之言其物共限一價望使前人迷謬以將入己若參市而規自入者杖八十已得贓重者計利準盜論疏議曰參市謂負販之徒共相表裏參合貴賤惑亂外人故注云謂人有所賣買在傍高下其價以相惑亂而規賣買之利入己者並杖八十已得利物計贓重於杖八十者計利準盜論謂得三匹一尺以上合杖九十是名贓重其贓既準盜科即合徴還本主較謂專略其利固障固其市謂賣物以賤為貴買物以貴為賤謂人有所賣買在傍高下其價以相惑亂諸買奴婢馬牛駝騾驢已過價不立市券過三日笞三十賣者減一等立券之後有舊病者三日內聽悔無病欺者市如法違者笞四十疏議曰買奴婢馬牛駝騾驢等依令並立市券兩和市賣已過價訖若不立券過三日買者笞三十賣者減一等若立券之後有舊病而買時不知立券後始知者三日內聽悔三日外無疾病故相欺罔而欲悔者市如法違者笞四十若有病欺不受悔者亦笞四十令無私契之文不準私券之限即賣買已訖而市司不時過券者一日笞三十一日加一等罪止杖一百疏議曰賣買奴婢及牛馬之類過價已訖市司當時不即出券者一日笞三十所由官司依公坐節級得罪其挾私者以首從論一日加一等罪止杖一百故唐律疏議卷第二十七雜律凡二十條諸在市及人衆中故相驚動令擾亂者杖八十以故殺傷人者減故殺傷一等因失財物者坐贓論其誤驚殺傷人者從過失法疏議曰有人在市內及衆聚之處故相驚動謂誑言有猛獸之類令擾亂者杖八十若因擾亂之際而失財物坐贓論如是衆人之物纍併倍論併倍不加重於一人失財物者即從重論因其擾亂而殺傷人者減故殺傷一等驚人致死減一等流三千里折一支減一等徒三年之類其有誤驚因而殺傷人者從過失法收贖銅入被傷殺之家諸不修隄防及修而失時者主司杖七十毀害人家漂失財物者坐贓論減五等以故殺傷人者減鬪殺傷罪三等即水雨過常非人力所防者勿論疏議曰依營繕令近河及大水有隄防之處刺史縣令以時檢校若須修理每秋收訖量功多少差人夫修理若暴水泛溢損懷隄防交為人患者先即修營不拘時限若有損壞當時不即修補或修而失時者主司杖七十毀害人家謂因不修補及修而失時為水毀害人家漂失財物者坐贓論減五等謂失十匹杖六十罪止杖一百若失衆人之物亦合倍論以故殺傷人者減鬪殺傷罪三等謂殺人者徒二年半折一支者徒一年半之類注云謂水流漂害於人謂由不修理隄防而損害人家及行旅被水漂流而致死傷者即人自涉而死者非所司不坐即水雨過常非人力所防者無罪其津濟之處應造橋航及應置船筏而不造置及擅移橋濟者杖七十停廢行人者杖一百疏議曰津濟之處應造橋航謂河津濟渡之處應造橋及航者編舟作之及應置舟船及須以竹木為筏以渡行人而不造置及擅移橋梁濟渡之所者各杖七十停廢行人謂不造橋航及不置船筏井擅移橋濟停廢行人者杖一百謂水流漂害於人即人自涉而死者非諸盜決隄防者杖一百若毀害人家及漂失財物贓重者坐贓論以故殺傷人者減鬪殺傷罪一等若通水入人家致毀害者亦如之疏議曰有人盜決隄防取水供用無問公私各杖一百故注云謂盜水以供私用若為官檢校雖供官用亦同水若為官即是公坐若毀害人家謂因盜水泛溢以害人家漂失財物計贓罪重於杖一百者即計所失財物坐贓論謂十匹徒一年十匹加一等以故殺傷人者謂以決水之故殺傷者減鬪殺傷罪一等若通水入人家致毀害殺傷者一同盜決之罪故云亦如之其故決隄防者徒三年漂失贓重者準盜論以故殺傷人者以故殺傷論疏議曰上文盜水因有殺傷此云故決隄防者謂非因盜水或挾嫌隙或恐水漂流自損之類而故決之者徒三年漂失之贓重於徒三年謂漂失人三十匹贓者準盜論合流二千里若失衆人之物亦合倍論以決隄防之故而殺傷人者以故殺傷論謂殺人者合斬折人一支流二千里之類上條殺傷人減鬪殺傷罪一有殺傷畜産償減價除條準此今以故殺傷論其殺傷畜産明償減價下條水火損敗故犯者徴償謂盜水以供私用若為官檢校雖供官用亦是諸應乘官船者聽載衣糧二百斤違限私載若受寄及寄之者五十斤及一人各笞五十一百斤及二人各杖一百每一百斤及二人各加一等罪止徒二年疏議曰應乘官船之人聽載隨身衣糧二百斤若二百斤外更載若受入寄物及寄物之人物滿五十斤及一人者各笞五十一百斤及二人各杖一百稱各者謂人之與物得罪各等亦不限所載遠近故注云但載即坐若將家人隨從者皆不坐每一百斤及二人各加一等罪止徒二年從軍征討者各加二等監當主司知而聽之與同罪空船者不用此律疏議曰從軍征討者謂以船轉運軍資而私自載物若受寄及寄之者各加二等謂五十斤及一人各杖七十一百斤及二人各徒一年半每一百斤及二人各加一等罪止徒三年監當主司知而聽之謂監船官司知乘船人私載受寄者與寄之者罪同故云與同罪若是空船雖私載受寄準行程無違者並悉無罪故云不用此律但載即坐若家人隨從者勿論諸船人行船茹船寫漏安標宿止不如法若船筏應回避而不回避者笞五十以故損失官私財物者坐贓論減五等殺傷人者減鬪殺傷三等疏議曰船人謂公私行船之人茹船謂茹塞船縫寫漏謂寫去漏水安標宿止謂行船宿泊之所須在浦島之內仍即安標使來者候望違者是不如法若船筏應回避者或㳂泝相逢或在洲嶼險處不相回避覆溺者多須準行船之法各相回避若湍磧之處即泝上者避㳂流之類違者各笞五十以不茹寫回避之故損失官私財物者坐贓論減五等謂十匹杖六十十匹加一等罪止杖一百殺傷人者減鬪殺傷罪三等殺人者徒二年半折人一支者徒一年半之類其於湍磧尤難之處致有損害者又減二等監當主司各減一等卒遇風浪者勿論疏議曰激水為湍積石為磧謂湍磧險難之所其有損失財物或殺傷人者又減二等謂失財物於坐贓上減七等殺傷人者減鬪殺傷五等監當主司各減一等謂各減行船人罪一等卒遇暴風巨浪而損失財物及殺傷人者並不坐諸於山陵兆域內失火者徒二年延燒林木者流二千里殺傷人者減鬪殺傷一等其在外失火而延燒者各減一等疏議曰山陵前已釋訖兆域者鄧展云除地為塋將有形兆韋昭曰兆域也起土為塋域孝經曰卜其宅兆而安厝之然山陵兆域之所皆有宿衛之人而於此內失火者徒二年延燒兆域內林木者流二千里殺傷人者減鬪殺傷一等其在外失火謂於兆域外失火延燒兆域內及林木者各減一等謂延燒兆域內徒二年上減一等若延燒林木者流二千里上減一等注云餘條在外失火準此餘條謂庫藏以下諸條因在外失火延燒者各減於內失火一等餘條在外失火準此諸庫藏及倉內皆不得燃火違者徒一年疏議曰凡官庫藏及敖倉內有舍者皆不得燃火違者徒一年諸失火及非時燒田野者笞五十延燒人舍宅及財物者杖八十贓重者坐贓論減三等殺傷人者減鬪殺傷二等疏議曰失火謂失火有所燒及不依令文節制而非時燒田野者笞五十其於當家之內失火者皆罪失火之人注云非時謂二月一日以後十月三十日以前若鄉土異宜者依鄉法謂北地霜早南土晚寒風土亦既異宜各須收穫總了放火時節不可一準令文故云各依鄉法延燒人舍宅及財物者各杖八十贓重者謂計贓得罪重於杖八十坐贓論減三等準贓二十匹以上即從贓科殺傷人者減鬪殺傷罪二等謂燒殺人者失火及燒田之人減死二等合徒三年不合償死者從本殺傷罪減其贓若損衆家之物者併纍亦倍論其行道燃火不滅而致延燒者各減一等疏議曰人在行路之上或須燃火事了發去皆須滅之若不撲滅而致延燒他人林木舍宅財物或殺傷人者各減上文罪一等謂延燒贓少者杖八十上減一等贓重者坐贓上減四等罪止徒一年殺傷人者減鬪殺傷三等故云各減一等非時謂二月一日以後十月三十日以前若鄉土異宜者依鄉法諸於官府廨院及食庫內失火者徒二年在宮內加二等損害贓重者坐贓論殺傷人者減鬪殺傷一等延燒廟及宮闕者絞社減一等疏議曰若有人於內外官府公廨院宇之中及倉庫內失火者徒二年宮內加二等官內謂殿門外有禁門其內並是若失火者徒三年注云廟社內亦同謂於宗廟及太社院內失火亦徒三年損害贓重者謂因失火延燒有所損害財物計贓重於徒二年者即準坐贓科之謂燒官府廨內財物計贓五十匹合徒三年若因失火有殺傷人者減鬪殺傷罪一等謂殺人者流三千里傷人折二支徒三年若殺傷畜産不合從上條稱減鬪殺傷一等償減價自從水火損敗誤失不償延燒廟及宮闕者絞社減一等流三千里廟社內亦同諸故燒官府廨舍及私家舍宅若財物者徒三年贓滿五匹流二千里十匹絞殺傷人者以故殺傷論疏議曰凡官府廨宇及私家舍宅無問舍宇大小井及財物多少但故燒者徒三年計贓滿五匹流二千里贓滿十匹者絞殺傷人者以故殺傷論謂因放火而殺人者斬傷人折一支者流二千里之類若對主故燒非積聚延燒之物只同棄毀人財物論諸見火起應告不告應救不救減失火罪二等其守衛宮殿倉庫及掌囚者皆不得離所守救火違者杖一百疏議曰見火起燒公私廨宇舍宅財物者並須告見在及鄰近之人共救若不告不救減失火罪二等謂若於官府廨宇內及倉庫從徒二年上減二等合徒一年若於宮及廟社內從徒三年上減二等徒二年若於私家從笞五十上減二等笞三十故注云從本失罪減明即不從延燒減之其守衛宮殿倉庫及掌囚者雖見火起並不得離所守救火違者杖一百雖見火起不告亦不合罪謂從本失罪減諸水火有所損敗故犯者徴償誤失者不償疏議曰水火有所損敗謂上諸條稱水火損敗得罪之處故犯者徴償若故決隄防通水入人家若故燒官府廨舍及私家舍宅財物有所損敗之類各徴償其稱失火之處及可不修隄防而致損害之類各不償諸棄毀大祀神御之物若御寶乘輿服御物及非服而御者各以盜論亡失及誤毀者準盜論減二等疏議曰棄毀大祀神御之物祠令天地宗廟神州等為大祀神御謂供神所御之物若御寶謂皇帝八寶太皇太后皇太后皇后寶以稱御者三后亦同乘輿服御物謂皇帝服御之物及非服而御謂帷帳几杖之屬非服而供御者以上義名例及職制並具釋訖有棄毀者各以盜論賊盜律盜大祀神御之物乘輿服御物者流二千五百里非服而御之物徒一年半贓重者計贓各加凡盜一等盜御寶者絞稱以盜論者與真盜同入十惡非服而御之物等不入十惡據賊盜律其擬供神御及供而廢闕若饗薦之具已饌呈者徒二年未饌呈者徒一年半又盜御寶條擬供服御等亦並徒二年今此條上言棄毀大祀下稱非服而御以盜論準非服而御徒一年半舉下明上即棄毀擬供服御準罪徒一年半以上亦各以盜論亡失及誤毀者準盜論減二等並各從準盜罪上減二等準盜論者不在除免倍贓監主加罪加役流之例棄毀中祀神御之物減大祀二等棄毀小祀神御之物又減二等中祀以下不入十惡諸大祀丘壇將行事有守衛而毀者流二千里非行事日徒一年壝門各減二等疏議曰大祀丘壇謂祀天於圓丘祭地於方丘五時迎氣祀五方上帝並各有壇此等將行祭祀各有守衛此時有損壞丘壇者流二千里非行事日謂非祭祀之日而毀者徒一年可壝門各減二等壝門謂丘壇之外擁土為門毀壝門者將行事之日徒二年半非行事日杖九十故云各減二等毀中小祀各遞減二等諸棄毀符節印及門鑰者各準盜論亡失及誤毀者各減二等疏議曰棄毀符節印及門鑰者各準盜法論罪賊盜律盜宮殿門符發兵符傳符流二千里使節及皇城京城門符徒三年餘符徒一年門鑰各減三等盜官文書印徒二年餘印杖一百其亡失符節印以下誤毀者各減二等謂各減棄毀之罪二等諸棄毀制書及官文書者準盜論亡失及誤毀者各減二等其誤毀失符移解牒者杖六十疏議曰棄毀制書棄毀不相須毀者須失文字制書敕及奏抄亦同官文書謂曹司所行公案及符移解牒之類準盜論謂各準盜法得罪賊盜律盜制書者徒二年官文書杖一百亡失謂不覺遺落及被盜誤毀謂誤致毀損破失文字各減二等故注云毀須失文字謂制敕奏抄徒一年官文書杖八十若盜毀欲動事者自從增減法制敕及奏抄合死官文書即依詐僞律詐僞官文書及增減法主司自有所避即從違式造立科罪杖罪以下杖一百徒罪以上加一等誤毀符移解牒者杖六十注云謂未入所司而有本案者謂未入曹司之間而即誤致毀者關刺律雖無文亦與符移同罪毀須失文字若欲動事者從詐增減法謂未入所司而有本案者諸私發官文書印封視書者杖六十制書杖八十若密事各依漏泄坐減二等即誤發視者各減二等不視者不坐疏議曰官司行下文書多有封印而有私發印封視書者杖六十視制書杖八十若密事各依漏泄坐減二等職制律漏泄大事應密者絞減二等徒三年非大事應密徒一年半減二等杖一百誤發視者各減二等謂誤發因視制書杖六十官文書笞四十大事應密視者徒三年上減二等徒二年非大事應密視者杖一百上減二等杖八十不視者不坐謂初雖誤發竟不視書者無罪諸主守官物而亡失簿書致數有乖錯者計所錯數肖以主守不覺盜論疏議曰凡是官物皆立簿書主守之人亡失簿書為失簿書之故遂令物數乖錯者計所錯之數依不覺盜論廄庫律主司不覺盜者五匹笞二十十匹加一等過杖一百二十匹加一等罪止徒二年其主典替代者文案皆立正案分付後人違者杖一百疏議曰謂主典替代所有文案皆須立正案分付承後人違而不付者合杖一百縱雖去官不同名例免法故注云並去官不免並去官不免諸於官私田園輒食瓜果之類坐贓論棄毀者亦如之即持去者準盜論疏議曰稱瓜果之類即雜蔬菜等皆是若於官私田園之內而輒私食者坐贓論其有棄毀之者計所棄毀亦同輒食之罪故云亦如之持將去者計贓準盜論並徴所費之贓各還官主主司給與者加一等彊持去者以盜論主司即言者不坐非應食官酒食而食者亦準此疏議曰當園主司將瓜果之屬給與人食者加坐贓罪一等謂一尺笞三十一匹加一等給與將去者準盜上加一等一尺杖七十一匹加一等強持去者謂以威若力強持將去者以盜論計贓同真盜之法其贓倍徴贓滿五匹者免官若監臨主司自強取者加凡盜罪二等除名倍贓並依常律主司當即言告者主司不坐非應食官酒食而輒食者亦準此謂輒食者坐贓論棄毀者亦同持去者準盜論強持去者以竊盜輪若主司私持去者並同監主盜法若非主司不因食次而持去者以盜論強者依強盜法諸棄毀官私器物及毀伐樹木稼穡者準盜論即亡失及誤毀官物者各減三等疏議曰棄毀官私器物謂是雜器財物輒有棄擲毀壞及毀伐樹木稼穡者種之曰稼斂之曰穡麥禾之類各計贓準盜論即亡失及誤毀謂亡失及誤毀官私器物樹木稼穡者各減故犯三等謂其贓並備償若誤毀失私物依下條例償而不坐諸毀人碑碣及石獸者徒一年即毀人廟主者加一等其有用功修造之物而故損毀者計庸坐贓論各令修立誤損毀者但令修立不坐疏議曰喪葬令五品以上聽立碑七品以上立碣塋域之內亦有石獸其有毀人碑碣及石獸者徒一年即毀人廟主者加一等徒一年半其有用功修造之物謂樓觀垣塹之類而故損毀者計修造功庸坐贓論謂十匹徒一年十匹加一等仍令依舊修立若誤毀損者但令修立不坐諸請受軍器事訖停留不輸者十日杖六十十日加一等百日徒一年過百日不送者減私有罪二等其棄毀者準盜論疏議曰請受軍器謂鍪甲矟弩箭之類征戍事訖停留不輸者十日杖六十十日加一等百日徒一年過百日不送者減私有罪二等擅興律私有甲一領流上減二等徒二年半之類其有或棄或毀者準盜論各依賊盜律盜甲弩者流二千里禁兵器徒二年如此之類並準盜法若亡失及誤毀傷者以十分論亡失一分毀傷二分杖六十亡失二分毀傷四分杖八十亡失三分毀傷六分杖一百即不滿十分者一當一分論其經戰陳而損失者不坐儀仗各減二等疏議曰請官器仗若亡失及誤毀傷者以十分論謂請百事十事為一分之類若亡失一分或毀傷二分假有請百事亡失十事或毀傷二十事各杖六十若亡失二分毀傷四分杖八十亡失三分毀傷六分杖一百其分數各與上解義同罪止杖一百即不滿十分者一當一分論謂請九事為九分之類亦依亡失毀傷準分為罪仍依令備償其經戰陳而損失者不坐不償儀仗各減二等儀仗謂非兵器若有亡失誤毀各依十分之法各減軍器罪二等若亡失毀傷罪名不等者即以重法併滿輕法諸棄毀亡失及誤毀官私器物者各備償若被強盜者各不坐不償即雖在倉庫故棄毀者徴償如法其非可償者坐而不備疏議曰官私器物其有故棄毀或亡失及誤毀者各備償注云謂非在倉庫而別持守者謂倉庫之外別處持守而有棄毀亡失及誤毀官私器物始合備償若被強盜各不坐不償雖在倉庫之內若有故棄毀徴償如法其非可償者止坐其罪不合徴償故注云謂符印門鑰官文書稱之類者寶節木契制敕並是謂非在倉庫而別持守者謂符印門鑰官文書之賴諸亡失器物符印之類應坐者皆聽三十日求訪不得然後決罪若限內能自訪得及他人得者免其罪限後得者追減三等疏議曰若亡失器物符印之類寶及門鑰亦同為亡失應合罪者未得即決皆聽三十日求訪限滿不得然後決罪若三十日內自訪得及他人得者免其亡失之罪三十日限外得者追減三等若已經奏決不合追減官文書制書程限內求訪得者亦如之疏議曰官文書及制書程限內求訪得者謂曹司執行案各有程限公式令小事五日程中事十日程大事二十日程徒罪以上獄案辨定後三十日程其制敕皆當日行下若行下處多事須抄寫依公式令滿二百紙以下限二日程每二百紙以下加一日程所加多者不得過五日赦書不得過三日若有亡失各於此限內訪得者亦得免罪限外得者坐如法然制敕事重程限一日如有稽廢得罪不輕若許以三旬追訪稽者皆須注失所以不與亡失器物同例若官文書制書事已行訖無程者亦依三十日為限即雖故棄擲限內訪得聽減一等疏議曰器物符印之類以下雖有規避而故棄擲限內訪得者聽減本失罪一等諸於他人地內得宿藏物隱而不送者計合還主之分坐威論減三等疏議曰謂凡人於他人地內得宿藏物者依令合與地主中分若有隱而不送計應合還主之分坐贓論減三等罪止徒一年半注云若得古器形制異而不送官者謂得古器鍾鼎之類形制異於常者依令送官酬直隱而不送者即準所得之器坐贓論減三等故云罪亦如之問曰官田宅私家借得令人佃食或私田宅有人借得亦令人佃作人於中得宿藏各合若為分財答曰藏在地中非可預見其借得官田宅者以見住見佃人為主若作人及耕犂人得者合與佃住之主中分其私田宅各有本主借者不施功力而作人得者合與本主中分借得之人既非本主又不施功不合得分若得古器形制異而不送官者罪亦如之諸得闌遺物滿五日不送官者各以亡失罪論贓重者坐贓論私物坐贓論減二等疏議曰得闌遺之物者謂得寶印符節及雜物之類即須送官滿五日不送者各得亡失之罪贓重者謂計贓重於亡失者坐贓論罪止徒三年私物坐贓論減二等罪止徒二年其物各還官主諸違令者笞五十別式減一等疏議曰令有禁制謂儀制令行路賤避貴去避來之類此是令有禁制律無罪名違者得笞五十別式減一等謂禮部式五品以上服紫六品以下朱之類違式文而著服色者笞四十是名別式減一等物仍沒官謂令有禁制而律無罪名者諸不應得為而為之者笞四十事理重者杖八十疏議曰雜犯輕罪觸類弘多金科玉條包羅難盡其有在律在令無有正條若不輕重相明無文可以比附臨時處斷凱量情為罪庶補遺闕故立此條情經者笞四十事理重者杖八十謂律令無條理不可為者故唐律疏議卷第二十八捕亡凡一十八條疏捕亡律者魏文侯之時里悝制法經六篇捕法第四至後魏名補亡律北齊名捕斷律後周名逃捕律隋復名捕亡律然此篇以上質定刑名若有逃亡恐其滋蔓故須捕繫以置疏網故次雜律之下諸罪人逃亡將吏已受使追捕而不行及逗留雖行與亡者相遇人仗足敵不鬪而退者各減罪人罪一等鬪而退者減二等即人仗不敵不鬪而退者減三等鬪而退者不坐疏議曰依捕亡令囚及征人防人流人移鄉人逃亡及欲入寇賊若有賊盜及被傷殺並須追捕其罪人逃亡謂犯罪事發而亡囚與未囚並是將吏已受使追捕者謂見任武官為將文官為吏已受使追捕罪人而不行及逗留謂故作回避逗留及詐為疾患不去之類雖行與亡者相遇人兵器仗足得相敵不戰鬪而退者各減罪人罪一等謂罪人合死將吏處流三千里之類鬪而退者謂人仗足敵鬪而退者減二等若罪人應死將吏合徒三年即人仗不敵謂賊多兵少或器仗不敵不鬪而退者減三等罪人應死將吏徒二年半鬪而退者不坐謂人仗不敵計盡力窮知難而退者不坐即非將吏臨時差遣者各減將吏一等三十日內能自捕得罪人獲半以上雖不得半但所獲者最重皆除其罪雖一人捕得餘人亦同若罪人已死及自首各盡者亦從免法不盡者止以不盡人為坐疏議曰即非將吏謂非見任文武官即停家職資及勳官之類臨時州縣差遣領人追捕者各減將吏罪一等雖非將吏奉敕差行者亦同將吏之法不在減一等之限三十日內自捕得罪人獲半以上謂十人逃亡獲得五六者雖不得半但所獲者最重假有徒流死囚一峙逃走捕得死罪一人雖不得徒流九人仍除其罪雖是一人捕得衆共失囚之人並同免法若罪人已死謂自死及被他人殺若能歸首十人俱盡者亦從免法若罪人自首不盡止以不盡之人準罪為坐限外若配贖以後能自捕得者各追減三等即為人捕得及罪人已死若自首各追減二等疏議曰失罪人經三十日追捕不得無官蔭者或配徒流有官蔭者或已徴贖此後能自捕得罪人各追減前所斷罪三等即他人捕得及罪人身死訖若罪人自首各得追減二等注云已經奏決者不在追減之例謂將吏以下失罪人其罪已經奏決徒流笞杖之類不在追減之例餘條追減準此謂亡失寶印及不覺失囚等稱追減者若事經奏決亦不在追減之例故云餘條準此謂故方便之者已經奏決者不在追減之例餘條追減準此諸捕罪人而罪人持仗拒捍其捕者格殺之及走逐而殺若迫弩窘自殺者皆勿論疏議曰捕罪人謂上條將吏以下捕罪人而罪人乃持仗拒捍仗謂兵器及杵棒之屬其捕者以其拒捍因而格殺之及罪人逃走捕者逐而殺之注云走者持仗空手等慮其走失故雖空手亦許殺之若迫窘而自殺謂罪人被捕逼迫窮窘或自殺或落坑穽而死之類皆悉勿論即空手拒捍而殺者徒二年已就拘執及不拒捍而殺或折傷之各以鬪殺傷論用刃者從故殺傷法疏議曰謂罪人空手雖相拒捍不能為害而格殺之者徒二年若罪人已被拘執及元無拒捍之心而殺或折傷之各依鬪訟律以鬪殺傷論用刃者從故殺傷法罪人本犯應死而殺者加役流即拒毆捕者加本罪一等傷者加鬪傷二等殺者斬疏議曰謂罪人本犯合死已就拘執及不拒捍而捕殺之者加役流即拒毆捕者加本罪一等假有罪人本犯徒三年而拒毆捕人流二千里傷者加鬪傷二等假有拒毆捕者折一齒加凡鬪二等合徒二年之類殺捕人者斬捕人不限貴賤殺者合斬走者持伏空手等諸被人毆擊折傷以上若盜及強姦雖傍人皆得捕繫以送官司疏議曰有人毆擊他人折齒折指以上若盜及強姦雖非被傷被盜被姦家人及所親但是傍人皆得捕繫以送官司捕格法準上條持仗拒捍其捕者得格殺之持仗及空手而走者亦得殺之其拒捕不拒捕並同上條捕格之法即姦同籍內言同籍之內明是不限良賤親疏雖和姦亦聽從上條捕格之法問曰親戚共外人和姦若捕送官司即於親有罪律許捕格未知捕者得告親罪以否答曰若男女俱是本親合相容隱既兩俱有罪不合捕格告言若所親共他人姦他人即合有罪於親雖合容隱非是故相告言因捕罪人事相連及其於捕者不合有罪和姦之人兩依律斷若餘犯不言請而輒捕繫者笞三十殺傷人者以故殺傷論本犯應死而殺者加役流疏議曰若餘犯不言請謂非毆擊人折傷以上若盜及強姦或和姦同籍內此外有犯須言請官司不得輒加捕繫如捕繫者笞三十因而殺傷人者以故殺傷論本犯應死謂餘犯合死捕而殺者合加役流捕格法準上條即姦同籍內雖和聽從捕格法諸追捕罪人而力不能制告道路行人其行人力能助之而不助者杖八十勢不得助者勿論疏議曰追捕罪人謂將吏以下據法追捕及在律文聽私捕繫而力不能拘制告道路行人其行人力能助之謂行者人杖堪制罪人而不救助者行人合杖八十勢不得助者謂隔川谷垣籬塹柵之類不可踰越過者及馳驛之類稱可之類者官有急事及私家救疾赴哀情事急速亦各無罪勢不得助者謂隔險難及馳驛之類諸捕罪人有漏露其事令得逃亡者減罪人罪一等疏議曰捕罪人謂上條將吏以下受使追捕而有漏露應捕之事令使罪人逃避者漏露之人減罪人罪一等注云罪人有數罪者假有一人或行強盜兼復殺人又欲謀叛若為謀叛而捕漏露者唯從謀叛減一等若為賊盜或殺人而捕漏露者即從賊盜殺人上減一等不論謀叛故云但以所收捕罪為坐未斷之間能自捕得除其罪相容隱者為捕得亦同即他人捕得若罪人已死及自首又各減一等疏議曰未斷之間謂漏露之罪未經斷定能自捕得罪人者餘其失囚之罪相容隱者為捕得謂同居及大功以上親外祖父母外孫若孫之婦夫之兄弟及兄弟妻奴婢部曲為主捕得並同身自捕獲皆除其罪注云餘條相容隱為捕得準此假如上條將吏受使追捕罪人致失者相容隱捕得亦與自捕得同故云亦準此即他人捕得若罪人已死謂自死及被他人殺者皆同及自首又各於罪人上更減一等總減罪人罪二等罪人有數罪但以所收捕罪為坐餘條相容隱為捕得準此諸鄰里被強盜及殺人告而不救助者杖一百聞而不救助者減一等力勢不能赴救者速告隨近官司若不告者亦以不救助論其官司不即救助者徒一年竊盜者各減二等疏議曰依禮五家為鄰五鄰為里既同邑落鄰居接續而被強盜及殺人者皆須遞告即救助之若告而不救助者杖一百雖不承告聲響相聞而不救助者減一等杖九十力勢不能赴救者謂賊強人少或老小羸弱不能赴救者速告隨近官司若不告者亦以不救助罪科之其官司不即救助者依捕亡令有盜賊及傷殺者即告隨近官司村坊屯驛聞告之處率隨近軍人及夫從發處追捕若其所在官司知而不即救助者徒一年竊盜各減二等謂鄰里被萩盜承告而不救助者從杖一百上減聞而不救助者從杖九十上減官司承告不即救助者從徒一年上減諸征名已定及從軍征討而亡者一日徒一年一日加一等十五日絞臨對寇賊而亡者斬主司故縱與同罪疏議曰征名已定謂衛士及募人征名已定訖及從軍征討而亡者一日徒一年一日加一等八日流三千里十五日絞若臨對寇賊謂壁壘相對矢石將交而亡者斬亦據應戰之人主司故縱與同罪謂主司知情容其亡避各與亡者罪同亡者合斬主司合絞注云下條準此謂下條向防及在防未滿而亡者主司故縱亦各同罪其臨對寇賊而有亡者但亡即坐不計日數及行遠近其有從軍征討而亡未滿十五日軍還者未還以前依征亡之法征還之後從軍還亡罪而斷將未還之日併滿軍還之日纍科軍還而先歸者各減五等其逃亡者同在家逃亡法疏議曰軍雖凱還須依部伍若不隨團隊而輒先歸者各減軍亡罪五等其逃亡者同在家逃亡法謂一日笞四十十日加一等罪止流二千里若軍還先歸一日徒一年上減五等合杖六十罪止徒一年半日若少從先歸日科日若多從有軍名亡法下條準此諸防人向防及在防未滿而亡者一日杖八十三日加一等疏議曰防人向防謂上道訖逃走及在防年限未滿而亡者鎮人亦同一日杖八十三日加一等既無罪止之文加至流三千里亡日未到罪止鎮防日已滿者計應還之日同在家亡法纍併為罪鎮人亦同諸流徒囚役限內而亡者一日笞四十三日加一等過杖一百五日加一等疏議曰流徒囚謂或流或徒者各在其役限內而亡者注云犯流徒應配及移鄉人未到配所而逃亡者各與流徒囚役限內而亡罪同一日笞四十三日加一等十九日合杖一百過杖一百五日加一等五十九日流三千里主守不覺失囚減囚罪三等即不滿半年徒者一人笞三十三人加一等罪止杖一百監當官司又減三等故縱者各與同罪疏議曰主守謂主守囚徒之人及部領流移人等不覺囚亡減囚罪三等謂從囚本罪上減三等不從逃坐減之即不滿半年徒者謂徒役將滿餘日不滿半年徒而有逃亡者不計逃日而科唯據亡人之數為罪一人笞三十三人加一等謂四人亡合笞四十不覺二十二人亡即至罪止合杖一百監當官司又減三等謂減主守罪三等不覺二十二人亡者罪止杖七十故縱者各與同罪稱各者謂監當官司及主守各與亡囚本犯罪同犯流徒應配及移鄉人未到配所而亡者亦同諸宿衛人在直而亡者一日杖一百二日加一等即從駕行而亡者加一等疏議曰宿衛人謂諸衛大將軍以下當番衛士以上在直番限內而有逃亡者一日杖一百二日加一等計一十七日流三千里直滿以後即同在家亡法即從駕行者以其陪從事重故加宿衛一等之坐亡者一日徒一年二日加一等十五日流三千里問曰衛士於宮城外守衛或於京城諸司守當或被配於王府上番如此之徒而有逃亡者合科何罪答曰官城之外兼及皇城京城若有逃亡罪亦與宿衛不別若其準減三等之例即太輕於在家而亡是知守當雜犯有減三等之科逃亡之辜得罪與宿衛不異諸丁夫雜匠在役及工樂雜戶亡者一日笞三十十日加一等罪止徒三年主司不覺亡者一人笞二十五人加一等罪止杖一百故縱者各與同罪疏議曰丁謂正役夫謂雜徭及雜色工匠諸司工樂雜戶注云太常音聲人亦同丁夫雜匠並據在役逃亡工樂以下在家亡者亦是一日笞三十十日加一等罪止徒三年主司謂監當主司不覺逃亡者計人數坐之一人笞二十五人加一等四十一人逃亡即至罪止杖一百主司故縱者各與逃亡者同罪即人有課役全戶亡者亦如之若有軍名而亡者加一等其人無課役及非全戶亡者減二等即女戶亡者又減三等其里正及監臨主司故縱戶口亡者各與同罪不知情者不坐疏議曰人有課役謂或有課無役或有役無課而全戶亡者亦如丁夫在役逃罪一日笞三十十日加一等罪止徒三年若有軍名而亡謂衛士掌間駕士幕士之類名屬軍府者總是有軍名其幕士屬衛尉駕士屬太僕之類不隸軍府者即不同軍名之例有軍名而亡者雖非全戶加一等合流二千里其人無諜役謂全戶亡者其有課役謂非全戶亡者各減有課役全戶亡罪二等罪止徒二年若其人無課役又非全戶亡者又減二等罪止徒一年即女戶亡亦謂全戶而亡者又減三等總減有課役亡者五等罪止杖一百婦女非全戶亡又減二等合杖八十其里正及監臨主司折衝府於軍人亦同監臨之例故縱戶口軍人亡者各與亡者罪同不知情者不坐問曰有軍名而亡於他處附貫課役如法唯無軍名合當何罪答曰逃亡之罪多據闕課無課之輩責其浮遊亦既編戶見在課役如法準式仍徴賦役附處復有課輸於官課役無違唯免軍名合罪依例逃亡自首減罪二等坐之仍勒還本所太常音聲人亦同諸非亡而浮浪他所者十日笞十二十日加一等罪止杖一百即有官事在他所事了留住不還者亦如之若營求資財及學宦者各勿論闕賦役者各依亡法疏議曰非亡謂非避事逃亡而流宕他所者十日笞十二十日加一等一百九十日罪止杖一百即有官事已了留住不歸者亦同浮浪之罪若營求資財者謂貿遷有無遠求利潤及學宦者或負笈從師或棄繻求仕各遂其業故並勿論闕賦役者各依亡法謂因此不歸致闕賦役各準逃亡之法依狀科罪若全戶者罪止徒三年非全戶者減二等諸官戶官奴婢亡者一日杖六十三日加一等主司不覺亡者一口笞三十五口加一等罪止杖一百故縱官戶亡者與同罪奴婢準盜論即誘導官私奴婢亡者準盜論仍令備償疏議曰官戶及官奴婢逃亡者一日杖六十三日加一等注云部曲私奴婢亦同部曲雖取良人之女其妻若逃亡罪同部曲主司不覺謂不覺官戶官奴婢亡者一口笞三十五口加一等三十六口罪止杖一百故縱官戶亡者同官戶逃亡之罪罪止流準加杖二百之法故縱官奴婢亡者準盜論謂計贓五匹徒一年五匹加一等即誘導官私奴婢亡者謂不將入己導引令亡者並準盜論五匹徒一年五匹加一等仍令備償故縱亡者得罪不償若誘導官戶部曲亡者律無正文當不應得為從重杖八十與同行者同過致資給之罪部曲私奴婢亦同諸在官無故亡者一日笞五十三日加一等過杖一百五日加一等邊要之官加一等疏議曰在官謂在令式有員見在官者無故私逃者一日笞五十三日加一等過杖一百五日加一等五十六日流三千里邊要之官戶部式靈勝等五十九州為邊州此乃居邊為要亡者加罪一等謂品官以上一日杖六十三日加一等諸被囚禁拒捍官司而走者流二千里傷人者加役流殺人者斬從者絞若私竊逃亡以徒亡論疏議曰被囚禁不限有罪無罪但據狀應禁者散禁亦同拒捍官司而強走者流二千里傷人者謂因拒捍傷主司及捕捉之人者加役流殺人者斬從者絞不至死者依首從法若私竊逃亡謂被囚禁而私逃者從上條流徒囚役限內而亡一日笞四十三日加一等過杖一百五日加一等此是事發更為合重其坐注云事發未囚而亡者亦同謂罪人事發被追拒捍官司逃走及私竊逃亡亦與在禁逃亡罪同問曰有人據狀不合禁身被官人枉禁拒捍官司逃走合得何罪答曰本罪不合囚禁枉被官人禁留雖即逃亡不合與囚亡之罪若有拒捍殺傷止同故殺傷法私竊逃亡同在家逃亡之罪若判案禁者雖本無罪亦同囚例事發未囚而亡者亦同諸主守不覺失囚者減囚罪二等若囚拒捍而走者又減二等皆聽一百日追捕限內能自捕得及他人捕得若囚已死及自首除其罪即限外捕得及囚已死若自首者各又追減一等疏議曰主守者謂專當守囚之人典獄之類不覺失囚者減囚罪二等假失死囚合徒三年之類若囚拒捍強走力不能制又減二等皆聽一百日追捕限內能自捕得及他人捕得者不限親踈若囚已死及自歸首並餘失囚之罪即百日限外捕得及囚已死若囚自首各又追減失囚本罪一等稱追減者謂失囚之罪已經斷訖者仍更追減若已奏決者不在追減之例監當之官各減主守三等故縱者不給捕限即以其罪罪之未斷決間能自捕得及他人捕得若囚已死及自首各減一等疏議曰監當之官謂檢校專知囚者即當直官人在直時其判官準令合還而失囚者罪在當直之官各減主守三等謂減囚罪五等囚若拒捍而走得減囚罪七等之類故縱者不給捕限謂主守及監當之官故縱囚逃亡者並不給限捕訪即以其罪罪之者謂縱死囚得死罪縱流徒囚得流徒罪之類未斷決間謂官當收贖者未斷死及笞杖者未決能自捕得及他人捕得若囚已死及自首各減一等注謂此篇內監臨主司應坐當條不立捕訪限及不覺故縱者並準此法疏議曰上條引征人逃亡者主司故縱與同罪及流徒囚限內而亡監當官司不立捕限及不覺故縱如此之類並準此條為法謂此篇內盜臨主司應坐當條不立補訪限及不覺故縱者並準此法諸部內容止他界逃亡浮浪者一人里正笞四十四人加一等縣內五人笞四十十人加一等州隨所管縣通計為罪各罪止徒二年其官戶部曲奴婢亦同疏議曰部內謂部界之內容止他界逃亡浮浪者一人里正笞四十謂容止經十五日以上始科里正之罪坊正村正部內容止逃亡亦同里正之罪若將家口逃亡浮浪者家口不限多少一戶同一人為罪四人加一等即五人逃亡及以浮浪笞五十二十五人杖一百三十七人徒二年縣內五人笞四十十人加一等九十五人合徒二年州隨所管縣通計為罪謂州管二縣者十人笞四十一百九十人徒二年管縣更多準此通計為坐皆以長官為首佐職為從既無以下之文即明不及主典各罪止徒二年其容止官戶部曲奴婢亦同良人之法若在軍役有犯者隊正以上折衝以下各準部內有盜賊之法疏議曰稱軍役有犯者謂於行軍征役之所容止逃亡浮浪即準州縣以下得罪隊正隊副同里正校尉旅帥減隊正一等折衝果毅隨所管校尉多少為罪故云隊正以上折衝以下各準部內有盜賊之法謂經十五日以上者坊正村正同里正之罪若將家口逃亡浮浪者一戶同一人為罪皆以長官為首佐職為從諸知情藏匿罪人若過致資給令得隱避者各減罪人罪一等疏議曰知情藏匿謂知罪人之情主人為相藏隱過致資給者謂指授道途送過險處助其運致井資給衣糧遂使凶人濳隱他所注云謂事發被追若非事發未是罪人故須事發被追始辨知情之狀及亡叛之類謂逃亡或叛國雖未追攝行即可知過致資給令隱避者減罪人罪一等合流三千里之類稱之類者或有亡命山澤不從追喚皆是注藏匿無日限過致資給亦同若卑幼藏隱匿狀已成尊長知而聽之獨坐卑幼部曲奴婢首匿主後知者與同罪疏議曰藏匿無日限者謂不限日之多少但藏匿即坐過致資給亦同無日限若卑幼藏隱匿狀既成以其同居得相容隱故尊長知而聽之獨坐卑幼尊長不坐部曲奴婢作首隱匿罪人主後知者與同罪謂同部曲奴婢各減罪人罪一等以主不為部曲奴婢隱故也注即尊長匿罪人尊長死後卑幼仍匿者減五等尊長死後雖經匿但已遣去而事發及匿得相容隱者之侶並不坐小功以下亦同減例疏議曰謂尊長在日自匿罪人容其相隱尊長死後卑幼匿之如故亦不限日之多少減尊長罪五等總減罪人罪六等尊長死後雖鯉匿但發遣去後罪始發覺及匿得相容隱者之徒侶假有大功之親共人行盜事發被追俱來藏匿若糾其徒侶親罪即彰恐相連纍故並不與罪小功以下亦同減例即例云小功以下相容隱減凡人三等令匿小功緦麻親之侶亦準此例減之總減罪人罪四等故云亦同減例注若赦前藏匿罪人而罪人不合赦免赦後匿如故不知人有罪容寄之後知而匿者皆坐如律疏議曰赦前藏匿罪人而罪人不合赦免假有匿十惡人會赦十惡不合赦免赦後匿如故及不知人有罪容寄之後知而匿者並依藏匿之罪科之注其展轉相使而匿罪人知情者皆坐不知者勿論疏議曰展轉相使匿罪人者假有甲知情匿罪人又囑付乙令匿乙又囑丙遣匿如此展轉相使匿者乙丙知是罪人得藏匿之罪不知情者無罪故云勿論罪人有數罪者止坐所知疏議曰罪人有數罪謂或殺人或姦盜止坐所知者謂於所知之罪上減一等之類問曰有奴婢匿一流囚主後知之主合得何罪答曰有奴婢首匿流囚罪合減一等徒三年加杖二百主後知者與奴婢同科亦準奴婢之罪合杖二百其應例減收贖各準其主本法仍於二百上減贖若奴婢死後主匿如故即得自匿之罪不合準奴婢為坐謂事發被追及亡叛之類藏匿無日限過致資給亦同若卑幼藏隱匿狀已成尊長知而聽之獨坐卑幼部曲奴婢首匿主後知者與同罪即尊長匿罪人尊長死後卑幼仍匿者減五等尊長死後雖經匿但已遣去而事發及匿得相容隱者之侶並不坐小功已下亦同減例若赦前藏匿罪人而罪人不合赦免赦後匿如故不知人有罪容寄之後知而匿者皆坐如律其展轉相使而匿罪人知情者皆坐不知者勿論故唐律疏議卷第二十九斷獄凡一十四條疏議曰斷獄律之名起自於魏魏分里悝囚法而出此篇至北齊與捕律相合更捕斷律至後周復為斷獄律釋名云獄者確也以實囚情皋陶造獄夏曰夏臺殷名羑里周曰圜土秦曰囹圄漢以來名獄然諸篇罪名各有類例訊拾出入各立章程此篇錯綜一部條流以為決斷之法故承衆篇之下諸囚應禁而不禁應枷鎖杻而不枷鎖杻及脫去者杖罪笞三十徒罪以上遞加一等回易所著者各減一等疏議曰獄官令禁囚死罪枷杻婦人及流以下去杻其杖罪散禁又條應議請減者犯流以上若除免官當竝鎖禁即是犯笞者不合禁杖罪以上始合禁推其有犯杖罪不禁應枷鎖杻而不枷鎖杻及脫去者杖罪笞三十徒罪不禁及不枷鎖若脫去者笞四十流罪不禁及不枷鎖若脫去者笞五十死罪不禁及不枷鎖杻若脫去者杖六十是名遞加一等回易所著者各減一等謂應枷而鎖應鎖而枷是名回易所著徒罪者笞三十流罪笞四十死罪笞五十即囚自脫去及回易所著者罪亦如之若不應禁而禁及不應枷鎖杻而枷鎖杻者杖六十疏議曰即囚自擅脫去枷鎖杻者徒罪笞四十流罪以上遞加一等即囚自回易所著者各減一等故云亦如之若不應禁而禁及不應枷鎖杻而枷鎖杻竝謂據令不合者各杖六十諸以金刃及他物可以自殺及解脫而與囚者杖一百若囚以故逃亡及自傷傷人者徒一年自殺殺人者徒二年若囚本犯流罪以上因得逃亡雖無傷殺亦準此疏議曰金刃謂錐刀之屬他物謂繩鋸之類可以自殺及解脫枷鎖杻雖囚之親屬及他人與者物雖未用與者即杖一百若以得金刃等故因得逃亡或自傷害或傷他人與物者徒一年若囚自殺或殺他人與物者徒二年若囚本犯流罪以上因得金刃等物而得逃亡者雖無殺傷與物者亦徒二年即囚因逃亡未斷之間能自捕得及他人捕得若囚自首及已死各減一等即子孫以可解脫之物與祖父母父母部曲奴婢與主者罪亦同疏議日謂囚因得金刃及他物之故以自解脫而得逃走與物人罪未斷之間能自捕得及他人捕得若囚自來歸首及囚自死或他人殺之者亦同各減一等謂徒以下囚逃者一年徒上減流死囚逃者二年徒上減即子孫以可解脫之物謂稱孫者曾玄同而與祖父母父母或部曲奴婢與主者竝與凡人罪同亦不合輒自捕捉若官司遣捕而送者無罪自捕送官者同告法若有傷殺而逃亡者後能捕獲與物之人各依前傷殺之罪不合減科諸死罪囚辭窮竟而囚之親故為囚所遣雇倩人殺之及殺之者各依本殺罪減二等囚若不遣雇倩及辭未窮竟而殺各以鬪殺罪論至死者加役流疏議曰謂犯死罪囚辭狀窮竟而囚之緦麻以上親及故舊為囚所遣或雇人倩人而殺訖者其所遣雇倩之人及受雇倩殺者各依尊卑貴賤本殺罪上減二等科之囚若不遣親故雇倩人殺及囚雖遣雇倩人殺而辭狀未窮竟而殺者其所遣之人及受雇倩者各依尊卑貴賤以同鬪殺罪論至死者加役流問曰其囚本犯死罪辭未窮竟又不遣人雇倩殺之而囚之親故雇倩人殺及殺之者合得何罪答曰辭雖窮竟不遣雇倩人殺之雖遣雇倩殺之辭未窮竟此等二事各依鬪殺為罪至死者加役流若辭未窮竟復不遣雇倩殺之而輒殺者各同鬪殺之法至死者竝皆處死不合加役流辭雖窮竟而子孫於祖父母父母部曲奴婢於主者皆以故殺罪論疏議曰辭雖窮竟謂死罪辨定訖而子孫於祖父母父母部曲奴婢於主雖被祖父母父母及主所遣而輒殺者及雇人倩人殺者其子孫及部曲奴婢皆以故殺罪論子孫仍入惡逆部曲奴婢經赦不原其被雇倩之人仍同上解減鬪殺罪二等諸主守受囚財物導令翻異及與通傳言語有所增減者以枉法論十五匹加役流三十匹絞疏議曰主守謂專當掌囚典獄之屬受囚財物導引其囚令翻異文辨及得官司若文證外人言語為報告通傳有所增減其罪者以枉法論依無祿枉法受財一尺杖九十一匹加一等十五匹加役流三十匹絞賊輕及不受財者減故出入人罪一等無所增減者笞五十受財者以受所監臨財物論其非主守而犯者各減主守一等疏議曰贓輕謂受贓得罪輕於減囚罪一等者及不受財唯通言語減故出入人罪一等謂導令翻異及通傳言語出入囚死罪者處流三千里出入流罪以下各減本罪一等之類雖即教導及通傳言語於囚罪無所增減者笞五十若無增減而受財者以受所監臨財物論一尺笞四十一匹加一等八匹徒一年其非主守而犯者謂非監當囚人而有外人導囚翻異有所增減各減主守罪一等若受財於主守贓上減一等若不受財者於囚罪上減二等雖通言語無所增減笞四十諸囚應請給衣食醫藥而不請給及應聽家人入視而不聽應脫去枷鎖杻而不脫去者杖六十以故致死者徒一年即減竊囚食笞五十以故致死者絞疏議曰準獄官令囚去家懸遠絶餉者官給衣糧家人至日依數徴納囚有疾病主司陳牒請給醫藥救療此等應合請給而主司不為請給及主司不即給準令病重聽家人入視而不聽及應脫去枷鎖杻而所司不為脫去者所由官司合杖六十可以故致死者謂不為請及雖請不即為給衣糧醫藥病重不許家人入視及不脫去枷鎖杻由此致死者所由官司徒一年即減竊囚食者不限多少笞五十若由減竊囚食其囚以故致死者減竊之人合絞諸應議請減若年七十以上十五以下及廢疾者竝不合拷訊皆據衆證定罪違者以故失論若證不足告者不反坐疏議曰應議謂在名例八議人請謂應議者期以上親及孫若官爵五品以上者減謂七品以上之官及五品以上之祖父母父母兄弟姊妹妻子孫者若年七十以上十五以下及廢疾依令一支廢腰脊折癡啞侏儒等竝不拷訊皆據衆證定罪稱衆者三人以上明證其事始合定罪違者以故失論謂不合拷訊而故拷訊致罪有出入者即依下條故出入人及失出入人罪法其罪雖無出入而枉拷者依前人不合捶拷法以鬪殺傷論至死者加役流即以鬪殺傷為故失若證不滿三人告者不反坐被告之人亦不合入罪問曰所告之事證有二人一人證是一人證非證既不足合科疑罪以否答曰律云據衆證定罪稱衆者三人以上若證不足告者不反坐察驗難明二人證實猶故不合入罪況一實一虛被告之人全不合坐其於告者亦得免科若全無證人自須審察虛實以狀斷之若三人證實三人證虛是名疑罪此解竝據應議請減以下及廢疾以上除此色外自合拷取實情拷滿不服反拷告人不合從衆證科斷其於律得相容隱即年八十以上十歲以下及篤疾皆不得令其為證違者減罪人罪三等疏議曰其於律得相容隱謂同居若大功以上親及外祖父母外孫若孫之婦夫之兄弟及兄弟妻及部曲奴婢得為主隱其八十以上十歲以下及篤疾以其不堪加刑故竝不許為證若違律遣證減罪人罪三等謂遣證徒一年所司合杖八十之類諸囚在禁妄引人為徒侶者以誣告罪論即本犯雖死仍準流徒加杖及贖法疏議曰囚在禁妄引人為徒侶者謂盜發者妄引人為同盜殺人者妄引人為同行之類以誣告罪論謂依鬪訟律誣告人者各反坐即本犯應死不可纍加故準流徒加杖法其應贖者即準流徒贖之諸應訊囚者必先以情審察辭理反覆參驗猶未能決事須訊問者立案同判然後拷訊違者杖六十疏議曰依獄官令察獄之官先備五聽又驗諸證信事狀疑似猶不首實者然後拷掠故拷囚之義先察其情審其辭理反覆案狀參驗是非猶未能決謂事不明辨未能斷決事須訊問者立案取見在長官同判然後拷訊若充使推勘及無官同判者得自別拷若不以情審察及反覆參驗而輒拷者合杖六十若贓狀露驗理不可疑雖不承引即據狀斷之若事已經赦雖須追究竝不合拷疏議曰若贓狀露驗謂計贓者見獲真贓殺人者檢得實狀贓狀明白理不可疑問雖不承聽據狀科斷若事已經赦者雖須更有追究竝不合拷注云謂會赦移鄉及除免之類謂殺人會赦仍合移鄉犯十惡故殺人反逆緣坐會赦猶除名監臨主守於所監守犯姦盜略人若受財而枉法會赦仍合免所居官稱之類謂會赦免死猶流及盜詐枉法猶徴正贓故云之類謂會赦移鄉及除免之類諸拷囚不得過三度數總不得過二百杖罪以下不得過所犯之數拷滿不承取保放之疏議曰依獄官令拷囚每訊相去二十日若訊未畢更移他司仍須拷鞫即通計前訊以充三度故此條拷囚不得過三度杖數總不得過二百杖罪以下謂本犯杖罪以下笞十以上推問不承若欲須拷不得過所犯笞杖之數謂本犯一百杖拷一百不承取保放免之類若本犯雖徒一年應拷者亦得拷滿二百拷滿不承取保放之若拷過三度及杖外以他法拷掠者杖一百杖數過者反坐所剩以故致死者徒二年疏議曰拷過三度謂雖二百杖不得拷過三度及杖外以他法拷掠謂拷囚於法杖之外或以繩懸縛或用棒拷打但應行杖外悉為他法犯者合杖一百杖數過者反坐所剩謂囚本犯杖一百乃拷二百官司得一百剩罪之類以故致死者謂拷過三度或用他法及杖數有過而致死者徒二年即有瘡病不待差而拷者亦杖一百若決杖笞者笞五十以故致死者徒一年半若依法拷決而邂遘致死者勿論仍令長官等勘驗違者杖六十疏議曰拷雖依法囚身有瘡若病不待差而拷者杖一百若決杖笞者笞五十若囚瘡病未差而拷及決杖笞致死者徒一年半若依法用杖依數拷決而囚邂遘致死者勿論邂遘謂不期致死而死詩云邂遘相遇言不期而遇仍長官以下並親自檢勘知無他故具為文案若長官等不即勘檢者杖六十注云拷決之失謂訊囚及決杖笞於法有失者立案不立案等其有失者依職制律失者聽減三等拷決之失立案不立案等諸拷囚限滿而不首者反拷告人其被殺被盜家人及親屬告者不反拷拷滿不首取保並放違者以故失論疏議曰囚拷經三度杖數滿二百而不首反拷告人謂還準前人拷數反拷告人拷滿復不首取保釋放其被殺被盜之家若家人及親屬告者所訴盜殺之人被拷滿不首者各不反拷告人以殺盜事重例多隱匿反拷告者或不敢言若被人決水入家放火燒宅之類家人及親屬言告者亦不反拷告人拷滿不首取保並放違者以故失論違謂若應反拷而不反拷及不應反拷而反拷者若故依故出入法失者依失出入論其本法不合拷而拷者依前人不合捶拷法亦以故失論其應取保放而不放者從不應禁而禁不取保放者於律有違當不應得為流以上從重徒罪以下從輕問曰律云拷滿不首反拷告人其告人是應議請減人既不合反拷其事若為與奪答曰律稱反拷告人明須準前人杖數反拷若前人被拷罪不首告者亦反拷若前人止拷一百不首告者亦反拷一百是名反拷告人其應議請減人不合反拷須準前人拷杖數徴銅被水火損敗者亦同諸鞫獄官停囚待對問者雖職不相管皆聽直牒追攝牒至不即遣者笞五十三日以上杖一百疏議曰鞫獄官謂推鞫主司停囚待對問謂囚徒侶見在他所須追對問者雖職不相管皆聽直牒稱直牒者謂不緣所管上司直牒所管追攝注云雖下司亦聽假如大理及州縣官須追省臺之人皆得直牒追攝牒至皆須即遣不即遣者笞五十三日以上杖一百雖下司亦聽諸鞫獄者皆須依所告狀鞫之若於本狀之外別求他罪者以故入人罪論疏議曰鞫獄者謂推鞫之官皆須依所告本狀推之若於本狀之外傍更推問別求得笞杖徒流及死罪者同故入人罪之類若因其告狀或應掩捕搜檢因而檢得別罪者亦得推之其監臨主司於所部告狀之外知有別罪者即須舉牒別更糾論不得因前告狀而輒推鞫若非監臨之官亦不得狀外別舉推勘諸鞫獄官囚徒伴在他所者聽移送先繫處併論之違者杖一百疏議曰鞫獄官囚徒伴在他所者假有諸縣相去各百里內東縣先有繫囚西縣囚復事發其事相連應須對鞫聽移後發之囚送先繫之處併論之注云謂輕從重謂輕罪發雖在先仍移輕以就重若輕重等少從多謂兩縣之囚罪名輕重等者少處發雖在先仍移就多處若多少等即移後繫囚從先繫處若禁囚之所相去百里外者各從事發處斷之既恐失脫囚徒又慮漏泄情狀故令當處斷之違者各杖一百若違法移囚即令當處受而推之申所管屬推劾若囚至不受及受而不申者亦與移囚罪同疏議曰違法移囚謂移重就輕或移多就少之類即令當處受而推之謂囚至之處即合受推仍申所管之州推劾謂兩縣囚申州兩州囚申省並依狀推劾囚至不肯為受或受囚不申管屬與擅移囚罪同亦杖一百即擅移囚縣各隸別州者即受囚之縣申所管之州轉牒送囚之州依法推劾此等移囚並謂兩處事發若是一處事發者不限遠近皆須直牒追攝如有違者自從上法謂輕從重若輕重等少從多多少等後從先若禁處相去百里外者各從事發處斷之諸決罰不如法者笞三十以故致死者徒一年即杖粗細長短不依法者罪亦如之疏議曰依獄官令決笞者腿臀分受決杖者背腿臀分受須數等拷訊者亦同笞以下願背腿分受者聽決罰不依此條是不如法合笞三十以此決罰不如法而致死者徒一年依令杖皆削去節目長三尺五寸訊囚杖大頭徑三分二釐小頭二分二釐常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分五釐謂杖長短粗細不依令者笞三十以故致死者徒一年故云亦如之故唐律疏議卷第三十斷獄凡二十條諸監臨之官因公事自以杖捶人致死及恐迫人致死者各從過失殺人法若以大杖及手足毆擊折傷以上減鬪殺傷罪二等疏議曰謂臨統案驗之官情不挾私因公事前人合杖笞自以杖捶人致死及恐迫人致死謂因公事欲求其情或恐喝或迫脅前人怕懼而自致死者各依過失殺人法各徴銅一百二十斤入死家若前人是卑賤罪不至死者各依本殺法徴銅若以大杖及手足毆擊折傷以上者自擊使人擊等減鬪殺傷罪二等謂其應償死者合徒三年之類雖是監臨主司於法不合行罰及前人不合捶拷而捶拷者以鬪殺傷論至死者加役流即用刃者各從鬪殺傷法疏議曰雖是監臨主司於法不合行罰謂非判事之官及非專當督領者不得輒行捶罰假有人犯徒以上罪合送法司不送法司當曹即自行決罰之類及前人不合捶拷謂前人無罪或雖有罪應合官當收贖之類而輒捶拷者以鬪殺傷論謂傷與不傷並依他物鬪毆之法其因捶拷而致死者加役流用刃者謂監臨之官自以杖捶人致死以下有用刃殺傷者各依鬪訟律用刃殺者斬用兵刃殺者同故殺法問曰里正坊正村正及主典因公事行罰前人致死合得何罪答曰里正坊正村正等唯掌追呼催督不合輒加笞杖其有因公事相毆擊者理同凡鬪而科主典檢請是司理非行罰之職因公事捶人者亦與里正等同諸斷罪皆須具引律令格式正文違者笞三十若數事共條止引所犯罪者聽疏議曰犯罪之人皆有條制斷獄之法須憑正文若不具引或致乖謬違而不具引者笞三十若數事共條謂依名例律二罪以上俱發以重者論即以贓致罪頻犯者並纍科假有人雖犯二罪並不因贓而斷事官人止引二罪俱發以重者論不引以贓致罪之類者聽諸斷罪應言上而不言上應待報而不待報輒自決斷者各減故失三等疏議曰獄官令杖罪以下縣決之徒以上縣斷定送州覆審訖徒罪及流應決杖笞若應贖者即決配徴贖其大理寺及京兆河南府斷徒及官人罪并後有雪減並申省省司覆審無失速即下知如有不當者隨事駮正若大理寺及諸州斷流以上若除免官當者皆連寫案狀申省大理寺及京兆河南府即封案送若駕行幸即準諸州例案覆理盡申奏若不依此令是應言上而不言上其有事申上合待報下而不待報輒自決斷者各減故失三等謂故不申上故不待報者於所斷之罪減三等若失不申上失不待報者於職制律公事失上各又減三等即死罪不待報輒自決者依下文流二千里諸制敕斷罪臨時處分不為永格者不得引為後比若輒引致罪有出入者以故失論疏議曰事有時宜故人主權斷制敕量情處分不為永格者不得引為後比若有輒引致罪有出入者以故失論謂故引有出入各得下條故出入之罪其失引者亦準下條失出入罪論諸官司入人罪者若入全罪以全罪論疏議曰官司入人罪者謂或虛立證據或妄搆異端捨法用情鍛錬成罪故注云謂故增減情狀足以動事者若聞知國家將有恩赦而故論決囚罪及示導教令而使詞狀乖異稱之類者或雖非恩赦而有格式改動或非示導而恐喝改詞情狀既多故云之類若入全罪謂前人本無負犯虛搆成罪還以虛搆枉入全罪科之注雖入罪但本應收贖及加杖者止從收贖加杖之法疏議曰假有入官蔭人及廢疾流罪前人合贖入者亦以贖論或入官戶部曲奴婢并單丁之人前人合加杖者亦依加杖之法收贖不用官當及配流役身之例此是官司入人罪與誣告之法不同從輕入重以所剩論刑名易者從笞入杖從徒入流亦以所剩論從笞杖入徒流從徒流入死罪亦以全罪論其出罪者各如之疏議曰從輕入重以所剩論假有從笞十入三十即剩入笞二十從徒一年入一年半即剩入半年徒所入官司各得笞二十及半年徒之類刑名易者從笞入杖亦得所剩之罪從徒入流者注云三流同比徒一年為剩謂從徒三年入流二千里或二千五百里或流三千里遠近雖異俱曰流刑至於配所役身三流同有一年居作故從徒入流三流同比徒一年為剩即從近流二千里入至二千五百里或入至三千里者同比徒半年為剩若從三流入至加役流者各計加役年為剩但入加役流者加常流役二年將加役二年以為剩罪從笞杖入徒流從徒流入死罪假有從百杖入徒一年即是全入一年徒坐從徒流入死罪謂從一年徒以上至三千里流而入死刑者亦依全入死罪之法故云亦以全罪論其出罪者謂增減情狀之徒足以動事之類或從重出輕依所減之罪科斷從死出至徒流從徒流出至笞杖各同出全罪之法故云出罪者各如之假有囚犯一年徒坐官司故入至加役流即從一年至三年是剩入二年徒罪從徒三年入至三流即三流同比徒一年為剩加役流復剩二年即是剩五年徒坐官司從加役流出至徒一年亦準此即斷罪失於入者各減三等失於出者各減五等若未決放及放而還獲若囚自死各聽減一等疏議曰即斷罪失於入者上文故入者各以全罪論失於入者各減三等假有從笞失入百杖於所剩罪上減三等若入至徒一年即同入全罪之法於徒上減三等合杖八十之類失於出者各減五等假有失出死罪者減五等合徒一年半失出加役流亦準此三流同為一減減五等合徒一年之類若未決放者謂故入及失入死罪及杖罪未決其故出及失出死罪以下未放及已放而更獲若囚自死但使囚死不問死由各聽減一等謂於故出入及失出入上各聽減一等即別使推事通狀失情者各又減二等所司已承誤斷訖即從失出入法雖有出入於決罰不異者勿論疏議曰別使推事謂充使別推覆者通狀失情謂不得本情或出或入各又減二等失入者於失入減三等上又減二等若失出者於失出減五等上又減二等所司已承誤斷訖謂曹司承誤通之狀已依斷訖即從失出入法謂皆從在曹司出入法科之並同減五等三等之例若未決放及放而還獲若囚自死各聽減一等其所司承誤已斷訖者曹司同餘官案省不覺法雖有出入於決罰不異假有官戶部曲官私奴婢本犯合徒三年斷入流罪或從三流之法科徒三年各止加杖二百刑名雖有出入加杖數即不殊者無罪故云於決罰不異者勿論問曰有人本犯加役流出為一年徒坐放而還獲減一等合得何罪答曰全出加役流官司合得全罪放而還獲減一等合徒五年今從加役流出為一年徒坐計有五年剩罪放而還獲減一等若依徒法減一等仍合四年半徒既是剩罪不可重於全出之坐舉重明輕止合三年徒罪謂故增減情狀足以動事者若聞知有恩赦而故論決及示導令失實辭之類雖入罪但本應收贖及加杖者止從收贖加杖之法從徒入流者三流同比徒一年為剩即從近流而入遠流者同比徒半年為剩若入加役流者各計加役年為剩諸赦前斷罪不當者若處輕為重宜改從輕處重為輕即依輕法疏議曰處斷刑名或有出入不當本罪其事又在恩前恐判官執非不移故明從輕坐之法若處輕為重宜改從輕假有鬪殺堂兄當時作親兄斷為惡逆會赦之後改從堂兄坐當不睦赦若十惡亦原處流二千里以常赦不免故仍處流坐又如鬪殺凡人斷為殺緦麻尊長會赦十惡不免改為雜犯免死移鄉此竝仍有輕罪又有受所監臨五十匹斷為枉法處死會赦改為受所監臨不在徴贓之例又有犯近流科作遠流或止合一官當徒斷用二官以上若奏畫訖及流至配所會赦者改從本犯近流及還所枉告身若未奏畫及流人未到流所會赦者即從赦原若應徴銅而處輕為重其銅或在限外未輸或在限內納訖會赦者竝改從輕法其剩納者却還未送者依輕罪數徴納若限內未納會赦者從赦竝免稱輕者全免亦是故令云犯罪未斷決逢格改者格重聽依犯時格輕聽從輕法即總全無罪亦名輕法其處重為輕即依輕法假令犯十惡非常赦所不免者當時斷為輕罪及全放竝依赦前斷定其常赦所不免者依常律疏議曰常赦所不免者赦書云罪無輕重皆赦除之不言常赦所不免者亦不在免限故云依常律即犯惡逆仍處死反逆及殺從父兄姊小功尊屬造畜蠱毒仍流十惡故殺人反逆緣坐獄成者猶除名監守內姦盜略人受財枉法獄成會赦免所居官殺人應死會赦移鄉等是即赦書定罪名合從輕者又不得引律比附入重違者各以故失論疏議曰赦書定罪名合從輕者假如貞觀九年三月十六日赦大辟罪以下竝免其常赦所不免十惡祅言惑衆謀叛已上道等竝不在赦例據赦十惡之罪赦書不免謀叛即當十惡未上道者赦特從原叛罪雖重赦書定罪名合從輕不得引律科斷若比附入重違者以故失論常赦所不免者謂雖會赦猶處死及流若除名免所居官及移鄉者諸聞知有恩赦而故犯及犯惡逆若部曲奴婢毆及謀殺若強姦主者皆不得以赦原即殺小功尊屬從父兄姊及謀反大逆者身雖會赦猶流二千里疏議曰聞知有恩赦而故犯謂赦書未出私自聞知而故犯罪者及犯惡逆謂毆及謀殺祖父母父母殺伯叔父母姑兄姊外祖父母夫夫之祖父母父母此名惡逆若部曲客女亦同并奴婢毆及謀殺若強姦主者皆不得以赦原即殺小功尊屬從父兄姊及謀反大逆者此等雖會赦免死猶流二千里諸獄結竟徒以上各呼囚及其家屬具告罪名仍取囚服辨若不服者聽其自理更為審詳違者笞五十死罪杖一百疏議曰獄結竟謂徒以上刑名長官同斷案已判訖徒流及死罪各呼囚及其家屬具告所斷之罪名仍取囚服辨其家人親屬唯止告示罪名不須問其服否囚若不服聽其自理依不服之狀更為審詳若不告家屬罪名或不取囚服辨及不為審詳流徒罪竝笞五十死罪杖一百諸緣坐應沒官而放之及非應沒官而沒之者各以流罪故失論疏議曰賊盜律謀反及大逆人子年十五以下及母女妻妾子妻妾亦同若祖孫兄弟妨妹竝沒官男夫年八十及篤疾婦人年六十及廢疾竝免出養入道及娉妻未成者竝不追坐若應沒而放應放而沒各依流罪以故失論謂反逆緣坐流三千里沒官罪重須用三千里流法若故同故出入三千里流若失同失出入三千里流稱放者應沒遣流與全放無別應流遣沒得罪亦同諸徒流應送配所而稽留不送者一日笞三十三日加一等過杖一百十日加一等罪止徒二年疏議曰徒流應送配所謂徒罪斷訖即應役身準獄官令犯徒應配居作在京送將作監在外州者供當處官役案成即送而稽留不送其流人準令季別一遣若符在季末三十日內至者聽與後季人同遣違而不送者一日笞三十三日加一等過杖一百十日加一等五十二日罪止徒二年注云不得過罪人之罪謂罪人應徒一年者稽留官司亦罪止徒一年之類不得過罪人之罪諸應輸備贖沒入之物及缺負應徴違限不送者一日笞十五日加一等罪止杖一百若除免官當應追告身違限不送者亦如之疏議曰應輸備贖沒入之物備謂亡失官私器物各備償贖謂犯法之人應徴銅贖沒謂彼此俱罪之贓及犯禁之物沒官入者謂得闌遺之物限滿無人識認者入官及應入私之類又依獄官令贖死刑八十日流六十日徒五十日杖四十日笞三十日若應徴官物者準直五十匹以上一百日三十匹以上五十日二十匹以上三十日不滿二十匹以下二十日其失有缺負應徴違限不送者竝準令文依限送納違者一日笞十五日加一等罪止杖一百若除免官當謂犯罪斷除名免官免所居官及官當應追告身不送者亦一日笞十五日加一等罪止杖一百諸婦人犯死罪懷孕當決者聽産後一百日乃行刑若未産而決者徒二年産訖限未滿而決者徒一年失者各減二等其過限不決者依奏報不決法疏議曰婦人犯死罪懷孕當應行決者聽産後一百日乃行刑若未産而決者徒二年産訖未滿百日而決者徒一年失者各減二等未産而決徒一年産訖限未滿而決者杖九十即過限不決者依奏報不決法謂依下條即過限不決者違一日杖一百二日加一等諸婦人懷孕犯罪應拷及決杖笞若未産而拷決者杖一百傷重者依前人不合捶拷法産後未滿百日而拷決者減一等失者各減二等疏議曰婦人懷孕犯罪應拷及決杖笞皆待産後一百日然後拷決若未産而拷及決杖笞者杖一百傷重者謂傷損之罪重於杖一百者依前人不合捶拷法謂依上條監臨之官前人不合捶拷而捶拷者以鬪殺傷論若墮胎者合徒二年婦人因而致死者加役流限未滿而拷決者減一等謂減未産拷決之罪一等失者各減二等謂未産而失拷決於杖一百上減二等傷重於鬪傷上減二等若産後限未滿而拷決者於杖九十上減二等傷重者於鬪傷上減三等諸立春以後秋分以前決死刑者徒一年其所犯雖不待時若於斷屠月及禁殺日而決者各杖六十待時而違者加二等疏議曰依獄官令從立春至秋分不得奏決死刑違者徒一年若犯惡逆以上及奴婢部曲殺主者不拘此令其大祭祀及致齊朔望上下弦二十四氣雨未晴夜未明斷屠月日及假日竝不得奏決死刑其所犯雖不待時若於斷屠月謂正月五月九月及禁殺日謂每月十直日月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日雖不待時於此月日亦不得決死刑違而決者各杖六十待時而違者謂秋分以前立春以後正月五月九月及十直日不得行刑故違時日者加二等合杖八十其正月五月九月有閏者令文但云正月五月九月斷屠即有閏者各同正月亦不得奏決死刑諸死罪囚不待覆奏報下而決者流二千里即奏報應決者聽三日乃行刑若限未滿而行刑者徒一年即過限違一日杖一百二日加一等疏議曰死罪囚謂奏畫已訖應行刑者皆三覆奏訖然始下決若不待覆奏報下而輒行決者流二千里即奏報應決者謂奏訖報下應行決者聽三日乃行刑稱日者以百刻須以符到三日乃行刑若限未滿三日而行刑者徒一年即過限違一日杖一百二日加一等在外既無漏刻但取日周晬時為限諸斷罪應決配之而聽收贖應收贖而決配之若應官當而不以官當及不應官當而以官當者各依本罪減故失一等疏議曰斷罪應決配之謂無官蔭及非老小及疾之色犯笞杖應決徒流應配官司乃聽收贖應收贖謂有官蔭及廢疾若年七十以上十五以下本罪合贖而決配之若應官當謂流內九品以上犯徒以上罪合以官當官司乃不以官當或不應官當謂罪輕不盡其官及過失犯罪不合用官當徒而官司乃以官當者各依本犯當贖及決配之罪減故失一等謂故出入失出入者各從本罪上減一等是名減故失一等注云死罪不減若應死而聽當贖應收贖而真決死刑不在減例各從出入死罪故失科之即品官任流外及雜任於本司及監臨犯杖罪以下依決罰例疏議曰品官任流外及雜任謂身帶勳官散官而任流外及雜任者於本司及監臨謂於本司及臨時監統者若犯杖罪以下依流外雜任之例決杖不准官品徴贖若徒罪以上自依當贖法其有準蔭應贖者任流外及雜任若犯杖罪以下亦準品官依決罰例死罪不減諸斷罪應絞而斬應斬而絞徒一年自盡亦如之失者減二等即絞訖別加害者杖一百疏議曰犯罪應絞而斬應斬而絞徒一年以其刑名改易故科其罪自盡亦如之依獄官令五品以上犯非惡逆以上聽自盡於家若應自盡而絞斬應絞斬而令自盡亦合徒一年故云亦如之失者減二等謂原情非故者合杖九十即絞訖別加害者謂絞已致斃別加拉幹折腰之類者杖一百諸領徒應役而不役及徒囚病愈不計日令陪役者過三日笞三十三日加一等過杖一百十日加一等罪止徒二年疏議曰領徒應役謂掌領囚徒令役身者而不役及徒囚因病給假病愈合役不令陪役者過三日笞三十三日加一等過二十四日合杖一百過杖一百十日加一等罪止徒二年注云不得過罪人之罪謂如應徒一年者雖多日不役亦不得過徒一年其二年以下竝準此囚數多者從不役人日多者為罪不得過罪人之罪諸縱死罪囚令其逃亡後還捕得及囚已身死若自首應減死罪者其獲囚及死首之處即須遣使速報應減之所有驛處發驛報之若稽留使不得減者以入人罪故失論減一等疏議曰謂囚合死在禁所司縱令逃亡依故縱之條還合死罪捕得及囚已死若自首應減死罪者謂依捕亡律及上條放而還獲得減一等者其獲囚之處及死首之所即須遣使速報應減死之處若有驛之處發驛報之若使人及官司稽留令不得減罪致使囚已決訖者以入人罪故失論減一等謂故稽遲從故入上減一等流三千里若失稽遲從失入罪上減一等總減罪人四等徒二年官司及使人各以所由為坐諸疑罪各依所犯以贖論即疑獄法官執見不同者得為異議議不得過三疏議曰疑罪謂事有疑似處斷難明各依所犯以贖論謂依所疑之罪用贖法收贖注云疑謂虛實之證等謂八品以下及庶人一人證虛一人證實二人以上虛實之證其數各等或七品以上各據衆證定罪亦各虛實之數等是非之理均謂有是處亦有非處其理各均或事涉疑似謂贓狀涉於疑似傍無證見之人或傍有聞見之人其事全非疑似稱之類者或行迹是狀驗非或聞證同情理異疑狀既廣不可備論故云之類即疑獄謂獄有所疑法官執見不同議律論情各申異見得為異議聽作異同議不得過三謂如丞相以下通判者五人大理卿以下五人如此同判者多不可各為異議故云議不得過三疑謂虛實之證等是非之理均或事涉疑似傍無證見或傍有聞證事非疑似之類
