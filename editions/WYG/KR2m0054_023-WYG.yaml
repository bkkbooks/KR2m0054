canonical_identifier: bkk:krp/KR2m0054/WYG/v1/juan/23
seq: 23
front:
  text: 陽如此之類得徒二年半不同居徒
  hash: sha256:4e9df5dd8186db03351b2399cf17790f0cd1754b8c1f0d2027ca8c47288b42a1
body:
  text: 三年因毆致死者同居不同居俱得絞罪毆傷繼父者謂曾經同居今異者與緦麻尊同同居者加一等餘條繼父準此疏義曰繼父者謂母後嫁之夫註云謂曾經同居今異者依禮繼父同居服期謂妻少子幼子無大功之親與之適人所適者亦無大功之親而所適者以其資財為之築家廟于家門之外歲時使之祀焉是謂同居繼子之妻雖不從服若有犯夫之繼父者從下條減夫一等其不同居者謂先嘗同居今異者繼父若自有子及有大功之親雖復同住亦為異居若未嘗同居則不為異居即同凢人之例其先同居今異者毆之同緦麻尊合徒一年傷重者各加凢鬬二等死者斬同居者雖著期服終非本親犯者不同正服止加緦麻尊一等謂毆者合徒一年半傷重者加凢人三等註云餘條繼父準此謂諸條凖服尊卑相犯得罪並準此例雖於繼父下註即稱妻前夫之子並與繼父義同律稱與緦麻尊同其有謀殺及賣理當不睦于前夫之子不言與緦麻卑幼同毆之準凢人減罪不入緦麻年幼之例即毆傷見受業師加凢人二等死者各斬謂服膺儒業而非私學者疏義曰禮云凢敎學之道嚴師為難師嚴道尊方知敬學如有親承儒敎服膺函丈而毆師者加凢人二等死者各斬稱各者并毆繼父至死俱得斬刑註云謂服膺儒業而非私學者儒業謂經業非私學者謂𢎞文國子州縣等學私學者即禮云家有塾遂有序之類如有相犯並同凢人問曰毆見受業師加凢人二等其博士若有髙品累加與否答曰毆見受業師加凢人二等先有官品亦從品上累加若鬬毆無品博士加凢人二等合杖六十九品以上合杖八十若毆五品博士亦於本品上累加之毆詈夫期親尊長諸妻毆詈夫之期親以下緦麻以上尊長各减夫犯一等減罪輕者加凢鬬傷一等妾犯者不減死者各斬疏義曰依喪服夫之所為兄姊服妻降一等今妻毆夫緦麻以上尊長減夫一等以從夫為服罪亦降夫註云減罪輕者加凢鬬傷一等謂故毆緦麻兄姊折一支合流二千五百里妻若減夫一等徒三年故毆凢人折一支既合流二千里即是減罪輕加凢人一等流二千五百里是減罪輕者加凢鬬傷一等妾犯者不減妾犯尊長即與夫同死者各斬謂毆尊長致死妻妾並合斬刑雖云減夫一等若本制服重即從重論假如毆夫之伯叔父母折肋當大功尊加凢人四等合流二千五百里若準夫減一等即徒三年名例律云當條雖有罪名所為重者自從重須準服加四等流二千五百里之類毆傷卑屬與夫毆同死者絞即毆殺夫之兄弟子流三千里故殺者絞妾犯者各從凢鬬之法若尊長毆傷卑幼之婦減凢人一等妾又減一等死者絞疏義曰毆傷卑屬謂是夫家卑屬與夫毆同謂毆夫之從父兄弟子孫之有服者折傷以上緦麻減凢人一等諸如此類並與夫同死者絞即毆殺夫之兄弟子流三千里故殺者絞妾犯者各同凢鬬法謂並依凢人鬬法科罪若尊長毆傷卑幼之婦謂夫之期親以下緦麻以上尊長毆傷卑幼之婦減凢人一等妾減凢人二等死者絞祖父母為人毆擊問答一諸祖父母父母為人所毆擊子孫即毆擊之非折傷者勿論折傷者減凢鬬折傷三等至死者依常律謂子孫原非隨從者疏義曰祖父母父母為人所毆擊子孫理合救之當即毆擊雖有損傷非折傷者無罪折傷者減凢鬬折傷三等謂折一齒令杖八十之類至死者謂毆前人致死合絞以刃殺者合斬故云依常律註云謂子孫原非隨從者若原隨從即依凢鬬首從論律文但稱祖父母父母為人所毆擊不論親疎尊卑其有祖父母父母之尊長毆擊祖父母父母依律毆之無罪者止可解救不得毆之輙即毆者自依鬬毆常法若夫之祖父母父母共妻之祖父母父母相毆子孫之婦亦不合即毆夫之祖父母父母如當毆者即依常律問曰主為人所毆擊部曲奴婢即毆擊之得同子孫之例與否答曰部曲奴婢非親不同子孫之例唯得解救不得毆擊鬬毆誤殺傷人問答三諸鬬毆而誤殺傷傍人者以鬬殺傷論至死者減一等疏義曰鬬毆而誤殺傷傍人者假如甲共乙鬬甲用刃杖欲擊乙誤中于丙或死或傷者以鬬殺傷論不從過失者以其原有害心故各依鬬法至死者減一等流三千里若以故僵仆而致死傷者以戲殺論即誤殺傷助己者各減二等疏義曰仰之謂僵伏之謂仆謂共人鬬毆失手足跌而致僵仆誤殺傷傍人者以戲殺論别條戲殺傷人者減鬬殺傷人二等謂殺者徒三年折一支者徒二年之類即誤殺傷助己者各減二等假如甲與乙共毆丙其甲誤毆乙致死減二等傷減二等或僵仆壓乙殺傷減戲殺傷二等殺乙從戲殺減二等總減四等合徒二年若壓折一支亦減四等徒一年是名各減二等問曰甲共子乙同謀毆丙而乙誤中其父因而致死得從誤殺傷助己減二等與否答曰律云鬬毆而誤殺傷傍人以鬬殺傷論但殺傷傍人坐當過失行者本為緣鬬故從鬬殺傷論若父來助己而誤殺者聼減二等便即輕于過失依例當條雖有罪名所為重者自從重論合從過失之坐處流三千里又問以鬬僵仆誤殺助己父母或雖非僵仆因鬬誤殺期親尊長各合何罪答曰以鬬僵仆誤殺父母或期親尊長若減罪輕于過失者並從過失之法又問假有數人同謀殺甲夜中怱遽乃誤殺乙合得何罪答曰此既本是謀殺與鬬毆不同鬬毆彼此相持謀殺潛行屠害毆甲誤中於丙尚以鬬殺傷論以其原無殺心至死聼減一等況復本謀害甲原作殺心雖誤殺乙原情非鬬者若其殺甲是謀殺人今既誤殺乙合科故殺罪部曲奴婢詈舊主問答一諸部曲奴婢詈舊主者徒二年毆者流二千里傷者絞殺者皆斬過失殺傷者依凢論疏義曰部曲奴婢詈舊主者徒二年毆者流二千里傷者絞有首從殺者皆斬罪無首從過失殺傷者並凖凢人收贖銅入傷殺之家即毆舊部曲奴婢折傷以上部曲減凢人二等奴婢又減二等過失殺者各勿論疏義曰主毆舊部曲奴婢折傷以上部曲減凢人二等謂折齒合杖九十奴婢又減二等合杖七十之類過失殺者勿論問曰部曲奴婢毆詈舊主期以下親或舊主親屬毆傷所親舊部曲奴婢得減凢人與否答曰五服尊卑各有血屬故毆尊長即絞加之至如奴婢部曲唯繫于主為經主放顧有宿恩其有毆詈所以加罪非主之外雖是親姻所有相犯並依凢人之法又問有人謀殺舊部曲奴婢或于舊部曲奴婢家强盜有絞傷者合減罪與否答曰毆舊部曲奴婢得減凢人爰至于死亦依減例明謀殺及諸雜犯合依減法唯盜財物特異常犯止依凢人之法不合減科戲殺傷人諸戲殺傷人者減鬬殺傷二等謂以力共戲至死和同者雖和以刃若乘髙履危入水中以故相殺傷者唯減一等即無官應贖而犯者依過失法收贖餘條非故犯無官應贖者並準此疏義曰戲殺傷人者謂以力共戲因而殺傷人減鬬罪二等若有貴賤尊卑長幼各依本鬬殺傷罪上減二等雖則以力共戲終須至死和同不相瞋恨而致死者雖和以刃禮云死而不弔者三謂畏壓溺況乎嬉戲或以金刃或乘髙處險或臨危履薄或入水中既在險危之所自須共相警戒因此共戲遂致殺傷雖即和同原情不合致有殺傷者唯減本殺傷罪一等即無官應贖謂有蔭及老小廢疾之類而犯應贖罪者依過失法收贖假有過失殺人贖銅一百二十斤戲殺得減二等贖銅六十斤即是輕重不類故依過失贖罪不從減法註云餘條非故犯謂一部律内諸條非故犯罪無官應得收贖者並準此假有甲為人合藥誤不如本方殺人合徒二年半若白丁則從真役若是官品之人合贖者不可徵銅五十斤亦徵一百二十斤則是餘條之類其不和同及於期親尊長外祖父母夫夫之祖父母雖和並不得為戲各從鬬殺傷法疏義曰謂戲者原不和同及于期親尊長外祖父母夫夫之祖父母此等尊長非應共戯縱雖和同並不得為戲各從鬬殺傷之法假有共期親尊長戲折一支者仍處絞之類過失殺傷人諸過失殺傷人者各依其状以贖論謂耳目所不及思慮所不到共舉重物力所不制若乘髙履危足跌及因擊禽獸以致殺傷之屬皆是疏義曰過失之事註文論之備矣殺傷人者各準殺傷本状依收贖之法註云謂耳目所不及假有投甎瓦及彈射耳不聞人聲目不見人出而致殺傷其思慮所不到者謂本是幽僻之所其處不應有人投瓦及石誤有殺傷或共舉重物而力所不制或共升髙險而足蹉跌或因擊禽獸而誤殺傷人者如此之類皆為過失稱之屬者謂若共捕盜賊誤殺傷旁人之類皆是其本應居作官當者自從本法宻告謀反大逆諸知謀反及大逆者宻告隨近官司不告者絞知謀大逆謀叛不告者流二千里知指斥乘輿及妖言不告者各減本罪五等官司承告不即掩捕經半日者各與不告罪同若事須經畧而違時限者不坐疏義曰謀反者謂知人潛謀欲危社稷大逆者謂知人于宗廟及山陵宫闕已有毁損並須宻告隨近官司知而不即告者絞若知謀大逆謂知始謀欲毁宗廟山陵等謀叛者謂知謀欲背國從偽亦須宻告官司不告者流二千里若知指斥乘輿謂情理切害及妖言者謂妄説休咎之言不告者各減本罪五等本應死者從死上減五等妖言惑不滿衆者流上減五等是名各減五等官司承告謀反以下不即掩捕若經半日者謂經五十刻不即掩捕各與不告罪同若事須經畧謂人衆既多須得人兵器仗如此經畧以故違時限而失罪人者不坐其知謀反以下雖不宻告隨近官司能自捕送者亦與宻告同因其自捕驚失罪人或已就拘執而失者並同失囚之法誣告謀反大逆諸誣告謀反及大逆者斬從者絞若事容不審原情非誣者上請若告謀大逆謀叛不審者亦如之疏義曰誣告謀反及大逆者謂知非反逆故欲誣之首合斬從合絞若事容不審者謂或奉别勑閲兵或欲修葺家廟見閲兵疑是欲反見修宗廟疑為大逆之類本情初非誣告者具状上請聼勑若告謀大逆謀叛不審亦合上請故云亦如之誣告反坐問答一諸誣告人者各反坐即糾彈之官挾私彈事不實者亦如之反坐致罪準前人入罪法至死而前人未決者聼減一等其本應加杖及贖者止依杖贖法即誣官人及有蔭者依常律疏義曰凢人有嫌遂相誣告者準誣罪輕重反坐告人即糾彈之官謂據令應合糾彈者若有憎惡前人或朋黨親戚挾私飾詐妄作糾彈者並同誣告之律反坐其罪準前人入罪之法至死而前人雖㫁訖未決者反坐之人聼減一等若誣人反逆雖復未決引虛不合減罪本應加杖者謂誣告部曲奴婢流罪若實部曲奴婢止加杖二百既虗誣告者不流亦準杖法反坐單丁應加杖者亦依決杖反坐及贖者謂誣告老小廢疾若實即前人合贖虗即反坐者亦依贖論即誣官人及有蔭者假有白丁誣七品官流罪若實官人即合例減官當如虗反坐還得流罪誣告有蔭之人事合減贖反坐之者不得準前人減贖法並真配徒流是名依常律若告二罪以上重事實及數事等但一事實除其罪重事虗反其所剰即罪至所止者所誣雖多不反坐疏義曰若告二罪以上重事實假有甲告乙毆人折一支合徒一年又告人盜絹五疋亦合徒一年或故殺他人馬一匹合徒一年半推殺馬是實毆盜是虗是名告二罪以上重事實又有丙告丁三事各徒一年此名數事等但一事實除其罪重事虗反其所剰者假如甲告乙盜絹五疋合徒一年又告故殺官私馬牛合徒一年半若其盜是實殺馬牛是虗即是剰告半年之罪反坐半年故云反其所剰即罪至所止者所誣雖多不反坐假有告人非監臨主司因事受財百疋勘當五十疋實坐贜五十疋罪止徒三年剰告五十疋為罪至所止不反坐之類其告二人以上雖實者多猶以虗者反坐謂告二人以上但一人不實罪雖輕猶反其坐若上表告人已經聞奏事有不實反坐輕罪者從上書詐不實論疏義曰告二人以上罪雖實者多猶以虗者反坐以其人事各别故得罪不同註云謂告二人以上但一人不實罪雖輕猶反其坐假有人告甲乙丙丁四人之罪三人徒罪以上並實一人笞罪事虛不得以實多放免仍從笞罪反坐若上表告人已經聞奏事有不實反坐罪輕于上書不實凖從上書詐不實處徒二年不應反坐者無罪假如甲上表告乙兩箇徒一年一實一虛準律既免反坐于甲無上書不實之罪告小事虗問答一諸告小事虗而獄官因其告檢得重事及事等者若類其事則除其罪離其事則依誣論疏義曰告小事虗而獄官因其告檢得重事者假有告人盜驢檢得盜馬其價又貴是為得重事及事等者假如告盜甲家馬檢得盜乙家騾其價相似是為事等若類其事謂騾馬驢等色目相類所告雖虗除其妄罪離其事者謂告人盜馬檢得鑄錢之屬是離其事則依本誣論仍得誣告盜馬之罪此條為依告状檢贜生文不同獄官状外求罪之例問曰告人私有弩獄官因告乃檢得甲是類事與否答曰稱類者謂其形状難辨原情非誣所以得除其罪然弩之與甲雖同禁兵論其形様色類全别事非疑似原状是誣如此之流不可為類誣告人流罪引虗問答一諸誣告人流罪以下前人未加拷掠而告人引虛者減一等若前人已拷者不減即拷證人亦是誣告期親尊長外祖父母夫夫之祖父母及奴婢部曲誣告主之期親外祖父母者雖引虗各不減疏義曰誣告死罪自有别制唯誣告人流罪以下前人未加拷掠而告人自引虛者得減反坐之罪一等若前人已拷者無問杖數多少然後引虗即不合減即拷證人亦是謂雖不拷被告之人拷傍證之者雖自引虗亦同已拷不減其誣告期親尊長以下及奴婢部曲誣告主之外祖父母以上雖即引虗各不合減問曰律云前人未加拷掠而告人引虗減一等未知前人已經㫁訖然後引虗合減與否答曰律文但言已加拷掠不言事經㫁訖拷訖已傷律有成制㫁訖未損理合減科若事經奏訖不合追減及已役已配亦是已損已傷前人計與拷掠義同不在減科之例告祖父母父母絞問答二諸告祖父母父母者絞謂非緣坐之罪及謀叛以上而故告者下條準此疏義曰父為子天有隱無犯如有違失理須諫諍起敬起孝無令陷罪若有忘情棄禮而故告者絞註云謂非緣坐之罪緣坐謂謀反大逆及謀叛以上皆為不臣故子孫告亦無罪緣坐同首法故雖父祖聽捕告若故告餘罪者父祖得同首例子孫處以絞刑下條準此者謂告期親尊長情在于惡欲令入罪而故告之故云準此若因推劾事不獲免隨辨注引不當告坐即嫡繼慈母殺其父及所養者殺其本生並聼告疏義曰嫡繼慈母者名例並已釋訖此等三母殺其父及所養父母殺其所生父母並聼告若嫡繼母殺其所生庶母亦不得告故律文但云殺其父者聽告問曰所生之母被出其父更娶繼妻其繼母乃殺所出之母出母之子合告與否答曰所養父母本是他人殺其所生故律聽告今言出母即是所生名例稱犯夫及義絶者得以子蔭即子之於母孝愛情深顧復之思終無絶道繼母殺其親母準例亦合聽告又問嫡繼慈母有所規求故殺子孫合得何罪又子孫得自理訴與否此母或被出或父卒後行若為科㫁答曰子孫之於祖父母父母皆有祖父子孫之名其有相犯之文多不據服而㫁賊盜律有所規求而故殺期以下卑幼者絞論服相犯例準傍期在于子孫不入期服然嫡繼慈養依例雖同親母被出改嫁禮制便與親母不同其改嫁者唯止服期依令不合解官據禮又無心喪雖曰子孫唯凖期親卑幼若犯此母亦同期親尊長被出者禮既無服並同凡人其應理訴亦依此法唐律疏義卷二十三欽定四庫全書唐律疏義卷二十四唐長孫無忌等撰鬬訟四凢一十六條告期親尊長問答一
