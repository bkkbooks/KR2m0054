front:
  text: 一十七條
  hash: sha256:1cc2760d2ffa7bbc9a12d7ddbe7e4e3f9148faf671df74f28efce47ce42e4050
body:
  text: 奉使部送顧寄人諸奉使有所部送而顧人寄人者杖一百闕事者徒一年受寄顧者减一等疏義曰奉使有所部送謂差為綱典部送官物及囚徒畜産之屬而使者不行乃顧人寄人而領送者使人合杖一百闕事者謂於前事有所廢闕合徒一年其受寄及受顧者不闕事杖九十闕事杖一百故云减一等即綱典自相放代者笞五十取財者坐贓論闕事者依寄顧闕事法仍以綱為首典為從疏義曰或綱獨部送而放典不行或典自領行而留綱不去此為自相放代笞五十受財者坐贓論其闕事及不闕事并受財輸財者皆以綱為首典為從假有兩綱兩典一綱一典取財代行一綱一典與財得住與財者坐贓論减五等縱典發意亦以綱為首典為從取財者坐贓論其贓既足彼此俱罪仍合没官其受顧者已减使罪一等不合計贓科罪其贓不徵若監臨官司將所部典行放取物者並同監臨受財之法不同綱典之罪即雖監臨元止一典放住代行者亦同綱典之例長吏輙立碑諸在官長吏實無政迹輙立碑者徒一年若遣人妄稱已善申請於上者杖一百有贓重者坐贓論受遣者各减一等雖有政迹而自遣者亦同疏義曰在官長吏謂内外百司長官以下臨統所部者未能導徳齊禮移風易俗實無政迹妄述已功崇飾虛辭諷諭所部輙立碑頌者徒一年所部為其立碑頌者為從坐若遣人妄稱已善申請於上者杖一百若虛状上表者從上書詐不實徒二年有贓重者坐贓論謂計贓重於本罪者從贓而斷受遣者各减一等各謂立碑者徒一年上减申請於上者杖一百上减若官人不遣立碑百姓自立及妄申請者從不應為重科杖八十其碑除毁注雖有政迹而自遣者亦同疏義曰官人雖有政迹而自遣所部立碑或遣申請者官人亦依前科罪若所部自立及自申上不知不遣者不坐有所請求諸有所請求者笞五十謂從主司求曲法之事即為人請者與自請同主司許者與同罪主司不許及請求者皆不坐已施行者各杖一百疏義曰凡是公事各依正理輙有請求規為曲法者笞五十即為人請求雖非已事與自請同亦笞五十主司許者謂然其所請亦笞五十故云與同罪若主司不許及請求之人皆不坐已施行謂曲法之事已行主司及諸求之者各杖一百本罪仍坐所枉罪重者主司以出入人罪論他人及親屬為請求者减主司罪三等自請求者加本罪一等疏義曰所枉重者謂所司得嘱請枉曲斷事重於一百杖者主司得出入人罪論假如先是一年徒罪囑請免徒主司得出入徒罪還得一年徒坐他人及親屬為請求者减主司罪三等唯合杖八十此則减罪輕於已施行杖一百如此之類皆依杖一百科之若他人親屬等囑請徒二年半罪主司曲為斷免者他人等减三等仍合徒一年如此之類减罪重於杖一百者皆從减科若身自請求而得枉法者各加所請求罪一等科之即監臨勢要勢要者雖官卑亦同為人囑請者杖一百所枉重者罪與主司同至死者减一等疏義曰監臨者謂統攝案驗之官勢要者謂除監臨以外但是官人不限階品髙下唯據主司畏懼不敢乖違者雖官卑亦同為人囑請曲法者無問行與不行許與不許但囑即合杖一百主司許者笞五十所枉重於杖一百與主司出入坐同主司據法合死者監臨勢要合减死一等受人財請求諸受人財而為請求者坐贓論加二等監臨勢要凖枉法論與財者坐贓論减三等疏義曰受人財而為請求者謂非監臨之官坐贓論加二等即一尺以上笞四十一疋加一等罪止流二千五百里監臨勢要凖枉法論即一尺以上杖一百一疋加一等罪止流三千里無禄者减一等與財者坐贓論减三等罪止徒一年半若受他人之財許為囑請未囑事發者止從坐贓之罪若無心囑請詭妄受財自依詐欺科斷取者雖是詐欺與人終是求請其贓亦合追没其受所監臨之財為他司囑請律無别文止從坐贓加二等罪止流二千五百里即重於受所監臨若未囑事發止同受所監臨財物法若官人以所受之財分求餘官元受者併贓論餘各依已分法疏義曰謂有官之人初受有事家財物後减所受之物轉求餘官初受者併贓論餘官各依已分法假有判官受得枉法贓十疋更有兩官連判各分二疋與之判官得十疋之罪餘官各得二疋之坐二人仍並為二疋之從其有共謀受財分贓入已者亦各依已分為首從之法其中雖有造意及以預謀不受財者事若枉法止依曲法首從論不合據贓為罪如曲法罪輕從知所部有犯法不舉劾减罪人罪三等科之有事以財行求諸有事以財行求得枉法者坐贓論不枉法者减二等即同事共與者首則併贓論從者各依已分法疏義曰有事之人用財行求而得枉法者坐贓論不枉法者謂雖以財行求官人不為曲判者减坐贓二等即同事共與者謂數人同犯一事歛財共與元謀歛者併贓為首仍倍論其從而出財者各依已分為從監主受財枉法諸監臨主司受財而枉法者一尺杖一百一疋加一等十五疋絞疏義曰監臨主司謂統攝案驗及行案主典之類受有事人財而曲法處斷者一尺杖一百一疋加一等十五疋絞不枉法者一尺杖九十二疋加一等三十疋加役流疏義曰雖受有事人財判斷不為曲法一尺杖九十二疋加一等三十疋加役流無禄者各减一等枉法者二十疋絞不枉法者四十疋加役流疏義曰應食禄者具在禄令若令文不載者並是無禄之官受財者各减有禄一等枉法者二十疋絞不枉法者四十疋加役流有事先不許財諸有事先不許財事過之後而受財者事若枉凖枉法論事不枉者以受所監臨財物論疏義曰官司推劾之時有事者先不許物事了之後而受財者事若曲法凖前條枉法科罪既稱凖枉法不在除免加役流之例若當時處斷不違正理事過之後而與之財者即以受所監臨財物論受所監臨財物諸監臨之官受所監臨財物者一尺笞四十一疋加一等八疋徒一年八疋加一等五十疋流二千里與者减五等罪止杖一百疏義曰監臨之官不因公事而受監臨内財物者計贓一尺以上笞四十一疋加一等八疋徒一年八疋加一等五十疋流二千里與財之人减監臨罪五等罪止杖一百乞取者加一等强乞取者凖枉法論疏義曰乞取者加一等謂非財主自與而官人從乞者加受所監臨罪一等以威若力强乞取者凖枉法論有禄無禄各依本法其因得相送而更强乞取者既是一事分為二罪以重法併滿輕法若是頻犯及二人以上之物仍合累併倍論因使受送饋諸官人因使於使所受送饋及乞取者與監臨同經過處取者减一等紏弹之官不减即强乞取者各與監臨罪同疏義曰官人因使於所使之處受送饋財物或自乞取者計贓凖罪與監臨官同經過處取者謂非所詣之處因使經厯之所而取財者减一等紏弹之官不减者謂職合紏弹之官人所畏懼雖經過之處受送遺乞取及强乞取者各與監臨罪同貸所監臨財物問答一諸貸所監臨財物者坐贓論後訖未上亦同餘條取受及相犯並凖此若百日不還以受所監臨財物論强者各加二等餘條强者凖此疏義曰監臨之官於所部貸財物者坐贓論注云授訖未上者若五品以上據制出日六品以下據晝訖並同已上之法餘條取受及相犯謂受所監臨及毆詈之類故言凖此若百日不還為其淹日不償以受所監臨財物論若以威力而强貸者各加二等謂百日内坐贓論加二等滿百日外從受所監臨財物上加二等注云餘條强者凖此謂如下條私役使及借駞騾驢馬之類强者各加二等但一部律内本條無强取罪名並加二等故於此立例所貸之物元非擬將入已雖經恩免罪物尚徵還縱不經恩償訖事發亦不合罪為貸時本許酬償不同悔過還主故也若取受之贓悔過還主仍减三等恩前費用凖法不徵貸者赦後仍徵償訖故聴免罪若賣買有剰利者計利以乞取監臨財物論强市者笞五十有剰利者計利凖枉法論疏義曰官人於所部賣物及買物計時估有剰利者計利以乞取監臨財物論强市者笞五十謂以威若力强買物雖當價猶笞五十有剰利者計利凖枉法論問曰官人遣人或市司而為市易所遣之人及市司為官人賣買有剰利官人不知情及知情各有何罪答曰依律犯時不知依凢論官人不知剰利之情據律不合得罪所為市者雖不入已既有剰利或强賣買不得無罪從不應為凖官人應坐之罪百杖以下所市之人從不應為輕笞四十徒罪以上從不應為重杖八十仍不得重於官人應得之罪若市易已訖官人知情凖家人所犯知情之法即斷契有數違負不還過五十日者以受所監臨財物論即借衣服器翫之屬經三十日不還者坐贓論罪止徒一年疏義曰官人於所部市易斷契有數仍有欠物違負不還五十日以下依雜律科負債違契不償之罪滿五十一日以受所監臨財物論即借衣服器翫之屬者但衣服器物品類至多不可具舉故云之屬借經三十日不還者坐贓論罪止徒一年所借之物各還主役使所監臨諸監臨之官私役使所監臨及借奴婢牛馬駞騾驢車船碾磑邸店之類各計庸賃以受所監臨財物論疏義曰監臨之官私役使所部之人及從所部借奴婢牛馬駞騾驢車船碾磑邸店之類稱奴婢者部曲客女亦同各計庸賃之價人畜車計庸船以下凖賃以受所監臨財物論强者加二等其借使人功計庸一日絹三尺人有强弱力役不同若年十六以上六十九以下犯罪徒役其身庸依丁例其十五以下七十以上及廢疾既不任徒役庸力合减正丁宜凖當鄉庸作之價若凖價不充絹三尺即依减價計贓科罪其價不减者還依丁例即役使非供已者非供已謂流外官及雜任應供官事者計庸坐贓論罪止杖一百其應供已驅使而收庸直者罪亦如之供已求輸庸直者不坐疏義曰非供已謂流外官者謂諸司令史以下有流外告身者雜任謂在官供事無流外品為其合在公家驅使故得罪輕於凢人不合供官人之身計庸坐贓致罪一尺笞二十一疋加一等罪止杖一百其應供已驅使者謂執衣白直之類止合供身驅使據法不合收庸而收庸直亦坐贓論罪止杖一百故云亦如之注云供已求輸庸直謂有公案者不坐别格聴收庸直者不拘此例若有吉凶借使所監臨者不得過二十人人不得過五日其於親屬雖過限及受饋乞貸皆勿論親屬謂緦麻以上及大功以上婚姻之家餘條親屬皆凖此疏義曰吉謂冠婚或祭享家廟凶謂䘮葬或舉哀及殯殮之類聴許借使監臨部内所使搃數不得過二十人毎人不得過五日其於親屬雖過限謂親屬别於數限外驅使及受饋餉財物飲食或有乞貸皆勿論親屬謂本服緦麻以上親及大功以上親共為婚姻之家並通受饋餉借貸役使依法無罪餘條親屬凖此者謂一部律内稱親屬處悉㨿本服内外緦麻以上及大功以上共為婚姻之家故云凖此營公廨借使者計庸賃坐贓論减二等即因市易剩利及懸欠者亦如之疏義曰借使所監臨奴婢牛馬車船碾磑邸店之類為營公廨使者各計庸賃坐贓論减二等即為公廨市易剩利及懸欠其價不還者亦計所剰及懸欠坐贓論减二等故云亦如之監臨受供饋諸監臨之官受猪羊供饋謂非生者坐贓論强者依强取監臨財物法疏義曰監臨之官於所部内受猪羊供饋者即是殺訖始送故注云謂非生者舉猪羊為例自餘禽獸之類皆是各計其所直坐贓論强取者依强取監臨財物法計贓凖枉法論其有酒食𤓰果之類而受者亦同供饋之例見在物徵還主若以畜産及米麺之屬饋餉者自從受所監臨財物法其贓没官率歛監臨財物諸率歛所監臨財物饋遺人者雖不入已以受所監臨財物論疏義曰率歛者謂率人歛物或以身率人以取財物饋遺人者雖不入已併倍以受所監臨財物論若自入者同乞取法既是率歛之物與者不合有罪其物還主監臨家人乞借問答一諸監臨之官家人於所部有受乞借貸役使賣買有剩利之屬各减官人罪二等官人知情與同罪不知情者各减家人罪五等疏義曰臨統案驗為監臨注云謂州縣鎮戍折衝府等判官以上搃為監臨自餘唯據臨統本司及有所案驗者此等之官家人於其部内有受財乞物借貸役使賣買有剩利之屬者各减官人身犯二等若官人知情者並與家人同罪其不知情者各减家人罪五等謂凖身自犯得减七等其在官非監臨及家人有犯者各减監臨及監臨家人一等疏義曰在官非監臨者謂非州縣鎮戍折衝府判官以上其諸州叅軍事及小錄事於所部不得常為監臨此為在官非監臨若有事在手便為有所案驗即是監臨主司無所案驗者有所受乞借貸役使賣買及假賃有剩利之屬知情不知情各减監臨之官罪一等家人有犯亦减監臨家人罪一等問曰州縣鎮戌折衝府判官以上於所部緫為監臨自餘唯據臨統本司及有所案驗者里正坊正既無官品於所部内有犯得作監臨之官以否答曰有所請求及枉法不枉法律文皆稱監臨主司明為監統案驗之人不限有品無品但職掌其事即名監臨主司其里正坊正職在驅催既無官品並不同監臨之例止從在官非監臨各减監臨之官罪一等去官受舊官屬諸去官而受舊官屬士庻饋與若乞取借貸之屬各减在官時三等謂家口未離本任所者疏義曰舊官屬謂前任所僚佐士庻謂舊所管部人受其饋送財物若乞取借貸之屬謂賣買假賃有剩利役使之類各减在官時三等並謂家人未離本任所者其家口去訖受饋餉者律無罪名若其乞索者從因官挾勢乞索之法挾勢乞索諸因官挾勢及豪强之人乞索者坐贓論减一等將送者為從坐親故相與者勿論疏義曰或有因官人之威挾恃形勢及鄉閭首望豪右之人乞索財物者累倍所乞之財坐贓論减一等将送者為從坐謂領豪右人等乞索者雖不將領而歛財送者並為從坐若强乞索者加二等注云親故相與者勿論親謂本服緦麻以上及大功以上婚姻之家故謂素是通家或欽風若舊車馬不吝縞紵相貽之類者皆勿論稱律令式諸稱律令式不便於事者皆須申尚書省議定奏聞若不申議輙奏改行者徒二年即詣闕上表者不坐疏義曰稱律令及式條内有事不便於時者皆須辯明不便之狀具申尚書省集京官七品以上於都座議定以應改張之議奏聞若不申尚書省議輙即奏請改行者徒二年謂直述所見但奏改者即詣闕上表論律令及式不便於時者不坐若先違令式而後奏改者亦徒二年若違重者自從重斷唐律疏義卷十一欽定四庫全書唐律疏義卷十二唐長孫無忌等撰户婚上
