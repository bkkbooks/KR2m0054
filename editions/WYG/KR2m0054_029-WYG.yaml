seq: 29
front:
  text: 獄律之名起自於魏魏分里悝囚法而出此篇
  hash: sha256:53d6c68ab93151000d0f175278e2ef8ea212f057dddd6e1a9787eaa170d25284
body:
  text: 至北齊與捕律相合更名捕斷律至後周復為斷獄律釋名云獄者确也以實囚情臯陶造獄夏曰夏臺殷曰羑里周曰圜土秦曰囹圄漢以来名獄然諸篇罪名各有類例訊捨出入各立章程此篇錯綜一部條流以為决斷之法故承衆篇之下囚應禁而不禁諸囚應禁而不禁應枷鏁杻而不枷鏁杻及脱去者杖罪笞三十徒罪以上逓加一等廻易所著各减一等䟽義曰獄官令禁囚死罪枷杻婦人及流以下去杻其杖罪散禁又條應議請减者犯流以上若除免官當並鏁禁即是犯笞者不合禁杖罪以上始合禁推其有犯杖罪不禁應枷鏁杻而不加鏁杻及脱去者缺笞三十徒罪不禁及不枷鏁若脱去者笞四十流罪不禁及不枷鏁若脱去者笞五十死罪不禁及不枷鏁枷若脱去者杖六十是名逓加一等廽易所著者各减一等謂應枷而鏁應鏁而枷是名廽易所著徒罪者笞三十流罪笞四十死罪笞五十即囚自脱去及廻易所著者罪亦如之若不應禁而禁及不應枷鏁杻而枷鏁杻者杖六十䟽義曰即囚自擅脱去枷鏁杻者徒罪笞四十流罪以上逓加一等即囚自廻易所著者各减一等故云亦如之若不應禁而禁及不應枷鏁杻而枷鏁杻並謂據令不合者各杖六十與囚金刄解脱諸以金刃及他物可以自殺及解脱而與囚者杖一百若囚以故逃亡及自傷傷人者徒一年自殺殺人者徒二年若囚本犯流罪以上因得逃亡雖無傷殺亦凖此䟽義曰金刄謂錐刀之属他物謂繩鋸之類可以自殺及解脱枷鏁雖囚之親属及他人與者物雖未用與者即杖一百若以得金刃等故因得迯亡或自傷害或傷他人與物者徒一年若囚自殺或殺他人與物者徒二年若囚本犯流罪以上因得金刃等物而得逃亡者雖無殺傷與物者亦徒二年即囚因逃亡未斷之間能自捕得及他人捕得若囚自首及已死各减一等即子孫以可解脱之物與祖父母父母部曲奴婢與主者罪亦同䟽義曰謂囚因得金刄及他物之故以自解脱而得逃走與物人罪未斷之間能自捕得及他人捕得若囚自来歸首及囚自死或他人殺之者亦同各减一等謂徒以下囚逃者一年徒上减流死囚逃者二年徒上减即子孫以可解脱之物謂稱孫者曽𤣥同而與祖父母父母或部曲奴婢與主者並與凢人罪同亦不合輙自捕捉若官司遣捕而送者無罪自捕送官者同告法若有傷殺而逃亡者後能捕獲與物之人各依前傷殺之罪不合减科死罪囚辭窮竟問荅一諸死罪囚辭窮竟而囚之親故為囚所遣雇倩人殺之及殺之者各依本殺罪减二等囚若不遣雇倩及辭未窮竟而殺各以闘殺傷論至死者加役流䟽義曰謂犯死罪囚辭状窮竟而囚之緦麻以上親及故舊為囚所遣或雇人倩人而殺訖者其所遣雇倩之人及受雇倩殺者各依尊卑貴賤本殺罪上减二等科之囚若不遣親知雇倩人殺及囚雖遣雇倩人殺而辭状未窮竟而殺者其所遣之人及受雇倩者各依尊卑貴賤以闘殺罪論至死者加役流問曰其囚本犯死罪辭未窮竟又不遣人雇倩殺之而囚之親故雇倩人殺及殺之者合得何罪答曰辭雖窮竟不遣雇倩人殺之雖遣雇倩殺之辭未窮竟此等二事各依闘殺為罪至死者加役流若辭未窮竟復不遣雇倩殺之而輙殺者各同闘殺之法至死者並皆缺不合加役流辭雖窮竟而子孫於祖父母父母部曲奴婢於主者皆以故殺罪論䟽義曰辭雖窮竟謂死罪辯定訖而子孫於祖父母父母部曲奴婢於主雖被祖父母父母及主所遣而輙殺者及雇人倩人殺者其子孫及部曲奴婢皆以故殺罪論子孫仍入惡逆部曲奴婢經赦不原其被雇倩之人仍同上解减闘殺罪二等主守導令囚翻異諸主守受囚財物導令翻異及與通傳言語有所増减者以枉法論十五疋加役流三十疋絞䟽義曰主守謂専當掌囚典獄之属受囚財物導引其囚令翻異文辯及得官司若文證外人言語為報告通傳有所増减其罪者以枉法論依無祿枉法受財一尺杖九十一疋加一等十五疋加役流三十疋絞贓輕及不受財者减故出入人罪一等無所増减者笞五十受財以受所監臨財物論其非主守而犯者各减主守一等䟽義曰贓輕謂受贓得罪輕於减囚罪一等者及不受財唯通言語减故出入罪一等謂導令翻異及通傳言語出入囚死罪者處流三千里出入流罪以下各减本罪一等之類雖即教導及通傳言語於囚罪無所増减者笞五十若無増减而受財者以受所監臨財物論一尺笞四十一疋加一等八疋徒一年其非主守而犯者謂非監當囚人而有外人導囚翻異有所増减各减主守罪一等若受贓財於主守贓上减一等若不受財者於囚罪上减二等雖通言語無所増减笞四十囚給衣食醫藥諸囚應請給衣食醫藥而不請給及應聽家人入視而不聽應脱去枷鏁杻而不脱去者杖六十以故致死者徒一年即减竊囚食笞五十以故致死者絞䟽義曰凖獄官令囚去家懸逺絶餉者官給衣糧家人至日依數徴納囚有疾病主司陳牒請給醫藥救療此等應合請給而主司不為請給及主司不即給凖令病重聽家人入視而不聽及應脱去枷鏁杻而所司不為脱去者所由官司合杖六十以故致死者謂不為請及雖請不即為給衣糧醫藥病重不許家人入視及不脱去枷鏁杻由此致死者所由官司徒一年即减竊囚食者不限多少笞五十者由减竊囚食其囚以故致死者减竊之人合絞八議請减老小問荅一諸應議請减若年七十以上十五以下及廢疾者並不合栲訊皆據衆證定罪違者以故失論若證不足告者不反坐䟽義曰應議謂在名例八議人請謂應議者期以上親及孫若官爵五品以上者减謂七品以上之官及五品以上之祖父母父母兄弟姊妹妻子孫者若年七十以上十五以下及廢疾依令一支廢腰脊折瘕瘂侏儒等並不合拷訊皆據衆證定罪稱衆者三人以上明證其事始合定罪違者以故失論謂不合拷訊而故拷訊致罪有出入者即依下條故出入人及失出入人罪法其罪雖無出入而枉拷者依前人不合捶拷法以闘殺傷論至死者加役流即以闘殺傷為故失若證不滿三人告者不反坐被告之人亦不合入罪問曰所告之事證有二人一人證是一人證非證既不足合科疑罪以否答曰律云據衆證定罪稱衆者三人以上若證不足告者不反坐察驗難明二人證實猶故不合入罪况一實一虗被告之人全不合坐其於告者亦得免科若全無證人自須審察虚實以状斷之若三人證實二人證虛是名疑罪此解並據應議請减以下及廢疾以上除此色外自合拷取實情拷滿不服反拷告人不合從衆證科斷其於律得相容隱即年八十以上十嵗以下及篤疾皆不得令其為證違者减罪人罪三等䟽義曰其於律得相容隱謂同居若大功以上親及外祖父母外孫若孫之婦夫之兄弟及兄弟妻及部曲奴婢得為主隱其八十以上十嵗以下及篤疾以其不堪加刑故並不許為證若違律遣證减罪人罪三等謂遣證徒一年所司合杖八十之類囚引人為徒侣諸囚在案妄引人為徒侣者以誣告罪論即本犯雖死仍凖流徒加杖及贖法䟽義曰囚在案妄引人為徒侣者謂盗發者妄引人為同盗殺人者妄引人為同行之類以誣告罪論謂依闘訟律誣告人者各反坐即本犯應死不可累加故凖流徒加杖法其應贖者即凖流徒贖之訊囚察辭理諸應訊囚者必先以情審察辭理反覆㕘驗猶未能决事須訊問者立案同判然後拷訊違者杖六十䟽義曰依獄官令察獄之官先備五聽又驗諸證信事状疑似猶不首實者然後拷掠故拷囚之義先察其情審其辭理反覆案状㕘驗是非猶未能决謂事不明辯未能斷决事須訊問者立案取見在長官同判然後拷訊若充使推勘及無官同判者得自别拷若不以情審察及反覆㕘驗而輙拷者合杖六十若贓状露驗理不可疑雖不承引即據状斷之若事已經赦雖須追究並不合拷謂㑹赦移鄉及除免之類䟽義曰若贓状露驗謂計贓者見獲真贓殺人者檢得實状贓状明白理不可疑問雖不承聽據状科斷若事已經赦者雖須更有追究並不合拷註云謂㑹赦移鄉及除免之類謂殺人㑹赦仍合移鄉犯十惡故殺人反逆縁坐㑹赦猶除名監臨主守於監守犯姦盗略人若受財而枉法㑹赦仍合免所居官稱之類謂㑹赦免死猶流及盗詐枉法猶徴正贓故云之類拷囚不過三度諸拷囚不得過三度數總不得過二百杖罪以下不得過所犯之數拷滿不承取保放之䟽義曰依獄官令拷囚每訊相去二十日若拷未畢更移他司仍須拷鞫即通計前訊以充三度故此條拷囚不得過三度杖數總不得二百杖罪以下謂本犯杖罪以下笞十以上推問不承若欲須拷不得過所犯笞杖之數謂本犯一百杖拷一百不承取保放免之類若本犯雖徒一年應拷者亦得拷滿二百拷滿不承取保放之若拷過三度及杖外以他法拷掠者杖一百杖數過者反坐所剰以故致死者徒二年䟽義曰拷過三度謂雖二百杖不得拷過三度及杖外以他法拷掠謂拷囚於法杖之外或以繩懸縳或用棒拷打但應行杖外悉為他法犯者合杖一百杖數過者反坐所剰謂囚本犯杖一百乃拷二百官司得一百剰罪之類以故致死者謂拷過三度或用他法及杖數有過而致死者徒二年即有瘡病不待差而拷者亦杖一百若决杖笞者笞五十以故致死者徒一年半若依法拷决而邂追致死者勿論仍令長官等勘驗違者杖六十拷决之失立案不立案等䟽義曰拷雖依法囚身有瘡若病不待差而拷者杖一百若决杖笞者笞五十若囚瘡病未差而拷及决杖笞致死者徒一年半若依法用杖依數拷决而囚邂逅致死者勿論邂逅謂不期致死而死詩云邂逅相遇言不期而遇仍長官以下並親自檢勘知無他故具為文案若長官等不即勘檢者杖六十註云拷决之失謂訊囚及决杖笞於法有失者立案不立案等其有失者依職制律失者聽减三等拷囚限滿不首問荅一諸拷囚限滿而不首者反拷告人其被殺被盗及家人親属告者不反拷被水大損敗者亦同拷滿不首取保並放違者以故失論䟽義曰囚拷經三度杖數滿二百而不首反拷告人謂還凖前人拷數反拷告人拷滿復不首取保釋放其被殺被盗之家若家人及親属告者所訴盗殺之人被拷滿不首者各不反拷告人以殺盗事重例多隐匿反拷告者或不敢言若被人决水入家放火燒宅之類家人及親属告言者亦不反拷告人拷滿不首取保並放違者以故失論違謂若應反拷而不反拷及不應反拷而反拷者若故依故出入法失者依失出入論其本法不合拷而拷者依前人不合捶拷法亦以故失論其應取保放而不放者從不應禁而禁不取保放者於律有違當不應得為流以上從重徒罪以下從輕問曰律云拷滿不首反拷告人其告人是應議請减人既不合反拷其事若為與奪答曰律稱反拷告人明須凖前人杖數反拷若前人被拷罪不首告者亦反拷若前人止拷一百不首告者亦反拷一百是名反拷告人其應議請减人不合反拷須凖前人拷杖數徴銅鞫獄停囚待對諸鞫獄官停囚待對問者雖職不相管皆聽直牒追攝雖下司亦聽牒至不即遣者笞五十三日以上杖一百䟽義曰鞫獄官謂推鞫主司停囚待對問謂囚徒侣見在他所須追對問者雖職不相管皆聽直牒稱直牒者謂不縁所管上司直牒所管追攝註云雖下司亦聽假如大理及州縣官須追省䑓之人皆得直牒追攝牒至皆須即遣不即遣者笞五十三日以上杖一百依告状鞫獄諸鞫獄者皆須依所告状鞫之若於本状之外别求他罪者以故入人罪論䟽義曰鞫獄者推鞫之官皆須依所告本状推之若於本状之外傍更推問别求得笞杖徒流及死罪者同故入人罪之類若因其告状或應掩捕搜檢因而檢得别罪者亦得推之其監臨主司於所部告状之外知有别罪者即須舉牒别更紏論不得因前告状而輙推鞫若非監臨之官亦不得状外别舉推勘囚徒伴稽送併論諸鞫獄官囚徒伴在他所者聽移送先繫處併論之謂輕從重若輕重等少從多多少等後從先若禁處相去百里外者各從事發處斷之違者杖一百䟽義曰鞫獄官囚徒伴在他所者假有諸縣相去各百里内東縣先有繫囚西縣囚復事發其事相連應須對鞫聽移後發之囚送先繫之處併論之註云謂輕從重謂輕罪發雖在先仍移輕以就重若輕重等少從多謂兩縣之囚罪名輕重等者少處發雖在先仍移就多處若多少等即移後繫囚從先繫處若禁囚之所相去百里外者各從事發處斷之既恐失脱囚徒又慮漏泄情状故令當處斷之違者各杖一百若違法移囚即令當處受而推之申所管属推劾若囚至不受及受而不申者亦與移囚罪同䟽義曰違法移囚謂移重就輕或移多就少之類即令當處受而推之謂囚至之處即合受推仍申所管之州推劾謂两縣囚申州兩州囚申省並依状推劾囚至不肯為受或受囚不申管属與擅移囚罪同亦杖一百即擅移囚縣各𨽻别州者即受囚之縣申所管之州轉牒送囚之州依法推劾此等移囚並謂两處事發若是一處事發者不限逺近皆須直牒追攝如有違者自從上法决罰不如法諸决罰不如法者笞三十以故致死徒一年即杖麤細長短不依法者罪亦如之䟽義曰依獄官令决笞者腿臀分受决杖者背腿臀分受須數等拷訊者亦同笞以下願背腿分受者聽决罰不依此條是不如法合笞三十以此决罰不如法而致死者徒一年依令杖皆削去節目長三尺五寸訊囚杖大頭徑三分二釐小頭二分二釐常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分五釐謂杖長短麤細不依令者笞三十以故致死者徒一年故云亦如之唐律疏義卷二十九欽定四庫全書唐律䟽義卷三十唐長孫無忌等撰斷獄下
