front:
  text: 一十五條
  hash: sha256:8aba9ac4ad786c1f4f74ecbbb646f624665bfe567ab72031d80beef40b1efda2
body:
  text: 宿衛兵仗諸宿衛者兵仗不得逺身違者杖六十若輙離職掌加一等别處宿者又加一等主帥以上各加二等疏義曰兵仗者謂横刀常帶其甲矟弓箭之類有時應執者者並不得逺身不應執帶者常自近身輙逺身者各杖六十其職掌之處依次坐立輙離職掌加一等合杖七十即於别處宿者又加一等合杖八十主帥以上各加二等稱主帥以上謂隊副以上至大將軍以下兵仗逺身杖八十輙離職掌杖九十别處宿者杖一百是各加二等行宫營門諸行宫外營門次營門與宫門内同營牙帳門與殿門同御幕門與上閤同至御所依上條疏義曰行宫謂車駕行幸及所至安置之處外營門次營門與宫門同䦨入者得徒二年内營牙帳門與殿門同䦨入者得徒二年半御幕門與上閤同䦨入者絞至御在所依上條合斬自餘諸犯或以䦨入論及應加減者並同正宫殿之法宫内外行夜諸宫内外行夜若有犯法行夜主司不覺減守衛者罪二等疏義曰宫内外行夜並置鋪持更即是守衛者又有探更行更之人此行夜者若當探行之處有犯法者行夜主司不覺減守衛者罪二等謂上條䦨入及越垣守衛不覺減二等注云守衛謂持時専當者行夜主司不覺犯法皆減此持時専當人罪二等犯廟社禁苑罪名諸本條無犯廟社及禁苑罪名者廟減宫一等社減廟一等禁苑與社同疏義曰䦨入廟社及禁苑本條各有罪名其不立罪名之處謂䦨入至閾未踰因入輙宿之類各随輕重廟減宫一等社減廟一等禁苑與社同即向廟社禁苑射及放彈投瓦石殺傷人者各以鬭殺傷論至死者加役流疏義曰廟社及禁苑非人射及放彈投瓦石之所若有輙向射及放彈投瓦石殺傷人者各依闘殺傷人罪法若箭傷徒二年瞎一目徒三年之類至死者唯處加役流即箭至隊仗若闢仗内者絞疏義曰駕行皆有隊仗或闢仗而行忽有人射箭至隊仗所及至闢仗内者各得絞罪宫門等冒名守衛問答一諸於宫城門外若皇城門守衛以非應守衛人冒名自代及代之者各徒一年疏義曰謂宫城門外隊仗及傍城助鋪所及朱雀等門所有守衛之處以非應守衛人冒名自代若代之者各得徒一年以應守衛人代者各杖一百京城門各減一等疏義曰謂以當色下直非當上之人自代及代之者各杖一百京城門各減一等者謂明徳等諸門非應守衛人自代從一年徒上減一等以應守衛人自代從一百杖上減一等其在諸處守當者各又減二等餘犯應坐者各減宿衛罪三等疏義曰其在諸處謂非皇城京城等門自餘内外捉道守鋪及别守當之處相冐代者各減京城二等以非應守衛人自代及代之者各杖八十以應守衛人自代及代之者各杖七十餘犯應坐者謂相冒代之外餘犯或兵仗逺身輙離職掌及擅配割或别驅使之類本條應坐者各減宿衛人罪三等若逃走違畨不在減例問曰宿衛人以非應宿衛人冐名自代及代之者入宫内流三千里殿内絞若未入宫殿内事發合得何罪答曰以非應宿衛人自代重於䦨入之罪若未至職掌之處事發在宫殿内止依闌入宫殿而科如未入宫門事發律無正條宜依不應為重杖八十其在宫外諸處冐代未至職掌處從不應為輕笞四十越州鎮戍等垣城諸越州鎮戍城及武庫垣徒一年縣城杖九十皆謂有門禁者疏義曰諸州及鎮戍之所各自有城若越城及武庫垣者各合徒一年越縣城杖九十縱無城垣籬柵亦是注云皆謂有門禁者其州鎮戍在城内安置若不越城直越州鎮垣者止同下文越官府廨垣之罪越官府廨垣及坊市垣籬者杖七十侵壊者亦如之從溝瀆内出入者與越罪同越而未過減一等餘條未過準此疏義曰官府者百司之稱所居之處皆有廨垣坊市者謂京城及諸州縣等坊市其廨院或垣或籬輙越過者各杖七十侵謂侵地壊謂壊城及廨宇垣籬亦各同越罪故云亦如之注從溝瀆内出入者與越罪同越而未過減一等餘條未過凖此疏義曰溝瀆者通水之渠從此渠而入出亦得越罪越而未過或在城及垣籬上或在溝瀆中間未得過者從越州城以下各得減一等餘條未過凖此者謂越皇城京城宫殿垣及闗津應禁之處未過者各得減罪一等即州鎮闗戍城及武庫等門應閉忘誤不下鍵若應開毁管鍵而開者各杖八十疏義曰州鎮闗戍城武庫各有禁門應閉皆須下鍵其忘誤不下鍵若應開毁管鍵而開者各得杖八十錯下鍵及不由鑰而開者杖六十餘門各減二等疏義曰錯下鍵謂管鍵不相當者及不由鑰而開者謂不用鑰而開各杖六十餘門謂縣及坊市之類官有門禁者若應閉忘誤不由鍵應開毁管鍵而開各杖六十錯下鍵及不由鑰而開各笞四十故云餘門各減二等若擅開閉者各加越罪二等即城主無故開閉者與越罪同未得開閉者各減已開閉一等餘條未得開閉凖此疏義曰擅謂非時而開閉者州及鎮戍武庫門而有非時擅開閉者加越罪二等處徒二年縣城以下擅開閉者並加越罪二等城主無故開閉者謂州縣鎮戍等長官主執鑰者不依法式開閉與越罪同其坊正市令非時開閉坊市門者亦同城主之法州縣鎮戍城門各徒一年自縣城以下悉與越罪同既主城主無故開閉即是有故許開若有警急驛使及制勑事速非時至州縣者城主驗實亦得依法為開又依監門式京城每夕分街立鋪持更行夜鼓聲絶則禁人行曉鼓聲動即聴行若公使齎文牒者聴其有婚嫁亦聴注云須得縣牒喪病須相告赴求訪醫藥齎本坊文牒者亦聴其應聴行者並得為開坊市門若有警急及收掩雖州縣亦非時而開未得開閉者謂未通人行者為未開尚得人行者為未閉各減已開閉一等餘條謂宫殿門以下有門禁之類未得開閉者皆凖此減一等私度闗諸私度闗者徒一年越度者加一等不由門為越疏義曰水陸等闗兩處各有門禁行人來徃皆有公文謂驛使驗符劵傳送據逓牒軍防丁夫有總歴自餘各請過所而度若無公文私從闗門過合徒一年越度者謂闗不由門津不由濟而度者徒一年半已至越所而未度者減五等謂已到官司應禁約之處餘條未度凖此疏義曰水陸闗棧兩岸皆有防禁越度之人已至官司防禁之所未得度者減越度五等合杖七十餘條未度凖此者謂城及垣籬縁邉闗塞有禁約之處已至越所而未度者皆減已越罪五等若越度未過者凖上條減一等之例即被枉徒罪以上抑屈不申及使人覆訖不與理者聴於近闗州縣具狀申訢所在官司即凖狀申尚書省仍逓送至京若無徒以上罪而妄陳者即以其罪罪之官司抑而不送者減所訴之罪二等疏義曰闗外有人被官司枉斷徒罪以上其除免之罪本坐雖不合徒亦同徒罪之法抑屈不申及使人覆訖不與理者文稱及者使人未覆亦聴於近闗州縣具狀申訴所在官司謂近闗州縣即凖狀申尚書省仍逓送至京若勘無徒以上罪而妄訴者妄訴徒流還得徒流妄訴死罪還得死罪妄訴除免皆凖比徒之法謂元無本罪而妄訴者若實有犯斷有出入而訴不平者不當此坐其應禁及散送並依所訴之罪凖令逓之若官司抑而不送者减所訴之罪二等謂枉得死罪官司不送合徒三年之類不應度闗諸不應度闗而給過所取而度者亦同若冐名請過所而度者各徒一年疏義曰不應度闗者謂有征後畨期及罪譴之類皆不合輙給過所而官司輙給及身不合度闗而取過所度者若冒他人名請過所而度者各徒一年即以過所與人及受而度者亦凖此疏義曰以所請得過所而轉與人及受他人過所而承度者亦徒一年但律文皆云度者得徒一年明知未度者不合徒坐若闗司未判過所以前凖越闗未度各減五等之例若已判過所未出闗門同未過各減一等其與過所人既因度成罪前人未度亦同減科不應給過所而給者不在減例若家人相冒杖八十主司及闗司知情各與同罪不知情者不坐即將馬越度冐度及私度者各減人二等餘畜又減二等家畜相冒者不坐疏義曰家人不限良賤但一家之人相冒而度者杖八十既無各字被冒名者無罪若冐度私度越度事由家長處分家長雖不行亦獨坐家長此是家人共犯止坐尊長之例主司謂給過所曺司及闗司知冒度之情各同度人之罪不知冒情主司及闗司俱不坐將馬越度冒度私度各減人二等者越度杖一百冒度私度杖九十餘畜又減二等者除馬之外應請過所者並為餘畜越度杖八十私度冒度杖七十其家畜相冒者謂毛色齒嵗不同相冒並不得罪也闗津留難諸闗津度人無故留難者一日主司笞四十一日加一等罪止杖一百疏義曰闗謂判過所之處津直度人不判過所者依令各依先後而度無故留難不度者一日主司笞四十主司謂闗津之司一日加一等七日罪止杖一百此謂非公之人若軍務急速而留難不度致稽廢者自從所稽廢重論私度有他罪諸私度有他罪重者主司知情以重者論不知情者依常律疏義曰私度者謂無過所從闗門私度止徒一年或有避死罪逃亡别犯徒以上罪是名有他罪重闗司知情者以故縱罪論各得所度人重罪不知情者依常律謂不知罪人别犯之情者依常律不覺故縱之法人兵度闗妄度諸領人兵度闗而别人妄随度者將領主司以闗司論闗司不覺減將領者罪一等知情者各依故縱法有過所者闗司自依常律將領主司知情減闗司故縱罪一等不知情者不坐疏義曰凖令兵馬出闗者依本司連寫勑符勘度入闗者據部領兵將文帳檢入而别有人妄随度者罪在領兵官司故云將領主司以闗司論知情與同罪不覺減二等若知别有重罪亦依重罪科之闗司不覺者謂闗司承將領者文簿不覺别人随度者減將領者一等謂減度者罪三等知情者各依故縱法稱各者将領主司及闗司俱得度人之罪有過所者闗司判度自依常律不減將領主司之罪若將領主司知情減闗司故縱罪一等不知情者不坐齎禁私物度闗諸齎禁物私度闗者坐贜論贜輕者從私造私有法疏義曰禁物者謂禁兵器及諸禁物並私家不應有者私將度闗各計贜數從坐贜科罪十疋徒一年十疋加一等罪止徒三年凖贜輕者從私造私有法擅興律私有甲一領弩三張流二千里矟一張徒一年半私造者各加一等假令私將矟度闗平贜直絹三十疋即從坐贜科徒二年不計矟為罪將甲一領度闗從私有法流二千里即不計贜而斷若私家之物禁約不合度闗而私度者減三等疏義曰依闗市令錦綾羅縠紬綿絹􅁝布􅈊牛尾真珠金銀鐵並不得度西邉北邉諸闗及至縁邉諸州興易從錦綾以下並是私家應有若將度西邉北邉諸闗計贜減坐贜罪三等其私家不應有雖未度闗亦没官私家應有之物禁約不合度闗已下過所闗司捉獲者其物没官若已度闗及越度被人糺獲三分其物二分賞捉人一分入官越度縁邉闗塞諸越度縁邉闗塞者徒二年共化外人私相交易若取與者一尺徒二年半三疋加一等十五疋加役流疏義曰縁邉闗塞以隔華夷其有越度此闗塞者得徒二年以馬越度凖上條減人二等合徒一年餘畜又減二等杖九十但以縁邉闗塞越罪故重若從闗門私度人畜各與餘闗罪同若共化外蕃人私相交易謂市買博易或取蕃人之物及將物與蕃人計贜一尺徒二年半三疋加一等十五疋加役流私與禁兵器者絞共為婚姻者流二千里未入未成者各減三等即因使私有交易者凖盗論疏義曰越度縁邉闗塞將禁兵器私與化外人者絞共為婚姻者流二千里其化外人越度入境與化内交易得罪並與化内人越度交易同仍奏聴勑出入國境非公使者不合故但云越度不言私度若私度交易得罪皆同未入者謂禁兵器未入減死三等得徒二年半未成者謂婚姻未成減流三等得徒二年因使者謂因公使入蕃蕃人因使入國私有交易者謂市買博易各計贜凖盗論罪止流三千里若私與禁兵器及為婚姻律無别文得罪並同越度私與禁兵器共為婚姻之罪又凖别格諸蕃人所娶得漢婦女為妻妾並不得將還蕃内又凖主客式蕃客入朝於在路不得與客交雜亦不得令客與人言語州縣官人若無事亦不得與客相見即是國内官人百姓不得與客交闗私作婚姻同上法如是蕃人入朝聴住之者得娶妻妾若將還蕃内以違勑科之縁邉城戍諸縁邉城戍有外姦内入謂非衆成師旅者内姦外出而候望者不覺徒一年半主司徒一年謂内外姦人出入之路闗于候望者疏義曰國境縁邉皆有城戍式遏㓂盗預備不虞其有外姦内入謂蕃人為姦或行間諜之類注云謂非衆成師旅者依周禮五百人為旅二千五百人為師此謂小小姦㓂抄掠者若陳師旅自依擅興律連接㓂賊被遣斥候不覺賊來徒三年有内姦外出者謂國内人為姦出向化外或荒海之畔幽險之中候望之人不覺有姦入出合徒一年半雖非候望者但是城戍主司不覺得徒一年謂内外姦人出入之路闗於候望者目所堪見為闗謂在候望之内也其有姦人入出力所不敵者傳告比近城戍若不速告及告而稽留不即共捕致失姦㓂者罪亦如之疏義曰其有姦人入出所經城戍皆即捕之若力所不敵者即須傳告比近城戍令共捕逐若不速告及告而稽留不即共捕致失姦㓂者並徒一年烽候不警諸烽候不警令㓂賊犯邉及應舉烽燧而不舉應放多烽而放少烽者各徒三年疏義曰烽候謂從縁邉置烽連於京邑烽燧相應以備非常放烽多少具在别式候望不舉是名不警若令蕃㓂犯塞外賊入邉及應舉烽燧而不舉應放多烽而放少烽者各徒三年若放烽已訖而前烽不舉不即往告者罪亦如之以故陷敗户口軍人城戍者絞疏義曰依職方式放烽訖而前烽不舉者即差脚力往告之不即告亦徒三年故云亦如之以故陷敗謂從烽候不警及應舉烽燧而不舉或應放多烽而反放少烽或放烽訖而前烽不舉不即往告等以故䧟敗户口或是軍人及城戍者各得絞罪即不應舉烽燧而舉若應放少烽而放多烽及繞烽二里内輙放煙火者各徒一年疏義曰依式望見煙塵即舉烽燧若無事故是不應舉若應放烽少而放多烽及繞烽二里内皆不得有煙火謂晝放煙夜放火者自不應舉烽燧而舉以下三事各徒一年放烽多少具在式文其事隐秘不可具引如有犯者臨時據式科斷唐律疏義卷八欽定四庫全書唐律疏義卷九唐長孫無忌等撰職制上
