canonical_identifier: bkk:krp/KR2m0054/WYG/v1/juan/13
seq: 13
front:
  text: 諸占田過限者一畝笞十十畝加一等過杖六十二十畝加一等罪止徒一年若於寛閒之處者不坐
  hash: sha256:82cc3a5b37c793888353e87cdd39a51a072c4ead5c00fb586046f29154e077c5
body:
  text: 疏義曰王者制法農田百畝其官人永業凖品及老小寡妻受田各有等級非寛閒之鄉不得限外更占若占田過限者一畝笞十十畝加一等過杖六十二十畝加一等一頃五十一畝罪止徒一年又依令受田悉足者為寛鄉不足者為狹鄉若占於寛閒之處不坐謂計口受足以外仍有剰田務從墾闢庶盡地利故所占雖多律不與罪仍須申牒立案不申請而占者從應言上不言上之罪盜耕種公私田諸盜耕種公私田者一畝以下笞三十五畝加一等過杖一百十畝加一等罪止徒一年半荒田减一等强者各加一等苗子歸官主下條苗子凖此疏義曰田地不可移徙所以不同真盜故云盜耕種公私田者一畝以下笞三十五畝加一等三十五畝有餘杖一百過杖一百十畝加一等五十五畝有餘罪止徒一年半荒田减一等謂在帳籍之内荒廢未耕種者减熟田罪一等若强耕者各加一等熟田罪止徒二年荒田罪止徒一年半苗子各歸官主稱苗子者其子及草並徵還官主下條苗子準此謂妄認及盜買賣侵奪私田盜耕墓地如此之類所有苗子各還官主其盜耕人田有荒有熟或竊或强一家之中罪名不等者並依例以重法併滿輕法為坐若盜兩家以上之田只從一家而斷併滿不加重者唯從一重科若親屬相侵得罪各依服紀準親屬盜財物法應减者節級减科若已上籍即從下條盜貿賣之坐妄認盜賣公私田諸妄認公私田若盜貿賣者一畝以下笞五十五畝加一等杖過一百十畝加一等罪止徒二年疏義曰妄認公私之田稱為已地若私竊貿易或盜賣與人者一畝以下笞五十五畝加一等二十五畝有餘杖一百過杖一百十畝加一等五十五畝有餘罪止徒二年賊盜律云䦨圈之屬須絶離常處器物之屬須移徙其地雖有盜名立法須為定例地既不離常處理與財物有殊故不計贓為罪亦無除免倍贓之例妄認者謂經理已得若未得者凖妄認奴婢財物之類未得法科之盜貿易者須易訖盜賣者須賣了依令田無文牒輒賣買者財没不追苗子及買地之財並入地主在官侵奪私田諸在官侵奪私田者一畝以下杖六十三畝加一等過杖一百五畝加一等罪止徒二年半園圃加一等疏義曰律稱在官即是居官挾勢侵奪百姓私田者一畝以下杖六十三畝加一等十二畝有餘杖一百過杖一百五畝加一等三十二畝有餘罪止徒二年半園圃謂蒔果實種菜蔬之所而有籬院者以其沃瘠不類故加一等若侵奪地及園圃罪名不等亦凖併滿之法或將職分官田貿易私家之地科斷之法一準上條貿易為罪若得私家陪貼財物自依監主詐欺其官人兩相侵者同百姓例即在官時侵奪貿易等去官事發科罪並凖初犯之時盜耕人墓田諸盜耕人墓田杖一百傷墳者徒一年即盜葬他人田者笞五十墓田加一等仍令移葬若不識盜葬者告里正移埋不告而移笞三十即無處移埋者聴於地主口分内埋之疏義曰墓田廣袤令有制限盜耕不問多少即杖一百傷墳者謂窀穸之所聚土為墳傷者合徒一年即将尸柩盜葬他人地中者笞五十若盜葬他人墓田中者加一等合杖六十如盜葬傷他人墳者亦同盜耕傷墳之罪仍各令移葬若不識盜葬之人告所部里正移埋不告而移慮失屍柩合笞三十即無處移埋者謂無閒荒之地可埋聴於地主口分内埋之郊内旱澇霜雹問答一諸部内有旱澇霜雹蟲蝗為害之處主司應言而不言及妄言者杖七十覆檢不以實者與同罪若致枉有所徵免贓重者坐贓論疏義曰旱謂亢陽澇謂霖霪霜謂非時降霣雹謂損物為災蟲蝗謂螟螽蝥賊之類依令十分損四以上免租損六免租調損十以上課役俱免若桑麻損盡者各免調其應損免者皆主司合言主司謂里正以上里正須言於縣縣申州州申省多者奏聞其應言而不言及妄言者所由主司杖七十其有充使覆檢不以實者與同罪亦合杖七十若不以實言上妄有増减致枉有所徵免者謂應損而徵不應損而免計所枉徵免贓罪重於杖七十者坐贓論罪止徒三年既是以贓致罪皆合累倍而斷問曰有應得損免不與損免以枉徵之物或将入已或用入官各合何罪答曰應得損免而妄徵亦凖上條妄脱漏増减之罪入官者坐贓論入私者以枉法論至死者加役流部内田疇荒蕪諸部内田疇荒蕪者以十分論一分笞三十一分加一等罪止徒一年州縣各以長官為首佐職為從户主犯者亦計所荒蕪五分論一分笞三十一分加一等疏義曰部内謂州縣及里正所管田稱疇者言田之疇類或云疇地畔也不耕謂之荒不鋤謂之蕪若部内總計凖口受田十分之中一分荒蕪者笞三十假若管田百頃十頃荒蕪笞三十一分加一等謂十頃加一等九十頃荒蕪者罪止徒一年州縣各以長官為首佐職為從縣以令為首丞尉為從州即刺史為首長史司馬司户為從里正一身得罪無四等罪名者止依首從為坐其檢勾品官為佐職其主典律無罪名户主犯者亦計所荒蕪五分論計户内所受之田假有受田五十畝十畝荒蕪户主笞三十故云一分笞三十一分加一等即二十畝笞四十三十畝笞五十四十畝杖六十五十畝杖七十其受田多者各凖此法為罪里正授田課農桑諸里正依令授人田課農桑若應授而不授應還而不収應課而不課如此事類違法者失一事笞四十一事謂失一事於一人若於一人失數事及一事失之於數人皆累為坐疏義曰依田令户内永業田課植桑五十根以上榆棗各十根以上土地不宜者任依鄉法又條應収授之田每年起十月一日里正預校勘造簿縣令總集應退應受之人對共給授又條授田先課役後不課役先無後少先貧後富其里正皆須依令造簿通送及課農桑若應合受田而不授應合還公田而不収應合課田農而不課應課植桑棗而不植如此事類違法者每一事有失合笞四十注一事謂失一事於一人若於一人失數事及一事失之於數人皆累為坐疏義曰一事謂失一事於一人者假若於一户之上不課種桑棗為一事合笞四十若於一人失數事謂於一人之身應受不授又不課桑棗及田疇荒蕪及一事失之於數人謂應還不収之類在於數人之上皆累而為坐三事加一等縣失十事笞三十二十事加一等州隨所管縣多少通計為罪州縣各以長官為首佐職為從疏義曰假有里正應課而不課是一事應受而不授是二事應還而不収是三事授田先不課後課是四事先少後無是五事先富後貧是六事田疇荒蕪是七事皆累為坐其應累者每三事加一等即失二十二事徒一年縣失者亦凖里正所失十事笞三十二十事加一等一百七十事合徒一年州隨所管縣多少通計為罪謂管二縣者失二十事笞三十失三百四十事徒一年其管縣多者通計各凖此各罪止徒一年故者各加二等疏義曰州縣以刺史縣令為首其長官闕者即次官為首佐職及判户曺之司為從各罪止徒一年謂州縣長官及里正各罪止徒一年故犯者各加二等即是一事杖六十縣十事笞五十州管二縣者二十事笞五十計加亦凖此通計為罪各罪止徒二年其州止管一縣者各减縣罪一等若有故失罪法不等者亦依併滿之法假如授田等失七事合杖六十又有故犯三事亦合杖六十即以故犯三事併為失十事科杖七十其州縣應累併者各凖此應復除不給諸應受復除而不給不應受而給者徒二年其小徭役者笞五十疏義曰依令人居狹鄉樂遷就寛鄉去本居千里外復三年五百里外復二年三百里外復一年之類應給復除而所司不給不應受而所司妄給者徒二年其小徭役謂充夫及雜使凖令應免不免應役不役者合笞五十其妄給復除及應給不給凖贓重於徒二年者依上條妄脱漏増减以出入課役一口徒一年二口加一等贓重入已者以枉法論至死者加役流入官者坐贓論其不應受復除人而求請主司妄得復除者依名例若共監主為犯雖造意仍以監主為主即是所司為首得復者為從若他人為請求妄得復者自從囑請法差科賦役違法諸差科賦役違法及不均平杖六十疏義曰依令凡差科先富强後貧弱先多丁後少丁差科賦役違法及不均平謂貧富强弱先後閑要等差科不均平者各杖六十若非法而擅賦斂及以法賦斂而擅加益贓重入官者計所擅坐贓論入私者以枉法論至死者加役流疏義曰依賦役令毎丁租二石調絁絹二丈綿三兩布輸二丈五尺麻三斤丁役二十日此是每年以法賦斂皆行公文依數輸納若臨時别差科者自依臨時處分如有不依此法而擅有所徵斂或雖依格令式而擅加益入官者總計贓至六疋即是重於杖六十皆從坐贓科之假有擅加益入官絹滿一百疋比斂衆人之物法合倍論倍為五十疋坐贓罪止徒三年入私者以枉法論稱入私不必入已但不入官者即為入私官人有禄枉法一尺杖一百一疋加一等十五疋絞無禄者减一等二十疋絞令云至死者加役流並不合絞其間賦斂雖有入官復有入私者即是罪名不等宜依併滿之法假有擅賦斂得一百疋九十疋入官十疋入私從入官九十疋倍為四十五疋合徒二年半倍入私十疋為五疋亦徒二年半不得累徒五年須以入私十疋併滿入官九十疋為一百疋倍為五十疋處徒三年輸課税物違期諸部内輸課税之物違期不充者以十分論一分笞四十一分加一等州縣皆以長官為首佐職以下節級連坐疏義曰輸課税之物謂租調及庸地租雜稅之類物有頭數輸有期限而違不充者以十分論一分笞四十假有當里之内徵百石物十斛不充笞四十每十斛加一等全違期不入徒二年州縣各以部内分數不充科罪凖此注州縣皆以長官為首佐職以下節級連坐疏義曰刺史縣令宣導之首課税違限責在長官佐職以下節級連坐既以長官為首通判官為第二從判官為第三從主典及檢勾之官為第四從以勸導之首屬在長官故不同判事差等其里正處百户之内事在一人既無節級連坐唯得部内不充之罪户主不充者笞四十疏義曰百姓當户應輸課税依期不完即笞四十不據分數為坐許嫁女報婚書問答一諸許嫁女已報婚書及有私約約謂先知夫身老幼疾殘養庶之類而輒悔者杖六十男家自悔者不坐不追聘財疏義曰許嫁女已報婚書者謂男家致書禮請女氏答書許訖及有私約注云約謂先知夫身老幼疾殘養庶之類老幼謂違本約相校倍年者疾殘謂状當三疾支體不完養謂非已所生庶謂非嫡子及庶孽之類以其色目非一故云之類皆謂宿相諳委兩情具愜私有契約或報婚書如此之流不得輒悔悔者杖六十婚仍如約若男家自悔者無罪聘財不追問曰有私約者凖文唯言老幼疾殘養庶之類未知貧富貴賤亦入之類得為妄冒以否答曰老幼疾殘養庶之類此縁事不可改故須先約然許為婚且富貴不恒貧賤無定不入之類亦非妄冒雖無許婚之書但受聘財亦是聘財無多少之限酒食者非以財物為酒食者亦同聘財疏義曰婚禮先以聘財為信故禮云聘則為妻雖無許婚之書但受聘財亦是注云聘財無多少之限即受一尺以上並不得悔酒食非者為供設親賓便是衆人同費所送雖多不同聘財之限若以財物為酒食者謂送錢財以當酒食不限多少亦同聘財若更許他人者杖一百已成者徒一年半後娶者知情减一等女追歸前夫前夫不娶還娉財後夫婚如法疏義曰若更許他人者謂依私約報書或受聘財而别許他人者杖一百若已成者徒一年半後娶者知己許嫁之情而娶者减女家罪一等未成者依下條减已成者五等合杖六十已成徒一年女歸前夫若前夫不娶女氏還聘財後夫婚如法為婚女家妄冒諸為婚而女家妄冒者徒一年男家妄冒者加一等未成者依本約已成者離之疏義曰為婚之法必有行媒男女嫡庶長幼當時理有契約女家違約妄冒者徒一年男家妄冒者加一等未成者依本約謂依初許婚契約已成者離之違約之中理有多種或以尊卑或以大小之類皆是有妻更娶問答一諸有妻更娶妻者徒一年女家减一等若欺妄而娶者徒一年半女家不坐各離之疏義曰依禮日見於甲月見於庚象夫婦之義一與之齊中饋斯重故有妻而更娶者合徒一年女家减一等為其知情合杖一百若欺妄而娶謂有妻言無以其矯詐之故合徒一年半女家既不知情依法不坐仍各離之稱各者謂女氏知有妻無妻皆合離異故云各離之問曰有婦而更娶婦後娶者雖合離異未離之間其夫内外親戚相犯得同妻法以否答曰一夫一婦不刋之制有妻更娶本不成妻詳求理法止同凡人之坐以妻為妾問答二諸以妻為妾以婢為妾者徒二年以妾及客女為妻以婢為妾者徒一年半各還正之疏義曰妻者齊也秦晉為匹妾通賣買等數相懸婢乃賤流本非儔類若以妻為妾以婢為妻違别議法便虧夫婦之正道黷人倫之彛則顛倒冠履紊亂禮經犯此之人即合二年徒罪以妾及客女為妻客女謂部曲之女或有於他處轉得或放婢為之以婢為妾者皆徒一年半各還正之並從本色問曰或以妻為媵或以媵為妻或以妾作媵或以媵作妾各得何罪答曰據鬭訟律媵犯妻减妾一等妾减媵加凡人一等餘條媵無文者與妾同即是夫犯媵皆同犯妾所問既非妻妾與媵相犯便無加减之條夫犯媵例依犯妾即以妻為媵罪同以妻為妾若以媵為妻亦同以妾為妻其以媵為妾律令無文宜依不應為重合杖八十以妾為媵令既有制律無罪名止科違令之罪即因其改換以告身與迴換之人者自從假與人官法若以妾詐為媵而冒承媵姓名始得告身者依詐偽律詐増加功状以求得官者合徒一年若婢有子及經放為良者聴為妾疏義曰婢為主所幸因而有子即雖無子經放為良者聴為妾問曰婢經放為良聴為妾若用為妻復有何罪答曰妻者傳家事承祭祀既具六禮取則二儀婢雖經放為良豈堪承嫡之重律既止聴為妾即是不許為妻不可處以婢為妻之科須從以妾為妻之坐居父母夫喪嫁娶諸居父母及夫喪而嫁娶者徒三年妾减三等各離之知而共為婚姻者各减五等不知者不坐疏義曰父母之喪終身憂戚三年從吉自為達禮夫為婦天尚無再醮若居父母及夫之喪謂在二十七月内若男身娶妻而妻女出嫁者各徒三年妾减三等若男夫居喪娶妾妻女作妾嫁人妾既許以卜姓為之其情理賤也禮數既别得罪故輕各離之謂服内嫁娶妻妾並離知而共為婚姻者謂壻父稱婚妻父稱姻二家相知是服制之内故為婚姻者各减罪五等得杖一百娶妾者合杖七十不知情不坐若居期喪而嫁娶者杖一百卑幼减二等妾不坐疏義曰若居期親之喪嫁娶謂男夫娶婦女嫁作妻各杖一百卑幼减二等雖是期服亡者是卑幼故减二等合杖八十妾不坐謂期服内男夫娶妾女婦作妾嫁人並不坐父母囚禁嫁娶諸祖父母父母被囚禁而嫁娶者死罪徒一年半流罪减一等徒罪杖一百祖父母父母命者勿論疏義曰祖父母父母既被囚禁固身囹圄子孫嫁娶名教不容若祖父母父母犯當死罪嫁娶者徒一年半流罪徒一年徒罪杖一百若娶妾及嫁為妾者即凖上文减三等若期親尊長主婚即以主婚為首男女為從若餘親主婚事由主婚主婚為首男女為從事由男女即男女為首主婚為從其男女俱逼或男年十八以下在室之女並主婚獨坐注云祖父母父母命者勿論謂奉祖父母父母命為親故律不加其罪依令不得晏㑹居父母喪主婚諸居父母喪與應嫁娶人主婚杖一百疏義曰居父母喪與應合嫁娶之人主婚者杖一百若與不應嫁娶人主婚得罪重於杖一百自從重科若居夫喪而與應嫁娶人主婚者律雖無文從不應為重合杖八十其父母喪内為應嫁娶人媒合從不應為重杖八十夫喪為輕合笞四十唐律疏義卷十三欽定四庫全書唐律疏義卷十四唐長孫無忌等撰
