front:
  text: 二十七條
  hash: sha256:c94869780ae547e8cd136bcef0303003b816f4b910caeda9831319fe51fa1f53
body:
  text: 䟽義曰詐偽律者魏分賊律為之歴代相因迄今不改既名詐偽應以詐事在先以御寳事重遂以偽造八寳為首闘訟之後須防詐偽故次闘訟之下偽造皇帝寳諸偽造皇帝八寳者斬太皇太后皇太后皇后皇太子寳者絞皇太子妃寳流三千里偽造不錄所用但造即坐䟽義曰皇帝有傳國神寳有受命寳皇帝三寳天子三寳是名八寳依公式令神寳寳而不用受命寳封禪則用之皇帝行寳報王公以下書則用之皇帝之寳慰勞王公以下書則用之皇帝信寳徵召王公以下書則用之天子行寳報畨國書則用之天子之寳慰勞畨國書則用之天子信寳徵召畨國兵馬則用之皆以白玉為之寳者印也印又印也以其供御故不與印同名八寳之中有人偽造一者即斬其太皇太后皇太后皇后皇太子寳偽造者絞皇太子妃寳偽造者流三千里太皇太后以下寳皆以金為之並不行用註云偽造不錄所用謂寳既金玉為之偽造者不必皆須金玉為之亦不問用與不用造者即坐偽寫官文書印諸偽寫官文書印者流二千里餘印徒一年寫謂倣效而作亦不錄所用䟽義曰上文稱偽造皇帝八寳以玉為之故稱造此云偽寫官文書印即以銅為之故稱寫註云寫謂倣效而作謂倣效為之不限用泥用蠟等故云不錄所用但作成者既流二千里餘印徒一年餘印謂諸州等封函印及畜産之印亦不錄所用上文但造寳即坐不須堪行用此文雖寫印不堪行用謂不成印文及大小懸别如此之類不合流坐從下條造未成者减三等即偽寫前代官文書印有所規求封用者徒二年因之得成官者從詐假法䟽義曰依式周隋官亦聽成䕃或争封邑之類事縁前代乃偽寫前代之印心有規求封用者徒二年稱封用者或印文書及封文簿事兼兩用故連云封用註云因之得成官者從詐假法謂偽寫封用為舊公驗因之成官者從詐假法其偽寫未成及成而未封用依下文未施行减三等例亦减已封用三等偽寫宫殿門符諸偽寫宫殿門符發兵符發兵謂銅魚合符應發兵者雖通餘用亦同餘條稱發兵者皆凖此傳符者絞䟽義曰宫殿門符謂非時開宫殿門皆須勘魚符合然始得開偽寫此符及偽寫發兵符註云發兵謂銅魚合符依公式令下左符進内右符付州府等應有差科徴發皆并𠡠符與銅魚同封行下勘符合然後承用故稱銅魚合符應發兵雖通餘用亦同謂其符通雜徴發人事及有所用度若除授替代州府長官及差行追禁並用此符故稱雖通餘用亦同謂同發兵符罪餘條稱發兵者謂擅興律應給發兵符而不給賊盗律盗發兵符故云餘條皆准此傳符者謂給驛用之偽寫及造此等符者並合絞使節及皇城門京城門符者流二千里餘符徒二年餘符謂禁苑門及交廵魚符之類䟽義曰使節者周禮有掌節之司註云道路用旌節然大使擁節而行是名使節其皇城門謂朱雀等諸門京城門謂明德等諸門偽作此等符及節者流二千里餘符徒二年註云餘符謂禁苑及交廵魚符之類禁苑諸門有符開閉守衛交兵之處皆有交符廵更警夜之所並執廵魚符勘過據擅興律凢言餘符者契亦同即契應發兵者同發兵符法此條云之類者即是諸契非發兵偽造者並同餘符之罪各合徒二年偽寳印符節假人問荅二諸以偽寳印符節及得亡寳印符節假人若出賣及所假若買者封用各以偽造寫論䟽義曰以偽造寳印符節及得亡寳印符節假與他人若出賣與他人及所假所買之人雖非身自造冩若将封用各依偽造寫法科之即以偽印印文書施行若假與人及受假者施行亦與偽寫同未施行及偽寫印符節未成者各减三等䟽義曰上文謂偽造寫及得亡寳印符節假人及賣買等情罪此文欲論以偽印文書施行謂以偽印印文書自将行用若以偽印文書假與他人及有受得偽文書行用並謂已入官司者其罪各依偽造寫法未施行謂偽文書未将行用及偽寫印符節未成者各减已施及已成罪三等問曰有人得亡寳印符節假賣與人其所假買者未将行用未知假賣之人亦合得依未施行法減罪以否答曰凖依律文本防行用故云若假人若出賣及所假若買者封用各以偽造寫論封用之文承賣買之下若已封用俱得全罪如未行用並合依未施行减三等下條盗寳印符節及假賣與人其假買未封用並合依此减法其假買偽印文書未施行假賣人亦同减例又問二人共造偽印印文牒從者乃将施行未知二人合有首從以否答曰依名例律共犯罪以造意為首随從者减一等偽印既非刼盗止合造意為首從者雖復行用止依從法减科盗寳印符節封用問荅一諸盗寳印符節封用謂意在詐偽不闗由所主即所主者盗封用及以假人若出賣所假及買者封用各以偽造寫論䟽義曰盗寳印符節封用註云謂意在詐偽不闗由所主謂盗用官印等不由所當之人或執印等主司私盗封用及所主者将印假與他人若将出賣與人并所假買之人若将封用各以偽造寫論並依自造之法問曰有人身為案主受人請求乃為盗印印偽文牒既非掌印合作首從以否答曰一人須印行用一人盗印與之即是共犯須論首從盗者雖為案主非掌印之人便是共犯合為首從主司不覺人盗封用者各减封用罪五等印又减二等即事直及避稽而盗用印者各杖一百事雖不直本法應用印而封用者加一等主司不覺笞五十故縱者各與同罪䟽義曰掌寳及符節主司不覺有人盗用者减盗用人罪五等印又减一等謂不覺用寳及符應死者死上减五等徒一年半不覺用符節應流流上减五等徒一年不覺用餘符徒二年上减五等杖八十不覺用印流上减七等合杖九十即文書正直及避文案稽遲而盗用印者各杖一百事雖不直本法應用印謂事雖枉曲本法應封用印者終須申荅而盗封用印者加一等合徒一年若不直罪重即從重斷主司不覺笞五十謂從事直及避稽以下不覺各笞五十故縱者各與同罪詐為制書諸詐為制書及増减者絞口詐𫝊及口増减亦是未施行者减一等施行謂中書覆奏及已入所司者雖不闗由所司而詐𫝊増减前人已承受者亦為施行餘條施行凖此䟽義曰詐為制書意在詐偽而妄為制𠡠及因制𠡠成文而増减其字者絞註云口詐𫝊及口増减亦是謂詐𫝊𠡠語及奉勑宣傳口中詐有増减動事者並與増减制書同未施行减一等謂詐為制勑及詐増减已訖而未施行减一等註云施行謂中書覆奏此謂詐為𠡠語及雖奉制𠡠處分就中増减中書承受已覆奏訖若其不須覆奏者即據已入所司或有詐為中書宣出制勑文書已入所在曹司應承受施行及起請行判曹司者並為已施行雖不闗由所司謂所宣制𠡠及増减不入曹司徑即詐向規求之所其前人已承受者亦為施行假有甲詐宣制𠡠向乙索物乙已承受不要得物承受之者此類即是施行餘條施行凖此餘條謂以偽印文書施行及下條詐為官文書施行如此諸條已施行及未施行皆凖此其收捕謀叛以上不容先聞而矯制有功者奏裁無功者流二千里䟽義曰其收捕謀叛以上謂所在收捕謀反逆叛不容先聞謂不容先得奏聞恐其滋蔓或致逃逸而矯行制𠡠務速收掩有功者奏裁無功者流二千里以其矯行制書無功可錄免其死罪宥以流刑對制上書不以實諸對制及奏事上書詐不以實者徒二年非宻而妄言有宻者加一等對制謂親見被問奏事謂面陳若附奏亦是上書謂書奏特達詐謂知而隱欺及有所求避之類䟽義曰對制謂親被顧問奏事謂面陳事由若附他人而奏亦同自奏之上書謂特達御所此等若有詐不以實者徒二年非宻而妄言有宻謂非謀反逆叛應宻之法事而妄言有宻加一等謂加對制不實一等徒二年半註文以如上解詐謂知而隐欺謂知事不實故為隐欺及有所求避或妄求功賞或廽避罪戻之類若被官司責罰情在砲哮或有因闘忿争欲相恐廹口雖告宻問即不承既無文牒入司坐當不應為重其有已陳大牒問始承虛或口稱有宻言辯仍執於後承妄者並同未奏减一等徒二年若别制下問案推無罪名謂之問未有告言謂之案已有告言謂之推報上不以實者徒一年其事闗由所司承以奏聞而不實者罪亦如之未奏者各减一等䟽義曰若别制下問謂不縁曹司特奉制𠡠遣使就問註云無罪名謂之問謂問百姓疾苦豐儉水旱之類案者謂風聞官人有罪未有告言之状而奉制案問推者謂事發遣推已有告言之者而乃報上不以實者各徒一年其事闗曹司承以奏聞而有不實亦得徒一年未奏者各减一等謂承前人上書詐不以實若非宻及下問案推報上不實事闗所司承以聞奏申報不實未奏者各减一等並謂被問被推之人報荅不實者各獲此罪偽為官文書増减問荅一諸詐為官文書及増减者杖一百凖所規避徒罪以上各加本罪二等未施行各减一等䟽義曰詐為官文書謂詐為文案及符移解牒鈔旁之類或増减以動事者杖一百凖所規避之事當徒罪以上事發者各加本罪二等未發即依二罪之法從重科之規避者假有於法不應為官詐求得官者徒二年又詐為官文書及増减而規官不解加本罪二等合徒三年避者或有本犯徒三年詐為増减以避此罪者合加二等流二千五百里即詐為官文書及増减訖事未施行各减一等杖罪以下杖上减徒罪以上各從徒流上減即主司自有所避違式造立及増减文案杖罪以下杖一百徒罪以上各加所避罪一等造立即坐若増减以避稽者杖八十䟽義曰謂主司欲避身罪違式造立文案或於舊案増减者杖罪以下謂笞十以上即前罪之外得杖一百或避徒罪以上事發者即就所避徒上各加所避罪一等註云造立即坐謂不必避得前罪但造立及増减即坐若増减以避文案稽違並於本罪之外加杖八十未發者從二罪法問曰主司自有所避違式造立文案徒罪以上加所避罪一等加罪有公有私若用官當合併滿以否答曰主司若避公罪有所増减造立即坐本罪依公坐加罪為私罪若應以官當者須以私併公通所加私罪為公坐當法其於負殿者各依公私兩論詐假官假與人官諸詐假官假與人官及受假者流二千里謂偽奏擬及詐為省司判補或得他人告身他用之類䟽義曰詐假官謂虛偽詐假以得官若虛假授與人官及受詐假官者並流二千里註云謂偽奏擬但流内九品以上官皆注訖奏擬及詐為省司判補視品流内等官或得他人正授告身或同姓字或改易己名妄冒官司以居職任稱之類者亦有已之告身應合追毁私自盗得而假詐之者若詐申聞及増减重者從重法其於法不應為官其有罪譴未合仕之𩔖而詐求得官者徒二年䟽義曰其於法不應為官謂有罪譴未合仕之𩔖假如除名者六載後聽叙免官者三載後聽叙免所居官者期年聽叙若有此等年限未滿而詐求得官者徒二年稱之𩔖者謂犯罪應用髙官而詐用卑官及流人未滿六載之𩔖若詐増减功過年限而預選舉因之以得官者徒一年流外官各减一等求而未得者又各减二等下條凖此䟽義曰若詐増减功過年限謂詐増加勞考第或减其負殿及下考年限而預選及舉因之以得官者徒一年又依選舉令官人身及同居大功以上親自執工商家專其業者不得仕其舊經職任因此解黜後能修改必有事業者三年以後聽仕其三年外仍不修改者追毁告身即依庶人例其有官及無官之人依令不得仕而詐求得官及未滿三年隐状選得官者並同増减功過年限預選得官合徒一年其三年外仍不修改若方便不輸告身依舊為官者亦同不應為官之坐若追納之後􅁍盗及私贖得以為官者依上條詐假官論流外官减一等謂從詐假官以下並依流内官當色輕重上减一等故云各减一等求而未得又各减二等若詐假官未得流上减二等合徒二年半流外官又减一等徒二年於法不應為官求而未得减二等徒一年流外官又减一等杖一百詐増减功過年限而預選舉求而未得减二等杖九十流外官又减一等杖八十註云下條凖此謂下條非正嫡詐承襲未得亦各减二等非正嫡詐承襲問荅一諸非正嫡不應襲爵而詐承襲者徒二年非子孫而詐承襲者從詐假官法若無官䕃詐承他䕃而得官者徒三年非流内及求贖杖罪以下各杖一百徒罪以上各加一等䟽義曰依封爵令王公侯伯子男皆子孫承嫡者傳襲以次承襲具在令文其有不合襲爵而詐承襲者合徒二年非子孫謂子孫之外詐云是嫡而妄承襲者從詐假官法合流二千里若無官廕詐妄承取他人官䕃而得官者徒三年非流内謂假䕃得學生及七品邑若勲品以下及求贖杖罪以下本罪之外各合杖一百徒罪以上加一等謂於百杖上加一等合徒一年此是犯罪已發而更為者重其事從詐承襲以下求而未得各减二等問曰取䕃求贖杖罪一百徒罪加一等其官司知而故縱未知從下條承詐知而聽行與同罪惟復依斷獄律斷罪應決配之而聽收贖减本罪故失一等而科答曰既稱知而故縱即是知而聽行理從同罪而科詐稱官所捕人問荅二諸詐為官及稱官所遣而捕人者流二千里為人所犯害犯其身及家人親属財物等而詐稱官捕及詐追攝人者徒一年未執縳者各减二等䟽義曰詐為官謂身自詐作官人及詐稱官司遣捕人者並流二千里若為人侵犯其身或犯家人親属或侵奪身及家人親属財物等乃詐稱官司遣捕或稱官司遣追攝者並徒一年雖詐有追攝及捕而未執縛者各减三等稱各者捕人未縛流上减三等合徒二年為人所犯害詐稱官捕及詐追攝人未縛徒一年上减二等合杖八十問曰捕亡律被人毆撃折傷以上若盗及強姦雖傍人皆發捕繋其傍人雖合捕攝及詐稱官遣而捕繋之合科何罪答曰此條註云犯其身及家人親属財物等謂非折傷以上盗及強姦之色而詐稱官捕合徒一年若前人本法合捕雖傍人詐稱官捕止從下文其應捕攝杖八十其應捕攝無官及官卑詐稱髙官者杖八十即詐稱官及冒官人姓字權有所求為者罪亦如之䟽義曰謂毆人折傷以上或强姦及盗此等應須捕攝其捕攝之人或無官詐稱有官或官卑詐稱髙官者杖八十即詐稱是官及冐承官人姓名權有所求為者或經過之處權有所求或出入公門心規禮待非有捕攝者情是詐欺之類亦合杖八十故云亦如之問曰前人不合捕攝乃詐稱官捕因而殺傷前人或拒毆傷殺捕者各合何罪答曰詐捕攝人已成兇狡更加毆打傷殺情状彌所難原前人既不相干即當故殺傷法若前人拒毆殺傷捕者名例云本應輕者聽從本既不合捕横被執持雖殺傷止同闘殺詐欺官私取物諸詐欺官私以取財物者凖盗論詐欺百端皆是若監主詐取者自從盗法未得者减二等下條凖此䟽義曰詐謂詭誑欺謂誣罔欺詐官私以取財物者一凖盜法科罪唯不在除免倍贓加役流之例罪止流三千里註云詐欺百端皆是謂詐欺之状不止一途若監主詐取謂監臨主守詐取所監臨主守之物自從盗法加凢盗二等有官者除名未得者减二等謂已設誣端誣罔規財物猶未得者皆凖贓减罪二等其非監主詐欺未得者自從盗不得財之法下條凖此謂下條詐為官私文書及増减欺妄求物未得者監主之人亦减二等故云下條凖此知情而取者坐贓論知而買者减一等知而為藏者减二等䟽義曰知情而取者謂知前人詐欺得物而乞取者坐贓論一尺笞二十一疋加一等十疋徒一年詐欺之人雖是監主凢人知情取者止得坐贓之罪知而買者减一等謂於坐贓上亦减一等知而為藏謂知詐欺而得故為隐藏亦於坐贓上减二等詐為官私文書増减諸詐為官私文書及増减文書謂券抄及簿賬之類欺妄以求財賞及避沒入備償者凖盗論贓輕者從詐為官文書法若私文書止從所欺妄為坐䟽義曰詐為官私文書及増减謂詐為官私券抄及増减簿賑故註云文書謂劵抄及簿賑之類稱之類者謂符牒抄案等欺妄以求錢財或求賞物及縁坐資財及犯禁之物合沒官而避沒入或損失官私器物而避備償如此之類増减詐為方便規避者計所欺得之贓凖竊盗科斷贓輕者從詐為官文書法謂計贓得罪輕於杖一百者從詐為官文書法有印者自從重論註云若私文書止從所欺妄為坐謂詐為私文契及受領劵付抄帖以求避罪或改年月日限之類止從所欺妄求物之罪不同官文書之坐妄認良人為奴婢問荅一諸妄認良人為奴婢部曲妻妾子孫者以略人論减一等妄認部曲者又減一等妄認奴婢及財物者凖盗論减一等䟽義曰妄認良人為奴婢部曲者謂本知是良人妄認為妻妾子孫者謂知非己妻妾子孫而故妄認者以略人論减一等賊盗律略人為奴婢者絞减一等合流三千里略人為部曲流三千里减一等合徒三年略人為妻妾子孫合徒三年减一等合徒二年半是為以略人論减一等妄認部曲又减一等者賊盗律略他人部曲减良人一等即是略部曲為奴合流三千里妄認部曲為奴减一等合徒二年略部曲為部曲合徒三年妄認部曲為部曲减一等合徒二年半略部曲客女為妻妾子孫合徒二年半妄認部曲客女為妻妾子孫减一等合徒二年是為部曲又减一等其妄認他人奴婢及財物者凖盗論减一等若監主妄認未得亦凖上條各减二等其非監主妄認未得財多者從錯認未得論問曰妄認良人為随身妄認随身為部曲合得何罪答曰依别格随身與他人相犯並同部曲法即是妄認良人為部曲之法其妄認随身為部曲者随身之與部曲色目略同亦同妄認部曲之罪詐除去官户奴婢問荅一諸詐除去死免官户奴婢及私相博易者徒二年即愽易贓重者從貿易官物法䟽義曰官戸奴婢各有簿賑除者謂詐言給賜去者謂去其名簿死者謂詐言身死免者謂加年入六十及廢疾各得免本色之類及私相博易謂将私奴婢博易官奴婢者各徒二年博易贓重者從貿易官物法問曰有人将私部曲博換官奴得以轉事衣食之直凖折官奴價否答曰奴婢有價部曲轉事無估故盗誘部曲並不計贓令以部曲替奴乃是壓為賤色取官奴入己者自從盗論以部曲替奴理依壓部曲為奴之法須為二罪各從重科其匿脱者徒一年謂産子不言為匿典吏不附為脱主司不覺匿脱者依里正不覺脱漏法䟽義曰匿者謂産子隐匿不言脱者謂典吏知情故不附帳不言不附者各徒一年故註云産子不言為匿典吏不附為脱主司不覺匿脱者依里正不覺脱漏法户婚律里正不覺脱漏増减者一口笞四十三口加一等過杖一百十口加一等罪止徒三年知情者各同家長法既同里正之罪主司止坐所由若父母匿子其數更多亦凖户律家長故隐口之法一口徒一年二口加一等未堪入役者四口為一口罪此是當條雖有罪名所為重者自從重其典吏及主司匿脱多者依律既凖里正脱漏合從累科主司知情者各同父母故匿之罪知與不知罪名不等者依脱漏之法併滿科之詐為瑞應諸詐為瑞應者徒二年若災祥之類而史官不以實對者加二等䟽義曰瑞應者陸賈云瑞者寳也信也天以寳為信應人之德故曰瑞其瑞應條流其在禮部之式有大瑞有上中下瑞令云詐為瑞應即明不限大小但詐為者即徒二年若詐言麟鳯龜龍無可案驗者從上書詐不以實亦徒二年若災祥之類災謂祲沴祥謂休徴史官不以實對者謂應凶言吉應吉言凶加二等徒三年稱之類者此外有善惡之事𠡠問而史官不以實對者亦加二等詐教誘人犯法諸詐教誘人使犯法犯者不知而犯之及和令人犯法謂共知其所犯有罪即捕若告或令人捕告欲求購賞及有憎嫌欲令入罪皆與犯法者同坐䟽義曰鄙俚之人不閑法式姦詐之軰故相教誘或教盗人財物或教越度闗津之類犯禁者不知有罪教令者故相墜䧟故註云犯者不知而犯之及和令人犯法謂和教人奴婢逃走或将禁物度闗外示和同内為私計故註云謂共知所犯有罪即捕若告謂即自捕告或令他人捕告欲求購賞及有憎惡前人教誘令其人入罪者皆與身自犯法者同罪詐乘驛馬諸詐乗驛馬加役流驛闗等知情與同罪不知情减二等闗謂應檢問之處有符劵者不坐謂盗得真符劵及偽作不可覺知者䟽義曰郵驛本備軍速其馬所擬尤重但是詐乗無問馬數及已行逺近即合加役流給馬之驛及所由之闗知其詐乗之情者亦加役流不知情减二等謂驛與闗司全不勘檢又不知情合减二等猶徒二年半故註云闗謂應檢問之處有符劵者不坐註云謂盗得真符劵及偽作不可覺知者謂偽作符劵反盗得真紙券等檢驗不可覺知者驛及闗司並不坐其未應乘驛馬而輙乗者徒一年輙乗謂有當乗之理未得符券者䟽義曰其未應乗驛馬謂差為驛使而未得符劵輙即乗者徒一年註云輙乗謂有當乘之理未得符劵者謂衘命有實未得符劵而乗者驛闗等知情聽之凖上文亦合同罪不知情者徒一年上减二等詐自復除諸詐自復除若詐死及詐去工樂雜户名者徒二年䟽義曰詐自復除復添之條備在格令謂詐云落番新還或詐云放賤之類以得復除若詐作死状及詐去工樂及雜户等名字者徒二年其太常音聲人州縣有貫詐去音聲人名字亦同工樂之罪即所詐得復役使者徒一年其見供作使而詐自脱及脱之者杖六十計所詐庸重者各坐贓論䟽義曰謂詐為雜任之類而得復免役使者徒一年其見供作使謂權充雜役而詐自脱及知情脱之者各杖六十計其詐庸重者各坐贓論詐疾病有所避諸詐疾病有所避者杖一百若故自傷殘者徒一年半有所避無避等雖不足為篤疾殘而臨時避事者皆是䟽義曰詐疾病以避使役求假之類杖一百若故自傷殘徒一年半但傷殘者有避無避得罪皆同即無所避而故自傷不成殘疾以上者從不應為重故註云有避無避等雖不足為疾而殘臨時避事皆是其受雇倩為人傷殘者與同罪以故致死者减闘殺罪一等䟽義曰謂有受雇或被倩為人傷殘者與自傷殘人同罪各合徒一年半以此傷殘之故因而致死者被雇倩之人不限尊卑貴賤皆减闘殺一等若為祖父母父母遣之傷殘因致死者同過失之法醫違方詐療病諸醫違方詐療病而取財物者以盗論䟽義曰醫師違背本方詐療疾病率情増損以取財物者計贓以盗論監臨之與凢人各依本法父母死言餘喪問荅一諸父母死應解官詐言餘喪不解者徒二年半若詐稱祖父母父母及夫死以求假及有所避者徒三年伯叔父母姑兄姊徒一年餘親减一等若先死詐稱始死及患者各减二等䟽義曰父母之喪解官居服而有心貪榮任詐言餘喪不解者徒二年半為其已經發哀故輕於聞喪不舉之罪若祖父母父母及夫見存或稱求假及有所避而詐妄稱死者各徒三年伯叔父母姑兄姊徒一年餘親减一等謂緦麻以上從徒一年上减一等杖一百若先死詐稱始死及妄云疾病以求假及有所避者各减三等謂詐稱祖父母父母及夫始死及患徒三年上减三等合徒一年半伯叔父母如兄姊徒一年上减三等杖八十餘親杖一百上减三等合杖七十問曰有人嫌惡前人妄告父母身死其妄告之人合科何罪答曰父母云亡在身罔極忽有妄告欲令舉哀若論告者之情為過不淺律令雖無正法宜從不應重科詐病死傷不實諸詐病及死傷受使檢驗不實者各依所欺减一等若實病死及傷不以實驗者以故入人罪論䟽義曰有詐病及死若傷受死使檢驗不以實各以所欺减一等即上條詐疾病者杖一百檢驗不實同詐妄减一等杖九十傷殘徒一年半减一等徒一年若詐死徒二年上减一等處徒一年半之類若實病及傷謂非詐病及詐傷使者檢云無病及傷便是故入人徒杖之罪若實死檢云不死即是妄入二年徒坐使人枉入杖者得杖罪枉入徒者得徒坐各依前人入罪法未决者减一等詐䧟人死傷問荅一諸詐䧟人至死及傷者以闘殺傷論謂知津河深者濘橋船朽敗誑人令渡之類䟽義曰謂津濟之所或有深濘若橋船朽漏不堪渡人而詐云津河平淺船橋牢固令人過渡因致死傷者以闘殺傷論謂令人溺死者絞折一支徒三年之類故註云謂知津河深濘橋船朽敗誑人令渡之類稱之類者謂知有坑穽機槍之属誑人而致死傷者亦以闘殺傷論其有尊卑貴賤各依闘殺傷本法問曰詐䧟人渡朽敗橋梁溺之甚困不傷不死律條無文應得何罪又人雖免難溺䧟畜産又若為科答曰律云詐䧟人至死及傷但論重法略其輕重坐不可備言别有舉重明輕及不應為罪若誑䧟令溺雖不傷死猶同毆人不傷論䧟殺傷畜産者凖作坑穽例償其减價保任不如所任諸保任不如所任减所任罪二等即保贓重於竊盗從竊盗减若虛假人名為保者笞五十䟽義曰保任之人皆相委悉所保既乖本状即是不如所任减所任之罪二等其有保贓重於竊盗减謂保強盗枉法及恐喝等贓本條得罪重於竊盗並從竊盗上减二等不從重贓减者以其元不同情保贓不保罪故也若虛假人名為保者謂假用人名或妄以他人姓字以充保者並笞五十有五人同保一事此即先共謀計須以造意為首餘為從坐當頭自保者罪無首從證不言情諸證不言情及譯人詐偽致罪有出入者證人减二等譯人與同罪謂夷人有罪譯傳其對者䟽義曰證不言情謂應議請减七十以上十五以下及廢疾並據衆證定罪證人不吐情實遂令罪有増减及傳譯番人之語令其罪有出入者證人减二等謂减所出入罪二等譯人與同罪若夷人承徒一年譯人云承徒二年即譯人得所加一年徒坐或夷人承流譯者云徒二年即譯者得所减二年徒之類故註云謂夷人有罪譯傳其對者律稱致罪有出入即明據證及譯以定刑名若刑名未定而知證譯不實者止當不應為法證譯徒罪以上從重杖罪以下從輕詐冒官司諸詐冒官司以有所求為而主司承詐知而聽行與同罪至死者减一等不知者不坐謂此篇于條内無主司罪名者䟽義曰詐冒官司謂詐偽及妄冐官司欲有所求為官司知詐冒知情而聽行者並與詐冐人同罪至死减一等不知情者不坐註云謂此篇於條内無主司罪名者即此條為當篇主司生文不為餘篇立例此篇無主司罪名者上條詐稱祖父母父母及夫死及詐疾病若詐假官或承襲此等知情與同罪不知者不坐唐律疏義卷二十五欽定四庫全書唐律䟽義卷
