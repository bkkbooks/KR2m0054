seq: 18
front:
  text: 以物置人耳鼻諸以物置人耳鼻及孔竅中有所妨者杖八十其故屏去人服用飲食之物以故殺傷人者各以鬬殺傷論
  hash: sha256:0dc0f147c246a2698a2ddfa080ec961c5b43c9a60341fd593e19320823f5a6b3
body:
  text: 疏義曰耳鼻孔竅皆為要所輙以他物置中所所妨者杖八十本條毆罪重者依毆法毆未有罪者亦不科其屏去人服用飲食之物謂寒月屏去人衣服或登髙乘馬私去梯轡或飢渴之人屏去飲食之類以屏去之故及置物於人孔竅之中而殺傷人者各以鬬殺傷論若殺凢人或殺尊長應死或於卑幼及賤人雖殺不合償死及傷尊卑貴賤各有等差須依鬬律從本犯科㫁故云各以鬬殺傷論若恐迫人使畏懼致死傷者各隨其状以故鬬戲殺傷論疏義曰若恐迫人者謂恐動逼迫使人畏懼而有死傷者若履危險臨水岸故相恐迫使人墜陷而致死傷者依故殺傷法若因鬬恐迫而致死傷者依鬬殺傷法或因戲恐迫使人畏懼致死傷者以戲殺傷論若有如此之類各隨其状依故鬬戲殺傷法科罪造畜蠱毒問答四諸造畜蠱毒謂造合成蠱堪以害人者及敎令者絞造畜者同居家口雖不知情若里正坊正村正亦同知而不紏者皆流三千里疏義曰蠱有多種罕能究悉事闗左道不可備知或集合諸蠱置於一器之内久而相食諸蠱皆盡若蛇在即為蛇蠱之類造謂自造畜謂得畜可以毒害於人故註云謂造合成蠱堪以害人者若自造若傳畜猫鬼之類及敎令人並合絞罪若同謀而造律不言皆即有首從其所造及畜者同居家口不限籍之同異雖不知情若里正坊正村正知而不紏者皆流三千里問曰律文惟言里正坊正等罪不言州縣知情之法若州縣官司知而不紏復合何罪答曰里正之等親管百姓既同里閈多相暗委州縣去人稍逺管户又多是故律文遂無節制若知而不紏依鬬訟律監臨之官知所部有犯法不舉劾者减罪人罪三等紏彈之官唯减二等造畜者雖㑹赦并同居家口及敎令人亦流三千里八十以上十歲以下及篤疾無家口同流者放免即以蠱毒毒同居者被毒之人父母妻妾子孫不知造蠱情者不坐疏義曰造畜蠱毒之人雖㑹大赦并同居家口及敎令人亦流三千里註云八十以上十歲以下及篤疾無家口同流者放免據此老幼及篤疾身自犯罪猶尚免流今以同居共活有同流家口亦配無同居家中共去其老小及疾不能自存故從放免即造畜蠱毒之人以蠱毒毒同居者其被毒之人父母妻妾子孫不知造蠱毒情者並免流罪問曰被毒之人父母不知情者放免假有親兄弟大房造蠱以毒小房既同父母未知父母合免以否答曰蠱毒家口㑹赦猶流恐其涉於知情所以例不聼住若以蠱毒毒同居被毒之人父母妻妾子孫不知情者不坐雖復兄弟相毒終是被毒之人父母既無不免之制不知情者合原又問老小篤疾無家口同流者放免其家總無良口惟有部曲若有奴婢一人得為有同流家口老小篤疾仍配以否答曰部曲既許轉事奴婢比之資財諸條多不同良人即非同流家口之例又問依律犯罪未發自首合原造畜蠱毒之家良賤一人先首事既首訖得免罪以否答曰犯罪首免本許自新蠱毒已成自新難雪比之㑹赦仍並從流以毒藥藥人問答一諸以毒藥藥人及賣者絞謂堪以殺人者雖毒藥可以療病買者将毒人賣者不知情不坐即賣買而未用者流二千里疏義曰凢以毒藥藥人謂以鴆毒冶葛烏頭附子之類堪以殺人者将用藥人及賣者知情並合科絞註云謂堪以殺人者雖毒藥可以療病買者将以毒人賣者不知毒人之情賣者不坐即賣買而未用者謂買毒藥擬将殺人賣者知其本意而未用者流二千里問曰毒藥藥人合絞其有尊卑長幼貴賤得罪並依律以否答曰律條簡要止為凢人生文其有尊卑貴賤例從輕重相舉若犯尊長及貴者各依謀殺已殺法如其施于卑賤亦凖謀殺已殺論如其藥而不死者並同謀殺已傷之法脯肉有毒曾經病人有餘者速焚之違者杖九十若故與人食并出賣令人病者徒一年以故致死者絞即人自食致死者從過失殺人法盗而食者不坐疏義曰脯肉有毒謂曽經人食為脯肉所病者有餘速即焚之恐人更食須絶根本違者杖九十其知前人食已得病故将更與人食或将出賣以故令人病者合徒一年因而致死者絞即人自食致死者謂有餘不速焚之雖不與人其人自食因即致死者從過失殺人法徵銅入死家註云盗而食者不坐謂人竊盗而食之以致死傷者脯肉主不坐仍科不速焚之罪其有害心故與尊長食欲令死者亦凖謀殺條論施於卑賤至死依故殺法憎惡造厭魅問答一諸有所憎惡而造厭魅及造符書咒詛欲以殺人者各以謀殺論减二等於期親尊長及外祖父母夫夫之祖父母父母各不减疏義曰有所憎嫌前人而造厭魅厭事多方罕能詳悉或圖畵形像或刻作人身刺心釘眼繫手縛足如此厭勝事非一緒魅者或假託鬼神或妄行左道之類或咒或詛欲以殺人者各以謀殺論减二等若于期親尊長及外祖父母夫夫之祖父母父母各不减依上條皆合斬罪以故死者各依本殺法欲以疾苦人者又减二等子孫于祖父母父母部曲奴婢于主者各不减疏義曰以故致死者謂以厭魅符書呪詛之故但因一事致死者不依减二等各從本殺法欲以疾苦人者謂厭魅符書咒詛不欲令死唯欲前人疾病苦痛者又减二等稱又减者謂大功以下親及凢人非外祖父母謀殺得减二等者謂從謀殺上總减四等註云子孫於祖父母父母部曲奴婢於主者各不减即是期親尊長外祖父母夫夫之祖父母唯减二等其祖父母父母以下雖經欲令疾苦亦同謀殺之法皆斬不同减例問曰呪詛大功以上尊長小功尊属欲令疾苦未知合入十惡以否答曰疾苦之法同於毆傷謀毆大功以上尊長小功尊屬不入十惡如其已疾苦理同毆法便當不睦之條即於祖父母父母及主直求愛媚而厭呪者流二千里若涉乘輿者皆斬疏義曰子孫於祖父母父母及部曲奴婢於主造厭呪符書求直愛媚者流二千里若涉乘輿者罪無首從皆合處斬直求愛媚便得極刑重於盗服御之物凖例亦入十惡殺人移鄉諸殺人應死㑹赦免者移鄉千里外其工樂雜户及官户奴并太常音聲人雖移鄉各從本色部曲及奴出賣及轉配事千里外人疏義曰殺人應死㑹赦免罪而死家有期以上親者移鄉千里外為户其有特勑免死者亦依㑹赦例移鄉工樂及官户奴並謂不屬縣貫其雜户太常音聲人有縣貫仍各於本司上下不從州縣賦役者此等殺人㑹赦雖合移鄉各從本色謂移鄉避讎並從本色驅去註云部曲及奴出賣謂私奴出賣部曲将轉事人於千里之外若羣黨共殺止移下手者及頭首之人若死家無期以上親或先相去千里外即習天文業已成若婦人有犯及殺他人部曲奴婢並不在移限部曲奴婢自相殺者亦同違者徒二年疏義曰羣黨共殺謂謀殺造意合斬從而加功者絞同謀共鬭各以下手重者為重罪亦合處絞律故云止移下手及頭首之人謂雖不下手發意元謀或以威力使人殺者並合移鄉雖有從而加功凖律合死既不下手共殺者即不移鄉若死家無期以上親或先相去千里外即習天文謂天文觀生天文生以上業已成者若婦人有犯謂無常居隨夫所在及殺他人部曲奴婢此等並不在移鄉避讎之限註云部曲奴婢自相殺者亦同謂亦不在移鄉之例此以上應移而不移不應移而移違者各徒二年殘害死屍諸殘害死屍謂焚燒支解之類及棄屍水中者各减鬭殺罪一等緦麻以上尊長不减疏義曰殘害死屍謂支解形骸割絶骨體及焚燒之類及棄屍水中者各减鬬殺罪一等謂合死者死上减一等應流者流上减一等之類註云緦麻以上尊長不减謂殘害及棄屍水中各依鬭殺合斬不在减例棄而不失及髠髮若傷者又各减一等即子孫於祖父母父母部曲奴婢於主者各不减皆謂意在于惡者疏義曰棄屍水中還得不失髠髮謂髠去其髮傷謂故傷其屍傷無大小但非支解之類各又减一等謂凢人各减鬬殺罪二等緦麻以上尊長唯减一等大功以上尊長及小功尊屬仍入不睦即子孫於祖父母父母部曲奴婢於主者各不减並同鬬殺之罪子孫合入惡逆决不待時註云皆謂意在自於惡者謂從殘害以下並謂意在於惡如無惡心謂若願焚屍或遺言水𦵏及逺道屍柩将骨還鄉之類並不坐穿地得死人問答一諸穿地得死人不更埋及於冢墓燻狐狸而燒棺槨者徒二年燒屍者徒三年緦麻以上尊長各遞加一等卑幼各依凢人遞减一等疏義曰因穿地而得死人其屍不限新舊不即埋掩令其暴露或於他人冢墓而燻狐狸之類因燒棺槨者各徒二年謂唯燒棺槨火不到屍其燒棺槨者緦麻以上尊長從徒二年上逓加一等至期親尊長流二千五百里其卑幼各依凢人逓减一等緦麻於二年上减一等徒一年半小功徒一年大功杖一百期親杖九十若穿地得死人可識知是緦麻以上尊長而不更埋亦從徒二年上逓加一等卑幼亦從徒二年上逓减一等各凖燒棺槨之法其燒屍者徒三年緦麻以上尊長各逓加一等謂從徒三年上逓加一等燒大功尊長屍流三千里雖期親尊長罪亦不加其卑幼各逓减一等謂緦麻卑幼减凢人一等徒二年半逓减至期親卑幼猶徒一年問曰下條發冢者加役流註云招魂而𦵏亦是此文燒屍者徒三年未知招魂而𦵏亦同以否答曰凖律招魂而𦵏發冢者與有屍同罪律有燒棺槨之文復著燒屍之罪招魂而𦵏棺内無屍止得從燒棺槨之法不可同燒屍之罪若子孫於祖父母父母部曲奴婢於主冡墓燻狐狸者徒二年燒棺槨者流三千里燒屍者絞疏義曰稱子孫於祖父母父母者曾髙亦同部曲奴婢者隨身客女亦同子孫於祖父母父母部曲奴婢於主冢墓燻狐狸者徒二年若燒棺槨者流三千里燒屍者絞造祅書祅言諸造祅書及祅言者絞造謂自造休咎及鬼神之言妄説吉凶涉于不順者疏義曰造祅書及祅言者謂搆成怪力之書詐為鬼神之語休謂妄説他人及己身有休徴咎謂妄言國家有咎惡觀天畫地詭説灾祥妄陳吉㐫並涉于不順者絞傳用以惑衆者亦如之傳謂傳言用謂用書其不滿衆者流三千里言理無害者杖一百即私有祅書雖不行用徒二年言理無害者杖六十疏義曰傳用以惑衆者謂非自造傳用祅言祅書以惑三人以上亦得絞罪註云傳謂傳言用謂用書其不滿衆者謂被傳惑者不滿三人若是同居不入衆人之限此外一人以上雖不滿衆合流三千里其言理無害者謂祅書祅言雖説變異無損於時謂若豫言水旱之類合杖一百即私有祅書謂前人舊作衷私相傳非已所製雖不行用仍徒二年其祅書言理無害於時者杖六十夜無故入人家問答一諸夜無故入人家者笞四十主人登時殺者勿論若知非侵犯而殺傷者减鬬殺傷二等疏義曰夜無故入人家依刻漏法晝漏盡為夜夜漏盡為晝謂夜無事故輒入人家笞四十家者謂當家宅院之内登于入時被主人格殺之者勿論若知非侵犯謂知其迷誤或因醉亂又老小疾患并及婦人不能侵犯而殺傷者减鬬殺傷二等若殺他人奴婢合徒三年得减二等徒二年之類問曰外人來姦主人舊已知委夜入而殺亦得勿論以否答曰律開聼殺之文本防侵犯之輩設令舊知姦穢終是法所不容但夜入人家理或難辯縱令知犯亦為罪人若其殺即加罪便恐長其侵暴登時許殺理用無疑况文稱知非侵犯而殺傷者减鬬殺傷二等即明知是侵犯而殺自然依律勿論其已就拘執而殺傷者各以鬭殺傷論至死者加役流疏義曰已就拘執謂夜入人家已被擒獲拘留執縛無能相拒本罪雖重不合殺傷主人若有殺傷各依鬬法科罪至死者加役流唐律疏義卷十八欽定四庫全書唐律疏義卷十九唐長孫無忌等撰賊盗三凡一十七條盗大祀神御物諸盗大祀神御之物者流二千五百里謂供神御者惟帳几杖亦同其擬供神御謂營造未成者疏義曰盗大祀神御之物公取竊取皆為盗大祀謂天地宗廟神州等
