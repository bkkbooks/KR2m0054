seq: 32
front:
  text: 獄下凡二十條
  hash: sha256:5eae25b1cd4159704a05effcdf3d2d7fbd048972088ef1e1522c0552edf283a4
body:
  text: 監臨以杖捶人問荅一諸監臨之官因公事自以杖捶人致死及恐廹人致死者各從過失殺人法若以大杖及手足毆擊折傷以上减闘殺傷罪二等䟽義曰謂臨統案驗之官情不挟私因公事前人合杖笞自以杖捶人致死及恐廹人致死謂因公事欲求其情或恐喝或廹脅前人怕懼而自致死者各依過失殺人法各徵銅一百二十觔入死家若前人是卑賤罪不至死者各依本殺法徴銅若以大杖手足毆擊折傷以上者自擊使人擊等减闘殺傷罪二等謂其應償死者合徒三年之類雖是監臨主司於法不合行罰及前人不合捶拷而捶拷者以闘殺傷論至死者加役流即用刃者各從闘殺傷法䟽義曰雖是監臨主司於法不合行罰謂非判事之官及非専當督領者不得輙行捶罰假有人犯徒以上罪合送法司不送法司當曹即自行决罰之類及前人不合捶拷謂前人無罪或雖有罪應合官當收贖之類而輙捶拷者以闘殺傷論謂傷與不傷並依他物闘毆之法其因捶拷而致死者加役流用刃者謂監臨之官自以杖捶人致死以下有用刃殺傷者各依闘訟律用刃殺者斬用兵刃殺者同故殺法問曰里正坊正村正及主典因公事行罰前人致死合得何罪答曰里正坊正村正等唯掌追呼催督不合輙加笞杖其有因公事相毆擊者理同凢闘而科主典檢請是司理非行罰之職因公事捶人者亦與里正等同斷罪引律令諸斷罪皆須具引律令格式正文違者笞三十若數事共條止引所犯罪者聽䟽義曰犯罪之人皆有條制斷獄之法須慿正文若不具引或致乖謬違而不具引者笞三十若數事共條謂依名例律二罪以上俱發以重者論即以贓致罪頻犯者並累科假有人雖犯二罪並不因􅂍而斷事官人止引二罪俱發以重者論不引以􅂍致罪之類者聽應言上不言諸斷罪應言上而不言上應待報而不待報輙自决斷者各减故失三等䟽義曰依獄官令杖罪以下縣决之徒以上縣斷定送州覆審訖徒罪反流應决杖笞若應贖者即决配徴贖其大理寺及京兆河南府斷徒及官人罪并後有雪减並申省省司覆審無失速即下知如有不當者隨事較正若大理寺及諸州斷流以上若除免官當者皆連冩案状申省大理寺及京兆河南府即封案送若駕行幸即凖諸州例案覆理盡申奏若不依此令是應言上而不言上其有事申上合待報下而不待報輙自决斷者各减故失三等謂故不申上故不待報者於所斷之罪减三等若失不申上失不待報者於職制律公事失上各又减三等即死罪不待報輙自决者依下文流二千里制𠡠斷罪諸制𠡠斷罪臨時處分不為永格者不得引為後比若輙引致罪有出入者以故失論䟽義曰事有時冝故人主權斷制𠡠量情處分不為永格者不得引為後比若有輙引致罪有出入者以故失論謂故引有出入各得下條故出入之罪其失引者亦凖下條失出入罪論官司出入人罪問荅一諸官司入人罪者謂故増减情状足以動事者若聞知有恩赦而故論决及示導令失實辭之類若入全罪以全罪論雖入罪但本應收贖及加杖者止從收贖加杖之法䟽義曰官司入人罪者謂或虛立證據或妄搆異端捨法用情鍜鍊成罪故註云謂故増减情状足以動事者若聞知國家将有恩赦而故論决囚罪及示導教令而使詞状乖異稱之類者或雖非恩赦而有格式改動或非示導而恐喝改詞情状既多故云之類若入全罪謂前人本無負犯虛搆成罪還以虛搆枉入全罪科之註雖入罪但本應收贖及加杖者止從收贖加杖之法䟽義曰假有入官䕃人及廢疾流罪前人合贖入者亦以贖論或入官户部曲奴婢并單丁之人前人合加杖者亦依加杖之法收贖不用官當及配流役身之例此是官司入人罪與誣告之法不同從輕入重以所剰論刑名易者從笞入杖從徒入流亦以所剰論三流同比徒一年為剰即從近同比徒半年為剰若入加役流者各計加役流者各計加役年為剰從笞杖入徒流從徒流入死罪亦以全罪論其出罪者各如之䟽義曰從輕入重以所剰論假有從笞十入三十即剰入笞二十從徒一年入一年半即剰入半年徒所入官司各得笞二十及半年徒之類刑名易者從笞入杖亦得所剰之罪從徒入流者註云三流同比徒二年為剰謂從徒三年入流二千里或二千五百里或流三千里逺近雖異俱曰流刑至於配所役身三流同有一年居作故從徒入流三流同比徒一年為剰即從近流二千里入至二千五百里或入至三千里者同比徒半年為剰若從三流入至加役流者各計加役年為剰但入加役流者加常流役二年将加役二年以為剰罪從笞杖入徒流從徒流入死罪假有從百杖入徒一年即是全入一年徒坐從徒流入死罪謂從一年徒以上至三千里流而入死刑者亦依全入死罪之法故云亦以全罪論其出罪者謂増减情状之徒足以動事之類或從重出輕依所减之罪科斷從死出至徒流從徒流出至笞杖各同出全罪之法故云出罪者各如之假有囚犯一年徒坐官司故入至加役流即從一年至三年是剰入二年徒罪從徒三年入至三流即三流同比徒一年為剰加役流復剰二年即是剰五年徒坐官司從加役流出至徒一年亦凖此即斷罪失於入者各减三等失於出者各减五等若未决放及放而還獲若囚自死各聽减一等䟽義曰即斷罪失於入者上文故入者各以全罪論失於入者各减三等假有從笞失入百杖於所剰罪上减三等若入至徒一年即同入全罪之法於徒上减三等合杖八十之類失於出者各减五等假有失出死罪者减五等合徒一年半失出加役流亦凖此三流同為一减减五等合徒一年之類若未决放者謂故入及失入死罪及杖罪未决其故出及失出死罪以下未放及已放而更獲若囚自死但使囚死不問死由各聽减一等謂於故出入及失出入上各聽减一等即别使推事通状失情者各又减二等所司已承誤斷訖即從失出入法雖有出入於决罰不異者勿論䟽義曰别使推事謂充使别推覆者通状失情謂不得本情或出或入各又减二等失入者於失入减三等上又减二等若失出者於失出减五等上又减二等所司已承誤斷訖謂曹司承誤通之状已依斷訖即從失出入法謂皆從在曹司出入法科之並同减五等三等之例若未决放及放而還獲若囚自死各聽减一等其所司承誤已斷訖者曹司同餘官案省不覺法雖有出入於决罰不異假有官户部曲官私奴婢本犯合徒三年斷入流罪或從三流之法科徒三年各止加杖二百刑名雖有出入加杖數即不殊者無罪故云於决罰不異者勿論問曰有人本犯加役流出為一年徒坐放而還獲减一等合得何罪答曰全出加役流官司合得全罪放而還獲减一等合徒五年今從加役流出為一年徒坐計有五年剰罪放而還獲减一等若依徒法减一等仍合四年半徒既是剰罪不可重於全出之坐舉重明輕止合三年徒罪赦前斷罪不當諸赦前斷罪不當者若處輕為重宜改從輕處重為輕即依輕法䟽義曰處斷刑名或有出入不當本罪其事又在恩前恐判官執非不移故明從輕坐之法若處輕為重宜改從輕假有闘殺堂兄當時作親兄斷為惡逆㑹赦之後改從堂兄坐當不睦赦若十惡亦原處流二千里以常赦不免故仍處流坐又如闘殺凢人斷為殺緦麻尊長㑹赦十惡不免改為雜犯免死移鄉此並仍有輕罪又有受所監臨五十疋斷為枉法處死㑹赦改為受所監臨不在徴􅂍之例又有犯近流科作逺流或止合一官當徒斷用二官以上若奏畫訖及流至配所㑹赦者改從本犯近流及還所枉告身若未奏畫及流人未到流所㑹赦者即從赦原若應徴銅而處輕為重其銅或在限外未輸或在限内納訖㑹赦者並改從輕法其剰納者却還未送者依輕罪數徴納若限内未納㑹赦者從赦並免稱輕者全免亦是故令云犯罪未斷决逢格改者格重聽依犯時格輕聽從輕法即總全無罪亦名輕法其處重為輕即依輕法假令犯十惡非常赦所不免者當時斷為輕罪及全放並依赦前斷定其常赦所不免者依常律常赦所不免者謂雖㑹赦猶處死及流若除名免所居官及移鄉者䟽義曰常赦所不免者赦書云罪無輕重皆赦除之不言常赦所不免者亦不在免限故云依常律即犯惡逆仍處死反逆及殺從父兄姊小功尊属造畜蠱毒仍流十惡故殺人反逆縁坐獄成者猶除名監守内姦盗略人受財枉法獄成㑹赦免所居官殺人應死㑹赦移鄉等是即赦書定罪名合從輕者又不得引律比附入重違者各以故失論䟽義曰赦書定罪名合從輕者假如貞觀九年二月十六日赦大辟罪以下並免其常赦所不免十惡妖言惑衆謀叛已上道等並不在赦例據赦十惡之罪赦書不免謀叛即當十惡未上道者赦特從原叛罪雖重赦書定罪名合從輕不得引律科斷若比附入重違者以故失論聞知恩赦故犯諸聞知有恩赦而故犯及犯惡逆若部曲奴婢毆及謀殺若強姦主者皆不得以赦原即殺小功尊属從父兄姊及謀反大逆者身雖㑹赦猶流二千里䟽義曰聞知有恩赦而故犯謂赦書未出私自聞知而故犯罪者及犯惡逆謂毆及謀殺祖父母父母殺伯叔父母姑兄姊外祖父母夫夫之祖父母父母此名惡逆若部曲客女亦同并奴婢毆及謀殺若強姦主者皆不得以赦原即殺小功尊属從父兄姊及謀反大逆者此等雖㑹赦免死猶流二千里獄結竟取服辯諸獄結竟徒以上各呼囚及其家属具告罪名仍取囚服辯若不服者聽其自理更為審詳違者笞五十死罪杖一百䟽義曰獄結竟為徒以上刑名長官同斷案已判訖徒流及死罪各呼囚及其家属具告所斷之罪名仍取囚服辯其家人親属唯止告示罪名不須問其服否囚若不服聽其自理依不服之收更為審詳若不告家属罪名或不取囚服辯及不為審詳流徒罪並笞五十死罪杖一百縁坐沒官放之諸縁坐應沒官而放之及非應沒官而沒之者各以流罪故失論䟽義曰賊盗律謀反及大逆人子年十五以下及母女妻妾子妻妾亦同若祖孫兄弟姊妹並沒官男夫年八十及篤疾婦人男六十及廢疾並免出養入道及娉妻未成者並不追坐若應沒而放應放而沒各依流罪以故失論謂反逆縁坐流三千里沒官罪重須用三千里流法若故同故出入三千里流若失同失出入三千里流稱放者應沒遣流與全放無别應流遣沒得罪亦同徒流送配稽留諸徒流應送配所而稽留不送者一日笞三十三日加一等過杖一百十日加一等罪止徒二年不得過罪人之罪䟽義曰徒流應送配所謂徒罪斷訖即應役身凖獄官令犯徒應配居作在京送将作監在外州者供當處官獄案成即送而稽留不送其流人凖令季别一遣若符在季末三十日内至者聽與後季人同遣違而不送者一日笞三十三日加一等過杖一百十日加一等五十二日罪止徒二年註云不得過罪人之罪謂罪人應徒一年者稽留官司亦罪止徒一年之類輸備贖沒入物諸應輸備贖沒入之物及欠負應徴違限不送者一日笞十五日加一等罪止杖一百若除免官當應追告身違限不送者亦如之䟽義曰應輸備贖沒入之物備謂亡失官私器物各備償贖謂犯法之人應徴銅贖沒謂彼此俱罪之贓及犯禁之物沒官入者謂得闌遺之物限滿無人識認者入官及應入私之類又依獄官令贖死刑八十日流六十日徒五十日杖四十日笞三十日若應徴官物者凖直五十疋以上一百日三十疋以上五十日二十疋以上三十日不滿二十疋以下二十日其失有欠負應徴違限不送者並凖令文依限送納違者一日笞十五日加一等罪止杖一百若除免官當謂犯罪斷除名免官免所居官及官當應追告身不送者亦一日笞十五日加一等罪止杖一百婦人懐孕犯死罪諸婦人犯死罪懐孕當决者聽産後一百日乃行刑若未産而决者徒二年産訖限未滿而决者徒一年失者各减二等其過限不决者依奏報不决法䟽義曰婦人犯死罪懐孕當應行决者聽産後一百日乃行刑若未産而决者徒二年産訖未滿百日而决者徒一年失者各减二等未産而决徒一年産訖限未滿而决者杖九十即過限不决者依奏報不决法謂依下條即過限不决者違一日杖一百二日加一等拷决孕婦諸婦人懐孕犯罪應拷及决杖笞若未産而拷决者杖一百傷重者依前人不合捶拷法産後未滿百日而拷决者减一等失者各减二等䟽義曰婦人懐孕犯罪應拷及决杖笞皆待産後一百日然後拷决若未産而拷及决杖笞者杖一百傷重者謂傷損之罪重於杖一百者依前人不合捶拷法謂依上條監臨之官前人不合捶拷而捶拷者以闘殺傷論若堕胎者合徒二年婦人因而致死者加役流限未滿而拷决者减一等謂减未産拷决之罪一等失者各减二等謂未産而失拷决於杖一百上减二等傷重於闘傷上减二等若産後限未滿而拷决者於杖九十上减二等傷重者於闘傷上减三等立春後不决死刑諸立春以後秋分以前决死刑者徒一年其所犯雖不待時若於斷屠月及禁殺日而决者各杖六十待時而違者加二等䟽義曰依獄官令從立春至秋分不得奏决死刑違者徒一年若犯惡逆以上及奴婢部曲殺主者不拘此令其大祭祀及致齋朔望上下弦二十四氣雨未晴夜未明斷屠月日及假日並不得奏决死刑其所犯雖不待時若於斷屠月謂正月五月九月及禁殺日謂每月十直日月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日雖不待時於此月日亦不得决死刑違而决者各杖六十待時而違者謂秋分以前立春以後正月五月九月及十直日不得行刑故違時日者加二等合杖八十其正月五月九月有閏者令文但云正月五月九月斷屠即有閏者各同正月亦不得奏决死刑死囚覆奏報决諸死罪囚不待覆奏報下而决者流二千里即奏報應决者聽三日乃行刑若限未滿而行刑者徒一年即過限違一日杖一百二日加一等䟽義曰死罪囚謂奏畫已訖應行刑者皆三覆奏訖然始下决若不待覆奏報下而輙行决者流二千里即奏報應决者謂奏訖報下應行决者聽三日乃行刑稱日者以百刻須以符到三日乃行刑若限未滿三日而行刑者徒一年即過限違一日杖一百二日加一等在外既無漏刻但取日周晬時為限斷罪决配而收贖諸斷罪應决配之而聽收贖而决配之若應官當而不以官當及不應官當而以官當者各依本罪减故失一等死罪不减䟽義曰斷罪應决配之謂無官䕃及非老小及疾之色犯笞杖應决徒流應配官司乃收贖應收贖謂有官䕃及廢疾若年七十以上十五以下本罪合贖而决配之若應官當謂流内九品以上犯徒以上罪合以官當官司乃不以官當或不應官當謂罪輕不盡其官及過失犯罪不合用官當徒而官司乃以官當者各依本犯當贖及决配之罪减故失一等註云死罪不减若應死而聽當贖應收贖而其决死刑不在减例各從出入死罪故失科之即品官任流外及雜任於本司及監臨犯杖罪以下依决罰例䟽義曰品官任流外及雜任謂身帶勲官散官而任流外及雜任者於本司及監臨謂於本司及臨時監統者若犯杖罪以下依流外雜任之例决杖不准官品徴贖若徒罪以上自依當贖法其有准䕃應贖者任流外及雜任若犯杖罪以下亦凖品官依决罰例斷罪應絞而斬諸斷罪應絞而斬應斬而絞徒一年自盡亦如之失者减二等即絞訖别加害者杖一百䟽義曰犯罪應絞而斬應斬而絞徒一年以其刑名改易故科其罪自盡亦如之依獄官令五品以上犯非惡逆以上聽自盡於家若應自盡而絞斬應絞斬而令自盡亦各徒一年故云亦如之失者减二等謂原情非故者合杖九十即絞訖别加害者謂絞已致斃别加拉幹折腰之類者杖一百領徒囚應役不役諸領徒應役而不役及徒囚病愈不計日令陪役者過三日笞三十三日加一等過杖一百十日加一等罪止徒二年不得過罪人之罪䟽義曰領徒應役謂掌領囚徒令役身者而不役及徒囚因病給假病愈合役不令陪役者過三日笞三十三日加一等過二十四日合杖一百過杖一百十日加一等罪止徒二年註云不得過罪人之罪謂如應徒一年者雖多日不役亦不得過徒一年其二年以下並凖此囚數多者從不役人日缺者為罪縱死囚逃亡諸縱死罪囚令其逃亡後還捕得及囚已身死若自首應减死罪者其獲囚及死首之處即須遣使速報應减之所有驛處發驛報之若稽留使不得减者以入人罪故失論减一等䟽義曰謂囚合死在禁所司縱令逃亾依故縱之條還合死罪捕得及囚已死若自首應减死罪者謂依捕亡律及上條放而還獲得减一等者其獲囚之處及死首之所即須遣使速報應减死之處若有驛之處發驛報之若使人及官司稽留令不得减罪致使囚已决訖者以入人罪故失論减一等謂故稽遲從故入上减死一等流三千里若失稽遲從失入罪上减一等總减罪人四等徒二年官司及使人各以所由為坐疑罪諸疑罪各依所犯以贖論疑謂虚實之證等是非之理均或事涉疑似傍無證見或傍有闕證事非疑似之類即疑獄法官執見不同者得為異議議不得過三䟽義曰疑罪謂事有疑似處斷難明各依所犯以贖論謂依所疑之罪用贖法収贖註云疑謂虚實之證等謂八品以下及庶人一人證虚一人證實二人以上虛實之證其數各等或七品以上各據衆証定罪亦各虚實之數等是非之理均謂有是處亦有非處其理各均或事渉疑似謂贓状渉於疑似傍無證見之人或傍有聞見之人其事全非疑似稱之類者或行迹是状驗非或聞證同情理異疑状既廣不可備論故云之類即疑獄謂獄有所疑法官執見不同議律論情各申異見得為異議聽作異同議不得過三謂如丞相以下通判者五人大理卿以下五人如此同判者多不可各為異議故云議不得過三唐律疏義卷三十
