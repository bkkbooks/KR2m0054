seq: 19
front:
  text: 其供神御所用之物而盗之者流
  hash: sha256:433cdf888e0cbdad66e9139ff0b5c74f804aff2b9eee9fb5f0925f75ddbf256c
body:
  text: 二千五百里註云謂供神御者帷帳几杖亦同謂見供神御者雖帷帳几杖亦得流罪故云亦同其擬供神御謂上文神御之物及帷帳几杖營造未成擬欲供進者故註云謂營造未成者及供而廢闋若享薦之具已饌呈者徒二年享薦謂玉帛牲牢之属饌呈謂已入祀所經祀官省視者未饌呈者徒一年半已闋者杖一百已闋謂接神禮畢若盗釡甑刀匕之屬並從常盗之法疏義曰供而廢闋謂神御之物供祭已訖退還所司者故云廢闋若享薦之具已饌呈者謂牲牢棗栗脯脩之屬已入神所呈閲祀官訖而盗者合徒二年故註云饗薦謂玉幣牲牢之屬未饌呈者徒一年半謂以上玉幣牲牢饌具之屬未饌呈祀官而盗者徒一年半已闋者謂神前飲食薦享已了退而盗者得杖一百若盗釡甑刀匕之屬謂並不用供神故從常盗之法一尺杖六十一疋加一等五疋徒一年五疋加一等罪止加役流言之屬謂盤盂雜器之類盗御寳諸盗御寳者絞乘輿服御物者流二千五百里謂供奉乘輿之物服通衾茵之屬真副等皆須監當之官部分擬進乃為御物其擬供服御及供而廢闋若食将御者徒二年将御謂已呈監當之官擬供食御及非服而御者徒一年半疏義曰稱御者太皇太后皇太后皇后亦同皇太子减一等皇帝八寳皆以玉為之有神寳受命寳皇帝行寳皇帝之寳皇帝信寳天子行寳天子之寳天子信寳此等八寳皇帝所用之物並為御寳其三后寳以金為之並不行用盗者俱得絞刑其盗皇太子寳凖例合减一等流三千里若盗皇太子妃寳亦流三千里后寳既與御寳不殊妃寳明與太子無别乘與服御物謂供奉乘輿服用之物三后服御之物亦同盗者流二千五百里若盗皇太子及妃所服用物凖例减一等合徒三年計贜重者即凖贜同常盗之法加一等註云謂供奉乘輿之物服通衾茵之屬稱之屬者氊褥之類真副等真謂見供服用之衣副謂副二之服皆須監當之官部分擬進者乃為御物其擬供服御謂營造未成及供而廢闋謂已供用事畢是名廢闋若食将御者謂御食已呈監當之官擬進而盗及食者從擬供服御以下各徒二年故註云将御謂已呈監當之官擬供食御謂未呈監當之官及非服而御之物者若食及盗各徒一年半贜重者各計贜以常盗論加一等盗官文書印諸盗官文書印者徒二年餘印杖一百謂貪利之而非行用者餘印謂印物及畜產者疏義曰印者信也謂印文書施行通達上下所在信受故曰官文書印盗此印者徒二年餘印杖一百餘印謂給諸州封函及畜産之印在令式印應官給但非官文書之印盗者皆杖一百註云謂貪利之而非行用者皆謂籍以為財不宜行用若将行用即從偽造偽冩封用規避之罪科之盗制書諸盗制書者徒二年官文書杖一百重害文書加一等紙券又加一等亦謂貪利之無所施用者重害謂徒罪以上獄案及婚姻良賤勲賞黜陟授官除免之類疏義曰盗制書徒二年勑及奏抄亦同勑㫖無御書奏抄即有御書不可以御書奏抄輕於勑㫖各與盗制書罪同官文書謂在司尋常施行文書有印無印等重害文書加一等合徒一年註云亦謂貪利之亦如上條盗印藉為財用無所施行重害謂徒罪以上獄案及婚姻良賤勲賞黜陟授官除免之類者之類者謂倉糧財物行軍文簿帳及户籍手實之屬盗者各徒一年若欲動事盗者自從増减之律即盗應除文案者依凢盗法疏義曰即盗應除文案者依令文案不須常留者每三年一揀除既是年久應除即非見行文案故依凢盗之法計贜科罪盗宫殿門符諸盗宫殿門符發兵符傳符者流二千里使節及皇城京城門符徒三年餘符徒一年門鑰各减三等盗州鎮及倉厨廐庫闗門等鑰杖一百縣戍等諸門鑰杖六十疏義曰開閉殿門皆用銅魚合符用符鑰法式已于擅興律解訖發兵符以銅為之左者進内右者付州府監及提兵鎮守之所并留守應執符官人其符雖通餘用為發兵事重故以發兵為目傳符謂給将乘驛者依公式令下諸方傳符兩京及北都留守為麟符東方青龍西方白虎南方朱雀北方𤣥武兩京留守二十左十九右一餘皆四左三右一左者進内右者付外州府監應執符人其兩京及北都留守符並進内須遣使向四方皆給所詣處左符書于骨帖上内着符裏用泥封以門下省印印之所至之處以右符勘合然後承用盗者合流二千里節者皇華出使黜陟幽明輶軒奉制宣威殊俗皆執旌節取信天下及皇城門謂朱雀等門京城門謂明徳等門盗此門符及使節者各徒三年餘符徒一年餘符謂禁苑及交廵等符案擅興律凢言餘符者契亦同即契應發兵者同發兵符法然則盗發兵契各同餘符之罪門鑰各减三等謂各减所開閉之門魚符三等假有盗宫殿門符合流二千里門鑰减三等得徒二年餘鑰應减門符並凖此若是禁苑門鑰不可輕於州鎮闗門等鑰盗州鎮及官倉厨廐庫及闗門等鑰各杖一百縣戍等諸門鑰稱諸門鑰者謂内外百司及坊市門官有門禁盗其鑰者各杖六十盗禁兵器諸盗禁兵器者徒二年甲弩者流二千里若盗罪輕同私有法盗餘兵器及旌旗幡幟者杖九十若盗守衛宫殿兵器者各加一等即在軍及宿衞相盗還充官用者各减二等疏義曰盗禁兵器者徒二年謂非弓箭刀楯短矛私家不合有者皆為禁兵器甲弩者流二千里盗罪輕者同私有法即是盗弩一張流二千里盗甲一領亦流二千里案擅興律私有甲一領及弩三張流二千里甲三領及弩五張絞盗甲三領或盗弩五張並得絞罪是名盗罪輕同私有法其盗餘兵器謂雖是官兵器私家合有者及旌旗幡幟者杖九十並據盗官物計贜重加凢盗一等若盗守衛宫殿兵器者又各加一等謂見用守衛宫殿加凢盗二等即在軍謂在行軍之所若宿衛相盜還充官用者各減二等若入私者各同上文盜法盗毁天尊佛像諸盗毁天尊像佛像者徒三年即道士女冠盗毁天尊像僧尼盗毁佛像者加役流真人菩薩各减一等盗而供養者杖一百盗毁不相須疏義曰凢人或盗或毁天尊若佛像各徒三年道士女冠盗毁天尊像僧尼盗毁佛像者各加役流為其盗毁所事先聖形像故加役流不同俗人之法真人菩薩各减一等凢人盗毁徒二年半道士女冠盗毁真人僧尼盗毁菩薩各徒三年盗而供養者杖一百謂非貪利将用供養者但盗之與毁各得徒流之坐故註云盗毁不相須其非真人菩薩之像盗毁餘像者若化生神王之類當不應為從重有贜入己者即依凢盗法若毁損功庸多者計庸坐贜論各令修立其道士等盗毁佛像及菩薩僧尼盗毁天尊若真人各依凢人之法發冢問答一諸發冢者加役流發徹即坐招䰟而𦵏亦是已開棺槨者絞發而未徹者徒三年疏義曰禮云葬者藏也欲人不得見古之𦵏者厚衣之以薪後代聖人易之以棺槨有發冢者加役流註云發徹即坐招魂而𦵏亦是謂開至棺槨即為發徹先無屍柩招魂而𦵏但使發徹者並合加役流已開棺槨者絞謂有棺有槨者必須棺槨兩開不待取物觸屍俱得絞罪其不用棺槨𦵏者若發而見屍亦同已開棺槨之坐發而未徹者謂雖發冢而未至棺槨者徒三年其冢先穿及未殯而盗屍柩者徒二年半盗衣服者减一等器物甑版者以凢盗論疏義曰其冢先穿謂先自穿陷舊有隙宂者未殯謂屍猶在外未殯埋而盗屍柩者徒二年半謂盗者原無惡心或欲詐代人屍或欲别處改𦵏之類盗衣服者减一等得徒二年計贜重者以凢盗論加一等此文既稱未殯明上文發冡殯訖而發者亦是若盗器物甎版者謂冡先穿取其明器等物或甎若版以凢盗論問曰發冢者加役流律既不言尊卑貴賤未知發子孫冢得罪同凢人否答曰五刑之屬條有三千犯状既多故通比附然尊卑貴賤等數不同刑名輕重粲然有别尊長發卑幼之墳不可重於殺罪若發尊長之冢據法止同凢人律云發冢者加役流在于凢人便减殺罪一等若發卑幼之冢須减本殺一等而科之已開棺槨者絞即同已殺之坐發而未徹者徒三年計凢人之罪减死二等卑幼之色亦於本殺上减二等而科若盗屍柩者依减三等之例其於尊長並同凢人盗園陵内草木諸盗園陵内草木者徒二年半若盗他人墓塋内樹者杖一百疏義曰園陵者三秦記云帝王陵有園因謂之園陵三輔黄圖云謂陵四䦨門通四園然園陵草木而合芟刈而有盗者徒二年半若盗他人墓塋内樹者杖一百若贜重者凖下條以凢盗論加一等若其非盗唯止斫伐者凖雜律毁伐樹木稼穡各凖盗論園陵内徒二年半他人墓塋内樹杖一百盗官私牛馬殺諸盗官私牛馬而殺者徒二年半疏義曰馬牛軍國所用故與餘畜不同若盗而殺者徒二年半若凖贜重於徒二年半者以凢盗論加一等其有盗殺􅈊牛之類鄉俗不用耕駕者計贜以凢盗論盗不計贜罪名諸盗不計贜而立罪名及言减罪而輕於凢盗者計贜重以凢盗論加一等疏義曰從盗大祀神御之物以下不計贜科唯立罪名亦有减處並謂得罪應重故别立罪名若减罪輕于凢盗者各須計贜以凢盗論加一等假有盗他人馬牛而殺評馬牛贜直絹二十疋若計凢盗合徒二年半以盗殺馬牛故加凢盗一等處徒三年及言减罪輕於凢盗者上條盗屍柩者徒二年半盗衣服者减一等假有盗屍柩上衣服絹二十疋依凢盗法徒二年半文稱减一等只徒二年故凢盗加一等亦徒三年是名以凢盗論加一等若盗皇太子服用及盗中小祀等物雖得减罪亦是盗不計贜强盗問答一諸强盗謂以威若力而取其財先强後盗先盗後强等若與人藥酒及食使狂亂取財亦是即得闌遺之物毆擊財主而不還及竊盗發覺棄財逃走財主追捕因相拒捍如此之類事有因緣者非强盗疏義曰强盗取人財註云謂以威若力假有以威脅人不加兇力或有直用兇力不作威脅而刼掠取財者先强後盗謂先加迫脅然後取財先盗後强謂先竊其財事覺之後始加威力如此之例俱為强盗若飲人藥酒或食中加藥令其迷謬而取其財者亦從强盗之法即得闌遺之物財主來認因即毆擊不肯還物及竊盜取人財財主知覺遂棄財逃走財主逐之因相拒捍如此之類是事有因緣並非强盜自從鬬毆及拒捍追捕之法問曰據捕亡律被盜雖傍人皆得捕繫未審盜者将財逃走傍人追捕因即格傷或絶時不絶時得罪同强盜否答曰依律盜者雖是傍人皆得捕繫以送官司盜者既将財逃走傍人依律合捕其人乃拒傷捕者即是先盜後强絶時以後捕者既無財主尋逐便是不知盜由因相拒格唯有拒捕之罪不成强盜不得財徒二年一尺徒三年二疋加一等十疋及傷人者絞殺人者斬殺傷奴婢亦同雖非財主但因盜殺傷皆是其持仗者雖不得財流三千里五疋絞傷人者斬疏義曰盜雖不得財徒二年若得一尺即徒三年每二疋加一等贜滿十疋雖不滿十疋及不得財但傷人者並絞殺人者並斬謂因盜而殺傷人者註云殺傷奴婢亦同諸條奴婢多悉不同良人於此殺傷奴婢亦同良人之坐雖非財主但因盜殺傷皆是無問良賤皆如財主之法盜人若持仗雖不得財猶流三千里贜滿五疋合絞持仗者雖不得財傷人者斬罪無首從竊盜諸竊盜不得財笞五十一尺杖六十一疋加一等五疋徒一年五疋加一等五十疋加役流疏義曰竊盜人財謂潛形隱面而取盜而未得者笞五十得財一尺杖六十一疋加一等即是一疋一尺杖七十以次而加至贜滿五疋不更論尺即徒一年每五疋加一等四十疋流三千里五十疋加役流其有于一家頻盜及一時而盜數家者並累而倍論倍謂二尺為一尺若有一處贜多累倍不加重者止從一重而㫁其倍贜依例總徵監臨主守自盜諸監臨主守自盜及盜所監臨財物者若親王財物而監守自盗亦同加凢盜二等三十疋絞本條已有如者亦累加之疏義曰假如左藏庫物則太府卿丞為監臨左藏令丞為監事見守庫者為主守而自盜庫物者為監臨主守自盜又如州縣官人盜部内人財物是為盜所監臨註云若親王財物依令皇兄弟皇子為親王監守自盗王家財物亦同官物之罪加凢盜二等一尺杖八十一疋加一等一疋一尺杖九十五疋徒二年五疋加一等是名加凢盜二等三十疋絞註云本條已有加者亦累加之謂監臨主守自盜所監主不計闕之物計贜重者以凢盜論加一等即是本條已有加於此又加二等假有武庫令自盜禁兵器計贜直絹二十疋凢人盜者二十疋合徒二年半以盜不計贜而立罪名計贜重者加凢盜一等徒三年監主又加二等流二千五百里如此之類是本條已有加者亦累加之故燒人房屋問荅一諸故燒人舍屋及積聚之物而盜者計所燒减價併贜以強盜論疏義曰賊人姦詐千端萬緒濫竊穿窬觸途詭譎或有燒人舍屋及積聚之物因即盜取其財計所燒之物减價併於所盜之物計贜以强盜論十疋絞問曰有人持仗燒人舍宅因即盜取其財或燒傷物主合得何罪答曰依雜律故燒人舍屋徒三年不限强之與竊然則持仗燒人舍宅止徒三年因即盜取財物便是原非盜意雖復持仗而行事同先强後盜計贜以强盜科罪火若傷人者同强盜傷人法恐喝取人財物問答二諸恐喝取人財物者口恐喝亦是凖盜論加一等雖不足畏忌財主懼而自與亦同輾轉傳言而受財者皆為從坐若為人所侵損恐喝以求備償事有因緣之類者非疏義曰恐喝者謂知人有犯欲相告訴恐喝以取財物者註云口恐喝亦是雖口恐喝亦與文牒同計贜凖盗論加一等謂一尺杖七十一疋加一等五疋徒一年半五疋加一等三十五疋流三千里雖不足畏忌但財主懼而自與財者亦同恐喝之罪註云輾轉傳言假若甲遣乙丙傳言于丁恐喝取物五疋甲合徒一年半乙丙並各徒一年是名展轉傳言受財者皆為從坐若為人所侵損恐喝以求備償假有甲為乙踐損田苗遂恐喝於乙得倍苗之外更取財者為有損苗之由不當恐喝之坐苗外餘物即當非監臨主司因事受財坐贜論科㫁此是事有因緣之類者非恐喝問曰恐喝取財五疋首不行又不受分傳言者二人一人受財一人不受財各合何罪答曰律稱凖盜須依盜法案下條共盜者併贜論造意及從行而不受分即受分而不行各依本首從法若造意不行又不受分即以行人專進止者為首造意為從至死减一等從者不行又不受分笞四十其首不行又不受分即以傳言取物者為首五疋合徒一年半造意者為從合徒一年又一人不受分亦合為從笞五十問曰監臨恐喝所部取財合得何罪答曰凢人恐喝取財準盜論加一等監臨之官不同凢人之法名例當條雖有罪名所為重者自從重理從强乞之律合凖枉法而科若知有罪不虗恐喝取財物者合從真枉法而㫁若財未入者杖六十即緦麻以上自相恐喝者犯尊長以凢人論强盜亦凖此犯卑幼各依本法疏義曰恐喝取財無限多少財未入者杖六十即緦麻以上自相恐喝者犯尊長以凢人準盜論加一等强盜亦準此者謂别居期親以下卑幼于尊長家行强盜者雖同于凢人家强盜得罪若有殺傷應入十惡者仍入十惡犯卑幼各依本法謂恐喝緦麻小功卑幼取財者减凢人一等五疋徒一年大功卑幼减二等五疋杖一百期親卑幼减三等五疋杖九十之類本以他故毆人奪物問答二諸本以他故毆擊人因而奪其財物者計贜以强盜論至死者加役流疏義曰謂本無規財之心乃為别事毆打因見財物遂即奪之事類先强後盜故計贜以强盜論一尺徒三年二疋加一等以先無盜心之故贜滿十疋應死者加役流若奪財物不得者止從故鬬毆法文稱計贜以强盜論奪物贜不滿尺同强盜不得財徒二年既原無盜心雖持仗亦不加其罪因而竊取者以竊盜論加一等若有殺傷者各從故鬬法疏義曰先因他故毆擊而輙竊取其財以竊盜論加一等一尺杖七十一疋加一等若有殺傷者謂本因毆擊殺傷原非盜財損害各從故鬬法謂因鬬致死者絞故殺者斬稱各者從强奪及竊取各以故鬬論問曰監臨官司本以他故毆擊部内之人因而奪其財物或竊取三十疋者合得何罪答曰律稱本因他故毆擊人原即無心盗物毆訖始奪事與强盜相類凖贜雖依强盜罪止加役流故知其贜雖多法不至死因而竊取以竊盜論加一等者為監臨主司毆擊部内因而竊物以竊盜論加凢盜三等上文强盜既不至死下文竊盜不可引入絞刑三十疋者罪止加役流又問名例云稱以盜論者與真犯同此條因而竊取以竊盜論加一等既云加一等即重於竊之法監臨竊三十疋者絞今答不死理有未通答曰本條别有制與例不同者依本條文稱奪其財物者以强盜論至死者加役流又云加者不得加至于死是明本以他故毆人因而奪物縱至百疋罪止加役流况于竊取人財豈得加入于死監臨雖有加罪加法不至死刑况下條略奴婢及和誘各依强盜等法罪止流三千里註云雖監臨守守亦同即此條雖無監臨之文亦不加入于死唐律疏義卷十九欽定四庫全書唐律疏義卷二十唐長孫無忌等撰賊盗四凢一十五條盗緦麻小功財物諸盗
