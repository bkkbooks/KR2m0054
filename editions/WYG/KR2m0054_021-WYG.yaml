seq: 21
front:
  text: 止犯流
  hash: sha256:47c8810955910a55a00cafdc8ebd0ea1c03c40f1e1e3f1b7cbb92848cef1ff45
body:
  text: 徒或一兩度從死會降總計三犯亦同三犯流徒以否答曰律有赦後之文不言降前之犯死罪會降止免極刑流徒之科本法仍在然其所犯本坐重于正犯徒流凖律而論總當三犯之例公取竊取皆為盜諸盗公取竊取皆為盜器物之屬須移徙間國繫閉之屬須絶離常處放逸飛走之屬須專制乃成盜若畜産伴類隨之不併計即将入己及盜其母而子隨者皆併計之疏義曰公取謂行盜之人公然而取竊取謂方便私竊其財皆名為盜註云器物之屬須移徙者謂器物錢帛之類須移徙離于本處珠玉寳貨之類據入于隱藏縱未将行亦是其木石重器非人力所勝應須䭾載者雖移本處未䭾載間猶未成盗但物有巨細難以備論略舉綱目各凖臨時取㫁闌圈繫閉之處放逸飛走之屬謂鷹犬之類須專制在已不得自由乃成為盜若畜産伴類隨之假有盜馬一疋别有馬隨不合併計為罪即因逐伴而來遂将入己及盜其母而子隨之者皆併計為罪部内容止盜者諸部内有一人為盜及容止盜者里正笞五十坊正村正亦同三人加一等縣内一人笞三十四人加一等部界内有盜發及殺人者一處以一人論殺人者仍同强盜之法疏義曰部内諸州縣鄉里所管之内百姓有一人為盜及容止盜者謂外盜入境所部容止所管里正笞五十註云坊正村正亦同謂得罪亦同里正三人加一等四人行盜合杖六十縣内一人笞三十謂縣内一人行盜縣令笞三十四人加一等有五人行盜即笞四十之類註云部界内有盜發謂里正等以上部界之内有盜發及殺人者一處以一人論謂一處盜發同部内一人行盜一處殺人同一人行强盜故云一處以一人論殺人者仍從强盜之法下文强盜者加一等殺人者亦加一等與强盜同即是部内有一人强盜者里正等杖六十雖非部内人但當境内强盜發亦準此容止殺人賊者亦依强盜之法州隨所管縣多少通計為罪各罪止徒二年强盜者各加一等皆以長官為首佐職為從疏義曰州隨所管縣多少通計為罪各罪止徒二年謂州縣里正坊正村正等並罪止徒二年强盜者各加一等罪止徒二年半上註云殺人同强盜之法故知殺人及發處若容止各凖強盜加之其通計之法已於戸婚律解訖註云以長官為首佐職為從但宣風導俗肅清所部長官之事故以長官為首即刺史縣令闕者以次官當之既云佐職為從即罪不及主典即盜及竊發殺人後三十日捕獲他人自捕等主司各勿論限外能捕獲追減三等若軍役有所犯隊正以上折衝以下各凖部内征人冐名之法同州縣為罪疏義曰謂部内有人行盜及當境盜發及部内人殺他人及境内人被他殺事發後三十日自捕獲并他人捕獲主司各勿論並得免罪若三十日限外能捕獲者追減三等稱追減者雖結正訖仍得減之若已經奏決者依捕亡律不在追減之例其軍役有犯謂行軍及領軍人徭役之所有犯盜及殺人事發若容止盜者隊正隊副以上折衝以下得罪並凖部内征人冒名之法同州縣為罪謂隊正隊副團内一人為盜及容止盜者若有盜發之所竊盜者各笞五十若是强盜及殺人若被殺之處每事各加一等校尉旅帥减隊正隊副一等折衝果毅凖所管校尉多少通計為罪假如部内一人為盜及容止盜者里正笞五十三人加一等計隊正同里正亦一人笞五十三人加一等計二十五人罪止徒二年旅帥校尉一人笞四十二十五人罪止徒一年半折衝果毅如管三校尉三人笞四十七十五人徒一年半管四校尉者四人笞四十一百人罪止徒一年半同州縣為罪長官為首佐職為從唐律疏義卷二十欽定四庫全書唐律疏義卷二十一唐長孫無忌等撰鬬訟一凢一千五條疏義曰鬭訟律者首論鬬訟之科次言告訟之事從秦漢至晉未有此篇至後魏太和年分擊訊律為鬭律至北齊以訟事附之名為鬬訟律後周為鬭競律隋開皇依齊鬬訟名至今不改賊盜之後須防鬬訟故次於賊盜之下鬬毆手足他物傷問答一諸鬭毆人者笞四十謂以手足擊人者傷及以他物毆人者杖六十見血為傷非手足者其餘皆為他物即兵不用刃亦是疏義曰相爭為鬬相擊為毆若以手足毆人者笞四十註云謂以手足擊人者舉手足為例用頭擊之類亦是傷謂手足毆傷及以他物毆而不傷者各杖六十註云見血為傷謂因毆而見血者非手足者即兵不用刃亦是謂手足之外雖是兵器但不用刃者皆因他物之例問曰毆人者謂以手足擊人其有撮挽頭髮或擒其衣領亦同毆擊以否答曰條云鬭毆謂以手足擊人明是雖未損傷下手即便獲罪至如挽鬢撮髮擒領扼喉既是傷殺于人状則不輕於毆例同毆法理用無惑傷及拔髮方寸以上杖八十若血從耳目出及内損吐血者各加二等疏義曰謂他物毆人傷及拔髮方寸以上各杖八十方寸者謂量拔髮無毛之所縱橫徑各滿方寸者若方斜不等圍繞四方為方寸若毆人頭面其血或從耳或從目而出及毆人身體内損而吐血者各加手足及他物毆傷罪二等其拔髮不滿方寸者止從毆法其有拔鬢亦凖髮為坐若毆鼻頭血出止同傷科毆人痢血同吐血例鬬毆折齒毁耳鼻諸鬭毆人折齒毁缺耳鼻眇一目及折手足指眇謂虧損其明而猶見物若破骨及湯火傷人者徒一年折二齒二指以上及髠髮者徒一年半疏義曰因鬬毆人而折其齒或毁破及缺宂人耳鼻即毁缺人口眼亦同眇一目謂毆眇其目虧損其明而猶見物者及折手足指若因打破骨而非折者及以湯若火燒盪傷人者各徒一年若湯火不傷從他物毆法若折二齒二指以上稱以上者雖折更多亦不加罪及髠截人髮者各徒一年半其髠髮不盡仍堪為髻者止當拔髮方寸以上杖八十若因鬬髠髮遂将入已者依賊盜本以他故毆擊人因而奪其財物計贜以强盜論以銅鐡汁傷人比湯火傷人如其以虵蜂蝎螫人同他物毆傷法若毆人十指並折不堪執物即二支廢從篤疾科流三千里兵刃斫射人諸鬬以兵刃斫射人不着者杖一百兵刃謂弓箭矟矛躓之屬即毆罪重者從毆法疏義曰因鬬遂以兵刃斫射人不着者杖一百註云兵刃謂弓箭刀矟矛躓之屬稱之屬者雖用殳㦸等皆是即毆罪重者謂本條毆罪得徒一年以上者斫射人不着即從毆法假如因鬬斫射小功兄姊而不着者即依本條毆罪科徒一年即不從斫射之罪如此之類即從毆法若刃傷刃謂金鐡無大小之限堪以殺人者及折人肋眇其兩目墮人胎徒二年墮胎者謂辜内子死乃坐若辜外死者從本毆傷論疏義曰若刃傷謂以金刃傷人註云刃謂金鐡無大小之限堪以殺人者及折人肋謂鬬毆人折肋眇其兩目亦謂虧損其明而猶見物墮人胎謂在孕未生因打而落者各徒二年註云墮胎者謂在辜内子死乃坐謂在母辜限之内而子死者子雖傷而在母辜限外死者雖或在辜内胎落而子未成形者各從本損傷法無墮胎之罪其有毆親屬貴賤等胎落者各從徒二年上為加減之法皆須以母定罪不據子作尊卑若依胎制刑或致欺紿故保辜止保其母不因子立辜為無害子之心也若毆母罪重同折傷科之假有毆姊胎落依下文毆兄姊徒二年半折傷者流三千里又條折傷謂折齒以上墮胎合徒二年重于折齒之坐即毆姊落胎合流三千里之類毆人折跌支體瞎目問答一諸鬬毆折跌人支體及瞎其一目者徒三年折支者折骨跌體者骨差跌失其常處辜内平復者各减二等餘條折跌平復凖此疏義曰因鬬毆折跌人支體支體謂手足或折其手足或跌其骨體及瞎一目謂一目喪明全不見物者各徒三年註云折支者謂折四支之骨跌體者謂骨節差跌失于常處辜内平復者謂折跌人支體及瞎一目于下文立辜限内骨節平復及目得見物並於本罪上減二等各徒二年註云餘條折跌平復凖此謂於諸條尊卑貴賤等鬬毆及故毆折跌辜内平復並減二等雖非支體于餘骨節平復亦同若支先攣是廢疾被折故此毆攣支止依毆折一支流二千里有蔭合同减贖何者例云故毆人至廢疾流不合減贖今先廢疾不因毆令廢疾所以聼其減贖即損二事於上及因舊患令至篤疾若㫁舌及毁敗人陰陽者流三千里疏義曰即損二事以上者謂毆人一目瞎及折一支之類及因舊患令至篤疾假有舊瞎一目為殘疾更瞎一目成篤疾或先折一脚為廢疾更折一脚為篤疾若㫁舌謂全不得語毁敗陰陽謂孕嗣廢絶者各流三千里㫁舌語猶可解毁敗陰陽不絶孕嗣者並從傷科問曰人目先盲重毆睛壞口或先瘂更㫁其舌如此之類各合何罪答曰人貌肖天地禀形父母莫不愛其所受樂天委命雖復宿遭痼疾然亦痛此重傷至于被人毁損在法豈宜異制如人舊瘂或先喪明更壞其睛或㫁其舌止得守文還科㫁舌瞎目之罪鬬故殺用兵刃問答一諸鬭毆殺人者絞以刃及故殺人者斬雖因鬬而用兵刃殺者與故殺同為人以兵刃逼己因用兵刃拒而傷殺者依鬬法餘條用兵刃凖此疏義曰鬬毆者原無殺心因相鬬毆而殺人者絞以刃及故殺者謂鬬而用刃即有害心及非因鬬爭無事而殺是名故殺各合斬罪雖因鬬而用兵刃殺者本雖是鬬乃用兵刃殺人者與故殺同亦得斬罪並同故殺之法註云為人以兵刃逼己因用兵刃拒而傷殺逼己之人雖用兵刃亦依鬬殺之法餘條用兵刃凖此謂餘親戚良賤以兵刃逼人人以兵刃拒殺者並凖此鬭法又律云以兵刃殺者與故殺同既無傷文即是傷依鬬法註云因用兵刃拒而傷殺者為以兵刃傷人因而致死故連言之問曰故殺人合斬用刃鬬殺亦合斬刑得罪既是不殊凖文更無異理何須云用兵刃殺者與故殺同答曰名例犯十惡及故殺人者雖會赦猶除名兵刃殺人者其情重文同故殺之法會赦猶遣除名不因鬬故毆傷人者加鬬毆傷罪一等雖因鬭但絶時而殺傷者從故殺傷法疏義曰不因鬭競故毆傷人者加鬬毆傷一等若拳毆不傷笞四十上加一等合笞五十之類雖因鬭但絶時而殺傷者謂忿競之後各已分散聲不相接去而又來殺傷者是名絶時從殺傷法保辜諸保辜者手足毆傷人限十日以他物毆傷人者二十日以刃及湯火傷人者三十日折跌支體及破骨者五十日毆傷不相須餘條毆傷及殺傷各凖此疏義曰凢是毆人皆立辜限手足毆人傷與不傷限十日若以他物毆傷者限二十日以刄刄謂金鐵無大小之限及湯火傷人謂灼爛皮膚限三十日若折骨跌體及破骨無問手足他物皆限五十日註云毆傷不相須謂毆及傷各保辜十日然傷人皆須因毆今言不相須者為下有僵仆或恐迫而傷此則不因毆而有傷損故律云毆傷不相須餘條毆傷折足殺傷各凖此謂諸條毆人或傷人故鬭謀殺强盜應有罪者保辜並準此限内死者各依殺人論其在限外及雖在限内以他故死者各依本毆傷法他故謂别増餘患而死者疏義曰限内死者各依殺人論謂辜限内死者不限尊卑良賤及罪輕重各依本條殺罪科㫁其在限外假有拳毆人保辜十日計累千刻之外是名限外及雖在限内謂辜限未滿以他故死者他故謂别增餘患而死假毆人頭傷風從頭瘡而入因風致死之類仍依殺人論若不因頭瘡得風别因他病而死是為他故各依本毆傷法故註云他故謂别增餘患而死其有墮胎瞎目毁敗陰陽折齒等皆約手足他物以刃湯火為辜限同謀不同謀毆傷人問答一諸同謀共毆傷人者各以下手重者為重罪元謀减一等從者又减一等若元謀下手重者餘各减二等至死者隨所因為重罪疏義曰同謀共毆傷人者謂二人以上同心計謀共毆傷人者假有甲乙丙丁謀毆傷人甲為元謀乙下手最重毆人一支折以下手重為重罪乙合徒三年甲是元謀减一等合徒二年半丙丁等為從又减一等合徒二年若不因鬬乙為故毆之首合流二千里甲是元謀减一等合徒三年丙丁徒二年半若是元謀下手重者假甲為元謀下手最重即甲合徒三年乙丙丁各减二等並徒二年若故毆即甲合流二千里餘各减二等各徒二年半之類至死謂被毆人致死隨所因為重罪謂甲毆頭乙毆手丙毆足若由頭瘡致死者即甲為重罪由手傷致死即乙為重罪由足傷致死者即丙為重罪重罪者償死餘各減二等徒三年甲是元謀止减一等流二千里其不同謀者各依所毆傷殺論其事不可分者以後下手為重罪疏義曰其不同謀者假有甲乙丙丁不同謀因鬭共毆傷一人甲毆頭傷乙打脚折丙打指折丁毆不傷若因頭瘡致死甲得殺人之罪償死乙為折支合徒三年丙為指折合徒一年丁毆不傷合笞四十是為各依所毆傷殺論其事不可分者謂此四人共毆一人其瘡不可分别被毆致死以後下手者為重罪謂丁下手最後即以丁為重罪餘各徒三年元謀减一等流三千里若亂毆傷不知先後輕重者以謀首及初鬭者為重罪餘各减二等疏義曰假有人羣黨共毆亂毆傷人被傷殺者不知下手人名又不知先後輕重若同謀毆之即以謀首為重罪其不同謀亂毆傷者以初鬭者為重罪自餘非謀首及非初鬭各减二等徒三年若不至死唯折二支若謀鬬者謀首流三千里餘各徒二年半其不同謀初鬬者流三千里餘亦减二等問曰甲乙丙三人同謀毆人各拳毆一下合作首從以否答曰律云同謀共毆人者各以下手重者為重罪此據辜内致死故有節級减文下又云不同謀者各依所毆傷殺論即明毆者得毆罪傷者得傷罪殺者得殺罪拳毆人者笞四十不同謀者各從毆科同謀毆人豈得减罪是知各笞四十不為首從若更有丁亦與甲乙丙同謀丁不下手又非元謀即减二等笞二十之類又問甲乙二人同謀毆人甲是元謀又先下手毆一支折乙為從後下手毆一目瞎各合何罪答曰據上條折跌人支體及瞎其一目者徒二年即損二事以上及因舊患令至篤疾者流三千里此即同謀共毆人傷損二事甲雖謀首合徒三年由乙損二事合流三千里若不同謀各損一事俱得本罪並徒三年威力制縛人諸以威力制縛人者各以鬬毆論因而毆傷者各加鬬毆傷二等疏義曰以威若力而能制縛于人者各以鬬毆論依上條手足之外皆為他物縛人皆用徽纆明同他物之限縛人不傷合杖六十若傷杖八十因而毆傷者謂因縛即毆者傷與不傷各加鬬毆傷二等謂因縛用他物毆不傷者杖八十傷者杖一百之類是名各加鬬毆傷二等即威力使人毆擊而致死傷者雖不下手猶以威力為重罪下手者减一等疏義曰威力使人者謂或以官威或恃勢力之類而使人毆擊他人致死傷者威力之人雖不下手猶以威力為重罪下手者减一等假有甲恃威力而使乙毆殺丙丁雖不下手猶得死罪乙减一等流三千里若折一指甲雖不下手合徒一年乙减一等杖一百之類甲是監臨官百姓無罪喚問事以杖依法决罰致死官人得殺人罪問事不坐若遣用他物手足打殺官人得威力殺人罪問事下手者减一等科兩相毆傷論如律問答一諸鬭兩相毆傷者各隨輕重兩論如律後下手理直者减二等至死者不减疏義曰鬬兩相毆傷者假有甲乙二人因鬬兩相毆傷甲毆乙不傷合笞四十乙毆甲傷合杖六十之類或甲是良人乙是賤𨽻甲毆乙傷减凢人二等合笞四十乙毆甲不傷加凢人二等合杖六十之類其間尊卑貴賤應有加减各凖此例後下手理直者减二等假甲毆乙不傷合笞四十乙不犯甲無辜被打遂拒毆之乙是理直减本毆罪二等合笞二十乙若因毆而殺甲本罪縱不至死即不合减故註云至死者不减問曰尊卑相毆後下手理直得减未知伯叔先下手毆姪兄姊先下手毆弟妹其弟姪等後下手理直得減以否答曰凢人相毆條式分明五服尊卑輕重頗異只如毆緦麻兄姊杖一百小功大功逓加一等若毆緦麻以下卑幼折傷减凢人一等小功大功逓减一等據服雖是尊卑相毆兩俱有罪理直則減法亦無疑若其毆親姪弟妹至死然始獲罪傷重律則無辜罪既不合兩論理直豈宜許减舉伯叔兄姊但毆傷卑幼無罪者並不入此條宫内忿爭諸於宫内忿爭者笞五十聲徹御所及相毆者徒一年以刃相向者徒三年疏義曰宫殿之内致敬之所忽敢忿爭情乖恭肅故宫内忿爭者笞五十嘉徳等門以内為宫内衞禁律宫城有犯與宫門同即順天等門内亦是若忿競之聲徹於御所及有相毆擊者各徒一年以刃相向者徒二年既不論兵刃即是刃無大小之限殿内逓加一等傷重者又加鬬毆傷二等計加重于本罪即須加餘條稱加者凖此疏義曰殿内忿爭逓加一等者謂太極等門為殿内忿爭杖六十聲徹御所及相毆者徒一年半以刃相向徒二年半若上閣内忿爭杖七十聲徹御所及相毆者徒二年以刃相向者徒三年傷重者各加鬬傷二等假有凢鬬以他物毆傷人内損吐血合杖一百宫内加二等徒一年半即重于宫内相毆徒一年凢鬬毆人折齒合徒一年若于殿内是傷重加二等合徒二年是重于殿内相毆徒一年半此為各加鬬傷二等註云計加重于本罪即須加謂殿内凢鬬相毆不傷合徒一年半假有甲於殿内毆緦麻尊長本罪合徒一年由在殿内故加罪二等合徒二年是名計加重於本罪不加本罪者假如毆緦麻兄姊合杖一百以在殿内故加二等合徒一年半即與殿内凢鬬罪同此是計加不重于本罪止依本徒一年半為坐餘條稱加者凖此謂一部律内稱加得重于本罪者即須加加不重者從本法毆制使府主縣令諸毆制使本屬府主刺史縣令及吏卒毆本部五品以上官長徒三年傷者流二千里折傷者絞折傷謂折齒以上疏義曰有因忿而毆制使本屬府主刺史縣令及吏卒毆本部五品以上官長其吏卒等並于名例解訖毆者合徒三年傷者流二千里折傷者絞註云折傷謂折齒以上依上條鬬毆人折齒毁缺耳鼻眇一目及折手足指若破骨及湯火傷人者各徒一年此云折傷者折齒以上得徒一年以上皆是若毆六品以下官長各減三等減罪輕者加凢鬬一等死者斬詈者各减毆罪三等須親自聞之乃成詈疏義曰六品以下官長謂下鎮将及戍主若諸陵署在外諸監署六品以下雖𨽻寺監當監署有印别起正案行事皆為當處官長所管吏卒而毆者各減毆五品以上官長罪三等合徒一年半若傷者流上減三等合徒二年折傷者死上減三等徒二年半减罪輕者加凢鬬一等假有凢人故毆六品官長折肋合徒二年半從死減三等亦徒二年半據上條訃加重于本罪即須加既云加凢鬬一等從徒二年半上加一等處徒三年下條流外官毆九品以上各又加二等合流二千五百里如此等各减罪輕者加凢鬬一等因毆致死者斬詈者减毆罪三等謂詈制使以下本部官長以上從徒三年上減三等合徒一年半若詈六品以下官長又減三等合杖九十此名詈者各減毆罪三等註云須親自聞之乃成詈謂皆須被詈者親自聞之乃為詈即毆佐職者徒一年傷重者加凢鬬傷一等死者斬疏義曰毆佐職者謂除長官之外當司九品以上之官皆為佐職所部吏卒毆者徒一年傷重者假如他物故毆傷佐職凢鬬合杖九十九品以上加二等合徒一年為佐職又加一等徒一年半之類是名傷重者加凢鬬一等至死者斬佐職統屬毆長官諸佐職及所統屬官毆傷官長者各減吏卒毆傷官長二等减罪輕者加凢鬬一等死者斬疏義曰佐職謂當司九品以上及所統屬官者若省寺監管局署州管縣鎮管戍衛管諸府之類是所統屬毆傷官長者官長謂尚書省諸司尚書寺監少卿少監國子司業以上少尹諸衛将軍以上千牛府中郎将以上諸率府副率以上諸府果毅以上王府司馬并諸州别駕雖是次官並同官長或唯有長官一人佐職毆者各减吏卒毆傷官長罪二等即吏卒毆官長折傷者絞若佐職及所統屬官毆五品以上官長折傷減吏卒二等合徒三年若毆六品以下官長折傷者减三等徒一年半减罪輕者加凢鬬一等假如佐職毆六品以下官長折二齒從死上减五等合徒一年半凢鬬折二齒亦徒一年半上條計加重于本罪即須加更加一等處徒二年餘罪計加得重並凖此若佐職及所統屬官毆傷五品以上官長者各減吏卒二等假有吏卒毆五品以上官長折肋合死今為佐職毆减吏卒二等合徒三年折肋本罪合徒二年别條六品毆傷五品加二等合徒三年既云減罪輕者加凢鬬一等合流二千里死者斬毆府主縣令父母諸毆本屬府主刺史縣令之祖父母父母及妻子者徒一年傷重者加凢鬬傷一等疏義曰毆本屬府主刺史縣令之祖父母父母及妻子者徒一年傷重者加凢鬬傷一等謂折一指或折一齒凢毆亦徒一年傷重者加凢鬬傷一等一等合徒一年半之類府主等祖父母父母若是議貴凢毆得徒二年為是本屬府主之祖父母父母加一等得徒二年半傷重以上並凖例加一等皇家袒免以上親問答二諸皇家袒免親而毆之者徒一年傷者徒二年傷重者加凢鬬二等緦麻以上各逓加一等死者斬疏義曰禮云五世袒免之親四世緦麻之屬皇家戚屬理𢎞尊敬袒免之親其有毆者合徒一年傷者徒二年故鬬及用他物不傷者其罪一也其于諸條相毆唯立罪名不言鬬毆又不言以鬬論者故毆鬬毆及手足他物得罪悉同並無差降傷重者加凢鬬二等假有毆折二齒凢鬬合徒一年半加二等合徒二年半之類緦麻以上各逓加一等假有毆緦麻折二齒徒三年小功流二千里大功流二千五百里期親流三千里毆不傷從徒一年上逓加毆傷者從徒二年上逓加不加入死故云各逓加一等死者斬問曰皇家袒免親或為佐職官或為本屬府主刺史縣令之祖父母父母妻子或是己之所親若有犯者合逓加以否答曰皇家親屬為尊主之敬故異餘人長官佐職為敬所部尊敬之處理各不同律無逓加之文法止各從重㫁若己之親各凖尊卑服数為罪不在皇親及本屬加例又問皇家袒免之親若有官品而毆之者合累加以否答曰律註毆袒免之親㨿皇家親屬立罪此由緣敬為重官髙亦合累加流外官毆議貴問答一諸流外官以下毆議貴者徒二年傷者徒三年折傷者流二千里疏義曰流外官謂勲品以下爰及庶人毆議貴者徒二年議貴謂文武職事官三品以上散官二品以上及爵一品者傷者徒三年折傷者流二千里謂折齒以上若毆折一支凖凢人合徒三年依下文加凢鬬二等流二千五百里若毆折二支流三千里本條雖云加凢鬬傷二等律無加入死之文止依凢人之法毆傷五品以上减二等若减罪輕及毆傷九品以上各加凢鬬傷二等疏義曰流外官以下毆傷五品以上减二等謂减議貴二等毆者徒一年傷者徒二年折傷者徒二年半若减罪輕假有毆五品以上折一支從流二千五百里减二等徒二年半即是減罪輕于凢鬬徒三年加二等處流二千五百里之類及毆傷九品以上各加凢鬬傷二等謂毆九品以上六品以下之官不傷杖六十傷即杖八十他物不傷杖八十傷即杖一百之類若毆至死者各依凢人法問曰律稱流外官以下毆議貴徒二年若奴婢部曲毆議貴者為共凢人罪同為依本法加罪以否答曰依下條部曲毆傷良人加凢人一等奴婢又加一等此是良人與奴婢部曲凢鬬之罪其部曲奴婢毆凢人尚各加罪况於貴族及官品貴者理依加法唯據本條加至死者始合處死假如有部曲毆良人折二支加凢鬬一等註云加者加入于死既于凢鬬流三千里上加一等合至絞刑别條雖加不入于死設有部曲故毆良人九品以上一支折凢鬬折一支徒三年九品以上加凢鬬二等流二千五百里故毆又加一等流三千里部曲毆又加一等即不合入死亦止流三千里此名餘條不加入死之類唐律疏義卷二十一欽定四庫全書唐律疏義卷二十二唐長孫無忌等撰鬬訟二凢
