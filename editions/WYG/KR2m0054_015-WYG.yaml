front:
  text: 凡二十八條
  hash: sha256:4837d30c625641bbb156b6735656b0ed53cc69efb35f4d708a9a21c09a40c9f4
body:
  text: 疏義曰廏庫律者漢制九章創加廏律魏以廏事散入諸太和年名牧産律至正始年復名廏牧律歴北齊後周更無改作隋開皇以庫事附之更名廏庫律廏者鳩聚也馬牛之所聚庫者舍也兵甲財帛之所藏故齊魯謂庫為舍户事既終廏庫為次故在户婚之下牧畜産課不充諸牧畜産凖所除外死失及課不充者一牧長及牧子笞三十三加一等過杖一百十加一等罪止徒三年羊减三等餘條羊凖此疏義曰廐牧令諸牧雜畜死耗者每年率一百頭論駞除七頭騾除六頭馬牛驢羖羊除十白羊除十五從外蕃新來者馬牛驢羖羊皆聴除二十第二年除十五駞除十四第二年除十騾除十二第二年除九白羊除二十五第二年除二十第三年皆與舊同凖率百頭以下除數此是年别所除之數不合更有死失及課不充者應課者凖令牝馬一百疋牝牛驢各一百頭每年課駒犢各六十騾駒减半馬從外蕃新來者課駒四十第二年五十第三年同舊課牝駞一百頭三年内課駒七十白羊一百口每年課羔七十口羖羊一百口課羔八十口凖此欠數者為課不充除外死失及課不充者一牧長及牧子笞三十三加一等即是欠二十二合杖一百過杖一百十加一等計欠七十二罪止徒三年羊减三等欠三以下未有罪名欠四笞十三口加一等罪止徒一年半注云餘條羊凖此餘條謂養飼不如法之類但餘條論畜罪名無羊者並减馬三等故云凖此新任不滿一年而有死失者總計一年之内月别應除多少凖折為罪若課不充遊牝之時當其檢校者凖數為罪不當者不坐遊牝之後而致損落者坐後人疏義曰新任不滿一年謂任牧尉牧長牧子未滿期年而有死失總計一年之内凖折為罪謂若騾新從外蕃來當年聴除十二即是月别得除一頭新任三月除三頭五月除五頭餘畜一年凖當色應除數凖新任月别折除分數亦凖此若除外死失皆凖上又得罪若課不充遊牝之時當其檢校者凖數為罪凖令牧馬駞牛驢羊牝牡常同羣其牝馬驢每年三月遊牝應収飼者至冬収飼不當遊牝之時課雖不充依律不坐注云遊牝之後而至損落者坐後人謂雖不當遊牝之時檢校於後損落仍得其罪繫飼死者各加一等失者又加二等牧尉及監各隨所管牧多少通計為罪仍以長官為首佐職為從餘官有管牧者亦凖此疏義曰繫飼死者加一等罪謂應牧繫養之者収飼理不合死故加罪一等雜畜一死笞四十罪止流二千里失者又加二等以其繫飼不合失落故加二等稱又者明累加即失一杖六十罪止流三千里繫飼羊亦各减三等牧尉及監各隨所管牧尉長通計為罪依令牧馬牛皆百二十為羣駞騾驢各以七十頭為羣羊六百二十口為羣羣别置牧長一人率十五長置尉一人其監即不限尉多少通計之義已從户婚解訖仍以長官為首佐職為從者為羣牧事重委在長官死失及課不充以監為首副監及丞簿為從條言佐職為從明主典無罪注云餘官有管牧者亦凖此其牧有置監管者亦有𨽻州縣官管者故云餘官有管牧者亦凖此驗畜産不實諸驗畜産不以實者一笞四十三加一等罪止杖一百若以故價有増减贓重者計所増减坐贓論入已者以盜論疏義曰依廐牧令府内官馬及傳送馬驢每年皆刺史折衝果毅等檢㨂其有老病不堪乗用者府内官馬更對州官㨂定京兆府管内送尚書省㨂隨便貨賣檢㨂者並須以實不以實者一笞四十三加一等罪止杖一百若以檢㨂不實之故令價有増减者計増减之贓重坐贓論謂驗一不實増三疋一尺及减三疋一尺各笞五十每一疋加一等十疋徒一年十疋加一等若因此増减之贓将入已者計贓以盜論仍徵倍贓監主加二等一疋以上除名其中有増减不平之贓有入已不入已者若一處犯便是一事分為二罪罪法不等即以重法併滿輕法須将以盜之贓累於坐贓之上科之其應除免倍贓各盡本法若驗羊不實减三等其増减贓坐贓及以盜論者並各依本條不在羊减三等之例受官羸病畜産諸受官羸病畜産養療不如法笞三十以故致死者一笞四十三加一等罪止杖一百疏義曰依廐牧令官畜在道有羸病不堪前進者留付隨近州縣養飼療救粟草及藥官給而所在官司受之須養療依法有不如法者笞三十以故致死者謂養療不如法而致死者一笞四十三加一等罪止杖一百乗官畜私物䭾諸應乗官馬牛駞騾驢私䭾物不得過十斤違者一斤笞十十斤加一等罪止杖八十疏義曰應乗官馬牛駞騾驢者謂因公得乗傅逓或是軍行但因公事而得乗官畜者私䭾物不得過十斤十斤之外更著者一斤笞十十斤加一等罪止杖八十其乗車者不過三十斤違者五斤笞十二十斤加一等罪止徒一年即從軍征討者各加二等疏義曰應乗官車或載官私之物載限之外私物不得過三十斤違者五斤笞十二十斤加一等罪止徒一年從軍征討者各加二等馬牛以下車以上各加常犯二等馬牛駞騾驢七十一斤罪止杖一百車二百五斤罪止徒二年若數人共䭾載者各從其限為坐監當主司知而聴者併計所知同私䭾載疏義曰若數人共䭾載者謂乗官畜及車應得私載物限外謂畜過十斤車過三十斤假有十人同乗官畜䭾私物各十斤其中五人數外各過一斤依律各笞十三人各過十一斤各笞二十二人各過八兩律云過一斤笞十今數不滿一斤依律各無罪又有十人同車載私物各三十斤其中五人數外各過五斤依律各笞十三人各過二十五斤各笞二十二人各過二斤八兩依律數不滿各無罪其監當主司知情者併計前畜總過三十九斤同私䭾法科合笞四十車總過一百五斤同私載法合杖六十之類若從軍征討亦依前各加二等其有他人寄物各計一斤以上為罪皆同私䭾載法主當車馬及寄物之人得罪各等亦無首從當官司知情凖上解若隨身依仗應將行者各在私物斤數之外不在計限大祀犧牲不如法諸供大祀犧牲養飼不如法致有瘦損者一杖六十一加一等罪止杖一百以故致死者加一等疏義曰供大祀犧牲用犢人帝配之即加羊豕其養牲大祀在滌九旬中祀三旬三祀一旬養飼令肥不得捶扑違者是不如法致有瘦損者一杖六十一加一等五不如法罪止杖一百以故致死者加罪一等一死杖七十五死徒一年其羊豕雖供人帝為配大祀故得罪與牛皆同職制律中小祀逓减二等餘條中小祀凖此即中祀養牲不如法各减大祀二等小祀不如法又减中祀二等乗官畜脊破領穿諸乘駕官畜産而脊破領穿瘡三寸笞二十五寸以上笞五十謂圍繞為寸者疏義曰乗駕官畜産謂牛馬駞騾驢乗騎者脊破駕用者領穿瘡三寸笞二十五寸以上笞五十稱以上者瘡雖更大罪亦不加若是别傷非乘駕所損自從傷官畜産之罪不當此坐注云謂圍繞為寸者便是瘡圍三寸徑一寸圍五寸一分徑一寸七分雖或方圓凖此為法但亷隅不定皆以圍繞為寸若放飼瘦者計十分為坐一分笞二十一分加一等即不滿十者一笞三十一加一等各罪止杖一百疏義曰若将官畜放飼謂牧監之官及牧子以上令瘦者計十分為坐假令一羣百疋馬十疋瘦為一分合笞二十一分加一等九分並瘦或百疋皆瘦合杖一百即不滿十者一笞三十一加一等謂止放八疋一瘦笞三十八疋並瘦更加七等合杖一百故云各罪止杖一百監及牧尉皆以所管通計為罪餘雜畜凖數得罪皆凖此羊减例减三等官馬不調習諸官馬乗用不調習者一疋笞二十五疋加一等罪止杖一百疏義曰依太僕式在牧馬二嵗即令調習每一尉配調習馬人十人分為五畨上下每年三月一日上四月三十日下又令云殿中省尚乗每配習馭調馬東宫配翼馭調馬至其檢行牧馬之官聴乗官馬即令調習故官馬乗用不調習者一疋笞二十五疋加一等即是四十一疋罪止杖一百上臺東宫供御馬不調習得罪重於此條即從職制律車馬不調習本條科罪故殺官私牛馬諸故殺官私馬牛者徒一年半贓重及殺餘畜産若傷者計减價凖盗論各償所减價價不减者笞三十見血跪跌即為傷若血不限傷重處五日内致死者從殺罪疏義曰官私馬牛為用處重牛為耕稼之本馬即致逺供軍故殺者徒一年半贓重為計贓得罪重於一年半徒假有殺馬直十五疋絹凖盜合徒二年此名贓重及殺餘畜産除馬牛之外並為餘畜若傷謂雖不死而有損傷自馬牛及餘畜各計所减價凖盜論减價謂畜産直絹十疋殺訖唯直絹兩疋即减八疋價或傷止直九疋是减一疋價殺减八疋償八疋傷减一疋償一疋之類其罪各凖盜八疋及一疋而斷價不减者謂元直絹十疋雖有殺傷評價不减仍直十疋止得笞三十罪無所陪償注云見血跪跌即為傷見血不限傷處多少但見血即坐跪跌謂雖不見血骨節差跌亦即為傷若傷重謂所傷處重五日内致死者亦從殺罪及償减價其誤殺傷者不坐但償其减價主自殺馬牛者徒一年疏義曰誤殺傷者謂目所不見心所不意或非繫放畜産之所而誤傷殺或欲殺猛獸而殺傷畜産者不坐但償其减價减價同上解主自殺馬牛徒一年誤殺者不坐官私畜毁食官私物諸官私畜産毁食官私之物登時殺傷者各减故殺傷三等償所减價畜主備所毁臨時専制亦為主餘條準此疏義曰畜産不限官私或毁食官私之物者毁謂有所唐突或觗蹹之類因其毁食物主登時即殺傷者各减前條故殺傷罪三等若殺馬牛杖九十其傷馬牛及殺傷餘畜産名計所减價計贓凖盜論减三等如所殺馬牛凖所减價當絹十五疋者徒二年上减三等合杖一百如此計贓得罪重即從重論仍各償所减價畜主備所毁假有一牛直上絹五疋毁食人物平直上絹兩疋其物主登時傷殺此牛出賣直絹三疋計减二疋牛主償所損食絹二疋物主酬所减牛價絹亦一疋之類注云臨時専制亦為主假如甲有馬牛借乙乘用有所毁食即乙合當罪仍令備償餘條凖此謂下條犬殺傷他人畜産及畜産觗齧人而應摽幟羈絆之類雖非正主皆罪在專制之人其畜産欲觗齧人而殺傷者不坐不償亦謂登時殺傷者即絶時皆為故殺傷疏義曰其畜産有觗齧人者若其欲來觗齧人當即殺傷不坐不償故注云亦謂登時殺傷者其事絶之後然始殺傷者皆依故殺傷之法仍償减價畜主亦依法得罪殺緦麻親馬牛問答一諸殺緦麻以上親馬牛者與主自殺同殺餘畜者坐贓論罪止杖一百各償其减價疏義曰緦麻以上謂内外有服者相殺馬牛得罪與主自殺同合徒一年殺餘畜者凖减價坐贓論罪止杖一百凖此律文緦麻以上殺畜産者不合得罪若因傷重五日内致死依上條亦同殺法並償所减價問曰誤殺及故傷緦麻以上親畜産律無罪名未知合償减價以否答曰律云殺緦麻以上親馬牛者與主自殺同主傷馬牛及以誤殺律條無罪諸親與主同明各不坐不坐即無備償凖例可知況律條無文即非償限馬牛猶故不償餘畜不償可知犬傷殺畜産諸犬自殺傷他人畜産者犬主償其减價餘畜自相殺傷者償减價之半即故放令殺傷他人畜産者各以故殺傷論疏義曰犬性噬齧或自殺傷他人畜産犬主償其减價以犬能噬齧主須制之為主不制故令償减價餘畜除犬之外皆是自相殺傷者謂牛相觗殺馬相蹹死之類假有甲家牛觗殺乙家馬馬本直絹十疋為觗殺估皮肉直絹兩疋即是减八疋絹甲償乙絹四疋是名償减價之半即故放令殺傷他人畜産者或犬性好噬猪羊其牛馬能相觗蹹而故放者責其故放各與故殺傷罪同謂同上條殺官私馬牛者徒一年半計贓應重若傷及殺餘畜産者計减價凖盜論各償所减價價不减者笞三十兩主放畜産而鬭有殺傷者從不應為重杖八十各償所减價畜産觗蹹齧人諸畜産及噬犬有觗蹹齧人而標幟羈絆不如法若狂犬不殺者笞四十以故殺傷人者以過失論若故放令殺傷人者减鬭殺傷一等疏義曰依雜令畜産觗人者截兩角蹹人者絆足齧人者截兩耳此為標幟羈絆之法若不如法並狂犬本主不殺之者各笞四十以不施標幟羈絆及狂犬不殺之故致殺傷人者以過失論過失者各依其罪從贖法律無異文總依凡法不限尊貴其贖一也若本應輕者聴從本其故放令殺傷人者謂知犬及雜畜性能觗蹹及噬齧而故放者减鬭殺傷一等其犯貴賤尊卑長幼親屬等各依本犯應加减為罪其畜産殺傷人仍作他物傷人保辜二十日辜内死者减鬭殺一等辜外及他故死者自依以他物傷人法假令故放雜畜産觝蹹及齧殺子孫於徒一年半上减一等合徒一年餘親卑幼各依本服於鬭殺傷上减一等即被雇療畜産被倩者同過失法及無故觸之而被殺傷者畜主不坐疏義曰有人被雇療畜産及無故觸人畜産而被殺傷者畜主不坐被雇本是規財無故謂故自犯觸如此被殺傷者畜主不坐若被倩療畜産被殺傷依贖法監主借官奴畜諸監臨主守以官奴婢及畜産私自借若借人及借之者笞五十計庸重者以受所監臨財物論驛驢加一等疏義曰監臨主守之官以所監主官奴婢及畜産私自借謂身自借用若轉借他人及借之者或一人一畜但借即笞五十或借數少而日多或借數多而日少計庸重於借罪者以受所監臨財物論累贓為坐騾驢加一等謂借即得杖六十計庸重以受所監臨財物論加一等其車船碾磑邸店之類有私自借若借人及借之者亦計庸賃各與借奴婢畜産同律雖無文所犯相類職制律監臨之官借所監臨及牛馬駞騾驢車船邸店碾磑各計庸賃以受所監臨財物論計借車船碾磑之類理與借畜産不殊故附此條凖例為坐即借驛馬及借之者杖一百五日徒一年計庸重者從上法即驛長私借人馬驢者各减一等罪止杖一百疏義曰即私借驛馬及官司借之者各杖一百五日徒一年計庸重者從上法謂計驛馬之庸當上絹八疋合加一等徒一年半即驛長私借人馬驢者减一等凖令驛馬驢一給以後死即驛長陪頃是故驛長借人驢馬得罪稍輕各减一等謂上文借驛馬驢加受所監臨財物一等今驛長借人驢馬各减一等與受所監臨財物罪同罪止杖一百官私畜損食物諸放官私畜産損食官私物者笞三十贓重者坐贓論失者减二等各償所損若官畜損食官物者坐而不償疏義曰謂放官私畜産損食官私之物損食雖少即笞三十若凖贓得二疋一尺合笞四十是名計贓重者坐贓論失者减二等謂非故放因亡逸而損食者减罪二等各償所損既云損食官私之物或損或食各令畜主備償若官畜損食官物坐而不償公廨畜産損食當司公廨既不同私物亦坐而不償若損食餘司公廨並得罪仍備一凖上文庫藏主司搜檢諸有人從庫藏出防衛主司應搜檢而不搜檢笞二十以故致盜不覺者减盜者罪二等若夜持時不覺盜减三等疏義曰從庫藏出依式五品以上皆不合搜檢其應搜檢而不搜檢者防衛主司笞二十以不搜檢故而致盜物将出計所盜之贓主司减盜者罪二等若夜持時謂庫藏之所持更之人不覺人盜物者减盜者罪三等持時謂當時専持更者假有不覺盜五疋絹减三等得杖八十之類主守不覺盜者五疋笞二十十疋加一等過杖一百二十疋加一等罪止徒二年若守掌不如法以故致盜者各加一等故縦者各與同罪疏義曰主守不限有品無品謂親主當庫藏者不覺有人盜物凖絹五疋笞二十不滿五疋未合得罪十疋加一等八十五疋杖一百過杖一百二十疋加一等一百四十五疋罪止徒二年若守掌不如法謂防守持更鏁閉封印乖違不如法而致盜者各加一等謂防衛不如法有人從庫藏出又不搜檢致盜不覺上加一等謂止减盜者一等夜持時不如法不覺盜亦加一等止减盜者二等主守之司不如法不覺盜亦加一等五疋笞三十罪止徒二年半此是各加一等故縱者各與同罪謂防衛主司並夜持時之人及主守之司故縱盜者並各與盜者同罪稱同罪者不在除免倍贓監主加罪之例即故縱贓滿五十疋加役流一百疋絞若被强盜者各勿論疏義曰國家庫藏本委主司若主司知情容盜得罪重於盜者名例律與同罪者不在加役流之例故於庫藏條中特生此例故縱贓四十九疋以下與盜者罪同不合除免滿五十疋加役流除名配流如法一百疋絞此謂故縱一人之罪若故縱頻盜及衆人盜者各依累倍之法若被强盜者各勿論謂被威力盜之非能拒得者勿論假借官物不還諸假請官物事訖過十日不還者笞三十十日加一等罪止杖一百私服用者加一等疏義曰假請官物謂有吉凶應給威儀鹵簿或借帳幕氊褥之類事訖十日内皆合還官若過十日不還者笞三十十日加一等停留總過八十日罪止杖一百因而私服用者謂吉凶事過以後别私服用者每加一等過八十日徒一年若亡失所假者自言所司備償如法不自言者以亡失論疏義曰假請官物有亡失者若於請物所司自言失者免罪備償如法不自言失被人舉者以亡失論依雜律亡失官物者凖盜論减三等又條亡失官私器物各備償故得亡失之罪又備償之監主貸官物諸監臨主守以官物私自貸若貸人及貸之者無文記以盜論有文記凖盜論文記謂取抄署之類立判案减二等疏義曰監臨主司謂所在之處官物有官司執當者以此官物私自貸若将貸人及貸之者此三事無文記以盜論有文記凖盜論文記謂取抄署之類謂雖無文案或有名簿或取抄及署領之類皆同無文記以盜論者與真盜同若監臨主守自貸亦加凡盜二等有文記者凖盜論並五疋徒一年五疋加一等立判案减二等謂五疋杖九十之類即充公廨及用公廨物若出付市易而私用者各减一等坐之雖貸亦同餘條公廨凖此即主守私貸無文記者依盜法疏義曰即充公廨謂以官物迴充公廨及私用公廨之物無文記有文記立判案若官物從庫藏積聚之中出付人将市易其市易人私用者各凖前官物應坐之罪皆减一等坐之稱私用者雖貸亦同餘條公廨凖此謂一部律内但稱公廨私用及貸皆凖此减盜罪坐之即主守私貸無文記者依盜法即與真盜同加常盜二等徵倍贓有官者除名故云依盜法所貸之人不能備償者徵判署之官下條私借亦凖此疏義曰監臨主守以官物貸人所貸之人不能備償謂無物可徵者徵判署之官判案者為判官署案者為主典及監事之類注云下條私借亦凖此謂下條監臨主守之官以官物借人若所借人不能備償亦徵判署之官故云凖此監主以官物借人諸監臨主守之官以官物私自借若借人及借之者笞五十過十日坐贓論减二等疏義曰監臨主守之官以所監臨主守之物謂衣服氊褥帷帳器玩之類但是官物私自借若将借人及借之者各笞五十過十日計所借之物凖坐贓論减二等罪止徒二年損敗倉庫積聚物諸倉庫及積聚財物安置不如法若曝涼不以時致有損敗者計所損敗坐贓論州縣以長官為首監署等亦準此疏義曰倉謂貯粟麥之屬庫謂貯器仗綿絹之類積聚謂貯柴草雜物之所皆須高燥之處安置其應曝涼之物又須曝涼以時若安置不如法曝涼不以時而致損敗者計所損敗多少坐贓論州縣以長官為首以下節級為從監署等有所損壊亦長官為首以次為從故云亦凖此財物應入官私諸財物應入官私而不入不應入官私而入者坐贓論疏義曰凡是公私論競割斷財物應入官乃入私應入私乃入官應入甲而入乙應入私而入公廨各計所不應入而入坐贓論放散官物諸放散官物者坐贓論謂出用官物有所市作及供祠祀宴㑹剰多之類物在還官已散用者勿徵謂營造剰多為物在祀畢食訖為散用疏義曰放散官物謂出用官物有所市作並謂官物還充官用者假有營造屋宅及供祠祀宴㑹料度剰多各計所剰坐贓論若物在未用各凖所剰還官若祠祀禮畢宴㑹食盡及營造事訖皆勿徵應輸課税諸應輸課税及入官之物而迴避詐匿不輸或巧偽濕惡者計所闕准盜論主司知情與同罪不知情减四等疏義曰應輸課税謂租調地税之類及應入官之物而迴避詐匿假作逗留遂致廢闕及巧偽濕惡欺妄官司皆總計所闕入官物數准盜科罪依法陪填主司知其迴避詐匿巧偽濕惡知情而許行者各與同罪不知情者减罪四等縣官應連坐者亦節級科之州官不覺各遞减縣官罪一等州縣綱典不覺各同本司下從科罪若州縣發遣依法而綱典在路或至輸納之所事有欺妄者州縣無罪監臨官僦運租税諸監臨主守之官皆不得於所部僦運租税課物違者計所利坐贓論其在官非監臨减一等主司知情各减一等疏義曰凡是課税之物監臨主守皆不得於所部内僦勾客運其有違者計所利坐贓論除人畜粮外並為利物在官非監臨减一等謂從坐贓减一等主司知情者各减一等謂知監臨僦運坐贓止减一等若非監臨僦運坐贓上减二等所利之錢一非彼此俱罪二非乞索之贓既用功程而得不合没官還主輸給給受留難諸有所輸及出給而受給之官無故留難不受不給者一日笞五十三日加一等罪止徒一年門司留難者亦凖此若請輸後至主司不依次第先給先受者笞四十疏義曰有應輸官之物及官物應出給與人而受物出給之官無故留難不受不給者一日笞五十三日加一等罪止徒一年而受給門司留難者亦凖受給官司之法故云亦凖此若請輸後至官司不依次第先受給及請輸前至後給受者笞四十官物有印封諸官物有印封不請所由官司而主典擅開者杖六十疏義曰但是官物有封閉印記欲開者皆請所由官司其主典不請官司而擅開者杖六十輸課物齎財市糴諸應輸課物而輒齎財貨詣所輸處市糴充者杖一百将領主司知情與同罪疏義曰應輸送課物者皆須從出課物之所運送輸納之處若輒齎財貨詣所輸處市糴充者杖一百将領主司若知齎物於送納之所市糴情與輸人同罪縱一人糴輸亦同此罪出納官物有違諸出納官物給受有違者計所欠剰坐贓論違謂重受輕出及當出陳而出新應受上物而受下物之類疏義曰監主官物或受或給而有違法者謂稱量之物出納須平若重受輕出即有餘剰及當出陳而出新應受上物而受下物此即為欠須計欠剰之價凖坐贓科罪其有輕受重出及應出新而出陳應受上物而受中物得罪與上文並同故云之類其物未應出給而出給者罪亦如之官物還充官用而違者笞四十其主司知有欠剰不言者坐贓論减二等疏義曰其物未應出給者依令應給禄者春秋二時分給未至給時而給者亦依前坐贓科罪若給官物還充官用有違者笞四十其主司知有欠剰而不舉言者計所欠剰坐贓論减二等官物應入私諸官物當應入私已出庫藏而未付給若私物當供官用已送在官及應供官人之物雖不供官用而守掌在官者皆為官物之例疏義曰謂官物應将給賜及借貸官人及百姓已出庫藏仍貯在官而未付給之間若私物借充官用及應徵課税之類已送在官貯掌或公廨物及官人月俸應供官人之物雖不供官用而守掌在官並檢驗贓賄或兩競財物如此之類但守掌在官者皆為官物之例唐律疏義卷十五欽定四庫全書唐律疏義卷十六唐長孫無忌等撰擅興
