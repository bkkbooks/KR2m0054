front:
  text: 凡二十四條
  hash: sha256:5451cbd578d4f554a4ec565b9d92f8f310c663618314b5311518e0eb9759364e
body:
  text: 疏義曰擅興律者漢相蕭何創為興律魏以擅事附之名為擅興律晉復去擅為興又至髙齊改為興擅律隋開皇改為擅興律雖題目增損隨時沿革原其㫖趣意義不殊大事在於軍戎設法須為重防廏庫是訖須備不虞故此論兵次於廏庫之下擅發兵諸擅發兵十人以上徒一年百人徒一年半百人加一等千人絞謂無警急又不先言上而輒發兵者雖即言上而不待報猶為擅文書施行即坐疏義曰依令差兵十人以上並須銅魚勅書勘同始合差發若急須兵處凖程不得奏聞者聴便差發即須言上若無警急又不先言上輒擅發十人以上九十九人以下徒一年滿百人徒一年半百人加一等七百人以上流三千里千人絞故注云謂無警急又不先言上而輒發兵者雖即言上而不待報謂凖程應得言上者並須待報若不待報猶為擅發但文書施行即坐不必要在得兵其擅發九人以下律令無文當不應為從重給與者隨所給人數减擅發一等亦謂不先言上不待報者告令發遣即坐疏義曰雖有發兵文書執兵者不合即與亦須先言上待報然後給與違者隨所給人數减擅發罪一等故注云亦謂不先言上不待報者告令發遣即坐不必要待兵行其寇賊即來欲有攻襲即城屯反叛若賊有内應急須兵者得便調發雖非所屬比部官司亦得調發給與並即言上各謂急須兵不容得先言上者疏義曰若有冦賊卒來入境欲有攻擊掩襲及國内城鎮及屯聚兵馬之處或反叛或外賊自相翻動内應國家如此等事急須兵者得便調發謂得隨便未言上待報即許調發雖非所屬謂所在人兵不相管𨽻急須兵處雖比部官司亦得調發掌兵軍司亦得隨便給與各即言上並謂急須兵處不容先言上者若不即調發及不即給與者凖所須人數並與擅發罪同其不即言上者亦凖所發人數减罪一等若有逃亡盗賊權差人夫足以追捕者不用此律疏義曰應機赴敵急須兵馬若不即調發及雖調發不即給與者凖所須人數並與擅發罪同謂須十人以上不即調發及不即給與各徒一年百人各徒一年半每百人各加一等千人以上各得絞罪其不即言上者謂軍務警急聴先調發給與並即言上以其不即言上亦凖所發人數减罪一等若有逃亡盜賊謂非兵寇直是逃亡或為賊盜所在官府得權差人夫足以追捕不同擅發兵之例故云不用此律調發供給軍事諸應調發雜物供給軍事者皆先言上待報謂給軍用當從私出皆是違者徒一年給與者减一等疏義曰謂隨軍所須戰具所用供給軍事雖非人兵皆先言上待報始得調發註云謂給軍用當從私出皆是若應用官物自有常式此為出私家故須先言上待報違者徒一年若知不先言上雖言上不待報即給與者减一等合杖一百若事有警急得便調發給與並即言上若不調發及不給與者亦徒一年不即言上者各减一等疏義曰事有警急寇賊卒來欲有攻襲等事得便調發給與並即言上謂事有警急彼此凖程不得言上待報若不即調發及不給與者並徒一年不即言上各减一等俱合杖一百不給發兵符諸應給發兵符而不給應下發兵符而不下若下符違式謂違令式不得承用者疏義曰依公式令下魚符畿内三左一右畿外五左一右左者在内右者付外行用之者從第一為首後更有事須用以次發之周而復始又條應給魚符及傳符皆長官執長官無次官執此據元付在外之日是為應給發兵符其符通授官差使雜追徵等以發兵事重故以發兵為文應下發兵符而不下者謂差兵不下左符若下符違式謂不依次第不得承用者及不以符合從事或符不合不速以聞各徒二年其違限不即還符者徒一年餘符各减二等凡言餘符者契亦同即契應發兵者同發兵符法疏義曰不以符合從事者謂執兵之司得左符皆用右符勘合始從發兵之事若不合符即從事或勘左符與右符不合不速奏者各徒二年違限不即還符謂執符之司勘符訖依公式令封符付使人若使人更往别處未即還者附餘使傳送若州内有使次諸府總符五日内無使次差專使送之若違此令限不即還符者得徒一年餘符各减二符餘符者謂禁苑及交巡魚符之類若符至不合即從其事或勘符不合不速奏聞徒一年不即還符杖九十是名餘符各减二等註云凡言餘符者契亦同即契應發兵者同發兵符法依令車駕巡幸皇太子監國有兵馬受處分者為木契若王公以下在京留守及諸州有兵馬受處分並行軍所及領兵五百人以上馬五百疋以上征討亦給木契既用木契發兵即同發兵符法監門式皇城内諸街鋪各給木契京城諸街鋪各給木魚金部司農凖式亦並給木契但是在式諸契並同餘符揀㸃衛士征人諸揀㸃衛士征人亦同取捨不平者一人杖七十三人加一等罪止徒三年不平謂捨富取貧捨强取弱捨多丁而取少丁之類疏義曰揀㸃衛士註云征人亦同征人謂非衛士臨時募行者若取捨不平者一人杖七十三人加一等罪止徒三年揀㸃之法財均者取强力均者取富財力又均先取多丁故註云不平謂捨富取貧捨强取弱捨多丁而取少丁之類者謂老少能否臨時比校不平者皆是若軍名先定而差遣不平减二等即應差主帥而差衛士者加一等其有欠剰者各加一等疏義曰軍名先定謂衛士之徒臨時差遣不平者减罪二等一人笞五十三人加一等罪止徒二年即應差隊副以上而差衛士者加一等謂一人杖六十三人加一等罪止徒二年半此直為主帥衛士不同故加一等罪止徒二年半其揀㸃衛士及征人有欠剰亦各加本罪一等主帥欠剰亦同其不平之與欠剰既罪名不等即凖併滿之法科之征人冒名相代諸征人冒名相代者徒二年同居親屬代者减二等疏義曰介胄之士有進無退征名既定不可假名賞罰須有所歸何宜輒相冒代如有違者首徒二年從减一等同居親屬代者减二等稱同居親屬者謂同居共財者若征處得勲彼此俱不合敘若部内有冒名相代者里正笞五十一人加一等縣内一人典笞三十二人加一等州隨所管縣多少通計為罪各罪止徒二年佐職以上節級為坐主司知罪與冒名者同罪疏義曰部内有冒名者謂里正所部之内有征人冒名相代里正不覺一人里正笞五十一人加一等九人徒二年若縣内一人典笞三十二人加一等十五人杖一百二十一人徒二年註云佐職以上節級為坐即尉為第二從丞為第三從令及主簿録事為第四從州隨所管縣多少通計為罪謂管二縣者二人冒名州典笞三十四人加一等管三縣者三人冒名州典笞三十六人加一等之類判司以上節級皆如縣罪計加通計亦凖此各罪止徒二年謂里正及縣典州典各罪止徒二年故註云佐職以上節級為坐知情者謂里正及州縣遣兵之官若主典知冒代情並與冒名者同罪其在軍冒名者隊正同里正凡言隊正隊副同疏義曰其在軍冒名者謂衛士以上得罪一同征人隊正副得罪凖里正亦一人笞五十一人加一等罪止徒二年凡言隊正隊副同稱凡言者凡稱隊正之處隊副即同旅帥校尉减隊正一等果毅折衝隨所管校尉多少通計為罪其主典以上並同州縣之法疏義曰依軍防令每一旅帥管二隊正每一校尉管二旅帥既非親監當者同减隊正一等謂一人冒名笞四十一人加一等罪止徒一年半果毅折衝隨所管校尉多少通計為罪每府管五校尉之處亦有管四校尉三校尉者謂管三校尉者三人冒名管四校尉者四人冒名管五校尉者五人冒名各得笞四十不滿此數不坐通計之法並凖上文州管縣之義註云其主典以上並同州縣之法謂罪亦從下始府典同州典兵曺為第二從長史果毅為第三從折衝為第四從録事同下從依律無四等官者止凖見府官為坐校閲違期諸大集校閲而違期不到者杖一百三日加一等主帥犯者加二等即差發從行而違期者各减一等疏義曰春秋之義春蒐夏苗秋獮冬狩皆因農隙以講大事即今校閲是也又車駕親行是名大集校閲而有違期不到者謂於集時不到即杖一百每更三日加一等主帥犯者加二等謂隊副以上将軍以下集時不到者即差發從行而違限者各减一等謂正身當時不到杖九十每三日加一等主帥以上同上解其折衝府校閲在式有文不到者各凖違式之罪若所司不告者罪在所司乏軍興諸乏軍興者斬故失等謂臨軍征討有所調發而稽廢者疏義曰興軍征討國之大事調發征行有所稽廢者名乏軍興犯者合斬故失罪等為其事大雖失不减註云謂臨軍征討有所調發兵馬及應須供軍器械或所須戰具各依期㑹克日俱充有所闕者即是稽廢故云有所調發而稽廢者若充使命告報軍期而違限廢事者亦是乏軍興故失罪等不憂軍事者杖一百謂臨軍征討闕乏細小之物疏義曰謂隨身七事及火幕行具細小之物臨軍征討有所闕乏一事不充即杖一百註云謂臨軍征討亦據臨戰不及别求若未從軍尚容求覔即從違式法征人稽留諸征人稽留者一日杖一百二日加一等二十日絞即臨軍征討而稽期者流三千里三日斬疏義曰謂名已從軍兵馬並發不即進路而致稽留者一日杖一百二日加一等二十日絞謂從軍人上道日計滿二十日即臨軍征討者謂鉦鼓相聞指期交戰而稽期者流三千里經三日者斬若用捨從權不拘此律或應期赴難違期即斬或捨罪求功雖怠不戮如此之類各隨臨時處㫁故不拘常律疏義曰推轂寄重義資英略閫外之事見可即為軍中號令理貴機速用捨從權務在成濟故註云或應期赴難違期即斬捨罪求功雖怠不戮者謂或違於軍令别求異功或雖即愆期擬収後效或戮或捨隨事處㫁如此之類不拘此律征討告消息諸宻有征討而告賊消息者斬妻子流二千里其非征討而作間諜若化外人來為間諜或傳書信與化内人並受及知情容止者並絞疏義曰或伺賊間隙宻期征討乃有姦人告賊消息者斬妻子流二千里其非征討而作間諜者間謂往來諜謂覘候傳通國家消息以報賊徒化外人來為間諜者謂聲教之外四夷之人私入國内往來覘候者或傳書信與化内人並受化外書信知情容止停藏者並絞主将守城諸主将守城為賊所攻不固守而棄去及守備不設為賊所掩覆者斬若連接㓂賊被遣斥候不覺賊來者徒三年以故致有覆敗者亦斬疏義曰主将者謂主領人兵親為主将者或鎮将戍主或留守邉城州縣城主之類守城為賊所攻擊不能固守棄城而去及守備不設謂預偹有闕巡警不嚴被賊所掩襲覆敗者斬若連接㓂賊謂軍壘連接旗旄相望被遣斥候謂指斥候望不覺賊來入境者徒三年以故致有覆敗者以其不覺賊來為賊掩襲致城及人兵有覆敗者亦斬主将臨陣先退諸主将以下臨陣先退若㓂賊對陣捨仗投軍及棄賊來降而輒殺者斬疏義曰主将以下謂戰士以上臨陣交兵而有先退若寇賊對陣而捨仗投軍謂背彼凶徒捨仗歸命及雖非對陣棄賊來降而輒殺之者斬謂先退以下皆從此坐即違犯軍令軍還以後在律有條者依律斷無條者勿論疏義曰若違犯軍中號令者軍還以後其所違之罪在律有條者仍依律斷直違将軍教令在律無條軍還之後不合論罪故云無條者勿論鎮所放征人還諸在軍所及在鎮戍私放征防人還者各以征鎮人逃亡罪論即私放輒離軍鎮者各减二等疏義曰在軍所者謂在行軍之所鎮戍者謂在鎮戍之處私放征防人還者謂征防之人未合還家輒私放者各以征鎮人逃亡罪論依捕亡律從軍征討而亡者一日徒一年一日加一等十五日絞臨對㓂賊而亡者斬主司故縱與同罪若放征人令還各得此罪又條防人向防及在防未滿而亡者鎮人亦同一日杖八十三日加一等放防人還者各得此罪是名各以征鎮人逃亡罪論即私放輒離軍鎮者謂放軍人去軍防人離鎮既非即放還家征防二色各减本罪二等若放人多者一人凖一日放日多者一日凖一人謂放三人各五日放五人各三日累成十五日之類並經宿乃坐臨軍征討而放者斬被放者各减一等疏義曰依捕亡律從軍征討而亡一日徒一年一日加一等十五日絞若放十五人一日亦合絞其放鎮戍人而還一人一日杖八十三日加一等三十一日流三千里若放三十一人一日亦流三千里即私放輒離軍鎮者各减二等謂放征人去軍一日杖九十一日加一等十五日徒三年若放防人離鎮一日杖六十三日加一等罪止徒二年半是為放人多者一人凖一日放日多者一日凖一人註云謂放三人各五日放五人各三日俱累成十五日各合絞稱之類者或放七人各二日又放一人經一日亦為十五日合絞人之與日並得相累或人或日累成十五日皆至死刑故云之類並經宿乃坐不經宿者無罪雖經宿不滿日者一人從不應為之坐征人從重鎮戍從輕註云經宿乃坐者以人日相率恐放十人經半日即為五人之罪故云經宿乃坐還與百刻義同臨軍征討而放者斬謂臨陣對㓂輒放征人不待終日即合處斬被放者流三千里被放征人防人各减主司罪一等故云各减一等征人巧詐避役諸臨軍征討而巧詐以避征役巧詐百端謂若誣告人故犯輕罪之類疏義曰臨對寇賊即欲追討乃巧詐方便推避征役註云巧詐百端或有誣告人罪以求推對或故犯輕法意在留連或故自傷殘或詐為疾患姦詐不一故云百端不可備陳故云之類若有校試以能為不能以故有所稽乏者以乏軍興論未廢事者减一等主司不加窮覈而承詐者减罪二等知情者與同罪至死者加役流疏義曰有所校試謂臨軍之時一藝以上應供軍用軍中校試故以能為不能以巧詐不能之故於軍有所稽違及致闕乏廢事者以乏軍興論故失俱合斬若於事未廢减死一等主司不加窮覈主司謂應檢勘校試之人不加窮研覈實而承詐依信者减罪人罪二等知情者謂知巧詐之情並與犯者同罪至死者加役流未闕事者流三千里鎮戍有犯諸鎮戍有犯本條無罪名者各减征人二等疏義曰鎮戍有所犯法本條無罪名者謂鎮戍防人冒名相代及主司知情不知情若鎮戍拒賊而有巧詐避役若有校試以能為不能並在鎮戍中無有罪名者各减征人二等非公文不給戎仗諸戎仗非公文出給而輒出給者主司徒二年雖有符牒合給未判而出給者杖一百儀仗各减三等疏義曰出給戎仗兵器非得公文而輒出給者主司徒二年主司謂當判署者雖有符牒合給未判而出給謂有符牒到司仍未行判即准符牒出給者杖一百其於留守所及諸州府差發或應用魚符勅書而不用者亦徒二年儀仗各减三等儀仗謂吉凶鹵簿諸門㦸矟之類無文牒出給者杖一百未判出給者杖七十故云各减三等遣畨代違限諸鎮戍應遣畨代而違限不遣者一日杖一百三日加一等罪止徒二年即代到而不放者减一等疏義曰依軍防令防人畨代皆十月一日交代如官司違限不遣若准程稽違不早遣者一日杖一百三日加一等罪止徒二年即代到不放謂防人十月一日替到不放者减一等謂一日杖九十三日加一等罪止徒一年半若鎮戍官司役使防人不以理致令逃走者一人杖六十五人加一等罪止徒一年半疏義曰依軍防令防人在防守固之外唯得脩理軍器城隍公廨屋宇各量防人多少於當處側近給空閒地逐水陸所宜斟酌營種並雜蔬菜以充糧貯及充防人等食此非正役不責全功自須苦樂均平量力驅使鎮戍官司使不以理致令逃走者一人杖六十五人加一等罪止徒一年半若使不以理而防人雖不逃走當從違令科斷興造言上諸有所興造應言上而不言上應待報而不待報各計庸坐贓論减一等疏義曰修城郭築隄防興起人功有所營造依營繕令計人功多少申中書省聴報始合役功或不言上及不待報各計所役人庸坐贓論减一等其庸倍論罪止徒二年半即料請財物及人功多少違實者笞五十若事已損費各併計所違贓庸重者坐贓論减一等本料不實料者坐請者不實請者坐疏義曰即料請財物及人功多少違實者謂官有營造應須市買料請所須財物及料用人功多少故不以實者笞五十若事已損費或已損財物或已費人功各併計所費功庸凖贓重者坐贓論减一等重者謂重於笞五十即五疋一尺以上坐贓論减一等合杖六十者為贓重本料不實止坐元料之人若由請人不實即請者合坐失者各减三等依名例律以贓致罪頻犯者各倍論此既因贓獲罪功庸出衆人之上並通官物即合累而倍論若直費官財物不損庸直止據所費財料不在倍限雖費人功倍併不重官物止從官物科斷即是累併不加重者止從重論非法興造諸非法興造及雜徭役十庸以上坐贓論謂為公事役使而非法令所聴者疏義曰非法興造謂法令無文雖則有文非時興造亦是若作池亭賓館之属及雜徭役謂非時科喚丁夫驅使十庸以上坐贓論既凖衆人為庸亦須累而倍折故註云謂為公事役使而非法令所聴者因而率斂財物者亦併計坐贓論仍亦倍折以其非法賦斂不自入已得罪故輕工作不如法諸工作有不如法者笞四十不任用及應更作者併計所不任贓庸坐贓論减一等其供奉作者加二等工匠各以所由為罪監當官司各减三等疏義曰工作謂在官司造作輒違様式有不如法者笞四十不任用謂造作不任時用及應更作者併計所不任贓庸累倍坐贓論减一等十疋杖一百十疋加一等罪止徒二年半其供奉作加二等者供奉之義已於職制解訖若不如法杖六十不任用及應更作坐贓論加一等罪止流二千里其併倍訖不重費官物者並直計官物科之其贓不倍工匠各以所由為罪監當官司各减三等者謂親監當造作若有不如法减工匠三等笞十不任用及應更作减坐贓四等罪止徒一年供奉作罪止徒二年之類私有禁兵器問答一諸私有禁兵器者徒一年半謂非弓箭刀楯短矛者疏義曰私有禁兵器謂甲弩矛矟具装等依令私家不合有若有矛矟者各徒一年半註云謂非弓箭刀楯短矛者此上五事私家聴有其旌旗幡幟及儀仗並私家不得輒有違者從不應為重杖八十弩一張加二等甲一領及弩三張流二千里甲三領及弩五張絞私造者各加一等甲謂皮鐵等具装與甲同即得闌遺過三十日不送官者同私有法疏義曰弩一張加二等謂加私有禁兵器罪二等合徒二年半甲一領及弩三張流二千里有甲有弩各得此罪甲三領及弩五張絞亦甲弩凖數各得絞罪私造者各加一等謂私造甲弩及禁兵器各加私有罪一等問曰私有甲三領及弩五張凖依律文各合處絞有人私有甲二領并弩四張欲處何罪答曰畜甲畜弩各立罪名既非一事不合併滿依名例律其應入罪者舉輕以明重有甲罪重有弩坐輕既有弩四張已合流罪加一滿五即至死刑况加甲二領明合處絞私有弩四張加甲一領者亦合死刑注甲謂皮鐵等具装與甲同即得䦨遺過三十日不送官者同私有法疏義曰鐵甲皮甲得罪皆同私有具装與甲無别有一具装流二千里有三領者亦合絞即得䦨遺過三十日不送官謂得䦨遺禁兵器以下三十一日不送官者同私有法既稱過三十日即三十日内不合此罪又依軍防令䦨得甲仗皆即輸官不送輸者從違令笞五十滿五日者依雜律各以亡失罪論其亡失之罪從本條解釋其甲非皮鐵者依庫部式亦有聴畜之處其限外剰畜及不應畜而有者亦凖禁兵器論但甲有禁文非私家合有為非皮鐵量罪稍輕坐同禁兵器理為適中造未成者减二等即私有甲弩非全成者杖一百餘非全成者勿論疏義曰造未成者謂從上禁兵器以下未成者各减私造罪二等謂甲三領弩五張以上縱更多有各止處徒三年即私有甲弩非全成者謂不堪著用又非私造杖一百餘非全成者勿論謂甲弩之外所有禁兵器非全成者皆不坐既是禁兵器雖不合罪亦須送官功力採取不任用諸役功力有所採取而不任用者計所欠庸坐贓論减一等疏義曰謂官役功力若採藥或取材之類而不任用者若全不任用須計全庸若少不任用凖其欠庸併倍坐贓論减一等若有所造作及有所毁壊備慮不謹而誤殺人者徒一年半工匠主司各以所由為罪疏義曰謂有所繕造營作及有所毁壊崩撤之類不先備慮謹慎而誤殺人者徒一年半工匠主司各以所由為罪或由工匠指撝或是主司處分各以所由為罪明無連坐之法律既但稱殺人即明傷者無罪丁夫差遣不平諸應差丁夫而差遣不平及欠剰者一人笞四十五人加一等罪止徒一年即丁夫在役日滿不放者一日笞四十一日加一等罪止杖一百各坐其所由疏義曰差遣之法謂先富强後貧弱先多丁後少丁凡丁分畨上役者家有兼丁要月家貧單身閒月之類違此不平及令人數欠剰者一人笞四十五人加一等罪止徒一年即丁夫在役謂在役之人日滿不放者一日笞四十一日加一等罪止杖一百註云各坐其所由謂止坐不放者所由之人明無連坐之法丁夫雜匠稽留諸被差充丁夫雜匠而稽留不赴者一日笞三十三日加一等罪止杖一百将領主司加一等防人稽留者各加三等即由将領者将領者獨坐餘條将領稽留者凖此疏義曰丁夫雜匠被官差遣不依程限而稽留不赴者一日笞三十三日加一等罪止杖一百将領主司加一等主司謂親領監當者一日笞四十三日加一等罪止徒一年其防人稽留者各加三等一日杖六十三日加一等罪止徒二年其将領主司亦加一等若由将領主司稽留丁夫雜匠防人不合得罪唯罪将領之人故云将領者獨坐註云餘條将領主司准此餘條謂征人等但是差行有主司将領本條無将領罪名事由将領者皆将領者獨坐私使丁夫雜匠諸丁夫雜匠在役而監當官司私使及主司於職掌之所私使兵防者各計庸准盗論即私使兵防出城鎮者加一等疏義曰丁夫雜匠見在官役役限之内而監當官司私役使及主司謂應判署及親監當兵防之人於職掌之所私使各計庸凖盜論謂從丁夫以下各計私使之庸凖盜論即雜使計庸不滿尺者從盜不得財笞五十兵防並據城隍内使者若私使出城鎮加罪一等謂計庸加凖盜論罪一等即强使者依職制律强者加二等餘條强者凖此若强使兵防出城者即亦於本罪加一等上累加雖稱丁夫雜匠及兵防非在役限内而使者丁夫雜匠依上條日滿不放笞四十一日加一等罪止杖一百兵防從代到不放一日杖九十三日加一等罪止徒一年半計庸重者若見是監臨官依役使監臨之罪其非本部官者依不應得為從輕笞四十庸多得罪重者依職制律去官而受舊官屬士庶饋與若乞取借貸之屬各减在官時三等非監臨官私使亦於凖盜論上减三等唐律疏義卷十六欽定四庫全書唐律疏義卷十七唐長孫無忌等撰
