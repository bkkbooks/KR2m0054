front:
  text: 賊盗一凢一十三條
  hash: sha256:cdf8defd89149ee130964180f8a9efdc9fd0da98e91d61ded2150ffae27f49e7
body:
  text: 疏義曰賊盜律者魏文侯時李悝首制法經有盜法賊法以為法之篇目自秦漢逮至後魏皆名賊律盜律北齊合為賊盜律後周為刼盜律復有賊叛律隋開皇合為賊盜律至今不改前禁擅發兵馬此須防止賊盜故次擅興之下謀反大逆問答一諸謀反及大逆者皆斬父子年十六以上皆絞十五以下及母女妻妾子妻妾亦同祖孫兄弟姊妹若部曲資財田宅並没官男夫年八十及篤疾婦人年六十及廢疾者並免餘條婦人應緣坐者準此伯叔父兄弟之子皆流三千里不限籍之同異疏義曰人君者與天地合徳與日月齊明上祇寳命下臨率土而有狡豎凶徒謀危社稷始興狂計其事未行将而必誅即同真反名例稱謀者二人以上若事已彰明雖一人同二人之法大逆者謂謀毁宗廟山陵及宫闕反則止據始謀大逆者謂其行訖故謀反及大逆者皆斬父子年十六以上皆絞言皆者罪無首從十五以下及母女妻妾註云子妻妾亦同祖孫兄弟姊妹若部曲資財田宅並没官部曲不同資財故特言之部曲妻及客女並與部曲同奴婢同資財故不别言男夫年八十及篤疾婦人年六十及廢疾並免緣坐註云餘條婦人應緣坐者凖此謂謀叛以上道及殺一家非死罪三人并告賊消息此等之罪緣坐各及婦人其年六十及廢疾亦云故云婦人應緣坐者凖此伯叔父兄弟之子皆流三千里不限籍之同異雖與反逆人别籍得罪皆同若出繼同堂以外即不合緣坐之釋曰出繼謂伯叔父及兄弟己之子内有出繼同宗者同堂謂伯叔父之子今俗呼為親堂兄弟者即雖謀反詞理不能動衆威力不足率人者亦皆斬謂結謀真實而不能為害者若自述休徵假託靈異妄稱兵馬虗論反由傳惑衆人而無真状可驗者自從祅法父子母女妻妾並流三千里資財不在没限其謀大逆者絞疏義曰即雖謀反者雖謂構亂常之詞不足動衆人之意雖騁凶威若力不能驅率得人雖有反謀無能為害者亦皆斬父子母女妻妾並流三千里資財不在没限註云謂結謀真實而不能為害者若自述休徵言身有善應或假託靈異妄稱兵馬或虛論反状妄説反由如此傳惑衆人而無真状可驗者自從祅法謂一身合絞妻子不合緣坐謀大逆者絞上文大逆即據逆事已行此為謀而未行唯得絞罪律不稱皆自依首從之法問曰反逆人應緣坐其妻妾據本法雖㑹赦猶離之正之其繼養子孫依本法雖㑹赦合正之凖離之正之即不在緣坐之限反逆事彰之後始訴離之正之如此之類並合放免以否答曰刑法慎于開塞一律不可兩科執意履繩務從折中違法之輩已汨朝章雖經大恩法須離正離正之色即是凢人離正不可為親領從本宗緣坐緣坐非同居問答二諸緣坐非同居者資財田宅不在没限雖同居非緣坐及緣坐人子孫應免流者各凖分法留還老疾得免者各凖一子分法疏義曰緣坐非同居者謂謀反大逆人親伯叔兄弟已分訖田宅資財不在没限雖見同居凖律非緣坐謂非期以上親及子孫其祖母及伯叔母姑兄弟妻各謂無夫者律文不載並非緣坐其緣坐人子孫謂伯叔子及兄弟孫據律亦不緣坐各凖分法留還謂未經分異犯罪之後並凖户令分法及孫婦雖非緣坐夫没即合歸宗凖法不入分限註云老疾得免者男夫年八十及篤疾婦人年六十及廢疾各凖户内應分人多少人别得凖一子分法留還問曰老疾得免者各凖一子分法假有一人年八十有三男十孫或一孫反逆或一男見在或三男俱死唯有十孫老者若為留分答曰男但一人見在依令作三男分法添老者一人即為四分若三男死盡依令諸子均分老人共十孫為十一分留一分與老者是為各準一子分法若女許嫁已定歸其夫出養入道及娉妻未成者不追坐出養者從所養坐道士及婦人若部曲奴婢犯反逆者止坐其身疏義曰女許嫁已定謂有許婚之書及私約或已納娉財雖未成皆歸其夫出養謂男女為人所養入道謂為道士女冠若僧尼娉妻未成者雖克吉日男女未相見並不追坐出養者從所養家緣坐不涉本生道士及婦人稱道士僧尼亦同婦人不限在室及出嫁入道若部曲奴婢者奴婢不限官私犯反逆者止坐其身自道士以下若犯謀反大逆並無緣坐故云止坐其身問曰雜户及太常音聲人犯反逆有緣坐否答曰雜戸及太常音聲人各附縣貫受田進丁老免與百姓同其有反逆及應緣坐亦與百姓無别若工樂官戸不附州縣貫者與部曲例同止坐其身更無緣坐口陳欲反之言諸口陳欲反之言心無真實之計而無状可尋者流二千里疏義曰有人實無謀危之計口出欲反之言勘無實状可尋妄為狂悖之語者流二千里若有口陳欲逆叛之言勘無真實之状律令既無條制各從不應為重謀叛諸謀叛者絞已上道者皆斬謂協同謀計乃坐被驅率者非餘條被驅率者凖此疏義曰謀叛者謂欲背國投偽始謀未行事發者首處絞從者流已上道者不限首從皆斬註云謂協同謀計乃坐協者和也謂本情和同共作謀計此等各依謀叛之法被驅率者非謂元本不共同情臨時而被驅率者不坐餘條被驅率者凖此餘條謂謀叛謀大逆或亡命山澤不從追喚既肆凶悖堪擅殺人并刼囚之類被驅率之人不合得罪妻子流二千里若率部衆百人以上父母妻子流三千里所率雖不滿百人以故為害者以百人以上論害謂有所攻擊擄掠者疏義曰叛者身得斬罪妻子仍流二千里若唯有妻及子年十五以下合贖婦人不可獨流須依留住之法加杖居作若子年十六以上依式流配其母至配所免居作在室之女不在配限名例律緣坐者女不同故也若率部衆百人以上罪状尤重故父母及妻子流三千里所率雖不滿百人以故為害者以百人以上論註云害謂有所攻擊虜掠者或攻擊城隍或虜掠百姓依百人以上論各身處斬父母妻子流三千里其攻擊城隍因即拒守自依反法即亡命山澤不從追喚者以謀叛論其抗拒将吏者以已上道論疏義曰謂背誕之人亡命山澤不從追喚者以謀叛論首得絞刑從者流三千里抗拒将吏者謂有将吏追討仍相抗拒者以已上道論並身處斬妻子配流抗拒有害者父母妻子流三千里並准上文率部衆百人以上不須有害若不滿百人要須有害得罪乃與百人以上同謀殺府主等官諸謀殺制使若本属府主刺史縣令及吏卒謀殺本部五品以上官長者流二千里工樂及公廨戸奴婢與吏卒同餘條凖此已傷者絞已殺者皆斬疏義曰制使本属府主國官邑官已從名例解訖刺史都督縣令並據本部者吏卒謀殺都水使者或折衝府衛士謀殺本府折衝果毅如此之類並流二千里工樂謂不属縣貫唯𨽻本司並公廨戸奴婢謀殺本司五品以上官長罪與吏卒同若司農官户奴婢謀殺司農卿者理與工樂謀殺太常卿少府監無别餘條謂工樂官户奴婢毆詈本部五品以上官長當條無罪名者並與吏卒同已傷者絞仍依首從法已殺者皆斬謀殺期親尊長諸謀殺期親尊長外祖父母夫夫之祖父母父母者皆斬犯姦而姦人殺其夫所姦妻妾雖不知情與同罪疏義曰期親尊長外祖父母夫夫之祖父母父母並於名例解訖若妻妾同謀亦無首從註云犯姦而姦人殺其夫謂妻妾與人姦通而姦人殺其夫謀而已殺故殺鬬殺者所姦妻妾雖不知情與殺者同罪謂所姦妻妾亦合絞謀殺緦麻以上尊長者流二千里已傷者絞已殺者皆斬疏義曰謀殺緦麻以上尊長則大功以下皆是外姻有服尊長亦同俱流二千里已傷者首處絞從者流謀而殺訖者皆斬罪無首從即尊長謀殺卑幼者各依故殺罪减二等已傷者减一等已殺者依故殺法疏義曰謂上文尊長謀殺卑幼當條無罪名者各依故殺罪减二等已傷者减一等假如有所規求謀殺期親卑幼合徒三年已傷者流三千里已殺者依故殺法合絞之類言故殺法者謂罪依故殺法其首各依本謀論造意者雖不行仍為首從者不行减行者一等假有伯叔數人謀殺猶子訖即首合流二千里從而加功合徒三年從者不加功徒二年半從者不行减行者一等徒二年之類略舉殺期親卑幼餘者不復備文其應减者各依本罪上减部曲奴婢殺主諸部曲奴婢謀殺主者皆斬謀殺主之期親及外祖父母者絞已傷者皆斬疏義曰稱部曲奴婢者客女及部曲妻並同此謂謀而未行但同籍良口以上合有財分者並皆為主謀殺者皆斬罪無首從謀殺主之期親為别戸籍者及外祖父母者絞依首從科已傷者皆斬謂無首從其媵及妾在令不合分財並非奴婢之主謀殺故夫父母諸妻妾謀殺故夫之祖父母父母者流二千里已傷者絞已殺者皆斬部曲奴婢謀殺舊主者罪亦同故夫謂夫亡改嫁舊主謂主放為良者餘條故夫舊主凖此疏義曰妻妾謀殺故夫之祖父母父母者流二千里已傷者絞並據首從科之已殺者皆斬罪無首從謂一家之内妻妾寡者數人夫亡之後並已改嫁後共謀殺故夫之祖父母父母俱得斬刑若兼他人同謀他人依首從之法不入皆斬之限部曲奴婢謀殺舊主稱罪亦同者謂謀而未殺流二千里已傷者絞已殺者皆斬註云故夫謂夫亡改嫁舊主謂主放為良者妻妾若被出及和離即同凡人不入故夫之限其舊主謂經放為良及自贖免者若轉賣及自理訴得脫即同凡人餘條故夫舊主凖此謂毆詈告言之類當條無文者並凖此謀殺人諸謀殺人者徒三年已傷者絞已殺者斬從而加功者者絞不加功者流三千里造意者雖不行仍為首僱人殺者亦同疏義曰謀殺人者謂二人以上若事已彰露欲殺不虛雖獨一人亦同二人謀法徒三年已傷者絞已殺者斬從而加功者絞謂同謀共殺殺時加功雖不下手殺人當時共相擁迫由其遮遏逃竄無所既相因籍始得殺之如此經營皆是加功之類不限多少並合絞刑同謀從而不加功力者流三千里造意者謂元謀署殺其計已成身雖不行仍為首罪合斬餘加功者絞註云僱人殺者亦同謂造意為首受僱加功者為從即從者不行减行者一等餘條不行凖此疏義曰謂謀殺人從者不行减行者一等合徒三年註云餘條不行凖此餘條謂刼囚傷人及謀殺緦麻以上尊長已傷之類從者不行亦减一等其有發心謀殺即皆斬者同謀不行不在减例謂謀殺期親尊長同謀不行亦得斬罪刼囚問答二諸刼囚者流三千里傷人及刼死囚者絞殺人者皆斬但刼即坐不須得囚疏義曰犯罪之人身被囚禁凶徒惡黨共來相刼奪者流三千里若因刼輕囚傷人及刼死囚而不傷人各得絞罪仍依首從科㫁因刼囚而有殺人者皆合處斬罪無首從註云但刼即坐不須得囚謂以威若力強刼囚者即合此坐不須要在得囚若竊囚而亡與囚同罪他人親属等竊而未得减二等以故殺傷人者從刼囚法疏義曰謂私竊取囚因即逃逸與囚同罪者謂竊死囚還得死罪竊流徒罪囚還得流徒之類假使得相容隱亦不許竊囚故註云他人親屬等竊而未得减二等謂竊計已行未離禁處者减所竊囚罪二等謂未得死囚者徒三年未得流囚徒二年半之類若因竊囚之故而殺傷人者即從刼囚之法科罪問曰父祖子孫見被囚禁而欲刼取乃誤殺傷祖孫或竊囚過失殺傷他人各合何罪答曰據律刼囚者流三千里傷人及刼死囚者絞殺人者皆斬據此律意本為殺傷傍人若有誤殺傷被刼之囚止得刼囚之坐若其誤殺父祖論罪重于刼囚既是因誤而殺須依過失之法其因竊囚過失殺傷他人者下條云因盗而過失殺傷他人者以鬬殺傷論至死者加役流既竊囚之事類因盗之罪其有過失彼此不殊殺傷人者亦依鬬殺傷人論應至死者從加役流坐其有誤殺傷本法輕於竊囚未得者即從重科又問竊囚而亡被人追捕棄囚逃走後始拒格因而殺傷罪同刼囚以否答曰下條竊盗發覺棄財逃走因相拒捍如此之類事有因緣者非强盗今者竊囚而亡棄囚逃走理與竊盗發覺棄財逃走義同止得拒捕而科不同刼囚之坐規避執人諸有所規避而執持人為質者皆斬部司及隣伍知見避質不格者徒二年質期以上親及外祖父母者聴身避不格疏義曰有人或欲規財或欲避罪執持人為質規財者求贖避罪者防格不限規避輕重持質者皆合斬坐部司謂持質人處村正以上并四鄰伍保或知見皆須捕格若避質不格者各徒二年註云質期以上親及外祖父母聼身避不格者謂賊執此等親為質唯聼一身不格不得率衆總避其質者無期以上親及非外祖父母而避不格者各徒二年殺一家三人問荅一諸殺一家非死罪三人同籍及期親為一家即殺雖先後事應同㫁或應合同㫁而發有先後者皆是奴婢部曲非及支解人者謂殺人而支觧者皆斬妻子流二千里疏義曰殺人之法事有多端但據前人身死不論所殺之状但殺一家非死罪良口三人即為不道若三人内一人先犯死罪而殺之者即非不道只依殺一人罪法註云同籍及期親為一家同籍不限親疎期親雖别籍亦是即殺一家三人雖有先後發時應合同㫁或所殺之事應合同㫁或發乃有先後者皆為一時殺法總入不道殺一家三人内兼殺部曲奴婢者非及支解人者註云謂殺人而支解者或殺時即支解或先支解而後殺之皆同支解並入不道若殺訖絶時後更支解者非或故焚燒而殺或殺時即焚燒者文雖不載罪與支解義同皆合處斬罪無首從妻子流二千里問曰假有部曲若奴殺别人部曲奴婢一家三人或支解依例有犯各凖良人合入十惡以否答曰部曲奴婢雖與良人有殊至於同類殺三人及支解者不可别為差等坐同良人還入十惡祖父母夫為人殺問荅二諸祖父母父母及夫為人所殺私和者流二千里期親徒二年半大功以下逓减一等受財重者各凖盗論雖不私和知殺期以上親經三十日不告者各减二等疏義曰祖父母父母及夫為人所殺在法不可同天其有忘大痛之心捨枕戈之義或有窺求財利便即私和者流二千里若殺期親私和者徒二年半大功以下逓减一等謂大功徒二年小功徒一年半緦麻徒一年受財重者各凖盗論謂受讎家之財重于私和之罪假如緦麻私和合徒一年受財十疋凖盗徒一年半之類雖不私和知殺期以上親經三十日不告所在官司者各减前私和之罪二等雖則私和罪重受財罪輕其贜本合計限為數少從重終合没官發後輸財私和依法合重其事如傍親為出財私和者自合行求之法依雜律坐贜論减五等其贜亦合没官其有五服内親自相殺者疎殺親合告親殺疎不合告親疎等者卑幼殺尊長得告尊長殺卑幼不得告其應相隱者疎殺親義服殺正服卑幼殺尊長亦得論其不告者亦無罪若殺祖父母父母應償死者雖㑹赦仍移鄉避讎以其與子孫為讎故令移配若子孫知而不告從私和及不告之法科之問曰監臨親屬為部下人所殺因兹受財私和合得何罪答曰依律監臨之官知所部有犯法不舉劾者减罪人罪三等况監臨内相殺被殺者又是本親一違律條二乖親義受財一疋以上並是枉法之贜贜輕及不受財各得私和之罪其間有罪重者各從重科又問主被人殺部曲奴婢私和受財不告官府合得何罪答曰奴婢部曲身繫於主主被人殺侵害極深其有受財私和知殺不告金科雖無節制亦須比附論刑豈為在律無條遂使獨為僥倖然奴婢部曲法為主隱其有私和不告得罪並同子孫唐律疏義卷十七欽定四庫全書唐律疏義卷十八唐長孫無忌等撰賊盗二凢九條
