front:
  text: 二十六
  hash: sha256:edc30d933f2ede735baa432ccaaa3a2541551ae62a2425c1466924a1c64660c8
body:
  text: 唐長孫無忌等撰雜律上凢三十四條䟽里悝首制經法而有雜法之目逓相祖習多歴年所然至後周更名雜犯律隋又去犯還為雜律諸篇罪名各有條例此篇拾遺補闕錯綜成文班雜不同故次詐偽之下坐贓致罪諸坐贓致罪者一尺笞二十一疋加一等十疋徒一年十疋加一等罪止徒三年謂非監臨主司而因事受財者與者减五等䟽義曰贓罪正名其數有六謂受財枉法不枉法受所監臨強盗竊盗并坐贓然坐贓者謂非監臨主司因事受財而罪闕故名坐贓闕一尺笞二十一疋加一等十疋徒一年十疋加一等罪止徒三年假如被人侵損闕因而受財之類兩和取與於法並違故與者减取人五等即是彼此俱罪其贓沒官國忌作樂諸國忌廢務日作樂者杖一百私忌减二等䟽義曰國忌謂在令廢務日若輙有作樂者杖一百私家忌日作樂者减二等合杖八十私鑄錢諸私鑄錢者流三千里作具已備未鑄者徒二年作具未備者杖一百䟽義曰私鑄錢者合流三千里其作具已備謂鑄錢作具並已周備而未鑄者徒二年若作具未備謂有所欠少未堪鑄錢者杖一百若私鑄金銀等錢不通時用者不坐若磨錯成錢令薄小取銅以求利者徒一年䟽義曰時用之錢厚薄大小並依官様輙有磨錯成錢令至薄小而取其銅以求利潤者合徒一年城内街巷走馬諸於城内街巷及人衆中無故走車馬者笞五十以故殺傷人者减闘殺傷一等殺傷畜産者償所减價餘條稱减闘殺傷一等有殺傷畜並凖此䟽義曰有人於城内街衢巷衖之所若人衆之中衆謂三人以上無要速事故走車馬笞五十以走車馬唐突殺傷人者减闘殺傷一等註云殺傷畜産者償所減價餘條稱減鬬殺傷一等者有殺傷畜産並凖此謂下條向城及官私宅若道徑射放彈及投瓦石施機槍作坑穽殺傷人者减闘殺傷一等若以故殺傷畜産並償减價之類若有公私要速而走者不坐以故殺傷人者以過失論其因驚駭不可禁止而殺傷人者减過失二等䟽義曰公私要速者公謂公事要速及乘郵驛並奉𠡠使之軰私謂吉凶疾病之類須求醫藥并急追人而走車馬者不坐雖有公私要急而走車馬因有殺傷人者並依過失收贖之法其因驚駭力不能制而殺傷人者减過失二等聽贖其銅各入被傷殺家若殺傷祖父母父母並同名例律過失殺傷祖父母父母法因驚駭不可禁止得减二等者亦同减例向城官私宅射諸向城及官私宅若道徑射者杖六十放彈及投瓦石者笞四十因而殺傷人者各减闘殺傷一等䟽義曰向城謂城中有人及官私宅亦謂宅中有人住若道徑射者杖六十放弹及投瓦石者笞四十即因射若弹及投瓦石而殺傷人者各减闘殺傷罪一等若故令入城及宅中殺傷人者各以闘殺傷論至死者加役流䟽義曰即射弹投瓦石之人故令箭等入城宅之中殺傷人者各以闘殺傷論尊卑長㓜貴賤並同闘殺傷之法凖罪至死者加役流其有射及放弹投瓦石不向所親尊長并貴人之宅而非意殺傷者即依名例律本應重而犯時不知者得依凢論本應輕者聽從本施機槍作坑穽諸施機槍作坑穽者杖一百以故殺傷人者减闘殺傷一等若有標幟者又减一等䟽義曰有人施機槍及穿坑穽不在山澤擬捕禽獸者合杖一百以施槍等故而殺傷人者减闘殺傷罪一等若於機槍坑穽之處而安標幟之欲使人知而人誤犯致死傷者又减一等謂總减闘殺傷罪二等若不殺傷人從杖一百减一等合杖九十其深山迥澤及有猛獸犯暴之處而施作者聽仍立標幟不立者笞四十以故殺傷人者减闘殺傷罪三等䟽義曰深山迥澤謂非人常行之所或雖非山澤而有猛獸犯暴之處施作機槍坑穽者不合得罪仍立標幟不立者笞四十若不立標幟而致殺傷人者减闘殺傷罪三等若立標幟仍有殺傷此由行人自犯施機槍坑穽者不坐醫合藥不如方諸醫為人合藥及題䟽針刺誤不如本方殺人者徒二年半䟽義曰醫師為人合和湯藥其藥有君臣分兩題䟽藥名或注冷熱遲駛踈史反并針刺等錯誤不如本方者謂不如今古藥方及本草以故殺人者醫合徒二年半若殺傷親属尊長得罪輕於過失者各依過失殺傷論其有殺不至徒二年半者亦從殺罪减三等假如誤不如本方殺舊奴婢徒二年减三等杖一百之類傷者各同過失法其故不如本方殺傷人者以故殺傷論雖不傷人杖六十即賣藥不如本方殺傷人者亦如之䟽義曰其故不如本方不依舊法殺傷人者以故殺傷論尊長卑㓜貴賤並依故殺之律雖不傷人謂故不如本方于人無損猶杖六十於尊長及官人亦同毆而不傷之法即賣藥不如本方謂非指的為人療患尋常賣藥故不如本方雖未損人杖六十已有殺傷者亦依故殺傷法故云亦如之丁匠防人等疾病諸丁匠在役及防人在防若官戸奴婢疾病主司不為請給醫藥救療者笞四十以故致死者徒一年䟽義曰丁匠在作役之所防人在鎮守之處若官戸奴婢在本司亡者而有疾病所管主司不為請雖請而主醫藥官司不給闕於救療者笞四十以故致死者謂不請給醫藥救療以故致死者各徒一年受寄物費用問荅一諸受寄財物而輙費用者坐贓論减一等詐言死失者以詐欺取財物論减一等䟽義曰受人寄付財物而輙私費用者坐贓論减一等一尺笞十一疋加一等十疋杖一百罪止徒二年半詐言死失者謂六畜財物之類私費用而詐言死及失者以詐欺取財物論减一等謂一尺笞五十一疋加一等五疋杖一百五疋加一等問曰受人寄付財物實死失合償以否又監臨受寄詐言死失合得何罪答曰下條云亡失官私器物各備償被強盗者不償即失非強盗仍令償之以理死者不合備償非理死者凖廐牧令合償减價若監臨主司受寄詐言死失者以詐欺取財物减一等科之負債違契不償諸負債違契不償一疋以上違二十日笞二十二十日加一等罪止杖六十三十疋加二等百疋又加三等各令備償䟽義曰負債者謂非出舉之物依令合理者或欠負公私財物乃違約乖期不償者一疋以上違二十日笞二十二十日加一等罪止杖六十三十疋加二等謂負三十疋物違二十日笞四十百日不償合杖八十百疋又加三等謂負百疋之物違契滿二十日杖七十百日不償合徒一年各令備償若更延日乆及經恩不償者皆依判斷及恩後之日科罪如初負債強撁掣畜産諸負債不告官司而强牽財物過失本契者坐贓論䟽義曰謂公私債負違契不償應牽掣者皆告官司聽斷若不告官司而强牽掣財物若奴婢畜産過本契者坐贓論若監臨官共所部交闗強牽過本契者計過剰之物凖於所部強市有剰利之法良人為奴婢質債諸妄以良人為奴婢用質債者各减自相賣罪三等知情而取者又减一等仍計庸以當債直䟽義曰虛妄用良人為奴婢将質債者各减自相賣罪三等謂以凢人質債從流上减三等若以親戚年㓜妄質債者各依本條减賣罪三等知情而取謂知是良人而取為奴婢受質債者又减一等謂又减質良人罪一等仍計庸以當債直謂計一日三尺之庸累折酬其債直不知情者不坐亦不計庸以折債直錯認良人為奴婢諸錯認良人為奴婢者徒二年為部曲者减一等錯認部曲為奴者杖一百䟽義曰良人之與奴婢種類自殊若錯認者徒二年為部曲者减一等徒一年半若錯認部曲為奴者杖一百若部曲妻雖取良人女為亦依部曲之坐錯認奴婢及財物者計贓一疋笞十五疋加一等罪止杖一百未得者各减二等䟽義曰錯認他人奴婢及財物者計贓一疋笞十五疋加一等罪止杖一百未得者各减二等謂從錯認良人以下未得者並减二等其錯認良人以下為子孫律既無文量情依不應為輕若錯認他人妻妾及女為己妻妾者情理俱重依不應為重科若已認得妻妾将去者多涉姦情即同姦法博戯賭財物諸博戯賭財物者各杖一百舉博為例餘戯皆是贓重者各依已分凖盗論輸者亦依已分為從坐䟽義曰共為博戯而賭財物不滿五疋以下各杖一百註云舉博為例餘戯皆是謂舉博為名總為雜戯之例弓射既習武藝雖賄物亦無罪名餘戯計贓得罪重於杖一百者各依已分凖盗論謂賭得五疋之物合徒一年註云輸者亦依已分為從坐謂輸五疋之物為徒一年從坐合杖一百贓多者各凖盗法加罪若贏衆人之物亦須累而倍論輸衆人物者依已分倍為從坐若倍不重一人之贓即各從一人重斷其停止主人及出玖若和合者各如之賭飲食者不坐䟽義曰停止主人謂停止愽戯賭物者主人及出玖之人亦舉玖為例不限取利多少若和合人令戯者不得財杖一百若得利入已並計贓凖盗論衆人上得者亦凖上例倍論故云各如之賭飲食者不坐謂即雖賭錢盡用為飲食者亦不合罪舍宅車服器物諸營造舍宅車服器物及墳塋石獸之属於令有違者杖一百雖㑹赦皆令改去之墳則不改䟽義曰營造舍宅者依營繕令王公以下凢有舍屋不得施重拱藻井車者儀制令一品青油纁通幰虛偃服者衣服令一品衮冕二品鷩冕器物者一品以下食器不得用純金純玉墳塋者一品方九十步墳髙一丈八尺石獸者三品以上六五品以上四此等之類具在令文若有違者各杖一百雖㑹赦皆令除去唯墳不改稱之属者碑碣等是若有犯者並同此坐其物可賣者聽賣若經赦後百日不改去及不賣者論如律䟽義曰舍宅以下違犯制度堪賣者須賣不堪賣者改去之若赦後百日不改及不賣者還杖一百故云論如律侵巷街阡陌諸侵巷街阡陌者杖七十若種植墾食者笞五十各令復故雖種植無所妨廢者不坐䟽義曰侵巷街阡陌謂公行之所若許私侵便有所所廢故杖七十若種植墾食謂於巷街阡陌種物及墾食者笞五十各令依舊若巷陌寛閒雖有種植無所妨廢者不坐其穿垣出穢汚者杖六十出水者勿論主司不禁與同罪䟽義曰其有穿穴垣墻以出穢汚之物於街巷杖六十直出水者無罪主司不禁與同罪謂侵巷街以下主司並合禁約不禁者與犯罪人同坐占山野陂湖利諸占固山野陂湖之利者杖六十䟽義曰山澤陂湖物産所植所有利潤與衆共之其有占固者杖六十已施功取者不追犯夜諸犯夜者笞二十有故者不坐閉門鼔後開門鼔前行者皆為犯夜故謂公事急速及吉凶疾病之類䟽義曰宫衛令五更三籌順天門擊鼓聽人行晝漏盡順天門撃鼓四百槌訖閉門後更擊六百槌坊門皆閉禁人行違者笞二十故註云閉門鼓後開門鼓前有行者皆為犯夜故謂公事急速但公家之事須行及私家吉凶疾病之類皆須得本縣或本坊文牒然始合行若不得公驗雖復無罪街鋪之人不合許過既云閉門鼓後開門鼓前禁行明禁出坊外者若坊内行者不拘此律其直宿坊街若應聽行而不聽及不應聽行而聽者笞三十即所直時有賊盗經過而不覺者笞五十䟽義曰謂諸坊應閉之門諸街守衛之所有當直宿應合聽行而不聽及不應聽行而聽者笞三十若分更當直之時有賊盗經過所直之處而宿直者不覺笞五十若覺而聽行自當主司故縱之罪從征從行身死諸從征及從行公使於所在身死依令應送還本鄉違而不送者杖一百若傷病而醫食有闕者杖六十因而致死者徒一年䟽義曰從征謂從軍征討及從行謂從車駕後行及從東宫行并公事充使於所在身死依令應送還本鄉者軍防令征行衛士以上身死行軍具錄随身資財及屍付本府人将還無本府人者付随近州縣逓送喪葬令使人所在身喪皆給殯殮調度逓送至家從行凖本部式從行身死折衝贈物三十段果毅二十段别将十段并造靈轝逓送還府隊副以上各給絹兩疋衛士給絹一疋充殮衣仍並給棺令逓送還家自餘無别文者即同公使之例應送不送者各杖一百若傷病謂征行人等或病或傷須醫藥救療飲食供給而醫食有闕者杖六十因而致死謂以醫食不如法致死者徒一年即卒官家無手力不能勝致者仰部送還鄉違而不送者亦杖一百䟽義曰官人在任以理身死家道既貧先無手力不能自相運致以還故鄉者卒官之所部送還鄉稱部送者差人部領逓送還鄉依令去官家口累弱尚得送還况乃身亡明須凖給手力部送違而不送者亦杖一百應給傳送剰取諸應給傳送而限外剰取者笞四十計庸重者坐贓論罪止徒二年䟽義曰應給傳送依廐牧令官爵一品給馬八疋嗣王郡王及二品以上給馬六疋三品以下各有等差若過令限數外剰取者笞四十計庸重者坐贓論馬庸一日為絹三尺坐贓一尺笞二十一疋加一等三疋一尺笞五十即是得罪重於笞四十須從坐贓論計庸罪止徒二年若不應給而取者加罪二等強取者各加一等主司給與者各與同罪䟽義曰上文並據應給而剰取之若不應給而取者謂本無傳送之理而取之加二等謂贓輕者杖六十贓重者加坐贓之罪二等罪止徒三年強取者各加一等謂應得傳送而剰强取者笞五十贓重者於坐贓上加一等不應給傳送而强取者杖七十贓重者坐贓上加三等是各加一等主司給與者各與同罪稱各者強取而主司給與亦與強者罪同不應入驛而入諸不應入驛而入者笞四十輙受供給者杖一百計贓重者凖盗論雖應入驛不合受供給而受者罪亦如之䟽義曰不應入驛而入者笞四十雜令私行人職事五品以上㪚官二品以上爵國公以上欲投驛止宿者聽之邉逺及無村店之處九品以上勲官五品以上及爵遇屯驛止宿亦聽並不得輙受供給謂私行人不應入驛而入者笞四十輙受供給凖贓雖少皆杖一百計贓得罪重於杖一百者凖盗論雖應入驛凖令不合受供給而受亦與不應入驛人同罪强者各加二等姦徒一年半諸姦者徒一年半有夫者徒二年部曲雜户官户姦良人者各加一等即姦官私婢者杖九十奴姦婢亦同䟽義曰和姦者男女各徒一年半有夫者徒二年妻妾罪等部曲雜户官户而姦良人者並加良人相姦罪一等即良人姦官私婢者杖九十註云奴姦婢亦同杖九十姦他人部曲妻雜戸官戸婦女者杖一百強者各加一等折傷者各加闘折傷罪一等䟽義曰姦他人部曲妻明姦己家部曲妻及客女各不坐若姦雜戸官户婦女者杖一百强者各加一等自姦良人以下强者各加一等折傷者謂折齒或折指以上各加闘折傷一等謂良人從凢闘上加官戸雜户他人部曲妻官私奴婢各從本闘罪上加與强姦為二罪從重而科姦緦麻親及妻諸姦緦麻以上親及緦麻以上親之妻若妻前夫之女及同母異父姊妹者徒三年强者流二千里折傷者絞妾减一等餘條姦妾凖此䟽義曰姦緦麻以上親謂内外有服親者及緦麻以上親之妻亦謂有服者妻若妻前夫之女謂妻前家所生者各徒三年強者流二千里因强姦而折傷者絞得罪已重故妾减一等謂减妻罪一等其於媵罪與妾同註云餘條姦妾凖此謂餘條五服内及主之緦麻以上親直有姦名而無妾罪者並凖此條减妻一等其奴及部曲姦主之妻及主期親之妾亦從减一等之例姦從祖母姑諸姦從祖祖母姑從祖伯叔母姑從父姊妹從母及兄弟妻兄弟子妻者流二千里強者絞䟽義曰從祖祖母姑謂祖之兄弟妻若祖之姊妹從祖伯叔母姑謂父之堂兄弟妻及父之堂姊妹從父姊妹謂己之堂姊妹從母謂母之姊妹及兄弟之妻兄弟子妻與之姦者並流二千里强者絞姦父母祖妾諸姦父祖妾謂曽經有父祖子者伯叔母姑姊妹子孫之婦兄弟之女者絞即姦父祖所幸婢减二等䟽義曰姦父祖妾即曽髙妾亦同註云謂曽經有父祖子者其無子者即凖上文妾减一等姦伯叔母姑姊妹子孫婦曽𤣥孫婦亦同兄弟之女者絞即姦父祖所幸婢减二等合徒三年不限有子無子得罪並同問曰父祖之妾曽經有子父祖亡歿改嫁他人而子孫姦之得同凢姦以否答曰婦人尊卑縁夫立制子孫於父祖之妾在禮全無服紀父祖亡歿改適他人子孫姦者理同凢姦之法律有曽為祖免親妻妾而嫁娶者别立罪名至於和姦律無加罪奴姦良人諸奴姦良人者徒二年半強者流折傷者絞䟽義曰奴姦良人婦女徒二年半强者流折傷者絞雖有夫亦同折傷謂因姦折傷者其部曲及奴姦主及主之期親若期親之妻者絞婦女减一等強者斬即姦主之緦麻以上親及緦麻以上親之妻者流强者絞䟽義曰其部曲及奴和姦主及姦主之期親若期親之妻部曲及奴合絞婦女减一等强者斬謂奴等合斬婦女不坐即姦主之緦麻以上親及緦麻以上親之妻者流婦女合流二千里强者奴等絞若姦妾者自主以下凖上例並减妻一等即妾子見為家主其母亦與子不殊雖出亦同和姦無婦女罪名諸和姦本條無婦女罪名者與男子同强者婦女不坐其媒合姦通减姦者罪一等罪名不同者從重减䟽義曰和姦謂彼此和同者本條無婦女罪名與男子同謂上條奴姦良人者徒二年半此即和姦不立婦女罪名良人婦女亦徒二年半之類並與男子同強者婦女不坐謂上條姦主期親強者斬既無婦女罪名其婦女不坐但是强姦者婦女皆悉無罪其媒合姦通之人减姦罪一等假如和姦者徒一年半媒合者徒一年之類註云罪名不同從重减假有俗人媒合姦女冠男子徒一年半女冠徒二年半媒合姦通者猶徒二年之類是為從重减監主於監守内姦諸監臨主守於所監守内姦者謂犯良人加姦罪一等即居父母及夫喪若道士女冠姦者各又加一等婦女以凢姦論䟽義曰監臨主守之人於所監守内姦良人加凢姦一等故註云謂犯良人若姦無夫婦女徒二年姦有夫婦女徒二年半即居父母喪男女同夫喪者妻妾同若道士女冠僧尼同姦者各又加監臨姦一等即加凢姦罪二等故云各又加一等假有監臨主守若道士及僧并男子在父母喪姦者婦女以凢姦論即女居父母喪婦人居夫喪及女冠尼姦者並加姦罪二等男子亦以凢姦論其有尊卑及貴賤者各從本法校斛斗秤度諸校斛斗秤度不平杖七十監校者不覺减一等知情與同罪䟽義曰校斛斗秤度依闗市令每年八月詣太府寺平校不在京者詣所在州縣官校並印署然後聽用其校法雜令量以北方秬黍中者容一千二百為鑰十鑰為合十合為升十升為斗三斗為大斗一斗十斗為斛秤權衡以秬黍中者百黍之重為銖二十四銖為兩三兩為大兩一兩十六兩為斤度以秬黍中者一黍之廣為分十分為寸十寸為尺一尺二寸為大尺一尺十尺為丈有校勘不平者杖七十監校官司不覺减校者罪一等合杖六十知情與同罪器用絹布行濫諸造器用之物及絹布之属有行濫短狹而賣者各杖六十不牢謂之行不真謂之濫即造横刀及箭鏃用柔鉄者亦為濫䟽義曰凢造器用之物謂供公私用及絹布綾綺之属行濫謂器用之物不牢不真短狹謂絹疋不充四十尺布端不滿五十尺幅濶不充一尺八寸之属而賣各杖六十故禮云物勒工名以考其誠功有不當必行其罪其行濫之物沒官短狹之物還主得利贓重者計利凖盗論販賣者亦如之市及州縣官司知情各與同罪不覺者减二等䟽義曰得利贓重者謂賣行濫短狹等物計本之外剰得利者計贓重於杖六十者凖盗論謂凖盗罪一尺杖六十一疋加一等計得利一疋一尺以上即從重科計贓累而倍併販賣者亦如之謂不自造作轉買而賣求利得罪並同自造之者市及州縣官司知行濫情各與造賣者同罪檢察不覺者减二等官司知情及不覺物主既别各須累而倍論其州縣官不管市不坐市司評物價諸市司評物價不平者計所貴賤坐贓論入己者以盗論其為罪人評贓不實致罪有出入者以出入人罪論䟽義曰謂公私市易若官司遣評物價或貴或賤令價不平計所加减之價坐贓論入己者謂因評物價令有貴賤而得財物入己者以盗論並依真盗除免倍贓之法其為罪人評贓不實亦謂増减其價致罪有出入者假有評盗贓應直上絹五疋乃加作十疋應直十疋减作五疋是出入半年徒罪市司還得半年徒坐故云以出入人罪論若應直五疋評作九疋或直九疋評作五疋於罪既無加减止從貴賤不實坐贓之法私作斛斗秤度諸私作斛斗秤度不平而在市執用者笞五十因有増减者計所増减凖盗論䟽義曰依令斛斗秤度等所司每年量校印署充用其有私家自作致有不平而在市執用者笞五十因有増减贓重者計所増减凖盗論即用斛斗秤度出入官物而不平令有増减者坐贓論入己者以盗論其在市用斛斗秤度雖平而不經官司印者笞四十䟽義曰即用斛斗秤度出入官物増减不平計所増减坐贓論入己者以盗論因其増减得物入己以盗論除免倍贓依上例其在市用斛斗秤度雖平謂校勘訖而不經官司印者笞四十賣買不和較固諸賣買不和而較固取者較謂専畧其利固謂障固其市及更出開閉共限一價謂賣物以賤為貴買物以貴為賤䟽義曰賣物及買物人兩不和同而較固取者謂強執其市不許外人買故註云較謂専略其利固謂障固其市及更出開閉謂販鬻之徒共為奸計自賣物者以賤為貴買人物者以貴為賤更出開閉之言其物共限一價望使前人迷謬以将入己若參市謂人有所賣買在傍髙下其價以相惑亂而規自入者杖八十已得贓重者計利凖盗論䟽義曰叅市謂負販之徒共相表裏㕘合貴賤惑亂外人故註云謂人有所賣買在傍髙下其價以相惑亂而規賣買之利入己者並杖八十已得利物計贓重於杖八十者計利凖盗論謂得三疋一尺以上合杖九十是名贓重其贓既凖盗科即合徴還本主買奴婢牛馬立劵諸買奴婢牛馬駞騾驢已過價不立市劵過三日笞三十賣者减一等立劵之後有舊病者三日内聽悔無病欺者市如法違者笞四十䟽義曰買奴婢牛馬駞騾驢等依令並市劵兩和市賣已過價訖若不立劵過三日買者笞四十賣者减一等若立劵之後有舊病而買時不知立劵後始知者三日後聽悔三日外無疾病故相欺罔而欲悔者市如法違者笞四十若有疾欺不受悔者亦笞四十令無私契之文不凖私劵之限即賣買已訖而市司不時過劵者一日笞三十一日加一等罪止杖一百䟽義曰賣買奴婢及牛馬之類過價已訖市司當時不即出劵者一日笞三十所由官司依公坐節級得罪其挟私者以首從論一日加一等罪止杖一百唐律疏義卷二十六欽定四庫全書唐律䟽義卷二十七唐長孫無忌等撰雜律下凢二十八條在市人衆中驚動
