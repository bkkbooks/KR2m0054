canonical_identifier: bkk:krp/KR2m0054/WYG/v1/juan/20
seq: 20
front:
  text: 緦麻小功親財物者减凢人一等大功减二等期親减三等殺傷者各依本殺傷論此謂因盗而誤殺者若有所規求而故殺期以下卑幼者絞餘條凖此
  hash: sha256:2d48c8f609469fc3b324b920b35512fdcf12b9567c57f8b6f20e0672fb74196d
body:
  text: 疏義曰緦麻以上相盗皆據别居卑幼於尊長家强盗已經恐喝條釋訖其尊長于卑幼家竊盗若强盜及卑幼於尊長家行竊盗者緦麻小功减凢人一等大功减二等期親减三等殺傷者各依本殺傷論謂因盗誤殺傷人若殺傷尊卑長幼各依本殺傷法註云此謂因盗而誤殺者謂本心只欲規財因盗而誤殺人者亦同因盗過失殺人依鬬殺之罪不言傷者為傷罪稍輕聼從誤傷之法但殺人坐重雖誤同鬬殺論若實故殺自依故殺傷法若有所規求故殺期以下卑幼者絞即此條因盗自為有所規求故殺期以下卑幼者絞誤殺者自依本鬬殺傷論餘條謂諸條姦及畧和誘但是爭競有所規求而故殺期以下卑幼本條不至死者並絞故云餘條凖此卑幼将人盗己家財問答一諸同居卑幼将人盗己家財物者以私輙用財物論加二等他人减常盗罪一等若有殺傷者各依本法他人殺傷縱卑幼不知情仍從本殺傷法坐之疏義曰同居卑幼謂共居子孫弟姪之類将外人共盗己家財物者以私輙用財物論加二等按户婚律同居卑幼私輙用財者十疋笞十十疋加一等罪止杖一百他人减凢盜一等謂卑幼将人盗物雖多罪止徒一年半他人减常盗罪一等其於首從自依常例若有殺傷者各依本殺傷法謂依故殺傷尊長卑幼法縱不知情他人亦依強盗殺傷法註云他人殺傷縱卑幼不知情仍從本殺傷法坐之謂卑幼不知他人殺傷之情仍從故殺傷法稱坐之者不在除免加役流之例若他人誤殺傷尊長卑幼不知情亦依誤法其被殺傷人非尊長者卑幼不知殺傷情惟得盗罪無殺傷之坐其有知情并自殺傷者各依本殺傷之法問曰卑幼将人盗己家財物以私輙用財物論加二等他人减常盗一等若卑幼共他人強盗者律無加罪之文未知更加罪以否答曰强之與竊罪状不同案職制律貸所監臨財物強者加二等餘條強者凖此諸親相盗罪有等差将人盗己家財物者加私輙用財物二等更無强盗之文止明殺傷之坐若殺傷罪重從殺傷法科如殺傷坐輕即凖强者加二等此是一部通例故條不别生文因盗過失殺傷人諸因盗而過失殺傷人者以鬬殺傷論至死者加役流得財不得財等財主尋逐遇他死者非疏義曰因行竊盗而過失殺傷人者以其本有盗意不從過失收贖故以鬭殺傷論其殺傷之罪至死者加役流註云得財不得財等謂得財與不得財並從鬬殺傷科財主尋遂遇他死者非謂財主尋逐盗物之賊或墜馬或落坑致死之類是遇他故而死盗者惟得盗罪而無殺傷之坐其共盗臨時有殺傷者以強盗論同行人不知殺傷情者止依竊盗法疏義曰謂共行竊盗不謀强盗臨時乃有殺傷人者以强盗論同行人而不知殺傷情者止依竊盗法謂同行元謀竊盗不知殺傷之情止依竊盗為首從殺傷者依强盗法私財奴婢貿易官物諸以私財物奴婢畜産之類餘條不别言奴婢者與畜産財物同貿易官物者計其等準盗論其貿易奴婢計職重于和誘者同和誘法疏義曰以私家財物奴婢畜産之類或有碾磑邸店荘宅車船等色故云之類註云餘條不别言奴婢者與畜産財物同謂反逆條中稱資財並没官不言奴婢畜産即是總同財物又廐庫律驗畜産不以實者一笞四十三加一等罪止杖一百若以故價有増减贜重者計所増减坐贜論即無驗奴婢之文若驗奴婢不實者亦同驗畜産之法故云餘條不别言奴婢者與畜産財物同貿易官物者謂以私物貿易官物計其等凖盗論假将私奴貿易官奴其奴各直絹五疋其價雖等仍凖盗論各徒一年註云官物賤亦如之謂私奴直絹十疋愽官奴直絹五疋亦徒一年計所利以盗論謂以私物直絹一疋貿易官物直絹兩疋即一疋是等合凖盗論凢人之與凢人並杖六十一疋是利以盗論凢人亦杖六十有倍贜若是監臨主掌加罪加等合杖八十應累併者皆将以盗累于凖盗加罪之類除免賠贜各盡本法註云其貿易奴婢計贜重於和誘同和誘法假有監臨之官以私奴婢直絹三十疋貿易官奴婢直絹六十疋即是計利三十疋臨臨自盗合絞凢人貿易奴婢計利五十疋即合加役流以本條和畧奴婢罪止流三千里雖監臨主守亦同即於此條貿易不可更重故云同和誘法並流三千里山野物已加功力諸山野之物已加功力刈伐積聚而輙取者各以盗論疏義曰山野之物謂草木藥石之類有人已加功力或刈伐或積聚而輙取者各以盗論謂各凖積聚之處時價計贜依盗法科罪略人略賣人問答二諸略人略賣人不和為略七歳以下雖和亦同略法為奴婢者絞為部曲者流三千里為妻妾子孫者徒三年因而殺傷人者同强盗法疏義曰略人者謂設方略而取之略賣人者或為經略而賣之註云不和為畧十歲以下雖和亦同畧法為奴婢者不共和同即是被畧十歲以下未有所知易為誑誘雖共安和亦同畧法畧人畧賣人為奴婢者並絞畧人為部曲者或有状驗可憑勘詰知實不以為奴者流三千里為妻妾子孫者徒三年為弟姪之類亦同註云因而殺傷人者同強盗法謂因略人拒鬬或殺若傷同強盗法既同強盗之法因畧殺傷傍人亦同因畧傷人雖畧人不得亦合絞罪其畧人亦為奴婢不得又不傷人以强盗不得財徒二年擬為部曲徒一年半擬為妻妾子孫者徒一年在律雖無正文解者須盡犯状消息輕重以類㫁之為奴婢者即與強盗十疋相似故略人不得唯徒二年為部曲者本條减死一等故略未得徒一年半為妻妾子孫者减二等故亦减強盗不得財二等合徒一年和誘者各减一等若和同相賣為奴婢者皆流二千里賣未售者减一等下條凖此即略和誘及和同相賣他人部曲者各减良人一等疏義曰和誘謂和同相誘减略一等為奴婢者流三千里為部曲者徒三年為妻妾子孫者徒二年半若和同相賣謂元謀兩和相賣為奴婢者賣人及被賣人罪無首從皆流二千里其數人共賣他人自依首從之法賣未售者减一等謂和同相賣未售事發各徒二年註云下條凖此謂下條得逃亡奴婢而賣未售及賣期親卑幼及子孫之婦等為奴婢未售者亦减一等故云凖此即略和誘和同相賣他人部曲者謂略他人部曲為奴婢者流三千里略部曲還為部曲者合徒三年略為妻妾子孫徒二年半和誘者各减一等和誘部曲為奴婢徒三年還為部曲徒二年半為妻妾子孫徒二年若共他人部曲和相相賣為奴婢减流一等徒三年為部曲者徒二年半故云各减良人一等其略和誘緦麻以上親部曲客女者律雖無文令有轉事量酬衣食之直不可同於凢人亦須依盗法而减緦麻小功部曲减凢人部曲一等大功减二等期親减三等問曰部曲客女被人所誘将為妻妾子孫而和同遂去誘者已有罪名合得何罪答曰名例律共犯罪以造意為首隨從者减一等背主受誘即當此條凖其罪坐减誘者罪一等自餘受誘律無正文者並合從坐科罪若逃亡之罪重者依例當條雖有罪名所為重者自從重略和誘奴婢諸略奴婢者以強盗論和誘者以竊盗論各罪止流三千里雖監臨主守亦同即奴婢别賫財物者自從强竊法不得累而科之疏義曰略奴婢者亦謂不和經略而取計贜以強盗論和誘者謂兩共和同以竊盗論各依強竊為罪其贜並合倍備各罪止流三千里註云雖監臨主守亦同謂雖是監臨主守應加亦同罪止流三千里即奴婢别賫財物者謂除奴婢身所著衣服外剰有財物自從强竊法因略者一尺徒三年二疋加一等和誘者一尺杖六十一疋加一等各從一重科之並不得将奴婢之身累併財物同㫁故云自從强竊法不得累而科之其奴婢身别賫物略誘者不知有物止得略誘本罪贜不合科如其知者財雖奴婢将行各同强竊法其略誘良人或部曲客女衣服外有財者亦同強竊盗法不取入己者良人部曲合有資財不在坐限若得逃亡奴婢不送官而賣者以和誘論藏隱者减一等坐之即私從奴婢買子孫及乞取者凖盗論乞賣者與同罪雖以為良亦同疏義曰凢捉得逃亡奴婢依令五日内合送官司其有不送而私賣者以和誘論計贜依盗法即私藏隱者减盗罪一等坐之即私從奴婢買子孫及乞取者或買或乞各平所乞買奴婢之價計贓凖盗論並不在除免倍贜監臨加罪加役流之例乞賣者與同罪謂奴婢将子孫乞人及賣與人並與買乞者同罪故註云雖以為良亦同謂乞買者雖将為良人亦與充賤罪同略賣期親卑幼問答二諸略賣期親以下卑幼為奴婢者並同鬭毆殺法無服之卑幼亦同即和賣者各减一等其賣餘親者各從凢人和略法疏義曰期親以下卑幼者謂弟妹子孫及兄弟之子孫外孫子孫之婦及從父弟妹並謂本條殺不至死者假如鬬殺弟妹徒三年殺子孫徒一年半若略賣弟妹為奴婢同鬬殺法徒三年賣子孫為奴婢徒一年半之類故云各同鬬毆殺法如本條殺合至死者自入餘親例無服之卑幼者謂己妾無子及子孫之妾亦同賣期親以下卑幼從本殺科之故云亦同假如殺妾徒三年若略賣亦徒三年之類即和賣者各减一等謂减上文略賣之罪一等和賣弟妹徒二年半和賣子孫徒一年之類其賣餘親各從凢人和略法者但是五服之内本條殺罪名至死者並名餘親故云從凢人和略法問曰賣妻為婢得同期親卑幼以否答曰妻服雖是期親不可同之卑幼故諸條之内每别稱夫為百代之始敦兩族之好本犯非應義絶或凖期幼之親若其賣妻為婢原情即合離異夫自嫁者依律兩離賣之充賤何宜更合此條賣期親卑幼妻固不在其中只可同彼餘親從凢人和略之法其于毆殺還同凢人之罪故知賣妻為婢不入期幼之科又問名例律云家人共犯止坐尊長未知此文和同相賣亦同家人共犯以否答曰依例本條别有制與例不同依本條此文賣期親卑幼及兄弟子孫外孫之婦賣子孫及己妾子孫之妾各有正條被賣之人不合加罪為其卑幼合受處分故也其賣餘親各從凢人和畧法既同凢人為法不合止坐家長知略和誘和同相賣問答一諸知略和誘和同相賣及略和誘部曲奴婢而買之者各减賣者罪一等疏義曰謂知略和誘和同相賣等情而故買之者各减賣者罪一等謂各依其色凖前條减賣人罪一等假有人知畧賣良人為奴婢而買之者從絞上减一等合流三千里之類知祖父母父母賣子孫及賣子孫之妾若己妾而買者各加賣者罪一等展轉知情而買各與初買者冋雖買時不知買後知而不言者亦以知情論疏義曰若略和誘他人而賣得罪已重故買者减賣者罪一等若知祖父母賣子孫以下得罪稍輕故買者加賣者罪一等假有父祖賣子孫為奴婢依鬬殺法合徒一年半知而買者加罪一等徒二年之類註云輾轉知情而買假有甲知他人祖父賣子孫而買復與乙乙又賣與丙輾轉皆知賣子孫之情而買者各與初買者同謂甲乙丙俱合徒二年若初買之時不知略誘和同相賣之情買得之後訪知即須首告不首告者亦以知情論各同初買之罪問曰知略和誘充賤而娶為妻妾合得何罪答曰知略和誘和同相賣而買之者各减賣者罪一等其略為部曲客女减為賤罪一等為妻妾子孫又减一等即是從賤為妻妾减罪二等通初買减三等假有知略良為婢合絞買為婢者减一等買為客女减二等娶為妻妾减三等舉斯一節即買餘色减罪可知知略和誘强竊盗諸知略和誘又强盗竊盗而受分者各計所受贜凖竊竊論减一等知盗贜而故買者坐贜論减一等知而為藏者又减一等疏義曰知略和誘人及略和誘奴婢或强盗竊盗若知情而受分者為其初不同謀故計所受之贜凖竊盗論减一等假有知人強盗受絹五疋者减竊盗一等合杖一百之類其知盗贜而故買坐贜論减一等謂知强盗盗贜故買十疋合杖一百知而故藏又减一等合杖九十其餘犯贜故買及藏者律無罪名從不應為流以上從重徒以下從輕共盗併贜論問答一諸共盗者併贜論造意及從行而不受分即受分而不行各依本首從法疏義曰共行盜者併贜論假有十人同盗得十疋人别分得一疋亦各得十疋之罪若造意之人或行而不受分或受分而不行從者亦有行而不受分或受分而不行雖行受有殊各依本首從為法止用一人為首餘為從坐假有甲造意不行受分乙為從行而不受分仍以甲為首乙為從之類若造意者不行又不受分即以行人專進止者為首造意者為從至死者减一等從者不行又不受分笞四十强盗杖八十疏義曰假有甲造意行盗而不行所盗得財义不受分乙丙丁等同行乙為處分方略即行人專進止者乙合為首甲不行為從其强盗應至死者减死一等流三千里雖有從名流罪以下仍不得减其同謀竊盗從者不行又不受分笞四十若謀强盗從者不行又不受分杖八十若本不同謀相遇共盗以臨時專進止者為首餘為從坐共強盗者罪無首從疏義曰行盗本不同謀相遇共盗者即以臨盗之時專進止者為首餘皆為從註云共强盜者罪無首從謂强盗雖本不同謀但是同行並無首從主遣部曲奴婢盜者雖不取物仍為首若行盜之後知情受財强盜竊盜並為竊盜從疏義曰主遣當家部曲奴婢行盜雖不取所盜之物主仍為行盜首部曲奴婢為從若部曲奴婢私自行盜主後知情受財凖所受多少不限强之與竊並為竊盜從假有部曲等先强盜竊盜得財主從知情受絹五疋合杖一百之類問曰有人行盜其主先不同謀乃遣部曲奴婢隨他人為盜為遣行人元謀作首欲令部曲奴婢主作首答曰盜者首出元謀若元謀不行即以臨時專進止為首令奴婢之主既不元謀又非行色但以處分奴婢隨盜求財奴婢之此行由主處分今所問者乃是他人元謀主雖驅使家人不可同于盜者先謀既自有首其主即為從論計入奴婢之贜凖為從坐假有奴婢逐他人總盜五十疋絹奴婢分得十疋奴婢為五十疋從徒三年主為十疋從合徒一年之類共謀强盜不行謀共謀强盜臨時不行而行者竊盜共謀者受分造意者為竊盜首餘並為竊盜從若不受分造意者為竊盜從餘並笞五十疏義曰假有甲乙丙丁同謀强盜甲為首臨時不行而行者竊盜甲雖不行共謀受分甲既造意為竊盜首餘行者並為竊盜從甲若不受分復不行為竊盜從從者不行又不受分笞五十前條竊盜從不行又不受分笞四十此條笞五十者為元謀强盜故也若共謀竊盜臨時不行而行者强盜其不行者造意受分知情不知情並為竊盜首造意者不受分及從者受分俱為竊盜從疏義曰同謀行竊盜臨時有不行之人而行人自為强盜其不行者是元謀造意受强盜贜分不限知情不知情並為竊盜首其造意者不受分及從者受分俱為竊盜從盜經㫁後三犯問答一諸盜經㫁後仍更行盜前後三犯徒者流二千里三犯流者絞三盜止數赦後為坐其於親屬相盜者不用此律疏義曰行盜之人實為巨蠧屢犯明憲罔有悛心前後三入刑科便是怙終其事峻之以法用懲其罪故有强盜竊盜經㫁更為三犯徒者流二千里三犯流者絞亦謂㫁後又為者其未㫁經降慮者不入三犯之限註云三盜皆據赦後為坐謂據赦後三犯者不論赦前犯状為數親屬相盜者不同此律謂自依親屬本條不用此三犯之律案職制律親屬謂緦麻以上及大功以上婚姻之家假有於堂兄弟婦家及堂兄弟男女婚姻之家犯盜徒流以上並不入三犯之例問曰有三犯死罪會降皆至流徒或一兩度
