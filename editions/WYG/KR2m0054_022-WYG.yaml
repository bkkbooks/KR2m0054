front:
  text: 一十六條
  hash: sha256:2a62d6f51b310d4f96286bd0fb56c29edb5804a905fb90b125fa65a6dc0d4a31
body:
  text: 九品以上毆議貴諸流内九品以上毆議貴者徒一年傷重及毆傷五品以上若五品以上毆傷議貴各加凢鬬傷二等疏義曰流内九品以上六品以下毆議貴者徒一年傷重謂他物毆凢人内損吐血合杖一百毆議貴合加二等徒一年半此名傷重其六品以下毆傷五品以上若五品以上毆傷議貴或毆不傷亦各加凢鬬毆二等監臨官司毆統屬問答一諸監臨官司於所統屬官及所部之人有髙官而毆之及官品同自相毆者並同凢鬬法疏義曰監臨官司於所統屬佐官以下及所管部屬之人有髙官而監臨官司毆之者同凢鬬法不計階品為其所管故也及官品同謂六品以下九品以上或五品以上非議貴者議貴謂三品以上一品以下並為官品同並謂不相管𨽻自相毆者並同凢鬬之罪假有勲官騎都尉而毆上柱國其上柱國既非議貴罪與凢鬬同其統屬下司毆上司者長官以外皆據品科其有府及鎮戍𨽻州者亦為統屬之限問曰州參軍事毆州内縣令帶五品以上勲官得為統屬同凢鬬與否答曰縣令是州内統屬之官假令品髙州官毆之凖上文各同凢鬬之法拒毆州縣使諸拒州縣以上使者杖六十毆者加二等傷重者加鬬傷一等謂有所徴攝權時拒捍不從者即被禁掌而拒捍及毆者各加一等疏義曰拒州縣以上使稱以上者省臺寺監及在京諸司等並是遣使追攝拒捍不從者杖六十毆者加二等杖八十傷重者謂他物毆内損吐血凡鬬合杖一百加鬬傷一等徒一年註云謂有所徵攝權時拒捍不從者即被禁掌拒捍及毆者各加一等謂有司禁録或復散留而輙拒捍合杖七十毆所司者合杖九十傷重者謂重一百杖以上加凢鬬二等若使人官品髙者各依本品加是名各加一等部曲奴婢良人相毆諸部曲毆良人者官户與部曲同加凢人一等加者加入于死奴婢又加一等若奴婢毆良人折跌支體及瞎其一目者絞死者各斬疏義曰名例律稱部曲者妻亦同此即部曲妻不限良人及客女毆傷良人者註云官戸與部曲同加凢人一等謂加凢鬬毆傷一等註云加者加入于死謂部曲毆良人損二事以上及因舊患令至篤疾㫁舌及毁敗陰陽凢毆流三千里者部曲加一等合死此名加入于死奴婢又加一等謂加凢鬬二等若奴婢毆良人折跌支體及瞎其一目者絞跌體瞎目各罪止徒三年即明毆良人准凢人相毆罪合流者各入死罪因毆致死各斬其良人毆傷殺他人部曲者減凢人一等奴婢又減一等若故殺部曲者絞奴婢流三千里疏義曰良人毆傷或殺他人部曲者減凢人一等謂毆殺者流三千里折一支者徒二年半之類奴婢又減一等毆殺者徒三年折一支徒二年之類若不因鬬故殺部曲者合絞若謀而殺訖亦同其故殺奴婢者流三千里即部曲奴婢相毆傷殺者各依部曲與良人相毆傷殺法餘條良人部曲奴婢私相犯本條無正文者並準此相侵財物者不用此律疏義曰部曲鬬毆殺奴婢流三千里折一支徒二年半折一齒杖一百奴婢毆部曲損傷二事以上及因舊患令至篤疾及㫁舌毁敗陰陽者絞折一支者流二千里折一齒者徒一年半若部曲故殺奴婢亦絞是名各依部曲與良人相毆傷殺法餘條良人部曲奴婢私相犯謂謀殺人穿地得屍不更埋之類私相犯本條無正文者並準此條加減之法相侵財物者各依凢人相侵盜之法故云不用此律主殺有罪奴婢諸奴婢有罪其主不請官司而殺者杖一百無罪而殺者徒一年期親及外祖父母殺者與主同下條部曲準此疏義曰奴婢賤𨽻雖各有主至於殺戮宜有禀承奴婢有罪不請官司而輙殺者杖一百無罪殺者謂全無罪失而故殺者徒一年註云期親及外祖父母殺者與主同謂有罪殺者杖一百無罪殺者徒一年故云與主同下條部曲者下條無期親及外祖父母傷殺部曲罪名若有傷殺亦同于主故云準此毆部曲死決罰問答一諸主毆部曲至死者徒一年故殺者加一等其有愆犯決罰致死及過失殺者各勿論疏義曰主毆部曲至死者徒一年不限罪之輕重故殺者加一等謂非因毆打本心故殺者加一等合徒一年半其有愆犯而因決罰致死及過失殺之者並無罪問曰妾有子或無子毆殺夫家部曲奴婢合當何罪或有客女及婢主幸而生子息自餘部曲奴婢而毆得同主期親與否答曰妾毆夫家部曲奴婢在律雖無罪名輕重相明須從減例下條云妾毆夫之妾子減凢人二等妾子毆傷父妾加凢人三等則部曲與主之妾相毆比之妾子與父妾相毆法即妾毆夫家部曲亦減凢人二等部曲毆主之妾加凢人三等若妾毆夫家奴婢減部曲一等奴婢毆主之妾加部曲一等至死者各依凢人法其有子者若子為家主母法不降于兒並依主例若子不為家主于奴婢止同主之期親餘條妾子為家主及不為家主各準此客女及婢雖有子息仍同賤𨽻不合别加其罪部曲奴婢過失殺主諸部曲奴婢過失殺主者絞傷及詈者流疏義曰部曲奴婢是為家僕事主須存謹敬又亦防其二心故雖過失殺主者絞若過失傷主及詈者流不言里數者為止合加杖二百故也即毆主之期親及外祖父母者絞已傷者皆斬詈者徒二年過失殺者減毆罪二等傷者义減一等疏義曰部曲奴婢毆主之期親謂異財者及毆主之外祖父母者絞傷者皆斬罪無首從詈者徒二年過失殺者減毆罪二等合徒三年加杖二百過失傷者又減一等合徒二年半加杖一百八十毆主之緦麻親徒一年傷重者各加凢人一等小功大功逓加一等加者加入于死死者皆斬疏義曰部曲奴婢毆主之緦麻親者無問正服義服並徒一年傷重者謂毆罪重于徒一年各加凢鬬一等假有部曲用他物毆主緦麻親内損吐血依凢人合杖一百犯良人加一等緦麻加凢人一等合徒一年半若奴婢以他物故毆主之緦麻親傷準凢人合杖九十奴婢犯良人加二等此條傷重又加一等合徒一年半故云傷重各加凢人一等小功大功遞加一等謂奴婢用他物毆傷小功親徒二年大功徒二年半是名遞加一等註云加者加入于死假如部曲毆主大功親折支準凢人徒三年部曲加一等合流二千里其大功親加三等合絞即是加者加入于死其緦麻小功部曲有犯各從本罪準此加例加應入死者處絞死者皆斬謂奴婢部曲毆主緦麻以上親至死者皆斬罪無首從毆緦麻親部曲奴婢諸毆緦麻小功親部曲奴婢折傷以上各減殺傷凢人部曲奴婢二等大功又減一等過失殺者各勿論疏義曰毆緦麻小功親部曲謂毆身之緦麻小功親部曲減凢人部曲二等謂總減三等假如毆折肋者凢人合徒二年減三等合杖一百若毆奴婢折齒凢人合徒一年奴婢減二等緦麻小功親奴婢又減二等總減四等合杖七十故云折傷以上各減凢人部曲奴婢二等大功又減一等謂毆大功部曲折齒總減四等合杖七十若毆大功奴婢合杖六十其外毆折傷以上各準此例為減法其有過失殺緦麻以上部曲奴婢者各無罪毆傷妻妾諸毆傷妻者減凢人二等死者以凢人論毆妾折傷以上減妻二等疏義曰妻之言齊與夫齊體義同于幼故得減凢人二等死者以凢人論合絞以刃及故殺者斬毆妾非折傷無罪折傷以上減妻罪二等即是減凢人四等若殺妾者止減凢人二等若妻毆傷殺妾與夫毆傷殺妻同皆須妻妾告乃坐即至死者聼餘人告殺妻仍為不睦過失殺者各勿論疏義曰若妻毆傷殺妾謂毆者減凢人二等死者以凢人論註云皆須妻妾告乃坐即外人告者無罪至死者聼餘人告餘人不限親疎皆得論告殺妻仍為不睦妻即是緦麻以上親準例自當不睦為稱以凢人論故重明此例過失殺者各勿論為無惡心故得無罪媵妾毆詈夫諸妻毆夫徒一年若毆傷重者加凢鬬傷三等須夫告乃坐死者斬疏義曰妻毆夫徒一年若毆傷重者加凢鬬傷三等假如凢人以他物毆傷人内損吐血合杖一百加凢鬬三等處徒三年此是計加之法須夫告乃坐謂要須夫告然後可論罪因毆致死者斬媵及妾犯者各加一等加者加入于死過失殺傷者各減二等疏義曰依令五品以上有媵庶人以上有妾故媵及妾犯夫者各加妻犯夫一等謂毆夫者徒一年半毆傷重者加凢鬬傷四等加者加入于死若毆夫折一支或瞎一目凢鬬徒三年加四等合絞是名加入于死過失殺者各減二等謂妻妾媵過失殺者並徒三年假如妻折夫一支加凢人三等流三千里過失減二等合徒二年半若媵及妾折夫一支合絞過失減二等合徒三年自餘折傷各隨輕重準此加減之例即媵及妾詈夫者杖八十若妾犯妻者與夫同媵犯妻者减妾一等妾犯媵者加凢人一等殺者各斬餘條媵無文者與妾同疏義曰媵及妾詈夫者杖八十若妾犯妻者與犯夫同謂毆者徒一年半死者斬媵犯妻者減妾一等毆者徒一年傷重者從重上減妾一等妾犯媵者加凢人一等謂毆者笞五十折一齒者徒一年半之類死者各斬謂媵及妾犯夫及妻若妾犯媵毆殺者各斬註云餘條媵無文者謂上條毆妾折傷以上減妻二等之類妻妾相犯及犯夫當條無文者各與妾同毆緦麻兄姊諸毆緦麻兄姊杖一百小功大功各遞加一等尊屬者又各加一等傷重者各遞加凢鬬傷一等死者斬即毆從父兄姊準凢鬬應流三千里者絞疏義曰毆緦麻兄姊謂本宗及外姻有緦麻服者並同毆此兄姊杖一百小功徒一年大功徒一年半尊屬者又各加一等謂毆緦麻尊屬徒一年小功尊屬徒一年半大功尊屬依禮唯夫之祖父母及夫之伯叔父母此並各有本條自從毆夫之祖父母絞夫之伯叔父母減夫犯一等徒二年半即此大功無尊屬加法傷重者各遞加凢鬬傷一等謂他物毆緦麻兄姊内損吐血準凢人杖一百上加一等合徒一年小功徒一年半大功徒二年尊屬又加一等即緦麻徒一年半小功徒二年之類因毆致死者各斬假有毆小功尊屬折二支加凢人三等不云加入于死罪止逺流即毆從父兄姊準凢鬬應流三千里者謂損二事以上或因舊患令至篤疾㫁舌及毁敗陰陽此是凢鬬應流三千里於從父兄姊犯此流者合絞若尊長毆卑幼折傷者緦麻減凢人一等小功大功遞減一等死者絞即毆殺從父弟妹及從父兄弟之子孫者流三千里若以刃及故殺者絞疏義曰若尊長毆卑幼折傷者謂折齒以上既云折傷即明非折傷不坐因毆折傷緦麻卑幼減凢人一等小功減二等大功減三等假有毆緦麻卑幼折一指凢鬬合徒一年減一等杖一百小功減二等杖九十大功減三等杖八十其毆傷重者遞減各準此因毆致死者尊長各絞即毆殺從父弟妹謂堂弟妹及從父兄弟之子孫謂堂姪及姪孫者流三千里若以刃殺及不因鬬而故殺者俱合絞刑毆兄姊諸毆兄姊者徒二年半傷者徒三年折傷者流三千里刃傷及折支若瞎其一目者絞死者皆斬詈者杖一百伯叔父母姑外祖父母各加一等即過失殺傷者各減本殺傷罪二等疏義曰兄姊至親更相急難彎弧垂泣義切匪他輙有毆者徒二年半毆傷者徒三年折傷者或折齒或折手足指但折一事即合處流若用刃傷及折支或跌其支體若瞎其一目或全失其明者各得絞罪因毆致死者首從皆斬詈者合杖一百其伯叔父母姑外祖父母各加一等謂加犯兄姊一等毆者徒三年傷者流二千里文無加入死折傷亦止流坐詈者徒一年過失殺若傷各減本殺傷二等謂過失殺者各減死罪二等合徒三年過失折齒者從流減二等之類其過失之罪兄姊以下並同減二等若毆殺弟妹及兄弟之子孫曽𤣥孫者各依本服論外孫者徒三年以刃及故殺者流二千里過失殺者各勿論疏義曰毆殺弟妹及兄弟之子孫者兄弟子期服孫即小功註云曾𤣥孫者各依本服論兄弟曾孫為緦麻𤣥孫當袒免服紀既疎恩情轉殺去聲故云各依本服論謂毆殺曾孫合絞𤣥孫既當袒免自依凢人法此條毆兄弟曾𤣥孫既依本服即明上條毆殺從父兄弟曾𤣥孫降服已盡亦同凢人其毆殺弟妹及兄弟之子孫外孫者各徒三年以刃及故殺者流二千里過失殺者各勿論毆詈祖父母父母諸詈祖父母父母者絞毆者斬過失殺者流三千里傷者徒三年若子孫違犯敎令而祖父母父母毆殺者徒一年半以刃殺者徒二年故殺者各加一等即嫡繼慈養殺者又加一等過失殺者各勿論疏義曰子孫於祖父母父母情有不順而輙詈者合絞毆者斬律無皆字案文可知子孫雖共毆擊原情俱是自毆雖無皆字各合斬刑下條妻妾毆夫之祖父母父母傷者皆斬舉輕明重皎然不惑過失殺者流三千里傷者徒三年見血為傷傷無大小之限若子孫違犯敎令謂有所敎令不限事之大小可從而故違者而祖父母父母即毆殺之者徒一年半以刃殺者徒二年故殺者各加一等謂非違犯敎令而故殺者手足他物殺徒二年用刃殺徒二年半即嫡繼慈養殺者為情疎易違故又加一等律文既云又加即以刃故殺者徒二年半上加一等徒三年違犯敎令以刃殺者二年上加一等徒二年半毆殺者一年半上加一等徒二年過失殺者各勿論即有違犯敎令依法决罰邂逅致死者亦無罪妻妾毆詈夫父母諸妻妾詈夫之祖父母父母者徒三年須舅姑告乃坐毆者絞傷者皆斬過失殺者徒三年傷者徒二年半疏義曰妻妾有詈夫之祖父母父母者徒三年註云須舅姑告乃坐毆者絞傷者皆斬罪無首從過失殺者徒三年傷者徒二年半即毆子孫之婦令廢疾者杖一百篤疾者加一等死者徒三年故殺者流二千里妾各減二等過失殺者各勿論疏義曰祖父母父母毆子孫之婦令廢疾者依戸令腰脊折一支廢為廢疾合杖一百篤疾者兩目盲二支廢加一等合徒一年死者徒二年故殺者謂不因毆詈無罪而輒殺者流二千里若毆妾令廢疾杖八十篤疾杖九十至死者徒二年故殺者徒二年半過失殺者各勿論妻妾毆詈故夫父母問答一諸妻妾毆詈故夫之祖父母父母者各減毆詈舅姑二等折傷者加役流死者斬過失殺傷者依凡論疏義曰故夫謂夫亡改嫁者其被出及和離者非各減毆詈舅姑罪二等謂毆者徒三年詈者徒二年折齒以上者加役流死者斬文無皆字即有首從過失殺傷者依凢論謂殺者依凢人法贖銅一百二十斤傷者各依凢人傷法徵贖其銅入被傷殺之家其舊舅姑毆子孫舊妻妾折傷以上各減凢人三等死者絞過失殺者勿論疏義曰其舊舅姑毆子孫舊妻妾折傷以上各減凢人三等謂折指者合杖八十折一支者徒一年半之類死者絞既不言故殺者斬即是故殺者亦絞過失殺者勿論問曰子孫之婦夫亡守志其姑少寡改醮他人或被棄放此姑婦相犯者合得何罪答曰子孫身亡妻妾改嫁舅姑現在此為舊舅姑今者姑雖被棄或已改醮他人子孫之妻孀居守志雖於夫家義絶母子終無絶道子既如母其婦理亦如姑姑雖適人婦仍在室理依親姑之法不得同于舊姑若夫之嫡繼慈養不入此條毆兄妻夫弟妹諸毆兄之妻及毆夫之弟妹各加凢人一等若妾犯者又加一等疏義曰嫂叔不許通問所以遠别嫌疑毆兄之妻及毆夫之弟妹者禮敬頓乖故各加凢人一等若妾犯者又加一等謂妾毆夫之弟妹加妻一等總加凢人二等夫之弟妹毆兄妾以凢人論即妾毆夫之妾子減凢人二等毆妻之子以凢人論若妻之子毆傷父妾加凢人一等妾子毆傷父妾又加二等至死者各依凢人法疏義曰即妾毆夫之妾子減凢人二等為匹敵之故得罪稍輕毆妻之子以凢人論為女君尊重故同凢鬬若妻之子毆傷父妾加凢人一等妾子毆傷父妾又加二等稱又加者總加三等若毆折一齒徒二年半之類註云至死者各依凢人法當條雖有加減至死者並與凢人同唐律疏義卷二十二欽定四庫全書唐律疏義卷二十三唐長孫無忌等撰鬬訟三凢一十三條毆妻前夫子問答一諸毆傷妻前夫之子者減凢人一等同居者又減一等死者絞疏義曰毆傷妻前夫之子者謂改醮之婦携子適人後夫毆傷者減凢人一等同居者謂與繼父同居立廟服期又減一等謂減凢人二等若毆之令至篤疾及㫁舌毁敗陰
