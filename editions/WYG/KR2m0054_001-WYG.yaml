front:
  text: 七條
  hash: sha256:2aed87492b5a36205f31a429f89e7196675eae5a7ced8d0e98bb1dfba66cb4af
body:
  text: 䟽夫三才肇位萬象斯分三才解見前肇始也萬象萬物也左傳物生而後有象有象然後有滋有滋然後有數禀氣含靈人為稱首天以二氣五行化生萬物氣以成形惟人也得其秀而最靈書太誓曰惟天地萬物父母惟人萬物之靈謂禀受天地之氣而含虛靈者萬物之中惟人為先莫不憑黎元而樹司宰因政教而施刑法黎元釋見前樹立也周禮六官冢宰掌邦治司徒掌邦教宗伯掌邦禮司馬掌邦政司㓂掌邦刑司空掌邦土而冢宰兼總六官司宰謂冢宰也前漢志劉向上䟽曰教化所恃以為治也刑法所以助治故律䟽云徳禮為政教之本刑法為政教之用其有情恣庸愚識沈愆戾仁義禮智根於道心性也喜怒哀樂愛惡欲發於人心情也聖賢存心養性故其情發而中節是為上智中人以下不能率性而縱恣其情情之所發皆是人慾故為下愚庸者庸常無能之人也沈下沈也氣之輕清者上浮而為天重濁者下沉而為地人禀氣之清者則見識髙明禀氣之濁者見識沈滯不加澄汰之功則其識愈下所為必陷於罪戾矣大則亂其區宇小則暌其品式文選石闕銘區宇乂安區宇天下也漢宣紀贊樞機周密品式具備品式猶言法度也此言犯法之人大則為逆亂小則違法制也不立制度則未之前聞言前此未聞有不立制度而可止亂息姦也故曰以刑止刑以殺止殺書大禹謨曰刑期于無刑民協于中時乃功懋哉注云雖或行刑以殺止殺終無犯者刑罰不可弛於國笞捶不得廢於家弛廢也此譬喻治國之不可廢刑罰猶治家之不可無笞捶時遇澆淳用有衆寡澆薄也淳厚也謂遇時俗之淳則用刑少遭時俗之薄則用刑煩也於是結繩啓路盈坎疏源書序伏羲氏王天下造書契以代結繩之政注云伏羲以前未有文字大事結大繩小事結小繩易坎水流而不盈行險而不夫其信爾雅坎律銓也此言盈坎疏源者言律之在天下如坎水之流行而可信也輕刑明威大禮崇敬書湯誥曰肆台小子將天命明威不敢赦言國家所以輕刑罰以明其威也禮記樂記曰大禮與天地同節律疏云禮者敬之本敬者禮之輿易曰天垂象聖人則之觀雷電而制威刑覩秋霜而有肅殺易繫辭曰天垂象見吉凶聖人象之河出圖洛出書聖人則之易象曰雷電噬嗑先王以明罰𠡠法盖震為雷則威離為電則明明而威用刑之象也春秋符曰霜者刑罰之表也季秋霜始降鷹隼擊王者順天行誅成肅殺之威懲其未犯而防其未然平其徽纆而存乎博愛懲誡也文選君子行詩曰君子防未然徽纆見易坎卦言國家制刑懲一而誡百使之畏於未犯之先不幸而麗於法則寛平其徽纆而心則主於博愛之仁也蓋聖王不獲已而用之晉刑法志曰論其本意盖有不得已而用之者焉古者大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽笮薄刑用鞭扑其所由来亦已尚矣應劭曰蚩尤作亂不用帝命遂作五虐之刑昔白龍白雲則伏羲軒轅之代左傳昭公十七年郯子曰昔者太皥氏即伏羲氏也以龍紀故為龍師而龍名黄帝氏以雲紀故為雲師而雲名又史記曰黄帝少典之子姓公孫名軒轅官名雲師注云應劭曰黄帝受命有雲瑞故以雲紀事也春官為青雲夏官為紅雲秋官為白雲冬官為黒雲中官為黄雲今白龍白雲者掌刑之官也西火西水則炎帝共工之年左傳昭公十七年郯子曰炎帝氏即神農也以火紀故為火師而火名共工氏以水紀故為水師而水名西亦刑官鷞鳩筮賔於少皥左傳昭公十七年郯子曰我髙祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名下文鷞鳩氏司㓂也注云鷹也鷙故為司㓂主盗賊言筮賔所以出師以筮賔旅金政䇿名於顓頊家語黄帝徳篇曰孔子顓頊黄帝之孫也昌意之子髙陽金政者金屬西方亦司刑之官咸有天秩典司刑憲咸者皆也天秩者書臯陶謨曰天秩有禮自我五禮有庸哉即君之禄也典者主也司者管也憲者法也言自白龍至金政之官皆食君禄而主刑法也大道之化擊壤無違尚書序伏羲神農黄帝之書謂之三墳言大道也周處風土記曰擊壤者以木作之前廣後鋭長四尺三寸其形如履將戯先側一壤於地遥於三四十步以手中壤擊之中者為上部論衡曰帝時百姓無事有五十之民擊壤於途觀者曰大哉堯之徳也擊壤者曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉言大道之時施教化使民擊壤謳歌尚不違古以去刑法也逮乎唐虞化行事簡逮及也唐堯虞舜簡要也少也易繫辭曰堯舜垂衣裳而天下治論語曰無為而治者其舜也與荀子解蔽篇曰昔者舜之治天下也不以事詔而萬物成言唐虞之時教化通行其事簡少議刑以定其罪畫象以媿其心周禮以八辟麗邦法附刑罰議親議故議賢議能議功議貴議勤議賔晉刑法志曰五帝畫象而民知禁舜典象以典刑吳氏曰圖所用刑之象以示使智愚皆知王氏曰若周典垂刑象于象魏是也所有條貫良多簡略年代浸逺不可得而詳焉言唐虞之時其法甚多簡略但年代漸逺不可得而備知之也堯舜時理官則謂之為士而臯陶為之其法略存而往概見理官者齊職議曰大理古官也唐虞以臯陶作士理官也劉馮事始曰舜以臯陶作士乃理獄之官也書舜典曰帝曰臯陶蠻夷猾夏宼賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允故其法僅存而往往見其大槩也則風俗通所云臯陶謨虞造律是也虞書臯陶矢厥謨謨謀也律者訓銓訓法也律之與法文雖有殊其義一也爾雅釋言曰坎律銓也郭璞注云易坎卦主法法律皆所以銓量輕重也易曰理財正辭禁人為非曰義此周易下繫之辭也孔頴達䟽曰言聖人治理其財用之有節正定號令之辭出之以理禁約其民為非僻之事勿使行惡事謂之義義宜也言以此行之得其宜也故銓量輕重依義制律銓者平也書吕刑曰上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重尚書大傳曰丕天之大律注云奉天之大法法亦律也故謂之為律該説律意昔者聖人制作謂之為經傳師所説則謂之為傳此則丘明子夏於春秋禮經作傳是也近代以来兼經注而明之則謂之為義䟽䟽之為字本以䟽闊䟽逺立名又廣雅云䟽者識也案䟽訓識則書䟽記識之道存焉左傳序曰春秋者魯史記之名又曰懲惡而勸善非聖人孰能修之經者夫子之文章傳者丘明之善志蓋丘明受夫子之經所謂傳師所説又子夏為禮經之傳禮記經解曰䟽通知逺而不誣則深于書者也䟽者識也謂䟽識於經顯彰其理而易通曉也史記云後主所是䟽為令前主所是著為律史記杜周傳周為廷尉其治大抵倣張湯而候伺上所欲擠者因而䧟之上所欲釋者乆繫待問而㣲見其寃狀客有讓周曰君為天子决平不循三尺法専以人主意指為獄獄者固如是乎周曰三尺安在哉前主所是著為律後主所是䟽為令當時為是何古之法乎漢書云削牘為䟽故云䟽也該説䟽意昔者三王始用肉刑三王夏禹殷湯周文武肉刑墨劓剕宫大辟赭衣難嗣皇風更逺前漢書載刑法志曰秦始皇專任刑罰躬操文墨赭衣塞路囹圄成市嗣繼也言秦之暴虐難繼三王之仁徳也去三皇之風化愈更懸逺也朴散淳漓傷肌犯骨前漢武帝制曰殷人執五行以督姦傷肌膚以懲惡言去古浸逺淳古質朴之風漓散人多犯法為姦惡故用刑傷肌犯骨以懲治之也尚書大𫝊曰夏刑三千條周禮司刑掌五刑其屬二千五百周禮秋官司刑掌五刑之法墨罪五百劓罪五百宫罪五百剕罪五百大辟罪五百穆王度時制法五刑之屬三千書吕刑曰吕命穆王訓夏贖刑作吕刑墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千周衰刑重戰國異制前漢嚴安上書曰臣聞周有天下其治二百餘嵗成康其隆也刑措四十餘年而不用及其衰也亦三百餘年故五伯更起五伯常佐天子興利除害誅異禁邪匡國内以尊天子五伯既沒聖賢莫續天子孤弱號令不行諸侯恣行强凌弱衆暴寡田常簒齊六卿分晉並為戰國此民之始苦也言周衰之時刑法嚴重戰國用刑各殊制度也魏文侯師於李悝集諸國刑典造法經六篇一盗法二賊法三囚法四捕法五雜法六具法史記魏文侯名都師李悝集諸國刑典造法經六篇一盗法今賊盗律是也二賊法今詐偽律是也三囚法今斷獄律是也四捕法今捕亡律是也五雜法今雜律是也六具法今名例律是也商鞅傳授改法為律史記商君者衛之庶孽公子名鞅姓公孫氏鞅少好刑名之學西入秦事孝公為相封之商於十五邑號為商君欲變法令既具未布乃立三丈木於市南門募人有徙置北門者與十金人怪莫敢徙復令曰能徙者與五十金一人徙之輒與五十金以明不欺其言改法為律者謂盗律賊律囚律捕律雜律具律也漢相蕭何更加悝所造户興廐三篇謂九章之律户者户婚律興者擅興律廐者廐庫律漢相蕭何又撰户興廐三篇與前六篇共為九章之律魏因漢律為一十八篇改漢具律為刑名第一魏志劉劭字孔才廣平邯鄲人也魏明帝即位徵拜騎都尉與議郎庾嶷荀詵等定科令作新律十八篇晉命賈充等増損漢魏律為二十篇於魏刑名律中分為法例律晉書賈充字公閭晉帝有詔改定律令令賈充定法律令與太𫝊郭冲等十四人典其事就漢九章増十二篇仍其族類正其體號改舊律為刑名法例辨囚律為告劾擊訊斷獄分盗律為請賕詐偽水火毆亡因事類為宫衛違制律周官為諸侯律合二十八篇六百二十條二萬七千六百五十七言蠲其苛穢存其清約事從中興歸於益時宋齊梁及後魏因而不改爰至北齊併刑名法例為名例後周復為刑名隋因北齊更為名例唐因於隋相承不改宋髙祖劉裕字徳興齊太祖蕭道成字紹伯梁髙祖蕭衍字叔達陳髙祖陳霸先字興國後魏聖武帝諱誥汾北齊髙歡字賀元渾渤海蓨人也後周太祖文皇帝宇文秦字黒闥代郡武川人隋髙祖文皇帝楊堅宏農華隂人也唐髙祖神聖皇帝李淵其先隴西狄道人也名者五刑之罪名例者五刑之體例名訓為命例訓為比命諸篇之刑名比諸篇之法例但名因罪立事由犯生命名即刑應比例即事表故以名例為首篇第者訓居訓次則次第之義可得言矣一者太極之氣函三為一黄鍾之一數所生焉名例冠十二篇之首故云名例第一律音義曰主物之謂名統凢之為例法例之名既衆要須例以表之故曰名例漢作九章散而未統魏朝始集罪例號為刑名晉賈充増律二十篇以刑名法例揭為篇冠至北齊趙郡王叡等奏上齊律十二篇併曰名例後循而不改大唐皇帝以上聖凝圖英聲嗣武皇帝髙宗也凝固也圖基業也文選荅臨淄侯牋曰流千載之英聲嗣繼也武蹤也言髙宗皇帝以上聖之資固其基業以英雄之聲譽繼蹤先祖潤春雲於品物緩秋官於黎庶春雲以喻聖澤也文選褚淵碑文曰春雲等潤品物萬物也易乾卦曰雲行雨施品物流形緩寛也周易中孚卦曰君子以議獄緩死秋官掌刑之官也周禮秋官大司㓂曰乃立秋官而掌邦禁黎庶百姓也文選西都賦曰膏澤洽于黎庶言霑聖澤於萬物寛刑官於百姓今之典憲前聖規模章程靡失鴻纎備舉文選奏彈曰肅明典憲漢書曰規模宏逺漢髙祖命張蒼定章程詩傳曰大曰鴻小曰鴈鴻訓為大纎者細㣲也謂律内大小之刑無不備舉而刑憲之司執行殊異大理當其死坐刑部處以流刑一州斷以徒年一縣將為杖罰不有解釋觸塗睽誤皇帝彞憲在懷納隍興軫唐官有省部寺監刑部大理寺俱掌刑縣統於州流罪自五百里至三千里徒罪自一年一年半至三年杖自一百至六十徒罪斷於州杖罪斷於縣謂律雖有定而掌法之吏各有所司故所行或異若律文不以䟽解釋明白則所觸之塗必有乖睽差誤也彞常憲法也隍城之溝也文選人若不得其所若己納之於隍軫念也徳禮為政教之本刑罰為政教之用猶昏曉陽秋相須而成者也論語道之以徳齊之以禮徳禮猶曉與陽刑罰猶昏與秋言徳禮與刑罰猶昏曉相須而成一晝夜春陽與秋隂相須而成一嵗也是以降綸言於台鉉揮折簡於髦彦禮記緇衣篇曰王言如絲其出如綸王言如綸其出如綍以喻君之詔也春秋漢含孳曰三公在天法三台也易鼎卦曰鼎黄耳金鉉鄭𤣥曰金鉉諭明道能舉君之官職也以喻台相文選石闕銘曰折簡而禽廬九張銑註曰折簡謂䇿書詩曰髦士攸宜爾雅曰美士為彦言天子降詔詞於台相揮折簡在於髦彦之士也爰造律䟽大明典式逺則皇王妙㫖近則蕭賈遺文詩我將篇曰儀式刑文王之典日靖四方蕭賈遺文謂漢蕭何晉賈充等所制篇章也沿波討源自枝窮葉文選陸士衡文賦曰或因枝以振葉或沿波而討源言律䟽無不盡義甄表寛大裁成簡乆甄明也表顯也裁制也書大禹謨曰臨下以簡御衆以寛言明顯寛大之恩制成簡乆之法譬權衡之知輕重若規矩之得方圓荀子禮論篇曰禮之於正國也猶權衡之於輕重也繩墨之於曲直也規矩之於方圓也故權衡誠懸則不可欺以輕重繩墨誠陳則不可欺以曲直規矩誠設則不可欺以方圓君子審禮不可欺以詐偽邁彼三章同符畫一者矣史記髙祖入闗與父老約法三章殺人者死傷人及盗抵罪前漢蕭何為相死曹參代之百姓歌曰蕭何為法講若畫一曹參代之守而勿失載其清浄人以寧壹五刑笞刑五杖刑五徒刑五流刑三死刑二笞刑五笞一十贖銅一斤笞二十贖銅二斤笞三十贖銅三斤笞四十贖銅四斤笞五十贖銅五斤䟽義曰笞者擊也又訓為恥言人有小愆法須懲誡故加捶撻以恥之漢時笞則用竹今時則用楚故書云扑作教刑即其義也漢文帝十三年太倉令淳于意女緹縈上書願沒入為官婢以贖父刑帝悲其意遂改肉刑當黥髠者鉗為城奴令舂當劓者笞三百此即笞杖之目未有區分笞擊之刑刑之薄者也隨時沿革輕重不同俱期無刑義唯必措孝經援神契云聖人制五刑以法五行禮云刑者侀也成也一成而不可變故君子盡心焉孝經鉤命决云刑者侀也質罪示終然殺人者死傷人者刑百王之所同其所由来尚矣從笞十至五十其數有五故曰笞刑五徒杖之數亦準此杖刑五杖六十贖銅六斤杖七十贖銅七斤杖八十贖銅八斤杖九十贖銅九斤杖一百贖銅十斤䟽義曰説文云杖者持也而可以擊人者歟家語云舜之事父小杖則受大杖則走國語云薄刑用鞭扑書云鞭作官刑猶今之杖刑者也又蚩尤作五虐之刑亦用鞭扑原其濫觴所從来逺矣漢景帝以笞者已死而笞未畢改三百曰二百二百曰一百奕代㳂流曽㣲増損爰洎隋室以杖易鞭今律云累決笞杖者不得過二百蓋循漢制也徒刑五一年贖銅二十斤一年半贖銅三十斤二年贖銅四十斤二年半贖銅五十斤三年贖銅六十斤䟽義曰徒者奴也蓋奴辱之周禮云其奴男子入于罪𨽻又任之以事寘以圜土而收教之上罪三年而捨中罪二年而捨下罪一年而捨此並徒刑也蓋始於周流刑三二千里贖銅八十斤二千五百里贖銅九十斤三千里贖銅一百斤䟽義曰書云流宥五刑謂不忍刑殺宥之于逺也又曰五流有宅五宅三居大罪投之四裔或流之于海外次九州之外次中國之外蓋始於唐虞今之三流即其義也死刑二問答一絞斬贖銅一百二十斤䟽義曰古先哲王則天垂法輔政助化禁暴防姦本欲生之義期止殺絞斬之坐刑之極也死者魂氣歸於天形魄歸於地與萬化㝠然故鄭註禮云死者澌也消盡為澌春秋元命包云黄帝斬蚩尤於涿鹿之野禮云公族有死罪罄之于甸人故知斬自軒轅絞興周代二者法隂數也隂主殺罰因而則之即古大辟之刑是也問曰笞以上死以下皆有贖法未知贖刑起自何代答曰書云金作贖刑註云誤而入罪出金以贖之甫侯訓夏贖刑云墨辟疑赦其罰百鍰劓辟疑赦其罰唯倍剕辟疑赦其罰倍差宫辟疑赦其罰六百鍰大辟疑赦其罰千鍰註云六兩曰鍰鍰黄鐵也晉律應八議以上皆留官收贖勿髠鉗笞也今古贖刑輕重異制品目區别備有章程不假臚陳無煩縷説十惡問答二䟽義曰五刑之中十惡尤切虧損名教毁裂冠冕特標篇首以為明誡其數甚惡者事類有十故稱十惡然漢制九章雖並湮沒其不道不敬之目見存原夫厥初蓋起諸漢案梁陳已往略有其條周齊雖具十條之名而無十惡之目開皇創制始備此科酌於舊章數存於十大業有造復更刋除十條之内唯存其八自武徳以来仍遵開皇無所損益一曰謀反謂謀危社稷䟽義曰案公羊傳云君親無將將則必誅謂將有逆心而害於君父者則必誅之左傳云天反時為災人反徳為亂然王者居宸極之至尊奉上天之大寳命同二儀之覆載作兆庶之父母為子為臣惟忠惟孝乃敢包藏凶慝將起逆心規反天常悖逆人理故曰謀反註謂謀危社稷䟽義曰社為五土之神稷為田正也所以神地道主司嗇君為神主食乃人天主泰即神安神寜即時稔臣下將圖逆節而有無君之心君位若危神將安恃不敢指斥尊號故託云社稷周禮云左祖右社人君所尊也二曰謀大逆謂謀毁宗廟山陵及宫闕䟽義曰此條之人干紀犯順違道悖徳逆莫大焉故曰大逆註謂謀毁宗廟山陵及宫闕䟽義曰有人獲罪於天不知紀極潛思釋憾將圖不逞遂起惡心謀毁宗廟山陵及宫闕宗者尊也廟者貌也刻木為主敬象尊容置之宫室以時祭享故曰宗廟山陵者古先帝王因山而葬黄帝葬橋山即其事也或云帝王之葬如山如陵故曰山陵宫者天有紫㣲宫人君則之所居之處故曰宫其闕者爾雅釋宫云觀謂之闕郭璞云宫門雙闕也周禮秋官正月之吉懸刑象之法於象魏使人觀之故謂之觀三曰謀叛謂謀背國從偽䟽義曰人有謀背本朝將投蕃國或欲翻城從偽或欲以地外奔即如吕牟夷以牟婁来奔公山費叛之類四曰惡逆謂毆及謀殺祖父母父母殺伯叔父母姑兄姊外祖父母夫夫之祖父母父母者䟽義曰父母之恩昊天罔極嗣續妣祖承奉不輕梟鏡其心愛敬同盡五服至親自相屠戮窮惡盡逆絶棄人理故曰惡逆註謂毆及謀殺祖父母父母殺伯叔父母姑兄姊外祖父母夫夫之祖父母父母者䟽義曰毆謂毆擊謀謂謀計自伯叔以下即據殺訖若謀而未殺自當不睦之條惡逆者常赦不免决不待時不睦者會赦合原唯止除名而已以此為别故立制不同其夫之祖父母者夫之曾髙祖亦同案䘮服制為夫曽髙服緦麻若夫承重其妻於曽髙祖亦如夫之父母服期故知稱夫之祖父母曽髙亦同也問曰外祖父母及夫據禮有等數不同具為分析答曰外祖父母但生母身有服無服並是外祖父母所以如此者律云不以尊壓及出降故也若不生母身者有服同外祖父母無服同凢人依禮嫡子為父後及不為父後者並不為出母之黨服即為繼母之黨服此兩黨俱是外祖父母若親母死於室為親母之黨服不為繼母之黨服此繼母之黨無服即同凢人又妾子為父後及不為父後者嫡母存為其黨服嫡母亡不為其黨服禮云所從亡者則已此既從嫡母而服故嫡母亡其黨則已夫則依禮有三月廟見有未廟見或就婚等三種之夫並同夫法其有克吉日反定婚夫等唯不得違約改嫁自餘相犯並同凢人五曰不道謂殺一家非死罪三人及支解人造畜蠱毒厭魅䟽義曰安忍殘賊背違正道故曰不道註謂殺一家非死罪三人及支解人䟽義曰謂一家之中三人被殺俱無死罪者若三人之内有一人合死及於數家各殺二人唯合死刑不入十惡或殺一家三人本條罪不至死亦不入十惡支解人者謂殺人而支解亦據本罪合死者註造畜蠱毒厭魅䟽義曰謂造合成蠱雖非造合乃傳畜堪以害人者皆是即未成者不入十惡厭魅者其事多端不可具述皆謂邪俗隂行不軌欲令前人疾苦及死者六曰大不敬謂盗大祀神御之物乘輿服御物盗及偽造御寳合和御藥誤不如本方及封題誤若造御膳誤犯食禁御幸舟船誤不牢固指斥乘輿情理切害及對捍制使而無人臣之禮䟽義曰禮者敬之本敬者禮之輿故禮運云禮者君之柄所以别嫌明㣲考制度别仁義責其所犯既大皆無肅敬之心故曰大不敬註謂盗大祀神御之物乘輿服御物䟽義曰大祀者依祠令昊天上帝五方上帝皇地祗神州宗廟等為大祀職制律又云凢言祀者祭享同若大祭大享並同大祀神御之物者謂神祗所御之物本條註云謂供神御者帷帳几杖亦同造成未供而盗亦是酒醴饌具及籩豆簠簋之屬在神前而盗者亦入大不敬不在神所盗者非也乘輿服御物者謂主上服御之物人主以天下為家乘輿巡幸不敢指斥尊號故託乘輿以言之本條註云服通衾茵之屬真副等皆須監當之官部分擬進乃為御物註盗及偽造御寳䟽義曰説文云璽者印也古者尊卑共之左傳云襄公自楚還及方城季武子取卞使公冶問璽書追而予之是其義也秦漢以來天子曰璽諸侯曰印開元嵗中改璽曰寳本條云偽造皇帝八寳此言御寳者為攝三后寳並入十惡故也註合和御藥誤不如本方及封題誤䟽義曰合和御藥雖慿正方中間錯謬誤違本法封題誤者謂依方合訖封題有誤若以丸為散應冷言熱之類註若造御膳誤犯食禁䟽義曰周禮食醫掌王之八珍所司特宜敬愼營造御膳須憑食經誤不依經即是不敬註御幸舟船誤不牢固䟽義曰帝王所之莫不慶幸舟船既擬供御故曰御幸舟船工匠造船備盡心力誤不牢固即入此條但御幸舟船以上三事皆為因誤得罪設未進御亦同十惡如其故為即從謀反科罪其監當官司準法減科不入不敬註指斥乘輿情理切害䟽義曰此謂情有觖望發言謗毁指斥乘輿情理切害者若使無心怨天唯欲誣搆人罪自依反坐之法不入十惡之條舊律云言理切害今改為情理切害者蓋欲原其本情廣恩愼罰故也註及對捍制使而無人臣之禮䟽義曰奉制出使宣布四方有人對捍不敬制命而無人臣之禮者制使者謂奉𠡠定名及令所司差遣者是也七曰不孝謂告言詛詈祖父母父母及祖父母父母在别籍異財若供養有闕居父母䘮身自嫁娶若作樂釋服從吉聞祖父母父母䘮匿不舉哀詐稱祖父母父母死䟽義曰善事父母曰孝既有違犯是名不孝註謂告言詛詈祖父母父母䟽義曰本條直云告祖父母父母此註兼云告言者文雖不同其義一也詛猶呪也詈猶罵也依本條詛欲令死及疾苦者皆以謀殺論自當惡逆唯詛求愛媚始入此條問曰依賊盗律子孫於祖父母父母求愛媚而厭呪者流二千里然厭魅呪詛罪無輕重今詛為不孝未知厭入何條答曰厭呪雖復同文理乃詛輕厭重但厭魅凢人則入不道若呪詛者不入十惡名例云其應入罪者則舉輕以明重然呪詛是輕尚入不孝明知厭魅是重理入此條註及祖父母父母在别籍異財䟽義曰祖父母父母在子孫就養無方出告反面無自專之道而有異財别籍情無至孝之心名義以之俱淪情節於茲並棄稽之典禮罪惡難容二事既不相須違者並當十惡註若供養有闕䟽義曰禮云孝子之養其親也樂其心不違其志以其飲食而忠養之其有堪供而闕者祖父母父母告乃坐註居父母䘮身自嫁娶若作樂釋服從吉䟽義曰居父母䘮身自嫁娶皆謂首從得罪者若其獨坐主婚男女即非不孝所以稱身自嫁娶以明主婚不同十惡故也其男夫居䘮娶妾合免所居之一官女子居䘮為妾得減妻罪三等並不入不孝若作樂者自作遣人等樂謂擊鐘鼓奏絲竹匏磬塤箎歌舞散樂之類釋服從吉謂䘮制未終而在二十七月之内釋去衰裳而著吉服者註聞祖父母父母䘮匿不舉哀及詐稱祖父母父母死䟽義曰依禮聞親䘮以哭答使者盡哀而問故父母之䘮創巨尤切聞即崩殞擗踊號天今乃匿不舉哀或揀擇時日者並是其詐稱祖父母父母死謂祖父母父母見在而詐稱死者若先死其詐稱始死者非八曰不睦謂謀殺及賣緦麻以上親毆告夫及大功以上尊長小功尊屬䟽義曰禮云講信修睦孝經云民用和睦睦者親也此條之内皆是親族相犯為九族不相叶睦故曰不睦註謂謀殺及賣緦麻以上親䟽義曰但有謀殺及賣緦麻以上親無問尊卑長幼總入此條若謀殺期親尊長等殺訖即入惡逆今直言謀殺不言故鬬若故鬬殺訖亦入不睦舉謀殺未傷是輕明故鬬已殺是重輕重相明理同十惡賣緦麻以上親者無問强和俱入不睦賣未售者非註毆告夫及大功以上尊長小功尊屬䟽義曰依禮夫者婦之天又云妻者齊也恐不同尊長故别言夫號大功尊長者依禮男子無大功尊唯婦人於夫之祖父母及夫之伯叔父母是大功尊大功長者謂從父兄姊是也以上者伯叔父母姑兄姊之類小功尊屬者謂從祖父母姑從祖伯叔父母姑外祖父母舅姨之類九曰不義謂殺本屬府主刺史縣令見受業師吏卒殺本部五品以上官長及聞夫䘮匿不舉哀若作樂釋服從吉及改嫁䟽義曰禮之所尊尊其義也此條元非血屬本止以義相從背義乖仁故曰不義註謂殺本屬府主刺史縣令見受業師䟽義曰府主者依令職事官五品以上帶勲官三品以上得親事帳内於所事之主名為府主國官邑官於其所屬之主亦與府主同其都督刺史皆據制書出日六品以下皆據見訖始是見受業師謂服膺儒業而非私學者若殺訖入不義謀而未殺自從雜犯註吏卒殺本部五品以上官長䟽義曰吏謂流外官以下卒謂庶士衛士之類此等色人類例不少有殺本部五品以上官長並入不義官長者依令諸司尚書同官長之例註及聞夫䘮匿不舉哀若作樂釋服從吉及改嫁䟽義曰夫者妻之天也移父之服而服為夫斬衰恩義既崇聞䘮即須號慟而有匿哀不舉居䘮作樂釋服從吉改嫁忘憂皆是背禮違義故俱為十惡其改嫁為妾者非十曰内亂謂姦小功以上親父祖妾及與和者䟽義曰左傳云女有家男有室無相瀆易此則亂若有禽獸其行朋淫於家紊亂禮經故曰内亂註謂姦小功以上親䟽義曰姦小功以上親者謂據禮男子為婦人著小功服而姦者若婦人為男夫雖有小功之服男子為報服緦麻者非謂外孫女於外祖父及外甥於舅之類註父祖妾及與和者䟽義曰父祖妾者有子無子並同媵亦是及與和謂婦人共男子和姦者並入内亂若被强姦後遂和可者亦是八議䟽義曰周禮云八辟麗邦法今之八議周之八辟也禮云刑不上大夫犯法則在八議輕重不在刑書也其應議之人或分派天潢或宿侍旒扆或多才多藝或立事立功簡在帝心勲書王府若犯死罪議定奏裁皆須取决宸衷曹司不敢與奪此謂重親賢敦故舊尊賔貴尚功能也以此八議之人犯死罪皆先奏請議其所犯故曰八議一曰議親謂皇帝袒免以上親及太皇太后皇太后緦麻以上親皇后小功以上親䟽義曰義取内睦九族外叶萬邦布雨露之恩篤親親之理故曰議親袒免者據禮有五髙祖兄弟曽祖從父兄弟祖再從兄弟父三從兄弟身之四從兄弟是也註及太皇太后皇太后緦麻以上親䟽義曰太皇太后者皇帝祖母也皇太后者皇帝母也加太者太之言大也易稱太極蓋取尊大之義稱皇者因子以明母也其二后䕃及緦麻以上親緦麻之親有四曽祖兄弟祖從父兄弟父再從兄弟身之三從兄弟是也註皇后小功以上親䟽義曰皇后䕃小功以上親者降姑之義小功之親有三祖之兄弟父之從父兄弟身之再從兄弟是也此數之外據禮内外諸親有服同者並準此二曰議故謂故舊䟽義曰謂宿得侍見特蒙接遇歴乆者三曰議賢謂有大徳行䟽義曰謂賢人君子言行可為法則者四曰議能謂有大才業䟽義曰謂能整軍旅莅政事鹽梅帝道師範人倫者五曰議功謂有大勲功䟽義曰謂能斬將搴旗摧鋒萬里或率衆歸化寧濟一時匡救艱難銘功太常者六曰議貴謂職事官三品以上散官二品以上及爵一品者䟽義曰依令有執掌者為職事官無職掌者為散官爵謂國公以上七曰議勤謂有大勤勞䟽義曰謂大將吏恪居官次夙夜在公若逺使絶域經涉險難者八曰議賔謂承先代之後為國賔者䟽義曰書云虞賔在位羣后徳讓詩曰有客有客亦白其馬禮云天子存二代之後猶尊賢也昔武王克商封夏后氏之後於把封殷氏之後於宋若今周後介公隋後酅公並為國賓也唐律䟽義卷一欽定四庫全書唐律䟽義卷二唐長孫無忌等撰名例二八議者此名議章
