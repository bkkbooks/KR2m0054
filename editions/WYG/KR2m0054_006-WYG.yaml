front:
  text: 一十三條
  hash: sha256:544cb7166aff29d5da991db43b2c018dac5499c27dbae1f51e99512b25b9a324
body:
  text: 二罪從重問答四諸二罪以上俱發以重者論謂非應累者唯具條其狀不累輕以加重若重罪應贖輕罪應居作官當者以居作官當為重疏義曰假有甲任九品一官犯盜絹五疋合徒一年又私有矟一張合徒一年半又過失折人二支合贖流三千里是為二罪以上俱發從有禁兵器斷徒一年半用官當訖更徴銅十斤既犯盜徒罪仍合免官是以為重者論注謂非應累者唯具條其狀不累輕以加重疏義曰以上三事並非應累斷者雖從兵器處罪仍具條三種犯狀不得將盜一年徒罪累於私有禁兵器一年半徒上故云不累輕以重所以具條其其狀者一彰罪多二防會赦雜犯死罪經赦得原蠱毒流刑逢恩不免故也注若重罪應贖輕罪應居作官當者以居作官當為重疏義曰謂甲過失折人二支應流依法聽贖私有禁兵器合徒官當即以官當為重若白丁犯者即從禁兵器徒一年半即居作為重罪若更多犯自依從重法問曰有七品子犯折傷人合徒一年應贖又犯盜合徒一年家有親老應加杖二罪俱發何者為重答曰律以贖法為輕加杖為重故盜者不得以䕃贖家有親老聽加杖放之即是加杖為重罪若贖一年半徒自從重斷徴贖不合從輕加杖等者從一疏義曰假有白丁犯盜五疋合徒一年又鬬毆折傷人亦合徒一年此名等者須從一斷若一罪先發已經論決餘罪從發其輕若等勿論重者更論之通計前罪以充後數疏義曰假有甲折乙一齒合徒一年又折丙一指亦合徒一年折齒之罪先發已經配徒一年或無兼丁及家有親老已經決杖一百二十有折指之罪後發即從等者勿論重者更論之通計前罪以充後數者甲若毆丙折二支以上合徒一年半更須加役半年甲若單丁又加杖二十是為重者更論之通計前罪之法即以贜致罪頻犯者並累科疏義曰假有受所監臨一日之中三處受絹一十八疋或三人共出一十八疋同時送者各倍為九疋而斷此名以贓致罪頻犯者並累科若罪法不等者即以重贓併滿輕贓各倍論累謂止累見發之贓倍謂二尺為一尺不等謂以強盜枉法等贓併從竊盜受所監臨之類即監臨主司因事受財而同事共與若一事頻受反于監守頻盜者累而不倍疏義曰罪法不等者為犯強盜枉法不枉法竊盜受所監臨等並是輕重不等即以重贓並滿輕贓假令縣令受財枉法六疋合徒三年不枉法十四疋亦合徒三年又監臨外竊盜二十九疋亦徒三年強盜二疋亦合徒三年受所監臨四十九疋亦合徒三年准此以上五處贓罪各合徒三年累於受所監臨總一百疋仍倍為五十疋合流二千里之類注累謂止累見發之贓倍謂二尺為一尺疏義曰假有官人枉法受甲乙丙丁四人財物各有八疋之贓甲乙二人先發贓有一十六疋累而倍之止依八疋而斷依律科流除名已訖其丙丁二人贓物於後重發即累見發之贓别更科八疋之罪後發者與前既等理從勿論不得累併前贓作一十六疋斷作死罪之類問曰有人枉法受一十五疋七疋先發已斷流訖八疋後發若為科斷答曰枉法之贓若一人邊而取前發者雖已斷訖後發者還須累論併取前贓更科全罪不同頻犯止累見發之贓通計十五疋斷從絞坐無禄之人自依減法又問脱有十人共行資財同在一所盜者一時將去得同頻犯以否答曰律注云監臨主司因事受財而同事共與若一事頻受及於監守内頻盜累而不倍除此三事皆合倍論十人之財一時俱取雖復似非頻犯終是物主各别元非一人之物理與十處盜同坐同頻犯贓合倍折若物付一人専掌失即専掌者陪理同一人之財不得將為頻盜注不等謂以強盜枉法等贓並從竊盜受所監臨之類疏義曰強盜枉法計贓是重竊盜受所監臨准贓乃輕故名不等假如強盜併從竊盜者謂如有人諸處頻犯竊盜已得八十二疋累贓倍論得四十一疋罪合流三千里復於諸處頻犯強盜得財一十八疋累贓倍得九疋亦合流三千里今將強盜九疋併於竊盜四十一疋上滿五十疋處加役流其枉法併從受所監臨者假如官人頻受所監臨財物倍得二十一疋二丈合徒一年半復頻受枉法贓倍得二疋二丈亦合徒一年半今將枉法贓二疋二丈併於受所監臨物二十一疋二丈總為二十四疋科徒二年其有強盜併入受所監枉枉法併從竊盜如此之類俱以重贓併從輕贓者皆同併滿之法注即監臨主司因事受財而同事共與若一事頻受及於監守頻盜者累而不倍疏義曰假有十人同為鑄錢官司於彼受物是為因事受財十人共以錢物行求是為同事共與或斷一人之事頻受其財是為一事頻受若當庫人於所當庫内若縣令於其所部頻盜者此等三事各累而不倍若同事别與或别事同與各依前倍論不同此例其一事分為二罪罪法若等則累論疏義曰一事分為二罪者假將私馬直絹五疋博取官馬直絹十疋依律貿易官物計其等准盜論計所利以盜論須分官馬十疋出兩種罪名五疋等者准盜論合徒一年五疋利者以盜論亦合徒一年累為十疋處徒一年半是也此為庶人有兼丁作法若是官人品子應贖及單丁之人用法各别假有品官貿易官物五疋是利即合免官其八品九品止有一官者免官訖仍徴銅十斤若六品以下監臨官司便同自盜若將以盜五疋累於准盜五疋上從准盜作法合徒一年半累併既不加重止從一重論直取以盜五疋加凡盜二等處徒二年仍除名其品子應贖者直取五疋徒一年真役為重罪法不等者則以重法併滿輕法罪法等者謂若貿易官物計其等准盜論計所利以盜論之類罪法不等者謂若請官器仗以亡失併從役傷以考校不實併從失不實之類疏義曰假有官司非法擅賦斂於一家得絹五十疋四十五疋入官坐賦論合徒二年半五疋入私以枉法論亦合徒二年半即以入私五疋累於入官者為五十疋坐贓致罪處徒三年注罪法等者謂若貿易官物計其等准盜論計所利以盜論之類疏義曰貿易官物已從上解或有判事枉法後受絹十疋五疋先許是真枉法五疋先未許得枉法後然始總送更有如此等事並合累論故云之類注罪法不等者謂若請官器仗以亡失併從毁傷疏義曰謂軍防之所請官器仗假有一千事亡失二百事合杖八十毁傷四百事亦合杖八十故雜律云請官器仗以十分論亡失二分毁傷四分各杖八十亡失三分毁傷六分各杖一百今以亡失二百事累於毁傷四百事同毁傷六分之罪合杖一百注以考校不實併從失不實之類疏義曰職制律貢舉非其人一人徒一年二人加一等罪止徒三年若考校不實減一等失者各減三等假有考校九人二人故不實合科杖一百七人失不實亦合科杖一百須以故不實二人併從失不實七人之上為九人失不實合徒一年又户婚律脱口以免課役一口徒一年二口加一等罪止徒三年其漏無課役口四口為一口假令脱有課役二口合徒一年漏無課役十口亦合徒一年須以有課役二口併於無課役十口之上為無課役十二口處徒一年半之類累併不加重者止從重疏義曰假有以私物五疋貿易官物直九疋五疋准盜合徒一年計所利四疋合杖九十罪法等者則累論以四疋累於五疋上總為九疋不加一年徒坐止從准盜處徒一年併者如前器仗亡失一分毁傷二分俱合杖六十以亡失一分併毁傷二分之上止是三分未滿四分不合加罪止從亡失一分之類其應除免倍沒備償罪止者各盡本法疏義曰假有八品官枉法受財五疋徒二年半不枉法受財十二疋亦徒二年半竊盜二十四疋亦徒二年半監臨受財三十九疋亦徒二年半又詐欺取財二十四疋亦徒二年半又坐贓四十九疋亦徒二年半倍得七十六疋二丈又請矟十張亡失一張合杖六十其贓總累為坐贓五十疋合徒三年餘贓罪止不加據枉法合除名不枉法合免官盜者倍備枉法不枉法受所監臨及坐贓等並沒官亡失官矟備償坐贓罪止徒三年之類如有二罪以上俱發者即先以重罪官當仍依例除免不得將為二罪唯從重論同居相為𨼆問答一諸同居若大功以上親及外祖父母外孫若孫之婦夫之兄弟及兄弟妻有罪相為𨼆疏義曰問居謂同財共居不限籍之同異雖無服者並是若大功以上親各依本服外祖父母外孫若孫之婦夫之兄弟及兄弟妻服雖輕論情重故有罪者並相為𨼆反報俱𨼆此等外祖不及曽髙外孫不及曽𤣥也部曲奴婢為主𨼆皆勿論疏義曰部曲奴婢主不為𨼆聽為主𨼆非謀叛以上並不坐即滿露其事及擿語消息亦不坐疏義曰假有鑄錢及盜之類事須掩攝追收遂漏露其事及擿語消息謂報罪人所掩攝之事令得𨼆避逃亡為通相𨼆故亦不坐其小功以下減凡人三等疏義曰小功緦麻假有死罪𨼆藏據凡人唯減一等小功緦麻又減凡人三等總減四等猶徒二年若犯謀叛以上者不用此律疏義曰謂謀反謀大逆謀叛此等三事並不得相𨼆故不用相𨼆之律各從本條科斷問曰小功以下相𨼆減凡人三等若有漏露其事及擿語消息亦得減罪以否答曰漏露其事及擿語消息上文大功以上共相容𨼆義同其於小功以下理亦不别律恐煩文故舉相𨼆為例亦減凡人三等官户部曲諸官户部曲稱部曲者部曲妻及客女亦同官私奴婢有犯本條無正文者各准良人疏義曰官户𨽻屬司農州縣元無户貫部曲謂私家所有其妻通娶良人客女婢婢為之部曲之女亦是犯罪皆與官户部曲同官私奴婢有犯本條有正文者謂犯主及毆良人之類各從正條其本條無正文謂䦨入越度及本色相犯并詛詈祖父母父母兄姊之類各准良人之法若犯流徒者加杖免居作疏義曰犯徒者准無兼丁例加杖徒一年加杖一百二十一等加二十徒三年加杖二百准犯三流亦止杖二百決訖付官主不作作應徴正贓及贖無財者准銅二斤各加杖十決訖付官主疏義曰犯罪應徴正贓及贖無財可備者皆據其本犯及正贓准銅每二斤各加杖十決訖付官主銅數雖多不得過二百令直言正贓不言倍贓無正贓無財猶許加杖放免倍贓無財理然不坐其有財堪備者自依常律若老小及廢疾不合加杖無財者放免疏義曰謂以上應徴贖之人若年七十以上十五以下及廢疾依律不合加杖勘檢復無財者並放免不徴其部曲奴婢應徴贓贖者皆徴部曲及奴婢不合徴主即同主奴婢自相殺主求免者聽減死一等親屬自相殺者依常律疏義曰奴婢賤人律比畜産相殺雖合償死主求免者聽減若部曲故殺同主賤人亦至死罪主求免死亦得同減法但奴殺奴是重主求免者尚聽部曲殺奴既輕主求免者亦得免既稱同主即是私家若是官奴自犯不依此律注親屬自相殺者依常律疏義曰律云各准良人悉准良人為法既犯親屬不依求免減例化外人相犯諸化外人同類自相犯者各依本俗法異類相犯者以法律論疏義曰化外人謂蕃夷之國别立君長者各有風俗法制不同其有同類自相犯者須問本國之制依其俗法斷之異類相犯者若髙麗之與百濟相犯之類皆以國家法律論定刑名本條别有制諸本條别有制與例不同者依本條疏義曰例云共犯罪以造意為首隨從者減一等鬬訟律同謀共毆傷人各以下手重者為重罪元謀減一等從者又減一等又例云九品以上犯流以下聽贖又斷獄律品官任流外及雜任於本司及監臨犯杖罪以下依決罰例如此之類並是與例不同各依本條科斷即當條雖有罪名所為重者自從重疏義曰依詐偽律詐自復除徒二年若丁多以免課役即從户婚律脱口法一口徒一年二口加一等罪止徒三年又詐偽律詐増減功過年限因而得官者徒一年年若因詐得賜贓重即從詐欺官私以取財物准盜論罪止流三千里之類其本應重而犯時不知者依凡論本應輕者聽從本疏義曰假有叔姪别處生長素不相識姪打叔傷官司推問始知聽依凡人問法又如别處行盜盜得大祀神御之物如此之類並是犯時不知得依凡論悉同常盜斷其本應輕者或有父不識子主不識奴毆打之後方始知悉須依打子及奴本法不可以凡鬬而論是名本應輕者聽從本斷罪無正條諸斷罪而無正條其應出罪者則舉重以明輕疏義曰斷罪無正條者一部律内犯無罪名其應出罪者依賊盜律夜無故入人家主人登時殺者勿論假有折傷灼然不坐又條盜緦麻以上財物節級減凡盜之罪若犯詐欺及坐贓之類在律雖無減文盜罪尚得減科餘犯明從減法此並舉重明輕之類其應入罪者則舉輕以明重疏義曰案賊盜律謀殺期親尊長皆斬無已殺已傷之文如有殺傷者舉始謀是輕尚得死罪殺及謀而已傷是重明從皆斬之坐又例云毆告大功尊長小功尊屬不得以䕃論若有毆告期親尊長舉大功是輕期親是重亦不得用䕃是舉輕明重之類乗輿車駕諸稱乗輿車駕及御者太皇太后皇太后皇后並同疏義曰乗輿者案賊盜律盜乗輿服御物者流二千五百里若盜太皇太后皇太后皇后服御服者得罪並同車駕者依衛禁律車駕行衝隊者徒一年若衝三后隊亦徒一年又條䦨入至御在所斬至三后所亦斬是名並同稱制𠡠者太皇太后皇太后皇太子子令減一等疏義曰依公式令三后及皇太子行令職制律制書有所施行而違者徒二年若違三后及皇太子令各減一等之類若於東宫犯失及宫衛有違應坐者亦同減例本應十惡者雖得減罪仍從本法疏義曰於東宫犯者謂指斥東宫及對捍皇太子令使車馬之屬不調習駕馭之具不完牢并䦨入東宫宫殿門宫臣宿衛冐名相代兵仗逺身輙離職掌别處宿之類謂之為犯失者謂合和皇太子藥誤不如本方及封題誤并守衛不覺䦨入東宫宫殿門如此之類謂之為失犯之與失得罪並減上臺一等科斷注本應十惡者雖得減罪仍從本法疏義曰謂於東宫犯失准上臺法罪當十惡者今雖減科仍從十惡本法稱期親祖父母諸稱期親及稱祖父母者曽髙同疏義曰稱期親者户婚律居期親喪而嫁娶者杖一百即居曽髙喪並與期同及稱祖父母者户婚律云祖父母父母在别籍異財徒三年即曽髙在别籍異財罪亦同故云稱期親及稱祖父母者曽髙同稱孫者曽𤣥同疏義曰鬬訟律子孫違犯教令徒二年即曽𤣥違犯教令亦徒二年是為稱孫者曽𤣥同嫡孫承祖與父母同縁坐者各從祖孫本法疏義曰依禮及令無嫡子立嫡孫即是嫡孫承祖若聞此祖喪匿不舉哀流二千里故云與父母同注縁坐者各從祖孫本法疏義曰依賊盜律反逆者父子年十六以上皆絞祖孫没官若嫡孫承祖没而不死故云各從祖孫本法其嫡繼慈母若養者與親同疏義曰嫡謂嫡母左傳注云元妃始嫡夫人庶子於之稱嫡繼母者謂嫡母或亡或出父再娶者為繼母慈母者依禮妾之無子者妾子之無母者父命為母子是名慈母非父命者依禮服小功不同親母若養者謂無兒養同宗之子者慈母以上但論母若養者即并通父故加若字以别之並與親同稱子者男女同縁坐者女不同疏義曰稱子者鬬訟律子孫違犯教令徒二年此是男女同縁坐者謂殺一家三人之類縁坐及妻子者女並得免故云女不同其犯反逆造畜蠱毒本條縁坐及女者從本法稱袒免以上親者各依本服論不以尊厭及出降義服同正服疏義曰皇帝䕃及祖免以上親户婚律嘗為祖免親之妻而嫁娶者杖一百假令皇家絶服旁期及婦人出嫁若男子外繼皆降本服一等若有犯及取䕃各依本服不得以尊壓及出降即依輕服之法義服者妻妾為夫之長子及婦為舅姑之類相犯者並與正服同稱反坐罪之諸稱反坐及罪之坐之與同罪者止坐其罪死者止絞而已疏義曰稱反坐者鬬訟律云誣告人者各反坐及罪之者依例云自首不實不盡以不實不盡之罪罪之坐之者依例餘贓應坐悔過還主減罪三等坐之與同罪者詐偽律譯人詐偽致罪有出入者與同罪止坐其罪者謂從反坐以下並止坐其罪不同真犯故死者止絞而已稱准枉法論准盜論之類罪止流三千里但准其罪疏義曰稱准枉法論者職制律云先不許財事過之後而受財者事若枉準枉法論又條監臨内強市有剰利准枉法論又稱准盜論之類者詐偽律云詐欺官私以取財物准盜論雜律云棄毁符節印及門鑰者准盜論如此等罪名是准枉法准盜論之類並罪止流三千里但准其罪者皆止准其罪亦不同真犯並並在除免倍贓監主加罪加役流之例疏義曰謂從反坐以下並不在除名免官免所居官亦無倍贓又不在監主加罪及加役流之例其本法雖不合減亦同雜犯之法減科稱以枉法論及以盜論之類皆與真犯同疏義曰以枉法論者户婚律云里正及官司妄脱漏増減以出入課役贓重入已者以枉法論又條非法擅賦斂入私者以枉法論稱以盜論之類者賊盜律云貿易官物計所利以盜論廐庫律云監臨主守以官物私自貸若貸人及貸之者無文記以盜論所犯並與真枉法真盜同其除免倍贓悉依正犯其以故殺傷以鬬殺傷及以姦論等亦與真犯同故云之類統攝案驗為監臨問答一諸稱監臨者統攝案驗為監臨謂州縣鎮戍折衝府等判官以上各於所部之内總為監臨自餘唯據臨統本司及有所案騐者即臨統其身而不管家口者姦及取財亦同監臨之例疏義曰統攝者謂内外諸司長官統攝所部者案驗謂諸司判官判斷其事者是也注謂州縣鎮戍折衝府等判官以上各於所部之内總為監臨疏義曰此謂州縣鎮戍折衝府等判官以上雖有曹務職掌不同但於部内總為監臨之例鎮戍折衝府唯統攝身不管家口議於部内寄住及權居止興販等有文簿名歴在州縣者亦為監臨其百姓雖不附籍帳亦同監臨之例注自餘唯據臨統本司及有所案驗者即臨統其身而不管家口者姦及取財亦同監臨之例疏義曰自餘為除州縣鎮戍折衝府以外百司總是若省臺寺監及諸衝等各于臨統本司之内名挂本司者並為監臨若是來參事者是為案驗尚書省雖管州府文案若無闗涉不得常為監臨内外諸司皆準此即臨統其身而不管家口者姦及取財亦同監臨之例假若諸衛管府吏身官司姦府吏家口及于府吏家内取財或折衝官人人唯管衝士若姦衛士家口及於衛士家内取財皆同監臨之法内外不管家口之司姦及取財皆準此問曰假有主帥於所部衛士家盜物得同於監臨内取財以否答曰主帥於所部衛士統攝一身既非取受之財盜乃律文不攝止同常盜不是監臨稱主守者躬親保典為主守雖職非統典臨時監主亦是疏義曰主守謂行案典吏専主掌其事及守當倉庫獄因雜物之類其職非統典者謂非管攝之司臨時被遣監主者亦是稱日者以百刻諸稱日者以百刻計功庸者從朝至暮役庸多者雖不滿日皆併時率之疏義曰職制律官人無故不上一日笞二十須通晝夜百刻為坐計功庸者職制律監臨之官私役使所監臨者各計庸以受所監臨財物論從朝至暮即是一日不須準百刻計之注役庸多者雖不滿日皆併時率之疏義曰計庸多者假若役二人從朝至午為一日功或從六人經一辰亦為一日功縱使一時役多人或役一人經多皆須併時率之稱年者以三百六十日疏義曰在律稱年多據徒役此既計日不以十二月稱年稱人年者以籍為定疏義曰稱人年處即須依籍為定假使貌髙年小或貌小年髙悉依籍書不合準貌籍既三年一造非造籍之嵗通舊籍計之問曰依户令疑有姦欺隨狀貌定若犯罪者年貌懸異依依令貌定科罪以否答曰令以課役生文律以定刑立制恤刑是恤貌即姦生課役稍輕故得臨時貌定刑名事重上可依據籍書律令義殊不可破律從令或有狀貌成人而作死罪籍年七嵗不得即科或籍年六十以上而犯死刑驗其形貌不過七嵗如此事類貌狀共籍年懸隔者犯流罪以上及除免官當者申尚書省量定須奏者臨時奏問稱衆者三人以上稱謀者二人以上謀狀彰明雖一人同二人之法疏義曰稱衆者斷獄律云七品以上犯罪不拷皆據衆證定刑必須三人以上始成衆但稱衆者皆准此文稱謀者賊盜律云謀殺人者徒三年皆須二人以上餘條稱謀者各準此例注謀狀彰明雖一人同二人之法疏義曰假有人持刀仗入他家勘有仇嫌來欲相殺雖止一人亦同謀法故云雖一人同二人之法稱加就重諸稱加者就重次稱減者就輕次疏義曰假有人犯杖一百合加一等處徒一年或應徒一年合加一等處徒一年半之類是名就重次又有犯徒一年應減一等處杖一百或犯杖一百應減一等决杖九十是名就輕次唯二死三流各同為一減疏義曰假有犯罪合斬從者減一等即至流三千里或有犯流三千里合例減一等即處徒三年故云二死三流各同為一減其加役流應減者亦同三流之法加者數滿乃坐又不得加至於死本條加入死者依本條加入絞者不加至斬疏義曰加者數滿乃坐假令犯盜少一寸不滿十疋依賊盜律竊盜五疋徒一年五疋加一等為少一寸止徒一年又不得加至于死者依捕亡律宿衛人在直而亡者一日杖一百二日加一等雖無罪止之文唯合加至流三千里不得加至于死本條加入死者依本條鬬訟律毆人折二支流三千里又條云部曲毆傷良人者加凡人一等加者加入於死此是本條注加入絞者不加至斬疏義曰部曲毆良人折二支已合絞坐若故毆折又合加一等今既加入于絞不合更加至斬其罪止有半年徒若應加杖者杖一百應減者以杖九十為次疏義曰假有縣典故増囚狀加徒半年縣尉知而判入即以典為首合徒半年典若單丁决杖一百縣尉應減一等處杖九十徴銅九斤之類稱道士女冠諸稱道士女冠者僧尼同疏義曰依雜律云道士女冠姦者加凡人二等但餘條唯稱道士女冠者即僧尼並同諸道士女冠時犯姦還俗後事發亦依犯時加罪仍同白丁配徒不得以告牒當之若於其師與伯父叔母同疏義曰師謂于觀寺之中親承經教合為師主者若有所犯同伯叔父母之罪依鬬訟律詈伯叔父母者徒一年若詈師主亦徒一年餘條犯師主悉同伯叔父母其於弟子與兄弟之子同疏義曰謂上文所解師主于其弟子有犯同俗人兄弟之子法依鬭訟律毆殺兄弟之子徒三年賊盜律云有所規求而故殺期以下卑幼者絞兄弟之子是期親卑幼若師主因嗔競毆殺弟子徒三年如有規求故殺者合當絞坐觀寺部曲奴婢於三綱與主之期親同疏義曰觀有上座觀主監齋寺有上座寺主都維那是為三綱其觀寺部曲奴婢於三綱有犯與俗人期親部曲奴婢同依鬬訟律主毆殺部曲徒一年又條奴婢有犯其主不請官司而殺者杖一百注云期親殺者與主同下條部曲準此又條部曲奴婢毆主之期親者絞詈者徒二年若三綱毆殺觀寺部曲合徒一年奴婢有罪不請官司而殺者杖一百其部曲奴婢毆三綱者絞詈者徒二年餘道士與主之緦麻同犯姦盜者同凡人疏義曰鬬訟律部曲奴婢毆主之緦麻親徒一年傷重者各加凡人一等又條毆緦麻部曲奴婢折傷以上各減殺傷凡人部曲奴婢二等又條毆傷殺他人部曲減凡人一等奴婢又減一等即是觀寺部曲毆當觀寺餘道士女冠僧尼等各合徒一年傷重各加凡人一等若毆道士等折一齒即徒二年奴婢毆又加一等徒二年半是名於餘道士與主之緦麻同注犯姦盜者同凡人疏義曰道士女冠僧尼犯姦盜於法最重故雖犯當觀寺部曲奴婢姦盜即同凡人謂三綱以下犯姦盜得罪無别其奴婢姦盜一准凡人得罪弟子若盜師主物及師主盜弟子物等亦同凡盜之法其有同財弟子私取用者即同同居卑幼私輙用財者十疋笞十十疋加一等罪止杖一百若不滿十疋者不坐唐律疏義卷六欽定四庫全書唐律疏義卷七唐長孫無忌等撰衛禁上
