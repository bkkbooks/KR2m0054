front:
  text: 故唐律䟽議卷第二十四凢一十六條折鬬訟諸告期親尊長外祖父母夫夫之祖父母雖得實徒二年其告事重者減所告罪一等不合論折所告雖反坐折告之者即誣告重者加所誣罪三等告大功尊長各減一等小功緦麻減二等誣告重者各加所誣罪一等
  hash: sha256:4b5ef89203999b8e713662c24ef5039b79ebe1b3b972791021f474cb97250e1e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_024-1a}
body:
  text: 䟽議曰告期親尊長外祖父母夫夫之祖父母依名例律並相容隱被告之者與自首同告者各徒二年告事重於徒二年者減所告罪一等假有告期親尊長盜上絹二十五疋合徒三年尊長同首法免罪卑㓜減所告罪一等合徒二年半之類注云所犯雖不合論謂期親以下或年八十以上十歲以下若篤疾犯罪雖不合論而卑㓜告之依法猶坐即誣告期親尊長得罪重於二年徒者加所誣罪三等假有誣告期親尊長一年半徒罪加所誣罪三等合徒三年此亦是計加得重於本罪即須加告大功尊長各減一等謂告得實徒一年半重於徒一年半者即減期親罪一等假有告大功尊長三年徒減期親一等處徒二年半告小功緦麻尊長雖得實同減期親二等合徒一年告事重者亦減期親尊長二等假有告三年徒雖實徒一年半之類誣告重者謂誣告大功小功緦麻重者各加所誣罪一等假有誣告大功尊長一年半徒加所誣罪一等合徒二年誣告小功緦麻尊長徒一年罪亦加所誣罪一等徒一年半之類即非相容隱被告者論如律若告謀反逆叛者各不坐其相侵犯自理訴者聽準此折下條䟽議曰小功緦麻非相容隱被告之者不得同於首原各依律科斷故云被告者論如律若告謀反逆叛者謂期親尊長以下犯謀反逆叛三事以其不臣故雖論告不科其罪其相侵犯謂期親以下緦麻以上或侵奪財物或毆打其身之類得自理訴非緣侵犯不得别告餘事注云下條準此謂下條告緦麻以上卑㓜雖有罪名相侵犯亦得自理問曰告期親尊長竊盜三十疋依撿二十五疋實五疋虚合得何罪荅曰律云一事分為二罪罪法若等則累論罪法不等即以重法併滿輕法按尋此狀正當累併之條將重併輕緫為三十疋減所告罪一等便合處徒三年諸告緦麻小功卑㓜雖得實杖八十大功以上逓減一等誣告重者期親減所誣罪二等大功減一等小功以下以凢人論䟽議曰稱緦麻小功即外姻有服者亦是其相隱既得減罪有過不合告言故雖得實合杖八十告大功卑㓜減小功一等期親卑㓜又減一等誣告重者謂誣告期親重於杖六十者減所誣罪二等猶如誣告弟姪九十杖罪合減所誣二等合杖七十若告大功以上減一等合杖八十若告小功以下以凢人論仍得杖九十問曰女君於妾依禮無服其有誣告得減罪以否荅曰律云毆傷妻者減凢人二等死者以凢人論若妻毆傷殺妾與夫毆傷殺妻同又條誣告期親卑㓜減所誣罪二等其妻雖非卑㓜義與期親卑㓜同夫若誣告妻須減所誣罪二等妻誣告妾亦與夫誣告妻同即誣告子孫外孫子孫之婦妾及己之妾者各勿論䟽議曰誣告子孫外孫子孫之婦妾者曾玄婦妾亦同及己之妾者各勿論其有告得實者亦不坐被告得相容隱者俱同自首之法諸子孫違犯敎令及供養有闕者徒二年從而折謂可父母父母告乃坐折違堪供而闕者須祖䟽議曰祖父母父母有所敎令於事合冝即須奉以周旋子孫不得違犯及供養有闕者禮云七十二膳八十常珍之類家道堪供而故有闕者合徒二年故注云謂可從而違堪供而闕設若敎令違法行即有愆家實貧窶無由取給如此之類不合有罪皆須祖父母父母告者乃坐諸部曲奴婢告主非謀反逆叛者皆絞同首法折被告者告主之期親及外祖父母者流大功以下親徒一年誣告重者緦麻加凡人一等小功大功逓加一等即奴婢訴良妄稱主壓者徒三年部曲減一等䟽議曰日月所照莫匪王臣奴婢部曲雖属於主其主若犯謀反逆叛即是不臣之人故許論告非此三事而告之者皆絞罪無首從注云被告者同首法謂其主雜犯死罪以下部曲奴婢告之俱同為首之法奴婢獲罪主得免科奴婢為主隱雖告準名例律相容隱告言自合同首今律文重言同首法者以相隱條無相隱字故告主之期親及外祖父母者流不言里數者為同加杖二百大功以下親徒一年稱大功以下小功緦麻亦同此等並謂告得實誣告重者謂所誣之罪重於徒一年緦麻加凡人一等若誣告主緦麻親徒一年加一等合徒一年半小功徒二年大功徒二年半之類大功以下諸親犯有輕重應計等級加者但重於徒一年皆準此加法即奴婢訴良妄稱主壓者謂奴婢本無良狀而妄訴良云主壓充賤者合徒三年不同誣告主者開其自理之路部曲減一等其主誣告部曲奴婢者即同誣告子孫之例其主不在坐限諸誣告本属府主刺史縣令者加所誣罪二等䟽議曰誣告本属府主等加所誣罪二等者謂誣告一年徒罪合徒二年之類若告除名免官免所居官等事虚亦準比徒法加罪其有緦麻以上親任本属府主刺史縣令者自依告親法若告尊長各從重論諸投匿名書告人罪者流二千里及假人姓名折謂絶匿姓名置懸之俱是折以避己作者棄䟽議曰有人隱匿己名或假人姓字潜投犯狀以告人罪無問輕重投告者即得流坐故注云謂絶匿姓名及假人姓名以避己作者棄置懸之俱是謂或棄之於街衢或置之於衙府或懸之於旌表之類皆為投匿之坐假人姓名經官司判入言告人罪從違令科非是投匿所以科違令投匿告祖父母科絞告期親卑㓜減凡人二等大功減一等小功以下以凢人論匿名書告他人部曲奴依凡人法是大功相犯不合減一等二等他皆倣此告緦麻以上親部曲奴即依減法得書者皆即焚之若將送官司者徒一年官司受而為理者加二等被告者不坐輙上聞者徒三年䟽議曰匿名之書不合檢校得者即須焚之以絶欺詭之路得書不焚以送官府者合徒一年官司既不合理受而為理者加二等處徒二年被告者假令事實亦不合坐若是書不原事以後别有人論告還合得罪輙上聞者合徒三年若得告反逆之書事或不測理須聞奏不合燒除問曰投匿名書告人謀反大逆或虚或實捉獲所投之人未知若為科罪荅曰隱匿姓字投書告罪投書者既合流坐送官者法處徒刑用塞誣告之源以杜姦欺之路但反逆之徒釁深夷族知而不告即合死刑得書不可焚之故許送官聞奏狀旣是實便須上請聽裁告若是虚理依誣告之法諸被囚禁不得告舉他事其為獄官酷巳者聽之䟽議曰人有犯罪身在囚禁唯為獄官酷巳者得告自餘他罪並不得告發即流囚在道徒囚在役身嬰枷鎻或有援人亦同被囚禁之色不得告舉他事又準獄官令囚告密者禁身領送即明知謀叛以上聽告餘凖律不得告舉即年八十以上十歲以下及篤疾者聽告謀反逆叛子孫不孝及同居之内為人侵犯者餘並不得告官司受而為理者各減所理罪三等䟽議曰老小及篤疾之軰犯法既得勿論唯知謀反大逆謀叛子孫不孝及闕供養及同居之内為人侵犯如此等事並聽告舉自餘他事不得告言如有告發不合為受官司受而為理者從被囚禁以下減所推罪三等假有告人徒一年官司受而為理合杖八十之類問曰有人被囚禁更首别事其事與餘人連坐官司合受以否荅曰斷獄律云被囚禁不得告舉他事此既首論身事非闗别告他人縱連傍人官司亦合為受被首之者仍依法推科諸犯罪欲自陳首者皆經所在官司申牒軍府之官不得輙受其謀叛以上及盜者聽受即送隨近官司若受經一日不送及越覽餘事者各減本罪三等其謀叛以上有須掩捕者仍依正條承告之法䟽議曰犯罪未發皆許自新其有犯罪欲自陳首者皆經所在官司申牒但非軍府此外曹局並是所在官司軍府之官謂諸衛以下折衝府以上並是領兵曹司不許輙受首事其謀叛以上事是重害及盜賊之輩並即須追掩故聽於軍府陳首軍府受得即送隨近官司其受首謀反逆叛者若有支黨必須追掩不得過半日及首盜者受經一日不送隨近州縣及越覽餘事者減本罪三等假有告人脱戸合徒三年軍府受而為推者合徒一年半之類其謀反逆叛為有支黨事須掩捕仍依前條承告之法謂若滿半日不掩還同知而不告之罪謂謀反大逆不告合死謀大逆謀叛不告者流諸以赦前事相告言者以其罪罪之官司受而為理者以故入人罪論至死者各加役流䟽議曰以赦前事相告言者謂事應㑹赦始是赦前之事不合告言若常赦所不免仍得依舊言告假有㑹赦監主自盜得免有人輙告以其所告之罪罪之謂告徒一年贓罪者監主自盜即合除名告者還依比徒之法科罪官司違法受而為理者以故入人罪論謂若告赦前死罪前人雖復未决告者免死處加役流官司受而為理至死者亦得此罪故稱各加役流若官司以赦前合免之事彈舉者亦同受而為理之坐若事須追究者不用此律限外蔽匿應改正徴折追究謂婚姻良賤赦贓之類折收及追見䟽議曰事須追究者備在注文不用此律者謂不用入罪之律注云追䆒謂婚姻良賤赦限外蔽匿謂違律為婚養奴為子之類雖㑹赦須離之正之赦限外蔽匿謂㑹赦應首及改正徵収過限不首若經責簿帳不首不改正徵収及應徵見贓謂盗詐之贓雖赦前未發赦後捉獲正贓者是謂見贓之類合為追徵問曰準誣告條至死而前人未决聽減一等流罪以下前人未加拷掠而告人引虚得減一等又準官司入人罪若未决放聽減一等有誣告赦前死罪官司受而為推得依此條減罪以否荅曰依律以赦前事相告言者以其罪罪之官司為理者以故入人罪論此是赦前之罪並不許言告論實尚無減例誣告豈得減之不至死者俱無減法至死者處加役流諸告人罪皆須明注年月指陳實事不得稱疑違者笞五十官司受而為理者減所告罪一等即被殺被盜及水火損敗者亦不得稱疑雖虚皆不反坐其軍府之官不得輙受告事辭牒若告謀叛以上及盜者依上條䟽議曰告人罪皆注前人犯罪年月指陳所犯實狀不得稱疑違者笞五十但違一事即笞五十謂牒未入司即得此罪官司若受疑辭為推並凖所告之狀減罪一等即以受辭者為首若告死罪流三千里告流處徒三年之類即被殺被盗為害特甚或被人决水縱火漂焚財物盗即不限强竊漂焚不問多少告者皆須明注日月不合称疑推問雖虚皆不反坐若称疑者官司亦不合受理即雖受理官司亦得免科其軍府之官亦謂諸衞及折衝府等不得輙受告事辭牒告謀叛以上及盗者依上條為受即送官司之法諸為人作辭牒加増其狀不如所告者笞五十若加增罪重減誣告一等䟽議曰為人雇倩作辭牒加增告狀者笞五十若加増其狀得罪重於笞五十者減誣告罪一等假有前人合徒一年為人作辭牒增狀至徒一年半便是剰誣半年減誣告一等合杖九十之類若因雇倩受財得贓重者同非監臨主司因事受財坐贓之罪如贓重從贓科贓輕者從減誣告一等法即受雇誣告人罪者與自誣告同贓重者坐贓論加二等雇者從敎令法若告得實坐贓論雇者不坐䟽議曰上文為人作辭牒雖復得物不雇誣告因有加增得減誣告一等此文即受雇誣告人罪者謂彼此同謀本共誣搆情規䧟害故與自誣告罪同贓重者坐贓論加二等假有得絹十疋受雇誣告人一年半徒坐贓論十疋合徒一年加二等即徒二年之類雇者從敎令法依下條敎令為從減受雇者一等仍得一年徒若告得實坐贓論謂受絹十疋告得實事合徒一年之類雇者不坐以其得實故得無罪諸敎令人告事虛應反坐得實應賞者皆以告者為首敎令為從䟽議曰敎令人告事虚應反坐謂誣告人者各反坐得實應賞謂告齎禁物度関及慱戯盗賊之類令有賞文或告反逆臨時有加賞者皆以告者為首敎令者為從問曰律云得實應賞皆以告者為首敎令為從未知告得賞物若為作首從分財荅曰應賞在令有文分賞元無等級旣為首從之法須準律條論之又不可徒杖别作節文約從杖一百之例假如敎人告杖一百罪虚即告者為首合杖一百教令為從合杖九十即從者十分減一應賞義亦準此假有輕重不同並準十分為例即敎令人告緦麻以上親及部曲奴婢告主者各減告者罪一等被敎者論如律若敎人告子孫者各減所告罪一等亦同折雖誣䟽議曰其有敎令人自告緦麻以上親或敎人部曲奴婢告主者告實及誣各減告者罪一等其告緦麻以上親即尊者坐重卑者坐輕部曲奴婢告主皆絞故云各減告者罪一等被敎者論如律謂被敎告緦麻以上親及告主各得本罪若敎人告子孫者告子孫本旣無罪各減所告罪一等雖是死罪亦減死處流注云雖誣亦同謂雖敎誣告亦減罪一等既上條祖父母父母誣告子孫外孫之婦妾及己之妾各勿論此條但云敎人告子孫各減所告罪一等旣外孫以下亦準敎令告子孫法減所告罪一等敎人部曲奴婢告主期親以下雖無别理亦合有罪敎告主期親及外祖父母者科不應為重敎告主大功以下緦麻以上科不應為輕雖無正文比例為允諸邀車駕及撾登聞皷若上表以身事自理訴而不實者杖八十詐妄者從上書詐不實論折即故增減情狀有所隱避䟽議曰車駕行幸在路邀駕申訴及於衞闕之下撾皷以求上聞及上表披陳身事此三等如有不實者各合杖八十注云即故增減情狀有所隱避者從上書詐不以實論謂上文以理訴不實得杖八十若其不實之中有故增減情狀有所隱避詐妄者即從上書詐不實論處徒二年自毁傷者杖一百雖得實而自毁傷者笞五十即親屬相為訴者與自訴同䟽議曰邀車駕以下訴人所訴非實輙自毁傷者皆杖一百若所訴雖是實而自毁傷者笞五十即親屬相為訴者親屬謂緦麻以上及大功以上婚姻之家為訴者與自訴同自邀車駕以下虛實得罪各與自訴罪同諸越訴及受者各笞四十若應合為受推抑而不受者笞五十三條加一等十條杖九十䟽議曰凡諸辭訴皆從下始從下至上令有明文謂應經縣而越向州府省之類其越訴及官司受者各笞四十若有司不受即訴者亦無罪若應合為受謂非越訴依令聽理者即為受推抑而不受者笞五十三條加一等謂不受四條杖六十十條罪止杖九十若越過州訴受詞官人判付縣勘當者不坐請狀上訴不給狀科違令笞五十即邀車駕及撾登聞皷若上表訴而主司不即受者加罪一等其邀車駕訴而入部伍内杖六十駕儀仗中者折部伍謂入導䟽議曰有人邀車駕及撾登聞皷若上表申訴者主司即須為受不即受者加罪一等謂不受一條杖六十四條杖七十十條杖一百其邀車駕訴人輙入部伍内者杖六十注云部伍謂入導駕儀仗中者依鹵簿令駕行導駕者萬年縣令引次京兆尹緫有六引注云駕從餘州縣出者所在刺史縣令導駕並準此儀仗依本品若訴人入此儀仗中者杖六十問曰有人於殿庭訴事或實或虚合科何罪荅曰依令尚書省訴不得理者聽上表受表恒有中書舍人給事中御史三司監受若不於此三司上表而因公事得入殿庭而訴是名越訴不以實者依上條杖八十得實者不坐諸强盜及殺人賊發被害之家及同伍即告其主司若家人同伍單弱比伍為告當告而不告一日杖六十主司不即言上一日杖八十三日杖一百官司不即檢校捕逐及有所推避者一日徒一年竊盜各減二等䟽議曰强盜及以殺人賊發被害之家及同伍共相保伍者須告報主司者謂坊正村正里正以上若家人同伍單弱不能告者比伍為告每伍家之外即有比伍亦須速告主司當告而不告謂家有男夫年十六以上不為告者一日杖六十主司不即言於所在官司一日杖八十三日杖一百須計去官司逺近準行程外為罪官司不即檢校謂隨近受告官司不即檢校捕逐及與隨近州縣鎮戍府監等相推或假以餘事辭託者一日徒一年若是竊盜從同伍以下各減二等謀殺人已傷及部曲奴婢比竊盜不告科之諸監臨主司知所部有犯法不舉劾者減罪人罪三等紏彈之官減二等䟽議曰監臨謂統攝之官主司謂掌領之事及里正村正坊正以上知所部之人有違犯法令格式之事不舉劾者減罪人罪三等假有人犯徒一年不舉劾者得杖八十之類紏彈之官唯減二等謂職當紏彈者其金吾當檢校之處知有犯法不舉劾者亦同減罪人罪二等即同伍保内在家有犯知而不紏者死罪徒一年流罪杖一百徒罪杖七十其家唯有婦女及男年十五以下者皆勿論䟽議曰即同伍保内謂依令伍家相保之内在家有犯知死罪不紏得徒一年知流罪不紏杖一百知徒罪不紏杖七十犯百杖以下保人不紏無罪其伍保之家唯有婦女及男年十五以下不堪告事雖知不紏亦皆勿論雖是伍保之内所犯不在家中知而不紏不合科罪故唐律䟽議卷第二十四
