front:
  text: 唐律䟽議卷第二凡一十一條折名例諸八議者犯死罪皆條所坐及應議之狀先奏請議議定奏裁刑之律而不正決之折議者原情議罪稱定
  hash: sha256:40d3350f3d563dfb973d3420abebf3295b885c1a03e356dbfebf2aae155e8852
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_002-1a}
body:
  text: 䟽議曰此名議章八議人犯罪者皆條錄所犯應死之坐及録親故賢能功勤賔貴等應議之狀先奏請議依令都堂集議議定奏裁注議者原情議罪稱定刑之律而不正决之䟽議者原情議罪者謂原其本情議其犯罪稱定刑之律而不正决之者謂奏狀之内唯云准犯依律合死不敢正言絞斬故云不正决之流罪以下减一等其犯十惡者不用此律䟽議曰流罪以下犯狀既輕所司减訖自依常斷其犯十惡者死罪不得上請流罪以下不得减罪故云不用此律諸皇太子妃大功以上親䟽議曰此名請章皇后䕃小功以上親入議皇太子妃䕃大功以上親入請者尊卑降殺應議者期以上親及孫䟽議曰八議之人䕃及期以上親及孫入請期親者謂伯叔父母姑兄弟姊妹妻子及兄弟子之類又例云稱期親者曾髙同及孫者謂嫡孫衆孫皆是曾玄亦同其子孫之婦服雖輕而義重亦同期親之例曾玄之婦者非若官爵五品以上犯死罪者上請犯及應請之折請謂條其所名别奏請折狀正其刑䟽議曰官爵五品以上者謂文武職事四品以下散官三品以下勲官及爵二品以下五品以上此等之人犯死罪者並為上請注請謂條其所犯及應請之狀正其刑名别奏請䟽議曰條其所犯者謂條錄請人所犯應死之坐應請之狀者謂皇太子妃大功以上親應議者期以上親及孫若官爵五品以上應請之狀正其刑名者謂錄請人所犯凖律合絞合斬别奏者不縁門下别錄奏請聽敕流罪以下减一等其犯十惡反逆縁坐殺人監守内姦盗略人受財枉法者不用此律䟽議曰流罪以下减一等者减訖各依本法若犯十惡反逆縁坐及殺人者謂故殺鬪殺謀殺等殺訖不問首從其於監守内姦盗略人受財枉法者此等請人死罪不合上請流罪巳下不合减罪故云不用此律其盗不得財及姦略人未得並從减法諸七品以上之官及官爵得請者之祖父母父母兄弟姊妹妻子孫犯流罪巳下各從减一等之例䟽議曰此名减章七品以上謂六品七品文武職事散官衛官勲官等身官爵得請者謂五品以上官爵䕃及祖父母父母兄弟姊妹妻子孫犯流罪以下各得减一等若上章請人得减此章亦得减請人不得减此章亦不得减故云各從减一等之例諸應議請减及九品以上之官若官品得减者之祖父母父母妻子孫犯流罪以下聴贖䟽議曰此名贖章應議請减者謂議請减三章内人亦有無官而入議請减者故不云官也及九品巳上官者謂身有八品九品之官若官品得减者謂七品巳上之官䕃及祖父母父母妻子孫犯流罪以下並聴贖若應以官當者自從官當法䟽議曰議請减以下人身有官者自從官當除免不合留官取䕃收贖其加役流䟽議曰加役流者舊是死刑武徳年中改為断趾國家惟刑是恤恩弘博愛以刑者不可復屬死者務欲生之情輸向隅恩覃祝網以貞觀六年奉制改為加役流反逆縁坐流䟽議曰謂縁坐反逆得流罪者其婦人有官者比徒四年依官當之法亦除名無官者依留住法加杖配役子孫犯過失流䟽議曰謂耳目所不及思慮所不到之類而殺祖父母父母者不孝流䟽議曰不孝流者謂聞父母䘮匿不舉哀流告祖父母父母者絞從者流呪詛祖父母父母者流厭魅求愛媚者流問曰居䘮嫁娶合徒三年或恐喝或强各合加至流罪得入不孝流以否答曰恐喝及强元非不孝加至流坐非是正刑律貴原情據理不合及會赦猶流者䟽議曰案賊盗律云造畜蠱毒雖會赦并同居家口及教令人亦流三千里斷獄律云殺小功尊屬從父兄姊及謀反大逆者身雖會赦猶流二千里此等並是會赦猶流其造畜蠱毒婦人有官無官並依下文配流如法有官者仍除名至配所免居作各不得减贖除名配流如法本罪不應流配而折除名者免居作即品亦免居作折特配者雖無官䟽議曰男夫犯此五流假有一品巳下及取䕃者並不得减贖除名配流如法三流俱役一年稱加役流者役三年家無兼丁者依下條加杖免役故云如法注除名者免居作即本罪不應流配而特配者雖無官品亦免居作䟽議曰犯五流之人有官爵者除名流配免居作即本罪不應流配而特流配者雖無官品亦免居作謂有人本犯徒以下及有䕃之人本法不合流配而責情特流配者雖是無官之人亦免居作其於期以上尊長及外祖父母夫夫之祖父母犯過失殺傷應徒若故毆人至廢疾應流男夫犯盗以上折謂徒及婦人犯姦者亦不得减贖者各從折有官爵贖法折除免當䟽議曰過失殺祖父母父母已入五流若傷即合徒罪故云期以上其期親尊長及外祖父母夫夫之祖父母犯過失殺及傷應合徒者故毆人至廢疾應流謂恃䕃合贖故毆人至廢疾凖犯應流者男夫犯盗徒以上謂計盗罪至徒以上强盗不得財亦同及婦人犯姦者並亦不得减贖言亦者亦如五流不得减贖之義注有官爵者各從除免當贖法䟽議曰謂故毆小功尊屬至廢疾及男夫於監守内犯十惡及盗婦人姦入内亂者並合除名若男夫犯盗斷徒以上及婦人犯姦者並合免官其於期親以上尊長犯過失殺傷應徒及故毆凡人至廢疾應流並合官當犯除名者爵亦除本犯免官免所居官及官當者留爵收贖縱有官爵合减亦不得减故云各從除免當贖法問曰五流不得减贖若會降合减贖以否答曰五流除名配流會降至徒以下有䕃應贖之色更無配役之文即有聴贖者有不聴贖者止如加役流反逆縁坐流不孝流此三流會降並聴收贖其子孫犯過失流雖會降亦不得贖何者又云於期以上尊長犯過失殺傷應徒不得减贖此雖會降猶是過失應徒故不合贖其有官者自凖除免當贖之例本法旣不合例减降後亦不得减科其會赦猶流者會降灼然不免諸婦人有官品及邑號犯罪者各依其品從議請減贖當免之律不得䕃親屬䟽議曰婦人有官品者依令妃及夫人郡縣鄉君等是也邑號者國郡縣鄉等名號是也婦人六品以下無邑號直有官品即媵是也依禮凡婦人從其夫之爵命故云生禮死事以夫為尊卑故犯罪應議請减贖者各依其夫品從議請减贖之法若犯除免官當者亦凖男夫之例故云各從議請减贖當免之律婦人品命既因夫子而授故不得䕃親属若不因夫子别加邑號者同封爵之例䟽議曰别加邑號者犯罪一與男子封爵同除名者爵亦除免官以下並從議請减贖之例留官收贖諸五品以上妾犯非十惡者流罪以下聴以贖論䟽議曰五品以上之官是為通貴妾之犯罪不可配决若犯非十惡流罪以下聴用贖論其贖條内不合贖者亦不在贖限若妾自有子孫及取餘親䕃者假非十惡聴依贖例諸一人兼有議請減各應得減者唯得以一髙者減之不得累減䟽議曰假有一人身是皇后小功親合議減又父有三品之官合請減又身有七品官合例減此雖三處俱合減罪唯得以一議親髙者減之不得累減若從坐減自首減故失減公坐相承減又以議請減之類得累減䟽議曰從坐減者謂共犯罪造意者為首随從者减一等自首减者謂犯法知人欲告而自首者聴减二等故失减者謂判官故出人罪放而還獲减一等通判之官不知情以失論失出减判官之罪五等又斷獄律云斷罪應决配之而聴收贖應收贖而决配之各减故失一等謂故减故一等失减失一等是名故失减公坐相承减者謂同職犯公坐假由判官斷罪失出法减五等放而還獲又减一等通判之官减七等長官减八等主典减九等若有議請减之類各又更减一等是名得累减諸以理去官與見任同應留者亦同折解雖非理告身䟽議曰謂不因犯罪而解者若致仕得替省員廢州縣之類應入議請减贖及䕃親屬者並與見任同注解雖非理告身應留者亦同䟽議曰解雖非理者謂責情乃下考解官者或雖經當免降所不至者亦是告身應留者並同見任官法贈官及視品官與正官同在䕃親之例折視六品以下不䟽議曰贈官者死而加贈也令云養素丘園徵聘不赴子孫得以徵官為䕃並同正官視品官依官品令薩寳府薩寳袄正等皆視流内品若以視品官當罪减贖皆與正官同注視六品以下不在䕃親之例䟽議曰視品稍異正官故不許䕃其親屬其薩寳既視五品聴䕃親屬用䕃者存亡同䟽議曰應取議請减䕃親屬者親雖死亡皆同存日故曰存亡同若藉尊長䕃而犯所䕃尊長䟽議曰尊長謂祖父母父母伯叔父母姑兄姊是也及藉所親䕃而犯所親祖父母父母者並不得為䕃䟽議曰所親謂旁親非祖父母父母及子孫但旁䕃已身者尊長卑㓜皆是假如藉伯叔母䕃而犯伯叔母之祖父母父母藉姪䕃而犯姪之父母之類並不得以䕃論文稱犯夫及義絶者得以子䕃婦犯夫既得用子䕃明夫犯婦亦取子䕃可知其子孫例别生文不入所親之限即取子孫䕃者違犯父祖教令及供養有闕亦得以䕃贖論若取父䕃而犯祖者不得為䕃若犯父者得以祖䕃即毆告大功尊長小功尊屬者亦不得以䕃論䟽議曰大功尊長小功尊屬不睦條中已具釋訖若其毆告亦不得䕃贖其婦人犯夫及義絶者得以子䕃亦同折雖出䟽議曰婦人犯夫及與夫家義絶并夫在被出並得以子䕃者為母子無絶道故也其假版官犯流罪以下聴以贖論䟽議曰假版授官不著令式事闗恩澤不要耆年聴以贖論不以假版官當罪其凖律不合贖者處徒以上版亦除削諸無官犯罪有官事發流罪以下以贖論流外折謂從免犯十惡及五流者不用此律折及庶人而任流内者不以官當除䟽議曰無官犯罪有官事發流罪以下皆依贖法謂從流外及庶人而任流内者其除名及當免在身見無流内告身者亦同無官例其於贖章内合除免官當者亦聴收贖故云不以官當除免若犯十惡五流各依本犯除名及配流不用此條贖法故云不用此律問曰無官犯罪有官事發流罪以下以贖論雖稱以贖如有七品以上官合減以否答曰既稱流罪以下以贖論據贖條内不得減者此條亦不合減自餘雜犯應減者並從減例據下文無䕃犯罪有䕃事發並從官䕃之法故知得依減之例卑官犯罪遷官事發在官犯罪去官事發或事發去官犯公罪流以下各勿論餘罪論如律䟽議曰卑官犯罪遷官事發者謂任九品時犯罪得八品以上事發之類在官犯罪去官事發者謂在任時犯罪去任後事發或事發去官者謂事發勾問未斷便即去職此等三事犯公罪流以下各勿論遷官者但改官者即是非獨進品始名遷官餘罪論如律者並謂私罪及公坐死罪皆據律科雖復遷官去任並不免罪問曰依令内外官敕令攝他司事者皆為檢校若比司即為攝判未審此等犯公坐去官免罪以否答曰律云在官犯罪去官事發或事發去官犯公罪流以下各勿論但檢校攝判之處即是監臨若有愆違罪無减降其有勑符差遣及比司攝判攝時既同正職停攝理是去官公坐流罪亦從免法若事闗宿衛情狀重者錄奏聴敕其寺丞縣尉之類本非别司而權判者不同去官之例諸司依令當直之官既非攝判之色不在去官之限其有官犯罪無官事發有䕃犯罪無䕃事發無䕃犯罪有䕃事發並從官䕃之法䟽議曰有官犯罪無官事發謂若有九品官犯流罪合除名其事未發又犯徒一年亦合除名斷一年徒以九品官當并除名訖其流罪後發以官當流比徒四年前已當徒一年猶有三年徒在聴從官䕃之律徵銅六十斤放免其官髙應得議請减亦凖此有䕃犯罪無䕃事發謂父祖有七品官時子孫犯罪父祖除名之後事發亦得依七品子聴贖其父祖或五品以上當時凖䕃得議請减父祖除免之後事發亦依議請减法無䕃犯罪有䕃事發謂父祖無官時子孫犯罪父祖得七品官事發聴贖若得五品官子孫聴减得職事三品官聴請䕃更髙聴議此等四事各得從寛故云從官䕃之法諸犯私罪以官當徒者不以實受請枉法之類折私罪謂私自犯及對制詐䟽議曰私罪謂不縁公事私自犯者雖縁公事意涉阿曲亦同私罪對制詐不以實者對制雖縁公事方便不實情心挾隱欺故同私罪受請枉法之類者謂受人囑請屈法申情縱不得財亦為枉法此例既多故云之類也五品以上一官當徒二年九品以上一官當徒一年䟽議曰九品以上官卑故一官當徒一年五品以上官貴故一官當徒二年若犯公罪者罪而無私曲者折公罪謂縁公事致各加一年當䟽議曰私曲相須公事與奪情無私曲雖違法式是為公坐各加一年當者五品以上一官當徒三年九品以上一官當徒二年問曰敕制施行而違者有公坐以否答曰譬如制敕施行不曉敕意而違者為失㫖雖違敕意情不涉私亦皆為公坐以官當流者三流同比徒四年䟽議曰品官犯流不合真配既須當贖所以比徒四年假有八品九品官犯私罪流皆以四官當之無四官者凖徒年當贖故云三流同比徒四年其有二官為一官勲官為一官折謂職事官散官衛官同䟽議曰謂職事散官衛官計階等者既相因而得故同為一官其勲官從勲加授故别為一官是為二官若用官當徒者職事每階各為一官勲官即正從各為一官先以髙者當叙亦凖此折若去官未䟽議曰先以髙者當謂職事等三官内取最髙者當之若去官未叙者謂以理去任及雖不以理去任告身不追者亦同並準上例先以髙者當問曰律云若去官未叙亦準此或有去官未叙之人而有事發或罪應官當以上或不至官當别敕令解其官當叙法若為處分答曰若本罪官當以上别條云以理去官與見任同即依以官當徒之法用官不盡一年聽叙降先品一等若用官盡者三載聽叙降先品二等若犯罪未至官當不追告身叙法依考解例期年聴叙不降其品從見任解者叙法在獄官令先已去任本罪不至解官奉敕解者依刑部式叙限同考解例本犯應合官當者追毁告身次以勲官當䟽議曰假有六品職事官兼帶勲官柱國以上犯私罪流例减一等合徒三年以六品職事當徒一年次以柱國當徒二年之類問曰假有人任三品四品職事又帶六品以下勲官犯罪應官當者用三品職事當訖次以何官當答曰律云先以髙者當即是職事散官衛官中取最髙品當訖次以勲官當即須用六品勲官當罪不得復從四品職事當之行守者各以本品當仍各解見任䟽議曰假有從五品下行正六品犯徒二年半私罪例减一等猶徒二年以本階從五品官當徒二年仍解六品見任其有六品散官守五品職事亦犯私罪徒二年半者亦用本品官當徒一年餘徒收贖解五品職事之類問曰先有正六品上散官上守職事五品或有從五品官下行正六品上犯徒當罪若為追毁告身答曰律云行守者各以本品當仍各解見任其正六品上散官守五品者五品所守别無告身既用六品官當即與守官俱奪若五品行六品者以五品當罪直解六品職事其應當罪告身同階者悉合追毁若有餘罪及更犯者聴以歴任之官當所不至者折歴任謂降䟽議曰若有餘罪者謂二官當罪之外仍有餘徒或當罪雖盡而更犯法未經科斷者聴以歴任降所不至告身以次當之其流内官而任流外職犯罪以流内官當及贖徒一年者各解流外任䟽議曰假有勲官任流外職者犯徒以上罪以勲官當之或犯徒用官不盡者而贖一年徒以上者各解流外任諸犯十惡故殺人反逆縁坐䟽議曰十惡謂謀反以下内亂以上者故殺人謂不因闘競而故殺者謀殺人已殺訖亦同餘條稱以謀殺故殺論及云從謀殺故殺等殺訖者皆准此其部曲奴婢者非案賊盗律殺一家非死罪三人注云部曲奴婢者非其故殺妾乃舊部曲奴婢經放為良本條雖罪不至死亦同故殺之例反逆縁坐者謂縁謀反大逆人得流罪以上者注本應縁坐老疾免者亦同䟽議曰謂縁坐之中有男夫年八十及篤疾婦人年六十及廢疾雖免縁坐之罪身有官品者亦各除名問曰帶官應合縁坐其身先亡子孫後犯惡逆亦合除名以否答曰縁坐之法惟據生存出養入道尚不縁坐無宜先死到遣除名理務䟽廟諱改爲䟽折犯宣祖上一字通告身不合追毁告身雖不合追毁亦不得以為䕃獄成者雖會赦猶除名尚書省斷訖未奏者折獄成謂贓狀露驗及䟽議曰犯十惡等罪獄成之後雖會大赦猶合除名獄若未成即從赦免注云贓狀露驗者贓謂所犯之贓見獲本物状謂殺人之類得狀為驗雖在州縣並名獄成及尚書省斷訖未奏者謂刑部覆斷訖雖未經奏者亦為獄成此是赦後除名常赦不免之例即監臨主守於所監守内犯姦盗略人若受財而枉法者亦除名枉法謂贓一疋者折姦謂犯良人盗及獄成會赦者免所居官免官法折會降者同䟽議曰監守内姦謂犯良人盗及枉法謂贓一疋者略人者不和為略年十嵗以下雖和亦同略法律文但稱略人即不限將為良賤獄成者亦同上法除名會赦者免所居官此是赦後仍免所居之一官亦為常赦所不免問曰監守内略人罪當除名之色奴婢例非良人之限若監守内略部曲亦合除名以否荅曰據殺一家非死罪三人乃入不道奴婢部曲不同良人之例强盜若傷財主部曲即同良人各於當條見義亦無一定之理今略良人及奴婢並合除名舉略奴婢是輕計贓入除名之法略部曲是重明知亦合除名又闘訟律云毆傷部曲減凢人一等奴婢又減一等又令云轉易部曲事人聽量酬衣食之直既許酬衣食之直必得一疋以上準贓即同奴婢論罪又減良人今準諸條理例除名故為合理又問依律共盗者併贓論其有共受枉法之贓合併贓科罪否答曰枉法條中無併贓之語唯云官人受財復以所受之財分求餘官元受者併贓論餘各依已分法其有共謀受者不同元受之例不合併贓得罪各依己分為首從科之注會降者同免官法䟽議曰降既節級减罪不合悉原故降除名之科聴從免官之法假令降罪悉盡亦依免官之例即降後重斷仍未奏畫更逢赦降猶合免所居之官其雜犯死罪即在禁身死若免死别配及背死逃亡者並除名死而獄成者折皆謂本犯合䟽議曰其雜犯死罪謂非上文十惡故殺人反逆縁坐監守内姦盗略人受財枉法中死罪者即在禁身死者謂犯罪合死在禁身亡其免死别配者謂本犯死䝉恩别配流徒之類及背死逃亡者謂身犯死罪背禁逃亡者此等四色所犯獄成並從除名之律故注云皆謂本犯合死而獄成者背死迯亡者即斷死除名依法奏畫不待身至其下文犯流徒獄成迯走亦凖此會降者聴從當贖法䟽議曰雜犯死罪以下未奏畫逢降有官者聴官當有䕃者依贖法本法不得䕃贖者亦不在贖限其會赦者依令解見任職事問曰上文云十惡故殺人反逆縁坐會赦猶除名雜犯死罪等會降從當贖法若有别蒙敕放及會慮减罪得同赦降以否答曰若使普覃惠澤非涉殊私雨露平分依折自常典如有特奉鴻恩總䝉原放非常之斷人主専之爵命並合如初不同赦降之限其有會慮减罪計與會降不殊當免之科須同降法慮若全免還從特放之例又問加役流以下五流犯者除名配流如法未知會赦及降若為處分答曰會赦猶流常赦所不免雖會赦降仍依前除名配流其不孝流反逆縁坐流雖會赦亦除名子孫犯過失流會赦免罪會降有官者聴依當贖法其加役流犯非一色入十惡者雖會赦降仍合除名稱以枉法論監守内以盗論者會赦免所居官會降同免官之法自餘雜犯會赦從原會降依當贖法凡斷罪之法應例减者先减後斷其五流先不合减
