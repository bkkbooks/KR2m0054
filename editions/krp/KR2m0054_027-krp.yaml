front:
  text: 故唐律䟽議卷第二十七凡二十八條折雜律諸在市及人衆中故相驚動令擾亂者杖八十以故殺傷人者减故殺傷一等因失財物者坐贓論其誤驚殺傷人者從過失法
  hash: sha256:7d8d2a1f4e1d02734db3180dfb9a4c6831d88639a13d870ecf029764da83a96f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_027-1a}
body:
  text: 䟽議曰有人在市内及衆聚之處故相驚動謂誑言有猛獸之類令擾亂者杖八十若因擾亂之際而失財物坐贓論如是衆人之法累併倍論併倍不加重於一人失財物者即從重論因其擾亂而殺傷人者减故殺傷一等驚人致死减一等流三千里折一支减一等徒三年之類其有誤驚因而殺傷人者從過失法收贖銅入被傷殺之家諸不修隄防及修而失時者主司杖七十毁害人家漂失財物者坐贓論减五等以故殺傷人者减闘殺傷罪三等人自涉而死者非折謂水流漂害於人即即水雨過常非人力所防者勿論䟽議曰依營繕令近河及大水有隄防之處刺史縣令以時檢校若須修理每秋收訖量功多少差人夫脩理若暴水汎溢損壊隄防交為人患者先即修營不拘時限若有損壊當時不即脩補或脩而失時者主司杖七十毁害人家謂因不修補及修而失時為水毁害人家漂失財物者坐贓論减五等謂失十疋杖六十罪止杖一百若失衆人之物亦合倍論以故殺傷人者减闘殺傷罪三等謂殺人者徒二年半折一支者徒一年半之類注云謂水流漂害於人謂由不修理隄防而損害人家及行旅被水漂流而致死傷者即人自渉而死者非所司不坐即水雨過常非人力所防者無罪其津濟之處應造橋航及應置船栰而不造置及擅移橋濟者杖七十停廢行人者杖一百䟽議曰津濟之處應造橋航謂河津濟渡之處應造橋及航者編舟作栰及應置舟船及須以竹木為栰以渡行人而不造置及擅移橋梁濟渡之所者各杖七十停廢行人謂不造橋航及不置船栰并擅移橋濟停廢行人者杖一百諸盗决隄防者杖一百官檢校雖供官用亦是折謂盗水以供私用若為若毁害人家及漂失財物贓重者坐贓論以故殺傷人者减闘殺傷罪一等若通水入人家致毁害者亦如之䟽議曰有人盗决隄防取水供用無問公私各杖一百故注云謂盗水以供私用若為官檢校雖供官用亦同水若為官即是公坐若毁害人家謂因盗水汎溢以害人家漂失財物計贓罪重於杖一伯者即計所失財物坐贓論謂十疋徒一年十疋加一等以故殺傷人謂以决水之故殺傷者减闘殺傷罪一等若通水入人家致毁害殺傷者一同盗决之罪故云亦如之其故决隄防者徒三年漂失贓重者凖盗論以故殺傷人者以故殺傷論䟽議曰上文盗水因有殺傷此云故决隄防者謂非因盗水或挟嫌隙或恐水漂流自損之類而故决之者徒三年漂失之贓重於徒三年謂漂失人三十疋贓者凖盗論合流二千里若失衆人之物亦合倍論以决隄防之故而殺傷人者以故殺傷論謂殺人者合斬折人一支流二千里之類上條殺傷人减闘殺傷罪一等有殺傷畜産償减價餘條凖此今以故殺傷論其殺傷畜産明償减價下條水火損敗故犯者徴償諸應乘官船者聽載衣糧二百斤違限私載若受寄及寄之者五十斤及一人各笞五十一百斤及二人各杖一百人随從者勿論折但載即坐若家每一百斤及二人各加一等罪止徒二年䟽議曰應乗官船之人聽載隨身衣糧二百斤若二百斤外更載若受人寄物及寄物之人物滿五十斤及一人者各笞五十一百斤及二人各杖一百稱各者謂人之與物得罪各等亦不限所載逺近故云但載即坐若将家人隨從者皆不坐每一百斤及二人各加一等罪止徒二年從軍征討者各加二等監當主司知而聽之與同罪空船者不用此律䟽議曰從軍征討者謂以船轉運軍資而私自載物若受寄及寄之者各加二等謂五十斤及一人各杖七十一百斤及二人各徒一年半每一百斤及二人各加一等罪止徒三年監當主司知而聽之謂監船官司知乗船人私載受寄者與寄之者罪同故云與同罪若是空船雖私載受寄準行程無違者並悉無罪故云不用此律諸船人行船茹船寫漏安標宿止不如法若船栰應廻避而不廻避者笞五十以故損失官私財物者坐贓論減五等殺傷人者減闘殺傷三等䟽議曰船人謂公私行船之人茹船謂茹塞船縫寫漏謂寫去漏水安標宿止謂行船宿泊之所須在浦島之内仍即安標使来者候望違者是不如法若船栰應廻避者或㳂沂相逢或在洲嶼險處不相廻避覆溺者多須凖行船之法各相廻避若湍磧之處即泝上者避㳂流之類違者各笞五十以不茹寫廻避之故損失官私財物者坐贓論减五等謂十疋杖六十十疋加一等罪止杖一百殺傷人者减閗殺傷罪三等殺人者徒二年半折人一支者徒一年半之類其於湍磧尤難之處致有損害者又减二等監當主司各减一等卒遇風浪者勿論䟽議曰激水為湍積石為磧謂湍磧險難之所其有損失財物或殺傷人者又减二等謂失財物於坐贓上减七等殺傷人者减闘殺傷五等監當主司各减一等謂各减行船人罪一等卒遇暴風巨浪而損失財物及殺傷人者並不坐諸於山陵兆域内失火者徒二年延燒林木者流二千里殺傷人者减闘殺傷一等其在外失火而延燒者各减一等失火凖此折餘條在外䟽議曰山陵前已釋訖兆域者鄧展云除地為塋将有形兆韋昭曰兆域也起土為塋域孝經曰卜其宅兆而安厝之然山陵兆域之所皆有宿衛之人而於此内失火者徒二年延燒兆域内林木者流二千里殺傷人者减闘殺傷一等其在外失火謂於兆域外失火延燒兆域内及林木者各减一等謂延燒兆域内徒二年上减一等若延燒林木者流二千里上减一等注云餘條在外失火凖此餘條謂庫藏以下諸條因在外失火延燒者减於内失火一等諸庫藏及倉内皆不得燃火違者徒一年䟽議曰凢官庫藏及敖倉内有舍者皆不得燃火違者徒一年諸失火及非時燒田野者笞五十一日以後十折非時謂二月土異冝者依鄉法折月三十日以前若鄉延燒人舍宅及財物者杖八十贓重者坐贓論减三等殺傷人者减闘殺傷二等䟽議曰失火謂失火有所燒及不依令文節制而非時燒田野者笞五十其於當家之内失火者皆罪失火之人注云非時謂二月一日以後十月三十日以前若鄉土異宜者依鄉法謂北地霜早南土晚寒風土亦既異宜各須收穫緫了放火時節不可一凖令文故云各依鄉法延燒人舍宅及財物者各杖八十贓重者謂計贓得罪重於杖八十坐贓論减三等凖贓二十疋以上即從贓科殺傷人者减闘殺傷罪二等謂燒殺人者失火及燒田之人减死二等合徒三年不合償死者從本殺傷罪减其贓若損衆家之物者併累亦倍論其行道燃火不滅而致延燒者各减一等䟽議曰人在行路之上或須燃火事了發去皆須滅之若不撲㓕而致延燒他人林木舍宅財物或殺傷人者各减上文罪一等謂延燒贓少者杖八十上减一等贓重者坐贓上減四等罪止徒一年殺傷人者減闘殺傷三等故云各减一等諸於官府廨院及倉庫内失火者徒二年在宫内加二等亦同折廟社内損害贓重者坐贓論殺傷人者減闘殺傷一等延燒廟及宫闕者絞社減一等䟽議曰若有人於内外官府公廨院宇之中及倉庫内失火者徒二年宫内加二等宫内謂殿門外有禁門其内並是若失火者徒三年注云廟社内亦同謂於宗廟及太社院内失火亦徒三年損害贓重者謂因失火延燒有所損害財物計贓重於徒二年者即凖坐贓科之謂燒官府廨内財物計贓五十疋合徒三年若因火有殺傷人者减闘殺傷罪一等謂殺人者流三千里傷人折二支徒三年若殺傷畜産不合從上條稱减闘殺傷一等償减價自從水火損敗誤失不償延燒廟及宫闕者絞社减一等流三千里諸故燒官府廨舍及私家舍宅若財物者徒三年贓滿五疋流二千里十疋絞殺傷人者以故殺傷論䟽議曰凡官府廨宇及私家舍宅無問舍宇大小并及財物多少但故燒者徒三年計贓滿五疋流二千里贓滿十疋者絞殺傷人者以故殺傷論謂因放火而殺人者斬傷人折一支者流二千里之類若對主故燒非積聚延燒之物只同棄毁人財物論諸見火起應告不告應救不救减失火罪二等失罪减折謂從本其守衛宫殿倉庫及掌囚者皆不得離所守救火違者杖一百䟽議曰見火起燒公私廨宇舍宅財物者並須告見在及鄰近之人共救若不告不救减失火罪二等謂若於官府廨宇内及倉庫從徒二年上减二等合徒一年若於宫及廟社内從徒三年上减二等徒二年若於私家從笞五十上减二等笞三十故注云從本失罪减明即不從延燒减之其守衛宫殿倉庫及掌囚者雖見火起並不得離所守救火違者杖一百雖見火起不告亦不合罪諸水火有所損敗故犯者徴償誤失者不償䟽議曰水火有所損敗謂上諸條稱水火損敗得罪之處故犯者徵償若故决隄防通水入人家若故燒官府廨舍及私家舍宅財物有所損敗之類各徵償其稱失火之處及不修隄防而致損害之類各不償諸棄毁大祀神御之物若御寳乗輿服御物及非服而御者各以盗論亡失及誤毁者凖盗論减二等䟽議曰棄毁大祀神御之物祠令天地宗廟神州等為大祀神御謂供神所御之物若御寳謂皇帝八寳太皇太后皇太后皇后寳以稱御者三后亦同乗輿服御物謂皇帝服御之物及非服而御謂帷帳几杖之屬非服而供御者以上義名例及職制並具釋訖有棄毁者各以盗論盗律盗大祀神御之物乗輿服御物者流二千五百里非服而御之物徒一年半贓重者計贓各加凢盗一等盗御寳者絞稱以盗論者與真盗同入十惡非服而御之物等不入十惡據盗律其擬供神御及供而廢闕若饗薦之具已饌呈者徒二年未饌呈者徒一年半又盗御寳條擬供服御等亦並徒二年今此條上言棄毁大祀下稱非服而御以盗論凖非服而御徒一年半舉下明上即棄毁擬供服御凖罪徒一年半以上亦各以盗論亡失及誤毁者凖盗論减二等並各從凖盗罪上减二等凖盗論者不在除免倍贓監主加罪加役流之例棄毁中祀神御之物减大祀二等棄毁小祀神御之物又减二等中祀以下不入十惡諸大祀丘壇将行事有守衛而毁者流二千里非行事日徒一年壝門各减二等䟽議曰大祀丘壇謂祀天於圓丘祭地於方丘五時迎氣祀五方上帝並各有壇此等将行祭祀各有守衛此時有損壊丘壇者流二千里非行事日謂非祭祀之日而毁者徒一年壝門各減二等壝門謂丘壇之外擁土為門毁壝門者将行事之日徒二年半非行事日杖九十故云各減二等毁中小祀各逓減二等諸棄毁符節印及門鑰者各準盜論亡失及誤毁者各減二等䟽議曰棄毁符節印及門鑰者各凖盗法論罪盗律盗宫殿門符發兵符傳符流二千里使節及皇城京城門符徒三年餘符徒一年門鑰各减三等盗官文書印徒二年餘印杖一百其亡失符節印以下誤毁者各减二等謂各减棄毁之罪二等諸棄毁制書及官文書者凖盗論亡失及誤毁者各减二等事者從詐増减法折毁須失文字若欲動其誤毁失符移解牒者杖六十而有本案者折謂未入所司䟽議曰棄毁制書棄毁不相須毁者須失文字制書敕及奏抄亦同官文書謂曹司所行公案及符移解牒之類凖盗論謂各凖盗法得罪盗律盗制書者徒二年官文書杖一百亡失謂不覺遺落及被盗誤毁謂誤致毁損破失文字各减二等故注云毁須失文字謂制勑奏抄徒一年官文書杖八十若盗毁欲動事者自從増减法制敕及奏抄合死官文書即依詐偽律詐為官文書及増减法主司自有所避即從違式造立科罪杖罪以下杖一百徒罪以上加一等誤毁符移解牒者杖六十注云謂未入所司而有本案者謂未入曹司之間而即誤致毁者職制律雖無文亦與符移同罪諸私發官文書印封視書者杖六十制書杖八十若宻事各依漏泄坐减二等即誤發視者各减二等不視者不坐䟽議曰官司行下文書多有封印而有私發印封視書者杖六十視制書杖八十若宻事各依漏泄坐减二等職制律漏泄大事應宻者絞减二等徒三年非大事應宻徒一年半减二等杖一百誤發視者各减二等謂誤發因視制書杖六十官文書笞四十大事應宻視者徒三年上减二等徒二年應宻非大事視者杖一百上减二等杖八十不視者不坐謂初雖誤發意不視書者無罪諸主守官物而亡失簿書致數有乖錯者計所錯以主守不覺盗論䟽議曰凢是官物皆立簿書主守之人亡失簿書為失簿書之故遂令物數乖錯者計所錯之數依不覺盗論廐庫律主司不覺盗者五尺笞二十十疋加一等過杖一百二十疋加一等罪止徒二年其主典替代者文案皆立正案分付後人違者杖一百不免折並去官䟽議曰謂主典替代所有文案皆須立正案分付承後人違而不付者合杖一百縱雖去官不同名例免法故注云並去官不免諸於官私田園輙食瓜果之類坐贓論棄毁者亦如之即持去者凖盗論䟽議曰稱瓜果之類即雜蔬菜等皆是若於官私田園之内而輙私食者坐贓論其有棄毁之者計所棄毁亦同輙食之罪故云亦如之持将去者計贓凖盗論並徴所費之贓各還官主主司給與者加一等彊持去者以盜論主司即言者不坐非應食官酒食而食者亦準此䟽議曰當園主司将瓜果之屬給與人食者加坐贓罪一等謂一尺笞三十一疋加一等給與将去者準盜上加一等一尺杖七十一疋加一等彊持去者謂以威若力彊持将去者以盜論計贓同真盜之法其贓倍徵贓滿五疋者免官若監臨主司自彊取者加凡盜罪二等除名倍贓並依常律主司當即言告者主司不坐非應食官酒食而輙食者亦凖此謂輙食者坐贓論棄毁者亦同持去者凖盗論彊持去者以竊盗論若主司私持去者並同監主盗法若非主司而因食次而持去者以盗論彊者依彊盗法諸棄毁官私器物及毁伐樹木稼穡者凖盗論即亡失及誤毁官物者各减三等䟽議曰棄毁官私器物謂是雜器財物輙有棄擲毁壊及毁伐樹木稼穡者種之曰稼歛之曰穡麥禾之類各計贓凖盗論即亡失及誤毁謂亡失及誤毁官私器物樹木稼穡者各减故犯三等謂其贓並備償若誤毁失私物依下條例償而不坐諸毁人碑碣及石獸者徒一年即毁人廟主者加一等其有用功修造之物而故損毁者計庸坐贓論各令修立誤損毁者但令修立不坐䟽議曰䘮葬令五品以上聽立碑七品以上立碣塋域之内亦有石獸其有毁人碑碣及石獸者徒一年即毁人廟主者加一等徒一年半其有用功修造之物謂樓觀垣壍之類而故損毁者計修造功庸坐贓論謂拾疋徒一年十疋加一等仍令依舊修立若誤毁損者但令修立不坐諸請受軍器事訖停留不輸者十日杖六十十日加一等百日徒一年過百日不送者减私有罪二等其棄毁者凖盗論䟽議曰請受軍器謂鍪甲矟弩弓箭之類征戍事訖停留不輸者十日杖六十十日加一等百日徒一年過百日不送者减私有罪二等擅興律私有甲一領流上减二等徒二年半之類其有或棄或毁者凖盗論各依盗律盗甲弩者流二千里禁兵器徒二年如此之類並名盗法若亡失及誤毁傷者以十分論亡失一分毁傷二分杖六十亡失二分毁傷四分杖八十亡失三分毁傷六分杖一百即不滿十分者一當一分論其經戰陣而有損失者不坐儀仗各减二等䟽議曰請官器仗若亡失及誤毁傷者以十分論謂請百事十事為一分之類若亡失一分或毁傷二分假有請百事亡失十事或毁傷二十事各杖六十若亡失二分毁傷四分杖八十亡失三分毁傷六分杖一百其分數各與上解義同罪止杖一百即不滿十分者一當一分論謂請玖事為玖分之類亦依亡失毁傷凖分為罪仍依令備償其經戰陣而損失者不坐不償儀仗各减二等儀仗謂非兵器若有亡失誤毁各依十分之法各减軍器罪二等若亡失毁傷罪名不等者即以重法併滿輕法諸棄毁亡失及誤毁官私器物者各備償在倉折謂非持守者折庫而别若被彊盗者各不坐不償即雖在倉庫故棄毁者徴償如法其非可償者坐而不備符折謂文書之類折印門鑰官䟽議曰官私器物其有故棄毁或亡失及誤毁者各備償注云謂非在倉庫而别持守者謂倉庫之外别處持守而有棄毁亡失及誤毁官私器物始合備償若被強盗各不坐不償雖在倉庫之内若有故棄毁徴償如法其非可償者止坐其罪不合徴償故注云謂符印門鑰官文書稱之類者寳節木契制勑是折並諸亡失器物符印之類應坐者皆聽三十日求訪不得然後决罪若限内能自訪得及他人得者免其罪限後得者追减三等䟽議曰若亡失器物符印之類寳及門鑰亦同為亡失應合罪者未得即决皆聽三十日求訪限滿不得然後决罪若三十日内自訪得及他人得者免其亡失之罪三十日限外得者追减三等若已經奏决不合追减官文書制書程限内求訪得者亦如之䟽議曰官文書及制書程限内求訪得者謂曹司執行案各有程限公式令小事五日程中事十日程大事二十日程徒罪以上獄案辯定後三十日程其制勅皆當日行下若行下處多事須抄冩依公式合滿二百紙以下限二日程每二百紙以上加一日程所加多者不得過五日赦書不得過三日若有亡失各於此限内訪得者亦得免罪限外得者坐如法然制勅事重程限一日如有稽廢得罪不輕若許以三旬追訪稽者皆須注失所以不與亡失器物同例若官文書制書事巳行訖無程者亦依三十日為限即雖故棄擲限内訪得聽减一等䟽議曰器物符印之類以下雖有規避而故棄擲限内訪得者聽减本失罪一等諸於他人地内得宿藏物隐而不送者計合還主之分坐贓論减三等不送官者罪亦如之折若得古器形制異而䟽議曰謂凡人於他人地内得宿藏物者依令合與地主中分若有隐而不送計應合還主之分坐贓論减三等罪止徒一年半注云若得古器形制異而不送官者謂得古器鍾鼎之類形制異於常者依令送官酬直隐而不送者即准所得之器坐贓論减三等故云罪亦如之問曰官田宅私家借得令人佃食或私田宅有人借得亦令人佃作人於中得宿藏各合若為分財答曰藏在地中非可預見其借得官田宅者以見住見佃人為主若作人及耕犂人得者合與佃住之主中分其私田宅各有本主借者不施功力而作人得者合與本主中分借得之人既非本主又不施功不合得分諸得闌遺物滿五日不送官者各以亡失罪論贓重者坐贓論私物坐贓减二等䟽議曰得䦨遺之物者謂得寳印符節及雜物之類即須送官滿五日不送者各得亡失之罪贓重者謂計贓重於亡失者坐贓論罪止徒三年私物坐贓論减二等罪止徒二年其物各還官主諸違令者笞五十律無罪名者折謂令有禁制而别式减一等䟽議曰令有禁制謂儀制令行路賤避貴来避去之類此是令有禁制律無罪名違者得笞五十别式减一等謂禮部式五品以上服紫六品以下服朱之類違式文而著服色者笞四十是名别式减一等物仍沒官諸不應得為而為之者笞四十理不可為者折謂律令無條事理重者杖八十䟽議曰雜犯輕罪觸類弘多金科玉條包羅難盡其有在律在令無有正條若不輕重相明無文可以比附臨時處断量情為罪庶補遺闕故立此條情輕者笞四十事理重者杖八十故唐律疏議卷第二十七
