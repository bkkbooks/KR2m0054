  - {type: variant, offset: 0, length: 508, content: 附錄滂喜齋藏書記一則宋刻唐律疏義三十卷題太尉揚州都督監修國史上柱國趙國公長孫無忌等撰孫刻此書據影元泰定本每卷後附纂例釋文元王元亮所編也此本無之卷二犯十惡故殺人反逆緣坐條理務疏通疏字下注云犯宣祖上一字廟諱改爲疏孫所據本竟改作宏以此證之此本爲宋槧無疑矣元本有無名氏序云此山貰冶子治經之暇得覽金科遂爲釋文以辨其義此山貰冶子未詳何人顧㵎蘋云第十七卷岀繼同堂卽不合緣坐下有云釋曰岀繼謂伯叔父及兄弟之子己之子内有岀繼同宗者同堂謂伯叔父之子今俗呼爲親堂兄弟者第廿六卷或注冷熱遲駛下有云疏吏反第廿八卷卽停家職資下有云停家資謂前職前官皆所謂此山貰冶子釋文而王元亮重編删併有未盡也今檢此刻顧舉三條一一在内惟前一條謂伯叔父至親堂兄弟者三十五字下脫子字折内兄弟之誤作正文並無釋曰岀繼四字亦舊注耳非此山貰冶子釋文也其有釋曰字者元人妄增顧氏引以爲證誤矣又孫刻目廿二鬬訟下注云凡一十六條此作十五條蓋少敺兄姊弟妹一條然卷中實有之疑是後人羼入而未改其目及元人覆刻則并其目增之非有宋刻末由辨其誤也又卷廿三告小事虚誣告人流罪引虚二條孫目誤倒其他異同不悉著每葉十八行行十八字楮墨精好大字悅目洵爲宋槧之上乘孫氏影鈔祖刻季滄葦有一本今歸虞山瞿氏使見此刻走且僵矣, WYG: 斷}
