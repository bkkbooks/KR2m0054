  - {type: variant, offset: 0, length: 526, content: 故唐律䟽議卷第三十凡二十條折断嶽諸監臨之官因公事自以杖捶人致死及恐廹人致死者各從過失殺人法若以大杖及手足毆擊折傷以上减閗殺傷罪二等䟽議曰謂臨統案驗之官情不挟私因公事前人合杖笞自以杖捶人致死及恐廹人致死謂因公事欲求其情或恐喝或廹脅前人怕懼而自致死者各依過失殺人法各徵銅一百二十觔入死家若前人是卑賤罪不至死者各依本殺法徴銅若以大杖手足毆擊折傷以上者自擊使人擊等减闘殺傷罪二等謂其應償死者合徒三年之類雖是監臨主司於法不合行罰及前人不合捶拷而捶拷者以闘殺傷論至死者加役流即用刃者各從闘殺傷法䟽議曰雖是監臨主司於法不合行罰謂非判事之官及非専當督領者不得輙行捶罰假有人犯徒以上罪合送法司不送法司當曹即自行决罰之類及前人不合捶拷謂前人無罪或雖有罪應合官當收贖之類而輙捶拷者以闘殺傷論謂傷與不傷並依他物閗毆之法其因捶拷而致死者加役流用刃者謂監臨之官自以杖捶人致死以下有用刃殺傷者各依閗訟律用刃殺者斬用兵刃殺者同故殺法問曰里正坊正村正及主典因公事行罰前人致死合得何罪答曰里正坊正村正等唯掌追呼催督不合輙加笞杖其有因公事相毆擊者理同凢闘而科主典檢請是司理非行罰之職因公事捶人者亦與里正等同諸斷罪皆須具引律令格式正文違者笞三十若數事共條止引所犯罪者聽䟽議曰犯罪之人皆有條制斷, WYG: ''}
