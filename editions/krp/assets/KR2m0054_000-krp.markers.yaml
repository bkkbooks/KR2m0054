  - {type: variant, offset: 5090, length: 6115, content: 人君即位欲其體元以居正文選東京賦况纂帝業而輕天位纂繼也論語惟天爲大惟堯則之言天之大以臨兆民也覆載並於乾坤照臨運於日月易乾卦夫大人者與天地合其徳與日月合其明與天地合其徳者謂覆載也與日月合其明者謂照臨也坐青蒲而化光四表負丹扆而德被九圍漢書史丹伏青蒲奏事青蒲席也尚書曰光被四表禮記明堂曰天子負斧扆南郷而立斧扆爲斧屏風於户牖之間詩長發篇曰帝命式于九圍九州也日旰忘餐心存於哀矜宵分不寐志在於明威旰晚也蜀志諸葛亮上䟽曰陛下劬勞帝業旰食思政廢寢憂人書吕刑曰皇帝哀矜庶戮之無辜言唐帝日晚忘食哀矜無辜唐李百藥曰太宗纔及日昃必命才學之士賜以清問一夜忘疲中宵不寐書湯誥曰將天命明威不敢赦言唐帝中夜不寢其志在於明天之威慎用刑也一夫向隅而責躬萬方有犯而罪已漢書刑法志曰滿堂而飲酒有一人向隅而悲泣則一堂皆爲之不樂王者之於天下也譬猶一堂之上也書湯誥萬方有罪在予一人又左傳莊公十一年曰禹湯罪已其興也勃焉仍慮三辟攸斁八刑尚密左傳昭公六年鄭人鑄刑書於鼎以爲常法叔向始貽子產書曰夏有亂政作禹刑啇有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也辟刑也尚書洪範曰彞倫攸斁斁敗也八刑者周禮大司徒以刑紏萬民一曰不孝二曰不義三曰不婣四曰不弟五曰不任六曰不恤七曰造言八曰亂民平反之吏從寛而失情次骨之人舞智而䧟網前漢嶲不疑爲京兆尹毎行縣錄囚徒有所平反母即喜史記杜周南陽人爲御史周然重遲外寛内深次骨李奇曰其用罪深刻至骨又張湯杜人也湯爲人多詐舞智以御人言䧟人於憲網刑靡定法律無正條徽纆妄施手足安措靡無也易坎卦係用徽纆寘于叢棘釋音劉子玄云三股曰徽兩股曰纆皆索名所以禁囚今言妄施者刑罰不中也論語曰刑罰不中則民無所措手足自仍慮以下至此皆言唐興之初慮恐用刑無一定之律吏無所遵守以致刑罰不中所以命羣臣定律也乃制太尉楊州都督監脩國史上柱國趙國公無忌司空上柱國英國公勣李勣字懋功曹州離孤人本姓徐武德二年從李密歸朝唐高祖喜曰勣純臣詔受黎州緫管封英國公賜姓附宗正屬籍尚書左僕射兼太子少師監脩國史上柱國燕國公志寧于志寧字仲謐京兆高陵人太宗曰今太子幼卿當輔以正道太子承乾數有過惡志寕欲救止之上諫苑以諷帝見大恱賜金十斤絹三百疋凡格式律令禮典皆與論譔賞賜鉅萬尚書右僕射監脩國史上柱國開國公遂良褚遂良字登善通直散騎常侍褚亮之子博渉文史工隷楷銀青光禄大夫守中書令監脩國史上騎都尉栁奭栁奭字子邵蒲州人以父隋時使高麗卒焉奭徃迎䘮號踊盡䘮爲夷人所慕銀青光祿大夫守刑部尚書上輕車都尉唐臨唐臨字本德京兆長安人遷侍御史俄持節披獄交州出冤繫三千人累遷大理卿高宗常録囚臨軒對無不盡帝喜曰爲國之要在用法刻則民殘寛則失其有罪惟是折中以稱朕意永徽元年拜御史大夫蕭齡之常任廣州都督受賕當死詔羣臣議請論如法詔戮於朝堂臨建言羣臣不知天子所以議之之意在律八議王族戮於隠議親也刑不尚大夫議貴也今齡之貪贓狼扈死有餘咎陛下以異於他囚故議之有司又令入死非帝舜所以用刑者不可爲後世法帝然之齡之齊高帝五世孫由是免死太中大夫守太理卿輕車都尉叚寳玄太中大夫守皇門侍郎護軍頴川縣開國公韓瑗韓瑗字伯玉京兆三原人父仲良武德初與定律令建言周律其屬二千秦漢後約爲五百依古則繁請崇寛簡以示惟新於是採開皇律宜於時者定之終刑部尚書瑗少負節行博學曉吏事太中大夫守中書侍郎監脩國史驍騎尉來濟來濟揚州江都人篤志爲文章善議論曉暢時務後至公輔朝議大夫守中書侍郎辛茂將朝議大夫守尚書右丞輕騎都尉劉燕客朝請大夫使持節穎州諸軍事守頴州刺史輕車都尉裴弘獻朝議大夫守御史中丞上柱國賈敏行朝議郎守刑部郎中輕車都尉王懷恪前雍州盩厔縣令雲騎尉董雄朝議郎行大理丞護軍路立承奉郎守雍州始平縣丞驍騎尉石士逹大理評事雲騎尉曹惠果儒林郎守律學博士飛騎尉司馬銳等以上十人無傳律學博士魏書曰衛揭奏刑法國家所重而私議所輕獄者人命所懸而選用者所卑請置律學博士相教授遂施行律學博士自此始也摭金匱之故事採石室之逸書書金縢納冊於金縢之匱中環濟要略御史中丞有石室以藏秘書文選魏都賦金匱石室藏秘書之所帝王圖籍於此藏史記太史公抽金匱石室之書書序曰採摭羣言以立訓傳捐彼凝脂敦兹簡要捐棄也文選秦法繁於秋荼網密於凝脂敦篤也兹此也簡略也言國家捐棄其繁密之刑而敦此簡略之法也網羅訓誥研覈丘墳書序垂世立教典謨訓誥誓命之文研究覈考也又曰研精覃思博考經籍伏犧神農黃帝之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常道也八卦之說謂之八索求其義也九州之志謂之九丘言九州所有土地所生風氣所宜皆聚此書也春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘即謂上世帝王遺書也言此律䟽亦網羅研覈上世帝王之遺書也撰律䟽三十卷筆削巳了春秋傳曰孔子作春秋筆則筆削則削筆存之於牘削去而不書也漢書曰令有司請定法削即削筆即筆服䖍曰言隨君意寔三典之隱括周禮建三典以刑邦國詰四方一曰刑新邦用輕典二曰刑平邦用中典三曰刑亂邦用重典荀子法行篇曰良醫之門多病人隱括之側多枉木隱括者正曲木之器言此律書信乃三典之隱括信百代之準繩準繩者孟子曰聖人既竭目力焉繼之以䂓矩準繩以爲方圎平直不可勝用也準取其平繩取其直言此律書信能百代之後取其平直也銘之景鍾將二儀而並乆文選楊脩荅臨淄侯牋曰銘功景鍾易繫辭曰易有太極是生兩儀言此律書可以銘刻於國家重器之上與天地同其乆逺矣布之象魏與七曜而長懸象魏者周禮秋官正月之吉懸刑象之法於象魏使人觀之象魏雉門兩觀也纂要云日月五星謂之七曜易繫辭懸象箸明莫大於日月言此律者布之於宫門雙闕如日月五星長懸於天也庻一面之祝逺超於殷簡庻者庻幾也史記殷湯出野見張網四靣祝曰天下四方皆入吾網湯曰嘻盡之矣乃去其三靣祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯德至矣超過也簡冊也言唐帝撰此律書好生之德過於殷家之簡冊也十失之歎永弭於漢圖漢路温舒曰秦有十失其一尚存治獄之吏是也今治獄者上下相繼以刻爲明深者獲功名平者多後患弭止也言有此律則永無漢人十失之嘆也謹詣朝堂奉表以聞臣無忌等誠惶誠恐頓首頓首永徽四年十一月十九日進永徽唐高宗年號也故唐律䟽議緫目録計三十卷折凡五百條一名例計六卷折凡五十七條二衛禁計二卷折凡三十三條三職制計三卷折凡五十八條四户婚計三卷折凡四十六條五廏庫計一卷折凡二十八條六擅興計一卷折凡二十四條七賊盜計四卷折凡五十四條八闘訟計四卷折凡五十九條九詐僞計一卷折凡二十七條十雜律計二卷折凡六十二條十一捕亡計一卷折凡一十八條十二斷獄計二卷折凡三十四條故唐律䟽議緫目録終故唐律目録第一卷凡七條折名例笞刑五杖刑五徒刑五流刑三死刑二一折問荅十惡二折問荅八議第二卷凡一十一條折名例八議者議章折此名皇太子妃請章折此名七品以上之官減章折此名應議請減問荅二折此名贖章婦人官品邑號五品以上妾有犯人有議請減以理去官無官犯罪二折問荅以官當徒四折問荅十惡反逆縁坐四折問荅第三卷凡一十條折名例奸盜略人受財一折問荅府號官穪一折問荅除名者三折問荅以官當徒不盡除名比徒三年犯流應配流配人在道犯死罪非十惡三折問荅徒應役無兼丁二折問荅工樂雜户二折問荅第四卷凡八條折名例犯罪巳發一折問荅老小廢疾四折問荅犯時未老疾一折問荅彼此俱罪之贓二折問荅以贓入罪四折問荅平贓者二折問荅略和誘人㑹赦改正徴收二折問荅第五卷凡八條折名例犯罪未發自首四折問荅犯罪共亡四折問荅盜詐取人財物二折問荅同職犯公坐三折問荅公事失錯一折問荅共犯罪造意爲首共犯罪本罪別共犯罪有迯亡二折問荅第六卷凡一十三條折名例二罪從重四折問荅同居相爲隱一折問荅官户部曲化外人相犯本條别有制斷罪無正條乗輿車駕穪期親祖父母穪反坐罪之綂攝案驗爲監臨一折問荅穪日者以百刻穪加就重穪道士女冠第七卷凡一十八條折衛禁䦨入太廟門䦨入宫門䦨入踰閾爲限宫殿門無籍非應宿衛自代因事入宫輙宿一折問荅無著籍入宫殿宫殿作罷不出二折問荅登髙臨宫中宿衛𬒳奏劾應出宫殿輙留䦨入非御在所巳配仗衛廻改奉勑夜開宫殿門夜禁宫殿出入向宫殿射一折問荅車駕行衝隊宿衛上畨不到二折問荅第八卷凡一十五條折衛禁宿衛兵仗行宫營門宫内外行夜犯廟社禁苑罪名宫門等冒名守衛一折問荅越州鎮戍等城垣私度關不應度關關津留難私度有他罪人兵度關妄度齎禁私物度關越度縁邊關塞縁邊城戍烽候不警第九卷凡二十三條折職制官有貟數貢舉非其人剌史縣令私出界在官應直不直一折問荅官人無故不上之官限滿官人從駕稽違大祀不預申期大祀散齋弔䘮祭祀有事於園陵廟享有䘮合和御藥造御膳犯食禁御幸舟船乘輿服御物主司借服御物監當主食有犯百官外膳漏泄大事玄象器物稽緩制書𬒳制書施行違者受制忘誤第十卷凡一十九條折職制􅊨􅊨􅊨制書誤輙改定上書奏事犯諱􅊨上書奏事誤􅊨􅊨􅊨事應奏而不奏􅊨事直代判署受制出使不返匿父母夫䘮二折問荅府號官稱犯名指斥乘輿驛使稽程驛使以書寄人文書應遣驛驛使不依題署増乗驛馬乗驛馬枉道一折問荅乘驛馬齎私物長官使人有犯用符節事訖公事應行稽留第十一卷凡一十七條折職制奉使部送顧寄人長吏輙立碑有所請求受人財請求有事以財行求監主受財枉法有事先不許財受所監臨財物因使受送饋貸所監臨財物一折問荅役使所監臨監臨受供饋率歛監臨財物監臨家人乞借一折問荅去官受舊官屬挾勢乞索穪律令式第十二卷凡一十四條折户婚脫户里正不覺脫漏州縣不覺脫漏里正官司妄脫漏私入道子孫不得别籍居父母䘮生子養子捨去立嫡違法養雜户爲子孫放部曲爲良二折問荅相冒合户卑㓜私輙用財賣口分田第十三卷凡一十八條折户婚占田過限盗耕種公私田妄認盜賣公私田在官侵奪私田盗耕人墓田部内旱澇霜雹部内田疇荒蕪里正授田課農桑應復除不給羌科賦役違法輸課稅物違期許嫁女報㛰書一折問荅爲㛰女家妄冒有妻更娶一折問荅以妻爲妾二折問荅居父母夫䘮嫁娶父母囚禁嫁娶居父母䘮主㛰第十四卷凡一十四條折户婚同姓爲婚一折問荅爲袒免妻嫁娶夫䘮守志娶迯亡婦女監臨娶所監臨女和娶人妻尊長與卑㓜定㛰妻無七出一折問荅義絶離之一折問荅奴娶良人爲妻雜户不得娶良人違律爲㛰違律爲㛰離正嫁娶違律第十五卷凡二十八條折廐庫牧畜産課不充驗畜産不實受官羸病畜産