front:
  text: 故唐律䟽議卷第二十八凡一十八條折捕亡
  hash: sha256:c374efbae8bbb4641e69f9bfc228e39b1cec2382cafeb0ce2626753a786f0c62
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_028-1a}
body:
  text: 䟽捕亡律者魏文侯之時里悝制法經六篇捕法第四至後魏名捕亡律北齊名捕斷律後周名逃捕律隋復名捕亡律然此篇以上質定刑名若有逃亡恐其滋蔓故須捕繫以寘䟽網故次雜律之下諸罪人逃亡将吏已受使追捕而不行及逗留便之者折謂故方雖行與亡者相遇人仗足敵不闘而退者减罪人罪一等闘而退者减二等即人仗不敵不闘而退者减三等闘而退者不坐䟽議曰依捕亡令囚及征人防人流人移鄉人逃亡及欲入冦賊若有賊盗及被傷殺並須追捕其罪人逃亡謂犯罪事發而亡囚與未囚並是将吏已受使追捕者謂見任武官為将文官為吏已受使追捕罪人而不行及逗留謂故作廻避逗留及詐為疾患不去之類雖行與亡者相遇人兵器仗足得相敵不戰闘而退者各减罪人罪一等謂罪人合死將吏處流三千里之類闘而退者謂人仗足敵闘而退者减二等若罪人應死将吏合徒三年即人仗不敵謂賊多兵少或器仗不敵不闘而退者减三等罪人應死将吏徒二年半闘而退者不坐謂人仗不敵計盡力窮知難而退者不坐即非将吏臨時差遣者各减将吏一等三十日内能自捕得罪人獲半以上雖不得半但所獲者最重皆除其罪雖一人捕得餘人亦同若罪人巳死及自首各盡者亦從免法不盡者止以不盡人為坐䟽議曰即非将吏謂非見任文武官即停家職資謂前聀前官折釋曰停家職資及勲官之類臨時州縣差遣領人追捕者各減将吏罪一等雖非将吏奉敕差行者亦同将吏之法不在減一等之限三十日内自捕得罪人獲半以上謂十人逃亡獲得五六者雖不得半但所獲者最重假有徒流死囚一時逃走捕得死罪一人雖不得徒流九人仍除其罪雖是一人捕得衆共失囚之人並同免法若罪人已死謂自死及被他人殺若能歸首十人俱盡者亦從免法若罪人自首不盡止以不盡之人凖罪為坐限外若配贖以後能自捕得者各追减三等即為人捕得及罪人已死若自首各追减二等經折已例餘條追减凖此折奏决者不在追减之䟽議曰失罪人經三十日追捕不得無官䕃者或配徒流有官䕃者或已徴贖此後能自捕得罪人各追减前所斷罪三等即他人捕得及罪人身死訖若罪人自首各得追减二等注云已經奏决者不在追减之例謂将吏以下失罪人其罪已經奏决徒流笞杖之類不在追减之例餘條追减凖此謂亡失寳印及不覺失囚等稱追减者若事經奏决亦不在追减之例故云餘條凖此諸捕罪人而罪人持仗拒捍其捕者格殺之及走逐而殺空手等折走者持仗若廹窘而自殺者皆勿論䟽議曰捕罪人謂上條将吏以下捕罪人而罪人乃持仗拒捍仗謂兵器及杵棒之屬其捕者以其拒捍因而格殺之及罪人迯走捕者逐而殺之注云走者持仗空手等慮其走失故雖空手亦許殺之若廹窘而自殺謂罪人被捕逼廹窮窘或自殺或落坑穽而死之類皆悉勿論即空手拒捍而殺者徒二年已就拘執及不拒捍而殺或折傷之各以闘殺傷論用刃者從故殺傷法䟽議曰謂罪人空手雖相拒捍不能為害而格殺之者徒二年若罪人已被拘執及元無拒捍之心而殺或折傷之各依闘訟律以闘殺傷論用刃者從故殺傷法罪人本犯應死而殺者加役流即拒毆捕者加本罪一等傷者加闘傷二等殺者斬䟽議曰謂罪人本犯合死已就拘執及不拒捍而捕殺之者加役流即拒毆捕者加本罪一等假有罪人本犯徒三年而拒毆捕人流二千里傷者加闘傷二等假有拒毆捕者折一齒加凢闘二等合徒二年之類殺捕人者斬捕人不限貴賤殺者合斬諸被人毆擊折傷以上若盗及强姦雖傍人皆得捕繫以送官司籍内雖和聽從捕格法折捕格法凖上條即姦同䟽議曰有人毆擊他人折齒折指以上若盗及強姦雖非被傷被盗被姦家人及所親但是傍人皆得捕繫以送官司捕格法凖上條持仗拒捍其捕者得格殺之持仗及空手而走者亦得殺之其拒捕不拒捕並同上條捕格之法即姦同籍内言同籍之内明是不限良賤親踈雖和姦亦聽從上條捕格之法問曰親戚共外人和姦若捕送官司即於親有罪律許捕格未知捕者得告親罪以否答曰若男女俱是本親合相容隱既兩俱有罪不合捕格告言若所親共他人姦他人即合有罪於親雖合容隐非是故相告言因捕罪人事相連及其於捕者不合有罪和姦之人兩依律斷若餘犯不言請而輙捕繫者笞三十殺傷人者以故殺傷論本犯應死而殺者加役流䟽議曰若餘犯不言請謂非毆擊人折傷以上若盗及強姦或和姦同籍内此外有犯須言請官司不得輙加捕繫如捕繫者笞三十因而殺傷人者以故殺傷論本犯應死謂餘犯合死捕而殺者合加役流諸追捕罪人而力不能制告道路行人其行人力能助之而不助者杖八十勢不得助者勿論險難及馳驛之類折勢不得助者謂隔䟽議曰追捕罪人謂将吏以下據法追捕及在律文聽私捕繫而力不能拘制告道路行人其行人力能助之謂行者人仗堪制罪人而不救助者行人合杖八十勢不得助者謂隔川谷垣籬壍柵之類不可踰越過者及馳驛之類稱之類者官有急事及私家救疾赴哀情事急速亦各無罪諸捕罪人有漏露其事令得逃亡者減罪人罪一等所收捕罪為坐折罪人有數罪但以䟽議曰捕罪人謂上條将吏以下受使追捕而有漏露應捕之事令使罪人逃避者漏露之人減罪人罪一等注云罪人有數罪者假有一人或行強盜兼復殺人又欲謀叛若為謀叛而捕漏露者唯從謀叛減一等若為賊盜或殺人而捕漏露者即從賊盗殺人上减一等不論謀叛故云但以所收捕罪為坐未斷之間能自捕得除其罪相容隐者為捕得亦同為捕得凖此折餘條相容隐即他人捕得若罪人已死及自首又各减一等䟽議曰未斷之間謂漏露之罪未經斷定能自捕得罪人者除其失囚之罪相容隱者為捕得謂同居及大功以上親外祖父母外孫若孫之婦夫之兄弟及兄弟妻奴婢部曲為主捕得並同身自捕獲皆除其罪注云餘條相容隐爲捕得凖此假如上條将吏受使追捕罪人致失者相容隱捕得亦與自捕得同故云亦凖此即他人捕得若罪人已死謂自死及被他人殺者皆同及自首又各於罪人上更减一等緫减罪人罪二等諸隣里被強盗及殺人告而不救助者杖一百聞而不救助者减一等力勢不能赴救者速告随近官司若不告者亦以不救助論其官司不即救助者徒一年竊盗者各减二等䟽議曰依禮五家為隣五隣為里既同邑落隣居接續而被強盗及殺人者皆須逓告即救助之若告而不救助者杖一百雖不承告聲響相聞而不救助者减一等杖九十力勢不能赴救者謂賊強人少或老小羸弱不能赴救者速告随近官司若不告者亦以不救助罪科之其官司不即救助者依捕亡令有盗賊及傷殺者即告隨近官司村坊屯驛聞告之處率随近軍人及夫從發處追捕若其所在官司知而不即救助者徒一年竊盗各减二等謂隣里被竊盗承告而不救助者從杖一百上减聞而不救助者從杖九十上减官司承告不即救助者從徒一年上减諸征名已定及從軍征討而亡者一日徒一年一日加一等十五日絞臨對冦賊而亡者斬主司故縱與同罪凖此折下條䟽議曰征名已定謂衛士及募人征名已定訖及從軍征討而亡者一日徒一年一日加一等八日流三千里十五日絞若臨對冦賊謂壁壘相對矢石将交而亡者斬亦據應戰之人主司故縱與同罪謂主司知情容其亡避各與亡者罪同亡者合斬主司合絞注云下條凖此謂下條向防及在防未滿而亡者主司故縱亦各同罪其臨對㓂賊而有亡者但亡即坐不計日數及行逺近其有從軍征討而亡未滿十五日軍還者未還以前依征亡之法征還之後從軍還亡罪而斷将未還之日併滿軍還之日累科軍還而先歸者各减五等其逃亡者同在家逃亡法䟽議曰軍雖凱還須依部伍若不隨團隊而輙先歸者各减軍亡罪五等其逃亡者同在家逃亡法謂一日笞四十十日加一等罪止流二千里若軍還先歸一日徒一年上减五等合杖六十罪止徒一年半日若少從先歸日科日若多從有軍名亡法諸防人向防及在防未滿而亡者亦同折鎮人一日杖八十三日加一等䟽議曰防人向防謂上道訖逃走及在防年限未滿而亡者鎮人亦同一日杖八十三日加一等既無罪止之文加至流三千里亡日未到罪止鎮防日已滿者計應還之日同在家亡法累併為罪諸流徒囚役限内而亡者人未到配所而亡者折犯流徒應配及移鄉同折亦一日笞四十三日加一等過杖一百五日加一等䟽議曰流徒囚謂或流或徒者各在其役限内而亡者注云犯流徒應配及移鄉人未到配所而逃亡者各與流徒囚役限内而亡罪同一日笞四十三日加一等十九日合杖一百過杖一百五日加一等五十九日流三千里主守不覺失囚減囚罪三等即不滿半年徒者一人笞三十三人加一等罪止杖一百監當官司又减三等故縱者各與同罪䟽議曰主守謂主守囚徒之人及部領流移人等不覺囚亡减囚罪三等謂從囚本罪上减三等不從逃坐减之即不滿半年徒者謂徒役将滿餘日不滿半年徒而有逃亡者不計逃日而科唯據亡人之數為罪一人笞三十三人加一等謂四人亡合笞四十不覺二十二人亡即至罪止合杖一百監當官司又减三等謂减主守罪三等不覺二十二人亡者罪止杖七十故縱者各與同罪稱各者謂監當官司及主守各與亡囚本犯罪同諸宿衛人在直而亡者一日杖一百二日加一等即從駕行而亡者加一等䟽議曰宿衛人謂諸衛大将軍以下當畨衛士以上在直畨限内而有逃亡者一日杖一百二日加一等計一十七日流三千里直滿以後即同在家亡法即從駕行者以其陪從事重故加宿衛一等之坐亡者一日徒一年二日加一等十五日流三千里問曰衛士於宫城外守衛或於京城諸司守當或被配於王府上畨如此之徒而有逃亡者合科何罪答曰宫城之外兼及皇城京城若有逃亡罪亦與宿衛不别若其凖减三等之例即太輕於在家而亡是知守當雜犯有减三等之科逃亡之辜得罪與宿衛不異諸丁夫雜匠在役及工樂雜戸亡者人亦同折太常音聲一日笞三十十日加一等罪止徒三年主司不覺亡者一人笞二十五人加一等罪止杖一百故縱者各與同罪䟽議曰丁謂正役夫謂雜徭及雜色工匠諸司工樂雜户注云太常音聲人亦同丁夫雜匠並據在役逃亡工樂以下在家亡者亦是一日笞三十十日加一等罪止徒三年主司謂監當主司不覺逃亡者計人數坐之一人笞二十五人加一等四十一人逃亡即至罪止杖一百主司故縱者各與逃亡者同罪即人有課役全户亡者亦如之若有軍名而亡者加一等其人無課役及非全戸亡者减二等即女户亡者又减三等其里正及監臨主司故縱户口亡者各與同罪不知情者不坐䟽議曰人有課役謂或有課無役或有役無課而全户亡者亦如丁夫在役逃罪一日笞三十十日加一等罪止徒三年若有軍名而亡謂衛士掌閑駕士幕士之類名屬軍府者緫是有軍名其幕士屬衛尉駕士屬太僕之類不隷軍府者即不同軍名之例有軍名而亡者雖非全户加一等合流二千里其人無課役謂全户亡者其有課役謂非全户亡者各减有課役全户亡罪二等罪止徒二年若其人無課役又非全戸亡者又减二等罪止徒一年即女戸亡亦謂全戸而亡者又减三等緫减有課役亡者五等罪止杖一百婦女非全户亡又减二等合杖八十其里正及監臨主司折衝府於軍人亦同監臨之例故縱户口軍人亡者各與亡者罪同不知情者不坐問曰有軍名而亡於他處附貫課役如法唯無軍名合當何罪答曰逃亡之罪多據闕課無課之軰責其浮逰亦既編户見在課役如法凖式仍徴賦役附處復有課輸於官課役無違唯免軍名合罪依例逃亡自首减罪二等坐之仍勒還本所諸非亡而浮浪他所者十日笞十二十日加一等罪止杖一百即有官事在他所事了留住不還者亦如之若營求資財及學宦者各勿論闕賦役者各依亡法䟽議曰非亡謂非避事逃亡而流在他所者十日笞十二十日加一等一百九十日罪止杖一百即有官事已了留住不歸者亦同浮浪之罪若營求資財者謂貿遷有無逺求利潤及學宦者或負笈從師或棄繻求仕各遂其業故並勿論闕賦役者各依亡法謂因此不歸致闕賦役各準逃亡之法依状科罪若全户者罪止徒三年非全户者減二等諸官户官奴婢亡者一日杖六十三日加一等婢亦同折部曲私奴主司不覺亡者一口笞三十五口加一等罪止杖一百故縱官戸亡者與同罪奴婢準盜論即誘導官私奴婢亡者準盜論仍令備償䟽議曰官戸及官奴婢逃亡者一日杖六十三日加一等注云部曲私奴婢亦同部曲雖取良人之女其妻若逃亡罪同部曲主司不覺謂不覺官户官奴婢亡者一口笞三十五口加一等三十六口罪止杖一百故縱官户亡者同官户逃亡之罪罪止流凖加杖二百之法故縱官奴婢亡者凖盗論謂計贓五疋徒一年五疋加一等即誘導官私奴婢亡者謂不将入己導引令亡者並凖盗論五疋徒一年五疋加一等仍令備償故縱亡者得罪不償若誘導官户部曲亡者律無正文當不應得為從重杖八十與同行者同過致資給之罪諸在官無故亡者一日笞五十三日加一等過杖一百五日加一等邉要之官加一等䟽議曰在官謂在令式有貟見在官者無故私逃者一日笞五十三日加一等過杖一百五日加一等五十六日流三千里邉要之官户部式靈勝等五十九州為邉州此乃居邉為要亡者加罪一等謂品官以上一日杖六十三日加一等諸被囚禁拒捍官司而走者流二千里傷人者加役流殺人者斬從者絞若私竊逃亡以徒亡論亡者亦同折事發未囚而䟽議曰被囚禁不限有罪無罪但據状應禁者散禁亦同拒捍官司而強走者流二千里傷人者謂因拒捍傷主司及捕捉之人者加役流殺人者斬從者絞不至死者依首從法若私竊逃亡謂被囚禁而私逃者從上條流徒囚役限内而亡一日笞四十三日加一等過杖一百五日加一等此是事發更為合重其坐注云事發未囚謂罪人事發被追拒捍官司逃走及私竊逃亡亦與在禁逃亡罪同問曰有人據状不合禁身被官人枉禁拒捍官司逃走合得何罪答曰本罪不合囚禁枉被官人禁留雖即逃亡不合與囚亡之罪若有拒捍殺傷止同故殺傷法私竊逃亡同在家逃亡之罪若判案禁者雖本無罪亦同囚例諸主守不覺失囚者减囚罪二等若囚拒捍而走者又减二等皆聽一百日追捕限内能自捕得及他人捕得若囚已死及自首除其罪即限外捕得及囚已死若自首者各又追减一等䟽議曰主守者謂専當守囚之人典獄之類不覺失囚者减囚罪二等假失死囚合徒三年之類若囚拒捍強走力不能制又减二等皆聽一百日追捕限内能自捕得及他人捕得者不限親踈若囚已死及自歸首並除失囚之罪即百日限外捕得及囚已死若囚自首各又追减失囚本罪一等稱追减者謂失囚之罪已經断訖者仍更追减若已奏决者不在追减之例監當之官各减主守三等故縱者不給捕限即以其罪罪之未斷决間能自捕得及他人捕得若囚已死及自首各减一等司應坐當條不立折謂此篇内監臨主縱者並凖此法折捕訪限及不覺故䟽議曰監當之官謂檢校専知囚者即當直官人在直時其判官凖令合還而失囚者罪在當直之官各减主守三等謂减囚罪五等囚若拒捍而走得减囚罪七等之類故縱者不給捕限謂主守及監當之官故縱囚逃亡者並不給限捕訪即以其罪罪之者謂縱死囚得死罪縱流徒囚得流徒罪之類未断决間謂官當收贖者未断死及笞杖者未决能自捕得及他人捕得若囚已死及自首各减一等注謂此篇内監臨主司應坐當條不立捕訪限及不覺故縱者並準此法䟽議曰上條征人逃亡者主司故縱與同罪及流徒囚限内而亡監當官司不立捕限及不覺故縱如此之類並準此條為法諸部内容止他界逃亡浮浪者一人里正笞四十若有家口逃亡浮浪者一戸同一人為罪折謂經十五日以上者坊正村正同里正之罪四人加一等縣内五人笞四十十人加一等州隨所管縣通計為罪首佐職為從折皆以長官為各罪止徒二年其官户部曲奴婢亦同䟽議曰部内謂部界之内容止他界逃亡浮浪者一人里正笞四十謂容止經十五日以上始科里正之罪坊正村正部内容止逃亡亦同里正之罪若将家口逃亡浮浪者家口不限多少一戸同一人為罪四人加一等即五人逃亡及以浮浪笞五十二十五人杖一百三十七人徒二年縣内五人笞四十十人加一等九十五人合徒二年州隨所管縣通計為罪謂州管二縣者十人笞四十一百九十人徒二年管縣更多凖此通計為坐皆以長官為首佐職為從既無以下之文即明不及主典各罪止徒二年其容止官户部曲奴婢亦同良人之法若在軍役有犯者隊正以上折衝以下各凖部内有盗賊之法䟽議曰稱軍役有犯者謂於行軍征役之所容止逃亡浮浪即凖州縣以下得罪隊正隊副同里正校尉旅帥减隊正一等折衝果毅隨所管校尉多少為罪故云隊正以上折衝以下各凖部内有盗賊之法諸知情藏匿罪人若過致資給及亡叛之類折謂事發被追令得隱避者各减罪人罪一等資給亦同若卑㓜折藏匿無日限過致奴婢首匿主後知者與同罪即尊長匿罪人尊折藏隱匿状已成尊長知而聽之獨坐卑㓜部曲但已遣去而事發及匿得相容隱者之侣並不折長死後卑㓜仍匿者减五等尊長死後雖經匿人不合赦免赦後匿如故不知人有罪容寄之折坐小功已下亦同减例若赦前藏匿罪人而罪而匿罪人知情者皆坐不知者勿論折後知而匿者皆坐如律其展轉相使䟽議曰知情藏匿謂知罪人之情主人為相藏隱過致資給者謂指授道途送過險處助其運致并資給衣糧遂使凶人潜隐他所注云謂事發被追若非事發未是罪人故須事發被追始辯知情之状及亡叛之類謂逃亡或叛國雖未追攝行即可知過致資給令隱避者减罪人罪一等合流三千里之類稱之類者或有亡命山澤不從追喚皆是注藏匿無日限過致資給亦同若卑幼藏隱匿状已成尊長知而聽之獨坐卑幼部曲奴婢首匿主後知者與同罪䟽議曰藏匿無日限者謂不限日之多少但藏匿即坐過致資給亦同無日限若卑幼藏隱匿状既成以其同居得相容隱故尊長知而聽之獨坐卑幼尊長不坐部曲奴婢作首隱匿罪人主後知者與同罪謂同部曲奴婢各减罪人罪一等以主不為部曲奴婢隱故也注即尊長匿罪人尊長死後卑幼仍匿者减五等尊長死後雖經匿但已遣去而事發及匿得相容隱者之侣並不坐小功以下亦同减例䟽議曰謂尊長在日自匿罪人容其相隱尊長死後卑幼匿之如故亦不限日之多少减尊長罪五等總减罪人罪六等尊長死後雖經匿但發遣去後罪始發覺及匿得相容隱者之徒侣假有大功之親共人行盗事發被追俱來藏匿若紏其徒侣親罪即彰恐相連累故並不與罪小功以下亦同减例即例云小功以下相容隱减凢人三等合匿小功緦麻親之侣亦凖此例减之緫减罪人罪四等故云亦同减例注若赦前藏匿罪人而罪人不合赦免赦後匿如故不知人有罪容寄之後知而匿者皆坐如律䟽議曰赦前藏匿罪人而罪人不合赦免假有匿十惡人㑹赦十惡不合赦免赦後匿如故及不知人有罪容寄之後知而匿者並依藏匿之罪科之注其展轉相使而匿罪人知情者皆坐不知者勿論䟽議曰展轉相使匿罪人者假有甲知情匿罪人又嘱付乙令匿乙又嘱丙遣匿如此展轉相使匿者乙丙知是罪人得藏匿之罪不知情者無罪故云勿論罪人有數罪者止坐所知䟽議曰罪人有數罪謂或殺人或姦盜止坐所知者謂於所知之罪上减一等之類問曰有奴婢匿一流囚主後知之主合得何罪答曰有奴婢首匿流囚罪合减一等徒三年加杖二百主後知者與奴婢同科亦凖奴婢之罪合杖二百其應例减收贖各凖其主本法仍於二百上减贖若奴婢死後主匿如故即得自匿之罪一合凖奴婢為坐故唐律䟽議卷第二十八
