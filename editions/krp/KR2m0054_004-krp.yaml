front:
  text: 故唐律䟽議卷第四凢八條折名例諸犯罪已發及已配而更為罪者各重其事
  hash: sha256:4a0d6b7c6287f9fd528b130ab356f9b5f9442e02dcecf960b972633b00a2fca6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_004-1a}
body:
  text: 䟽議曰已發者謂已被告言其依令應三審者初告亦是發訖及已配者謂犯已配而更為笞罪以上者各重其後犯之事而累科之即重犯流者依留住法决杖於配所役三年䟽議曰犯流未斷或已斷配訖未至前所而更犯流者依工樂留住法流二千里决杖一百流二千五百里决杖一百三十流三千里决杖一百六十仍各於配所役三年通前犯流應役一年緫役四年若前犯常流後犯加役流者亦止緫役四年若已至配所而更犯者亦凖此䟽議曰已至配流之處而更犯流者亦準上解留住法决杖配役其前犯處近後犯處逺即於前配所科决不復更配逺流即累流徒應役者不得過四年若更犯流徒罪者準加杖例䟽議曰有犯徒役未滿更犯流役流役未滿更犯徒或徒流役内復犯徒流應役身者並不得過四年假有元犯加役流後又犯加役流前後累徒雖多役以四年為限若役未訖更犯流徒罪者準加杖例犯罪雖多累決杖笞者亦不得過二百問曰有人重犯流罪依留住法決杖於配所役三年未知此三年之役家無兼丁合準無兼丁例決杖以否荅曰流人雖無兼丁而無加杖之例三年之役本替流罪雖無兼丁不合加杖唯有元犯之流至配所應役者家無兼丁得準徒加杖其杖罪以下亦各依數决之累決笞杖者不得過二百其應加杖者亦如之䟽議曰累流徒應役四年限内復犯杖笞者亦依所犯杖笞數决或𥘉犯杖一百中間又犯杖九十後又犯笞五十前後雖有二百四十决之不得過二百其犯徒應加杖者亦如之假如工樂雜户官私奴婢等並合加杖縱令重犯流徒累决杖笞亦不得過二百諸年七十以上十五以下及廢疾犯流罪以下收贖流者不用此律至配所免居作折犯加役流反逆縁生流會赦猶䟽議曰依周禮年七十以上及未齓者並不為奴今律年七十以上七十九以下十五以下十一以上及廢疾為矜老小及疾故流罪以下收贖問曰上條贖章稱犯流罪以下聴贖此條及官當條即言收贖未知聽之與收有何差異荅曰上條犯十惡等有不聽贖處復有得贖之處故云聽贖其當徒官少不盡其罪餘罪收贖及矝老小廢疾雖犯十惡皆訐收贖此是隨文設語更無别例註犯加役流反逆縁坐流會赦猶流者不用此律至配所免居作䟽議曰加役流者本是死刑元無贖例故不許贖反逆縁坐流者逆人至親義同休戚處以縁坐重累其心此雖老疾亦不許贖㑹赦猶流者為害深重雖㑹大恩猶從流配此等三流特重常法故緫不許收贖至配所免居作者矜其老小不堪役身故免居作其婦人流法與男子不同雖是老小犯加役流亦合收贖徵銅一百斤反逆縁坐流依賊盜律婦人年六十及廢疾並免不入此流即雖謀反詞理不能動衆威力不足率人者亦皆斬父子母女妻妾並流三千里其女及妻妾年十五以下十一以上亦免流配徵銅一百斤婦人犯會赦猶流唯造畜蠱毒并同居家口仍配八十以上十嵗以下及篤疾犯反逆殺人應死者上請䟽議曰周禮三赦之法一曰㓜弱二曰老耄三曰戇愚今十嵗合於㓜弱八十是老耄篤疾戇愚之類並合三赦之法有不可赦者年雖老小情狀難原故反逆及殺人凖律應合死者曹司不斷依上請之式奏聴勑裁盜及傷人者亦收贖官當除免法折有官爵者各從䟽議曰盜者雖是老小及篤疾並為意在貪財傷人者老小疾人未離忿恨此等二事既侵損於人故不許全免令其收贖若有官爵者須從官當除免之法不得留官徵贖謂毆從父兄姊傷合除名盜五疋以上合免官毆凡人折支合官當之類問曰既云盜及傷人亦收贖者或强盜合死或傷五服内親亦合死刑未知並得贖否荅曰盗及傷人亦收贖但盜既不言强竊傷人不顯親踈直云收贖不論輕重爲其老小特𬒳哀矝設令强盜傷親合死據文並許收贖又問既稱傷人收贖即似不傷者無罪若有毆殺他人部曲奴婢及毆己父母不傷若為科斷荅曰奴婢賤隷唯於𬒳盗之家稱人自外諸條殺傷不同良人之限若老小篤疾律許哀矜雜犯死刑並不科罪傷人及盜俱入贖刑例云殺一家三人為不道注云殺部曲奴婢者非即驗奴婢不同良人之限唯因盜傷殺亦與良人同其應出罪者舉重以明輕雜犯死刑尚不論罪殺傷部曲奴婢明亦不論其毆父母雖小及疾可矜敢毆者乃為惡逆或愚癡而犯或情惡故為於律雖得勿論凖禮仍為不孝老小重疾上請聴裁又問八十以上十嵗以下盜及傷人亦收贖注云有官爵者各從除免當贖法未知本罪至死仍得以官當贖以否荅曰條有收贖之文注設除免之法止為矜其老疾非謂故輕其罪但雜犯死罪例不當贖雖有官爵並合除名既死無比徒之文官有當徒之例明其除免當法止據流罪以下若欲以官折死便是律外生文自須依法除名死依贖例餘皆勿論䟽議曰除反逆殺人應死盜及傷人之外悉皆不坐故云餘皆勿論九十以上七嵗以下雖有死罪不加刑配没者折縁坐應此侓折不用䟽議曰禮云九十曰耄七嵗曰悼悼與耄雖有死罪不加刑愛㓜養老之義也縁坐應配没者謂父祖反逆罪狀已成子孫七嵗以下仍合配没故云不用此律即有人教令坐其教令者若有贓應俻受贓者俻之䟽議曰悼耄之人皆少智力若有教令之者唯坐教令之人或所盜財物旁人受而將用既合備償受用者俻之若老小自用還徵老小故云有贓應俻受贓者俻之問曰悼耄者𬒳人教令唯坐教令之者未知所教令罪亦有色目以否荅曰但是教令作罪皆以所犯之罪坐所教令或教七嵗小兒毆打父母或教九十耄者斫殺子孫所教令者各同自毆打及殺凡人之罪不得以犯親之罪加於凡人諸犯罪時雖未老疾而事發時老疾者依老疾論䟽議曰假有六十九以下犯罪年七十事發或無疾時犯罪廢疾後事發並依上解收贖之法七十九以下犯反逆殺人應死八十事發或廢疾時犯罪篤疾時事發得入上請之條八十九犯死罪九十事發並入勿論之色故云依老疾論問曰律云犯罪時雖未老疾而事發時老疾者依老疾論事發以後未斷決然始老疾者若為科斷荅曰律以老疾不堪受刑故節級優異七十衰老不能徒役聽以贖論雖發在六十九時至年七十始斷衰老是一不可仍遣役身此是役徒内老疾依老疾論假有七十九犯加役流事發至八十始斷止得依老免罪不可仍配徒流又依獄官令犯罪逢格改者若格輕聽從輕依律及令務從輕法至於老疾者豈得配流八十之人事發與断相連者例從輕典斷依發時之法唯有疾人與老者理别多有事發之後始作疾狀臨時科斷須䆒本情若未發時已患至斷時成疾者得同疾法若事發時無疾断日加疾推有故作須依犯時實患者聽依疾例若在徒年限内老疾亦如之䟽議曰假有六十九以下配徒役或二年三年役限未滿年入七十又有配役時無病役限内成廢疾並聽準上法收贖故云在徒限内老疾亦如之又計徒一年三百六十日應贖者徵銅二十斤即是一斤銅折役一十八日計餘役不滿十八日徵銅不滿一斤數既不滿並宜免放犯罪時㓜小事發時長大依㓜小論䟽議曰假有七嵗犯死罪八嵗事發死罪不論十嵗殺人十一事發仍得上請十五時偷盜十六事發仍以贖論此名㓜小時犯罪長大事發依㓜小論諸彼此俱罪之贓為罪者折謂計贓䟽議曰受財枉法不枉法及受所監臨財物并坐贓罪依法與財者亦各得罪此名彼此俱罪之贓謂計贓為罪者及犯禁之物則没官物倍贓亦沒官折若盗人所盗之䟽議曰謂甲弩矛矟旌旗幡幟及禁書寳印之類私家不應有者是名犯禁之物彼此俱罪之贓以下並没官注若盜人所盜之物倍贓亦没官䟽議曰假有乙盜甲物丙轉盜之彼此各有倍贓依法並應還主甲既取乙倍備不合更得丙贓乙即元是盗人不可以贓􅓵盜故倍贓亦没官若有紏告之人應賞者依令與賞問曰私鑄錢事發所獲作具及錢銅或違法殺馬牛等肉如此之類律令無文未知合没官以否荅曰其肉及錢私家合有凖如律令不合没官作具及錢不得仍用毁訖付主罪依法科其鑄錢見有别格從格斷餘條有别格見行破律者並準此取與不和者無罪折雖和與䟽議曰取與不和謂恐喝詐欺強市有剩利強率歛之類雖和與者無罪謂去官而受舊官屬士庶饋與或和率歛或監臨官司和市有剩利或雇人而告他罪得實但是不應取財而與者無罪皆是若乞索之贓並還主䟽議曰強乞索和乞索得罪雖殊贓合還主稱並者從取與不和以下並徵還主即簿歛之物赦書到後罪雖决訖未入官司者並從赦原䟽議曰簿歛之物謂謀反大逆人家􅓵合没官者赦書到後罪人雖已决訖其物未入官司者並從赦原若簿歛之物已入所在官司守掌者並不合放免若罪未處决物雖送官未經分配者猶為未入䟽議曰若反逆之罪仍未處决罪人雖已斷訖其身尚存者物雖送官但未經分配者並從赦原即縁坐家口雖已配没罪人得免者亦免䟽議曰謂反逆人家口合縁坐没官罪人於後蒙恩得免縁坐者雖已配没亦從放免其奴婢同於資財不從縁坐免法問曰但是縁坐遇恩罪人得免其有罪人不合免者縁坐亦有免法以否荅曰謀反大逆罪極誅夷汚其室宅除惡務本罪人既不㑹赦縁坐亦不合原去取之宜皆隨罪人為法其謀叛已上道及殺一家非死罪三人支解人縁坐雖及家口其惡不同反逆又律文特顯反逆縁坐為與十惡同科不得請減及贖自同五流除名配流如法自餘縁坐流並得减贖不除名雖云合流得减贖者明即與反逆縁坐不同赦書若十惡不原非反逆縁坐人仍從恩免以其身非十惡又非反逆之家故也諸以贓入罪正贓見在者還官主及生産蕃息折轉易得他物見在折皆為䟽議曰在律正贓唯有六色强盜竊盜枉法不枉法受所監臨及坐贓自外諸條皆約此六贓為罪但以此贓而入罪者正贓見在未費用者官物還官私物還主轉易得他物者謂本贓是驢迴易得馬之類及生産蕃息者謂婢産子馬生駒之類問曰假有盜得他人財物即將興易及出舉别有息利得同蕃息以否其贓本是人畜展轉經歴數家或有知情及不知者如此蕃息若為處分荅曰律注云蕃折産息本㩀應産之類而有蕃息若是興生出舉而得利潤皆用後人之功本無財主之力既非孶生之物不同蕃息之限所得利物合入後人其有展轉而得知情者蕃息物並還前主不知情者亦入後人又問有人知是贓婢故買自幸因而生子合入何人荅曰知是贓婢本來不合交關違法故買意在姦偽贓婢所産不合從良止是生産蕃息依律隨母還主已費用者死及配流勿徵死者亦同折别犯流及身䟽議曰因贓斷死及以贓配流得罪既重多破家業贓已費用矜其流死其贓不徵若未經奏畫會赦免流死者徵贓如法畫訖會恩即同免例注云别犯流及身死者謂雖不因贓配流别為他罪流配及雖非身𬒳刑戮而别有死亡者本犯之贓費用已盡亦從免例餘皆徵之倍備折盗者䟽議曰除非身死及已配流其贓見在并已費用並在徵限故曰餘皆徵之盜者倍備謂盗者以其貪財既重故令倍備謂盗一尺徵二尺之類若計庸賃為贓者亦勿徵䟽議曰庸謂私役使所監臨及借車馬之屬計庸一日為絹三尺以受所監臨財物論賃謂碾磑邸店舟船之類須計賃價為坐既計庸賃為贓其贓元非正物故雖非會赦其贓並亦不徵餘條庸賃皆準此會赦及降者盗詐枉法猶徵正贓䟽議曰謂會赦及降唯盗詐枉法三色正贓猶徵各還官主盜者免倍贓故云猶徵正贓謂赦前事發者若赦後事發捉獲見贓準闘訟律徵之問曰枉法會赦正贓猶徵未知此贓還官還主須定明例荅曰彼此俱罪之贓例並合没雖復首得原罪正贓猶徵如法其贓追没於法何疑餘贓非見在及收贖之物限内未送者並從赦降原䟽議曰餘贓非見在赦前已費用盡若非轉易得他物及生産蕃息者皆非見在之贓及收贖之物者謂犯罪徵銅依令節級各依期限限内未送並從赦降原過限不送不在免限稱限内不送唯據贖銅餘贓舊無限約逢赦並皆放免其犯罪應贖徵銅送有期限違限不納會赦不原故云限内未送者唯為贖銅生文不為餘贓立制問曰收贖之人身在外處雖對面断罪又牒本貫徵銅未知以牒到本屬為期即㩀斷日作限荅曰依令任官應免課役皆㩀蠲符到日為限其徵銅之人雖對面断訖或有一身𬒳禁所屬在逺雖𬒳釋放無銅可輸符下本屬徵收須㩀符到徵日為限若取對面為定何煩更牒本屬諸平贓者皆據犯處當時物價及上絹估䟽議曰贓謂罪人所取之贓皆平其價直凖犯處當時上絹之價依令每月旬别三等估其贓平所犯旬估定罪取所犯旬上絹之價假有人蒲州盗鹽嶲州事發鹽已費用依令懸平即取蒲州中估之鹽凖蒲州上絹之價於嶲州斷決之類縱有賣買貴賤與估不同亦依估價為定問曰贓若見在犯處可以將贓對平如其先巳費損懸平若為準定又有獲贓之所與犯處不同或逺或近並合送平以否荅曰懸平之贓依令凖中估其獲贓去犯處逺者止合懸平若運向犯處準估其物即須脚價生産之類恐加瘦損非但姦僞斯起人粮所出無從同遣懸平理便適中又問在蕃有犯斷在中華或邊州犯贓當處無估平贓定罪從何取中荅曰外蕃既是殊俗不可牒彼平估唯於近蕃州縣準估量用合宜無估之所而有犯者於州府詳定作價平功庸者計一人一日為絹三尺牛馬駞騾驢車亦同䟽議曰計功作庸應得罪者計一人一日為絹三尺牛馬駞騾驢車計庸皆準此三尺故云亦同其船及碾磑邸店之類亦依犯時賃直䟽議曰自船以下或大小不同或閑要有異故依當時賃直不可準常賃為估邸店者居物之處為邸估賣之所為店稱之類者鋪肆園宅品目至多略舉宏綱不可備載故言之類庸賃雖多各不得過其本價䟽議曰假有借驢一頭乘經百日計庸得絹七疋二丈驢估止直五疋此則庸多仍依五疋為罪自餘庸賃雖多各準此法諸略和誘人若和同相賣䟽議曰不和為略前已解訖和誘者謂彼此和同共相誘引或使為良或使為賤限外蔽匿俱入此條輕重之制自從本法若和同相賣者謂兩相和同共知違法及略和誘部曲奴婢若嫁賣之即知情取買䟽議曰上文皆據良人此論部曲客女奴婢等略和誘義並與上同或得而自留或轉將嫁賣或乞人亦同其知情娶買者謂從略和誘以下不問良賤共知本情或娶或買限外不首自為蔽匿及藏逃亡部曲奴婢䟽議曰藏匿無日限謂知是部曲奴婢逃走故將藏匿者署置官過限及不應置而置䟽議曰在令置官各有員數員外剩置是名過限案職制律官有員數而署置過限及不應置而置注云謂非奏授者在此雖有奏授亦同蔽匿於格令無員而置是名不應置而置詐假官假與人官及受假者䟽議曰詐假官者身實無官假為職任流内流外得罪雖别詐假之義並同或自造告身或雇倩人作或得他人告身而自行用但於身不合為官詐將告身行用皆是其假與人官者謂所司假授人官或偽奏擬或假作曹司判𥙷及受假者謂知假而受之若詐死私有禁物者及禁書之類折謂非私所應有䟽議曰詐死者或本心避罪或䂓免賦役或因犯逃亡而遂詐死之類私有禁物者注云謂非私所應有者謂甲弩矛矟之類及禁書謂天文圖書兵書七曜暦等是名禁書稱之類者謂玄象器物等既不是書故云之類赦書到後百日見在不首故蔽匿者復罪如𥘉媒保不坐䟽議曰赦書原罪皆據制書出日昧爽以前並從赦免惟此蔽匿條中乃云赦書到後百日此據赦書所至之處别取百日為限見在不首故蔽匿者謂人物及所假官等見在故蔽隱藏而不首出並復罪如𥘉𥘉者謂如犯罪之初贓物應徵及倍悉從𥘉犯本法若人有轉易在他所但其人見在不首皆為故蔽匿其媒保不坐者謂嫁娶有媒賣買有保既經赦原無問百日内外雖不自首並皆不坐其限内事發雖不自首非蔽匿承者亦為蔽匿折雖限内但經問不䟽議曰從略和誘以下私有禁物以上謂赦書到後事發之所百日内發者雖不自首亦非蔽匿以其限尚未充故得無罪注雖限内但經問不承者亦為蔽匿䟽議曰上云限内事發雖不自首非蔽匿謂限内事發經問即承為無隱心乃非蔽匿其經問不承雖在限内仍同蔽匿之法即有程期者計赦後日為坐䟽議曰程者依令公案小事五日程中事十日程大事二十日程及公使各有行程如此之類是為有程期者律有大集校閲違期不到之條亦有計帳等在令各有期限此等赦前有違經恩不待百日但赦出後日仍違程期者即計赦後違日為坐赦後並須準事給程以為期限其因犯逃亡經赦免罪限外不首者止坐其亡不論本罪日限外計之折謂赦書到後百䟽議曰謂赦前犯罪因即逃亡會赦之後罪皆原免赦後百日仍不自首止有逃亡之坐更不論其本罪又如征防逃亡會赦免罪計百日限外征防仍自未還須計征防之日以為逃亡定罪限内流例若還即同在家亡法即軍人上畨因犯逃走經赦當下亦同常亡之律注謂赦書到後百日限外計之䟽議曰上論蔽匿既以百日之外為限此逃亡之坐亦以百日限外計之諸會赦應改正徵收經責簿帳而不改正徵收者各論如本犯律養子私入道詐復除避本業折謂以嫡為庶以庶為嫡違法臨主守之官私自借貸及借貸人財物畜産之折増減年紀侵隱園田脱漏户口之類須改正監徵收折類湏䟽議曰前條以百日為限此據赦後經責簿帳即須改正徵收仍有隱欺不改從正者皆如本犯得罪其應改正徵收具如此注注謂以嫡為庶以庶為嫡違法飬子䟽議曰依令王公侯伯子男皆子孫承嫡者傳襲無嫡子立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曾玄以下準此若不依令文即是以嫡為庶以庶為嫡又準令自無子者聽養同宗於昭穆合者若違令養子是名違法即工樂雜户當色相養者律令雖無正文無子者理準良人之例注私入道詐復除避本業䟽議曰私入道謂道士女冠僧尼同不因官度者是名私入道詐復除者謂課役俱免即如太原元從給復終身没落外蕃投化給復十年放賤為良給復三年之類其有不當復限詐同此色是為詐復除避本業謂工樂雜户太常音聲人各有本業若廻避改入他色之類是名避本業注増減年紀侵隱園田脱漏户口之類須改正䟽議曰増減年紀謂増年入老減年入中小者其有増减雖不免課役亦是侵隱園田謂人侵他園田及有私隠盗貿賣者脱漏户口者全户不附為脱隱口不附為漏稱之類者謂増加疾狀脱漏工樂雜户之類會赦以後經責簿帳即須改正若不改正亦論如本犯之律注監臨主守之官私自借貸及借貸人財物畜産之類須徵收䟽議曰監臨謂於臨綂部内主守謂躬親保典之所者以官財物畜産私自借貸及將官物畜産私借貸人者及車船之屬同財物鷹犬之屬同畜産故言並須徵収問曰上條會赦以百日為限下文會赦乃以責簿為期若有上條赦後百日内責簿帳隱而不通者下條未經責簿帳經問不承合得罪否答曰上條以罪重故百日内經問不承罪同蔽匿限内雖責簿帳事終未發縱不吐實未得論罪後條犯輕赦後經責簿帳不通即得本罪經年不經責簿帳據理亦未有辜雖復經問不承未合得罪又問蔽匿之事限内未首及應改正簿帳未通乃有非是物主傍人言告未知告者得罪以否答曰赦前之罪各有程期限内事發律許免罪終須改正徴収告者理不合坐故唐律䟽議卷四
