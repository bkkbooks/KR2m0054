front:
  text: 故唐律䟽議卷第十凡一十九條折職制諸制書有誤不即奏聞輒改定者杖八十官文書誤不請官司而改定者笞四十知誤不奏請而行者亦如之輒飾文者各加二等
  hash: sha256:302564160efd91a02d93dced196f5684410c00db217a4606ae4779f6ee66e176
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_010-1a}
body:
  text: 䟽議曰制書有誤謂㫖意參差或脱剰文字於理有失者皆合覆奏然後改正施行不即奏聞輒自改定者杖八十官文書謂常行文書有誤於事改動者皆須請當司長官然後改正若有不請自改定者笞四十知制書誤不奏知官文書誤不請依錯施行亦如之制書誤得杖八十官文書誤得笞四十依公式令下制勑宣行文字脱誤於事理無改動者勘檢本案分明可知即改從正不須覆奏其官文書脫誤者諮長官改正輒飾文字者各加二等謂非動事脩飾其文制書合杖一百官文書合杖六十若動事自從詐増減法諸上書若奏事誤犯宗廟諱者杖八十口誤及餘文書誤犯者笞五十䟽議曰上書若奏事皆須避宗廟諱有誤犯者杖八十若奏事口誤及餘文書誤犯者各笞五十即為名字觸犯者徒三年若嫌名及二名偏犯者不坐言徴不言在言在不言徵之類折嫌名謂若禹與雨丘與區二名謂䟽議曰普天率土莫匪王臣制字立名輙犯宗廟諱者合徒三年若嫌名者則禮云禹與雨謂声嫌而字理殊丘與區意嫌而理不别及二名偏犯者謂複名而單犯並不坐謂孔子母名徵在孔子云季孫之憂不在顓臾即不言徵又云祀不足徵即不言在此色既多故云之類諸上書若奏事而誤杖六十口誤減二等不失折口誤勿論折事者䟽議曰上書謂書奏特達奏事謂靣陳有誤者杖六十若口誤減二等合笞四十若口奏雖誤事意無失者不坐上尚書省而誤笞四十餘文書誤笞三十脱剰折誤謂錯失者折文字及䟽議曰上尚書省而誤者謂内外百司應申尚書省而有文字脱剩及錯失者合笞四十餘文書誤者謂非上尚書省凡是官文書誤者合笞三十即誤有害者各加三等原之當言千疋而言十折有害謂當言勿原而言類折疋之䟽議曰上書奏事誤有害者合杖九十上尚書省誤有害者合杖七十餘文書誤有害者合杖六十是名各加三等注云有害謂當言勿原而言原之當言千疋而言十疋之類稱之類者自須以類求之類例既多事非一端假有犯罪當言原之而言勿原當言勿原而言原之承誤已行决及原放訖者此即當條雖有罪名所為重者自從失出入論不可直從有害加三等若誤可行非上書奏事者勿論知不容有異議折可行謂案省可言甲由之類折當言甲申而䟽議曰上尚書省以下雖誤案驗可行者皆不坐可行者謂案驗其狀省察是非不容更有别議當言甲申之日而言甲申之日如此之類是案省可知雖誤皆不合罪諸事應奏而不奏不應奏而奏者杖八十應言上而不言上報而行亦同折雖奏上不待不應言上而言上及不由所管而越言上應行下而不行下及不應行下而行下者各杖六十䟽議曰應奏而不奏者謂依律令及式事應合奏而不奏或格令式無合奏之文及事理不須聞奏者是不應奏而奏並合杖八十應言上者謂合申上而不言上注云雖奏上不待報而行亦同謂事合奏及己申上應合待報者皆須待報而行若不待報而輙行者亦同不奏不申之罪若據文且奏且行或申奏知不須待報者不當此坐不應言上者依律令及格式不遣言上而輙言上及不由所管而越言上者假謂州管縣都督管州州縣事須上省皆須先申所管州府不申而越言上者并事應行下而不行下不應行下而行下者謂應出符移関牒刺而不出行下不應出符移關牒刺而出行下者各杖六十諸公文有本案事直而代官司署者杖八十代判者徒一年亡失案而代者各加一等䟽議曰公文謂在官文書有本案事直唯須依行或奏狀及符移關解刺牒等其有非應判署之人代官司署案及署應行文書者杖八十若代判者徒一年其亡失案而代者各加一等代署者杖九十代判者徒一年半此皆謂事直而代者若有増減出入罪重者即從重科依令授五品以上畫可六品以下畫聞代畫者即同増減制書其有制可字侍中所注止當代判之罪諸受制出使不返制命輙干他事者徒一年半以故有所廢闕者徒三年餘使妄干他事者杖九十以故有所廢闕者徒一年越司侵職者杖七十䟽議曰受制勑出使事訖皆須返命奏聞若不返命更干預他事者徒一年半以故有所廢闕者徒三年餘使謂非制使妄干他事者杖九十以故有所廢闕者徒一年越司侵職者謂設官分職各有司存越其本局侵人職掌杖七十其受三后及皇太子令出使不返命得罪依減制勑一等諸聞父母若夫之䘮匿不舉哀者流二千里䘮制未終釋服從吉若忘哀作樂人等折自作遣徒三年雜戱徒一年即遇樂而聽及參預吉席者各杖一百䟽議曰父母之恩昊天莫報荼毒之極豈若聞䘮婦人以夫為天哀類父母聞䘮即須哭泣豈得擇日待時若匿而不即舉哀者流二千里其嫡孫承祖者與父母同䘮制未終謂父母及夫䘮二十七月内釋服從吉若忘哀作樂注云自作遣人等徒三年其父卒母嫁及為祖後者祖在為祖母若出妻之子並居心䘮之内未合從吉若忘哀作樂自作遣人等亦徒三年雜戯徒一年樂謂金石絲竹笙歌皷舞之類雜戯謂樗蒲䨇陸彈碁象博之屬即遇樂而聽謂因逢奏樂而遂聽者参預吉席謂遇逢禮晏之席参預其中者各杖一百聞期親尊長䘮匿不舉哀者徒一年䘮制未終釋服從吉杖一百大功以下尊長各逓減二等卑㓜各減一等䟽議曰期親尊長謂祖父母曽髙父母亦同伯叔父母姑兄姊夫之父母妾為女君此等聞䘮即須舉發若匿不舉哀者徒一年䘮制未終謂未踰期月釋服從吉者杖一百大功尊長匿不舉哀杖九十未踰九月釋服從吉杖八十小功尊長匿不舉哀杖七十未踰五月釋服從吉杖六十緦麻尊長匿不舉哀笞五十未踰三月釋服從吉笞四十其於卑㓜匿不舉哀及釋服從吉各減當色尊長一等出降者謂姑姊妹本服期出嫁九月若於九月内釋服從吉者罪同期親尊長科之其服數止凖大功之月餘親出降凖此若有殤降為七月之類亦凖所降之月為服數之限罪依本服科之其妻既非尊長又殊卑㓜在禮及詩此為兄弟即是妻同於㓜問曰聞䘮不即舉哀於後擇日舉訖事發合得何罪荅曰依禮斬衰之哭徃而不返齊衰之哭若往而返大功之哭三曲而偯小功緦麻哀容可也準斯禮制輕重有殊聞䘮雖同情有降殺期親以上不即舉哀後雖舉訖不可無罪期以上從不應得為重法大功從不應得為輕小功以下哀容可也不合科罪若未舉事發者各從不舉之坐又問居期䘮作樂及遣人作律條無文合得何罪荅曰禮云大功將至辟琴瑟鄭注云亦所以助哀又云小功將至不絶樂喪服云古者有死於室中者即三月為之不舉樂况乎身服期功心忘寕戚或遣人作樂或自奏𬋩絃既玷大猷須加懲誡律雖無文不合無罪從不應為之坐期䘮從重杖八十大功以下從輕笞四十緦麻卑㓜不可重於釋服之罪諸府號官稱犯祖父名而冐榮居之祖父母父母老疾無侍委親之官即妄増年狀以求入侍及冐哀求仕者徒一年除及在心喪内者折謂父母喪禫制未䟽議曰府有正號官有名稱府號者假若父名衛不得於諸衛任官或祖名安不得任長安縣職之類官稱者或父名軍不得作將軍或祖名卿不得居卿任之類皆須自言不得輙受其有貪榮昩進冐居此官祖父母父母老疾委親之官謂年八十以上或篤疾依法合侍見無人侍乃委置其親而之任所妄増年狀以求入侍者或未年八十及本非篤疾乃妄増年八十及篤疾之狀及冐哀求仕者謂父母之䘮二十五月大祥後未滿二十七月而預選求仕從府號官稱以下各合處徒一年注云謂父母喪禫制未除但父母之䘮法合二十七月二十五月内是正喪若釋服求仕即當不孝合徒三年其二十五月外二十七月内是禫制未除此中求仕名為冐哀合徒一年若釋去禫服而求仕自從釋服從吉之法及在心喪内者謂妾子及出妻之子合降其服皆二十五月内為心喪若祖父母父母及夫犯死罪被囚禁而作樂者徒一年半䟽議曰祖父母父母及夫犯死罪𬒳囚禁而子孫及妻妾作樂者以其不孝不義虧斁特深故各徒一年半諸指斥乘輿情理切害者斬涉乘輿者上請折言議政事乖失干非切害者徒二年䟽議曰指斥謂言議乗輿原情及理俱有切害者斬注云言議政事乖失而因渉乘輿者上請謂論國家法式言議是非而因渉乘輿者與指斥乘輿情理稍異故律不定刑名臨時上請非切害者徒二年謂語雖指斥乘輿而情理非切害者處徒二年對捍制使而無人臣之禮者絞競者非折因私事鬪䟽議曰謂奉制勑使人有所宣告對使拒捍不依人臣之禮既不承制命又出拒捍之言者合絞注云因私事鬪競者非謂不渉制勑别因他事私自鬪競或雖因公事論競不干預制勑者並從毆詈本法諸驛使稽程者一日杖八十二日加一等罪止徒二年䟽議曰依令給驛者給銅龍傳符無傳符處爲𥿄劵量事緩急注驛数於符契上據此驛数以行程稽此程者一日杖八十二日加一等罪止徒二年若軍務要速加三等有所廢闕者違一日加役流以故䧟敗户口軍人城戍者絞䟽議曰軍務要速謂是征討掩襲報告外境消息及告賊之類稽一日徒一年十一日流二千里是為加三等有所廢闕者謂稽遲廢闕經畧掩襲告報之類違一日加役流称日者須滿百刻為由驛使稽遲遂䧟敗户口軍人衛士募人防人一人以上及諸城戍者絞若臨軍對冦告報稽期者自從乏軍興之法諸驛使無故以書寄人行之及受寄者徒一年若致稽程以行者為首驛使為從即為軍事警急而稽留者以驛使為首行者為從者從前條折有所廢闕其非專使之書而便寄者勿論䟽議曰有軍務要速或追徵報告如此之類遣專使乘驛齎送文書無故謂非身患及父母喪者以所齎文書别寄他人送之及受寄文書者各徒一年若致稽程謂行不充驛数計程重於徒一年者即以受書行者為首驛使為從此謂常行驛使而立罪名即為軍事警急報告征討掩襲救援及境外消息之類而稽留罪在驛使故以驛使為首行者為從注云有所廢闕者從前條謂違一日加役流以故䧟敗户口軍人城戍者絞其非專使之書謂非故遣專使所齎之書因而附之其使人及受寄人並勿論諸文書應遣驛而不遣驛及不應遣驛而遣驛者杖一百若依式應須遣使詣闕而不遣者罪亦如之䟽議曰依公式令在京諸司有事須乘驛及諸州有急速大事皆合遣驛而所司乃不遣驛非應遣驛而所司乃遣驛若違者各杖一百又依儀制令皇帝踐祚及加元服皇太后加號皇后皇太子立及赦元日刺史若京官五品以上在外者並奉表䟽賀州遣使餘附表此即應遣使詣闕而不違者亦合杖一百故云罪亦如之諸驛使受書不依題署誤詣他所者隨所稽留以行書稽程論減二等若由題署者誤坐其題署者䟽議曰文書行下各有所詣應封題署者具注所詣州府使人乃不依題署誤詣他所因此稽程者隨所稽留準上條行書稽留之程減二等謂違一日杖六十二日加一等罪止徒一年若有軍務要速者加三等有所廢闕者從加役流上減二等徒二年半以故有所䧟敗亦從絞上減二等徒三年若由題署者誤謂元題署者錯誤即罪其題署之人驛使不坐諸増乘驛馬者一疋徒一年一疋加一等驛馿折應乘減一等折而乘馬者主司知情與同罪不知情者勿論司准此折餘條驛䟽議曰依公式令給驛職事三品以上若王四疋四品及國公以上三疋五品及爵三品以上二疋散官前官各逓減職事官一疋餘官爵及無品人各一疋皆数外别給驛子此外須將典吏者臨時量給此是令文本數數外剩取是曰増乘一疋徒一年一疋加一等應乘驛驢而乘驛馬者又準駕部式六品以下前官散官衛官省司差使急速者給馬使迴及餘使並給驢即是應乘驢之人而乘馬各減増乘馬罪一等主司知情與同罪者謂驛馬主司知増乘驛馬及知應乘驢而乘馬等情者皆與乘者同罪不知情者勿論餘條驛司凖此者謂枉道及越過齎私物之類諸乘驛馬輒枉道者一里杖一百五里加一等罪止徒二年越至他所者各加一等詣之處折謂越過所經驛不換馬者杖八十不坐折無馬者䟽議曰乘驛馬者皆依驛路而向前驛若不依驛路别行是為枉道越至他所者注云謂越過所詣之處假如從京使向洛州無故輙過洛州以東即計里加枉道一等經驛不換馬至所經之驛若不換馬者杖八十因而致死依廐牧令乘官畜産非理致死者備償無馬者不坐謂在驛無馬越過者無罪因而致死者不償問曰假有使人乘驛馬枉道五里經過反覆往來便經十里如此犯者從何科断荅曰律注枉道本慮馬勞又恐行遲於事稽廢既有往來之理亦計十里科論諸乘驛馬齎私物衣仗者折謂非隨身一斤杖六十十斤加一等罪止徒一年驛驢減二等驛驢折餘條此折凖䟽議曰乘驢馬者唯得齎隨身所須衣仗衣謂衣被之属仗謂弓刀之類除此之外輙齎行者一斤杖六十十斤加一等罪止徒一年驛驢減二等謂一斤笞四十罪止杖九十餘條驛驢凖此者謂稽程枉道之類諸條驛驢得罪皆凖馬減二等諸在外長官及使人於使處有犯者所部屬官等不得即推者須申上聽裁若犯當死罪留身待報違者各减所犯罪四等䟽議曰在外長官謂都督刺史折衝果毅鎮將縣令關監等長官及諸使人於使處有犯者所部次官以下及使人所詣之司官屬並不得輙即推鞫若無長官次官執魚印者亦同長官皆須先申上司聽裁若犯當死罪謂據紏告之狀合死者散留其身待上報下違者各減所犯罪四等留身者印及管鑰付知事次官其銅魚仍留擬勘勑符雖復留身未合追納諸用符節事訖應輸納而稽留者一日笞五十二日加一等十日徒一年䟽議曰依令用符節並由門下省其符以銅爲之左符進内右符在外應執符人有事行勘皆奏出左符以合右符所在承用事訖使人將左符還其使若向他處五日内無使次者所在差專使送門下省輸納即執之使還折其節大使出日笞五十二日加一等十日徒折亦即送納應輸納而稽留者一一年雖更違日罪亦不加其傳符通用𥿄作乘驛使人所至之處事雖未訖且納所司事了欲還然後更請至門下送輸既無限日行至即納違日者既非銅魚之符不可依此科斷自依𥿄劵加官文書稽罪一等其禁苑門符及交廵魚符若木契等於餘條得減罪二等輸納稽遲者準例亦減二等若本契應發兵者同上符節之罪諸公事應行而稽留及事有期㑹而違者一日笞三十三日加一等過杖一百十日加一等罪止徒一年半䟽議曰凡公事應行者謂有所部送不限有品無品而輙稽留及事有期㑹謂若朝集使及計帳使之類依令各有期㑹而違不到者一日笞三十三日加一等過杖一百十日加一等罪止徒一年半但事有期限者以違限日為坐無限者以付文書及部領物後計行程為罪即公事有限主司符下乖期者罪亦如之若誤不依題署及題署誤以致稽程者各減二等䟽議曰公事有限與上文事有期㑹義同上文謂在下有違此文謂主司下符乖期者罪亦如之並同違期㑹之罪若使人不依題署錯詣他所及由曹司題署有誤而致稽程者減二等謂違一日笞三十減二等笞十罪止徒一年半減二等各合杖一百故唐律䟽議卷第十
