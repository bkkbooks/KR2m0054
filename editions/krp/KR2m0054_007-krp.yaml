front:
  text: 故唐律䟽議卷第七凡一十八條折衛禁
  hash: sha256:46a2348b69235e4a3b80bbc1df5df3c20119c4ee69b7b8249d2e6b58b3c2dff2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_007-1a}
body:
  text: 䟽議曰衛禁律者秦漢及魏未有此篇晉太宰賈充等酌漢魏之律隨事増損創制此篇名爲宫衛律自宋洎于後周此名並無所改至於北齊将関禁附之更名禁衛律隨開皇改爲衛禁律衛者言警衛之法禁者以関禁爲名但敬上防非於事尤重故次名例之下居諸篇之首諸闌入太廟門及山陵兆域門者徒二年不應折闌謂入者折入而䟽議曰太者大也廟者貌也言皇祖神主在於中故名太廟山陵者三秦記云秦謂天子墳云山漢云陵亦通言山陵言髙大如山如陵兆域門者孝經云卜其宅兆既得吉兆周兆以為塋域皆置宿衛防守應入出者悉有名籍不應入而入為䦨入各得二年徒坐其入太廟室即條無罪名依下文廟減宫一等之例減御在所一等流三千里若無故登山陵亦同太室之坐越垣者徒三年太社各减一等守衛不覺减二等時専當者折守衛謂持䟽議曰不從門為越垣者牆也越太廟山陵垣者各徒三年越太社垣及䦨入門皆減太廟一等守衛謂軍人於太廟山陵太社防守宿衛者若不覺越垣及䦨入各减罪人罪二等守衛謂防守衛士晝夜分時専當者非持時者不坐主帥又减一等監當者折主帥謂親䟽議曰主帥謂領兵宿衛太廟山陵太社三所者但當檢校即坐不限官之髙下又减守衛人罪一等唯坐親監當者故縱者各與同罪監門各凖此折餘條守衛及䟽議曰故縱者謂知其不合入而聽入或知越垣而不禁並與犯法者同罪餘條守衛宫殿及諸防禁之處皆有監門及守衛故縱不斍得罪各凖此諸䦨入宫門徒二年條應坐者亦凖此折闌入宫城門亦同餘䟽議曰宫門皆有籍禁不應入而入者得徒二年嘉徳等門爲宫門順天等門爲宫城門䦨入得罪並同餘條應坐者亦凖此宫門得罪謂越垣及防禁違式冐代之類殿門徒二年半持仗者各加二等棒之屬餘條折仗謂兵器杵凖此折稱仗䟽議曰太極等門爲殿門䦨入者徒二年半持仗各加二等謂將兵器杵棒等䦨入宫門得徒三年䦨入殿門得流二千里兵器謂弓箭刀矟之類杵棒或鐡或木為之皆是故云之屬餘條謂下文持仗及至御在所者并持仗强盗者並凖此入上閣内者絞内諸門不立籍禁而得通内者折若有仗衛同闌入殿門法其宫此折亦准䟽議曰上閤之内謂太極殿東為左上閤殿西為右上閤其門無籍應入者準勑引入䦨入者絞若有仗衛者上閤之中不立仗衛内坐喚仗始有仗入其有不應入而入者同䦨入殿門徒二年半持仗者流二千里其宫内諸門不立籍禁謂肅章䖍化等門而得通内而輙闌入者並得絞罪若有仗衛亦同殿門法若持仗及至御在所者斬上請折迷誤者䟽議曰謂持仗入上閤及通内諸門并不持仗而至御在所者各斬迷誤謂非故闌入者上請聽勑即應入上閤内但仗不入而持寸刃入者亦以闌入論䟽議曰應入上閤内者謂奉勑喚仗隨仗引入者得帶刀子之屬若仗不在内而持寸刃入者即以闌入論若非兵器杵棒之屬止得絞刑持仗者斬仗雖入不應帶横刀而帶入者減二等䟽議曰仗雖入上閤内不應帶横刀而輙帶入者減罪二等合徒三年即䦨入御膳所者流三千里入禁苑者徒一年䟽議曰御膳所謂供御造食之處其門亦禁不應入而入者流三千里䦨入禁苑者徒一年禁苑謂御苑其門有籍禁御膳以下闌入雖即持仗及越垣罪亦不加諸䦨入者以踰閾為限至閾未踰者宫門杖八十殿門以内逓加一等䟽議曰閾者謂門限闌入之人行至門限未踰過若至宫門得杖八十宫内人不應入殿門至殿門閾未踰者杖九十殿内宿衛人至上閤閾未踰者杖一百其越殿垣者絞宫垣流三千里皇城减宫垣一等京城又减一等䟽議曰越過殿垣者無問出入俱至絞刑宫垣流三千里皇城謂朱雀等門之垣合徒三年京城謂明徳等門之垣又减一等合徒二年半諸於宫殿門無籍及冐承人名而入者以闌入論䟽議曰應入宫殿在京諸司皆有籍其無籍應入者皆引入其無籍不得人引而詐言有籍及冒承人名而入者宫門徒二年殿門徒二年半持仗者各加二等守衛不知冐名情宫門杖八十殿門以内逓加一等䟽議曰守衛謂持時專當親主籍者應入者唱名始過不知冐名情者不識其人無心私許宫門杖八十殿門以内逓加一等但云不知冒情不云不知無籍而入者但冒承人名有所慿據人難識盡是故罪輕無籍而入者準䦨入不覺故縱法諸宿衛者以非應宿衛人冐名自代及代之者入宫内流三千里殿内絞䟽議曰宿衛者謂大將軍以下衛士以上以次當上宿衛宫殿上畨之日皆據籍書若以非應宿衛人謂非諸衛大將軍軍人以外冐名自代及代之者入宫内並流三千里殿内並絞若以應宿衛人直者折謂以下自代及代之者各以䦨入論䟽議曰應宿衛人謂諸衛所管應入宫殿上畨者注云謂已下直者未當上畨人之色自代及代之者彼此各以䦨入罪論闌入之罪一准上法主司不覺減二等知而聽行與同罪判遣及親折主司謂應條主司准此折監當之官餘䟽議曰主司謂折衝府及諸衛判兵之官不覺人冒名自代及代之者減所犯人罪二等若知相代之情而聽行者各與同罪若冒代之事從府而來即以府官所由為首餘官節級為從坐衛官不覺逓減府官一等如相冐之罪由衛即以衛官所由為首餘官節級為罪府司不坐及親監當之官者諸衛當上人兵各有本部主帥雖從别團配隷亦是監當之限餘條主司准此者謂一部律内但言主司並不覺減二等知而聽行與同罪諸因事得入宫殿而輙宿及容止者各減闌入二等䟽議曰因事得入宫殿者謂朝叅辭見迎輸造作之類不合宿者而輙宿及容止所宿之人各減闌入罪二等在宫内徒一年殿内徒一年半即將領人入宫殿内有所迎輸造作門司未受文牒而聽入及人數有剰者各以闌入論至死者加役流䟽議曰將領人入宫殿有所迎出有所輸送造作謂宫内營造門司皆須得牒然後聽入若未受文牒而輙聽入及所入人數有剰者門司各以闌入論若入上閤内及御在所應至死者門司各加役流將領主司知者各減䦨入罪一等入者知又減五等不知者不坐䟽議曰將領主司謂領人迎輸造作知門司未受文牒及人數有剰而領入者各減䦨入罪一等宫内徒一年半殿内徒二年入上閤内及至御在所流三千里入者知又減五等稱又者謂減將領者罪五等不知情入者不坐問曰將領主司知者减䦨入罪一等不言不知若有不知而領入者合得何罪荅曰上條冒名相代各以䦨入罪論主司不覺减二等注云餘條主司準此明將領主司不知得减知情二等上既有例故不生文諸應入宫殿未著門籍而入雖有長籍但當下直而輙入者各减䦨入五等䟽議曰應入宫殿在京諸司入宫殿者皆著門籍若未著門籍而輙入或雖有長籍謂宿衛長上人雖一日上两日下皆有長籍當下之日未合入宫殿但當下直而輙入各減䦨入罪五等即宿次未到而輙宿及籍在東門而從西門入者又減二等䟽議曰即宿次未到者謂應供奉之官及内官當直各有宿次其宿次未到而輙宿及籍在東門而從西門入者依令非應從正門入者各從便門著籍假如西門有籍而從東門入或側門有籍而從正門入各又减罪二等謂减䦨入罪七等諸在宫殿内作罷而不出者宫内徒一年殿内徒二年御在所者絞不出者亦同折闢仗應出而䟽議曰在宫殿内作罷者丁夫雜匠之徒作了其有應出不出者宫内徒一年殿内徒二年御在所者絞若有闢仗應出者並即須出有不出者得罪與御在所同問曰在宫殿内及御在所作罷不出律有正文若在上閤内不出律既無文若為處斷荅曰上閤之内例與闢仗所同應出不出此條無文者為上文注云闢仗應出不出與御在所同上閤内有宫人同御在所合絞御不在又無宫人减二等不覺及迷誤者上請䟽議曰營作之所院宇或别不覺衆出或迷誤失道錯向别門非故不出皆得上請將領主司知者與同罪不知者各减一等主司折闢仗者各準此折搜人不盡䟽議曰將領主司謂領人入者若知有人不出不即言者與不出人同罪其不知者有人不出各减一等謂御所宫殿内各得减一等闢仗主司謂領人搜索闢仗者其闢仗内有人不出各準將領主司之罪故云各準此若於闢仗内誤遺兵仗者杖一百須乃坐折弓箭相䟽議曰闢仗之内人皆出盡所有兵器亦不合留或有誤遺兵仗者合杖一百兵仗之法應須堪用或遺弓無箭或遺箭無弓俱不得罪故云弓箭相須乃坐問曰誤遺弩弓無箭或遺箭無弩或有楯而無矛各得何罪荅曰弓箭相須乃坐弩箭無弓與常箭不别有弩弓無箭亦非兵仗之限楯則獨得無用亦共有弓無箭義同諸登髙臨宫中者徒一年殿中加二等䟽議曰宫殿之所皆不得登髙臨視若視宫中徒一年視殿中徒二年若於宫殿中行御道者徒一年外越過者非折有横道及門仗䟽議曰宫殿中當正門為御道人臣並不得行其在宫殿中及宫城中而行御道者各徒一年若有横道殿前即有横階殿内亦有横道殿門宫門内外立仗之處仗外雖無横道越過者無罪宫門外者笞五十誤者各减二等䟽議曰嘉徳等門為宫門順天等門為宫城門準例宫城門有犯與宫門同今云宫門外者即順天門外行御道者得笞五十誤者各减二等謂從殿中至宫門外誤行御道者各得减二等其登髙臨宫殿中有誤者亦减罪二等諸宿衛人被奏劾者本司先収其仗違者徒一年中直者折謂在宫殿䟽議曰宿衛人謂衛士巳上諸衛大將軍以下有犯法被奏劾者本司謂當衛主司及主帥等先収其仗違而不収者得徒一年本司及主帥各以所管應収仗而不収者一人得罪謂在宫殿中當上直者宫外宿不在此限諸應出宫殿而門籍巳除輙留不出及被告劾巳有公文禁止籍雖未除不得輙入宫殿犯者各以䦨入論䟽議曰應出宫殿謂故住行使假患畨下事故等依令門籍當日即除門籍已除其人輙留不出雖無假患等事及被告劾已有文牒令禁止籍雖未除皆不得輙入宫殿如有犯者各以䦨入論諸犯䦨入宫殿非御在所者各減一等無宫人處又减一等宫人者不减折入上閤内有䟽議曰請條稱䦨入宫殿得罪者其宫殿之所御若不在各得減䦨入罪一等雖是宫殿見無宫人又得减罪一等假若在外諸宫有宿衛人防守而䦨入合徒一年之類若入上閤内有宫人雖非御在所亦合絞無宫人處亦减二等即雖非䦨入輙私共宫人言語若親為通傳書信及衣物者絞䟽議曰文云雖非闌入即是得應入宫之人不得私與宫人言語其親為通傳書信衣物者謂親於宫人處領得書信衣物將出及將外人書信衣物付與宫人訖者並得絞坐諸宿衛人已配仗衛而官司輙廽改者杖一百若不依職掌次第擅配割及别驅使者罪亦如之䟽議曰依式衛士以上應當畨宿衛者皆當衛見在長官割配於職掌之所各依仗衛次第坐立此即職掌已定若官司無故輙廽改者合杖一百應須廽改者不坐若不依職掌次第而擅配隷乖於式文及將别處驅使者亦各杖一百其有私使計庸重者從重論諸奉勑以合符夜開宫殿門符雖合不勘而開者徒三年若勘符不合而為開者流二千里其不承勑而擅開閉者絞䟽議曰奉勑以合符夜開宫殿門依監門式受勑人具録須開之門并入出人帳宣勑送中書中書宣送門下其宫内諸門城門即與見直諸衛及監門大將軍將軍中郎將郎將折衝果毅内各一人俱詣閤覆奏御注聽即請合符門鑰監門官司先嚴門仗所開之門内外並立隊燃炬火對勘符合然後開之符雖合不勘而開者徒三年若勘符不合即合執奏不奏而為開者流二千里其不承勑而擅開閉者俱合絞罪若錯符錯下鍵及不由鑰而開者杖一百即應閉忘誤不下鍵應開毁管鍵而開者徒一年䟽議曰若錯符謂非所開閉之符及錯下鍵謂不依常法及不由鑰而開謂不用鑰而得閉者此三事各合杖一百即應閉忘誤不下鍵及應開毁管鍵而開者各徒一年謂牝者為管牡者為鍵其皇城門减宫門一等京城門又减一等䟽議曰皇城門謂朱雀等門從合符夜開以下得罪各減宫門一等其京城門謂明徳等門亦從合符夜開以下得罪各减皇城門一等即宫殿門閉訖而進鑰違遲者殿門杖一百經宿加一等每經一宿又加一等宫門以外逓减一等其開門出鑰遲又各逓减進鑰一等䟽議曰依監門式駕在大内宫城門及皇城門鑰匙每去夜八刻出閉門二更二點進入京城門鑰每去夜十三刻出閉門二更二點進入違此不進是名進鑰違遲殿門杖一百經宿加一等合徒一年每經一宿又加一等既無罪止之文加至流三千里宫門以外逓减一等者即宫門及宫城門進鑰違遲亦合杖九十經宿杖一百每經一宿又加一等罪止徒三年皇城門杖八十罪止徒二年半京城門杖七十罪止徒二年其開門出鑰遲者依監門式宫城門及皇城門四更二點出鑰開門京城門四更一點出鑰開門違式出鑰遲者各逓減進鑰一等即是殿門杖九十宫門及宫城門杖八十皇城門杖七十京城門杖六十駕在大明興慶宫及東都進請鑰匙依式各有時刻違者並依此科罪諸於宫殿門雖有籍皆不得夜出入若夜入者以䦨入論無籍入者加二等即持仗入殿門者絞夜出者杖八十䟽議曰於宫殿門有籍之人唯合晝日入出若因夜開閉而輙入者以䦨入論無籍夜入者加二等即持仗入殿門者絞有籍無籍等夜出宫殿門俱杖八十若得出入者剰將人出入各以其罪罪之被將者知情各減一等不知情不坐䟽議曰謂奉勑听入出之人剰將人入出者各以其罪罪之有籍者以䦨入論無籍者加二等將出者杖八十被將者知情謂被將之人知剰將之情各減前所將罪一等不知情者不坐諸向宫殿内射所及者折謂箭力宫垣徒二年殿垣加一等箭入者各加一等即箭入上閤内者絞御在所者斬䟽議曰射向宫垣得徒二年殿垣徒二年半箭入者宫内徒二年半殿内徒三年即箭入上閤内者絞御在所者斬謂御在所宫殿若非御在所各減一等無宫人處又減一等皆謂箭及宫殿垣者若箭力應及宫殿而射不到者從不應為重不應及者不坐問曰何以知是御在所宫殿荅曰向宫垣射得徒二年殿垣徒二年半準其得罪與䦨入正同上條䦨入宫殿非御在所各減一等無宫人又減一等即驗車駕不在又無宫人䦨入上閤者合徒三年此條箭入上閤絞御在所斬得罪既同䦨入明為御在宫中御若不在皆同上條减法箭入宫中徒一年半殿中徒二年入上閤内徒三年放彈及投瓦石者各减一等所及者折亦謂人力䟽議曰放彈及投瓦石比箭罪輕放向宫垣徒一年半向殿垣徒二年入宫内徒二年殿内徒二年半入上閤内及御在所流三千里是為各减一等亦謂人力所及者據彈及投瓦石及宫殿方始得罪如應及不到亦從不應為重上减一等殺傷人者以故殺傷論䟽議曰射及放彈若投瓦石有殺傷人者以故殺傷論殺人者斬傷人者加闘殺傷一等即宿衛人於御在所誤㧞刀子者絞左右並立人不即執捉者流三千里䟽議曰宿衛人常執兵仗得帶刀子若在御所者非勑遣用不得輙㧞刀子其有誤㧞者絞左右並立人見其誤㧞皆須執捉不即執捉者流三千里若有别勑處分令用及仗内賜食者不坐但舉宿衛人為例者明餘人在御所亦不得誤㧞刀子其有誤㧞及傍人不即執捉一準宿衛人罪諸車駕行衝隊者徒一年衝三衛仗者徒二年隊間者折謂入仗䟽議曰車駕行幸皆作隊仗若有人衝入隊間者徒一年衝入仗間徒二年其仗衛主司依上例故縱與同罪不覺减二等誤者各减二等䟽議曰若有人誤入隊間得杖九十誤入仗間得徒一年若畜産唐突守衛不備入宫門者杖一百衝仗衛者杖八十䟽議曰畜産唐突謂走逸入宫門守衛不備者杖一百入宫城門罪亦同若入殿門律更無文亦同宫門之坐衝仗衛者杖八十仗衛者在宫殿及駕行所得罪並同諸宿衛人應上畨不到及因假而違者一日笞四十三日加一等過杖一百五日加一等罪止徒二年䟽議曰宿衛人應上畨而不到及因得假而違者一日笞四十三日加一等滿十九日合杖一百若過杖一百五日加一等罪止徒二年計三十四日即當罪止問曰假有宿衛人畨期五日未滿因一日假遂違不上為當止得四日違罪唯復累至罪止而科荅曰畨期有限限内有故須請假日滿即須赴畨違假不上凖日科断其人四日之外即當下直下日不勞請假豈合計日累科四日之外明知不坐又問應上不到因假而違者並罪止得徒二年若準三十四日罪止便是月畨之外今解下畨之日不坐恐理未盡荅曰依式三衛去京二千里外六十日上嶺南為季上三十四日罪止為包逺道生文
