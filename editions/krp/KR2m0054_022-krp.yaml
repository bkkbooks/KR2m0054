front:
  text: 故唐律䟽議卷第二十二凡一十六條折闘訟諸流内九品以上毆議貴者徒一年傷重及毆傷五品以上若五品以上毆傷議貴各加凡闘傷二等
  hash: sha256:49ec779a9626fb29eb8346485c4f0b60f3f2648a9e7b189f669d1a52166bb492
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_022-1a}
body:
  text: 䟽議曰流内九品以上六品以下毆議貴者徒一年傷重謂他物毆凡人内損吐血合杖一百毆議貴合加二等徒一年半此名傷重其六品以下毆傷五品以上若五品以上毆傷議貴或毆不傷亦各加凡闘毆二等諸監臨官司於所統屬官及所部之人有髙官而毆之及官品同自相毆者並同凡闘法䟽議曰監臨官司於所統屬佐官以下及所管部屬之人有髙官而監臨官司毆之者同凡闘法不計階品爲其所管故也及官品同謂六品以下九品以上或五品以上非議貴者議貴謂三品以上一品以下並爲官品同並謂不相管隷自相毆者並同凡闘之罪假有勲官騎都尉而毆上柱國其上柱國旣非議貴罪與凡闘同其統屬下司毆上司者長官以外皆據品科其有府及鎮戍隷州者亦為統屬之限問曰州叅軍事毆州内縣令帶五品以上勲官得為統屬同凡闘以否荅曰縣令是州内統屬之官假令品髙州官毆之準上文各同凡闘之法諸拒州縣以上使者杖六十毆者加二等傷重者加闘傷一等時拒捍不從者折謂有所徴攝權即被禁掌而拒捍及毆者各加一等䟽議曰拒州縣以上使稱以上者省臺寺監及在京諸司等並是遣使追攝拒捍不從者杖六十毆者加二等杖八十傷重者謂他物毆内損吐血凡闘一百加闘傷一等徒一年註云謂有所徵攝權時拒捍不從者即被禁掌拒捍及毆者各加二等謂有司禁録或復散留而輙拒捍合杖七十毆所司者合杖九十傷重者謂重一百杖以上加凡闘二等若使人官品髙者各依本品加是名各加一等諸部曲毆良人者部曲同折官户與加凡人一等入於死折加者加奴婢又加一等若奴婢毆良人折跌支體及瞎其一目者絞死者各斬䟽議曰名例律稱部曲者妻亦同此即部曲妻不限良人及客女毆傷良人者注云官戸與部曲同加凡人一等謂加凡闘毆傷一等注云加者加入於死謂部曲毆良人損二事以上及因舊患令至篤疾斷舌及毁敗隂陽凡毆流三千里者部曲加一等合死此名加入於死奴婢又加一等謂加凡闘二等若奴婢毆良人折跌支體及瞎其一目者絞跌體瞎目各罪止徒三年即明毆良人准凡人相毆罪合流者各入死罪因毆致死各斬其良人毆傷殺他人部曲者减凡人一等奴婢又减一等若故殺部曲者絞奴婢流三千里䟽議曰良人毆傷或殺他人部曲者减凡人一等謂毆殺者流三千里折一支者徒二年半之類奴婢又减一等毆殺者徒三年折一支徒二年之類若不因闘故殺部曲者合絞若謀而殺訖亦同其故殺奴婢者流三千里即部曲奴婢相毆傷殺者各依部曲與良人相毆傷殺法犯本條無正文者並凖此折餘條良人部曲奴婢私相相侵財物者不用此律䟽議曰部曲闘毆殺奴婢流三千里折一支徒二年半折一齒杖一百奴婢毆部曲損傷二事以上及因舊患令至篤疾及斷舌毁敗隂陽者絞折一支者流二千里折一齒者徒一年半若部曲故殺奴婢亦絞是名各依部曲與良人相毆傷殺法餘條良人部曲奴婢私相犯謂謀殺人穿地得屍不更埋之類私相犯本條無正文者並凖此條加减之法相侵財物者各依凡人相侵盗之法故云不用此律諸奴婢有罪其主不請官司而殺者杖一百無罪而殺者徒一年與主同下條部曲準此折期親及外祖父母殺者䟽議曰奴婢賤隷雖各有主至於殺戮宜有禀承奴婢有罪不請官司而輙殺者杖一百無罪殺者謂全無罪失而故殺者徒一年注云期親及外祖父母殺者與主同謂有罪殺者杖一百無罪殺者徒一年故云與主同下條部曲者下條無期親及外祖父母傷殺部曲罪名若有傷殺亦同於主故云準此諸主毆部曲至死者徒一年故殺者加一等其有愆犯决罰致死及過失殺者各勿論䟽議曰主毆部曲至死者徒一年不限罪之輕重故殺者加一等謂非因毆打本心故殺者加一等合徒一年半其有愆犯而因决罰致死及過失殺之者並無罪問曰妾有子或無子毆殺夫家部曲奴婢合當何罪或有客女及婢主幸而生子息自餘部曲奴婢而毆得同主期親以否荅曰妾毆夫家部曲奴婢在律雖無罪名輕重相明須從减例下條云妾毆夫之妾子减凡人二等妾子毆傷父妾加凡人三等則部曲與主之妾相毆比之妾子與父妾相毆法即妾毆夫家部曲亦減凡人二等部曲毆主之妾加凡人三等若妾毆夫家奴婢減部曲一等奴婢毆主之妾加部曲一等至死者各依凡人法其有子者若子為家主母法不降於兒並依主例若子不為家主於奴婢止同主之期親餘條妾子為家主及不為家主各准此客女及婢雖有子息仍同賤隷不合别加其罪諸部曲奴婢過失殺主者絞傷及詈者流䟽議曰部曲奴婢是為家僕事主須存謹敬又亦防其二心故雖過失殺主者絞若過失傷主及詈者流不言里數者為止合加杖二百故也即毆主之期親及外祖父母者絞已傷者皆斬詈者徒二年過失殺者減毆罪二等傷者又減一等䟽議曰部曲奴婢毆主之期親謂異財者及毆主之外祖父母者絞傷者皆斬罪無首從詈者徒二年過失殺者减毆罪二等合徒三年加杖二百過失傷者又减一等合徒二年半加杖一百八十毆主之緦麻親徒一年傷重者各加凡人一等小功大功逓加一等入於死折加者加死者皆斬䟽議曰部曲奴婢毆主之緦麻親者無問正服義服並徒一年傷重者謂毆罪重於徒一年各加凡闘一等假有部曲用他物毆主緦麻親内損吐血依凡人合杖一百犯良人加一等緦麻加凡人一等合徒一年半若奴婢以他物故毆主之緦麻親傷準凡人合杖九十奴婢犯良人加二等此條傷重又加一等合徒一年半故云傷重各加凡人一等小功大功逓加一等謂奴婢用他物毆傷小功親徒二年大功徒二年半是名逓加一等注云加者加入於死假如部曲毆主大功親折支準凡人徒三年部曲加一等合流二千里其大功親加三等合絞即是加者加入於死其緦麻小功部曲有犯各從本罪準此加例加應入死者處絞死者皆斬謂奴婢部曲毆主緦麻以上親至死者皆斬罪無首從諸毆緦麻小功親部曲奴婢折傷以上各减殺傷凡人部曲奴婢二等大功又减一等過失殺者各勿論䟽議曰毆緦麻小功親部曲謂毆身之緦麻小功親部曲減凡人部曲二等謂緫减三等假如毆折肋者凡人合徒二年减三等合杖一百若毆奴婢折齒凡人合徒一年奴婢减二等緦麻小功親奴婢又减二等緫减四等合杖七十故云折傷以上各减凡人部曲奴婢二等大功又减一等謂毆小功部曲折齒緫减四等合杖七十若毆大功奴婢合杖六十自外毆折傷以上各準此例為减法其有過失殺緦麻以上部曲奴婢者各無罪諸毆傷妻者減凡人二等死者以凡人論毆妾折傷以上減妻二等䟽議曰妻之言齊與夫齊體議同於㓜故得減凡人二等死者以凡人論合絞以刃及故殺者斬毆妾不傷無罪折傷以上減妻罪二等即是減凡人四等若殺妾者止減凡人二等若妻毆傷殺妾與夫毆傷殺妻同乃坐即至死折皆須妻妾告妻仍為不睦折者听餘人告殺過失殺者各勿論䟽議曰若妻毆傷殺妾謂毆者減凡人二等死者以凡人論注云皆須妻妾告乃坐即外人告者無罪至死者听餘人告餘人不限親踈皆得論告殺妻仍為不睦妻即是緦麻以上親準例自當不睦為稱以凡人論故重明此例過失殺者各勿論為無惡心故得無罪諸妻毆夫徒一年若毆傷重者加凡闘傷三等乃坐折須夫告死者斬䟽議曰妻毆夫徒一年若毆傷重者加凡闘傷三等假如凡人以他物毆傷人内損吐血合杖一百加凡闘三等處徒三年此是計加之法須夫告乃坐謂要須夫告然可論罪因毆致死者斬媵及妾犯者各加一等入於死折加者加過失殺傷者各減二等䟽議曰依令五品以上有媵庶人以上有妾故媵及妾犯夫者各加妻犯夫一等謂毆夫者徒一年半毆傷重者加凡闘傷四等加者加入於死若毆夫折一支或瞎一目凡闘徒三年加四等合絞是名加入於死過失殺者各減二等謂妻妾媵過失殺者並徒三年假如妻折夫一支加凡人三等流三千里過失減二等合徒二年半若媵及妾折夫一支合絞過失減二等合徒三年自餘折傷各随輕重準此加減之例即媵及妾詈夫者杖八十若妾犯妻者與夫同媵犯妻者減妾一等妾犯媵者加凡人一等殺者各斬者與妾同折餘條媵無文䟽議曰媵及妾詈夫者杖八十若妾犯妻者與犯夫同謂毆者徒一年半死者斬媵犯妻者減妾一等毆者徒一年傷重者從重上減妾一等妾犯媵者加凡人一等謂毆者笞五十折一齒者徒一年半之類死者各斬謂媵及妾犯夫及妻若妾犯媵毆殺者各斬注云餘條媵無文者謂上條毆妾折傷以上減妻二等之類妻妾相犯及犯夫當條無文者各與妾同諸毆緦麻兄姊杖一百小功大功各逓加一等尊属者又各加一等傷重者各逓加凡闘傷一等死者斬即毆從父兄姊準凡闘應流三千里者絞䟽議曰毆緦麻兄姊謂本宗及外姻有緦麻服者並同毆此兄姊杖一百小功徒一年大功徒一年半尊属者又各加一等謂毆緦麻尊属徒一年小功尊属徒一年半大功尊属依禮唯夫之祖父母及夫之伯叔父母此並各有本條自從毆夫之祖父母絞夫之伯叔父母減夫犯一等徒二年半即此大功無尊属加法傷重者各逓加凡闘傷一等謂他物毆緦麻兄姊内損吐血準凡人杖一百上加一等合徒一年小功徒一年半大功徒二年尊属又加一等即緦麻徒一年半小功徒二年之類因毆致死者各斬假有毆小功尊属折二支加凡人三等不云加入於死罪止逺流即毆從父兄姊準凡闘應流三千里者謂損二事以上或因舊患令至䔍疾断舌及毁敗隂陽此是凡闘應流三千里於從父兄姊犯此流者合絞若尊長毆卑㓜折傷者緦麻减凡人一等小功大功逓減一等死者絞即毆殺從父弟妹及從父兄弟之子孫者流三千里若以刃及故殺者絞䟽議曰若尊長毆卑㓜折傷者謂折齒以上旣云折傷即明非折傷不坐因毆折傷緦麻卑㓜減凡人一等小功減二等大功減三等假有毆緦麻卑㓜折一指凡闘合徒一年減一等杖一百小功減二等杖九十大功減三等杖八十其毆傷重者逓減各準此因毆致死者尊長各絞即毆殺從父弟妹謂堂弟妹及從父兄弟之子孫謂堂姪及姪孫者流三千里若以刃殺及不因闘而故殺者俱合絞刑諸毆兄姊者徒二年半傷者徒三年折傷者流三千里刃傷及折支若瞎其一目者絞死者皆斬詈者杖一百伯叔父母姑外祖父母各加一等即過失殺傷者各減本殺傷罪二等䟽議曰兄姊至親更相急難彎弧垂泣義切匪他輙有毆者徒二年半毆傷者徒三年折傷者或折齒或折手足指但折一事即合處流若用刃傷及折支或跌其支體若瞎其一目謂全失其明者各得絞罪因毆致死者首從皆斬詈者合杖一百其伯叔父母姑外祖父母各加一等謂加犯兄姊一等毆者徒三年傷者流二千里文無加入死折傷亦止流坐詈者徒一年過失殺若傷各減本殺傷二等謂過失殺者各減死罪二等合徒三年過失折齒者從流減二等之類其過失之罪兄姊以下並同減二等若毆殺弟妹及兄弟之子孫依本服論折曽玄孫者各外孫者徒三年以刃及故殺者流二千里過失殺者各勿論䟽議曰毆殺弟妹及兄弟之子孫者兄弟子期服孫即小功注云曾玄孫者各依本服論兄弟曾孫為緦麻玄孫當袒免服紀旣踈恩情轉殺声折去故云各依本服論謂毆殺曾孫合絞玄孫旣當袒免自依凡人法此條毆兄弟曾玄孫旣依本服即明上條毆殺從父兄弟曾玄孫降服已盡亦同凡人其毆殺弟妹及兄弟之子孫外孫者各徒三年以刃及故殺者流二千里過失殺者各勿論諸詈祖父母父母者絞毆者斬過失殺者流三千里傷者徒三年若子孫違犯敎令而祖父母父母毆殺者徒一年半以刃殺者徒二年故殺者各加一等即嫡繼慈養殺者又加一等過失殺者各勿論䟽議曰子孫於祖父母父母情有不順而輙詈者合絞毆者斬律無皆字案文可知子孫雖共毆殺原情俱是自毆雖無皆字各合斬刑下條妻妾毆夫之祖父母父母傷者皆斬舉輕明重皎然不惑過失殺者流三千里傷者徒三年見血為傷傷無大小之限若子孫違犯敎令謂有所敎令不限事之大小可從而故違者而祖父母父母即毆殺之者徒一年半以刃殺者徒二年故殺者各加一等謂非違犯敎令而故殺者手足他物殺徒二年用刃殺徒二年半即嫡継慈養殺者為情踈易違故又加一等律文旣云又加即以刃故殺者徒二年半上加一等徒三年違犯敎令以刃殺者二年上加一等徒二年半毆殺者一年半上加一等徒二年過失殺者各勿論即有違犯敎令依法决罰邂逅致死者亦無罪諸妻妾詈夫之祖父母父母者徒三年告乃坐折須舅姑毆者絞傷者皆斬過失殺者徒三年傷者徒二年半䟽議曰妻妾有詈夫之祖父母父母者徒三年注云須舅姑告乃坐毆者絞傷者皆斬罪無首從過失殺者徒三年傷者徒二年半即毆子孫之婦令廢疾者杖一百篤疾者加一等死者徒三年故殺者流二千里妾各減二等過失殺者各勿論䟽議曰祖父母父母毆子孫之婦令廢疾者依戸令腰脊折一支廢為廢疾合杖一百篤疾者兩目盲二支廢加一等合徒一年死者徒二年故殺者謂不因毆詈無罪而輙殺者流二千里若毆妾令廢疾杖八十篤疾杖九十至死者徒二年故殺者徒二年半過失殺者各勿論諸妻妾毆詈故夫之祖父母父母者各減毆詈舅姑二等折傷者加役流死者斬過失殺傷者依凡論䟽議曰故夫謂夫亡改嫁者其被出及和離者非各減毆詈舅姑罪二等謂毆者徒三年詈者徒二年折齒以上者加役流死者斬無皆字即有首從過失殺傷者依凡論謂殺者依凡人法贖銅一百二十斤傷者各依凡人傷法徵贖其銅入被傷殺之家其舊舅姑毆子孫舊妻妾折傷以上各減凡人三等死者絞過失殺者勿論䟽議曰其舊舅姑毆子孫舊妻妾折傷以上各減凡人三等謂折指者合杖八十折一支者徒一年半之類死者絞既不言故殺者斬即是故殺者亦絞過失殺者勿論問曰子孫之婦夫亡守志其姑少寡改醮他人或被棄放此姑婦相犯者合得何罪荅曰子孫身亡妻妾改嫁舅姑現在此為舊舅姑今者姑雖被棄或已改醮他人子孫之妻孀居守志雖於夫家義絶母子終無絶道子旣如母其婦理亦如姑姑雖適人婦仍在室理依親姑之法不得同於舊姑若夫之嫡繼慈飬不入此條諸毆兄之妻及毆夫之弟妹各加凡人一等若妾犯者又加一等䟽議曰嫂叔不許通問所以逺别嫌疑毆兄之妻及毆夫之弟妹者禮敬頓乖故各加凡人一等若妾犯者又加一等謂妾毆夫之弟妹加妻一等緫加凡人二等夫之弟妹毆兄妾以凢人論即妾毆夫之妾子减凡人二等毆妻之子以凡人論若妻之子毆傷父妾加凡人一等妾子毆傷父妾又加二等依凡人法折至死者各䟽議曰即妾毆夫之妾子減凡人二等為匹敵之故得罪稍輕毆妻之子以凡人論為女君尊重故同凡闘若妻之子毆傷父妾加凡人一等妾子毆傷父妾又加二等稱又加者緫加三等若毆折一齒徒二年半之類注云至死者各依凡人法當條雖有加减至死者並與凡人同
