front:
  text: 進律表䟽臣無忌等言
  hash: sha256:77d09e05cfaf45915b9ea6b93f97d3ad98f53871f26970e66026613ff7c15c1a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_000-1a}
body:
  text: 秦以前君臣通稱朕尚書虞書帝曰來禹汝亦昌言禹曰帝予何言予思日孜孜則是臣於君前尚稱予也秦制天子稱朕臣下稱臣漢以後因之唐儀制令皇太子以下率土之内於皇帝皆稱臣唐本傳長孫無忌字輔機性通悟博渉書史始高祖兵渡河進謁長春宫授渭北道行軍典籖乃太宗文德順聖皇后長孫氏之兄也因輔政與李勣等一十九人撰成律䟽上表以進臣聞三才既分法星著於玄象易說卦立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而两之晉天文志太微帝座南蕃中二星曰端門東曰左執法廷尉之象也西曰右執法御史大夫之象也又貫索九星賤人之牢也牢口一星爲門欲其開九星皆明天下獄煩七星見小赦六星五星見大赦動則斧鑕用中空則更無又亢四星天子内朝緫攝天下奏事理獄錄功也又參伐十星主斬刈又爲天獄此言自天地人既分之後則刑法之星上著於天文也六位斯列習坎彰於易經易八卦三畫每卦之上各重八卦爲六十四卦則毎卦六畫初二三四五上爲六位易說卦六位而成章習坎卦體坎上坎下爲重習也坎隂也䧟也上六係于徽纆寘于叢棘重坎至于上六隂之極䧟之深故有刑獄之象如係之徽纆而寘于叢棘之中也又爾雅釋言坎律銓也郭璞注坎卦主法法律皆所以銓量輕重也故知出震乘時開物成務易說卦帝出乎震乾卦時乘六龍以御天係辭曰開物成務王弼注易通天下之志成天下之務莫不作訓以臨凾夏垂教以牧黎元訓亦教也凾方也方夏中國也文選七命曰凾夏謐静書序曰足以垂世立教牧養也左傳曰天生民而樹之君使司牧之黎元民也黎黑猶秦言黔首也漢文紀元元之民師古注元元善意也光武紀黎元所歸黎庶也元元猶言喁喁可矜之辭昔周后登極吕侯闡其茂範周穆王享國百年命吕侯爲司寇作書訓夏贖刑以誥四方名吕刑闡開茂大範法也虞帝納麓臯陶創其彞章舜典納于大麓孔安國注麓錄也堯使帝舜大錄萬機之政大禹謨曰臯陶惟兹臣庶㒺或干于正汝作士明于五刑創始制也彞常章典也大夫之述三言金篆騰其高軌左傳昭公十四年晉邢侯與雍子争鄐田乆而無成士景伯如楚叔魚攝理韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚罪邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子賂以買直鮒也鬻獄邢侯專殺其罪一也已惡而掠美爲昬貪以敗官爲墨殺人不忌爲賊夏書曰昬墨賊殺臯陶之刑也從之乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也治國制刑不隱於親三數叔魚之惡不爲末減曰義也夫可謂直矣平丘之會數其賄也以寛衛國晉不爲暴歸魯季孫稱其詐也以寛魯國晉不爲虐邢侯之獄言其貪也以正刑書晉不爲頗三言而除三惡加三利殺親益榮猶義也夫金篆者秦以前未有隷楷故字皆用篆言篆字而以金鑄之鍾鼎而紀其功也軌車轍已行之迹騰表異之也言大夫議刑之三言可以著之金篆而表其已行之迹也安衆之陳九灋玉牒播其弘規魏文侯師於里悝集諸國刑典造法經六篇一盜法二賊法三囚法四捕法五雜法六具法又漢相蕭何更加悝所造戸興廐三篇謂九章之律是爲九法玉牒者文選廣絶交論書玉牒而刻鍾鼎又魏都賦極棟宇之宏䂓規者所以爲圓法度之器也言蕭何安衆之陳九法可以書之玉牒而播揚其宏大之䂓也前哲比之以隄防往賢譬之以衘勒前漢刑法志制禮以止刑猶隄防溢水也後漢虞詡曰刑罰者人之衘勒也輕重失序則繫之以存亡白氏六帖刑法門議論輕重之序愼測淺深之量言用刑輕重失其序則繫民命之存亡寛猛乖方則階之以得䘮左傳昭公二十年鄭子產有疾謂子太叔曰我死子必爲政唯有德者能以寛服民其㳄莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寛難疾數月而卒太叔爲政不忍猛而寛鄭國多盗取人於萑蒲之澤太叔悔之曰吾早從夫子不及此興徒兵以攻萑蒲之盗盡殺之盗少止仲尼曰善哉政寛則民慢慢則紏之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和及子産卒仲尼聞之出涕曰古之遺愛也階所由之梯階言寛猛乖其方術則由之而有得失也泣辜慎罰文命所以㑹昌劉向說苑禹出見辜人問而泣之史記夏禹名文命文選蜀都賦天帝運期而㑹昌斮脛剖心獨夫於是盪覆書泰誓今商王受斮朝渉之脛剖賢人之心冬月見朝渉水者謂其脛耐寒斬而視之比干忠諫紂曰吾聞賢人之心有七孔剖而觀之又曰獨夫受孟子曰殘賊之人謂之獨夫盪覆也言紂爲周武王所㓕也三族之刑設禍起於望夷周罪人不孥謂罪止其身不及其家之人秦始作夷三族法謂父族妻族母族也望夷宫名趙高令婿閻樂弑秦二世之地謂秦因設三族之刑而身弑國亡也五虐之制興師亡於涿鹿史記軒轅乃習用干戈以征不享諸侯咸賔從而蚩尤最爲暴虐莫能伐應劭曰軒轅黃帝時蚩尤作亂不用帝命遂作五虐之刑大刑用甲兵其次用斧銊中刑用刀鋸其次用鑽笮薄刑用鞭扑軒轅乃徴師諸侯與蚩尤戰于涿鹿之野服䖍曰涿鹿山名在涿鹿郡遂擒殺蚩尤身首異處齊景網峻時英有踊貴之談時英指晏子而言晏嬰字平仲事齊景公左氏傳景公欲更晏子之宅晏子辭景公曰子居近市識貴賤乎於是景公繁於刑有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之景公爲是省於刑君子曰仁人之言其利博哉晏子一言而齊侯省刑踊刖者之屨也言受刑者多故踊爲之貴也周幽獄繁詩人致菀栁之刺毛詩小雅菀栁刺幽王也暴虐無親而刑罰不中也所以當塗撫運樂平除慘酷之刑魏闕當塗高乃漢末曹氏代漢䜟語當塗撫運言魏應運而爲君也魏司徒王朗字景興封樂平侯時鍾繇上䟽欲復肉刑詔令公卿共議朗議以爲繇欲輕減大辟之條以增益刖刑之數夫五刑之属著在律科或有減死一等之法不死即爲減施行巳乆不待逺假斧鑿於復肉刑然復有罪次也前丗仁者不忍肉刑之慘酷是以廢而不用不用以來歴年數百今復以之恐所減之文未彰於萬民之目而肉刑之問巳宣於宼讎之耳非所以來逺人也議者百餘人與朗同者多帝以吳蜀未平寢金行提象鎮南削煩苛之法晉以金德王天下故曰金行提象言取類於金也杜預字元凱爲鎮南大將軍與車騎將軍賈充等定律令既成預爲注觧乃奏之曰法者蓋繩墨之斷例非窮理盡性之書也故文約而例直名省而禁簡例直易見禁簡難犯易見則人知所避難犯則幾於刑措古之刑書銘之鍾鼎鑄之金石所以逺塞異端使無淫巧也今所注皆網羅法意格之以名分使用之者執名例以審趣舎伸繩墨之直去析薪之理也詔頒行於天下而體國經野御辨登樞周禮惟王建國辨方正位體國經野體國者營其國之宫城門涂如身之有四體經野者治其野之丘甸溝洫如機之有經緯登樞者北極爲天樞居其所而衆星拱之人君之象故人君即位曰登極亦曰登樞莫不崇寛簡以弘風樹仁惠以裁化書大禹謨臨下以簡御衆以寛詩序風風也上以風化下樹立也易係辭化而裁之景胄以之碩茂寳祚於是克崇尚書命汝典樂教胄子胄子長子也適子也景大也碩亦大也易繫辭聖人之大寳曰位祚國祚也崇高也言國家崇寛簡樹仁惠則本支繁茂國祚延長也徽猷列於緗圖鴻名勒於青史徽美也猷道也文選贈劉琨詩加其忠直宣其徽猷緗桑初生之色即淺黃色也文選序飛文染翰則卷盈乎緗帙言人君羙道具列於圖書鴻名大名也前漢司馬相如封禪書前聖之所以永保鴻名青史者古無𥿄凡書辭者殺竹汗爲簡書之文選江淹書並圖青史言人君之大名必勒書於青史暨炎靈委御人物道銷暨者及也炎者漢也漢以火德王天下故曰炎靈者漢靈帝也委御者文選魏都賦劉宗委馭漢至唐歷代已多此借漢以喻隋末之亂君失其馭而一時人物之道銷䘮也霧翳三光塵驚九服翳者蔽也三光者纂要曰日月星謂之三光以喻人君之明言羣邪如霧以蔽君之明也周書辨九服之國方千里乃其外曰侯服甸服男服采服衛服蠻服夷服鎮服蕃服是名九服言煙塵徧驚於九服之内也秋卿司於邦典高下在心周禮六典五曰刑典以誥邦國又秋官司寇帥其屬以佐王刑邦國劉馮事始舜以臯陶作士乃理獄之官周禮爲士師秦以李斯爲廷尉漢因之景帝嘗改爲大理梁爲秋卿唐爲司刑左傳曰高下在心謂不遵法度而用心不公也獄吏傳於爰書出没由已史記張湯傳湯父爲長安丞出湯爲兒守舎還爲䑕盜肉怒笞湯湯掘窟得盜䑕及餘肉劾䑕掠治傳爰書試鞫論報取鼠與肉磔堂下其父見之視其文辭如老獄吏大驚遂使書獄蘇林曰傳謂傳囚也爰易也以此書易其辭處鞫窮也張晏曰傳考證驗也爰書自證不知此言反受其罪訊考三日復問之知與前辭同也鞫一吏爲讀狀論其報行也此言獄吏傳爰書出入罪人皆由已也内史溺灰然而被辱史記御史大夫韓安國字長孺梁城安人也其後安國坐法抵罪縣獄吏田甲辱安國安國曰死灰獨不然乎甲曰然即溺之居無何梁内史闕漢遣使拜安國爲梁内史起徒中爲二千石甲亟走安國曰甲不就官我㓕而宗甲因肉袒謝安國笑曰可溺矣公等足爲治乎卒善遇之丞相見牘背而行賕史記漢絳侯周勃免相就國嵗餘每河東守行縣至絳周勃自畏恐誅常披甲令家人持兵以見之其後有人告勃欲反文帝四年下廷尉廷尉下其事長安逮捕勃治之勃恐不知置辭吏稍侵辱之勃以千金與獄吏獄吏乃書牘視之曰以公主爲證牘木簡也公主者孝文帝女也勃太子勝尚之故獄吏教引爲證勃之益封受賜盡以與薄昭及繫急昭爲言薄太后太后亦以無反事文帝朝太后以帽絮提文帝帽絮巾也太后曰絳侯綰皇帝璽將兵于北軍不以此時反今居一小縣頋反邪文帝既見絳侯獄辭乃謝曰吏事方驗而出之於是使使持節赦絳侯復爵邑絳侯既出曰吾甞將百萬然安知獄吏之貴乎賕者以財相謝也戮逮棄灰誅及偶語逮者及也史記衛鞅傳歩過六尺者有罰棄灰於道者被刑又史記秦始皇三十四年丞相李斯上䟽乃請史官非秦記皆燒之有敢偶語詩書者棄市注云禁民聚語畏其謗也長平痛積冤之氣史記秦將白起與趙將趙括戰於長平秦軍射殺括括軍敗卒四十萬降武安君計前秦已至上黨上黨民不樂爲秦而歸趙趙卒反覆非盡殺之恐爲亂乃挾詐而盡坑殺之言無罪四十萬人盡誅所以痛積冤之氣也司敗切瘐死之魂司敗者獄官也論語陳司敗問昭公知禮乎漢宣帝詔繫者或以掠笞若飢寒瘐死獄中朕甚痛之其令郡國嵗上繫囚以掠若瘐死者所主坐召御史課殿最以聞囚徒飢寒病死曰瘐死遂使五樓之羣争迴地軸十角之旅競入天田後漢諸賊銅馬大槍尤來上江青犢校檀五幡五樓富平獲索皆賊名號也春秋括地象云地有三千六百六軸十角者此皆形容隋將亡唐未興之時天下大亂也周禮五百人爲旅前漢天文志龍左角爲天田龍祥也晨見則祭之然此天田特借用其字謂兵亂於天子之境土也國歩於是艱難刑政於焉弛紊詩桑柔國歩蔑資朱子云歩猶運也刑政者論語道之以政齊之以刑文選辨亡論皇剛弛紊殷憂俟來蘇之后多難佇撥亂之君書仲虺之誥攸徂之民室家相慶徯予后后來其蘇注湯所徃之民皆喜曰待我君來其可蘇息多難者詩訪落曰未堪家多難漢高祖紀羣臣曰帝起微細撥亂反正佇者候也大唐握乾符以應期得天統而御歷文選東都賦握乾符闡坤珍又魏都賦應期運而光赫言大唐之君執握天受命之符以應期運也前漢高祖賛曰旗幟上赤恊於火德自然之應得天統矣御治也歴數也誅阪泉之巨猾勦丹浦之㐫渠史記黃帝教熊羆豼貅貙虎以與炎帝戰於阪泉之野三戰然後得其志文選應劭詩丹浦非樂戰劉良曰唐虞時丹浦國不服帝征而克之掃旬始而静天綱廓妖氛而清地紀文選東京賦攙搶旬始羣㐫靡餘旬始祅星也晉紀緫論曰天綱解紐又還舊園詩曰大明盪祅氛又地理志山河分兩戒有南紀北紀朱旗乃舉東城高滅楚之功朱旗者文選述高紀賛神毋告符朱旗乃舉又漢五年圍項羽垓下夜聞漢軍皆楚歌知盡得楚地羽與數騎走是以兵大敗灌嬰追斬東城言唐之勲德亦高於此也黃銊裁麾西土建翦商之業書牧誓武王與紂戰于牧野甲子昧爽王朝至于商郊王左仗黃銊右秉白旄以麾曰逖矣西土之人詩公劉篇實始翦商翦㓕也言唐之功業亦若此緫六合而光宅包四大以凝旒六合者四方上下也書堯典光宅天下言堯有光明之德覆天下如屋宅四大者老子云道大天大地大王大域中有四大王居其一焉禮記玉藻曰天子玉藻十有二旒異域於是來庭殊方所以受職文選李陵書死爲異域之鬼詩常武篇殊方來庭又文選東都賦殊方别區又與陳元伯書曰解辮請職航少海以朝絳闕梯崑山以謁紫宸大舟曰航楊雄夏州箴曰航海三萬東牽其竿山海經無臯之南望㓜海郭璞云㓜即小也文選與孫皓書稽顙絳闕山海經崑崙山廣萬里高一千里荆州星占北辰一名天關一名北極北極者紫宫天主也天子所居曰宸故曰紫宸椎髻之酋加之以文冕窮髪之長寵之以徽章唐書儒學傳貞觀中高麗與百濟新羅高昌土蕃等諸國酋長遣子弟請入國學鼓篋而升講筵者八十餘人文選石闕銘椎髻之長南越之俗也又絶交書強越人以文冕又遊赤石詩况乃令窮髪無毛之地在北海之北也又貴妃誄崇徽章出寰甸徽旌旗也章旒也言南而椎髻北而窮髮皆來朝也王會之所不書塗山之所莫紀唐初東謝蠻入朝冠烏熊皮以金銀絡頸身披毛帔韋皮行縢而着履顔師古因奏言周武王時逺國歸欵周史集其事爲王會篇乃命閻立本圖之禹會諸侯於塗山執玉帛者萬國歌九功以恊金奏運七政以齊玉衡書大禹謨水火金木土糓惟脩正徳利用厚生惟和九功惟叙九叙惟歌周禮鍾師掌金奏書舜典在璇璣玉衡以齊七政以璇爲璣以象天體之運轉以玉爲衡管橫而設之以窺璣以齊日月五星七政之運行猶今之渾天儀也律增甲乙之科以正澆俗禮崇升降之制以拯頺風前漢宣帝曰令甲死者不可復生刑者不可復息息生長也甲令第一乙令第二也文選策秀才文曰民俗澆弛法令滋章禮記樂記曰升降上下周還裼襲禮之文也拯救也頽毁也蕩蕩巍巍信無徳而稱也伏惟論語蕩蕩乎民無能名焉巍巍乎其有成功也又曰泰伯其可謂至徳也已矣三以天下譲民無得而稱焉皇帝陛下唐儀制令皇帝天子夷夏通稱之陛下對􅏡咫尺上表通稱之應邵曰王者有執兵陳於階陛之側臣於至尊不敢指斥故呼陛下以告之因卑以逹尊之意也體元纂業則大臨人杜預左氏傳注凢人君即位欲其體元以居正文選東京賦况纂帝業而輕天位纂繼也論語惟天爲大惟堯則之言天之大以臨兆民也覆載並於乾坤照臨運於日月易乾卦夫大人者與天地合其徳與日月合其明與天地合其徳者謂覆載也與日月合其明者謂照臨也坐青蒲而化光四表負丹扆而德被九圍漢書史丹伏青蒲奏事青蒲席也尚書曰光被四表禮記明堂曰天子負斧扆南郷而立斧扆爲斧屏風於户牖之間詩長發篇曰帝命式于九圍九州也日旰忘餐心存於哀矜宵分不寐志在於明威旰晚也蜀志諸葛亮上䟽曰陛下劬勞帝業旰食思政廢寢憂人書吕刑曰皇帝哀矜庶戮之無辜言唐帝日晚忘食哀矜無辜唐李百藥曰太宗纔及日昃必命才學之士賜以清問一夜忘疲中宵不寐書湯誥曰將天命明威不敢赦言唐帝中夜不寢其志在於明天之威慎用刑也一夫向隅而責躬萬方有犯而罪已漢書刑法志曰滿堂而飲酒有一人向隅而悲泣則一堂皆爲之不樂王者之於天下也譬猶一堂之上也書湯誥萬方有罪在予一人又左傳莊公十一年曰禹湯罪已其興也勃焉仍慮三辟攸斁八刑尚密左傳昭公六年鄭人鑄刑書於鼎以爲常法叔向始貽子產書曰夏有亂政作禹刑啇有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也辟刑也尚書洪範曰彞倫攸斁斁敗也八刑者周禮大司徒以刑紏萬民一曰不孝二曰不義三曰不婣四曰不弟五曰不任六曰不恤七曰造言八曰亂民平反之吏從寛而失情次骨之人舞智而䧟網前漢嶲不疑爲京兆尹毎行縣錄囚徒有所平反母即喜史記杜周南陽人爲御史周然重遲外寛内深次骨李奇曰其用罪深刻至骨又張湯杜人也湯爲人多詐舞智以御人言䧟人於憲網刑靡定法律無正條徽纆妄施手足安措靡無也易坎卦係用徽纆寘于叢棘釋音劉子玄云三股曰徽兩股曰纆皆索名所以禁囚今言妄施者刑罰不中也論語曰刑罰不中則民無所措手足自仍慮以下至此皆言唐興之初慮恐用刑無一定之律吏無所遵守以致刑罰不中所以命羣臣定律也乃制太尉楊州都督監脩國史上柱國趙國公無忌司空上柱國英國公勣李勣字懋功曹州離孤人本姓徐武德二年從李密歸朝唐高祖喜曰勣純臣詔受黎州緫管封英國公賜姓附宗正屬籍尚書左僕射兼太子少師監脩國史上柱國燕國公志寧于志寧字仲謐京兆高陵人太宗曰今太子幼卿當輔以正道太子承乾數有過惡志寕欲救止之上諫苑以諷帝見大恱賜金十斤絹三百疋凡格式律令禮典皆與論譔賞賜鉅萬尚書右僕射監脩國史上柱國開國公遂良褚遂良字登善通直散騎常侍褚亮之子博渉文史工隷楷銀青光禄大夫守中書令監脩國史上騎都尉栁奭栁奭字子邵蒲州人以父隋時使高麗卒焉奭徃迎䘮號踊盡䘮爲夷人所慕銀青光祿大夫守刑部尚書上輕車都尉唐臨唐臨字本德京兆長安人遷侍御史俄持節披獄交州出冤繫三千人累遷大理卿高宗常録囚臨軒對無不盡帝喜曰爲國之要在用法刻則民殘寛則失其有罪惟是折中以稱朕意永徽元年拜御史大夫蕭齡之常任廣州都督受賕當死詔羣臣議請論如法詔戮於朝堂臨建言羣臣不知天子所以議之之意在律八議王族戮於隠議親也刑不尚大夫議貴也今齡之貪贓狼扈死有餘咎陛下以異於他囚故議之有司又令入死非帝舜所以用刑者不可爲後世法帝然之齡之齊高帝五世孫由是免死太中大夫守太理卿輕車都尉叚寳玄太中大夫守皇門侍郎護軍頴川縣開國公韓瑗韓瑗字伯玉京兆三原人父仲良武德初與定律令建言周律其屬二千秦漢後約爲五百依古則繁請崇寛簡以示惟新於是採開皇律宜於時者定之終刑部尚書瑗少負節行博學曉吏事太中大夫守中書侍郎監脩國史驍騎尉來濟來濟揚州江都人篤志爲文章善議論曉暢時務後至公輔朝議大夫守中書侍郎辛茂將朝議大夫守尚書右丞輕騎都尉劉燕客朝請大夫使持節穎州諸軍事守頴州刺史輕車都尉裴弘獻朝議大夫守御史中丞上柱國賈敏行朝議郎守刑部郎中輕車都尉王懷恪前雍州盩厔縣令雲騎尉董雄朝議郎行大理丞護軍路立承奉郎守雍州始平縣丞驍騎尉石士逹大理評事雲騎尉曹惠果儒林郎守律學博士飛騎尉司馬銳等以上十人無傳律學博士魏書曰衛揭奏刑法國家所重而私議所輕獄者人命所懸而選用者所卑請置律學博士相教授遂施行律學博士自此始也摭金匱之故事採石室之逸書書金縢納冊於金縢之匱中環濟要略御史中丞有石室以藏秘書文選魏都賦金匱石室藏秘書之所帝王圖籍於此藏史記太史公抽金匱石室之書書序曰採摭羣言以立訓傳捐彼凝脂敦兹簡要捐棄也文選秦法繁於秋荼網密於凝脂敦篤也兹此也簡略也言國家捐棄其繁密之刑而敦此簡略之法也網羅訓誥研覈丘墳書序垂世立教典謨訓誥誓命之文研究覈考也又曰研精覃思博考經籍伏犧神農黃帝之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常道也八卦之說謂之八索求其義也九州之志謂之九丘言九州所有土地所生風氣所宜皆聚此書也春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘即謂上世帝王遺書也言此律䟽亦網羅研覈上世帝王之遺書也撰律䟽三十卷筆削巳了春秋傳曰孔子作春秋筆則筆削則削筆存之於牘削去而不書也漢書曰令有司請定法削即削筆即筆服䖍曰言隨君意寔三典之隱括周禮建三典以刑邦國詰四方一曰刑新邦用輕典二曰刑平邦用中典三曰刑亂邦用重典荀子法行篇曰良醫之門多病人隱括之側多枉木隱括者正曲木之器言此律書信乃三典之隱括信百代之準繩準繩者孟子曰聖人既竭目力焉繼之以䂓矩準繩以爲方圎平直不可勝用也準取其平繩取其直言此律書信能百代之後取其平直也銘之景鍾將二儀而並乆文選楊脩荅臨淄侯牋曰銘功景鍾易繫辭曰易有太極是生兩儀言此律書可以銘刻於國家重器之上與天地同其乆逺矣布之象魏與七曜而長懸象魏者周禮秋官正月之吉懸刑象之法於象魏使人觀之象魏雉門兩觀也纂要云日月五星謂之七曜易繫辭懸象箸明莫大於日月言此律者布之於宫門雙闕如日月五星長懸於天也庻一面之祝逺超於殷簡庻者庻幾也史記殷湯出野見張網四靣祝曰天下四方皆入吾網湯曰嘻盡之矣乃去其三靣祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯德至矣超過也簡冊也言唐帝撰此律書好生之德過於殷家之簡冊也十失之歎永弭於漢圖漢路温舒曰秦有十失其一尚存治獄之吏是也今治獄者上下相繼以刻爲明深者獲功名平者多後患弭止也言有此律則永無漢人十失之嘆也謹詣朝堂奉表以聞臣無忌等誠惶誠恐頓首頓首永徽四年十一月十九日進永徽唐高宗年號也故唐律䟽議緫目録計三十卷折凡五百條一名例計六卷折凡五十七條二衛禁計二卷折凡三十三條三職制計三卷折凡五十八條四户婚計三卷折凡四十六條五廏庫計一卷折凡二十八條六擅興計一卷折凡二十四條七賊盜計四卷折凡五十四條八闘訟計四卷折凡五十九條九詐僞計一卷折凡二十七條十雜律計二卷折凡六十二條十一捕亡計一卷折凡一十八條十二斷獄計二卷折凡三十四條故唐律䟽議緫目録終故唐律目録第一卷凡七條折名例笞刑五杖刑五徒刑五流刑三死刑二一折問荅十惡二折問荅八議第二卷凡一十一條折名例八議者議章折此名皇太子妃請章折此名七品以上之官減章折此名應議請減問荅二折此名贖章婦人官品邑號五品以上妾有犯人有議請減以理去官無官犯罪二折問荅以官當徒四折問荅十惡反逆縁坐四折問荅第三卷凡一十條折名例奸盜略人受財一折問荅府號官穪一折問荅除名者三折問荅以官當徒不盡除名比徒三年犯流應配流配人在道犯死罪非十惡三折問荅徒應役無兼丁二折問荅工樂雜户二折問荅第四卷凡八條折名例犯罪巳發一折問荅老小廢疾四折問荅犯時未老疾一折問荅彼此俱罪之贓二折問荅以贓入罪四折問荅平贓者二折問荅略和誘人㑹赦改正徴收二折問荅第五卷凡八條折名例犯罪未發自首四折問荅犯罪共亡四折問荅盜詐取人財物二折問荅同職犯公坐三折問荅公事失錯一折問荅