front:
  text: 故唐律䟽議卷第三凡一十條折名例諸犯姦盗略人及受財而不枉法徒以上折並謂斷
  hash: sha256:464ac54e3172441908393b2b6527c275ae2f4ad2cdc75e521484bd4e4abe72f7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_003-1a}
body:
  text: 䟽議曰姦盗略人並謂監臨外犯罪及受財而不枉法者謂雖即因事受財於法無曲並謂斷徒以上者若犯流徒獄成逃走䟽議曰犯流徒者謂非疑罪及過失此外犯流徒者獄成逃走謂减訖仍有徒刑若依令責保叅對及合徒不禁亦同律既不注限日推勘迯實即坐問曰免所居官之法依律比徒一年此條犯徒流迯走即獲免官之坐未知免所居官人逃亡亦入犯徒免官以否答曰免所居官之色亦有罪不至徒本罪若其合徒逃者即當免官之坐若犯杖罪逃走便異本犯徒流以其元是杖刑不入免官之法祖父母父母犯死罪被囚禁而作樂及婚娶者免官降所不至者聴留折謂二官並免爵及䟽議曰曽髙以下祖父母父母犯死罪見被囚禁其子孫若作樂者自作遣人作者並同上條遣人與自作不殊此條理亦無别及婚娶者止據男夫娶妻不言嫁娶者明婦人不入此色自犯姦盗以下並合免官注謂二官並免爵及降所不至者聴留䟽議曰二官為職事官散官衛官為一官勲官為一官比二官並免三載之後降先品二等叙爵及降所不至者聴留爵者王及公侯伯子男降所不至者謂二等以外歴任之官是也若會降有餘罪者聴從官當减贖法諸府號官稱犯父祖名而冐榮居之䟽議曰府號者謂省臺府寺之類官稱者謂尚書將軍卿監之類假有人父祖名常不得任太常之官父祖名卿亦不合任卿職若有受此任者是謂冐榮居之選司唯責三代官名若犯髙祖名者非祖父母父母老疾無侍委親之官䟽議曰老謂八十以上疾謂篤疾並依令合侍若不侍委親之官者其有才業灼然要藉驅使者令帶官侍不拘此律問曰親老疾合侍今求選得官將親之任同委親之官以否又得官之後親始老疾不請解侍復合何罪答曰委親之官依法有罪既將之任理異委親及先已任官親後老疾不請解侍並科違令之罪在父母䘮生子及娶妾䟽議曰在父母䘮生子者皆謂二十七月内而懷胎者若父母未亡以前而懷胎雖於服内而生子者不坐縱除服以後始生但計胎月是服内而懷者依律得罪其娶妾亦凖二十七月内為限兄弟别籍異財冐哀求仕䟽議曰居䘮未滿二十七月兄弟别籍異財其别籍異財不相須冐哀求仕謂父母䘮禫制未除及在心䘮内者並合免所居之一官並不合計閏若姦監臨内雜户官户部曲妻及婢者免所居官職事即因冐榮遷任者並追所冐告身折謂免所居之一官若兼帶勲官者免其䟽議曰雜户者謂前代以来配隷諸司職掌課役不同百姓依令老免進丁受田依百姓例各於本司上下官户者亦謂前代以来配隷相生或有今朝配没州縣無貫唯屬本司部曲妻者通娶良人女為之及婢者官私婢亦同但在監臨之内姦者强和並是從府號官稱以下犯者並合免所居官注謂免所居之一官若兼帶勲官者免其職事䟽議曰稱免所居官者職事散官衛官同階者緫為一官若有數官先追髙者若帶勲官免其職事如無職事即免勲官髙者注即因冒榮遷任者並追所冒告身䟽議曰伐有父祖名常冒任太常之職秩滿之後遷任髙官事發論刑先免所居髙品前得冐榮告身仍須追奪諸除名者官爵悉除課役從本色䟽議曰若犯除名者謂出身以来官爵悉除課役從本色者無䕃同庶人有䕃從䕃例故云各從本色又依令除名未叙人免役輸庸並不在雜徭及征防之限六載之後聴叙依出身法䟽議曰稱六載聴叙者年之與載異代别名假有元年犯罪至六年之後七年正月始有叙法其間雖有閏月但據載言之不以稱年要以三伯六十日為限一依出身法犯除名人年滿之後叙法依選舉令三品以上奏聞聴敕正四品於從七品下叙從四品於正八品上叙正五品於正八品下叙從五品於從八品上叙六品七品於從九品上叙八品九品並於從九品下叙若有出身品髙於此法者聴從髙出身謂藉䕃及秀才明經之類凖此令文出身髙於常叙自依出身法出身卑於常叙自依常叙故云出身品髙者聴從髙又軍防令勲官犯除名限滿應叙者二品於驍騎尉叙三品於飛騎尉叙四品於雲騎尉叙五品以下於武騎尉叙若本犯不至免官而特除名者叙法同免官例之後夫子見在有官爵者聴依式叙折婦人因夫子得邑號犯除名者年滿疏議曰本犯不至免官者情在可責而特除名矜其所犯先輕故許同免官之例收叙問曰本犯雖非免官當徒用官並盡依律當徒用官盡者叙限同免官未知當徒用官各盡今被特責除名叙法亦同免官以否答曰凡稱除名官當不論本犯輕重從例除免不計徒年罪不至免官而特除名者止論正犯免官之法當徒官盡不在其中注婦人因夫子得邑號犯除名者年滿之後夫子見在有官爵者聴依式叙䟽議曰婦人因夫子而得邑號曰夫人郡君縣君郷君等其身犯罪而得除名年滿叙日計夫子見有官爵仍合授夫人郡縣鄉君者並依前授不降其品若夫子被降官者並依降授法如夫子進官者聴依髙叙其婦人叙法令備明文為因夫子官爵故不依降减之例問曰婦人不因夫子别加邑號犯除名者合叙以否答曰律云不因夫子别加邑號者同封爵之例爵無常叙之法除名不合更叙免官者三載之後降先品二等叙䟽議曰稱載者理與六載義同亦止取三載之後入四年聴叙降先品二等正四品以下一階為一等從三品以上及勲官正從各為一等假有正四品上免官三載之後得從四品上叙上柱國免官三載之後從上護軍叙是為三載之後降先品二等叙免所居官及官當者期年之後降先品一等叙䟽議曰免所居官及官當罪又輕故至期年聴叙稱期者匝四時曰期從勑出解官日至来年滿三百六十日也稱年者以三百六十日稱載者取其三載六載之後不計日月若本犯不至免所居官及官當而特免官者叙法同免所居官䟽議曰本犯不至免所居官者謂非府號官稱犯父祖名以下等罪本犯不至官當者謂玖品以上犯私罪不至一年徒公罪不至二年徒五品以上私罪不至二年公罪不至三年徒特勑免官者叙法一同免所居官期年降先品一等叙故云叙法同免所居官其免官者若有二官各聴依所降品叙降一等折若勲官之類即降品卑於武騎尉者聴從武騎尉叙折者從上柱國削授柱國降二等者削授上護軍䟽議曰二官謂職事等帶勲官前已釋訖若犯免官職事勲官並免假從正六品上職事免官降至從六品上叙又帶上柱國亦免從上䕶軍叙此是各聴依所降品叙故注云若勲官降一等者從上柱國削授柱國降二等者削授上護軍之類即降品卑於武騎尉者聴從武騎尉叙即免官免所居官及官當斷訖更犯餘有歴任官者各依當免法先以髙者當折兼有二官者䟽議曰假有人犯免官及免所居官或以官當徒各用一官二官當免訖更犯徒流或犯免官免所居官官當餘有歴任之官告身在者各依上法當免未斷更犯通以降所不至者當之注兼有二官者先以髙者當䟽議曰此既重犯之人明非見任職事若有勲官職事二官先以髙者當假有前任六品職事及五品勲官先以勲官當若當罪不盡亦以次髙者當不限勲官職事仍累降之所降雖多各不得過四等各降不在折各謂二官之限折通計䟽議曰假有前犯免官已降二等又犯免官或當徒官盡亦降二等故云仍累降之即雖斷訖更犯經三度以上叙日止依此律再降四等法其免所居官及當徒用官不盡斷訖更犯後叙各降一等及至四度重犯緫降四等後犯雖多止以四等為限或頻犯免官訖又再犯免所居官者亦各計所犯降四等叙之故云所降雖多各不得過四等注各謂二官各降不在通計之限䟽議曰職事散官衛官為一官所降不得過四等勲官為一官所降亦不得過四等此二官犯者各降四等為法不在通計之限若官盡未叙更犯流以下罪者聴以贖論各從折叙限計年折後犯䟽議曰謂用官當免並盡未到叙日更犯流罪以下者聴以贖論以其年限未充必有叙法故免决配聴依贖論本犯不合贖者亦不得贖問曰此條内有毆告大功尊長小功尊屬者合以贖論否答曰上條毆告大功尊長小功尊屬不得以蔭論今此自身官盡聽以贖論即非用蔭之色聴同贖法注叙限各從後犯計年䟽議曰犯免官及免所居官未叙更犯免官及免所居官官當者各依後犯計年聴叙官盡更犯聴依贖法若犯當免官更三載之後聴叙免所居官者更期年之後聴叙其犯徒流不合贖而真配者流即依令六載徒則役滿叙之雖役滿仍在免官限内者依免官叙例不在課役之限雖有歴任之官不得預朝叅之例䟽議曰不在課役者謂有叙限故免其課役雖有歴任之官者假有一品職事犯當免官仍有歴任二品以下官未叙之間不得預朝叅之例其免所居官及以官當徒限内未叙者亦凖此諸以官當徒者罪輕不盡其官留官收贖官少不盡其罪餘罪收贖䟽議曰假有五品以上官犯私坐徒二年例减一等即是罪輕不盡其官留官收贖官少不盡其罪者假有八品官犯私坐一年半徒以官當徒一年餘罪半年收贖之類其犯除免者罪雖輕從例除免䟽議曰假有五品以上職事及帶勲官於監臨内盗絹一疋本坐合杖八十仍須凖例除名或受財六疋一尺而不枉法本坐徒一年半亦凖例免官或姦監臨内婢合杖九十亦凖例免所居官罪若重仍依當贖法䟽議曰凡是除名免官本罪雖輕從例除免罪重者各凖所犯凖當流徒及贖法假有職事正七品上復有歴任從七品下犯除名流不合例减者以流比徒四年以正七品上一官當徒一年又以從七品下一官當徒一年更無歴任及勲官即徵銅四十斤贖二年徒坐仍凖例除名若罪當免官者亦凖此當贖法仍依例免官此名罪若重仍依當贖法其除爵者雖有餘罪不贖䟽議曰爵者既得傳授子孫所以義同帶礪今並除削在責已深為其國除故有殘罪不贖諸除名者比徒三年免官者比徒二年免所居官者比徒一年流外官不用此律人及出入之折謂以輕罪誣枉重者自從重折類故制此比若所䟽議曰除名免官免所居官罪有差降故量輕重節級比徒流外之職品秩卑㣲誣告反坐與白丁無異故云不用此律注謂以輕罪誣人及出入之類故制此比䟽議曰假有人告五品以上官監臨主守内盗絹一疋若事實盗者合杖八十仍合除名若虛誣告人不可止得杖罪故反坐比徒三年免官者誣告五品於監臨外盜絹五疋科徒一年仍合免官若虛反坐不可止科徒一年故比徒二年免所居官者謂告監臨内姦婢合杖九十姦者合免所居官若虛反坐不可止得杖罪故比徒一年及出入之類者謂不盜監臨内物官人枉判作盜所監臨或實盜監臨官人判作不盜即是官司出入除名比徒三年若出入免官者比徒二年出入免所居官比徒一年之法其藏匿罪人若過致資給或為保證及故縱等有除免者皆從比徒之例故云之類注若所枉重者自從重䟽議曰謂誣告及出入之罪重於比徒之法者自從反坐等重法科之不復仍凖比徒之法若誣告道士女冠應還俗者比徒一年其應苦使者十日比笞十官司出入者罪亦如之䟽議曰依格道士等輙著俗服者還俗假有人誣道士等輙着俗服若實並須還俗既虚反坐比徒一年其應苦使者十日比笞十依格道士等有歴門教化者百日苦使若實不教化枉被誣告反坐者誣告苦使十日比笞十百日杖一百官司出入者謂應斷還俗及苦使官司判放或不應還俗及苦使官司枉入各依此反坐徒杖之法故云亦如之失者各從本法諸犯流應配者三流俱役一年者流三千里役折本條稱加役流者即於配處從户口例折三年役滿及㑹赦免役䟽議曰犯流若非官當收贖老疾之色即是應配之人三流逺近雖别俱役一年為例加役流者本法既重與常流理别配流三千里俱役三年注役滿及會赦免役者即於配處從户口例䟽議曰役滿一年及三年或未滿會赦即於配所從户口例課役同百姓應選者須滿六年故令云流人至配所六載以後聴仕反逆縁坐流及因反逆免死配流不在此例即本犯不應流而特配流者三載以後亦聴仕妻妾從之䟽議曰妻妾見已成者並合從夫依令犯流斷定不得棄放妻妾問曰妻有七出及義絶之狀合放以否答曰犯七出者夫若不放於夫無罪若犯流聴放即假偽者多依令不放於理為允犯義絶者官遣離之違法不離合得徒罪義絶者離之七出者不放父祖子孫欲隨者聴之䟽議曰曽髙以下及玄孫以上欲隨流人去者聴之移鄉人家口亦凖此䟽議曰移鄉人妻妾隨之父祖子孫欲隨者聴不得棄放妻妾皆凖流人故云亦凖此若流移人身䘮家口雖經附籍三年内願還者放還䟽議曰籍謂三年一造申送尚書省流人若到配所三年必經造籍故云雖經附籍三年内聴還既稱願還即不願還者聴住即造畜蠱毒家口不在聴還之例凖此折下條䟽議曰依本條造畜蠱毒并同居家口雖會赦猶流况此已至配所故云不在聴還之例注下條凖此䟽議曰謂下條云流人逃者身死所隨家口仍凖上法聴還上有下條凖此之語下有凖上法之文家口合還及不合還一準上條之義諸流配人在道會赦計行程過限者不得以赦原計行程有違者折謂從上道日總䟽議曰行程依令馬日七十里驢及步人五十里車三十里其水程江河餘水沿泝程各不同但車馬及步人同行遲速不等者並從遲者為限注謂從上道日緫計行程有違者䟽議曰假有配流二千里準步程合四十日若未滿四十日會赦不問已行逺近並從赦原從上道日總計行程有違者即不在赦限有故者不用此律䟽議曰故謂病患死亡及請粮之類凖令臨時應給假者及前有阻難不可得行聴除假故不入程限故云不用此律若程内至配所者亦從赦原䟽議曰假有人流二千里合四十日程四十日限前已至配所而遇恩赦者亦免逃亡者雖在程内亦不在免限即逃者身死所隨家口仍凖上法聴還䟽議曰行程之内逃亡雖遇恩赦不合放免即迯者身死所隨家口雖已附籍三年内願還者凖上法聴還諸犯死罪非十惡而祖父母父母老疾應侍家無期親成丁者上請䟽議曰謂非謀反以下内亂以上死罪而祖父母父母通曽髙祖以来年八十以上及篤疾據令應侍户内無期親年二十一以上五十九以下者皆申刑部具狀上請聴勅處分若勅許允侍家有期親進丁及親終更奏如元奉進止者不奏家無期親成丁者律意屬在老疾人期親其曾髙於曽玄非期親縱有亦合上請若有曽玄數人其中有一人犯死罪則不上請犯流罪者權留養親猶流者折謂非㑹赦䟽議曰犯流罪者雖是五流及十惡亦得權留養親會赦猶流者不在權留之例其權留者省司判聴不須上請不在赦例限内會赦者從赦原折仍凖同季流人未上道䟽議曰權留養親動經多載雖遇恩赦不在赦限依令流人季别一遣同季流人若未上道而㑹赦者得從赦原課調依舊䟽議曰侍丁依令免役唯輸調及租為其充侍未流故云課調依舊問曰死罪囚家無期親上請敕許充侍若逢恩赦合免死以否答曰權留養親不在赦例既無各字止為流人但死罪上請勑許留侍經赦之後理無殺法况律無不免之制即是會赦合原又断死之徒例無輸課雖得留侍課不合徵免課霑恩理用為允又問死罪是重流罪是輕流罪養親逢赦不免死罪留侍却得會恩則死刑何得從寛流坐乃翻為急輕重不類義有惑焉答曰死罪上請唯聴勑裁流罪侍親凖律合住合住者須依常例敕裁者已沐殊恩豈將恩許之人比同曹判之色以此甄異非為重輕若家有進丁及親終期年者則從流計程會赦者依常例䟽議曰本為家無成丁故許留侍若家有期親進丁及親終已經期年者並從流配之法計程會赦者一准流人常例即至配所應侍合居作者亦聴親終周年然後居作䟽議曰流人至配所親老疾應侍者並依侍法合居作者亦聴親終周年然後居作問曰犯死罪聴侍流人權留養親中間各犯死罪以下若為科斷荅曰依下文犯罪已發及已配而更為罪者各重其事若死囚重犯死罪亦同犯流加杖法若本坐是絞重犯斬刑即須改斷從斬前更犯絞者亦依加杖例若依前應侍仍更重請若犯流徒者各准流徒之法杖罪以下依數决之流人聴侍者犯死罪上諸若犯流依留住法加杖侍親終於配所累役犯徒應役亦准此應蔭贖者各依本法諸犯徒應役而家無兼丁者注云妻年二十一以上同兼丁之限婦女家無男夫兼丁亦同䟽議曰應役者謂非應收贖之人法合役身而家無兼丁者謂户内全無兼丁妻同兼丁婦女雖復非丁據禮與夫齊體故年二十一以上同兼丁之限其婦人犯徒户内無男夫年二十一以上亦同無兼丁例言以上者謂五十九以下其殘疾既免丁役亦非兼丁之限問曰家内雖有二丁俱犯徒坐或一人先從征防或任官或逃走及被禁並同兼丁以否答曰家無兼丁免徒加杖者矜其糧餉乏絶又恐家内困窮一家二丁俱在徒役理同無丁之法便須决放一人征防之徒逺從戍役及犯徒罪以上獄成在禁同無兼丁之例據理亦是弘通居官之人雖非丁色身既見居榮禄不可同無兼丁若兼丁迯走在未發之前既不預知得同無兼丁之限如家人犯徒事發後兼丁然始迯亡若其許同無丁便是長其姦詐即同有丁之限依法役身又問二人俱徒許决放一人若三人俱犯徒坐家内更無兼丁若為决放答曰律稱家無兼丁本謂全無丁者三人决放一人即是家有丁在足堪粮餉不可更放一人若一家四人徒役决放二人其徒有年月及尊卑不等者先從見應役日少者决放役日若停即决放尊長其夫妻並徒更無兼丁者决放其婦徒一年加杖一百二十不居作一等加二十至折流者亦如之折配所應役䟽議曰徒一年加杖一百二十一等加二十即是半年徒加杖二十不居作既已加杖故免居作流至配所應役者謂流人應合居役家無兼丁應加杖者亦凖此若徒年限内無兼丁者緫計應役日及應加杖數凖折决放䟽議曰徒限未滿兼丁死亡或入老疾或犯罪征防見無兼丁者若犯徒一年三百六十日合杖一百二十即三十日當杖十若犯一年半五百四十日合杖一百四十即是三十八日當杖十若犯二年徒七百二十日合杖一百六十即是四十五日當杖十若犯二年半徒九百日合杖一百八十即五十日當杖十若犯三年徒一千八十日合杖二百即五十四日當杖十若犯三年半徒一千二百六十日亦杖二百即六十三日當杖十若犯四年徒一千四百四十日亦合杖二百即七十二日當杖十其役日未盡不滿杖十者律云加者數滿乃坐既不滿十據理放之盗及傷人者不用此律仍從加杖之法折親老疾合侍者䟽議曰盗及傷人徒以上並合配徒不入加杖之例諸條稱以盗論及以故殺傷論以鬪殺傷論者各同真盗及真殺傷人之法親老疾合侍者謂有祖父母父母年八十以上及篤疾合侍家無兼丁者雖犯盗及傷人仍依前加杖之法諸工樂雜户及太常音聲人䟽議曰工樂者工屬少府樂屬太常並不貫州縣雜户者散屬諸司上下前已釋訖太常音聲人謂在太常作樂者元與工樂不殊俱是配隷之色不屬州縣唯屬太常義寧隋末年號以來得於州縣附貫依舊太常上下别名太常音聲人犯流者二千里决杖一百一等加三十留住俱役三年者役四年折犯加役流䟽議曰此等不同百姓職掌唯在太常少府等諸司故犯流者不同常人例配合流二千里者决杖一百二千五百里者决杖一百三十三千里者决杖一百六十俱留住役三年犯加役流者役四年名例云累徒流應役者不得過四年故三年徒上止加一年以充四年之例若是賤人自依官户及奴法若習業已成能專其事及習天文并給使散使各加杖二百䟽議曰工樂及太常音聲人皆取在本司習業依法各有程試所習之業已成又能專執其事及習天文業者謂在太史局天文觀生及天文生以其執掌天文依令諸州有閹人並送官配内侍省及東宫内坊名為給使諸王以下為散使多本是良人以其宫闈驅使并習業已成天文坐等犯流罪並不逺配各加杖二百犯徒者凖無兼丁例加杖還依本色䟽議曰工樂及太常音聲人習業已成能專其事及習天文并給使散使犯徒者皆不配役凖無兼丁例加杖若習業未成依式配役如元是官户及奴者各依本法還依本色者工樂還掌本業雜户太常音聲人還上本司習天文生還歸本局給使散使各送本所故云還依本色其有官蔭仍依本法當贖若以流内官當徒及解流外任亦同前還本色叙限各依常法其婦人犯流者亦留住者配流如法折造畜蠱毒應流䟽議曰婦人之法例不獨流故犯流不配留住决杖居作造畜蠱毒所在不容擯之荒服絶其根本故雖婦人亦須投竄縱令嫁向中華事發還從配遣並依流配之法三流俱役一年縱使遇恩不合原免婦人教令造畜者只得教令之坐不同身自造畜自依常犯科罪流二千里决杖六十一等加二十俱役三年䟽議曰婦人流二千里决杖六十流二千五百里决杖八十流三千里决杖一百三流俱役三年若加役流亦决杖一百即是役四年既决杖之文在上明須先决後役若夫子犯流配者聴隨之至配所免居作䟽議曰婦人元不合配以夫子流故所以聴隨矜其本法無流所以得免居作從流無杖不在决例其有夫子在路身死婦人不合從流既得却還不復更令居作問曰婦人先犯流刑在身乃有官蔭夫子犯流既聴隨去未知官䕃合用以否答曰律唯言至配所免居作役既許免更無罪名若犯十惡五流者各依除名之律若别犯流以下罪聴從官當减贖法又問注云造畜蠱毒婦女應流者配流如法未知此注唯屬婦人唯復緫及工樂以否答曰案賊盗律造畜蠱毒者雖會赦不免同居不知情亦流但是諸條犯流加杖配徒之色若有蠱毒並須配遣故於工樂等留住下立例故云造畜者配流如法斯乃工樂以下緫攝不獨為婦人生文故唐律疏議卷第三
