front:
  text: 律音義名例第一既衆要須例以表之故曰名例漢作折主物之謂名統凡之謂例法律之名賈充増定律二十篇以刑名法例揭爲篇冠折九章散而未統魏朝始集罪例號爲刑名晉十二篇併曰名例後循而不改折至北齊趙郡王叡等奏上齊律
