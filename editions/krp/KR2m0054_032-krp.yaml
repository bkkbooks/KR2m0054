body:
  text: 五刑鉞中刑用刀鋸次鑚鑿薄刑用鞭扑虞折五刑之名尚矣古者大刑用甲兵次斧宥五刑鞭作官刑扑作敎刑金作贖刑則五折書五刑曰墨曰劓曰剕曰宮曰大辟又云流其制略同秦法凝惨始有夷三族具五刑之折者之外似别有流贖鞭扑之品也三代而降則死刑三髠刑四字作刑各三贖刑十一晉折名漢文帝去三肉刑又以字代刑魏制五刑刑梁世略依前代制刑十三等及鞭杖督之折以梟首斬棄市三死與髠作輸贖二等爲五死鞭笞各百髠以配兵爲一流五年至一年折差北齊採魏晉故事以轘裂梟首斬絞爲四三杖後周以杖刑鞭刑徒刑流刑死刑名以折爲五刑一百至四十爲五鞭三十至一十爲刑之序則死以斬絞爲二流以一千里至二折五差爲二十五等與齊法小異至隋更定五百笞以五十至十各爲五凡二十等蠲損前折千里爲三徒以一年至三年杖以六十至一平矣唐以二千里至三千里爲三流餘同隋折代鞭刑梟首轘裂之法輕重之凖得天下之遵用折制至今笞捶擊也折丑折之切贖岀金以貿易其罪也折石欲切又音樹貿也杖持也言折直兩切刑是也梁有制鞭法鞭常鞭三等制鞭用生折人執持可以擊人也古者用鞭書云鞭作官鞭舊制應決杖笞者皆依數決之皇朝建折革廉成法鞭去廉常鞭用熟靻至隋以杖易靼音㫖熱切柔皮也折隆四年始有折杖之制徒八于辠隷女子入折同都切奴也男子書以戮辱之也折于舂槀著於丹流也舊制犯徒者依年配役折力求切竄之邊裔若水流隆四年制犯徒者加杖免役犯流者加杖留折犯流者流至配所居作皆不決杖折皇朝建加役流者役三年折住三流俱役一年死精神澌盡也澌音賜折息姊切斯也澌盡也絞也不殊身首折古卯切絞殺之斬殊其身首折側減切殺而謀也二人對折莫侯切計之謀折議謂叛他國也折歩半切奔背下同折音佩惡逆字折如毆下並同折烏苟切支解謂離析其支體折佳買切離析也造爲作也折昨早切畜也後同折丑六切聚璽者也秦以前民皆以金玉爲印龍虎紐唯折使公冶問璽書追而與之此諸侯大夫印稱以玉羣臣莫敢用也唐開元歳中改璽曰寳折其所好也自秦以來天子獨以印稱璽又獨合和調也後同折音閤下如字膳食也折時戰切御幸邕獨斷曰折胡耿切蔡幸車駕所至民臣被其德澤因是謂之幸折天子所至曰幸幸者冝幸也世俗謂幸爲僥指斥的斥瀆而言也折音尺指斥謂指對捍拒也折户旦切制使切折所吏詛詈力智切折惻慮切下别籍切折在亦供養尚切後養親折居用切下羊同折類並父母喪下同折息郎切作樂岳折音匿隱也折女力切不睦親也折莫六切緦麻十五升抽其半有事其缕無事折音思後皆同儀禮喪服傳緦者緦者治其縷細如絲也折其布曰緦鄭氏云謂之大功升鄭氏云其鍜折儀禮大功布九之沽音古折治之功麤沽尊長長長大長官並同折丁丈切後官長尊小功禮折儀十一升折小功之布屬親屬同折市玉切下縣令皆倣此折力政切後見受見在類並同折賢徧切下見任卒切折子忽夫喪息浪切折如字又袒免但折音以布廣一寸從項中而前交於額上却向後折下音問後並同袒免謂去冠代之以免免者髻折繞於德行切折下孟散官切折蘇罕所坐爲坐後同折祖卧切被罪應議後皆倣此折扵陵切當也先奏又如字折悉薦切期玄宗諱之折音基唐避舊後皆倣此折字爲周今改從盜謂之盜折取非其物略謀略取之折離灼切謂聽贖不音者倣此折佗定切許也後官當官當者並同折丁浪切下意渉過失謂之過失折不意誤犯癈疾内皆同折方肺切律號亦作号同折胡到切本䕃禁折於切累減後並同折力委切從坐字後皆倣此折才用切又如自首切悔折舒救佗皆倣此折過自言曰首故失意以爲然謂之夫折知而犯之謂之故見任禁折而倣此折切後皆解雖切折佳買贈官追與之也折昨亘切死而視品矢折承也折切比若藉下同折在夜切假版布綰切折古雅切下流外在九折以其曰流外折流之外故比徒字折如衞官勲相衛及備身名衛折謂千牛備身以下親官勲官武騎尉至上柱國折凡勲十有二轉謂行守卑曰行階卑折官階髙而擬曰守折而擬髙謂降後同折古巷切贓之例謂之贓折子郎切凡貨財尚書下同折音常省斷後不音者可以意求之折所景切省署也下丁亂切一匹吉折譬至中爲兩卷故謂之兩或曰匹取匹敵之義折切說文云四丈也从入意古者自兩頭卷之者俗折也作疋禁後並同折居䕃切娶切折且住官稱陵切後同折尺證切又尺冒切折莫報委也弃也折如字屬遷任切折汝鴆大載再年也折音宰又音朝參七南切折直遥切下誣巫折音女官道士也流俗以其折昇玄經云女官如冠字非也折戴冠改作身喪切折息浪過限後同折古卧切上道切下折時掌道同折未上課調切折徒弔准折切折之舌大常太後倣此折音泰字亦作給使散使同折音史下各重累也折直龍切即重更也折直用切篤疾切折冬毒教令吕呈切折音交下備具償之折具也謂乞索求也折所白切簿切折蒲古斂力驗切折良冉切又處決切折昌與轉昜也又陟兖折張戀切換音亦折切下蕃息獸鄭氏謂蕃息也左氏傳桓六年折扶元切周禮大司馬職云以蕃鳥也俗本作畨息者非後並同折隨季梁曰謂其畜之碩大蓄滋已費耗也折芳未切庸賃下乃禁切折音容功也諸平平言也凡事之曲直物折字又作評同皮命切謂市估又有廷尉平隋改曰評事下平功同折之貴賤以平言之皆曰評漢有月平若今估古折音駝作駞俗折徒河切騾切折落戈碾切折女箭磑磨也折五對切邸禮折都切詐假下同折古雅切蔽切折必世復罪切折房六媒保言謀折媒之相保任也折也保之言不臣辭也折臣伏嫡的折音復除優恩除免其折音福優也謂役折課自借貸物物也若周禮泉府職凡民之貸折資昔切下吐得切又音待皆從人之類本或作貣者俗折者與其有司辨而授及借貸切皆以物假人折子夜切下吐代也畜産後皆同折許又切劾切折胡得爲首爲者並同折于僞切後相贓數下同折色具切備償常後並同折時亮切又音捕後倣此折薄故切悔内折荒切所由爲首皆倣此折如字佗見官見獲同折賢徧切下案省井折息審同折切下省撿句切本作勾俗折古豆切又古侯駮切折邦角稽程兮折工皆同折切律内造意謂之造意折唱首先言隨從才用切折如字又關棧諌折士以斷人行折切編豎柴木垣籬切折兩元鞫切折居六當年又如字折丁浪切條同折下當貿易切折莫豆考校切折古孝爲隱爲上同折于僞切下擿語也動也折佗歴切發曽後同折子登切壓切折烏甲岀降切折古卷統攝舒渉切折佗宋切下鎭戍後同折傷遇切時率音律音類折所律切又以籍切折在亦觀寺切折古喚三綱三綱以道德髙者充折古郎切唐制每觀寺立衞禁第二自晉始有衞宫之名至北齊附以關折天子作屯衞以申警設關禁以防姦衞禁蓋由内及外設法之序也折禁隨勑蘇威等更定新律名爲闌入妄入曰闌後同折落千切無符籍兆域也表之以塋域折兩逼切兆葬地專當字折如主帥後同折所類切杵切折昌與棒切折部項籍禁切籍折秦昔色縣宫門案省相應乃得入也折者爲二尺竹牃記其年紀名字物御在所邕折蔡故謂所居爲行在所折云天子以天下爲家横刀切折户盲御膳切折時戰踰下同折音俞閾郭璞云閾門限折域洫二音爾雅下直下鍵同折胡嫁切後將領如字下同折子亮切又未著也定也折陟慮切立闢下同折婢亦切搜切折所求誤遺字折如乃坐切折但卧越過切折古卧劾切折胡得親爲僞折干開同折切下爲通傳切折直專擅專也折時戰切錯符切折倉各鍵偃折其同折切下鑰藥折音忘誤職二宥曰遺忘折音妄周禮司刺被將切折平義射後同折食亦切放彈切折徒旦捉切折側角衝隊徒對切折尺容切下唐突切折徒忽上畨切折時掌假後同折古訝切逺身于遥逺也折于阮切輒離切折力智牙帳切折五加行夜下同折下孟切禁苑切折於阮守當又如字折丁浪切府廨切折古隘侵壞怪折音溝瀆徒谷切溝折古侯切下渠也折瀆水使人切折色吏覆訖審也折芳目切訴素折音過所切後折古禾令禁末游伺姧慝几行人車馬岀入徃來必折同釋名云過所至關津以示之唐職官關志以勘之折據過所餘畜下同折許又切留難並同折如字後齎禁切作折子兮後倣此折賫者俗私造切折昨早關塞切折先代交易下同折音亦㛰姻母相謂爲婚姻折婦之父母壻之父因使切折所吏傳如切折直專比近切折毗志烽切折敷容警切折居影令寇切折吕呈烽燧防備警折音遂邊低之有寇即然舉以相告名曰烽又多積薪折急作土臺上施桔橰頭有兠零以薪實中常曰燧晝燔燧夜舉烽折寇至燔之望其煙名陷敗下同折𥙷邁切遶切折而小職制第三晉本名違制隋更曰職制折設官置職必以法度守之貟數後同折色具切署切折常恕置切折陟吏從坐才卧切折才用切下德行切折下孟得三分分行字也折本或作得三考校切折古孝選官切折息戀稱職切折尺證負殿坐一斤爲一負公坐二折音附下都甸切據令私又漢書音義下功曰殿折斤爲一負各十負爲一殿果毅切折牛旣不上掌折時同折切注上下切折胡駕因假切折古訝邉要字折如從駕切下折才用同䂊切折余慮牲牢生折音散齊皆切下同折蘇旱切下側遞切折特計祭享地曰祭宗廟曰享折許兩切凡天曰祀弔喪下同折息郎切朝㑹遥折直切諠囂許嬌切折況爰切下合和字調也折音閤下如料治下直折音聊之名唐避髙宗諱之字爲理折之切爾雅郭璞云啖食治擇簡非下同折作揀者穢惡如字下同折烏路切又護切折胡誤調習切折徒彫駕馭御折音不完桓折音私借及借同折子亦切下若借切折子夜漏泄切折思列討襲習折音蕃切折方元使者下並同折色吏切傳下同折直專切即轉下轉受折陟兖切同䜟下同折楚禁切曜切折弋照緩切折胡管騰切折徒登被制義折平切上書上尚並同折時掌切下及即爲字折如偏徧者訛折音篇作禹與雨矩切折並于丘與區豈俱切折去求切下脫剰時證切折佗活切下案省切折悉井岀使下同折所吏切而聽聽裁同折佗定切下及參南切折七禫服祭名折徒感切除即爲人爲請並同折于僞切下爲齎切折子兮長官長吏同折丁丈切下屬請囑者俗折之玉切作已分下同折扶問切送遺遺人同折惟季切後經過切折古禾糾彈徒丹切折居黝切下諸貸吐得至卷未皆同折切又音待下即借卷朱皆同折資昔切下至未上後上表折時掌切同斷契切折丁亂饋下同折巨愧切市易亦折音縣欠本作懸折胡蠲切園折籬日移埋切折莫皆旱澇切折郎到雹切折蒲學蟲蝗切謂折直弓類下音皇折負蠜田䑕之疇切折直留荒蕪無折音失數下同折色具切復除福折音傜役遥折音擅切折時戰輒悔注同折荒對切聘者俗折作娉服屬切折時玉姨切折以脂再從切折才用壻作婚俗折蘇計切袒免但折音問折下音強嫁又如字折其兩切爲親下爲定婿同折于僞切注及恐喝勇折丘力脅之也漢書作渴折切下呼葛切恐喝以威被強切折皮義期要字折如廏庫第五國用自漢歷北齊或名廏牧或名牧折廏蕃畜産庫舎器幣爲之防限以謹事遂名廏庫折産隋更益以庫牧畜後並同折許又切牧長長官同折張丈切後新任切折而禁游牝切折毗忍准數下條同折色具切繫飼下同折音嗣及監鍳折音羸切折力追療切折力弔應乗切折時陵駝切折徒何騾切折落戈切折徒荷犧純曰犧折音羲色瘡音同作瘡從俗折初良切本作創繞切折而小調習切折徒彫償又音常折時亮切踠跌蕩踠跌者後漢班固傳東都折於阮切屈也周禮鄭注云折怒未泄下大結切折賦云馬踠餘足士觝齧下五結切折都禮切後同放令呈折吕同折切下噬切折時制蹋作踏訛折徒盍切標識亦音試周禮鄭折昌志切又音志頗衆本作幟非剽與標音義同折氏注剽表皆謂徽識經典同此音羈絆切下折居宜切折博縵被雇下同折平義切倩切折七政自借借即借同折資昔切不及庫藏後同折才浪切假請下同折古雅切自貸特下及貸雖折吐得切又音所貸同折貸私貸鈔又作抄俗折𥘉教切本市易亦折音私借子夜切折資昔切又自借及借同折資音切下若借切折子夜暴涼張切又音諒折歩卜切下吕暴而氣涼之作曝訛折謂積貯之物當須日監署鑒折音濕惡字折如僦切折即就租切折則吳糴切折徒歷擅興第六人臣理不得專故設此法以防之漢折興戎動象爲國大事三者制以取重復漢舊名北齊改文從繕至隋定曰檀興折𥘉但名興律魏陳羣定法更爲興擅晉朝擅切折時戰警切折居影告令切折力呈卒來切折倉忽襲習折音屯切折徒門内應之應折應對調發下同折徒弔切比部近也折毗志切應下下同折胡駕切令式切折力政從事以便宜從事折如字若漢書云帥下並同折色類切隊切折徒對校尉下同折胡教切校閱校試同下折古孝切後恱折音從行切折才用應期切折於證赴難切折奴旦戮六折音間諜下音牒折古莧切或傳切折直專主將下同折子亮切爲賊下同折于僞切弃太宗諱行焉今從古折古文棄字詰利切唐避掩覆下同折芳福切斥候尺折音覆敗切折北邁臨陳同作陣俗折直刃切下來降切折户江軍令切折力政輒離切折力智窮覈切折下革謂爲切折于僞不任金折而同折切下更作古孟切折古行切又楯切折食尹矛切折莫候具裝晉折按謹奉輸馬具裝百其歩鎧五百領又今六甲折書桓伊傳𥘉伊有馬歩鎧六百領表上之云裝者其馬甲欤折騎具裝然則具毁壞怪折音將領又如字折子亮切切畜蠱同音音古折勑六切下造合閤折音教令切下令人同折音交下吕呈被後同折平義切脯甫折音曽經切折昨登憎惡切折烏路厭魅於下厭祝同折切下茫備切祝俗下同折之救切作呪者詛切折側慮轉配兖折陟蠻切折切又張尸者俗折作屍髠坤折音於惡字折如不更切折古衡冢隴折知俗後同折切作塚熏燻者俗折許云切作狐貍切折力之椁郭折音休咎蚪折許九切折切下具傳用後同折直專切供神用切下同折音恭又居廢闋穴折苦同折切下饗切折許兩饌呈音撰下同折士戀切又省視切折息井釡父折音甑切折子孕匕比折音衾切折去金茵因折音部分切折扶問重害隴折直同折切下劵勸折音黜切折丑律傳符切折張戀使節切折所吏鑰藥折音幡幟昌志切折音翻下供養羊尚切折居用切下發徹直列切達折丑列切又同折也下尸柩尸在棺曰柩折音舊在牀曰甎切折章沿塋塋界折音營闌遺不則舉没於官一說闌希也意希闌而遺忘折闌遮也路有遺物官遮止之伺主至而給與之捍汗折音恐喝呼葛切折丘勇切下展轉下同折陟兊切畜産又折許同折切後貿切折莫候刈乂折音櫕聚子賜切折如字又售切折市救齎兮折子切乞賣切折去既受分下同折扶問切而爲切折于僞止數主折色切徙切折斯此圏切折渠篆絶離切折力智鬬訟第八之常情也辨是窒忿冝得其平後魏折兩怒相犯則鬬二辭相勝則訟此民爲鬬訟律後周改曰鬭競隨復齊名焉折始析前世繫訉律爲鬭律北齊附以訟事鬬對兵仗在後象鬥之形今皆從門户字折都豆切競也從鬥音鬭説文云兩士相毆後同折烏口切拔髮切折蒲八吐血切折湯固折齒時設切凡折之古切又類並同折折傷之眇切折亡沼髠坤折音斫切折之若射切折食亦不著略折直切稍切折所覺穳切折作管肋切折盧則墮切折定卧胎切折吐來辜也下同折音孤罪跌切折田結瞎下同折許鎋切差切折𥘉佳若斷短折音爲人爲人同折于僞切後傳切折符钁忿爭爭鬬之爭折芳吻切下音聲徹列切逹也折直列切又丑制使使者同折色使切下吏卒下同折藏没切詈也餘同折力智切罵袒免音問折音但下拒巨折音捍汗折音愆作愆者折去䖍切俗媵切折以證敎令切下况敎令同折古孝切下力政舅姑曰舅夫折夫之父曰姑折之母令癈切折力呈曽經切折昨登見受切折賢徧服膺陵折於切隨從切折才用旁傍者俗折歩郎切作僵切折居良仆赴折音重物事之􆆵皆同折直隴切下重足跌切折徒結糾切折居黝彈切折徒丹挾私切折胡頬上表書上表並同折時掌切下上離其力智切折如字又考掠栲折作諒考擊也折者非下音供養余亮切折居用切下壓切折烏甲投匿切折女力假人切折工雅爲理爲人爲理並同折于僞切下爲獄見贓切折賢徧雇切折古暮敎令呈切下同折音交下吕邀下同折於霄切撾下同折陟瓜切豋聞音文折音問又訴素折音相爲爲爲告同折于僞切下合抑切折於力單弱丹折音比伍切折毗志推避吐囬切折如字又詐僞第九變魏世始分賊律創而名之後遂無改折詐以譎正僞則冐真大爲此防以該衆倣效切折方往詐假後同折工雅切傳符切折張戀使節切折色吏詐傳下同折直專切覆奏審也折芳福切矯切折居夭上書切注折時掌同見被平義切折賢徧切下制下切折胡駕譴切折去戰選舉絹折息切襲下同折似入切爲人藏爲人並同折于僞切下爲縳切折符钁劵鈔敎切作抄俗折去願切下𥘉簿帳知亮切折裴古切下除去詐去同折起吕切下博易下同折音亦貿切折莫候匿脫吐活切折女刀切下瑞應切折於證敎誘以乆切折音交下和令令欲令同折吕呈切下或購切折古候復除復役同折音福下其見切折賢徧雇倩七政切折古暮切下解官切折佳買餘喪後同折息郎切求假切折古訝受使切折色吏詐陷切折户賺深濘切折乃定朽切折許乆誑切折居汎令度切折吕呈保任鴆折汝同折切下譯下同折音亦傳切折直專雜律第十雜成此篇里悝首曰雜法後周更爲折摭諸篇之遺糅羣罪之目匪類匪次字還爲舊名折雜犯隋去犯作樂字折如鑄切折之戊磨切折莫婆錯切折七各令薄下故今折吕呈切各切折同下歩街皆折音畜産下同折許又切償常後皆同折時亮切又音駭切折侯揩徑射食亦切又時夜切折古定切歩道也下放彈切折徒旦機槍七羊切折音譏下坑切折客庚穽虎豹穿地爲深坑施槍於折音淨機槍者檻屬也以捕爲深坑施鋒刃於中不設機於上以捕小獸折中又設機於上防其躍而岀也穽者亦穿地能岀也折入少不標識音試作幟非下同折昌志切又音志亦爲人下不爲折于僞切人同折爲罪合藥閤折音題䟽切折所去刺作刻俗折七賜切債下同􅊨折側賣切過本越也折古卧切用質致折音以當切折丁浪賭切折當古已分注同􅊨折扶問切岀九若貸子錢之類􅊨折九分岀一以爲息和合音閤􅊨折如字又塋營折音於令依令同折力政切下皆令後同折吕呈切改去切後折起吕同阡陌東西爲陌折南北爲阡種殖作植非折常職切墾田也􅊨折音懇治穢汙切折烏路占固切折章豔陂切折彼爲經過切折古禾從征用折才同折切下公使切折色吏即卒切折子聿勝致升折音傳送切折張戀折傷設切下同折之舌切又時謂曽切折昨登媒合音閤折如字又校斛十爲斗斗十爲斛折古孝切下胡谷切升稱作秤俗折尺證切度字折如行濫察其詐僞飾行儥慝者而誅罰之鄭氏謂使折下孟切注同下盧暫切注同周禮胥師職云之欺誑買者儥音育折人行賣惡物於市巧飾狹切折侯甲鏃切折作木販願折方切評物評贓同折皮命切下其爲切折于僞較固作㩁音同折音角字亦謂之石杠今略杓也禁閉其事揔利入官而折漢書𥘉榷酒酤顔師古曰榷者歩渡橋爾雅讀如本字鄭注曲禮云欲專之曰固後漢書折下無由得有若渡水之榷焉固字亦作辜各書音義曰辜障也榷專也謂障餘人賣買而折紀云辜較在听珍寶又云豪右辜榷注云前利也折自取其障又音章折之亮切更岀切折古行參市切折七南駝何折徒切騾切折郎戈已過下同折古卧切劵切折昔願聽悔切折荒對令擾而小切折吕呈切下隄防下音房折丁兮切漂下同折四消切津濟祭折音同折下航杭折音栰下同折音伐若爲切折于僞聽載下及注同折車載之載茹船子夏作茄塞也折人恕切昜曰繻有衣湍磧七迹切折他端切下卒遇切折倉没庫藏切折才浪然火者非折作然離所切折力致壝切又折唯癸遺折音解牒切折古隘漏泄切折私烈簿書切折裴古致數切折色具稼穯歛曰穯折種曰稼碣掲折音各令下同折吕呈切一當切折丁浪戰陳切折直刃弃擲切折直亦之分切折扶問違令下注同折力政切捕亡第十一絶厲階里悝首制捕法後魏益曰折亡逃不擊罪惡寖長建此捕律以斷爲逃隋世遂復爲捕亡律折捕亡北齊改亡從斷後周易將吏下同折子亮切受使又如字折色吏切逗留又力救切字折音豆下如字不進孟康曰律語也謂軍行頓止稽留不進折或作遛前漢匈奴傳云祈連知虜在前逗遛與住同又音豆折也顔師古曰逗讀自首後倣此折舒救切即爲後爲捕折于僞切同拒巨折音捍汗折音迫伯折音窘切折渠隕折傷設切下同折之舌切又時捕繫切折古詣險難乃旦切折如字又令得卷末同折吕呈切至未斷下同折丁亂切從駕切折才用宦切折胡償償又音常折時亮切過致卧折古切展轉切折陟兖斷獄第十二於審多辟傳致平典斷獄之重折易曰折獄致刑書曰惟刑之恤期罪人得其情也里悝始造囚法魏世分岀此折不其然乎此篇所以殿諸律者誠欲罰值其後周復爲斷獄折篇北齊合於捕斷枷加折音杻丑折音脫去吕切下同折吐活切下起迴易下同折音亦所著下同折張略切解脫下同折佳買切未斷下同折丁亂切爲囚切後折于僞同折更爲雇切折古暮倩切折七政導令即令令失並同折吕呈切下令其翻切折方元通傳切折直專考訉下同折音信覆參切折七南追究又折居切得過下同折古卧切考掠諒折音待差病間也折楚懈切邂逅懈折胡不期而事㑹之折切下胡遘切意鞫切折居六繫計折音當處切折丁浪劾得折胡切麤切折七奴捶切折之蘂恐迫切折丘勇折傷時設切折之舌切又律令切折力政處分切折符問後比又如字折必寐切易者亦折音别使遣使同折色吏切下不當切折丁浪處輕重及注同折昌舉切下處服辯切折符免孕切折以證斷屠短折音報下切折胡駕官任切下折而鴆同愈差也折以主切陪役切折薄回律音義臣楊中和承奉郎守大理寺丞充國子監直講臣宋祁郎守臣楊安國臣馮元臣孫奭天聖七年四月日准勅送崇文院雕造
