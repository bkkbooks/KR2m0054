front:
  text: 故唐律䟽議卷第十二凡一十四條折户婚
  hash: sha256:519de058e409d1598cc3fff4fc6984d75af6ed9ac861f5ca5d872aef2d335fac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_012-1a}
body:
  text: 䟽議曰户婚律者漢相蕭何承秦六篇律後加廐興户三篇為九章之律迄至後周皆名户律北齊以婚事附之名為婚户律隋開皇以户在婚前改為户婚律既論職司事訖即户口婚姻故次職制之下諸脱户者家長徒三年無課役者減二等女户又減三等所由即見在役任者雖脱户及計口折謂一户俱不附貫若不由家長罪其漏口法折多者各從䟽議曰率土黔庶皆有籍書若一户之内盡脱漏不附籍者所由家長合徒三年身及户内並無課役者減二等徒二年若户内並無男夫直以女人為户而脱者又減三等合杖一百注云謂一户俱不附貫此文不計人數唯據脱户縱一身亦為一户不附即依脱户合徒三年縱有百口但一口附户自外不附止從漏口之法若不由家長謂家長不知脱户之情罪其所由家長不坐即見在役任者謂身見在官驅使而户籍無名雖脱户從漏口法既見在役任即無課調若一身脱户合杖六十及計口多者從漏口法漏有課口罪止徒三年漏無課口罪止徒一年半脱口及増減年狀小之類折謂疾老中以免課役者一口徒一年二口加一等罪止徒三年䟽議曰謂脱口及増年入老減年入中小及増狀入疾其從殘疾入廢疾從廢疾入篤疾廢疾雖免課役若入篤疾即得侍人故云之類罪止徒三年其増減非免課役及漏無課役口者四口為一口罪止徒一年半即不滿四口杖六十婢亦同折部曲奴䟽議曰口雖有所増減非免課役者謂増減其年不動課役其漏無課役口者謂身雖是丁見無課役及疾老中小若婦女四口為一口罪止徒一年半漏四口徒一年十二口徒一年半不滿四口杖六十並謂無課役者若其户内漏口或有課役無課役罪名不等者從併滿之法以課口累不課口科之若課口自一口至罪止或累併不加重者止從一重科之奴婢部曲亦同不課之口律稱以免課役課役理不相須一事得免即從脱漏之法諸里正不覺脱漏増减者一口笞四十三口加一等過杖一百十口加一等罪止徒三年脱户折不覺縣脱户亦凖此折者聽從漏口法州若知情者各同家長法䟽議曰里正之任掌案比户口収手實造籍書不覺脱漏户口者脱謂脱户漏謂漏口及增减年狀一口笞四十三口加一等過杖一百十口加一等罪止徒三年里正不覺脱户者聽從漏口法不限户内口之多少皆計口科之州縣脱户亦準此計口科罪不依脱户為法若知脱漏増減之情者緫計里内脱漏増減之口同家長罪法州縣計口罪亦凖此其脱漏户口之中若有知情不知情者亦依併滿之法為罪諸州縣不覺脱漏増減者縣内十口笞三十三十口加一等過杖一百五十口加一等州隨所管縣多少通計為罪十口笞三十管三縣折通計謂管二縣者二増減併在一縣者得以請縣通之若止管一折者三十口笞三十之類計加亦凖此若脱漏餘條通計準此折縣者減縣罪一等各罪止徒三年知情者各從里正法首有文簿者主典為首佐職以下折不覺脱漏増減無文簿者官長為連坐折節級䟽議曰州縣不覺脱漏増減者與上條里正不覺脱漏増減義同十口笞三十三十口加一等即是二百二十口杖一百過杖一百五十口加一等州隨所管縣多少通計為罪若管二縣以上即須通計謂管二縣者二十口笞三十管三縣者三十口笞三十之類計加亦凖此謂一縣三十口加一等即州管二縣者六十口加一等管三縣者九十口加一等若管十縣三百口加一等若脱漏増減併在一縣謂管三縣一縣内脱漏三十口州始笞三十若管四縣一縣内脱漏四十口州亦笞三十故云得以諸縣通之若止管一縣者減縣罪一等謂縣脱三十口州得笞二十之類餘條通計凖此謂一部律内州管縣監管牧折衝府管校尉應通計者得罪亦凖此各罪止徒三年知情者各同里正法其州縣知情得罪同里正法里正又同家長之法共前條家長脱漏罪同注不覺脱漏増減無文簿者官長為首有文簿者主典為首佐職以下節級連坐䟽議曰不覺脱漏増減無簿帳及不附籍書宣導既是長官事由檢察違失故以長官為首皆同不覺脱漏増減之坐次通判官為第二從判官為第三從典為第四從見有文簿致使脱漏増減者勘檢既由案主即用典為首判官為第二從通判官為第三從長官為第四從其間有知情之官並同家長之罪即從私犯首從科之不知情者自依公坐之法諸里正及官司妄脱漏増減以出入課役一口徒二年二口加一等贓重入已者以枉法論至死者加役流入官者坐贓論䟽議曰里正及州縣官司各於所部之内妄為脱漏户口或増減年狀以出入課役一口徒一年二口加一等十五口流三千里若有因脱漏増減取其課調入已計贓得罪重於脱漏増減口罪者即凖贓以枉法論計贓至死者加役流其贓入官者坐贓論其品官受贓雖輕以枉法論一疋以上即除名不必要須贓重衆人之物亦累倍而論之諸私入道及度之者杖一百家長當罪折若由家長已除貫者徒一年本貫主司及觀寺三綱知情者與同罪若犯法合出觀寺經斷不還俗者從私度法即監臨之官私輒度人者一人杖一百二人加一等䟽議曰私入道謂為道士女冠僧尼等非是官度而私入道及度之者各杖一百注云若由家長家長當罪既罪家長即私入道者不坐已除貫者徒一年及度之者亦徒一年本貫主司謂私入道人所屬州縣官司及所住觀寺三綱知情者各與入道人及家長同罪若犯法還俗合出觀寺官人斷訖牒觀寺知仍不還俗者從私度法斷後陳訴須著俗衣仍披法服者從私度法科杖一百即監臨之官不依官法輒度人者一人杖一百二人加一等罪止流三千里若州縣官司所度人免課役多者當條雖有罪名所為重者自從重論並依上條妄増減出入課役科之其官司私度人𬒳度者知私度情而受度者為從坐若不知私度情者而受度人無罪諸祖父母父母在而子孫别籍異財者徒三年須下條凖此折别籍異財不相䟽議曰稱祖父母父母在則曽高在亦同若子孫别生户籍財産不同者子孫各徒三年注云别籍異財不相須或籍别財同或户同財異者各徒三年故云不相須下條準此謂父母䘮中别籍異財亦同此義若祖父母父母令别籍及以子孫妄繼人後者徒二年子孫不坐䟽議曰若祖父母父母處分令子孫别籍及以子孫妄繼人後者得徒二年子孫不坐但云别籍不云令其異財令異財者明其無罪諸居父母䘮生子及兄弟别籍異財者徒一年䟽議曰居父母䘮生子已於名例免所居官章中解訖皆謂在二十七月内而姙娠生子者及兄弟别籍異財各徒一年别籍異財不相須其服内生子事若未發自首亦原諸飬子所飬父母無子而捨去者徒二年若自生子及本生無子欲還者聽之䟽議曰依户令無子者聽飬同宗於昭穆相當者既蒙収飬而輙捨去徒二年若所飬父母自生子及本生父母無子欲還本生者並聽即兩家並皆無子去住亦任其情若飬處自生子及雖無子不願留飬欲遣還本生者任其所飬父母即飬異姓男者徒一年與者笞五十其遺棄小児年三嵗以下雖異姓聽収飬即從其姓䟽議曰異姓之男本非族類違法収飬故徒一年違法與者得笞五十飬女者不坐其小兒年三嵗以下本生父母遺棄若不聽収飬即性命将絶故雖異姓仍聽収飬即從其姓如是父母遺失於後來識認合還本生失兒之家量酬乳哺之直諸立嫡違法者徒一年即嫡妻年五十以上無子者得立庶以長不以長者亦如之䟽議曰立嫡者本擬承襲嫡妻之長子為嫡子不依此立是名違法合徒一年即嫡妻年五十以上無子者謂婦人年五十以上不復乳育故許立庶子為嫡皆先立長不立長者亦徒一年故云亦如之依令無嫡子及有罪疾立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曽玄以下凖此無後者為户絶諸飬雜户男爲子孫者徒一年半飬女杖一百官户各加一等與者亦如之䟽議曰雜户者前代犯罪没官散配諸司驅使亦附州縣户貫賦役不同白丁若有百姓飬雜户男爲子孫者徒一年半飬女者杖一百飬官户者各加一等官户亦是配隷没官唯屬諸司州縣無貫與者各與飬者同罪故云亦如之雖㑹赦皆合改正若當色自相飬者同百姓飬子之法雜户飬官户或官户飬雜户依户令雜户官户皆當色為婚據此即是别色凖法不得相飬律既不制罪名宜依不應為之法飬男從重飬女從輕若私家部曲奴婢飬雜户官户男女者依名例律部曲奴婢有犯本條無正文者各凖良人皆同百姓科罪若飬部曲及奴為子孫者杖一百各還正之主折無者聽從良折及主自飬䟽議曰良人飬部曲及奴為子孫者杖一百各還正之謂養雜户以下雖㑹赦皆正之各從本色注云無主謂所養部曲及奴無本主者及主自養謂主養當家部曲及奴為子孫亦各杖一百並聴從良為其經作子孫不可充賤故也若養客女及婢為女者從不應為輕法笞四十仍準飬子法聴從良其有還壓為賤者並同放奴及部曲為良還壓為賤之法諸放部曲為良巳給放書而壓為賤者徒二年若壓為部曲及放奴婢為良而壓為賤者各減一等即壓為部曲及放為部曲而壓為賤者又各減一等各還正之䟽議曰依户令放奴婢為良及部曲客女者並聴之皆由家長給手書長子以下連署仍經本屬申牒除附若放部曲客女為良壓為賤者徒二年若壓為部曲者謂放部曲客女為良還壓為部曲客女及放奴婢為良還壓為賤各減一等合徒一年半即壓為部曲者謂放奴婢爲良壓爲部曲客女及放爲部曲者謂放奴婢爲部曲客女而壓爲賤者又各減一等合徒一年仍並改正從其本色故云各還正之此文不言客女者名例律稱部曲者客女同故解同部曲之例問曰放客女及婢爲良却留爲妾者合得何罪荅曰妾者娶良人爲之據户令自贖免賤本主不留爲部曲者任其所樂况放客女及婢本主留爲妾者依律無罪凖自贖免賤者例得留為妾又問部曲娶良人女為妻夫死服滿之後即合任情去住其有欲去不放或因壓留為妾及更抑配與部曲及奴各合得何罪荅曰服滿不放律無正文當不應為重仍即任去若元取當色為婦未是良人留充本色準法無罪若是良人女壓留為妾即是有所威逼從不應得為重科或抑配與餘部曲同放奴婢為良却壓為部曲合徒一年如配與奴同與奴娶良人女合徒一年半上籍為婢者流三千里此等轉嫁為妻及妾兩和情願者並不合得罪唯本是良者不得願嫁賤人諸相冐合户者徒二年無課役者減二等為親及折謂以踈避者折有所規主司知情與同罪䟽議曰依賦役令文武職事官三品以上若郡王期親及同居大功親五品以上及國公同居期親並免課役既為同居有所蠲免相冐合户故得徒二年無課役者或籍資䕃贖罪事既輕於課役故減二等得徒一年注云謂以踈為親律令所䕃各有等差若以踈相合即失户數規其資䕃即失課役如斯合户得此徒刑若蠲免更多或假䕃重者各依本法自從重論主司知情與同罪主司謂里正以上知冐户情有課役無課役各與同罪即於法應别立户而不聽别應合户而不聽合者主司杖一百䟽議曰應别謂父母終亡服紀已闋兄弟欲别者應合户謂流離失郷父子異貫依令合户而主司不聽者各合杖一百應别應合之類非止此條略舉為例餘並凖此諸同居卑㓜私輒用財者十疋笞十十疋加一等罪止杖一百即同居應分不均平者計所侵坐贓論減三等䟽議曰凢是同居之内必有尊長尊長既在子孫無所自專若卑㓜不由尊長私輒用當家財物者十疋笞十十疋加一等罪止杖一百即同居應分謂凖令分别而財物不均平者凖户令應分田宅及財物者兄弟均分妻家所得之財不在分限兄弟亡者子承父分違此令文者是為不均平謂兄弟二人均分百疋之絹一取六十疋計所侵十疋合杖八十之類是名坐贓論減三等諸賣口分田者一畒笞十二十畒加一等罪止杖一百地還本主財没不追即應合賣者不用此律䟽議曰口分田謂計口受之非永業及居住園宅輒賣者禮云田里不鬻謂受之於公不得私自鬻賣違者一畒笞十十畒加一等罪止杖一百賣一頃八十一畒即為罪止地還本主財没不追即應合賣者謂永業田家貧賣供葬及田分田賣充宅及碾磑邸店之類狹鄉樂遷就寛者準令並許賣之其賜田欲賣者亦不在禁限其五品以上若勲官永業地亦並聽賣故云不用此律故唐律䟽議卷第十二
