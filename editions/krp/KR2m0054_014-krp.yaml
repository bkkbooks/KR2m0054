front:
  text: 故唐律䟽議卷第十四凡一十四條折戸婚諸同姓為婚者各徒二年緦麻以上以姦論
  hash: sha256:eb5f3f7b075bd1a7beaca4157cda85aa7895ed78ba41e7c17fa45d8fcd725913
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_014-1a}
body:
  text: 䟽議曰同宗共姓皆不得為婚違者各徒二年然古者受姓命氏因彰徳功邑居官爵事非一緒其有祖宗遷易年代寖逺流源析本罕能推詳至如魯衛文王之昭凡蔣周公之胤初雖同族後各分封並傳國姓以為宗本若與姬姓為婚者不在禁例其有聲同字别音響不殊男女辯姓豈宜仇匹若陽與楊之類又如近代以來特䝉賜姓譜牒仍在昭穆可知今姓之與本枝並不合共為婚媾其有複姓之類一字或同受氏既殊元非禁限若同姓緦麻以上為婚者各依雜律姦條科罪問曰同姓為婚各徒二年未知同姓為妾合得何罪答曰買妾不知其姓則卜之取決蓍龜本防同姓同姓之人即嘗同祖為妻為妾亂法不殊户令云娶妾仍立婚契即驗妻妾俱名為婚依凖禮令得罪無别若外姻有服属而尊卑共為婚姻及娶同母異父姊妹若妻前夫之女者称前夫之女凖此折謂妻所生者餘條亦各以奸論䟽議曰外姻有服属者謂外祖父母舅姨妻之父母此等若作婚姻者是名尊卑共為婚姻及娶同母異父姊妹若妻前夫之女者注云謂妻所生者謂前夫之女後夫娶之是妻所生者如其非妻所生自從本法餘條称前夫之女者準此據雜律奸妻前夫之女亦據妻所生者故云亦準此各以奸論其外姻雖有服非尊卑者為婚不禁其父母之姑舅兩姨姊妹及姨若堂姨母之姑堂姑己之堂姨及再從姨堂外甥女女婿姊妹並不得為婚姻違者各杖一百並離之䟽議曰父母姑舅兩姨姊妹於身無服乃是父母緦麻據身是尊故不合娶及姨又是父母小功尊若堂姨雖於父母無服亦是尊属母之姑堂姑並是母之小功以上尊己之堂姨及再從姨堂外甥女亦謂堂姊妹所生者女婿姊妹於身雖並無服據理不可為婚並為尊卑混亂人倫失序違此為婚者各杖一百自同姓為婚以下雖㑹赦各離之諸甞為袒免親之妻而嫁娶者各杖一百緦麻及舅甥妻徒一年小功以上以姦論妾各减二等並離之䟽議曰髙祖親兄弟曽祖堂兄弟祖再從兄弟父三從兄弟身四從兄弟三從姪再從姪孫並緦麻絶服之外即是袒免既同五代之祖服制尚異他人故甞為袒免親之妻不合復相嫁娶輒嫁娶者男女各杖一百緦麻及舅甥妻謂同姓緦麻之妻及為舅妻若外甥妻而更相嫁娶者其夫尊卑有服嫁娶各徒一年小功以上以姦論小功之親多是本族其外姻小功者唯有外祖父母若有嫁娶一同姦法若經作袒免親妾者各杖八十緦麻親及舅甥妾各杖九十小功以上各减姦罪二等故云妾各减二等並離之姦妾本條减妻一等此條以姦論妾减二等即是娶妾者累减三等稱以姦論者並依姦法小功之妻若寡在夫家而嫁娶者各依姦小功以上妻法其被放出或改適他人即於前夫服義並絶姦者依律止是凡姦若其嫁娶亦同凡姦之坐又稱妾者據元是袒免以上親之妾而娶者得减二等若是前人之妻今娶為妾止依娶妻之罪不得以妾减之如為前人之妾今娶為妻亦依娶妾之罪諸夫喪服除而欲守志非女之祖父母父母而强嫁之者徒一年期親嫁者减二等各離之女追歸前家娶者不坐䟽議曰婦人夫喪服除誓心守志唯祖父母父母得奪而嫁之非女之祖父母父母謂大功以下而輙强嫁之者合徒一年期親嫁者謂伯叔父母姑兄弟姊妹及姪而强嫁之者減二等杖九十各離之女追歸前家娶者不坐諸娶逃亡婦女為妻妾知情者與同罪至死者减一等離之即無夫㑹恩免罪者不離䟽議曰婦女犯罪逃亡有人娶為妻妾若知其逃亡而娶流罪以下並與同科唯婦人本犯死罪而娶者流三千里仍離之即逃亡婦女無夫又㑹恩赦得免罪者不合從離其不知情而娶凖律無罪若無夫即聴不離諸監臨之官娶所監臨女為妾者杖一百若為親屬娶者亦如之其在官非監臨者减一等女家不坐䟽議曰監臨之官謂職當臨統案驗者娶所部人女為妾者杖一百為親屬娶者亦合杖一百親屬謂本服緦麻以上親及大功以上婚姻之家既是監臨之官為娶親屬不坐若親屬與監臨官同情强娶或恐喝娶者即以本律首從科之皆以監臨為首娶者為從其在官非監臨者謂在所部任官而職非統攝案驗而娶所部之女及與親屬娶之各减監官一等女家並不合坐其職非統攝臨時監主而娶者亦同仍各離之即枉法娶人妻妾及女者以姦論加二等属娶折為親同折者亦行求者各减二等各離之䟽議曰有事之人若妻若妾而求監臨官司曲法判事娶其妻妾及女者以姦論加二等其娶者有親屬應加罪者各依本法仍加監臨姦罪二等為親屬娶者亦同皆同自娶之坐行求者各減二等其以妻妾及女行求嫁與監臨官司得罪減監臨二等親屬知行求枉法而娶人妻妾及女者自依本法為從坐仍各離之者謂夫自嫁妻妾及女與枉法官人兩俱離之妻妾及女理不自由故並不坐諸和娶人妻及嫁之者各徒二年妾減二等各離之即夫自嫁者亦同離之折仍兩䟽議曰和娶人妻及嫁之者各徒二年若和嫁娶妾減二等徒一年各離之謂妻妾俱離即夫自嫁者亦同謂同嫁妻妾之罪二夫各離故云兩離之諸卑幼在外尊長後為定婚而卑幼自娶妻已成者婚如法未成者從尊長違者杖一百䟽議曰卑幼謂子孫弟姪等在外謂公私行詣之處因自娶妻其尊長後為定婚若卑幼所娶妻已成者婚如法未成者從尊長所定違者杖一百尊長謂祖父母父母及伯叔父母姑兄姊諸妻無七出及義絶之狀而出之者徒一年半雖犯七出有三不去而出之者杖一百追還合若犯惡疾及姦者不用此律䟽議曰伉儷之道義期同穴一與之齊終身不改故妻無七出及義絶之狀不合出之七出者依令一無子二淫泆三不事舅姑四口舌五盜竊六妬忌七惡疾義絶謂毆妻之祖父母父母及殺妻外祖父母伯叔父母兄弟姑姊妹若夫妻祖父母父母外祖父母伯叔父母兄弟姑姊妹自相殺及妻毆詈夫之祖父母父母殺傷夫外祖父母伯叔父母兄弟姑姊妹及與夫之緦麻以上親若妻母姦及欲害夫者雖㑹赦皆為義絶妻雖未入門亦從此令若無此七出及義絶之状輙出之者徒一年半雖犯七出有三不去三不去者一謂經持舅姑之喪二娶時賤後貴三有所受無所歸而出之者杖一百並追還合若犯惡疾及姦者不用此律謂惡疾及姦雖有三不去亦在出限故云不用此律問曰妻無子者聴出未知幾年無子即合出之答曰律云妻年五十以上無子聴立庶以長即是四十九以下無子未合出之諸犯義絶者離之違者徒一年若夫妻不相安諧而和離者不坐䟽議曰夫妻義合義絶則離違而不離合得一年徒罪離者既無各字得罪止在一人皆坐不肯離者若兩不願離即以造意為首隨從者為從皆謂官司判為義絶者方得此坐若未經官司處断不合此科若夫妻不相安諧謂彼此情不相得兩願離者不坐即妻妾擅去者徒二年因而改嫁者加二等䟽議曰婦人從夫無自専之道雖見兄弟送迎尚不踰閾若有心乖唱和意在分離背夫擅行有懐他志妻妾合徒二年因擅去而即改嫁者徒三年故云加二等室家之敬亦為難久帷薄之内能無忿爭相嗔蹔去不同此罪問曰妻妾擅去徒二年因而改嫁者加二等其有父母期親等主婚若為科斷答曰下條嫁娶違律祖父母父母主婚者獨坐主婚若期親尊長主婚者主婚為首男女為從父母知女擅去理須訓以義方不送夫家違法改嫁獨坐父母合徒三年其妻妾之身唯得擅去之罪期親主婚自依首從之法諸與奴娶良人女為妻者徒一年半女家减一等離之其奴自娶者亦如之主知情者杖一百因而上籍為婢者流三千里䟽議曰人各有耦色類須同良賤既殊何宜配合與奴娶良人女為妻者徒一年半女家减一等合徒一年仍離之謂主得徒坐奴不合科其奴自娶者亦得徒一年半主不知情者無罪主若知情杖一百因而上籍為婢者流三千里若有為奴娶客女為妻者律雖無文即須比例科斷名例律稱部曲者客女同闘訟律部曲毆良人加凡人一等奴婢又加一等其良人毆部曲减凡人一等奴婢又减一等即部曲奴婢相毆傷殺者各依部曲與良人相毆傷殺法注云餘條良人部曲奴婢私相犯本條無正文者並凖此奴娶良人徒一年半即娶客女减一等合徒一年主知情者杖九十因而上籍為婢者徒三年其所生男女依户令不知情者從良知情者從賤即妄以奴婢為良人而與良人為夫妻者徒二年者亦同折奴婢自妄各還正之䟽議曰以奴若婢妄作良人嫁娶為良人夫婦者所妄之罪合徒二年奴婢自妄嫁娶亦徒二年各還正之稱正之者雖㑹赦仍改正之若娉財多凖罪重於徒二年者依詐欺計贓科断諸雜户不得與良人為婚違者杖一百官户娶良人女者亦如之良人娶官户女者加二等䟽議曰雜户配隷諸司不與良人同類止可當色相娶不合與良人為婚違律為婚杖一百官户娶良人女者亦如之謂官户亦隷諸司不屬州縣亦當色婚嫁不得輒娶良人違者亦杖一百良人娶官户女者加二等合徒一年半官户私嫁女與良人律無正文並須依首從例即奴婢私嫁女與良人為妻妾者凖盜論知情娶者與同罪各還正之䟽議曰奴婢既同資財即合由主處分輙将其女私嫁與人須計婢贓凖盜論罪五疋徒一年五疋加一等知情娶者與奴婢罪同不知情者不坐自雜户與良人爲婚以下得罪仍各離而改正其工樂雜户官户依令當色爲婚若異色相娶者律無罪名並當違令既乖本色亦合正之太常音聲人依令婚同百姓其有雜作婚姻者並凖良人其部曲奴婢有犯本條無正文者依律各凖良人如與雜户官户爲婚並同良人共官户等爲婚之法仍各正之諸違律為婚雖有媒娉而恐喝娶者加本罪一等强娶者又加一等被强者止依未成法䟽議曰依律不許為婚其有故為之者是名違律為婚假如雜户與良人為婚雖有媒娉而恐喝娶者加本罪一等本坐合杖一百加一等處徒一年强娶者又加一等謂以威若力而强娶之合徒一年半被强者止依未成法下條未成者各減已成五等女家止笞五十之類即應為婚雖已納娉期要未至而强娶及期要至而女家故違者各杖一百䟽議曰即應為婚謂依律合為婚者雖已納娉財元契吉日未至而男家强娶及期要已至吉日而女家故違不許者各杖一百得罪依律不合從離諸違律為婚當條稱離之正之者雖㑹赦猶離之正之定而未成亦是娉財不追女家妄冐者追還䟽議曰違律為婚謂依律不合作婚而故違者當條稱離之謂上條男家妄冐或女家妄冐離之又正之者謂上條奴婢私嫁女與良人仍正之雖㑹大赦稱離之者猶離之稱正之者猶正之定而未成亦是假令雜户與良人為婚已定監臨之官娶所監臨女未成㑹赦之後亦合離正故云定而未成亦是男家送財已訖雖合離正其財不追若女家妄冐應離正者追財物還男家凡稱離之正之者赦後皆合離正名例律云㑹赦應改正經責簿帳而不改正各論如本犯律應離之輩即是赦後須離仍不離者律無罪條猶當不應得爲從重合杖八十若判離不離自從姦法諸嫁娶違律祖父母父母主婚者獨坐主婚條折本法至死者減一等折稱以姦論者各從本䟽議曰嫁娶違律謂於此篇内不許爲婚祖父母父母主婚嫁爲奉尊者教命故獨坐主婚嫁娶者無罪假令祖父母父母主婚爲子孫娶舅甥妻合徒一年唯祖父母父母得罪子孫不坐注本條稱以姦論者各從本法至死者减一等䟽議曰本條稱以姦論者謂上條緦麻以上以姦論假令父與其子娶子之從母依雜律姦從母者流二千里强者絞即父亦得流二千里同雜犯其子若自犯有官者仍除名此名各從本法至死减一等者若强娶從母為妻或婚寡伯叔母非被出及改嫁者本條合死今减一等合流三千里若期親尊長主婚者主婚為首男女為從餘親主婚者事由主婚主婚為首男女為從事由男女男女為首主婚為從䟽議曰期親尊長次於父母故主婚為首男女為從餘親主婚者餘親謂期親卑幼及大功以下主婚即各以所由為首事由主婚主婚為首男女為從事由男女男女為首主婚爲從雖以首從科之稱以姦論者男女各從姦法應除名者亦除名其男女被逼若男年十八以下及在室之女亦主婚獨坐䟽議曰男女被逼謂主婚以威若力男女理不自由雖是長男及寡女亦不合得罪若男年十八以下及在室之女亦主婚獨坐男女勿論未成者各减已成五等媒人各减首罪二等䟽議曰未成者謂違律為婚當條合得罪定而未成者减已成五等假有同姓為婚合徒二年未成即杖八十此是名减五等其媒人猶徒一年未成者杖六十是名各减首罪二等各凖當條輕重依律减之略舉同姓為例餘皆倣此凡違律為婚稱强者皆加本罪二等稱以姦論有强者止加一等媒人各减姦罪一等故唐律䟽議卷第十四
