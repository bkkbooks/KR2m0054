front:
  text: 故唐律䟽議卷第五凡八條折名例諸犯罪未發而自首者原其罪徵如法折正贓猶
  hash: sha256:cdc045e60b62f3340d44d6cc9a994241292b22f3f03a4fc0344dab416be6772a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_005-1a}
body:
  text: 䟽議曰過而不改斯成過矣今能改過來首其罪皆合得原若有文牒言告官司判令三審牒雖未入曹局即是其事已彰雖欲自新不得成首注正贓猶徵如法䟽議曰稱正贓者謂盗者自首不徵倍贓稱如法者同未首前法徵還官主枉法之類彼此俱罪猶徵没官取與不和及乞索之類猶徵還主其輕罪雖發因首重罪者免其重罪䟽議曰假有盜牛事發因首鑄錢鑄錢之罪得原盗牛之犯仍坐之類即因問所劾之事而别言餘罪者亦如之䟽議曰劾者推鞫之别名假有已𬒳推鞫因問乃更别言餘事亦得免其餘罪同因首重罪之義故云亦如之即遣人代首若於法得相容隱者為首及相告言者各聽如罪人身自首法以上本服期雖捕折縁坐之罪及謀叛自首例折告俱同䟽議曰遣人代首者假有甲犯罪遣乙代首不限親踈但遣代首即是若於法得相容隱者謂依下條同居及大功以上親等若部曲奴婢為主首及相告言者此還據得容隱者縱經官司告言皆同罪人身首之法其小功緦麻相隱既減凡人三等若其為首亦得減三等注縁坐之罪及謀叛以上本服期雖捕告俱同自首例䟽議曰縁坐之罪者謂謀反大逆及謀叛已上道者並合縁坐及謀叛以上本服期者謂非縁坐若叛未上道大逆未行之類雖尊壓出降無服各依本服期雖捕告以送官司俱同罪人自首之法其聞首告𬒳追不赴者不得原罪赴者身折謂止坐不䟽議曰謂犯罪之人聞有代首為首及得相容隱者告言於法雖復合原追身不赴不得免罪謂止坐不赴者身首告之人及餘應縁坐者仍依首法即自首不實及不盡者以不實不盡之罪罪之至死者聽減一等計不盡之數科之折自首贓數不盡者止䟽議曰自首不實謂强盗得贓首云竊盗贓雖首盡仍以强盗不得財科罪之類及不盡者謂枉法取財十五疋雖首十四疋餘一疋是為不盡之罪稱罪之者不在除免倍贓監主加罪加役流之例假有人强盗二十疋自首十疋餘有十疋不首本法尚合死罪為其自有悔心罪狀因首而發故至死聽減一等問曰謀殺凢人乃云是舅或謀殺親舅復云凢人姓名是同舅與凢人狀别如此之類若為科斷荅曰謀殺凢人是輕謀殺舅罪乃重重罪既得首免輕罪不可仍加所首姓名既同唯止舅與凡人有異謀殺之罪首親舅與凡人狀虛坐是不應得為從輕合笞四十其謀殺親舅乃云凡人者但謀殺凡人唯極徒坐謀殺親舅罪乃至流謀殺雖已首陳須科不盡之罪三流之坐凖徒四年謀殺凡人合徒三年不言是舅首陳不盡處徒一年又問一家漏十八口並有課役乃首九口未知合得何罪荅曰律定罪名當條見義如户内止隠九口告稱隠十八口推勘九口是實誣告者不得反坐以本條隱九口者罪止徒三年罪至所止所誣雖多不反坐今首外仍隱九口當條以不盡之罪罪之仍合處徒三年又問乙私有甲弩乃首云止有稍一張輕重不同若為科處荅曰甲弩不首全罪見在首矟一張是别言餘罪首矟之罪得免甲弩之罪合科既自首不實至死聽減一等又問假有監臨之官受財不枉法贓滿三十疋罪合加役流其人首云受所監臨其贓並盡合科何罪荅曰律云以不實不盡之罪罪之至死聽減一等但不枉法與受所監臨得罪雖别贓已首盡無財可科唯有因事不因事有殊止從不應為重科杖八十若枉法取物首言受所監臨贓亦首盡無財可坐所枉之罪未首宜從所枉科之若枉出入徒流自從故出入徒流為罪如枉出入百杖以下所枉輕者從請求施行為坐本以因贓入罪贓既首訖不可仍用至死減一等之法注自首贓數不盡者止計不盡之數科之䟽議曰假有竊盜十疋止首五疋五疋不首仍徒一年是名止計不盡之數科之科之之義是復上文亦與罪之之義不殊不盡贓多至死者減一等其知人欲告及亡叛而自首者減罪二等坐之䟽議曰犯罪之徒知人欲告及案問欲舉而自首陳及迯亡之人并叛巳上道此類事發歸首者各得減罪二等坐之即亡叛者雖不自首能還歸本所者亦同䟽議曰雖不自首謂不經官司首陳能還歸本所者謂歸𥘉迯叛之所亦同自首之法減罪二等坐之若本所移改還歸移改之所亦同其於人損傷仍從故殺傷法本應過失者聽從本折因犯殺傷而自首者得免所因之罪䟽議曰損謂損人身體傷謂見血為傷雖部曲奴婢傷損亦同良人例注因犯殺傷而自首者得免所因之罪仍從故殺傷法本應過失者聽從本䟽議曰假有因盗故殺傷人或過失殺傷財主而自首者盗罪得免故殺傷罪仍科若過失殺傷仍從過失本法故云本應過失聽從本於物不可備償者聴同免法折本物見在首䟽議曰稱物者謂寳印符節制書官文書甲弩旌旗幡幟禁兵器及禁書之類私家既不合有是不可償之色本物見在首者謂不可備償之類本物見在聽同首法即事發迯亡罪得减迯亡之坐折雖不得首所犯之䟽議曰假有盜罪合徒事發迯走已經數日而復陳首犯盜已發雖首不原迯走之罪聽減二等若越度關及姦謂犯良人折私度亦同姦䟽議曰度關有三等罪越度私度冒度其私度越度自首不原冒度之罪自首合免若姦良人者自首不原并私習天文者並不在自首之例䟽議曰天文玄遠不得私習從於人損傷以下私習天文以上俱不在自首之例諸犯罪共亡輕罪能捕重罪首而首者亦同折重者應死殺䟽議曰犯罪事發已囚未囚及同犯别犯而共亡者或流罪能捕死囚或徒囚能捕流罪首如此之類是爲輕罪能捕重罪首注重者應死殺而首者亦同䟽議曰律稱應死未須断訖準犯合死迯走輕者殺而來首亦同捕首法其流罪以下迯亡輕者能捕重罪首者捕法自準捕亡律若死罪之囚不必捕格方便殺得者亦是及輕重等獲半以上首者皆除其罪者依常法折常赦所不原䟽議曰假有五人俱犯百杖相共迯走有一人心悔更獲二人而首即是獲半以上及從共亡以下本罪及亡罪並得從原故云皆除其罪注常赦所不原者依常法䟽議曰常赦所不原者謂雖㑹大赦猶處死及流若除名免所居官及移郷之類此等既赦所不原故雖捕首亦不合免問曰假有犯百杖者十人同共迯走六人歸首又捕得迯者二人得同獲半以上除罪以否荅曰律開相捕之法本為少能捕多輕能捕重輕重等者猶須獲半今六人共獲二人便是以多捕少依如律義不合首原亡罪首減二等本犯仍依法断若輕能捕重所獲雖少合原如輕重罪同不可首多獲少亦須首獲數等然可得原又問甲乙二人輕重罪等俱共迯走甲捕乙首甲免罪否荅曰律稱獲半以上首者皆除其罪甲乙共亡者甲能獲乙迯罪已盡更無亡人獲半尚得免辜况其迯亡全盡甲合從原假有十人合死俱共迯亡五人捕得五人亦是首獲相半既開首捕之路此類各合全免又問緦麻以上犯罪共亡得同捕首法以否荅曰緦麻以上親属者罪不合告言藏亡尚許減罪豈得輒相捕送此捕為凡人發例不與親戚生文若捕親属首者得減逃亡之坐本犯之罪不原仍依傷殺及告親属法其犯謀叛以上得依捕首之律即因罪人以致罪而罪人自死者聽減本罪二等䟽議曰因罪人以致罪謂藏匿罪人或過致􅓵給及保證不實之類今罪人非𬒳刑戮而自死者又聽減罪二等若罪人自首及遇恩原減者亦準罪人原減法䟽議曰謂因罪人以得罪罪人於後自首及遇恩原減者或得全原或減一等二等之類一依罪人全原減降之法其應加杖及贖者各依杖贖例䟽議曰其應加杖假有官户奴婢犯流而為過致􅓵給捉獲官户奴婢等流罪加杖二百過致􅓵給者並依杖二百罪減之不從流減其罪人本合收贖過致􅓵給者亦依贖法不以官當加杖配役問曰官户等犯流加杖二百過致者應減幾等而科荅曰犯徒應加杖者一等加二十加至二百當徒三年乃至流刑杖亦二百即加杖之流應減在律殊無節文比附刑名止依徒減一等加杖一百八十諸盗詐取人財物而於財主首露者與經官司自首同䟽議曰盗謂强盜竊盗詐謂詐欺取人財物而能悔過於財主首露與經官司首同若知人將告而於財主首者亦得減罪二等問曰假有甲盗乙絹五疋經乙自首乙乃取甲十疋之物為正倍等贓合當何罪荅曰依律首者唯徵正贓甲既經乙自首因乃剩取其物既非監主而乃因事受財合科坐贓之罪其於餘贓應坐之屬悔過還主者聽減本罪三等坐之䟽議曰餘贓謂盜詐之外應得罪者並是雖不於官司陳首能悔過還主者聽減本罪三等假有枉法受財十疋合流悔過還主得減三等處徒二年之類既云坐之自依下例即財主應坐者減罪亦準此䟽議曰財主應坐謂受財枉法不枉法受所監臨及坐贓與財人各亦得罪若取人悔過還主得減三等財主亦減本坐三等科之問曰貿易官物復以本物却還或本物已費别將新物相替如此悔過得免罪否荅曰若以本物却還得免計贓爲罪仍依盜不得財科之若其非官本物更以新物替之雖復私自陪備貿易之罪仍在諸同職犯公坐者長官為一等通判官為一等判官為一等主典為一等各以所由為首判官折若通坐異判以上之官折以上異判有失者止䟽議曰同職者謂連署之官公坐謂無私曲假如大理寺斷事有違即大卿是長官少卿及正是通判官丞是判官府吏是主典是為四等各以所由為首者若主典檢請有失即主典為首丞為第二從少卿二正為第三從太卿為第四從即主簿録事亦為第四從若由丞判斷有失以丞為首少卿二正為第二從大卿為第三從典為第四從主簿録事當同第四從注若通判官以上異判有失者止坐異判以上之官䟽議曰假如一正異丞所判有失又有一正復同判即二正同為首罪若一正先依丞判一正始作異同異同者自為首科同丞者便即無罪假如丞斷合理一正異斷有乖後正直云依判即同前正之罪若云依丞判者後正無辜二卿異同亦各準此其通判官以上異同失理應連坐者唯長官及檢勾官得罪以下並不坐通判官以下有失或中間一是一非但長官判從正法餘者悉皆免罪内外諸司皆準此問曰假曰判官處斷乖失通判官異同得理長官不依通判官斷還同判官各有何罪荅曰案若申覆唯通判官一人合理即上下俱得免科如其當處斷訖施行即乖失者依法得罪唯通判長官合理餘悉不論其闕無所承之官亦依此四等官為法即無四等官者止準見官為罪䟽議曰四等之内但有闕官雖一人處斷乖失亦作四等為坐假如大理卿或丞正一人見在判有乖失判者自當首罪勾官仍同四等下從即無四等官者為關戍之類無通判官闗丞即至闗令并主典唯有三等假有典檢請有失丞為第二從令為第三從録事同為第三從下州縣市令唯與典二人此等止準見官二等之罪若同職有私連坐之官不知情者以失論䟽議曰同職謂連判之官及典有私故違正理餘官連判不知挾私情者以失論假有人犯徒一年判官曲理斷免餘官不覺自依失出之法有私者為首不覺者為從仍為四等科之失出減伍等失入減三等之類自餘與奪之事失者減三等及云以失論之類各從本條問曰有主典増減文案詐欺取贓五疋判官不覺依増減狀判訖未知判官於詐欺贓失減唯復於増減官文書失減荅曰但依律得罪皆從所判為坐取贓事在案外増減文案見行止從増減科之不可從贓而科又問判官主典有私故出流罪通判及長官不知情若為科首從之罪荅曰假令主典為首還合流坐判官為從合徒三年不知情者從公坐失法公坐既有四等通判官第三從論減典二等又失出减五等從流減七等合杖九十長官又減一等合杖八十其有放而還獲及本應例减仍各依本法即餘官及上官案省不覺者各逓减一等下官不覺者又逓減一等亦各以所由為首首從减從折减謂首减䟽議曰餘官者謂比州比縣及省内比司并諸府寺監不相管隷者上官者在京諸司向省臺及諸州向尚書省諸縣向州之類如州上文書向尚書省有錯失省司不覺者省司所由之首減州所由首一等同職逓為四等法首從減之其餘官不覺亦準此若省司下符向州錯失州司不覺州司所由首减省司所由首二等同職逓為四等首從法减之檢勾之官同下從之罪䟽議曰檢者謂發辰檢稽失諸司録事之類勾者署名勾訖録事叅軍之類皆同下從若有四等官同四等從有三等官同三等從有二等官同二等從其無檢勾之官者雖判官發辰勾稽若有乖失自於判處得罪不入勾檢之坐應奏之事有失勘讀及省審之官不駮正者減下從一等䟽議曰尚書省應奏之事類縁門下者以狀牒門下省準式依令先門下録事勘給事中讀黄門侍郎省侍中審有乖失者依法駮正却牒省司若實有乖失不駮正者録事以上减省下從一等既無逓减之文即侍中以下同减一等律以既减下從得罪最輕若更逓减餘多無坐駮正之法唯在錄事以上故所掌主典律無罪名若辭狀隱伏無以驗知者勿論䟽議曰辭狀隱伏者謂脱錯文字増减事情辭狀隱微案覆難覺者故云自餘官以下案省不覺並得免罪故云勿論諸公事失錯自覺舉者原其罪䟽議曰公事失錯謂縁公事致罪而無私曲者事未發露而自覺舉者所錯之罪得免覺舉之義與自首有殊首者知人將告減二等覺舉既無此文但未發自言皆免其罪應連坐者一人自覺舉餘人亦原之䟽議曰應連坐者長官以下主典以上及檢勾官在案同判署者一人覺舉餘並得原其檢勾之官舉稽及事渉私者曹司依法得罪唯是公坐情無私曲檢勾之官雖舉彼此並無罪責其斷罪失錯已行決者不用此律䟽議曰斷罪失錯已行决者謂死及笞杖已行決訖流罪至配所役了徒罪役訖此等並為已行官司雖自覺舉不在免例各依失入法科之故云不用此律假有人枉𬒳斷徒二年巳役一年官司然始自覺舉者一年未役者自從舉免巳役一年者從失入減三等科杖八十之類其官文書稽程應連坐者一人自覺舉餘人亦原之主典不免若主典自舉並减二等䟽議曰文書謂公案小事五日程中事十日程大事二十日程徒罪以上辯定後三十日程此外不了是名稽程官人自覺舉者並得全原唯主典不免若主典自舉並減二等者以官司不舉故長官以下並减二等如官人主典連署舉者官人並得免罪主典仍减二等科之其制勑案成以後頒下各給抄寫程二百𥿄以下限二日程過此以外每二百𥿄以下加一日程所加多者不得過五日注云其赦書計𥿄雖多不得過三日此等抄寫程既云案成以後㩀令成制勑案不别給程即是當日成了違令限日皆是有稽稽而自舉者同官文書法仍為公坐亦作四等科斷各以所由為首若渉私曲故稽亦同私坐之法問曰公坐相連節級得罪一人覺舉餘亦原之稽案既是公罪勾官亦合連坐勾檢之官舉訖餘官何故得罪荅曰公坐失錯事可追改一人舉覺餘亦原之至於行事稽留不同失錯之例勾官紏出故不免科諸共犯罪者以造意為首隨從者减一等若家人共犯止坐尊長次尊長尊長謂男夫折於法不坐者歸罪於其䟽議曰共犯罪者謂二人以上共犯以先造意者為首餘並為從家人共犯者謂祖父伯叔子孫弟姪共犯唯同居尊長獨坐卑㓜無罪注於法不坐者歸罪於其次尊長尊長謂男夫䟽議曰於法不坐者謂八十以上十嵗以下及篤疾歸罪於其次者假有尊長與卑㓜共犯尊長老疾依律不坐者即以共犯次長者當罪是名歸罪於其次尊長尊長謂男夫者假有婦人尊長共男夫卑㓜同犯雖婦人造意仍以男夫獨坐侵損於人者以凢人首從論䟽議曰侵謂盗竊財物損謂闘毆殺傷之類假令父子合家同犯並依凡人首從之法為其侵損於人是以不獨坐尊長即共監臨主守為犯雖造意仍以監主為首凢人以常從論䟽議曰監臨主守俱如後解假有外人發意共左藏官司主典盗庫絹五疋雖是外人造意仍以監主為首處徒二年外人依常盗從合杖一百諸共犯罪而本罪别者雖相因為首從其罪合依本律首從論䟽議曰謂五服内親共他人毆告所親及侵盗財物雖是共犯而本罪各别假有甲勾他外人乙共毆兄甲為首合徒二年半乙為凡鬪從不下手又減一等合笞二十又有卑㓜勾人盗己家財物十疋卑㓜為首合笞三十他人為從合徒一年又减常盗一等猶杖一百此是相因為首從其罪各依本律首從論此例既多不可具載但是相因為首從本罪别者皆準此若本條言皆者罪無首從不言皆者依首從法䟽議曰案賊盜律謀殺期親尊長外祖父母皆斬如此之類本條言皆者罪無首從不言皆者依首從法科之又賊盜律云謀殺人者徒三年假有二人共謀殺人未行事發造意者為首徒三年從者徒二年半如此之類不言皆者依首從法即强盗及姦略人為奴婢犯䦨入若迯亡及私度越度關棧垣籬者亦無首從䟽議曰强盗之人各肆威力姦者身並自犯不為首從略人為奴婢者理與强盗義同䦨入者謂䦨入宫殿及應禁之所各自身犯亦無首從迯亡者假使十人皆征身各闕事私度者謂無過所從關門私過越度者謂不由門為越關謂檢判之處棧謂塹柵之所垣謂宫殿及府𪠘垣墻籬謂不築墻垣唯以䉒籬為固之類從强盗以下皆以正犯科之故云亦無首從諸共犯罪而有迯亡見獲者稱亡者為首更無證徒則决其從罪䟽議曰假有甲乙二人共詐欺取物合徒一年甲實為首當𬒳捉獲乙本為從遂即迯亡甲被鞫問稱乙為首更無證徒即須斷甲為從科杖一百是名決其從罪後獲亡者稱前人為首鞫問是實還依首論通計前罪以充後數䟽議曰後捉獲乙稱甲為首鞫問甲稱是實還依首坐科徒一年甲是庶人前已决杖一百即須以杖笞贖直準减徒年一年徒贖銅二十斤一百杖贖銅一十斤以十斤杖銅减半年徒罪餘徒半年依法配役甲若單丁前已决杖一百今既處徒一年合杖一百二十即更决二十通計前杖以充後數問曰有甲乙二人犯盗凖罪合流甲元造意乙是隨從然乙事發迯亡甲遂稱乙是首官司斷甲為從處徒三年已役訖然始獲乙甲承是首又甲是白丁若為處分荅曰流罪凖徒四年又云從徒入流比徒一年為剩累徒流應役者不得過四年其人雖復詐冐官司不合更科流罪止合徒一年若犯加徒流自合三年配役三年雖已役訖仍須更配逺流即是通計前罪配所為折居作若前輸贖物後應還者還之䟽議曰假令甲有九品官犯徒一年詐為從罪前斷處杖一百徵銅十斤今依首論斷作一年徒坐以九品一官當徒坐盡前徵銅十斤者還之是名前輸贖物後應還者還之其増减人罪令有輕重者亦從此律䟽議曰此設判官之罪増人罪者有人犯徒一年止有九品一官官司増罪科徒二年官當一年餘徒收贖後更審問止合徒一年前増一年贖物即合追還减人罪者若有一人身居兩職並是九品以上犯徒二年官司减為一年半用一官當徒一年餘有半年官當不盡贖銅十斤檢知前失還用兩官當徒二年前輸半年贖物亦合還主又有白丁犯徒三年官司斷徒一年役訖事發更須科徒二年前一年役訖後更配二年之類若枉入人徒年者即計庸折除課役及贖直枉折每即當年無課役者折來年其有軍役者折役日折一年折二年雖不滿年役過五十日者折一年䟽議曰稱枉入人徒年未必皆是無罪但不應徒役而徒役即是枉入徒年若是全年枉入子注具有明文如不滿五十日役即計枉役二十日以下各計日折丁庸若枉三十五日并折調不滿五十日者更不合折及贖直者假有七品以上子𬒳枉徒一年即以役身之庸折其贖直計庸折銅不盡更徵餘贖或折銅已盡仍有餘庸更亦不計若有課役依上法折除其判官得罪自從故失或有中男十六以上應贖犯杖一百官司處徒一年亦以役日計庸折充贖直盡與不盡皆同上解注每枉一年折二年雖不滿年役過五十者折日折一年䟽議曰枉徒一年通折二年課役若枉三年通折六年課役雖不滿年役過五十日亦除一年者依令丁役五十日當年課役俱免故五十日役者得折一年其稱折一年二年者皆以三百六十日為斷注即當年無課役者折來年其有軍役者折役日䟽議曰𬒳枉徒之年或遇恩復或遭水旱而無課役者聽折來年其有軍役者折上畨之日若枉一年亦通折二年畨役問曰律稱折來年者脱或來年旱澇及遇恩復無課役者得折以後來年以否荅曰律稱當年無課役折來年律矜枉入徒役聽折來年課輸來嵗既無課役將來亦是來年年與課役相須本欲為其凖折若普蒙恩復及遭霜旱依令課役並免豈合即計為年亦如已役已輸聽折來年課役後年無者更折有課役之年此理既同不可别生異議其本應徒已決杖笞者即以杖笞贖直準減徒年䟽議曰假有本坐合徒一年官司決杖一百決訖事發還合科徒前已決杖一百不可追改凖徒一年贖銅二十斤即是十八日徒當銅一斤凖笞十前決一百緫合減徒一百八十日即當銅十斤折徒半年若一年徒罪已笞五十即以五斤之銅減徒役九十日減外殘徒各依式配役故唐律䟽議卷第五
