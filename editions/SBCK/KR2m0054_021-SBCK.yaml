body:
  text: 止犯流徒或一兩度從死會降緫計三犯亦同三犯流徒以否荅曰律有赦後之文不言降前之犯死罪會降止免極刑流徒之科本法仍在然其所犯本坐重於正犯徒流準律而論緫當三犯之例諸盜公取竊取皆爲盜繫閉之屬須絶離常處折器物之屬須移徙䦨圈之不併計即将入己及盜其母而子隨者皆併折放逸飛走之屬須專制乃成盜若畜産伴類隨之折計䟽議曰公取謂行盜之人公然而取竊取謂方便􅀻竊其財皆名爲盜注云器物之屬須移徙者謂器物錢帛之類須移徙離於本處珠玉寳貨之類據入手隱藏縱未将行亦是其木石重器非人力所勝應須䭾載者雖移本處未䭾載間猶未成盜但物有巨細難以備論畧舉綱目各準臨時取㫁闌圈繫閉之屬須絶離常處謂馬牛駞騾之􅀋須岀䦨圈及絶離繫閉之處放逸飛走之屬謂鷹犬之􅁼須專制在巳不得自由乃成爲盗若畜産伴􅁼隨之假有盗馬一疋别有馬隨不合併計爲罪即因逐伴而來遂将入巳及盗其母而子隨之者皆併計爲罪諸部内有一人爲盗及容止盗者里正笞五十正亦同折坊正村三人加一等縣内一人笞三十四人加一等一人論殺人者仍同强盜之法折部界内有盜發及殺人者一處以䟽議曰部内謂州縣郷里所管之内百姓有一人爲盗及容止盗者謂外盗入境所部容止所管里正笞五十注云坊正村正亦同謂得罪亦同里正三人加一等四人行盗合杖六十縣内一人笞三十謂縣内一人行盗縣令笞三十四人加一等有五人行盗即笞四十之􅁼注云部界内有盗發謂里正等以上部界之内有盗發及殺人者一處以一人論謂一處盗發同部内一人行盗一處殺人同一人行強盗故云一處以一人論殺人者仍從強盗之法下文強盜者加一等殺人者亦加一等與強盜同即是部内有一人强盜者里正等杖六十雖非部内人但當境内強盜發亦準此容止殺人賊者亦依強盜之法州隨所管縣多少通計為罪各罪止徒二年强盜者各加一等首佐職為從折皆以長官為䟽議曰州隨所管縣多少通計為罪各罪止徒二年謂州縣里正坊正村正等並罪止徒二年强盜者各加一等罪止徒二年半上注云殺人同强盜之法故知殺人及發處若容止各準強盜加之其通計之法已於户婚律解訖注云以長官爲首佐職爲從但宣風導俗肅清所部長官之事故以長官爲首即剌史縣令闕者以次官當之旣云佐職爲從即罪不及主典即盗及盜發殺人後三十日捕􅀗捕等折他人自主司各勿論限外能捕􅀗追減三等若軍役所有犯隊正以上折衝以下各準部内征人冐名之法同州縣爲罪䟽議曰謂部内有人行盜及當境盜發及部内人殺他人及境内人􅀍他殺事發後三十日自捕􅀗并他人捕􅀗主司各勿論並得免罪若三十日限外能捕􅀗者追減三等稱追減者雖結正訖仍得減之若已經奏决者依捕亡律不在追減之例其軍役有犯謂行軍及領軍人傜役之所有犯盜及殺人事發若容止盜者隊正隊副以上折衝以下得罪並準部内征人冐名之法同州縣爲罪謂隊正隊副團内一人爲盜及容止盜者若有盜發之所竊盜者各笞五十若是強盜及殺人若􅀍殺之處每事各加一等校尉旅師減隊正隊副一等折衝果毅準所管校尉多少通計爲罪假如部内一人爲盜及容止盜者里正笞五十三人加一等計隊正同里正亦一人笞五十三人加一等計二十五人罪止徒二年旅帥校尉一人笞四十二十五人罪止徒一年半折衝果毅如管三校尉三人笞四十七十五人徒一年半管四校尉者四人笞四十一百人罪止徒一年半同州縣爲罪長官爲首佐職爲從故唐律䟽議卷第二十故唐律䟽議卷第二十一凡一十五條折闘訟䟽議曰闘訟律者首論闘毆之科次言告訟之事從秦漢至􅀳未有此篇至後魏太和年分擊訊律爲闘律至北齊以訟事附之名爲闘訟律後周爲闘競律隋開皇依齊闘訟名至今不攺賊盜之後須防闘訟故次於賊盜之下諸闘毆人者笞四十擊人者折謂以手足傷及以他物毆人者杖六十爲他物即兵不用刃亦是折見血爲傷非手足者其餘皆䟽議曰相爭爲闘相擊爲毆若以手足毆人者笞四十注云謂以手足擊人者舉手足爲例用頭擊之類亦是傷謂手足毆傷及以他物毆而不傷者各杖六十注云見血爲傷謂因毆而見血者非手足者即兵不用刃亦是謂手足之外雖是兵器但不用刃者皆同他物之例問曰毆人者謂以手足擊人其有撮挽頭髮或擒其衣領亦同毆擊以否答曰條云闘毆謂以手足擊人明是雖未損傷下手即便􅀗罪至如挽鬢撮髮擒領扼喉旣是傷殺於人狀則不輕於毆例同毆法理用無惑傷及㧞髮方寸以上杖八十若血從耳目出及内損吐血者各加二等䟽議曰謂他物毆人傷及㧞髮方寸以上各杖八十方寸者謂量拔髮無毛之所縱橫徑各滿方寸者若方斜不等圍繞四方爲方寸若毆人頭面其血或從耳或從目而出及毆人身體内損而吐血者各加手足及他物毆傷罪二等其㧞髮不滿方寸者止從毆法其有㧞鬢亦準髮爲坐若毆鼻頭血出止同傷科毆人痢血同吐血例諸闘毆人折齒毁缺耳鼻眇一目及折手足指明而猶見物折眇謂虧損其若破骨及湯火傷人者徒一年折二齒二指以上及髠髮者徒一年半䟽議曰因闘毆人而折其齒或毁破及缺􅔙人耳鼻即毁缺人口眼亦同眇一目謂毆眇其目虧損其明而猶見物者及折手足指若因打破骨而非折者及以湯若火燒盪傷人者各徒一年若湯火不傷從他物毆法若折二齒二指以上稱以上者雖折更多亦不加罪及髠截人髮者各徒一年半其髠髮不盡仍堪爲髻者止當㧞髮方寸以上杖八十若因闘髠髮遂将入已者依賊盜本以他故毆擊人因而奪其財物計􅂍以強盜論以銅鐡汁傷人比湯火傷人如其以虵蜂蝎螫人同他物毆人法若毆人十指並折不堪執物即二支廢從篤疾科流三千里諸闘以兵刃斫射人不着者杖一百箭矟矛􅗋折兵刃謂弓重者從毆法折之屬即毆罪䟽議曰因闘遂以兵刃斫射人不着者杖一百注云兵刃謂弓箭刃矟矛􅗋之屬稱之屬者雖用殳㦸等皆是即毆罪重者謂本條毆罪得徒一年以上者斫射人不着即從毆法假如因闘斫射小功兄姊而不着者即依本條毆罪科徒一年即不從斫射之罪如此之􅀋即從毆法若刃傷之限堪以殺人者折刃謂金鐡無大小及折人肋眇其兩目墮人胎徒二年若辜外死者從本毆傷論折墮胎者謂辜内子死乃坐䟽議曰若刃傷謂以金刃傷人注云刃謂金鐡無大小之限堪以殺人者及折人肋謂闘毆人折肋眇其兩目亦謂虧損其明而猶見物墮人胎謂在孕未生因打而落者各徒二年注云墮胎者謂在辜内子死乃坐謂在母辜限之内而子死者子雖傷而在母辜限外死者或雖在辜内胎落而子未成形者各從本損傷法無墮胎之罪其有毆親屬貴賤等胎落者各從徒二年上爲加減之法皆須以母定罪不據子作尊卑若依胎制刑或致欺紿故保辜止保其母不因子立辜爲無害子之心也若毆母罪重同折傷科之假有毆姊胎落依下文毆兄姊徒二年半折傷者流三千里又條折傷謂折齒以上墮胎合徒二年重於折齒之坐即毆姊落胎合流三千里之􅀋諸闘毆折跌人支體及瞎其一目者徒三年支折折差跌失其常處折者折骨跌體者骨辜内平復者各減二等折跌折餘條準此折平復䟽議曰因闘毆折跌人支體支體謂手足或折其手足或跌其骨體及瞎一目謂一目䘮明全不見物者各徒三年注云折支者謂折四支之骨跌體者謂骨節差跌失於常處辜内平復者謂折跌人支體及瞎一目於下文立辜限内骨莭平復及目得見物並於本罪上減二等各徒二年注云餘條折跌平復準此謂於諸條尊卑貴賤等闘毆及故毆折跌辜内平復並減二等雖非支體於餘骨莭平復亦同若支先攣是廢疾􅀍折故此毆攣支止依毆折一支流二千里有蔭合同減贖何者例云故毆人至廢疾流不合減贖今先廢疾不因毆令廢疾所以聽其减贖即損二事以上及因舊患令至䔍疾若㫁舌及毁敗人陰陽者流三千里䟽議曰即損二事以上者謂毆人一目瞎及折一支之􅀋及因舊患令至篤疾假有舊瞎一目爲殘疾更瞎一目成篤疾或先折一脚爲廢疾更折一脚爲篤疾若㫁舌謂全不得語毁敗陰陽謂孕嗣廢絶者各流三千里㫁舌語猶可解毁敗陰陽不絶孕嗣者並從傷科問曰人目先盲重毆睛壞口或先瘂更㫁其舌如此之􅀋各合何罪荅曰人貌肖天地禀形父母莫不愛其所受樂天委命雖復宿遭痼疾然亦痛此重傷至於􅀍人毁損在法豈宜異制如人舊瘂或先䘮明更壞其睛或㫁其舌止得守文還科㫁舌瞎目之罪諸闘毆殺人者絞以刃及故殺人者斬雖因闘而用兵刃殺者與故殺同用兵刃拒而傷殺者折爲人以兵刃逼己因用兵刃準此折依闘法餘條䟽議曰闘毆者元無殺心因相闘毆而殺人者絞以刃及故殺者謂闘而用刃即有害心及非因闘爭無事而殺是名故殺各合斬罪雖因闘而用兵刃殺者本雖是闘乃用兵刃殺人者與故殺同亦得斬罪並同故殺之法注云爲人以兵刃逼已因用兵刃拒而傷殺逼己之人雖用兵刃亦依闘殺之法餘條用兵刃準此謂餘親戚良賤以兵刃逼人人以兵刃拒殺者並準此闘法又律云以兵刃殺者與故殺同旣無傷文即是傷依闘法注云因用兵刃拒而傷殺者爲以兵刃傷人因而致死故連言之問曰故殺人合斬用刃闘殺亦合斬刑得罪旣是不殊準文更無異理何須云用兵刃殺者與故殺同荅曰名例犯十惡及故殺人者準會赦猶除名兵刃殺人者其情重又同故殺之法會赦猶遣除名不因闘及毆傷人者加闘毆傷罪一等雖因闘但絶時而殺傷者從故殺傷法䟽議曰不因闘競故毆傷人者加闘毆傷一等若拳毆不傷笞四十上加一等合笞五十之類雖因闘但絶時而殺傷者謂忿競之後各已分散聲不相接去而又來殺傷者是名絶時從故殺傷法諸保辜者手足毆傷人限十日以他物毆傷人者二十日以刃及湯火傷人者三十日折跌支體及破骨者五十日傷及殺傷各準此折毆傷不相須餘條毆䟽議曰凡是毆人皆立辜限手足毆人傷與不傷限十日若以他物毆傷者限二十日以刄刄謂金鐵無大小之限及湯火傷人謂灼爛皮膚限三十日若折骨跌體及破骨無問手足他物皆限五十日注云毆傷不相須謂毆及傷各保辜十日然傷人皆須因毆今言不相須者爲下有僵仆或恐迫而傷此則不因毆而有傷損故律云毆傷不相須餘條毆傷者各準此謂諸條毆人或傷人故闘謀殺強盜應有罪者保辜並準此限内死者各依殺人論其在限外及雖在限内以他故死者各依本毆傷法餘患而死者折他故謂别増䟽議曰限内死者各依殺人論謂辜限内死者不限尊卑良賤及罪輕重各從本條殺罪科㫁其在限外假有拳毆人保辜十日計累千刻之外是名限外及雖在限内謂辜限未滿以他故死者他故謂别增餘患而死假毆人頭傷風從頭瘡而入因風致死之類仍依殺人論若不因頭瘡得風别因他病而死是爲他故各依本毆傷法故注云他故謂别增餘患而死其有墮胎瞎目毁敗陰陽折齒等皆約手足他物以刃湯火爲辜限諸同謀共毆傷人者各以下手重者爲重罪元謀减一等從者又減一等若元謀下手重者餘各减二等至死者隨所因爲重罪䟽議曰同謀共毆傷人者謂二人以上同心計謀共毆傷人者假有甲乙丙丁謀毆傷人甲爲元謀乙下手最重毆人一支折以下手重爲重罪乙合徒三年甲是元謀减一等合徒二年半丙丁等爲從又减一等合徒二年若不因闘乙爲故毆之首合流二千里甲是元謀减一等合徒三年丙丁徒二年半若是元謀下手重者假甲爲元謀下手最重即甲合徒三年乙丙丁各减二等並徒二年若故毆即甲合流二千里餘各减二等各徒二年半之􅀋至死謂􅀍毆人致死隨所因爲重罪謂甲毆頭乙毆手丙毆足若由頭瘡致死者即甲爲重罪由手傷致死即乙爲重罪由足傷致死者即丙爲重罪重罪者償死餘各减二等徒三年甲是元謀止减一等流二千里其不同謀者各依所毆傷殺論其事不可分者以後下手爲重罪䟽議曰其不同謀者假有甲乙丙丁不同謀因闘共毆傷一人甲毆頭傷乙打脚折丙打指折丁毆不傷若因頭瘡致死甲得殺人之罪償死乙爲折支合徒三年丙爲折指合徒一年丁毆不傷合笞四十是爲各依所毆傷殺論其事不可分者謂此四人共毆一人其瘡不可分别􅀍毆致死以後下手者爲重罪謂丁下手最後即以丁爲重罪餘各徒三年元謀减一等流三千里若亂毆傷不知先後輕重者以謀首及􅀄闘者爲重餘各減二等䟽議曰假有人群黨共闘亂毆傷人􅀍傷殺者不知下手人名又不知先後輕重若同謀毆之即以謀首爲重罪其不同謀亂毆傷者以􅀄闘者爲重罪自餘非謀首及非􅀄闘各減二等徒三年若不至死唯折二支若謀闘者謀首流三千里餘各徒二年半其不同謀􅀄闘者流三千里餘亦減二等問曰甲乙丙三人同謀毆人各拳毆一下合作首從以否荅曰律云同謀共毆人者各以下手重者爲重罪此㩀辜内致死故有節級减文下又云不同謀者各依所毆傷殺論即明毆者得毆罪傷者得傷罪殺者得殺罪拳毆人者笞四十不同謀者各從毆科同謀毆人豈得减罪是知各笞四十不爲首從若更有丁亦與甲乙丙同謀丁不下手又非元謀即减二等笞二十之􅀋又問甲乙二人同謀毆人甲是元謀又先下手毆一支折乙爲從後下手毆一目瞎各合何罪荅曰㩀上條折跌人支體及瞎其一目者徒三年即損二事以上及因舊患令至篤疾者流三千里此即同謀共毆人傷損二事甲雖謀首合徒三年由乙損二事合流三千里若不同謀各損一事俱得本罪並徒三年諸以威力制􅅞人者各以闘毆論因而毆傷者各加闘毆傷二等䟽議曰以威若力而能制􅅞於人者各以闘毆論依上條手足之外皆爲他物􅅞人皆用徽纆明同他物之限􅅞人不傷合杖六十若傷杖八十因而毆傷者謂因􅅞即毆者傷與不傷各加闘毆傷二等謂因􅅞用他物毆不傷者杖八十傷者杖一百之類是名各加闘毆傷二等即威力使人毆擊而致死傷者雖不下手猶以威力爲重罪下手者减一等䟽議曰威力使人者謂或以官威或恃勢力之類而使人毆擊他人致死傷者威力之人雖不下手猶以威力爲重罪下手者减一等假有甲恃威力而使乙毆殺丙甲雖不下手猶得死罪乙减一等流三千里若折一指甲雖不下手合徒一年乙减一等杖一百之類甲是􅁥臨官百姓無罪喚問事以杖依法决罰致死官人得殺人罪問事不坐若遣用他物手足打殺官人得威力殺人罪問事下手者減一等科諸闘兩相毆傷者各隨輕重兩論如律後下手理直者減二等不减折至死者䟽議曰闘兩相毆傷者假有甲乙二人因闘兩相毆傷甲毆乙不傷合笞四十乙毆甲傷合杖六十之類或甲是良人乙是賤􅀠甲毆乙傷减凡人二等合笞四十乙毆甲不傷加凡人二等合杖六十之類其間尊卑貴賤應有加减各準此例後下手理直者减二等假甲毆乙不傷合笞四十乙不犯甲無辜􅀍打遂拒毆之乙是理直减本毆罪二等合笞二十乙若因毆而殺甲本罪縱不至死即不合减故注云至死者不减問曰尊卑相毆後下手理直得減未知伯叔先下手毆姪兄姊先下手毆弟妹其弟姪等後下手理直得减以否荅曰凡人相毆條式分明五服尊卑輕重頗異只如毆緦麻兄姊杖一百小功大功逓加一等若毆緦麻以下卑㓜折傷减凡人一等小功大功逓減一等據服雖是尊卑相毆兩俱有罪理直則减法亦無疑若其毆親姪弟妹至死然始􅀗罪傷重律則無辜罪旣不合兩論理直豈冝許減舉伯叔兄姊但毆傷卑㓜無罪者並不入此條諸於宫内忿爭者笞五十聲徹御所及相毆者徒一年以刃相向者徒二年䟽議曰宫殿之内致敬之所忽敢忿爭情乖恭肅故宫内忿爭者笞五十嘉徳等門以内爲宫内衞禁律宫城有犯與宫門同即順天等門内亦是若忿競之聲徹於御所及有相毆擊者各徒一年以刃相向者徒二年旣不論兵刃即是刃無大小之限殿内逓加一等傷重者又加闘傷二等於本罪折計加重稱加者準此折即須加餘條䟽議曰殿内忿爭逓加一等者謂太極等門爲殿内忿争杖六十聲徹御所及相毆者徒一年半以刃相向徒二年半若上閣内忿争杖七十聲徹御所及相毆者徒二年以刃相向者徒三年傷重者各加闘傷二等假有凡闘以他物毆傷人内損吐血合杖一百宫内加二等徒一年半即重於宫内相毆徒一年凡闘毆人折齒合徒一年若於殿内是傷重加二等合徒二年是重於殿内相毆徒一年半此爲各加闘傷二等注云計加重於本罪即須加謂殿内凡闘相毆不傷合徒一年半假有甲於殿内毆緦麻尊長本罪合徒一年由在殿内故加罪二等合徒二年是名計加重於本罪不加本罪者假如毆緦麻兄姊合杖一百以在殿内故加二等合徒一年半即與殿内凡闘罪同此是計加不重於本罪止依本徒一年半爲坐餘條稱加者準此謂一部律内稱加得重於本罪者即須加加不重者從本法諸毆制使本属府主刺史縣令及吏卒毆本部五品以上官長徒三年傷者流二千里折傷者絞歯以上折折傷謂折䟽議曰有因忿而毆制使本属府主刺史縣令及吏卒毆本部五品以上官長其吏卒等並於名例解訖毆者合徒三年傷者流二千里折傷者絞注云折傷謂折歯以上依上條闘毆人折歯毁缺耳鼻眇一目及折手足指􅀂破骨及湯火傷人者各徒一年此云折傷者折歯以上得徒一年以上皆是􅀂毆六品以下官長各減三等減罪輕者加凡閗一等死者斬詈者各減毆罪三等之乃成詈折須親自聞䟽議曰六品以下官長謂下鎮将及戍主若諸陵署在外諸監署六品以下雖􅀠寺􅁥當􅁥署有印别起正案行事皆爲當處官長所管吏卒而毆者各减毆五品以上官長罪三等合徒一年半若傷者流上減三等合徒二年折傷者死上減三等徒二年半减罪輕者加凡閗一等假有凡人故毆六品官長折肋合徒二年半從死減三等亦徒二年半拠上條計加重於本罪即須加旣云加凡閗一等從徒二年半上加一等處徒三年下條流外官毆九品以上各又加二等合流二千五百里如此等各減罪輕者加凡閗一等因毆致死者斬詈者減毆罪三等謂詈制使以下本部官長以上從徒三年上減三等合徒一年半若詈六品以下官長又減三等合杖九十此名詈者各减毆罪三等注云須親自聞之乃成詈謂皆須􅀍詈者親自聞之乃爲詈即毆佐職者徒一年傷重者加凡閗傷一等死者斬䟽議曰毆佐職者謂除長官之外當司九品以上之官皆爲佐職所部吏卒毆者徒一年傷重者假如他物故毆傷佐職凡閗合杖九十九品以上加二等合徒一年爲佐職又加一等徒一年半之􅀋是名傷重者加凡闘一等至死者斬諸佐職及所統屬官毆傷官長者各减吏卒毆傷官長二等减罪輕者加凡闘一等死者斬䟽議曰佐職謂當司九品以上及所統屬官者若省寺􅁥管局署州管縣鎮管戌衛管諸府之類是所統屬毆傷官長者官長謂尚書省諸司尚書寺􅁥少卿少􅁥國子司業以上少尹諸衛将軍以上千牛府中郎將以上諸率府副率以上諸府果毅以上王府司馬并諸州别駕雖是次官並同官長或唯有長官一人佐職毆者各减吏卒毆傷官長罪二等即吏卒毆官長折傷者絞若佐職及所統属官毆五品以上官長折傷减吏卒二等合徒三年若毆六品以下官長折傷者减三等徒一年半减罪輕者加凡闘一等假如佐職毆六品以下官長折二齒從死上减五等合徒一年半凡闘折二齒亦徒一年半上條計加重於本罪即須加更加一等處徒二年餘罪計加得重並準此若佐職及所統屬官毆傷五品以上官長者各减吏卒二等假有吏卒毆五品以上官長折肋合死今為佐職毆减吏卒二等合徒三年折肋本罪合徒二年别條六品毆傷五品加二等合徒三年既云减罪輕者加凡闘一等合流二千里死者斬諸毆本屬府主刺史縣令之祖父母父母及妻子者徒一年傷重者加凡闘傷一等疏議曰毆本屬府主刺史縣令之祖父母父母及妻子者徒一年傷重者加凡闘傷一等謂折一指或折一齒凡毆亦徒一年比凡闘為輕加凡闘傷一等合徒一年半之類府主等祖父母父母若是議貴凡毆得徒二年為是本屬府主之祖父母父母加一等得徒二年半傷重以上並準例加一等諸皇家袒免親而毆之者徒一年傷者徒二年傷重者加凡闘二等緦麻以上各遞加一等死者斬疏議曰禮云五世袒免之親四世緦麻之屬皇家戚屬理弘尊敬袒免之親其有毆者合徒一年傷者徒二年故闘及用他物不傷者其罪一也其於諸條相毆唯立罪名不言闘毆又不言以闘論者故毆闘毆及手足他物得罪悉同並無差降傷重者加凡闘二等假有毆折二齒凡闘合徒一年半加二等合徒二年半之類緦麻以上各遞加一等假有毆緦麻折二齒徒三年小功流二千里大功流二千五百里期親流三千里毆不傷從徒一年上遞加毆傷者從徒二年上遞加不加入死故云各遞加一等死者斬問曰皇家袒免親或為佐職官或為本屬府主剌史縣令之祖父母父母妻子或是己之所親若有犯者合遞加以否答曰皇家親屬為尊主之敬故異餘人長官佐職為敬所部尊敬之處理各不同律無遞加之文法止各從重㫁若己之親各凖尊卑服數為罪不在皇親及本屬加例又問皇家袒免之親若有官品而毆之者合累加以否答曰律註毆袒免之親據皇家親屬立罪此由緣敬為重官髙亦合累加諸流外官以下毆議貴者徒二年傷者徒三年折傷者流二千里疏議曰流外官謂勲品以下爰及庶人毆議貴者徒二年議貴謂文武職事官三品以上散官二品以上及爵一品者傷者徒三年折傷者流二千里謂折齒以上若毆折一支凖凡人合徒三年依下文加凡闘二等流二千五百里若毆折二支流三千里本條雖云加凡闘傷二等律無加入死之文止依凡人之法毆傷五品以上减二等若减罪輕及毆傷九品以上各加凡闘傷二等疏議曰流外官以下毆傷五品以上减二等謂减議貴二等毆者徒一年傷者徒二年折傷者徒二年半若減罪輕假有毆五品以上折一支從流二千五百里減二等徒二年半即是减罪輕於凡闘徒三年加二等處流二千五百里之類及毆傷九品以上各加凡闘傷二等謂毆九品以上六品以下之官不傷杖六十傷即杖八十他物不傷杖八十傷即杖一百之類若毆至死者各依凡人法問曰律稱流外官以下毆議貴徒二年若奴婢部曲毆議貴者爲共凡人罪同爲依本法加罪以否答曰依下條部曲毆傷良人加凡人一等奴婢又加一等此是良人與奴婢部曲凡闘之罪其部曲奴婢毆凡人尚各加罪况於貴族及官品貴者理依加法唯據本條加至死者始合處死假如有部曲毆良人折二支加凡闘一等註云加者加入於死既於凡闘流三千里上加一等合至絞刑别條雖加不入於死設有部曲故毆良人九品以上一支折凡闘折一支徒三年九品以上加凡闘二等流二千五百里故毆又加一等流三千里部曲毆又加一等即不合入死亦止流三千里此名餘條不加入死之􅀋故唐律䟽議卷第二十一
