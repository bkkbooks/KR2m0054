front:
  text: 故唐律䟽議卷第十九凡一十七條折賊盗諸盜大祀神御之物者流二千五百里御者帷折謂供神亦同折帳几杖其擬供神御未成者折謂營造
  hash: sha256:321e22890c6ecbffc7f38c29e308c38b8f0df0a87fc540bcbe7acdf7c862fa80
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_019-1a}
body:
  text: 䟽議曰盜大祀神御之物公取竊取皆爲盜大祀謂天地宗廟神州等其供神御所用之物而盜之者流二千五百里注云謂供神御者帷帳几杖亦同謂見供神御者雖帷帳几杖亦得流罪故云亦同其擬供神御謂上文神御之物及帷帳几杖營造未成擬欲供進者故註云謂營造未成者及供而廢闋若饗薦之具已饌呈者徒二年薦折饗已入祀所經祀官省視者折謂玉幣牲牢之屬饌呈謂未饌呈者徒一年半巳闋者杖一百神禮畢折巳闋謂接若盜釡甑刀匕之屬並從常盜之法䟽議曰供而廢闋謂神御之物供􅀕巳訖退還所司者故云廢闋若享薦之具已饌呈饌者謂牲牢棗栗脯修之屬已入神所呈閲祀官訖而盜者各徒二年故註云饗薦謂玉幣牲牢之屬未饌呈者徒一年半謂以上玉幣牲牢饌具之屬未饌呈祀官而盜者徒一年半巳闋者謂神前飲食薦饗已了退而盜者得杖一百若盜釡甑刀匕之屬謂並不用供神故從常盜之法一尺杖六十一疋加一等五疋徒一年五疋加一等罪止加役流言之屬謂盤盂雜器之類諸盜御寳者絞乘輿服御物者流二千五百里等皆須監當之官部分擬進乃爲御物折謂供奉乘輿之物服通衾茵之屬真副其擬供服御及供而廢闋若食将御者徒二年已呈監折将御謂官折當之擬供食御及非服而御者徒一年半䟽議曰稱御者太皇太后皇太后皇后亦同皇太子减一等皇帝八寳皆以玉爲之有神寳受命寳皇帝行寳皇帝之寳皇帝信寳天子行寳天子之寳天子信寳此等八寳皇帝所用之物並爲御寳其三后寳以金爲之並不行用盜者俱得絞刑其盜皇太子寳準例合减一等流三千里若盜皇太子妃寳亦流三千里后寳旣與御寳不殊妃寳明與太子無别乘輿服御物謂供奉乗輿服用之物三后服御之物亦同盜者流二千五百里若盜皇太子及妃所服用物準例减一等合徒三年計􅂍重者即準􅂍同常盜之法加一等注云謂供奉乗輿之物服通衾茵之屬稱之屬者氊褥之類真副等真謂見供服用之衣副謂副二之服皆須監當之官部分擬進者乃爲御物其擬供服御謂營造未成及供而廢闋謂已供用事畢是名廢闋若食将御者謂御食已呈監當之官擬進而盜及食者從擬進而盜及食者從擬供服御以下各徒二年故注云将御謂已呈監當之官擬供食御謂未呈監當之官及非服而御之物者若食及盜各徒一年半􅂍重者各計􅂍以常盜論加一等諸盜官文書印者徒二年餘印杖一百之而非折謂貪利印物及畜產者折行用者餘印謂䟽議曰印者信也謂印文書施行通逹上下所在信受故曰官文書印盜此印者徒二年餘印杖一百餘印謂給諸州封凾及畜産之印在令式印應官給但非官文書之印盜者皆杖一百注云謂貪利之而非行用者皆謂藉以爲財不擬行用若將行用即從僞造僞冩封用規避之罪科之諸盜制書者徒二年官文書杖一百重害文書加一等紙券又加一等者重害謂徒罪以上獄折亦謂貪利之無所施用黜陟授官除免之類折案及婚姻良賤勲賞䟽議曰盜制書徒二年勑及奏抄亦同勑㫖無御書奏抄即有御書不可以御書奏抄輕於勑㫖各與盜制書罪同官文書謂在司尋常施行文書有印無印等重害文書加一等合徒一年注云亦謂貪利之亦如上條盜印藉爲財用無所施行重害謂徒罪以上獄案及婚姻良賤勲賞黜陟授官除免之類稱之類者謂倉糧財物行軍文簿帳及户籍手實之屬盜者各徒一年若欲動事盜者自從増減之律即盜應除文案者依凡盜法䟽議曰即盜應除文案者依令文案不須常留者每三年一揀除旣是年乆應除即非見行文案故依凡盜之法計􅂍科罪諸盜宫殿門符發兵符傳符者流二千里使節及皇城京城門符徒三年餘符徒一年門鑰各減三等盜州鎮及倉厨廐庫􅀜門等鑰杖一百縣戍等諸門鑰杖六十䟽議曰開閉殿門皆用銅魚合符用符鑰法式已於擅興律解訖發兵符以銅爲之左者進内右者付州府監及提兵鎮守之所并留守應執符官人其符雖通餘用爲發兵事重故以發兵爲目傳符謂給將乗驛者依公式令下諸方傳符兩京及北都留守爲麟符東方青龍西方白虎南方朱雀北方玄武兩京留守二十左十九右一餘皆四左三右一左者進内右者付外州府監應執符人其兩京及北都留守符並進内須遣使向四方皆給所詣處左符書於骨帖上内着符裏用泥封以門下省印印之所至之處以右符勘合然後承用盜者合流二千里節者皇華出使黜陟幽明輶軒奉制宣威殊俗皆執旌節取信天下及皇城門謂朱雀等門京城門謂明德等門盜此門符及使節者各徒三年餘符徒一年餘符謂禁苑及交廵等符案擅興律凢言餘符者契亦同即契應發兵者同發兵符法然則盜發兵契各同魚符之罪門鑰各減三等謂各減所開閉之門魚符三等假有盜宫殿門符合流二千里門鑰減三等得徒二年餘鑰應減門符並準此若是禁苑門鑰不可輕於州鎮􅀜門等鑰盜州鎮及官倉厨廐庫及􅀜門等鑰各杖一百縣戍等諸門鑰稱諸門鑰者謂内外百司及坊市門官有門禁盜其鑰者各杖六十諸盜禁兵器者徒二年甲弩者流二千里若盜罪輕同私有法盜餘兵器及旌旗幡幟者杖九十若盜守衛宫殿兵器者各加一等即在軍及宿衞相盜還􅂶官用者各減二等䟽議曰盜禁兵器者徒二年謂非弓箭刀楯短矛私家不合有者皆爲禁兵器甲弩者流二千里盗罪輕者同私有法即盜弩一張流二千里盜甲一領亦流二千里案擅興律私有甲一領及弩三張流二千里盜甲三領及弩五張絞即盜甲三領或盜弩五張並得絞罪是名盜罪輕同私有法其盜餘兵器謂雖是官兵器私家合有者及旌旗幡幟者杖九十並據盜官物計􅂍重加凡盜一等若盜守衛宫殿兵器者又各加一等謂見用守衛宫殿加凡盜二等即在軍謂在行軍之所若宿衛相盜還􅂶官用者各減二等若入私者各同上文盜法諸盜毁天尊像佛像者徒三年即道士女冠盜毁天尊像僧尼盜毁佛像者加役流真人菩薩各減一等盜而供養者杖一百相須折盜毁不䟽議曰凡人或盜或毁天尊若佛像各徒三年道士女冠盜毁天尊像僧尼盜毁佛像者各加役流爲其盜毁所事先聖形像故加役流不同俗人之法真人菩薩各減一等凡人盜毁徒二年半道士女冠盜毁真人僧尼盜毁菩薩各徒三年盜而供養者杖一百謂非貪利将用供養者但盜之與毁各得徒流之坐故注云盜毁不相須其非真人菩薩之像盜毁餘像者若化生神王之類當不應爲從重有􅂍入己者即依凡盜法若毁損功庸多者計庸坐􅂍論各令修立其道士等盜毁佛像及菩薩僧尼盜毁天尊若真人各依凡人之法諸發冡者加役流䰟而葬亦是折發徹即坐招已開棺槨者絞發而未徹者徒三年䟽議曰禮云葬者藏也欲人不得見古之葬者厚衣之以薪後代聖人易之以棺槨有發􅃁者加役流注云發徹即坐招䰟而葬亦是謂開至棺槨即爲發徹先無屍柩招䰟而葬但使發徹者並合加役流已開棺槨者絞謂有棺有槨者必須棺槨兩開不待取物觸屍俱得絞罪其不用棺槨葬者若發而見屍亦同已開棺槨之坐發而未徹者謂雖發􅃁而未至棺槨者徒三年其􅃁先穿及未殯而盜屍柩者徒二年半盜衣服者減一等器物甎版者以凡盜論䟽議曰其􅃁先穿謂先自穿䧟舊有隙􅔙者未殯謂屍猶在外未殯埋而盜屍柩者徒二年半謂盜者元無惡心或欲詐代人屍或欲别處改葬之類盜衣服者減一等得徒二年計􅂍重者以凡盜論加一等此文旣稱未殯明上文發􅃁殯訖而發者亦是若盜器物甎版者謂􅃁先穿取其明器等物或甎若版以凡盜論問曰發􅃁者加役流律旣不言尊卑貴賤未知發子孫􅃁得罪同凢人否荅曰五刑之屬條有三千犯状旣多故通比附然尊卑貴賤等數不同刑名輕重粲然有别尊長發卑㓜之墳不可重於殺罪若發尊長之􅃁據法止同凢人律云發􅃁者加役流在於凢人便減殺罪一等若發卑㓜之􅃁須減本殺一等而科之巳開棺槨者絞即同巳殺之坐發而未徹者徒三年計凢人之罪減死二等卑㓜之色亦於本殺上減二等而科若盜屍柩者依減三等之例其於尊長並同凡人諸盜園陵内草木者徒二年半若盜他人墓塋内樹者杖一百䟽議曰園陵者三秦記云帝王陵有園因謂之園陵三輔黄圖云謂陵四䦨門通四園然園陵草木而合芟刈而有盜者徒二年半若盜他人墓塋内樹者杖一百若􅂍重者準下條以凡盜論加一等若其非盜唯止斫伐者準雜律毁伐樹木稼穡各準盜論園陵内徒二年半他人墓塋内樹杖一百諸盜官私馬牛而殺者徒二年半䟽議曰馬牛軍國所用故與餘畜不同若盜而殺者徒二年半若準􅂍重於徒二年半者以凡盜論加一等其有盜殺􅏚牛之類郷俗不用耕駕者計􅂍以凡盜論諸盜不計􅂍而立罪名及言減罪而輕於凡盗者計􅂍重以凡盜論加一等䟽議曰從盜大祀神御之物以下不計􅂍科唯立罪名亦有減處並謂得罪應重故别立罪名若減罪輕於凡盗者各須計􅂍以凡盗論加一等假有盗他人馬牛而殺評馬牛􅂍直絹二十疋若計凢盗合徒二年半以盗殺馬牛故加凡盗一等處徒三年及言减罪輕於凡盗者上條盗屍柩者徒二年半盗衣服者减一等假有盗屍柩上服直絹二十疋依凡盗徒二年半文稱減一等只徒二年故依凡盜加一等亦徒三年是名以凡盜論加一等若盜皇太子服用及盜中小祀等物雖得減罪亦是盜不計􅂍諸强盜後强等若與人藥酒及食使狂亂取財折謂以威若力而取其財先强後盜先盜發覺棄財逃走財主追捕因相拒捍如此之類折亦是即得闌遺之物毆擊財主而不還及竊盜者非強盜折事有因緣䟽議曰強盜取人財注云謂以威若力假有以威脅人不加􅇯力或有直用􅇯力不作威脅而刼掠取財者先強後盜謂先加迫脅然後取財先盜後強謂先竊其財事覺之後始加威力如此之例俱爲強盜若飲人藥酒或食中加藥令其迷謬而取其財者亦從強盜之法即得闌遺之物財主來認因即毆擊不肯還物及竊盜取人財財主知覺遂棄財逃走財主逐之因相拒捍如此之類是事有因緣並非強盜自從闘毆及拒捍追捕之法問曰據捕亡律被盜雖傍人皆得捕繫未審盜者將財逃走傍人追捕因即格傷或絶時不絶時得罪同強盜否荅曰依律盜者雖是傍人皆得捕繫以送官司盜者旣将財逃走傍人依律合捕其人乃拒傷捕者即是先盜後強絶時以後捕者旣無財主尋逐便是不知盜由因相拒格唯有拒捕之罪不成強盜不得財徒二年一尺徒三年二疋加一等十疋及傷人者絞殺人者斬主但因盜殺傷皆是折殺傷奴婢亦同雖非財其持仗者雖不得財流三千里五疋絞傷人者斬䟽議曰盜雖不得財徒二年若得一尺即徒三年每二疋加一等􅂍滿十疋雖不滿十疋及不得財但傷人者並絞殺人者並斬謂因盜而殺傷人者注云殺傷奴婢亦同諸條奴婢多悉不同良人於此殺傷奴婢亦同良人之坐雖非財主但因盜殺傷皆是無問良賤皆如財主之法盜人若持仗雖不得財猶流三千里􅂍滿五疋合絞持仗者雖不得財傷人者斬罪無首從諸竊盜不得財笞五十一尺杖六十一疋加一等五疋徒一年五疋加一等五十疋加役流䟽議曰竊盜人財謂潜形隱面而取盜而未得者笞五十得財一尺杖六十一疋加一等即是一疋一尺杖七十以次而加至􅂍滿五疋不更論尺即徒一年每五疋加一等四十疋流三千里五十疋加役流其有於一家頻盜及一時而盜數家者並累而倍論倍謂二尺爲一尺若有一處􅂍多累倍不加重者止從一重而㫁其倍􅂍依例緫徴諸監臨主守自盜及盜所監臨財物者財物而折若親主盜亦同折監守自加凡盜二等三十疋絞者亦累加之折本條已有如䟽議曰假如左藏庫物則太府卿丞爲監臨左藏令丞爲監事見守庫者爲主守而自盜庫物者爲監臨主守自盜又如州縣官人盜部内人財物是爲盜所監臨注云若親王財物依令皇兄弟皇子爲親王監守自盜王家財物亦同官物之罪加凡盜二等一尺杖八十一疋加一等一疋一尺杖九十五疋徒二年五疋加一等是名加凡盜二等三十疋絞注云本條已有加者亦累加之謂監臨主守自盜所監主不計􅂍之物計􅂍重者以凡盜論加一等即是本條已有加於此又加二等假有武庫令自盜禁兵器計􅂍直絹二十疋凡人盜者二十疋合徒二年半以盜不計􅂍而立罪名計􅂍重者加凡盜一等徒三年監主又加二等流二千五百里如此之類是本條已有加者亦累加之諸故燒人舎屋及積聚之物而盜者計所燒減價併􅂍以強盜論䟽議曰賊人姦詐千端萬緒濫竊穿窬觸途詭譎或有燒人舎屋及積聚之物因即盜取其財計所燒之物減價併於所盜之物計􅂍以強盜論十疋絞問曰有人持仗燒人舎宅因即盜取其財或燒傷物主合得何罪荅曰依雜律故燒人舎屋徒三年不限強之與竊然則持仗燒人舎宅止徒三年因即盜取財物便是元非盜意雖復持仗而行事同先強後盜計􅂍以強盜科罪火若傷人者同強盜傷人法諸恐喝取人財物者亦是折口恐喝準盜論加一等雖不足畏忌財主懼而自與亦同財者皆爲從坐折展轉傳言而受僃償事有因縁之􅀋者非折若爲人所侵損恐喝以求䟽議曰恐喝者謂知人有犯欲相告訴恐喝以取財物者注云口恐喝亦是雖口恐喝亦與文牒同計􅂍準盜論加一等謂一尺杖七十一疋加一等五疋徒一年半五疋加一等三十五疋流三千里雖不足畏忌但財主懼而自與財者亦同恐喝之罪注云展轉傳言假若甲遣乙丙傳言於丁恐喝取物五疋甲合徒一年半乙丙並各徒一年是名展轉傳言受財者皆爲從坐若爲人所侵損恐喝以求備償假有甲爲乙踐損田苗遂恐喝於乙得倍苗之外更取財者爲有損苗之由不當恐喝之坐苗外餘物即當非監臨主司因事受財坐􅂍論科㫁此是事有因縁之類者非恐喝問曰恐喝取財五疋首不行又不受分傳言者二人一人受財一人不受財各合何罪荅曰律稱準盜須依盜法案下條共盜者併􅂍論造意及從行而不受分即受分而不行各依本首從法若造意不行又不受分即以行人專進止者爲首造意爲從至死減一等從者不行又不受分笞四十其首不行又不受分即以傳言取物者爲首五疋合徒一年半造意者爲從合徒一年又一人不受分亦合爲從笞五十又問監臨恐喝所部取財合得何罪荅曰凢人恐喝取財準盜論加一等監臨之官不同凡人之法名例當條雖有罪名所爲重者自從重理從強乞之律合準枉法而科若知有罪不虚恐喝取財物者合從真枉法而㫁若財未入者杖六十即緦麻以上自相恐喝者犯尊長以凢人論準此折強盜亦犯卑㓜各依本法䟽議曰恐喝取財無限多少財未入者杖六十即緦麻以上自相恐喝者犯尊長以凢人準盜論加一等強盜亦準此者謂别居期親以下卑㓜於尊長家行强盜者雖同於凢人家強盜得罪若有殺傷應入十惡者仍入十惡犯卑㓜各依本法謂恐喝緦麻小功卑㓜取財者減凢人一等五疋徒一年大功卑㓜減二等五疋杖一百期親卑㓜減三等五疋杖九十之類諸本以他故毆擊人因而奪其財物者計􅂍以強盜論至死者加役流䟽議曰謂本無規財之心乃爲别事毆打因見財物遂即奪之事類先強後盜故計􅂍以強盜論一尺徒三年二疋加一等以先無盜心之故􅂍滿十疋應死者加役流若奪財物不得者止從故闘毆法文稱計􅂍以強盜論奪物􅂍不滿尺同強盜不得財徒二年旣元無盜心雖持仗亦不加其罪因而竊取者以竊盜論加一等若有殺傷者各從故闘法䟽議曰先因他故毆擊而輙竊取其財以竊盜論加一等一尺杖七十一疋加一等若有殺傷者謂本因毆擊殺傷元非盜財損害各從故闘法謂因闘致死者絞故殺者斬稱各者從強奪及竊取各以故闘論問曰􅁥臨官司本以他故毆擊部内之人因而奪其財物或竊取三十疋者合得何罪荅曰律稱本因他故毆擊人元即無心盜物毆訖始奪事與強盗相類準􅂍雖依強盜罪止加役流故知其􅂍雖多法不至死因而竊取以竊盜論加一等者爲􅁥臨主司毆擊部内因而竊物以竊盜論加凢盜三等上文強盜旣不至死下文竊盜不可引入絞刑三十疋者罪止加役流又問名例云稱以盜論者與真犯同此條因而竊取以竊盜論加一等旣云加一等即重於竊之法􅁥臨竊三十疋者絞今荅不死理有未通荅曰本條别有制與例不同者依本條文稱奪其財物者以強盜論至死者加役流又云加者不得加至於死是明本以他故毆人因而奪物縱至百疋罪止加役流况於竊取人財豈得加入於死􅁥臨雖有加罪加法不至死刑况下條畧奴婢及和誘各依強竊等法罪止流三千里注云雖􅁥臨主守亦同即此條雖無􅁥臨之文亦不加入於死故唐律䟽議卷第十九
