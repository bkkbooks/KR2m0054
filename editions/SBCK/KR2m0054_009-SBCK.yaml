front:
  text: 故唐律䟽議卷第九凡二十三條折職制
  hash: sha256:cadd189bded355887ee3b076e979cac8543794ab97be8ae5a0673ad8a142e91c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_009-1a}
body:
  text: 䟽議曰職制律者起自於晉名為違制律爰至髙齊此名不改隋開皇改為職制律言職司法制備在此篇宫衛事了設官為次故在衛禁之下諸官有員數而署置過限及不應置而置授者折謂非奏一人杖一百三人加一等十人徒二年䟽議曰官有員數謂内外百司離任以上在令各有員數而署置過限及不應置而置謂格令無員妄相署置注云謂非奏授者即是視六品以下及流外雜任等所司判􅀘一人杖一百三人加一等十人徒二年若是應奏授詐不實者從詐假法如不合置官而故剩奏授者從上書詐不實論後人知而聴者減前人署置一等規求者為從坐􅀍徵須者勿論即軍務要速量事權置者不用此律䟽議曰前人署置過限及不應置而置後人知其剩員而聽任者減初置人罪一等謂二人杖九十四人以上杖一百七人以上徒一年十人徒一年半規求者爲從坐謂人自規求而任者爲初置官從坐合杖九十􅀍徵須者謂􅀍徵召而􅀘者勿論即軍務要速量事權置者謂行軍之所須置權官不當署置之罪故云不用此律諸貢舉非其人及應貢舉而不貢舉者一人徒一年二人加一等罪止徒三年乖僻不如舉狀折非其人謂徳行五分得三分及第者不坐折者若試不及第減二等率䟽議曰依令諸州歲别貢人若别勑令舉及國子諸館年常送省者為舉人皆取方正清循名行相副若徳行無聞妄相推薦或才堪利用蔽而不舉者一人徒一年二人加一等罪止徒三年注云非其人謂徳行乖僻不如舉状者若使名實乖違即是不如舉狀縱使試得及第亦退而獲罪如其徳行無虧唯只䇿不及第減乖僻者罪二等率五分得三分及第者不坐謂試五得三試十得六之類所貢官人皆得免罪若貢五得二科三人之罪貢十得三科七人之罪但有一人徳行乖僻不如舉狀即以乖僻科之縱有得第者多並不合共相準折若考校課試而不以實及選官乖於舉狀以故不稱職者減一等而附致考有陞降者罪亦同折負殿應附而不附及不應附䟽議曰考校謂内外文武官寮年終應考校功過者其課試謂貢舉之人藝業伎能依令課試有數若其官司考試不以實及選官乖於所舉本状以故不稱職者謂不習典憲任以法官明練經史授之武職之類各減貢舉非其人罪一等負殿應附不附者依令私坐每一斤為一負公罪二斤為一負各十負為一殿校考之日負殿皆悉附狀若故違不附及不應附而附者謂䝉别勑放免或經恩降公私負殿並不在附限若犯免官以上及􅂍賄入已恩前獄成仍附景迹除此等罪並不合附而故附致使考校有陞降者得罪亦同謂與考校課試不實罪同亦减貢㪯非其人罪一等失者各減三等者凖此折餘條失承言不覺又減一等知而聽行與同罪䟽議曰失者各减三等謂意在堪貢心不渉私不審徳行有虧得减故罪三等自試不及第以下應附不附以上失者又各減三等餘條失者凖此謂一部律内公事錯失本條無失減之文者並凖此減三等承言不覺亦從貢㪯以下承校試人言不覺差失從失減三等上更減一等故云又減一等知而聽行亦從貢舉以下知非其人或試不及第考校課試知其不實或選官乖狀各與同罪謂各與初試者同罪諸刺史縣令折衝果毅私自出界者杖一百乃坐折經宿䟽議曰州縣有境界折衝府有地􅇛不因公事私自出境界者杖一百注云經宿乃坐既不云經日即非百刻之限但是經宿即合此坐諸在官應直不直應宿不宿各笞二十通晝夜者笞三十䟽議曰依令内外官應分番宿直若應直不直應宿不宿書夜不相須各笞二十通晝夜不直者笞三十若㸃不到者一㸃笞十取二㸃為坐折一日之㸃限䟽議曰内外官司應㸃檢者或數度頻㸃㸃即不到者一㸃笞十注云一日之㸃限取二㸃為坐謂一日之内㸃檢雖多止據二㸃得罪限笞二十若全不來上計日以無故不上科之問曰二日以上日别常向曹司曹司㸃檢每㸃不到若科無故不上即是日别常來若以累㸃科之罪又重於不上假有十日之内日别皆來每㸃不到欲科何罪荅曰八品以下頻㸃不到便是已發更犯合重其事累㸃科之如非流内之人自須當日決放初雖累㸃罪重㸃多不至徒刑計日不上初輕日多即至徒坐所以日别上者據㸃全不來者計日以此處斷實允刑名諸官人無故不上及當畨不到畨上下亦同下折雖無官品但分此折條凖䟽議曰官人者謂内外官人無故不上當畨不到謂分畨之人應上不到注云雖無官品謂但在官分畨者得罪亦同官人之法下條凖此者謂之官限滿不赴及官人從駕稽違及從而先還雖無官品亦同官人之法若因暇而違者一日笞二十三日加一等過杖一百十日加一等罪止徒一年半邊要之官加一等䟽議曰官人以下雜任以上因給暇而故違並一日笞二十三日加一等二十五日合杖一百三十五日徒一年四十五日徒一年半邊要之官謂在縁邊要重之所無故不止以下各加罪一等諸之官限滿不赴者一日笞十十日加一等罪止徒一年即代到不還減二等䟽議曰依令之官各有裝束程限限滿不赴一日笞十十日加一等罪止徒一年其替人已到淹留不還凖不赴任之程減罪二等其有田苖者依令聽待収田訖發遣無田苗者依限須還諸官人從駕稽違及從而先還者笞四十三日加一等過杖一百十日加一等罪止徒二年侍臣加一等䟽議曰官人謂百官應從駕者流外以下應從人亦同官人之罪其書吏書僮之類差逐官人者不在此限其有稽違不到及從而先還者雖不滿日笞四十三日加一等過杖一百十日加一等罪止徒二年侍臣謂中書門下省五品以上依令應侍從者加罪一等諸大祀不預申期及不頒所司者杖六十以故廢事者徒二年䟽議曰依令大祀謂天地宗廟神州等為大祀或車駕自行或三公行事齋官皆散齋之日平明集省受誓誡二十日以前所司預申祠部祠部頒告諸司其不預申期及不頒下所司者杖六十即雖申及頒下事不周悉所坐亦同以故廢祠祀事者所由官司徒二年應連坐者各依公坐法節級得罪牲牢玉帛之屬不如法杖七十闕數者杖一百全闕者徒一年一坐折全闕謂䟽議曰牲謂牛羊豕牢者牲之體玉謂蒼璧祀天璜琮祭地五方上帝各依方色帛謂幣帛稱之屬者謂黍稷以下不依禮令之法一事有違合杖七十一事闕少合杖一百一坐全闕合徒一年其本是中小祀雖從大祀受祭若有少闕各依中小祀逓減之法闕坐更多罪不過此餘祀闕坐皆凖此即入散齋不宿正寢者一宿笞五十致齋不宿本司者一宿杖九十一宿各加一等中小祀逓減二等餘條中小祀凖此折凡言祀者祭享同䟽議曰依令大祀散齋四日致齋三日中祀散齋三日致齋二日小祀散齋二日致齋一日散齋之日齋官晝理事如故夜􅀫於家正寢不􅀫正寢者一􅀫笞五十一􅀫加一等其無正寢者於當家之内餘齋房内􅀫者亦無罪皆不得習穢惡之事故禮云三日齋一日用之猶恐不敬致齋者兩宿宿本司一宿宿祀所無本司及本司在皇城外者皆於郊社太廟􅀫齋若不􅀫者一􅀫杖九十一􅀫加一等通上散齋故云各加一等中小祀者謂社稷日月星辰岳鎮海瀆帝社等為中祀司中司命風師雨師諸星山林川澤之屬為小祀從大祀以下犯者中祀减大祀二等小祀减中祀二等故云各逓减二等注凡言祀者祭享同餘條中小祀凖此䟽議曰依祠令在天稱祀在地為祭宗廟名享今直舉祀為例故曰凡言祀者祭享同餘條中小祀凖此但在中祀有犯皆减大祀二等小祀有犯皆减中祀二等謂下條大祀在散齋弔䘮問疾盗律盗大祀神御物之類本條無中小祀罪名者凖此逓减諸大祀在散齋而弔喪問疾判署刑殺文書及决罰者笞五十奏聞者杖六十致齋者各加一等䟽議曰大祀散齋四日並不得弔喪亦不得問疾刑謂定罪殺謂殺戮罪人此等文書不得判署及不得决罰杖笞違者笞五十若以此刑殺决罰事奏聞者杖六十若在致齋内犯者各加一等中小祀犯者各逓减二等諸祭祀及有事於園陵若朝㑹侍衞行事失錯及違失儀式者笞四十怠慢乖衆者乃坐折謂言辭諠􅅝坐立䟽議曰稱祭祀者享亦同及有事於園陵謂謁陵等事若朝㑹謂百官朝叅集㑹及侍衛祭祀之事行事失錯及違失儀式者笞四十注云謂言辭諠􅅝坐立怠慢謂聲髙諠閙坐立不正不依儀式與衆乖者乃坐應集而主司不告及告而不至者各笞五十䟽議曰應集謂祭祀以下及餘事合集之人而主司不頒告令集罪在主司告而不至獨坐不至者故云各笞五十諸廟享知有緦麻以上喪遣充執事者笞五十陪從者笞三十主司不知勿論有喪不自言者罪亦如之其祭天地社稷則不禁䟽議曰廟享為吉事左傳曰吉禘於莊公其有緦麻以上􅃤不得預其事若知有緦麻以上䘮遣充執事者主司笞五十雖不執事遣陪從者主司笞三十若主司不知前人有喪者勿論即有喪不自言而冐充執事及陪從者亦如之其祭天地社稷不禁者禮云唯祭天地社稷為越紼而行事不避有􅃤故云則不禁諸合和御藥誤不如本方及封題誤醫者絞䟽議曰合和御藥須先處方依方合和不得差誤若有錯誤不如本方謂分兩多少不如本方法之類合成仍題封其上注藥遲駛冷熱之類并寫本方俱進若有誤不如本方及封題有誤等但一事有誤醫即合絞醫謂當合和藥者名例大不敬條内已具解訖料理㨂擇不精者徒一年未進御者各減一等監當官司各减醫一等當官司並凖此折餘條未進御及監䟽議曰料理謂應熬削洗漬之類㨂擇謂去惡留善皆須精細之類有不精者徒一年其藥未進御者各减一等謂應絞者從絞上减應徒者從徒上减是名各减一等監當官司依令合和御藥在内諸省省别長官一人并當上大將軍將軍衛别一人與尚藥奉御等監視藥成醫以上先甞除醫以外皆是監當官司並於巳進未進上各减醫罪一等注云餘條未進御者謂下條造御膳御幸舟船乘輿服御服但應供奉之物未進御者各隨輕重減一等監當官司及各減一等故云並準此諸造御膳誤犯食禁者主食絞若穢惡之物在食飲中徒二年㨂擇不精及進御不時减二等不品嘗者杖一百䟽議曰造御膳者皆依食經經有禁忌不得輙造若乾脯不得入􅁰米中莧菜不得和鼈肉之類有所犯者主食合絞若穢惡之物謂物是不絜之類在食飲中徒二年若揀擇不精者謂㨂米擇菜之類有不精好及進御不時者依禮飯齊視春宜温􅃵齊視夏冝熱之類或朝夕日中進奉失度及冷熱不時者減罪二等謂從徒二年减二等不品嘗者杖一百謂酸鹹苦辛之味不品及應嘗不甞俱得杖一百之罪諸御幸舟船誤不牢固者工匠絞所由為首折工匠各以䟽義曰御幸舟船者皇帝所幸舟船謂造作莊嚴不甚牢固可以敗壊者工匠合絞注云各以所由為首明造作之人皆以當時所由人為首若不整飾及闕少者徒二年䟽議曰其舟船若不整頓修飾及在船篙棹之屬所須者有所闕少得徒二年此亦以所由為首監當官司各减一等諸乘輿服御物持䕶修整不如法者杖八十若進御乖失者杖一百其車馬之屬不調習駕馭之具不完牢徒二年未進御減三等䟽議曰乘輿所服用之物皆有所司執持修整自有常法不如法者杖八十若進御乖失者依禮授立不跪授坐不立之類各依禮法如有乖失違法者合杖一百其車馬之屬不調習駕馭之具不完牢者車謂輅車馬謂御馬其之屬謂羊車及輦等升車則馬動馬動則鑾鳴之類是為調習若不如此或御馬驚駭車轝及鞍轡之屬有損壊各徒二年雖不如法未將進御者減三等應供奉之物闕乏者徒一年其雜供有闕笞五十䟽議曰應供奉之物謂衣服飲食之類但是應供奉者皆須預備有闕乏者即徒一年雜供有闕者謂非尋常應供奉之物可供而闕者笞五十諸主司私借乘輿服御物若借人及借之者徒三年非服而御之物徒一年在司服用者各減一等帳几杖之屬折非服而御帷䟽議曰乘輿服御物主司持䕶修整常須如法若有私借或將借人及借之者各徒三年非服而御之物謂除服御物之外應供御所用者得徒一年雖非自借及借人在司服用者各減罪一等服御物徒三年上減非服而御徒一年上減是為各減一等注非服而御謂帷帳几杖之屬䟽議曰帷帳几杖之屬者謂筆硯書史器玩等是應供御所須非服用之物色類既多故云之屬諸監當官司及主食之人誤將雜藥至御膳所者絞人應到之處折所謂監當之䟽議曰御厨造膳從造至進皆有監當官司依令主食升階進食但是雜藥誤將至御膳所者絞雜藥謂合和為藥堪服餌者若有毒性雖不合和亦為雜藥諸外膳百官折謂供犯食禁者供膳杖七十若穢惡之物在食飲中及揀擇不浄者笞五十誤者各减二等䟽義曰百官常食以上皆官厨所營名為外膳故注云謂供百官犯食禁者食禁已上解訖若有犯者所由供膳杖七十穢惡之物謂不浄物之類在食飲中及揀擇有不浄其所由者得笞五十若有誤失者各减二等誤犯食禁者笞五十誤揀不浄笞三十諸漏泄大事應宻者絞及収捕謀叛之類折大事謂潜謀討襲䟽議曰依闘訟律知謀反及大逆者宻告隨近官司其知謀反大逆謀叛皆合密告或掩襲冦賊此等是大事應密不合人知輙漏泄者絞注云大事謂潜謀討襲者討謂命将誓師潜謀征討襲謂不聲鍾皷掩其不備者既有潜謀討襲之事及収捕反逆之徒故云謀叛之類非大事應密者徒一年半漏泄於蕃國使者加一等仍以初傳者為傳至者為從即轉傳大事者杖八十非大事勿論䟽議曰非大事應密謂依令仰􅀚見風雲氣色有異宻封奏聞之類有漏泄者是非大事應宻合徒一年半國家之事不欲蕃國聞知若漏泄於蕃國使者加一等合徒二年其大事縱漏泄於蕃國使亦不加至所漏泄之事以初傳者為首首謂初漏泄者傳至者為從謂傳至罪人及蕃使者其間展轉相傳大事者杖八十非大事者勿論非大事雖應密而轉傳之人並不坐諸玄􅁚器物天文圖書䜟書兵書七曜暦太一雷公式私家不得有違者徒二年者亦同折私習天文其緯候及論語䜟不在禁限䟽議曰玄􅁚者玄天也謂􅁚天為器其以經星之文及日月所行之道轉之以觀時變易曰玄􅁚著明莫大於日月故天垂􅁚聖人則之尚書云在璇璣玉衡以齊七政天文者史記天官書云天文日月五星二十八宿等故易曰仰則􅀚於天文圖書者河出圖洛出書是也䜟書者先代聖賢所記未來徵祥之書兵書謂太公六韜黄石公三略之類七曜曆謂日月五星之曆太一雷公式者並是式名以占吉㓙者私家皆不得有違者徒二年若將傳用言渉不順者自從造祅言之法私習天文者謂非自有書轉相習學者亦得二年徒坐緯候及䜟者五經緯尚書中候論語䜟並不在禁限諸稽緩制書者一日笞五十之類皆是折騰制勑符移一日加一等十日徒一年䟽議曰制書在令無有程限成案皆云即日行下稱即日者謂百刻内也寫程通計符移關牒滿二百􅁓以下給二日程過此以外每二百􅁓以下加一日程所加多者緫不得過五日其赦書計􅁓雖多不得過三日軍務急速皆當日並了成案及計􅁓程外仍停者是爲稽緩一日笞五十注云騰制勑符移之類謂奉正制勑更騰已出符移關解刺牒皆是故言之類一日加一等計六日杖一百十日徒一年即是罪止其官文書稽程者一日笞十三日加一等罪止杖八十䟽議曰官文書謂在曹常行非制勑奏抄者依令小事五日程中事十日程大事二十日程徒以上獄案辯定須斷者三十日程其通判及勾經三人以下者給一日程經四人以上給二日程大事各加一日程若有機速不在此例機速謂軍機急速不必要準案程應了不了亦準稽程法除此之外皆準事稽程者一日笞十三日加一等罪止杖八十諸被制書有所施行而違者徒二年失錯者杖一百失其㫖折失錯謂䟽議曰被制書謂奉制有所施行而違者徒二年若非故違而失錯㫖意者杖一百問曰條云被制書施行而違者徒二年未知勑及奏抄得罪同否荅曰上條稽緩制書注云騰制勑符移之類皆是即明制勑之義輕重不殊其奏抄御親畫聞制則承㫖宣用御畫不輕承㫖理與制書義同諸受制忘誤及寫制書誤者事若未失笞五十已失杖七十轉受者減一等䟽議曰謂承制之人忘誤其事及寫制書脱剩文字并文字錯失事若未失者謂未失制書之意合笞五十已失謂已失事意而施行合杖七十轉受者減一等若宣制忘誤及寫制失錯轉受者雖自錯誤為非親承制勑故減一等未失其事合笞四十事若已失合杖六十故云轉受者減一等卷終
