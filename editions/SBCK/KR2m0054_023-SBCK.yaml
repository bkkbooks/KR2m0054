front:
  text: 故唐律䟽議卷第二十三凡一十三條折闘訟諸毆傷妻前夫之子者減凡人一等同居者又減一等死者絞
  hash: sha256:d64a9ac611e1be89472eeb4dca5a712e5559e25c3e60915fad63681356579939
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_023-1a}
body:
  text: 䟽議曰毆傷妻前夫之子者謂改醮之婦携子適人後夫毆傷者減凡人一等同居者謂與繼父同居立廟服期又減一等謂減凡人二等若毆之令至篤疾及㫁舌毁敗隂陽如此之類得徒二年半不同居徒三年因毆致死者同居不同居俱得絞罪毆傷繼父者居今異者折謂曾經同與緦麻尊同同居者加一等父凖此折餘條継䟽議曰繼父者謂母後嫁之夫注云謂曾經同居今異者依禮繼父同居服期謂妻少子㓜子無大功之親與之適人所適者亦無大功之親而所適者以其資財為之築家廟於家門之外歲時使之祀焉是謂同居繼子之妻雖不從服若有犯夫之繼父者從下條減夫一等其不同居者謂先嘗同居今異者継父若自有子及有大功之親雖復同住亦為異居若未嘗同居則不為異居即同凡人之例其先同居今異者毆之同緦麻尊合徒一年傷重者各加凡闘二等死者斬同居者雖着期服終非本親犯者不同正服止加緦麻尊一等謂毆者合徒一年半傷重者加凡人三等注云餘條繼父準此謂諸條準服尊卑相犯得罪並準此例雖於繼父下注即稱妻前夫之子並與繼父義同律稱與緦麻尊同其有謀殺及賣理當不睦於前夫之子不言與緦麻卑㓜同毆之準凡人減罪不入緦麻卑㓜之例即毆傷見受業師加凡人二等死者各斬膺儒折謂伏私學者折業而非䟽議曰禮云凡敎學之道嚴師為難師嚴道尊方知敬學如有親承儒敎㐲膺凾丈而毆師者加凡人二等死者各斬稱各者并毆繼父至死俱得斬刑注云謂伏膺儒業而非私學者儒業謂經業非私學者謂弘文國子州縣等學私學者即禮云家有塾遂有序之類如有相犯並同凡人問曰毆見受業師加凡人二等其博士若有髙品累加以否荅曰毆見受業師加凡人二等先有官品亦從品上累加若闘毆無品愽士加凡人二等合杖六十九品以上合杖八十若毆五品愽士亦於本品上累加之諸妻毆詈夫之期親以下緦麻以上尊長各減夫犯一等凡闘傷一等折减罪輕者加妾犯者不減死者各斬䟽議曰依丧服夫之所為兄弟服妻降一等今妻毆夫緦麻以上尊長減夫一等以從夫為服罪亦降夫注云減罪輕者加凡闘傷一等謂故毆緦麻兄姊折一支合流二千五百里妻若減夫一等徒三年故毆凡人折一支旣合流二千里即是減罪輕加凡人一等流二千五百里是減罪輕者加凡闘傷一等妾犯者不減妾犯尊長即與夫同死者各斬謂毆尊長致死妻妾並合斬刑雖云減夫一等若本制服重即從重論假如毆夫之伯叔父母折肋當大功尊加凡人四等合流二千五百里若準夫減一等即徒三年名例律云當條雖有罪名所為重者自從重須準服加四等流二千五百里之類毆傷卑属與夫毆同死者絞即毆殺夫之兄弟子流三千里故殺者絞妾犯者各從凡闘法若尊長毆傷卑㓜之婦減凡人一等妾又減一等死者絞䟽議曰毆傷卑属謂是夫家卑属與夫毆同謂毆夫之從父兄弟子孫有服者折傷以上緦麻減凡人一等諸如此類並与夫同死者絞即毆殺夫之兄弟子流三千里故殺者絞妾犯者各同凡闘法謂並依凡人闘法科罪若尊長毆傷卑㓜之婦謂夫之期親以下緦麻以上尊長毆傷卑㓜之婦減凡人一等妾減凡人二等死者絞諸祖父母父母為人所毆擊子孫即毆擊之非折傷者勿論折傷者减凡闘折傷三等至死者依常律非隨從者折謂子孫元䟽議曰祖父母父母為人所毆擊子孫理合救之當即毆擊雖有損傷非折傷者無罪折傷者減凡闘折傷三等謂折一齒合杖八十之類至死者謂毆前人致死合絞以刃殺者合斬故云依常律注云謂子孫元非隨從者若元隨從即依凡闘首從論律文但稱祖父母父母為人所毆擊不論親踈尊卑其有祖父母父母之尊長毆擊祖父母父母依律毆之無罪者止可解救不得毆之輙即毆者自依闘毆常法若夫之祖父母父母共妻之祖父母父母相毆子孫之婦亦不合即毆夫之祖父母父母如當毆者即依常律問曰主為人所毆擊部曲奴婢即毆擊之得同子孫之例以否荅曰部曲奴婢非親不同子孫之例唯得解救不得毆擊諸闘毆而誤殺傷傍人者以闘殺傷論至死者減一等䟽議曰闘毆而誤殺傷傍人者假如甲共乙闘甲用刃杖欲擊乙誤中於丙或死或傷者以闘殺傷論不從過失者以其元有害心故各依闘法至死者減一等流三千里若以故僵仆而致死傷者以戯殺傷論即誤殺傷助己者各減二等䟽議曰仰謂之僵伏謂之仆謂共人闘毆失手足跌而致僵仆誤殺傷傍人者以戯殺傷論别條戯殺傷人者減闘殺傷人二等謂殺者徒三年折一支者徒二年之類即誤殺傷助己者各減二等假如甲與乙共毆丙其甲誤毆乙至死減二等傷減二等或僵仆壓乙殺傷減戯殺傷二等殺乙從戯殺減二等緫減四等合徒二年若壓折一支亦減四等徒一年是名各減二等問曰甲共子乙同謀毆丙而乙誤中其父因而致死得從誤殺傷助己減等二以否荅曰律云闘毆而誤殺傷傍人以闘殺傷論殺傷傍人坐當過失行者本為緣闘故從闘殺傷論若父來助己而誤殺者聽減二等便即輕於過失依例當條雖有罪名所為重者自從重論合從過失之坐處流三千里又問以闘僵仆誤殺助己父母或雖非僵仆鬬誤殺期親尊長各合何罪荅曰以闘僵仆誤殺父母或期親尊長若減罪輕於過失者並從過失之法又問假有數人同謀殺甲夜中怱遽乃誤殺乙合得何罪荅曰此既本是謀殺與闘毆不同闘毆彼此相持謀殺潛行屠害毆甲誤中於丙尚以闘殺傷論以其元無殺心至死聽減一等況復本謀害甲元作殺心雖誤殺乙原情非闘者若其殺甲是謀殺人今旣誤殺乙合科故殺罪諸部曲奴婢詈舊主者徒二年毆者流二千里傷者絞殺者皆斬過失殺傷者依凡論䟽議曰部曲奴婢詈舊主者徒二年毆者流二千里傷者絞有首從殺者皆斬罪無首從過失殺傷者並準凡人收贖銅入傷殺之家即毆舊部曲奴婢折傷以上部曲減凡人二等奴婢又減二等過失殺者各勿論䟽議曰主毆舊部曲奴婢折傷以上部曲減凡人二等謂折齒合杖九十奴婢又減二等合杖七十之類過失殺者勿論問曰部曲奴婢毆詈舊主期以下親或舊主親屬毆傷所親舊部奴婢得減凡人以否答曰五服尊卑各有血屬故毆尊長節級加之至如奴婢部曲唯繫於主為經主放顧有宿恩其有毆詈所以加罪非主之外雖是親姻所有相犯並依凡人之法又問有人謀殺舊部曲奴婢或於舊部曲奴婢家强盜有殺傷者合減罪以否荅曰毆舊部曲奴婢得減凡人爰至於死亦依減例明謀殺及諸雜犯合依減法唯盜財物特異常犯止依凡人之法不合減科諸戯殺傷人者減闘殺傷二等至死和同者折謂以力共戯雖和以刃若乗髙履危入水中以故相殺傷者唯減一等即無官應贖而犯者依過失法收贖條折餘贖者並凖此折非故犯無官應䟽議曰戯殺傷人者謂以力共戯若因而殺傷人减闘罪二等若有貴賤尊卑長㓜各依本闘殺傷罪上減二等雖則以力共戯終須至死和同不相瞋恨而致死者雖和以刃禮云死而不吊者三謂畏壓溺况乎嬉戯或以金刃或乗髙處險或臨危履薄或入水中旣在險危之所自須共相警戒因此共戯遂致殺傷雖即和同原情不合致有殺傷者唯減本殺傷罪一等即無官應贖謂有䕃及老小廢疾之類而犯應贖罪者依過失法収贖假有過失殺人贖銅一百二十斤戯殺得減二等贖銅六十斤即是輕重不類故依過失贖罪不從減法注云餘條非故犯謂一部律内諸條非故犯罪無官應得收贖者並準此假有甲為人合藥誤不如本方殺人合徒二年半若白丁則從真役若是官品之人合贖者不可徵銅五十斤亦徵一百二十則是餘條之類其不和同及於期親尊長外祖父母夫夫之祖父母雖和並不得為戯各從闘殺傷法䟽議曰謂戯者元不和同及於期親尊長外祖父母夫夫之祖父母此等尊長非應共戯縱雖和同並不得為戯各從闘殺傷之法假有共期親尊長戯折一支者仍處絞之類諸過失殺傷人者各依其狀以贖論不及思慮折謂耳目所足跌及因擊禽獸以致殺傷之屬皆是折所不到共舉重物力所不制若乗髙履危䟽議曰過失之事注文論之備矣殺傷人者各準殺傷本狀依収贖之法注云謂耳目所不及假有投甎瓦及彈射耳不聞人聲目不見人出而致殺傷其思慮所不到者謂本是幽僻之所其處不應有人投瓦及石誤有殺傷或共舉重物而力所不制或共升髙險而足蹉跌或因擊禽獸而誤殺傷人者如此之類皆為過失稱之屬者謂若共捕盜賊誤殺傷旁人之類皆是其本應居作官當者自從本法諸知謀反及大逆者密告隨近官司不告者絞知謀大逆謀叛不告者流二千里知指斥乗輿及妖言不告者各減本罪五等官司承告不即掩捕經半日者各與不告罪同若事須經畧而違時限者不坐䟽議曰謀反者謂知人潜謀欲危社稷大逆者謂知人於宗廟及山陵宫闕已有毁損並須宻告隨近官司知而不即告者絞若知謀大逆謂知始謀欲毁宗廟山陵等謀叛者謂知謀欲背國從偽亦須宻告官司不告者流二千里若知指斥乗輿謂情理切害及妖言者謂妄説休咎之言不告者各減本罪五等本應死者從死上減五等妖言惑不滿衆者流上減五等是名各減五等官司承告謀反以下不即掩捕若經半日者謂經五十刻不即掩捕各與不告罪同若事須經畧謂人衆既多須得人兵器仗如此經畧以故違時限而失罪人者不坐其知謀反以下雖不宻告隨近官司能自捕送者亦與宻告同因其自捕驚失罪人或巳就拘執而失者並同失囚之法諸誣告謀反及大逆者斬從者絞若事容不審原情非誣者上請若告謀大逆謀叛不審者亦如之䟽議曰誣告謀反及大逆者謂知非反逆故欲誣之首合斬從合絞若事容不審者謂或奉别勑閲兵或欲脩葺宗廟見閲兵疑是欲反見脩宗廟疑為大逆之類本情初非誣告者具狀上請聽勑若告謀大逆謀叛不審亦合上請故云亦如之諸誣告人者各反坐即紏彈之官挾私彈事不實者亦如之前人未决者聽減一等其本應加折反坐致罪凖前人入罪法至死而誣官人及有䕃者依常律折杖及贖者止依杖贖法即䟽議曰凡人有嫌遂相誣告者準誣罪輕重反坐告人即紏彈之官謂據令應合紏彈者若有憎惡前人或朋黨親戚挾私飾詐妄作紏彈者並同誣告之律反坐其罪準前人入罪之法至死而前人雖断訖未決者反坐之人聽減一等若誣人反逆雖復未決引虚不合減罪本應加杖者謂誣告部曲奴婢流罪若實部曲奴婢止加杖二百既虚誣告者不流亦準杖法反坐單丁應加杖者亦依決杖反坐及贖者謂誣告老小廢疾若實即前人合贖虚即反坐者亦依贖論即誣官人及有䕃者假有白丁誣七品官流罪若實官人即合例減官當如虚反坐還得流罪誣告有䕃之人事合減贖反坐之者不得準前人減贖法並眞配徒流是名依常律若告二罪以上重事實及數事等但一事實除其罪重事虚反其所剰即罪至所止者所誣雖多不反坐䟽議曰若告二罪以上重事實假有甲告乙毆人折一齒合徒一年又告人盜絹五疋亦合徒一年或故殺他人馬一匹合徒一年半推殺馬是實毆盜是虚是名告二罪以上重事實又有丙告丁三事各徒一年此名數事等但一事實除其罪重事虚反其所剰者假如甲告乙盜絹五疋合徒一年又告故殺官私馬牛合徒一年半若其盜實殺馬牛是虚即是剰告半年之罪反坐半年故云反其所剰即罪至所止者所誣雖多不反坐假有告人非監臨主司因事受財百疋勘當五十疋實坐􅂍五十疋罪止徒三年剰告五十疋為罪至所止不反坐之類其告二人以上雖實者多猶以虚者反坐二人折謂告罪雖輕猶反其坐折以上但一人不實若上表告人已經聞奏事有不實反坐罪輕者從上書詐不實論䟽議曰告二人以上罪雖實者多猶以虚者反坐以其人事各别故得罪不同注云謂告二人以上但一人不實罪雖輕猶反其坐假有人告甲乙丙丁四人之罪三人徒罪以上並實一人笞罪事虚不得以實多放免仍從笞罪反坐若上表告人巳經聞奏事有不實反坐罪輕於上書不實準從上書詐不實處徒二年不應反坐者無罪假如甲上表告乙丙箇徒一年一實一虚準律既免反坐於甲無上書不實之罪諸告小事虚而獄官因其告檢得重事及事等者若類其事則除其罪離其事則依誣論䟽議曰告小事虚而獄官因其告檢得重事者假有告人盜驢檢得盜馬其價又貴是為得重事及事等者假如告盜甲家馬檢得盜乙家騾其價相佀是為事等若類其事謂騾馬驢等色目相類所告雖虚除其妄罪離其事者謂告人盜馬檢得鑄錢之属是離其事則依本誣論仍得誣告盜馬之罪此條為依告狀檢􅂍生文不同獄官狀外求罪之例問曰告人私有弩獄官因告乃檢得甲是類事以否荅曰稱類者謂其形狀難辨原情非誣所以得除其罪然弩之與甲雖同禁兵論其形様色類全别事非疑似元状是誣如此之流不得為類諸誣告人流罪以下前人未加拷掠而告人引虚者減一等若前人已拷者不減即拷證人亦是奴婢部曲誣告主之期親外祖父母者雖引折誣告期親尊長外祖父母夫夫之祖父母及不減折虚各䟽議曰誣告死罪自有别制唯誣告人流罪以下前人未加拷掠而告人自引虚者得減反坐之罪一等若前人已拷者無問杖數多少然後引虚即不合減即拷證人亦是謂雖不拷被告之人拷傍證之者雖自引虚亦同已拷不減其誣告期親尊長以下及奴婢部曲誣告主之外祖父母以上雖即引虚各不合減問曰律云前人未加拷掠而告人引虚減一等未知前人已經断訖然後引虚合減以否荅曰律文但言已加拷掠不言事經断訖拷訖已傷律有成制断訖未損理合減科若事經奏訖不合追減及已役已配亦是已損已傷前人計與拷掠義同不在減科之例諸告祖父母父母者絞上而故告者下條準此折謂非緣坐之罪及謀叛以䟽議曰父為子天有隱無犯如有違失理須諫諍起敬起孝無令䧟罪若有忘情棄禮而故告者絞注云謂非緣坐之罪緣坐謂謀反大逆及謀叛以上皆為不臣故子孫告亦無罪緣坐同首法故雖父祖聽捕告若故告餘罪者父祖得同首例子孫處以絞刑下條準此者謂告期親尊長情在於惡欲令入罪而故告之故云準此若因推劾事不獲免隨辨注引不當告坐即嫡継慈母殺其父及所養者殺其本生並聽告䟽議曰嫡継慈母者名例並已釋訖此等三母殺其父及所養父母殺其所生父母並聽告若嫡継母殺其所生庶母亦不得告故律文但云殺其父者聽告問曰所生之母被出其父更娶継妻其継母乃殺所出之母出母之子合告以否荅曰所飬父母本是他人殺其所生故律聽告今言出母即是所生名例稱犯夫及義絶者得以子䕃即子之於母孝愛情深顧復之思終無絶道継母殺其親母準例亦合聽告又問嫡継慈母有所規求故殺子孫合得何罪又子孫得自理訴以否此母或被出或父卒後行若為科断荅曰子孫之於祖父母父母皆有祖父子孫之名其有相犯之文多不據服而断賊盜律有所規求而故殺期以下卑㓜者絞論服相犯例準傍期在於子孫不入期服然嫡繼慈養依例雖同親母被出改嫁禮制便與親母不同其改嫁者唯止服期依令不合解官據禮又無心䘮雖曰子孫唯準期親卑㓜若犯此母亦同期親尊長被出者禮旣無服並同凢人其應理訴亦依此法故唐律䟽議卷第二十三
