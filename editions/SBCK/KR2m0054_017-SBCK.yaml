front:
  text: 故唐律䟽議卷第十七凡一十三條折賊盗
  hash: sha256:c2b976fe25ddf7e5a8059fb8001a4205eb7d85b2c99bc4e81c4db1b53507509d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0054_SBCK_017-1a}
body:
  text: 䟽議曰賊盜律者魏文侯時李悝首制法經有盜法賊法以為法之篇目自秦漢逮至後魏皆名賊律盜律北齊合為賊盜律後周為刼盜律復有賊叛律隋開皇合為賊盜律至今不改前禁擅發兵馬此湏防止賊盜故次擅興之下諸謀反及大逆者皆斬父子年十六以上皆絞十五以下及母女妻妾亦同折子妻妾祖孫兄弟姊妹若部曲資財田宅並没官男夫年八十及篤疾婦人年六十及廢疾者並免緣坐者準此折餘條婦人應伯叔父兄弟之子皆流三千里不限籍之同異䟽議曰人君者與天地合徳與日月齊明上祗寳命下臨率土而有狡竪凶徒謀危社稷始興狂計其事未行將而必誅即同真反名例稱謀者二人以上若事已彰明雖一人同二人之法大逆者謂謀毁宗廟山陵及宫闕反逆止據始謀大逆者謂其行訖故謀反及大逆者皆斬父子年十六以上皆絞言皆者罪無首從十五以下及母女妻妾注云子妻妾亦同祖孫兄弟姊妺若部曲資財田宅並没官部曲不同資財故特言之部曲妻及客女並與部曲奴婢同資財故不别言男夫年八十及篤疾婦人年六十及廢疾並免緣坐注云餘條婦人應縁坐者準此謂謀叛已上道及殺一家非死罪三人并告賊消息此等之罪縁坐各及婦人其年六十及廢疾亦免故云婦人應縁坐者凖此伯叔父兄弟之子皆流三千里不限籍之同異雖與反逆人别籍得罪皆同若出繼同堂謂伯叔父及兄弟之子己之子内有出繼同宗者同堂謂伯叔父之子今俗呼為親堂兄弟者以外即不合縁坐即雖謀反詞理不能動衆威力不足率人者亦皆斬假託靈異妄稱兵馬虚説反由傳惑衆人折謂結謀真實而不能為害者若自述休徵者自從祅法折而無真狀可驗父子母女妻妾並流三千里資財不在没限其謀大逆者絞䟽議曰即雖謀反者謂雖構亂常之詞不足動衆人之意雖騁凶威若力不能驅率得人雖有反謀無能為害者亦皆斬父子母女妻妾並流三千里資財不在没限故云謂結謀真實而不能為害者若自述休徵言身有善應或假託靈異妄稱兵馬或虚論反狀妄説反由如此傳惑衆人而無真狀可驗者自從祅法謂一身合絞妻子不合縁坐謀大逆者絞上文大逆即據逆事已行此為謀而未行唯得絞罪律不稱皆自依首從之法問曰反逆人應縁坐其妻妾據本法雖㑹赦猶離之正之其繼飬子孫依本法雖㑹赦合正之凖離之正之即不在緣坐之限反逆事彰之後始訴離之正之如此之類並合放免以否荅曰刑法慎於開塞一律不可兩科執憲履繩務從折中違法之輩已汨朝章雖經大恩法湏離正離正之色即是凡人離正不可爲親湏從本宗緣坐諸緣坐非同居者資財田宅不在没限雖同居非緣坐及緣坐人子孫應免流者各準分法留還準一子分法折老疾得免者各䟽議曰縁坐非同居者謂謀反大逆人親伯叔兄弟已分訖田宅資財不在没限雖見同居準律非緣坐謂非期以上親及子孫其祖母及伯叔母姑兄弟妻各謂無夫者律文不載並非縁坐其縁坐人子孫謂伯叔子及兄弟孫據律亦不縁坐各準分法留還謂未經分異犯罪之後並凖户令分法及孫婦雖非緣坐夫没即合歸宗凖法不入分限注云老疾得免者男夫年八十及篤疾婦人年六十及廢疾各凖户内應分人多少人别得凖一子分法留還問曰老疾得免者各凖一子分法假有一人年八十有三男十孫或一孫反逆或一男見在或三男俱死唯有十孫老者若為留分荅曰男但一人見在依令作三男分法􅄈老者一人即為四分若三男死盡依令諸子均分老人共十孫為十一分留一分與老者是為各準一子分法若女許嫁已定歸其夫出飬入道及娉妻未成者不追坐所飬坐折出飬者從道士及婦人若部曲奴婢犯反逆者止坐其身䟽議曰女許嫁已定謂有許㛰之書及私約或已納娉財雖未成皆歸其夫出飬謂男女為人所飬入道謂為道士女冠若僧尼娉妻未成者雖克吉日男女未相見並不追坐出養者從所養家縁坐不渉本生道士及婦人稱道士僧尼亦同婦人不限在室及出嫁入道若部曲奴婢者奴婢不限官私犯反逆者止坐其身自道士以下若犯謀反大逆並無縁坐故云止坐其身問曰雜户及太常音聲人犯反逆有縁坐否荅曰雜戸及太常音聲人各附縣貫受田進丁老免與百姓同其有反逆及應縁坐亦與百姓無别若工樂官戸不附州縣貫者與部曲例同止坐其身更無縁坐諸口陳欲反之言心無真實之計而無狀可尋者流二千里䟽議曰有人實無謀危之計口出欲反之言勘無實狀可尋妄爲狂悖之語者流二千里若有口陳欲逆叛之言勘無真實之狀律令旣無條制各從不應為重諸謀叛者絞已上道者皆斬􅀍驅率者非餘條折謂協同謀計乃坐者凖此折被驅率䟽議曰謀叛者謂欲背國投偽始謀未行事發者首處絞從者流已上道者不限首從皆斬注云謂恊同謀計乃坐恊者和也謂本情和同共作謀計此等各依謀叛之法􅀍驅率者非謂元本不共同情臨時而􅀍驅率者不坐餘條􅀍驅率者準此餘條謂謀反謀大逆或亡命山澤不從追喚既肆凶悖堪擅殺人并刼囚之類􅀍驅率之人不合得罪妻子流二千里若率部衆百人以上父母妻子流三千里所率雖不滿百人以故為害者以百人以上論擊虜掠者折害謂有所攻䟽議曰叛者身得斬罪妻子仍流二千里若唯有妻及子年十五以下合贖婦人不可獨流湏依留住之法加杖居作若子年十六以上依式流配其母至配所免居作在室之女不在配限名例律縁坐者女不同故也若率部衆百人以上罪狀􅀹重故父母及妻子流三千里所率雖不滿百人以故為害者以百人以上論注云害謂有所攻擊虜掠者或攻擊城隍或虜掠百姓依百人以上論各身處斬父母妻子流三千里其攻擊城隍因即拒守自依反法即亡命山澤不從追喚者以謀叛論其抗拒将吏者以已上道論䟽議曰謂背誕之人亡命山澤不從追喚者以謀叛論首得絞刑從者流三千里抗拒將吏者謂有將吏追討仍相抗拒者以已上道論並身處斬妻子配流抗拒有害者父母妻子流三千里並准上文率部衆百人以上不湏有害若不滿百人要湏有害得罪乃與百人以上同諸謀殺制使若本屬府主剌史縣令及吏卒謀殺本部五品以上官長者流二千里廨戸奴婢折工樂及公餘條准此折與吏卒同已傷者絞已殺者皆斬䟽議曰制使本屬府主國官邑官已從名例觧訖刺史都督縣令並據本部者吏卒謀殺都水使者或折衝府衛士謀殺本府折衝果毅如此之類並流二千里工樂謂不屬縣貫唯􅀠本司并公廨戸奴婢謀殺本司五品以上官長罪與吏卒同若司農官户奴婢謀殺司農卿者理與工樂謀殺太常卿少府監無别餘條謂工樂官户奴婢毆詈本部五品以上官長當條無罪名者並與吏卒同已傷者絞仍依首從法已殺者皆斬諸謀殺期親尊長外祖父母夫夫之祖父母父母者皆斬妻妾雖不知情與同罪折犯姦而姦人殺其夫所姦䟽議曰期親尊長外祖父母夫夫之祖父母父母並於名例解訖若妻妾同謀亦無首從注云犯姦而姦人殺其夫謂妻妾與人姦通而姦人殺其夫謀而已殺故􅋐殺者所姦妻妾雖不知情與殺者同罪謂所姦妻妾亦合絞謀殺緦麻以上尊長者流二千里已傷者絞已殺者皆斬䟽議曰謀殺緦麻以上尊長則大功以下皆是外姻有服尊長亦同俱流二千里已傷者首處絞從者流謀而殺訖者皆斬罪無首從即尊長謀殺卑㓜者各依故殺罪减二等已傷者减一等已殺者依故殺法䟽議曰謂上文尊長謀殺卑㓜當條無罪名者各依故殺罪減二等已傷者減一等假如有所規求謀殺期親卑㓜合徒三年已傷者流三千里已殺者依故殺法合絞之類言故殺法者謂罪依故殺法其首各依本謀論造意者雖不行仍爲首從者不行減行者一等假有伯叔数人謀殺猶子訖即首合流二千里從而加功合徒三年從者不加功徒二年半從者不行減行者一等徒二年之類略舉殺期親卑㓜餘者不復備文其應減者各依本罪上减諸部曲奴婢謀殺主者皆斬謀殺主之期親及外祖父母者絞巳傷者皆斬䟽議曰稱部曲奴婢者客女及部曲妻並同此謂謀而未行但同籍良口以上合有財分者並皆為主謀殺者皆斬罪無首從謀殺主之期親為别戸籍者及外祖父母者絞依首從科已傷者皆斬謂無首從其媵及妾在令不合分財並非奴婢之主諸妻妾謀殺故夫之祖父母父母者流二千里已傷者絞已殺者皆斬部曲奴婢謀殺舊主者罪亦同為良者餘條故夫舊主凖此折故夫謂夫亡改嫁舊主謂主放䟽議曰妻妾謀殺故夫之祖父母父母者流二千里已傷者絞並據首從科之已殺者皆斬罪無首從謂一家之内妻妾寡者數人夫亡之後並已改嫁後共謀殺故夫之祖父母父母俱得斬刑若兼他人同謀他人依首從之法不入皆斬之限部曲奴婢謀殺舊主稱罪亦同者謂謀而未殺流二千里已傷者絞已殺者皆斬注云故夫謂夫亡改嫁舊主謂主放為良者妻妾若􅀍出及和離即同凡人不入故夫之限其舊主謂經放為良及自贖免賤者若轉賣及自理訴得脫即同凡人餘條故夫舊主準此謂毆詈告言之類當條無文者並準此諸謀殺人者徒三年已傷者絞已殺者斬從而加功者絞不加功者流三千里造意者雖不行仍為首者亦同折僱人殺䟽議曰謀殺人者謂二人以上若事已彰露欲殺不虛雖獨一人亦同二人謀法徒三年已傷者絞已殺者斬從而加功者絞謂同謀共殺殺時加功雖不下手殺人當時共相擁迫由其遮遏逃竄無所既相因藉始得殺之如此經營皆是加功之類不限多少並合絞刑同謀從而不加功力者流三千里造意者謂元謀署殺其計已成身雖不行仍為首罪合斬餘加功者絞注云雇人殺者亦同謂造意為首受雇加功者為從即從者不行减行者一等行凖此折餘條不䟽議曰謂謀殺人從者不行减行者一等合徒三年注云餘條不行準此餘條謂刼囚傷人及謀殺緦麻以上尊長已傷之類從者不行亦减一等其有發心謀殺即皆斬者同謀不行不在减例謂謀殺期親尊長同謀不行亦得斬罪諸刼囚者流三千里傷人及刼死囚者絞殺人者皆斬不湏得囚折但刼即坐䟽議曰犯罪之人身􅀍囚禁凶徒惡黨共來相刼奪者流三千里若因刼輕囚傷人及刼死囚而不傷人各得絞罪仍依首從科㫁因刼囚而有殺人者皆合處斬罪無首從注云但刼即坐不湏得囚謂以威若力強刼囚者即合此坐不湏要在得囚若竊囚而亡與囚同罪屬等折他人親竊而未得减二等以故殺傷人者從刼囚法䟽議曰謂私竊取囚因即迯逸與囚同罪者謂竊死囚還得死罪還得流徒折竊流徒囚之類假使得相容隱亦不許竊囚故注云他人親屬等竊而未得减二等謂竊計已行未離禁處者减所竊囚罪一等謂未得死囚者徒三年未得流囚徒二年半之類若因竊囚之故而殺傷人者即從刼囚之法科罪問曰父祖子孫見􅀍囚禁而欲刼取乃誤殺傷祖孫或竊囚過失殺傷他人各合何罪荅曰據律刼囚者流三千里傷人及刼死囚者絞殺人者皆斬據此律意本為殺傷傍人若有誤殺傷􅀍刼之囚止得刼囚之坐若其誤殺父祖論罪重於刼囚既是因誤而殺湏依過失之法其因竊囚過失殺傷他人者下條云因盜而過失殺傷他人者以闘殺傷論至死者加役流既竊囚之事類因盜之罪其有過失彼此不殊殺傷人者亦依闘殺傷人論應至死者從加役流坐其有誤殺傷本法輕於竊囚未得者即從重科又問竊囚而亡􅀍人追捕棄囚迯走後始拒格因而殺傷罪同刼囚以否荅曰下條竊盗發覺棄財迯走因相拒捍如此之類事有因緣者非强盗今者竊囚而亡棄囚迯走理與竊盗發覺棄財迯走義同止得拒捕而科不同刼囚之坐諸有所規避而執持人為質者皆斬部司及隣伍知見避質不格者徒二年祖父母者聽身避折質期以上親及外格折不䟽議曰有人或欲規財或欲避罪執持人為質規財者求贖避罪者防格不限規避輕重持質者皆合斬坐部司謂持質人處村正以上并四隣伍保或知見皆湏捕格若避質不格者各徒二年注云質期以上親及外祖父母聽身避不格者謂賊執此等親為質唯聽一身不格不得率衆緫避其質者無期以上親及非外祖父母而避不格者各徒二年諸殺一家非死罪三人殺雖先後事應同斷或折同籍及期親為一家即者皆是奴婢部曲非折應合同㫁而發有先後及支解人者支解者折謂殺人而皆斬妻子流二千里䟽議曰殺人之法事有多端但據前人身死不論所殺之状但殺一家非死罪良口三人即為不道若三人内一人先犯死罪而殺之者即非不道只依殺一人罪法注云同籍及期親為一家同籍不限親踈期親雖别籍亦是即殺一家三人雖有先後發時應合同斷或所殺之事應合同斷或發乃有先後者皆為一時殺法緫入不道殺一家三人内兼殺部曲奴婢者非及支解人者注云謂殺人而支解者或殺時即支解或先支解而後殺之皆同支解並入不道若殺訖絶時後更支解者非或故焚燒而殺或殺時即焚燒者文雖不載罪與支解義同皆合處斬罪無首從妻子流二千里問曰假有部曲若奴殺别人部曲奴婢一家三人或支解依例有犯各準良人合入十惡以否荅曰部曲奴婢雖與良人有殊至於同類殺三人及支解者不可别為差等坐同良人還入十惡諸祖父母父母及夫為人所殺私和者流二千里期親徒二年半大功以下逓减一等受財重者各凖盜論雖不私和知殺期以上親經三十日不告者各减二等䟽議曰祖父母父母及夫為人所殺在法不可同天其有忘大痛之心捨枕戈之義或有窺求財利便即私和者流二千里若殺期親私和者徒二年半大功以下逓减一等謂大功徒二年小功徒一年半緦麻徒一年受財重者各凖盗論謂受讎家之財重於私和之罪假如緦麻私和合徒一年受財十疋凖盗徒一年半之類雖不私和知殺期以上親經三十日不告所在官司者各減前私和之罪二等雖則私和罪重受財罪輕其􅂍本合計限為數少從重終合没官發後輸財私和依法合重其事如傍親為出財私和者自合行求之法依雜律坐􅂍論减五等其􅂍亦合没官其有五服内親自相殺者踈殺親合告親殺踈不合告親踈等者卑㓜殺尊長得告尊長殺卑㓜不得告其應相隱者踈殺親義服殺正服卑㓜殺尊長亦得論告其不告者亦無罪若殺祖父母父母應償死者雖㑹赦仍移鄉避讎以其與子孫為讎故令移配若子孫知而不告從私和及不告之法科之問曰監臨親属為部下人所殺因兹受財私和合得何罪荅曰依律監臨之官知所部有犯法不舉劾者減罪人罪三等况監臨内相殺􅀍殺者又是本親一違律條二乖親義受財一疋以上並是枉法之􅂍􅂍輕及不受財各得私和之罪其間有罪重者各從重科又問主􅀍人殺部曲奴婢私和受財不告官府合得何罪荅曰奴婢部曲身繫於主主􅀍人殺侵害極深其有受財私和知殺不告金科雖無節制亦湏比附論刑豈為在律無條遂使獨為僥倖然奴婢部曲法為主隱其有私和不告得罪並同子孫故唐律䟽議卷第十七
